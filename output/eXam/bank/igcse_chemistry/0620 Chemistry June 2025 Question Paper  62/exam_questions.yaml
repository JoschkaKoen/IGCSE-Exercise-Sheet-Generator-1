  text: "3\nA student tests two solids: solid J and solid K.\n\nTests on solid J\n\
    \nSolid J is iron(II) iodide.\n\nThe student dissolves solid J in water to form\
    \ solution J. Solution J is divided into four portions.\n\n(a) To the first portion\
    \ of solution J, the student adds aqueous sodium hydroxide dropwise and\nthen\
    \ in excess.\nobservations when added dropwise   observations when added in excess\
    \   [2]\n\n(b) To the second portion of solution J, the student adds 1 cm3 of\
    \ dilute nitric acid followed by a\nfew drops of aqueous barium nitrate.\nobservations\
    \   [1]\n\n(c) To the third portion of solution J, the student adds 1 cm3 of dilute\
    \ nitric acid followed by a few\ndrops of aqueous silver nitrate.\nobservations\
    \   [1]\n\n(d) To the fourth portion of solution J, the student adds 1 cm3 of\
    \ aqueous chlorine.\nobservations   [1]\n,\t,\n\nTests on solid K\n\nTable 3.1\
    \ shows the tests and the student’s observations for solid K.\nTable 3.1\ntests\n\
    observations\ntest 1\nCarry out a flame test on solid K.\nlilac coloured flame\n\
    test 2\nThe remaining solid K is dissolved in water to\nform solution K. Solution\
    \ K is divided into two\nportions.\nTo the first portion of solution K in a boiling\
