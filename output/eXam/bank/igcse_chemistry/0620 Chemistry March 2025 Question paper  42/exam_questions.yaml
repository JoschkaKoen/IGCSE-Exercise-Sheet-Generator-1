  text: "4\nCarbonyl chloride, COCl 2, is manufactured by reacting carbon monoxide\
    \ with chlorine.\n\nCO(g)  +  Cl 2(g)\n  COCl 2(g)\nΔH = –105 kJ / mol\n\nThe\
    \ process takes place in a closed system, and an equilibrium is reached.\n\nThe\
    \ conditions for this process are 200 °C and 200 kPa.\n\n(a) Explain what is meant\
    \ by the term closed system [1]\n\n(b) State what the symbol ΔH represents [1]\n\
    \n(c) State how the value of ΔH shows that the forward reaction is exothermic\
    \ [1]\n\n(d) Deduce the value of ΔH for the reverse reaction. Include a sign in\
    \ your answer [1]\n\n(e) Complete Table 4.1 to show the effect, if any, on the\
    \ concentration of COCl 2(g) at equilibrium\nwhen the following changes to the\
    \ conditions are applied.\n\nUse only the words increases, decreases or no change.\n\
    Table 4.1\nchange to conditions\neffect on the concentration of\nCOCl 2(g) at\
    \ equilibrium\nthe temperature is increased\nsome CO is added\nthe pressure is\
    \ increased\na catalyst is added\n\n[4]\n,\t,\n\n(f) The equation for the reaction\
    \ can be represented as shown in Fig. 4.1.\n\nC\n O  +  Cl\n Cl\n\nC\n O\nCl\n\
    Cl\n\nΔH = –105 kJ / mol\nFig. 4.1\n\nTable 4.2 shows some bond energies.\nTable\
    \ 4.2\nbond\nC≡O\nCl –Cl\nC–Cl\nbond energy in kJ / mol\n1075\n240\n340\n\nUse\
    \ the bond energies in Table 4.2 and the value of ΔH for the reaction to calculate\
    \ the\nbond energy, in kJ / mol, of the C=O bond.\n\nUse the following steps.\n\
    •\nCalculate the energy needed to break the bonds in the reactants kJ\n•\nCalculate\
    \ the energy released when the bonds in carbonyl chloride form kJ\n•\nCalculate\
    \ the bond energy of the C=O bond kJ / mol\n\n[3]\n,\t,\n\n(g) Complete the dot-and-cross\
    \ diagram in Fig. 4.2 of a molecule of carbonyl chloride.\n\nShow outer shell\
    \ electrons only.\nCl\nCl\nC\nO\nFig. 4.2\n\n[3]\n\n[Total: 14]\n,\t,"
