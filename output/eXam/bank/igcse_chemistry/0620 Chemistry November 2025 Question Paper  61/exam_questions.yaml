  text: "3\nA student tests two solids: solid J and solid K.\n\nTests on solid J\n\
    \nSolid J is lithium chloride.\n\nRecord the expected observations.\n\n(a) The\
    \ student carries out a flame test on solid J.\n\n(i) State the colour the Bunsen\
    \ burner flame becomes during the flame test [1]\n\n(ii) The student uses a roaring\
    \ Bunsen burner flame to carry out the flame test.\n\n State why a yellow Bunsen\
    \ burner flame is not suitable for a flame test [1]\n\n(b) The student dissolves\
    \ the remaining solid J in distilled water to form solution J.\n\nThe student\
    \ divides solution J into two portions.\n\n(i) To the first portion of solution\
    \ J, the student adds about 1 cm3 of dilute nitric acid followed\nby a few drops\
    \ of aqueous silver nitrate.\nobservations   [1]\n\n(ii) To the second portion\
    \ of solution J, the student adds aqueous sodium hydroxide until it is\nin excess.\n\
    observations   [1]\n,\t,\n\nTests on solid K\n\nTable 3.1 shows the tests and\
    \ the student’s observations for solid K.\n\nTable 3.1\ntests\nobservations\n\
    test 1\nHeat about half of solid K in a boiling tube until there is\nno further\
    \ change.\ncondensation forms at the top of the\nboiling tube\nHold anhydrous\
    \ cobalt(II) chloride paper at the mouth of\nthe boiling tube.\nthe anhydrous\
    \ cobalt(II) chloride paper\nchanges colour from blue to pink\ntest 2\nThe remaining\
    \ solid K is dissolved in distilled water to\nform solution K. Solution K is divided\
    \ into three portions.\nTo the first portion of solution K, add aqueous ammonia\n\
    dropwise and then in excess.\na green precipitate forms\nthe precipitate remains\
    \ when excess\naqueous ammonia is added\ntest 3\nTo the second portion of solution\
    \ K, add 1 cm3 of dilute\nnitric acid followed by a few drops of aqueous\nbarium\
    \ nitrate.\na white precipitate forms\ntest 4\nTo the third portion of solution\
    \ K, add 3 cm3 of aqueous\nsodium carbonate.\neffervescence is seen and a green\n\
    precipitate forms\nTest any gas given off.\nthe gas turns limewater milky\n\n\
    (c) State the conclusion that can be made from the observations in test 1 [1]\n\
    \n(d) Two different cations can give the observations in test 2.\n\n(i) Identify\
    \ the two possible cations that the observations in test 2 show could be in solid\
    \ K [2]\n,\t\t,\n\n(ii) Describe an additional test that can be carried out on\
    \ solution K to confirm which of the\ntwo cations you have identified in (d)(i)\
    \ is in solid K.\n\n Explain how the result of this test shows which of these\
    \ two cations is in solid K.\ntest   explanation   [2]\n\n(e) Identify the gas\
    \ given off in test 4 [1]\n\n(f) Identify the anion in solid K [1]\n\n [Total:\
    \ 11]\n,\n,"
