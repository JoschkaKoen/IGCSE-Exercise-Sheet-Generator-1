  text: "2\nA student investigates the reaction between dilute hydrochloric acid and\
    \ aqueous\nsodium hydroxide.\n\nThe student does five experiments.\n\nExperiment\
    \ 1\n•\nFill a burette with aqueous sodium hydroxide.\n•\nRun some of the aqueous\
    \ sodium hydroxide out of the burette so that the level of the aqueous\nsodium\
    \ hydroxide is on the burette scale.\n•\nRecord the initial burette reading.\n\
    •\nUse a volumetric pipette to add 25.0 cm3 of dilute hydrochloric acid to a conical\
    \ flask.\n•\nStand the conical flask on a white tile.\n•\nAdd five drops of thymolphthalein\
    \ indicator to the conical flask.\n•\nSlowly add aqueous sodium hydroxide from\
    \ the burette to the conical flask, while swirling the\nflask, until the solution\
    \ just changes colour. This is the end-point.\n•\nRecord the final burette reading.\n\
    \nExperiment 2\n•\nEmpty the conical flask and rinse it with distilled water.\n\
    •\nRefill the burette with aqueous sodium hydroxide.\n•\nRun some of the aqueous\
    \ sodium hydroxide out of the burette so that the level of the aqueous\nsodium\
    \ hydroxide is on the burette scale.\n•\nRecord the initial burette reading.\n\
    •\nUse the volumetric pipette to add 25.0 cm3 of dilute hydrochloric acid to the\
    \ conical flask.\n•\nAdd 0.25 g of sodium hydrogencarbonate to the conical flask\
    \ and swirl the flask.\n•\nStand the conical flask on the white tile.\n•\nAdd\
    \ five drops of thymolphthalein indicator to the conical flask.\n•\nSlowly add\
    \ aqueous sodium hydroxide from the burette to the conical flask, while swirling\
    \ the\nflask, until the solution just changes colour. This is the end-point.\n\
    •\nRecord the final burette reading.\n\nExperiment 3\n•\nRepeat Experiment 2 using\
    \ 0.50 g of sodium hydrogencarbonate instead of 0.25 g.\n\nExperiment 4\n•\nRepeat\
    \ Experiment 2 using 1.00 g of sodium hydrogencarbonate instead of 0.25 g.\n\n\
    Experiment 5\n•\nRepeat Experiment 2 using 1.50 g of sodium hydrogencarbonate\
    \ instead of 0.25 g.\n,\t,\n\n(a) Use the information in the descriptions of Experiments\
    \ 1 to 5 and the burette diagrams in\nFig. 2.1 and Fig. 2.2 to complete Table\
    \ 2.1.\nExperiment 1\nExperiment 2\ninitial burette\nreading\nfinal burette\n\
    reading\n2\n1\n0\n47\n46\n45\ninitial burette\nreading\nfinal burette\nreading\n\
    2\n1\n0\n42\n41\n40\n\nFig. 2.1\nFig. 2.2\nTable 2.1\nExperiment\n1\nExperiment\n\
    2\nExperiment\n3\nExperiment\n4\nExperiment\n5\nvolume of dilute\nhydrochloric\
    \ acid / cm3\nmass of sodium\nhydrogencarbonate / g\n0.00\n0.25\n0.50\n1.00\n\
    1.50\nfinal burette reading / cm3\n36.0\n24.1\n13.5\ninitial burette reading /\
    \ cm3\n1.4\n0.3\n0.5\nvolume of aqueous sodium\nhydroxide added to reach\nthe\
    \ end-point / cm3\n13.0\n\n[5]\n,\t,\n\n(b) Complete a suitable scale on the y-axis\
    \ and plot the results from Experiments 1 to 5\nin Table 2.1 on Fig. 2.3. Draw\
    \ a straight line of best fit.\n0.00\n0\n0.50\n1.00\n1.50\nmass of sodium hydrogencarbonate\
    \ / g\nvolume of\naqueous sodium\nhydroxide\nadded to reach\nthe end-point / cm3\n\
    2.00\n2.50\nFig. 2.3\n\n[4]\n\n(c) The sodium hydrogencarbonate added in Experiments\
    \ 2 to 5 neutralises some of the dilute\nhydrochloric acid in the conical flask.\
    \ The sodium hydroxide used in the titration neutralises\nthe remaining dilute\
    \ hydrochloric acid.\n\nExtrapolate\nthe\nline\non\nyour\ngraph\nin\nFig. 2.3\n\
    and\ndeduce\nthe\nmass\nof\nsodium hydrogencarbonate needed to neutralise all\
    \ of the dilute hydrochloric acid in the\nconical flask.\n\nShow clearly on Fig.\
    \ 2.3 how you worked out your answer.\n\nmass of sodium hydrogencarbonate =  [3]\n\
    ,\t,\n\n(d) (i) Explain why a volumetric pipette is used rather than a measuring\
    \ cylinder to measure the\nvolume of dilute hydrochloric acid used in each experiment\
    \ [1]\n\n(ii) Explain why it is not possible to use a volumetric pipette instead\
    \ of the burette to measure\nthe volume of aqueous sodium hydroxide added in each\
    \ experiment [1]\n\n(e) The conical flask is placed on a white tile to make the\
    \ colour change of the indicator at the\nend-point more visible.\n\nExplain why\
    \ universal indicator is not a suitable indicator for this titration [2]\n\n(f)\
    \ Draw a line on Fig. 2.3 to show the results you would expect if the investigation\
    \ was repeated\nusing aqueous sodium hydroxide with twice the concentration.\n\
    \nLabel your line F.\n[2]\n\n[Total: 18]\n,\t,"
