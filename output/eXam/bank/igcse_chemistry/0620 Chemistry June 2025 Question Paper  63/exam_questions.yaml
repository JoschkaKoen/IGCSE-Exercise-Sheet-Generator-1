    \ sodium thiosulfate / cm3\ntime taken\nfor text to not\nbe visible / s\n40\n\
    45\n50\nFig. 2.2\n\n[4]\n\n(c) The relative rate of reaction in each experiment\
    \ is calculated using the equation shown.\nrelative rate of reaction =\n1\ntime\
    \ taken\n\n(i) Calculate the relative rate of reaction in Experiment 1.\n\n Do\
    \ not give units for your answer.\n\nrelative rate of reaction =  [1]\n\n(ii)\
    \ State in which Experiment, 1, 2, 3, 4 or 5, the relative rate of reaction was\
    \ greatest [1]\n,\t,\n\n(d) In each experiment the total volume of aqueous sodium\
    \ thiosulfate and distilled water is\nconstant.\n\n(i) Calculate the volume of\
    \ distilled water needed when the volume of aqueous sodium\nthiosulfate is 37\
    \ cm3.\n\nvolume =  [2]\n\n(ii) From your graph in Fig. 2.2, deduce the time for\
