  text: "3\nA student tests two solids: solid L and solid M.\n\nTests on solid L\n\
    \nSolid L is hydrated aluminium chloride.\n\nThe student dissolves solid L in\
    \ distilled water to form solution L. Solution L is divided into four\napproximately\
    \ equal portions.\n\n(a) To the first portion of solution L, the student adds\
    \ aqueous sodium hydroxide dropwise and\nthen in excess.\nobservations when added\
    \ dropwise   observations in excess   [2]\n\n(b) To the second portion of solution\
    \ L, the student adds aqueous ammonia dropwise and then in\nexcess.\nobservations\
    \ when added dropwise   observations in excess   [2]\n\n(c) To the third portion\
    \ of solution L, the student adds about 1 cm3 of dilute nitric acid followed by\n\
    a few drops of aqueous silver nitrate.\nobservations   [1]\n\n(d) To the fourth\
    \ portion of solution L, the student adds about 1 cm3 of dilute nitric acid followed\n\
    by a few drops of aqueous barium nitrate.\nobservations   [1]\n,\t,\n\nTests on\
    \ solid M\n\nTable 3.1 shows the tests and the student’s observations for solid\
    \ M.\nTable 3.1\ntests\nobservations\ntest 1\nDo a flame test on solid M.\nlight\
    \ green coloured flame\ntest 2\nDissolve the remaining solid M in water to\nform\
