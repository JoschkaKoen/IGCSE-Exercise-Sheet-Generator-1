  text: "2\nA student investigates how the rate of reaction between dilute hydrochloric\
    \ acid and aqueous\nsodium thiosulfate changes as the concentration of the aqueous\
    \ sodium thiosulfate decreases.\nDuring the reaction, the solution slowly becomes\
    \ cloudy. As the solution becomes cloudy, it\nbecomes more difficult to see through\
    \ the solution.\n\nThe student does five experiments.\n\nExperiment 1\n•\nUse\
    \ a 50 cm3 measuring cylinder to pour 50 cm3 of aqueous sodium thiosulfate into\
    \ a 100 cm3\nbeaker.\n•\nUse a 10 cm3 measuring cylinder to pour 5 cm3 of dilute\
    \ hydrochloric acid into the beaker\ncontaining the aqueous sodium thiosulfate.\n\
    •\nImmediately start a stop-watch and stir the contents of the beaker.\n•\nStand\
    \ the beaker on a printed sheet and look down from above the beaker as shown in\n\
    Fig. 2.1.\neye\n100 cm3 beaker\nprinted sheet\naqueous sodium thiosulfate\nand\
    \ dilute hydrochloric acid\nmixture\nprinted text\nFig. 2.1\n•\nWhen the text\
    \ on the printed sheet is not visible, stop the stop-watch and record the time\
    \ to\nthe nearest whole number of seconds.\n•\nEmpty the contents of the beaker\
    \ and rinse the beaker with distilled water.\n\nExperiment 2\n•\nRepeat Experiment\
    \ 1 using 40 cm3 of aqueous sodium thiosulfate instead of 50 cm3. Use the\n50\
    \ cm3 measuring cylinder to add 10 cm3 of distilled water to the beaker before\
    \ adding the\ndilute hydrochloric acid.\n\nExperiment 3\n•\nRepeat Experiment\
    \ 2 using 30 cm3 of aqueous sodium thiosulfate and 20 cm3 of distilled water.\n\
    \nExperiment 4\n•\nRepeat Experiment 2 using 25 cm3 of aqueous sodium thiosulfate\
    \ and 25 cm3 of distilled water.\n\nExperiment 5\n•\nRepeat Experiment 2 using\
    \ 20 cm3 of aqueous sodium thiosulfate and 30 cm3 of distilled water.\n,\t,\n\n\
    (a) Use the information in the description of the experiments and the stop-watch\
