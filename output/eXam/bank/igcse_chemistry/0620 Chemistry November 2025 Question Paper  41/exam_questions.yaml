  text: "4\nGaseous sulfur tetrafluoride, SF4 , reacts with steam in a reversible\
    \ reaction.\nSF4(g)  +  2H2O(g)\n  SO2(g)  +  4HF(g)               ΔH = –54 kJ\
    \ / mol\n\n(a) Complete the reaction pathway diagram in Fig. 4.1 for this reaction.\n\
    \nInclude in your diagram:\n•\nthe position and the formulae of the products\n\
    •\nan arrow, labelled Ea , to show the activation energy\n•\nan arrow, labelled\
    \ ΔH, to show the enthalpy change of the reaction.\nSF4(g) + 2H2O(g)\nenergy\n\
    progress of reaction\nFig. 4.1\n\n[4]\n,\t\t,\n\n(b) The equation for the reaction\
    \ can be represented as shown in Fig. 4.2.\nS\nF\nH\nO\nH\nF\nF\nF\nH\nO\nH\n\
    H\nF\nH\nF\nH\nF\nH\nF\nO\nS\nO\n+\n+\nΔH = –54 kJ / mol\nFig. 4.2\n\nTable 4.1\
    \ shows some bond energies.\nTable 4.1\nbond\nS – F\nO – H\nH – F\nbond energy\
    \ in kJ / mol\n330\n460\n570\n\nUse the bond energies in Table 4.1 and the value\
    \ of ΔH of the reaction to calculate\nthe S=O bond energy in kJ / mol.\n\nUse\
    \ the following steps.\n•\nCalculate the energy needed to break the bonds in the\
    \ reactants kJ\n•\nCalculate the energy released when the bonds in the products\
    \ form kJ\n•\nCalculate the S=O bond energy kJ / mol\n\n[4]\n,\n,\n\n(c) The equation\
    \ for the reaction is shown.\nSF4(g)  +  2H2O(g)\n  SO2(g)  +  4HF(g)        \
    \       ΔH = –54 kJ / mol\n\nState the effect, if any, on the position of equilibrium\
    \ when the following changes are made.\n\nGive a reason for each of your answers.\n\
    •\nThe temperature is increased •\nThe pressure is increased •\nA catalyst is\
    \ added [5]\n\n(d) Explain, in terms of collision theory, why reducing the temperature\
    \ decreases the rate of the\nreverse reaction [3]\n[Total: 16]\n,\t,\nQuestion\
    \ 5 starts on the next page.\n,\t,"
