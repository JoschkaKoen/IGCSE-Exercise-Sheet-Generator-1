  text: "3\nA student makes crystals of the salt sodium sulfate, Na2SO4 . The student\
    \ reacts 0.200 mol / dm3\ndilute sulfuric acid, H2SO4(aq), with aqueous sodium\
    \ hydroxide, NaOH(aq).\n\nThe student uses the following steps.\n\nstep 1\n The\
    \ student places 40.0 cm3 of NaOH(aq) into a conical flask. This volume contains\n\
    0.0100 moles of NaOH.\n\nstep 2\n The student adds a few drops of methyl orange\
    \ indicator to the NaOH(aq) in the conical\nflask.\n\nstep 3\nThe student adds\
    \ 0.200 mol / dm3 H2SO4(aq) to the flask until the end-point is reached.\n\nstep\
    \ 4\n The student transfers the mixture from the conical flask to an evaporating\
    \ basin and\nobtains dry crystals.\n\n(a) Complete the symbol equation for the\
    \ reaction. Include state symbols.\nH2SO4(aq)  +  2NaOH(aq)\n  Na2SO4( )  +  \
    \ ( )\n\n[2]\n\n(b) State the type of exothermic reaction taking place [1]\n\n\
    (c) Calculate the concentration of NaOH(aq) used in step 1.\n\nconcentration of\
    \ NaOH(aq) =  mol / dm3 [1]\n\n(d) Name the item of apparatus the student uses\
    \ to add H2SO4(aq) in step 3 [1]\n\n(e) Calculate the volume of H2SO4(aq), in\
    \ cm3, added in step 3.\n\nvolume of H2SO4(aq) =  cm3 [2]\n\n(f) State the colour\
    \ change observed in step 3.\n\nfrom  to  [2]\n,\t,\n\n(g) The dry crystals formed\
    \ in step 4 are coloured and not white. This is because the student\nshould do\
    \ an additional step between step 3 and step 4.\n\nSuggest what the student should\
    \ do in this additional step to produce white crystals [1]\n\n(h) In step 4, the\
    \ student gently heats the solution in the evaporating basin until the solution\
    \ is\nsaturated. The student then stops heating and leaves the hot solution to\
    \ cool. Crystals start to\nappear.\n\n(i) Explain the term saturated solution\
    \ [2]\n\n(ii) Explain why crystals start to appear as the hot solution cools [1]\n\
    \n(iii) Suggest the effect, if any, on the mass of crystals collected in step\
