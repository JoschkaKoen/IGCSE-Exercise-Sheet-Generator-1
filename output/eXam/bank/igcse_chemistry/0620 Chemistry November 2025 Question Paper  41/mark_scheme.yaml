- number: 4b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'M1 = (4  S–F) + (4  O–H) = (4  330) + (4  460) = 3160

    M2 bond energy of products – 3160 = –54

    = 3160 – (–54) = 3214

    M3 (2  S=O) + (4  H–F) = 3214 therefore 2  S=O = 3214 – (4  570) = 934

    M4 S=O = M3  2 = 934  2 = 467

    4'
  mark_scheme: []
  graphics: []
