  text: "2\nA student investigates the temperature change when a 5 cm length of coiled\
    \ magnesium ribbon\nreacts with excess dilute sulfuric acid.\n\nThe student does\
    \ five experiments.\n\nExperiment 1\n•\nRinse a burette with distilled water and\
    \ then with dilute sulfuric acid.\n•\nFill the burette with dilute sulfuric acid.\
    \ Run some of the dilute sulfuric acid out of the burette\nso that the level of\
    \ the dilute sulfuric acid is on the 0.0 cm3 mark.\n•\nUse the burette to add\
    \ 30.0 cm3 of dilute sulfuric acid to a boiling tube.\n•\nUse a thermometer to\
    \ measure the initial temperature of the acid.\n•\nRecord the initial temperature.\n\
    •\nAdd a coil of magnesium ribbon to the boiling tube. At the same time start\
    \ a stop-watch.\n•\nContinually stir the contents of the boiling tube using the\
    \ thermometer.\n•\nAfter 1 minute, measure the temperature of the mixture in the\
    \ boiling tube.\n•\nRecord this temperature.\n\nExperiment 2\n•\nRefill the burette\
    \ with dilute sulfuric acid. Run some of the dilute sulfuric acid out of the burette\n\
    so that the level of the dilute sulfuric acid is on the 0.0 cm3 mark.\n•\nUse\
    \ the burette to add 25.0 cm3 of dilute sulfuric acid to a new boiling tube.\n\
    •\nUse the thermometer to measure the initial temperature of the acid.\n•\nRecord\
    \ the initial temperature.\n•\nAdd a coil of magnesium ribbon to the boiling tube.\
    \ At the same time start the stop-watch.\n•\nContinually stir the contents of\
