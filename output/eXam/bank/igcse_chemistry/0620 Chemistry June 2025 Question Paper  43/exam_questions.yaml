  text: "4\nThis question is about compounds of sulfur.\n\n(a) Sulfuric acid is manufactured\
    \ in a four‑stage process.\n\nstage 1\nSulfur dioxide is produced from ores containing\
    \ sulfur.\n\nstage 2\nSulfur dioxide reacts with oxygen to form sulfur trioxide.\n\
    \nstage 3\nSulfur trioxide reacts with concentrated sulfuric acid to form oleum,\
    \ H2S2O7.\n\nstage 4\nOleum reacts with water to form concentrated sulfuric acid.\n\
    \n(i) Iron pyrite is an ore containing sulfur. The ore contains a compound with\
    \ the formula\nFeS2.\n\n FeS2 reacts with oxygen in the air to produce sulfur\
    \ dioxide.\n\n Balance the symbol equation for this reaction.\n4FeS2  +   O2\n\
    \   SO2  +   Fe2O3\n\n[1]\n\n(ii) Complete the dot‑and‑cross diagram in Fig. 4.1\
    \ to show the electronic configuration in\nan oxygen molecule, O2. Show outer‑shell\
    \ electrons only.\nO\nO\nFig. 4.1\n\n[2]\n\n(b) (i) State three typical conditions\
    \ for the reaction between sulfur dioxide and oxygen in\nstage 2.\n1   2   3 \
    \  [3]\n,\t\t,\n\n(ii) Write a symbol equation for the reaction that occurs in\
    \ stage 2 [1]\n\n(iii) Write the symbol equation for the reaction in stage 3 [1]\n\
    \n(c) Sulfuric acid reacts with carbon. The equation for the reaction is shown.\n\
    2H2SO4  +  C\n  CO2  +  2H2O  +  2SO2\n\nGive the oxidation number of carbon in:\n\
