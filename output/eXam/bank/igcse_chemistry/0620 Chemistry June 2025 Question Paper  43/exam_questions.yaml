  text: "3\nThis question is about zinc and compounds of zinc.\n\n(a) Zinc is held\
    \ together by electrostatic forces of attraction between particles.\n\n(i) Name\
    \ the type of bonding in zinc [1]\n\n(ii) Name the two types of particles held\
    \ together by the bonding in (a)(i).\n1   2   [2]\n\n(iii) Name the type of particle\
    \ whose movement allows zinc to conduct electricity [1]\n\n(b) Zinc is present\
    \ in alloys such as brass.\n\n(i) State the meaning of the term alloy [1]\n\n\
    (ii) Name the substance that is present in brass, other than zinc [1]\n\n(c) Zinc\
    \ sulfate crystals are made by the reaction between zinc carbonate and dilute\
    \ sulfuric\nacid, using the following steps.\n\nstep 1\nAn excess of powdered\
    \ zinc carbonate is added to dilute sulfuric acid.\n\nstep 2\nExcess zinc carbonate\
    \ is separated from aqueous zinc sulfate by filtration.\n\nstep 3\nAqueous zinc\
    \ sulfate is heated until a saturated solution is formed.\n\nstep 4\nThe saturated\
    \ solution is allowed to cool and crystallise.\n\nstep 5\nThe crystals are removed\
    \ and dried.\n\n(i) Give two observations which show that the zinc carbonate is\
    \ in excess in step 1.\n1   2   [2]\n\n(ii) Name the filtrate in step 2 [1]\n\
    ,\t,\n\n(iii) Name a compound, other than zinc carbonate, that can be added to\
    \ dilute sulfuric acid to\nproduce aqueous zinc sulfate in step 1 [1]\n\n(iv)\
    \ State what is meant by the term saturated solution [2]\n\n(v) Step 1 is repeated\
    \ using large pieces of zinc carbonate instead of powdered zinc\ncarbonate.\n\n\
    \ All other conditions are the same.\n\n The rate of reaction decreases.\n\n Explain\
    \ why the rate of reaction decreases. Give your answer in terms of particles [2]\n\
    \n(vi) Hydrated crystals form in step 4.\n\n State what is meant by the term hydrated\
    \ [1]\n\n[Total: 15]\n,\t,"
