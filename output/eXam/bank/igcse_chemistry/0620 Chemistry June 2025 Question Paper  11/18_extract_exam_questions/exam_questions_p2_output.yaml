  - number: "2"
    type: multiple_choice
    text: |
      The diagrams show the arrangement of particles in three different states of matter.

      state 1 \quad state 2 \quad state 3

      Which row describes the change in energy of the particles and in particle motion for the given change in state?

      \begin{tabular}{|c|c|c|c|}
      \hline
       & change in state & energy of particles & particle motion \\
      \hline
      \textbf{A} & $1 \to 2$ & decreases & decreases \\
      \textbf{B} & $2 \to 1$ & decreases & increases \\
      \textbf{C} & $3 \to 1$ & increases & increases \\
      \textbf{D} & $1 \to 3$ & increases & decreases \\
      \hline
      \end{tabular}
    options:
      - letter: A
        text: |
          A
      - letter: B
        text: |
          B
      - letter: C
        text: |
          C
      - letter: D
        text: |
          D
