questions:
  - number: "28"
    type: multiple_choice
    text: |
      Steel is a mixture of iron and one or more other elements.

      The table gives some information about three common types of steel.

      \begin{tabular}{|c|c|c|c|}
      \hline
       & type of steel & \begin{tabular}[c]{@{}c@{}}elements\\ added to iron\end{tabular} & properties \\ \hline
      1 & high-carbon steel & carbon only & \begin{tabular}[c]{@{}c@{}}strong, brittle\\ and corrodes\end{tabular} \\ \hline
      2 & low-carbon steel & carbon only & \begin{tabular}[c]{@{}c@{}}soft, easily shaped\\ and corrodes slowly\end{tabular} \\ \hline
      3 & stainless steel & \begin{tabular}[c]{@{}c@{}}carbon, chromium\\ and nickel\end{tabular} & \begin{tabular}[c]{@{}c@{}}hard and resistant\\ to corrosion\end{tabular} \\ \hline
      \end{tabular}

      Which rows identify a type of steel that is suitable to make cutlery?
    options:
      - letter: A
        text: |
          1 and 2
      - letter: B
        text: |
          1 only
      - letter: C
        text: |
          2 and 3
      - letter: D
        text: |
          3 only
  - number: "29"
    type: multiple_choice
    text: |
      The diagram shows an experiment to investigate the corrosion of iron.

      What happens to the water level in tubes P and Q?

      \begin{tabular}{|c|c|c|}
      \hline
       & tube P & tube Q \\ \hline
      \textbf{A} & rises & falls \\ \hline
      \textbf{B} & no change & rises \\ \hline
      \textbf{C} & falls & rises \\ \hline
      \textbf{D} & no change & no change \\ \hline
      \end{tabular}
    options:
      - letter: A
        text: |
          rises \quad falls
      - letter: B
        text: |
          no change \quad rises
      - letter: C
        text: |
          falls \quad rises
      - letter: D
        text: |
          no change \quad no change