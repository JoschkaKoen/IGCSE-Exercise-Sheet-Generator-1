    \ particles, why gases diffuse [1]\n\n(ii) State what determines the relative\
    \ rate of diffusion of gases at constant temperature [1]\n\n(d) Gaseous oxides\
    \ of nitrogen are atmospheric pollutants. One adverse effect of oxides of\nnitrogen\
