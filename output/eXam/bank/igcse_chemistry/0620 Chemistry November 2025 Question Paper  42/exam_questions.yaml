    \ for the reduction of iron(III) oxide by the gaseous reducing\nagent in (a)(iii)\
    \ [2]\n\n(v) The main impurity in iron ore is silicon(IV) oxide.\n\n Write two\
    \ symbol equations to show the role of limestone in removing silicon(IV) oxide\n\
    from iron ore.\n1  2  [2]\n\n(b) Table 2.1 shows four different isotopes of iron,\
    \ A, B, C and D.\nTable 2.1\nA\nB\nC\nD\n54Fe\n56Fe\n57Fe\n58Fe\n\nExplain why\
    \ A, B, C and D are isotopes of iron [2]\n,\t,\n\n(c) Iron can form two different\
