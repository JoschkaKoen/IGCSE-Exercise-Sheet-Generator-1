  text: "4\nThis question is about chlorine and compounds of chlorine.\n\n(a) Gaseous\
    \ chlorine reacts with gaseous phosphorus(III) chloride to form gaseous\nphosphorus(V)\
    \ chloride. The reaction is a reversible reaction.\n\nWhen the three gases are\
    \ in a closed container the system reaches equilibrium.\nCl 2(g)  +  PCl 3(g)\n\
    \  PCl 5(g)\n\n(i) Describe a reversible reaction at equilibrium in terms of:\n\
    •\nthe rate of the forward reaction and the rate of the reverse reaction\n  •\n\
    the concentrations of reactants and products [2]\n\n(ii) Complete Table 4.1 using\
    \ only the words increases, decreases or no change.\nTable 4.1\nchange to condition\n\
    effect on the\nrate of the forward reaction\neffect on the\nequilibrium concentration\
    \ of PCl 5\nthe pressure is decreased\na catalyst is added\nincreases\n\n[3]\n\
    \n(iii) When the temperature of the equilibrium mixture is increased, the equilibrium\n\
    concentration of PCl 5 decreases.\n\n State what conclusion about the forward\
    \ reaction can be made from this information [1]\n,\t,\n\n(b) Ethene, C2H4, reacts\
    \ with chlorine, Cl 2, to form 1,2-dichloroethane, CH2Cl CH2Cl .\n\nThe equation\
    \ for this reaction can be represented as shown.\nH\nC\nH\nH\nC\nC\nCl\nCl\nCl\n\
    Cl\n+\nH\nC\nH\nH\nH\nH\n\nTable 4.2 shows some bond energies.\nTable 4.2\nbond\n\
    bond energy\nin kJ / mol\nC–C\n350\nC=C\n610\nC–H\n410\nCl –Cl\n240\nC–Cl\n340\n\
    \nUse the bond energies in Table 4.2 to calculate the enthalpy change, in kJ /\
    \ mol, of the reaction.\n\nUse the following steps.\n•\nCalculate the total energy\
    \ needed to break the bonds in C2H4 and Cl 2 kJ\n•\nCalculate the total energy\
    \ released when the bonds form in CH2Cl CH2Cl  kJ\n,\t\t,\n•\nCalculate the enthalpy\
    \ change of the reaction.\n\nYour answer should include a sign kJ / mol\n[3]\n\
    \n(c) Chlorine reacts with nitrogen to form nitrogen trichloride, NCl 3.\n\nComplete\
    \ the dot-and-cross diagram in Fig. 4.1 of a molecule of NCl 3.\n\nShow outer\
    \ shell electrons only.\nN\nCl\nCl\nCl\nFig. 4.1\n[3]\n,\n,\n\n(d) When solid\
    \ magnesium carbonate, MgCO3, is added to dilute hydrochloric acid, HCl , a\n\
    chemical reaction occurs. The equation for the reaction is shown.\nMgCO3(s)  +\
    \  2HCl (aq)\n  MgCl 2(aq)  +  CO2(g)  +  H2O(l)\n\n(i) Give two observations\
    \ when solid magnesium carbonate is added to dilute hydrochloric\nacid.\n1   2\
    \   [2]\n\n(ii) Calculate the volume, in cm3, of CO2(g) that is produced at room\
    \ temperature and\npressure (r.t.p.) when 50.0 cm3 of 0.100 mol / dm3 HCl reacts\
    \ with excess MgCO3.\n\n The volume of 1 mol of any gas is 24 000 cm3 at r.t.p.\n\
    \n Use the following steps.\n•\nCalculate the number of moles of HCl in 50.0 cm3\
    \ of 0.100 mol / dm3 HCl  mol\n•\nDeduce the number of moles of CO2(g) produced\
    \ mol\n•\nCalculate the volume, in cm3, of CO2(g) produced at r.t.p cm3\n[3]\n\
    [Total: 17]\n,\t,"
