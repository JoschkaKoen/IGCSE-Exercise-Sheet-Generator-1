    \n(i) Write an ionic equation for this precipitation reaction. Include state symbols\
    \ [3]\n\n(ii) State the name of an aqueous solution containing lead(II) ions [1]\n\
    \n(iii) State the name of an aqueous solution containing sulfate ions [1]\n\n\
    (iv) The lead(II) sulfate precipitate is separated from the rest of the reaction\
    \ mixture by\nfiltration. The impure lead(II) sulfate remains on the filter paper.\n\
    \n State the general term given to an insoluble substance that remains on the\
    \ filter paper\nduring filtration [1]\n\n(v) Describe how the lead(II) sulfate\
    \ is purified after filtration [2]\n,\t,\n\n(b) Copper is a transition element.\n\
    \nA list of properties of copper is shown.\n•\nIt has good electrical conductivity.\n\
    •\nIt has variable oxidation states.\n•\nIt forms soluble salts.\n•\nIt forms\
    \ coloured compounds.\n•\nIt forms basic oxides.\n•\nIt acts as a catalyst.\n\n\
