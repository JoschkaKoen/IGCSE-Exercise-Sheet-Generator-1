  text: "3\nThis question is about aluminium and other metallic elements.\n\n(a) Aluminium\
    \ is extracted from purified bauxite by electrolysis. Fig. 3.1 shows a diagram\
    \ of the\nelectrolytic cell used.\nwaste gases\nnegative electrode\naluminium\n\
    electrolyte\npositive electrodes\nFig. 3.1\n\n(i) State the name of the aluminium\
    \ compound present in bauxite [1]\n\n(ii) Name the substance that purified bauxite\
    \ is dissolved in before electrolysis is carried out [1]\n\n(iii) Name the substance\
    \ that is used for the positive electrodes [1]\n\n(iv) Write the ionic half-equation\
    \ for the production of aluminium at the negative electrode [2]\n\n(b) Aluminium\
    \ is above zinc in the reactivity series.\n\n(i) When a piece of aluminium foil\
    \ is added to aqueous zinc sulfate, a reaction is\nnot immediately observed even\
    \ though aluminium is above zinc in the reactivity series.\n\n Explain why a reaction\
    \ is not immediately observed [1]\n\n(ii) After a few minutes, a displacement\
    \ reaction occurs between aluminium and aqueous\nzinc ions.\n\n Complete the ionic\
    \ equation for this reaction Al  +   Zn2+\n   Al 3+  +   Zn\n[1]\n,\t,\n\n(iii)\
    \ State the oxidation number of zinc in:\nZn2+  Zn [2]\n\n(iv) Define the term\
    \ reduction in terms of oxidation number [1]\n\n(c) Aluminium reacts with iron(III)\
    \ oxide. The equation is shown.\n2Al  +  Fe2O3\n  Al 2O3  +  2Fe         ΔH =\
    \ – 850 kJ / mol\n\n(i) State the meaning of the symbol ΔH [1]\n\n(ii) State what\
    \ can be deduced about the reaction from the negative sign in ΔH = – 850 kJ /\
    \ mol [1]\n\n(d) Gallium has many similarities to aluminium. Gallium(III) oxide\
    \ is an amphoteric oxide.\n\nState what is meant by the term amphoteric [1]\n\n\
    (e) The reaction of gallium(III) oxide, Ga2O3, with aqueous sodium hydroxide forms\
    \ a salt which\ncontains the negative ion GaO2\n–. The only other product is water.\n\
    \nWrite a symbol equation for this reaction [2]\n\n(f) Deduce the formula of:\n\
    •   gallium(III) bromide  •   gallium(III) sulfate [2]\n[Total: 17]\n,\t,"
