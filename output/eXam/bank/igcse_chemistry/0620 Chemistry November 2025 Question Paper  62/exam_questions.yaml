  text: "2\nA student investigates the reaction between acidic solution B and two\
    \ different solutions of\naqueous sodium hydroxide, solution C and solution D,\
    \ using two different indicators.\n\nThe student does two experiments.\n\nExperiment\
    \ 1\n•\nRinse a burette with distilled water and then with solution C.\n•\nFill\
    \ the burette with solution C. Run some of solution C out of the burette so that\
    \ the level of\nthe solution is on the burette scale.\n•\nRecord the initial burette\
    \ reading.\n•\nUse a measuring cylinder to pour 25 cm3 of solution B into a conical\
    \ flask.\n•\nAdd five drops of methyl orange indicator and five drops of thymolphthalein\
    \ indicator to the\nconical flask.\n•\nStand the conical flask on a white tile.\n\
    •\nSlowly add solution C from the burette to the conical flask, while swirling\
    \ the flask, until the\nsolution changes colour from red to orange. This is the\
    \ first end-point.\n•\nRecord the burette reading at the first end-point.\n•\n\
    Continue to add solution C from the burette to the conical flask while swirling\
    \ the flask. The\nsolution changes colour from orange to yellow.\n•\nContinue\
    \ to add solution C, while swirling the flask, until the solution changes colour\
    \ from\nyellow to green. This is the second end-point.\n•\nRecord the burette\
    \ reading at the second end-point.\n\nExperiment 2\n•\nEmpty the conical flask\
    \ and rinse it with distilled water.\n•\nRepeat Experiment 1 using solution D\
    \ instead of solution C.\n,\t,\n\n(a) Use the burette diagrams in Fig. 2.1 and\
    \ Fig. 2.2 to record the readings for Experiment 1 and\nExperiment 2 in Table\
    \ 2.1. Complete Table 2.1.\n1\n2\ninitial burette reading\nburette reading at\n\
    first end-point\nburette reading at\nsecond end-point\n3\n20\n21\n22\n40\n41\n\
    42\nExperiment 1\nFig. 2.1\n0\n1\ninitial burette reading\nburette reading at\n\
    first end-point\nburette reading at\nsecond end-point\n2\n10\n11\n12\n20\n21\n\
    22\nExperiment 2\nFig. 2.2\nTable 2.1\nExperiment 1\nusing solution C\nExperiment\
    \ 2\nusing solution D\nburette reading at first end-point / cm3\nburette reading\
    \ at second end-point / cm3\ninitial burette reading / cm3\nvolume added from\
    \ burette to reach\nfirst end-point / cm3\ntotal volume added from burette to\
    \ reach\nsecond end-point / cm3\n\n[5]\n,\t,\n\n(b) (i) Explain why the conical\
    \ flask is rinsed with distilled water at the start of Experiment 2 [1]\n\n(ii)\
    \ At the start of Experiment 1, the burette is rinsed with distilled water and\
    \ then with\nsolution C.\n\n Explain how the volume added from the burette to\
    \ reach the first end-point would be\ndifferent if the burette was not rinsed\
    \ with solution C [2]\n\n(iii) Explain why the conical flask is placed on a white\
    \ tile during the titration [1]\n\n(c) Compare the concentration of solution C\
    \ used in Experiment 1 with the concentration of\nsolution D used in Experiment\
    \ 2.\n\nExplain your answer [3]\n\n(d) (i) Deduce the volume of solution C required\
    \ to reach the first end-point if Experiment 1 is\nrepeated using 50 cm3 of solution\
    \ B instead of 25 cm3.\n\nvolume of solution C =  [2]\n\n(ii) State why using\
    \ 50 cm3 of solution B would cause a problem when finding the volume of\nsolution\
    \ C needed to reach the second end-point in Experiment 1 [1]\n,\t,\n\n(e) A student\
    \ repeats Experiment 2.\n\nThe student warms solution B in the conical flask before\
    \ carrying out the titration.\n\nState the effect, if any, on the volume of solution\
    \ D required to reach the second end-point in\nExperiment 2.\n\nExplain your answer.\n\
    effect on volume of solution D   explanation   [2]\n\n(f) State one change to\
    \ the apparatus that will improve the accuracy of the results [1]\n\n[Total: 18]\n\
    ,\t\t,"
