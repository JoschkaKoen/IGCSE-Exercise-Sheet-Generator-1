  text: "3\nA student tests two solids: solid E and solid F.\n\nTests on solid E\n\
    \nSolid E is ammonium sulfate.\n\nRecord the expected observations.\n\nThe student\
    \ dissolves solid E in distilled water to form solution E. The student divides\
    \ solution E\ninto three approximately equal portions.\n\n(a) (i) To the first\
    \ portion of solution E, the student adds about 2 cm3 of aqueous\nsodium hydroxide.\
    \ The student warms the mixture gently and tests any gas produced.\nobservations\
    \   [1]\n\n(ii) Identify the gas given off in (a)(i) [1]\n\n(b) To the second\
    \ portion of solution E, the student adds about 1 cm3 of dilute nitric acid followed\n\
    by a few drops of aqueous barium nitrate.\nobservations   [1]\n\n(c) To the third\
    \ portion of solution E, the student adds a few drops of acidified aqueous\npotassium\
    \ manganate(VII).\nobservations   [1]\n,\n,\nTests on solid F\nTable 3.1 shows\
    \ the tests and the student’s observations for solid F.\nTable 3.1\ntests\nobservations\n\
    test 1\nCarry out a flame test on solid F.\nyellow flame\ntest 2\nDissolve the\
    \ remaining solid F in distilled water\nto form solution F. Divide solution F\
    \ into three\nportions.\nTo the first portion of solution F, add about 1 cm3\n\
    of dilute nitric acid followed by a few drops of\naqueous silver nitrate.\nyellow\
    \ precipitate forms\ntest 3\nTo the second portion of solution F, add aqueous\n\
    sodium hydroxide dropwise until in excess.\nwhite precipitate forms\nthe precipitate\
    \ dissolves in excess\naqueous sodium hydroxide to form a\ncolourless solution\n\
    test 4\nTo the third portion of solution F, add aqueous\nammonia dropwise until\
    \ in excess.\nwhite precipitate forms\nthe precipitate dissolves in excess\naqueous\
    \ ammonia to form a colourless solution\n\n(d) Identify the three ions in solid\
    \ F [3]\n\n[Total: 7]\n,\t,"
