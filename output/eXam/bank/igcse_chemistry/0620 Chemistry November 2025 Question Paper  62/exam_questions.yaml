  text: "1\nEggshells are made from a mixture of calcium carbonate and other insoluble\
    \ substances.\n\nCalcium carbonate reacts with dilute hydrochloric acid. The equation\
    \ for the reaction is shown.\nCaCO3(s)  +  2HCl (aq)\n  CaCl 2(aq)  +  H2O(l)\
    \  +  CO2(g)\n\nThe other substances in eggshells do not react with dilute hydrochloric\
    \ acid.\n\nA student finds the percentage by mass of calcium carbonate in an eggshell.\n\
    \nFig. 1.1 shows the first three steps of the method the student uses.\nstep 1\n\
    Grind the eggshell\ninto small pieces.\nstep 2\nFind the mass of the\nsmall pieces\
    \ of eggshell.\nstep 3\nAdd the small pieces of eggshell to\nexcess dilute hydrochloric\
    \ acid and\nwarm the mixture while stirring it\nwith a glass rod.\nsmall pieces\n\
    of eggshell\nsmall pieces\nof eggshell\nbalance\npestle\nmortar\neggshell\ndilute\n\
    hydrochloric\nacid\nconical\nflask\nglass rod\nFig. 1.1\n\n(a) (i) Describe what\
    \ is seen when the calcium carbonate in the eggshell reacts with dilute\nhydrochloric\
    \ acid [1]\n\n(ii) Describe what the student should do to make sure the acid is\
    \ in excess and all of the\ncalcium carbonate has reacted [2]\n,\t,\n\n(b) After\
    \ step 3, the student filters the mixture to obtain the unreacted solid left from\
    \ the eggshell.\n\n(i) Draw a labelled diagram of the apparatus the student should\
    \ use to filter the mixture.\n\n[2]\n\n(ii) After the filtration, the student\
    \ washes the residue.\n\n Identify the two substances removed from the residue\
    \ by washing.\nsubstance 1   substance 2   [2]\n\n(iii) After washing the residue,\
    \ the student dries the residue in an oven.\n\n The student then measures the\
    \ mass of the dry residue.\n\n The masses the student records are shown in Table\
    \ 1.1.\nTable 1.1\nmass of small pieces of eggshell / g\n2.00\nmass of dry residue\
    \ after filtration / g\n0.11\n\n Use the data in Table 1.1 to calculate the percentage\
    \ by mass of calcium carbonate in\nthe eggshell.\n\npercentage of calcium carbonate\
    \ =   [2]\n\n[Total: 9]\n,\t,"
