  text: "3\nThis question is about copper and compounds of copper.\n\n(a) (i) Describe\
    \ the bonding in a metallic element such as copper [3]\n\n(ii) Explain how solid\
    \ copper conducts electricity [1]\n\n(b) Copper is in alloys such as brass.\n\n\
    (i) State one reason why alloys are more useful than pure metals [1]\n\n(ii) Name\
    \ the substance that is present in brass, other than copper [1]\n\n(c) Copper(II)\
    \ sulfate crystals are made by the reaction between copper(II) carbonate and dilute\n\
    sulfuric acid, using the following steps.\n\nThe sulfuric acid has a concentration\
    \ of 0.100 mol / dm3.\n\nstep 1\n Powdered copper(II) carbonate is added to dilute\
    \ sulfuric acid. The mixture is\nstirred. A reaction occurs.\n\nstep 2\nMore copper(II)\
    \ carbonate is added, with stirring, until the reaction stops.\n\nstep 3\n Unreacted\
    \ copper(II) carbonate is separated from aqueous copper(II) sulfate by\nfiltration.\n\
    \nstep 4\nAqueous copper(II) sulfate is heated until some of the water evaporates.\n\
    \nstep 5\nThe remaining solution is allowed to cool and crystallise.\n\nstep 6\n\
    The crystals are removed and dried.\n\n(i) Give two observations in step 1.\n\
    1   2   [2]\n,\t,\n\n(ii) State why the reaction stops in step 2 [1]\n\n(iii)\
    \ Name the residue in step 3 [1]\n\n(iv) Name a substance, other than copper(II)\
    \ carbonate, that can be added to dilute sulfuric\nacid to produce aqueous copper(II)\
    \ sulfate [1]\n\n(v) The solution at the end of step 4 contains the maximum amount\
    \ of copper(II) sulfate\nthat will dissolve at that temperature.\n\n State the\
    \ term used to describe this type of solution [1]\n\n(vi) Step 1 is repeated using\
    \ sulfuric acid of concentration 0.200 mol / dm3 instead of\n0.100 mol / dm3.\n\
    \n All other conditions are the same.\n\n The rate of reaction increases.\n\n\
    \ Explain why the rate of reaction increases. Give your answer in terms of particles\
    \ [2]\n\n(vii) Copper(II) sulfate crystals have the formula CuSO4•5H2O.\n\n State\
    \ the term used to describe a substance that is chemically combined with water\
    \ [1]\n\n[Total: 15]\n,\t,"
