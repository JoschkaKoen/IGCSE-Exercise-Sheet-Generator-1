    \ by reacting nitrogen with hydrogen, H2, in the Haber process.\n\n(i) State three\
    \ typical conditions for the reaction between nitrogen and hydrogen in the\nHaber\
    \ process.\n1   2   3   [3]\n\n(ii) Write the symbol equation for the chemical\
    \ reaction in the Haber process [1]\n\n(c) Ammonia is converted into nitric acid\
    \ in a two-step process.\n\nIn step 1, ammonia and oxygen are passed over a catalyst.\n\
    \n(i) Balance the symbol equation for this reaction.\n4NH3 + …..O2\n …..NO + .….H2O\n\
    \n[1]\n\n(ii) Give the oxidation number of nitrogen in:\n•\nNH3  •\nNO [2]\n,\t\
    \t,\n\n(iii) Define oxidation in terms of oxidation number [1]\n\n(iv) In step\
