    \ (a) to obtain solution H as the filtrate.\n\nThe student divides solution H\
    \ into three approximately equal portions in three test-tubes.\n\n(i) To the first\
    \ portion of solution H, the student adds about 1 cm depth of dilute nitric acid\n\
    followed by a few drops of aqueous barium nitrate.\nobservations   [1]\n\n(ii)\
    \ To the second portion of solution H, the student adds aqueous sodium hydroxide\n\
    dropwise and then in excess.\nobservations when added dropwise   observations\
