  text: "1\nA student prepares some crystals of pure potassium sulfate by reacting\
    \ aqueous potassium\ncarbonate with dilute sulfuric acid. The equation for the\
    \ reaction is shown.\nK2CO3(aq) + H2SO4(aq)\n K2SO4(aq) + H2O(l) + CO2(g)\n\n\
    The student:\n•\nplaces 25.0 cm3 of aqueous potassium carbonate in a conical flask\n\
    •\nadds a few drops of a suitable indicator to the conical flask\n•\nuses a burette\
    \ to add dilute sulfuric acid to the conical flask until the end-point is reached\
    \ and\nthe indicator changes colour.\n\nTable 1.1 shows the burette readings the\
    \ student obtains.\nTable 1.1\nfinal burette reading / cm3\n18.8\ninitial burette\
    \ reading / cm3\n 4.2\nvolume of dilute sulfuric acid added / cm3\n\n(a) Complete\
    \ Table 1.1 by calculating the volume of dilute sulfuric acid added to the conical\
    \ flask.\n\n[1]\n\n(b) State which solution, aqueous potassium carbonate or dilute\
    \ sulfuric acid, is the least\nconcentrated. Give a reason for your answer.\n\
    least concentrated solution   reason   [1]\n\n(c) Name a piece of apparatus suitable\
    \ for measuring the 25.0 cm3 of aqueous potassium\ncarbonate [1]\n\n(d) Name a\
    \ suitable indicator and give the colour change of this indicator at the end-point.\n\
    indicator   colour change at end-point  to  [2]\n\n(e) As the student added the\
    \ dilute sulfuric acid to the aqueous potassium carbonate they looked\nfor a colour\
    \ change.\n\nState what the student should do as they add the dilute sulfuric\
