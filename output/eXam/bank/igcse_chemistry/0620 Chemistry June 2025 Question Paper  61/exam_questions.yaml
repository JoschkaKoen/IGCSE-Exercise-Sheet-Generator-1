    \ on Fig. 2.1 how you worked out your answer.\n\ntime for magnesium to disappear\
    \ =  s [2]\n\n(d) The mean rate of reaction is calculated using the equation shown.\n\
    mean rate of reaction =\nlength of magnesium ribbon in cm\ntime for magnesium\
    \ to disappear in s\n\nThe length of each coil of magnesium ribbon used in all\
    \ five experiments was 5 cm.\n\n(i) Calculate the mean rate of reaction in Experiment\
    \ 1. Give units for the rate you have\ncalculated.\n\nmean rate of reaction =\
    \  units  [2]\n\n(ii) Deduce in which Experiment, 1, 2, 3, 4 or 5, the mean rate\
    \ of reaction is the slowest [1]\n,\t,\n\n(e) Explain why repeating each experiment\
    \ is an improvement [1]\n\n(f) The student does another experiment to find the\
    \ temperature change when magnesium\nreacts with acid A.\n•\nUse the measuring\
    \ cylinder to pour 30 cm3 of acid A into the 100 cm3 conical flask.\n•\nMeasure\
