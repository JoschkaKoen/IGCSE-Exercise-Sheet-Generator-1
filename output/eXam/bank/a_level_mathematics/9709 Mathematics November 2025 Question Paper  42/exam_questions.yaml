  text: A railway locomotive of mass 240000 kg is towing a coach of mass 36000 kg
    down a hill inclined at an angle of $\sin^{-1} 0.04$ to the horizontal. The driving
    force produced by the locomotive is 450000 N and there are resistances to motion
    of 120000 N on the locomotive and 15000 N on the coach. The coupling between the
    locomotive and the coach is light, rigid and parallel to the hill. Find the acceleration
    of the locomotive and the tension in the coupling.
