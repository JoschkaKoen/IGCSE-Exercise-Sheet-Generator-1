  text: A block of mass 5 kg is being pulled straight down a line of greatest slope
    of a rough plane by a force of magnitude 20 N. The plane is inclined at an angle
    of $10\degree$ to the horizontal and the 20 N force acts at an angle of $35\degree$
    above the line of greatest slope of the plane (see diagram). The coefficient of
    friction between the block and the plane is 0.4. The speed of the block when it
    passes a point $O$ is $2\text{ m s}^{-1}$. Find the speed of the block when it
    has moved 3 m down the plane from $O$.
