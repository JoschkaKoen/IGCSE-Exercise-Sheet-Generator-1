  text: The diagram shows the displacement-time graph for the motion of a particle.
    The particle starts from rest at a point $O$ and travels with constant acceleration
    $a\text{ m s}^{-2}$, taking 4 s to move a distance of $x$ m. The particle then
    returns to $O$ with constant speed of $40\text{ m s}^{-1}$, over a period of 2
    s. Find the value of $x$ and the value of $a$.
  answer_options: []
  subquestions: []
