  mark_scheme: []
  graphics: []
- number: '6'
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: '$a = 0$ when $2(t+1)^{-1/2} = 1 \Rightarrow t = 3$. $v = \int
    a\,dt = 4(t+1)^{1/2} - t - 4$ (with $v(0)=0$); $s = \int v\,dt = \tfrac83(t+1)^{3/2}
    - \tfrac12 t^2 - 4t - \tfrac83$ (with $s(0)=0$). At $t=3$: $s = \tfrac{13}{6}
    \approx 2.17$ m.'
  mark_scheme: []
  graphics: []
- number: 7a
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Resolving (right/up positive): $\sum F_x = -20\cos20\degree
    + 30\cos30\degree + 15\cos45\degree \approx 17.8$ N; $\sum F_y = 20\sin20\degree
    + 30\sin30\degree - 15\sin45\degree - 25 \approx -13.8$ N. $S = \sqrt{17.8^2 +
    13.8^2} \approx 22.5$ N; $\alpha = \tan^{-1}\!\frac{13.8}{17.8} \approx 37.7\degree$
    below the horizontal.'
  mark_scheme: []
  graphics: []
- number: 7b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: Along the wire the driving component is $\sum F_x \approx 17.8$
    N; the wire's vertical reaction is $|\sum F_y| + 0.6g \approx 13.8 + 6 = 19.8$
    N. $s = \tfrac12 at^2 \Rightarrow 2 = \tfrac12 a(9) \Rightarrow a = \tfrac49$.
    Then $17.8 - \mu(19.8) = 0.6\cdot\tfrac49 \Rightarrow \mu \approx 0.887$.
  mark_scheme: []
  graphics: []
