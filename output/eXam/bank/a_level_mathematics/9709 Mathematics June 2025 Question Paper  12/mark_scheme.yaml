- number: 9a
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: '$\dfrac{dy}{dx} = \int -24x^{-3}\,dx = 12x^{-2} + c$. Stationary
    at $x=-2$: $\tfrac{12}{4}+c=0 \Rightarrow c=-3$. So $\dfrac{dy}{dx} = \dfrac{12}{x^2}
    - 3$.'
  mark_scheme: []
  graphics: []
- number: 9b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: $\dfrac{12}{x^2}-3=0 \Rightarrow x^2=4 \Rightarrow x=2$. Since
    $\dfrac{d^2y}{dx^2} = -\dfrac{24}{2^3} = -3 < 0$, it is a maximum.
  mark_scheme: []
  graphics: []
- number: 9c
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: '$y = \int\left(12x^{-2}-3\right)dx = -12x^{-1} - 3x + d$. Through
    $(-2,19)$: $19 = 6 + 6 + d \Rightarrow d = 7$. So $y = -\dfrac{12}{x} - 3x + 7$.'
  mark_scheme: []
  graphics: []
- number: 9d
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: $\dfrac{12}{x^2}-3 = -\dfrac94 \Rightarrow x^2 = 16 \Rightarrow
    x = 4$ (positive), $y=-8$. Gradient of normal $=\tfrac49$. $\dfrac{y+8}{x-4}=\tfrac49
    \Rightarrow 4x - 9y - 88 = 0$.
  mark_scheme: []
  graphics: []
