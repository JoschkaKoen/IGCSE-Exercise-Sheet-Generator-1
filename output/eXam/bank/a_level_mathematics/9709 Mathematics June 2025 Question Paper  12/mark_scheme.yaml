- number: '2'
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Eliminate a variable to get $4y^2 - 4y = 24$ (or $16x^2 + 72x
    + 56 = 0$). Points of intersection: $(-1,\,-2)$ and $\left(-\tfrac{7}{2},\,3\right)$.'
  mark_scheme: []
  graphics: []
- number: '3'
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'The $x^7$ term ($r=3$) is $\binom{5}{3}(px^2)^2\left(\tfrac{4}{p}x\right)^3
    = \dfrac{640x^7}{p}$. So $\dfrac{640}{p} = 1280 \Rightarrow p = \tfrac{1}{2}$.
    (SC B1: $p=4$.)'
  mark_scheme: []
  graphics: []
- number: 4a
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: $\dfrac{dy}{dx} = \tfrac{3}{2}ax^{1/2} - 12$. Then $\dfrac{dy}{dt}
    = \dfrac{dy}{dx}\cdot\dfrac{dx}{dt} = \left(\tfrac{3}{2}a\cdot 3 - 12\right)\times
    5 = \dfrac{45a}{2} - 60 = \tfrac{15}{2}(3a-8)$.
  mark_scheme: []
  graphics: []
- number: 4b
  question_type: calculation
