  mark_scheme_answer: 'At the minimum $\dfrac{dy}{dx}=0$ at $x=\tfrac14$: $\tfrac{3}{2}a\left(\tfrac14\right)^{1/2}
    - 12 = 0 \Rightarrow a = 16$.'
  mark_scheme: []
  graphics: []
