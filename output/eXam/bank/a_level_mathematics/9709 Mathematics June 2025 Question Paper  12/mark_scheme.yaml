- number: '6'
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: $6-3x=3 \Rightarrow$ $P$ has $x$-coordinate $1$. Area under
    curve $= \int_0^1 9(5x+4)^{-1/2}\,dx = \left[\tfrac{18}{5}(5x+4)^{1/2}\right]_0^1
    = \tfrac{18}{5}$. The line meets the $x$-axis at $x=2$, giving a triangle of area
    $\tfrac12\times1\times3 = \tfrac32$. Total shaded area $= \tfrac{18}{5} + \tfrac32
    = \tfrac{51}{10}$.
  mark_scheme: []
  graphics: []
- number: 7a
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Multiply numerator and denominator of $\dfrac{\tan\theta+7}{\tan^2\theta-3}$
    by $\cos^2\theta$ (using $\tan\theta=\tfrac{\sin\theta}{\cos\theta}$): numerator
    $\to \sin\theta\cos\theta + 7\cos^2\theta$; denominator $\to \sin^2\theta - 3\cos^2\theta
    = (1-\cos^2\theta) - 3\cos^2\theta = 1 - 4\cos^2\theta$. AG.'
  mark_scheme: []
  graphics: []
- number: 7b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Using part (a): $\tan\theta(\tan\theta+7) = 5(\tan^2\theta-3)
    \Rightarrow 4\tan^2\theta - 7\tan\theta - 15 = 0 \Rightarrow (4\tan\theta+5)(\tan\theta-3)=0$,
    so $\tan\theta = -1.25$ or $3$. Hence $\theta = 71.6\degree$ and $\theta = 128.7\degree$.'
  mark_scheme: []
  graphics: []
