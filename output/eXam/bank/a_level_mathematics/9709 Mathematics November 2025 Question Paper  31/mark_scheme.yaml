  mark_scheme_answer: On $0 < x < \tfrac12\pi$, $y = \sec 2x$ goes to $-\infty$ then
    up to $-1$ on $(\tfrac\pi4, \tfrac\pi2)$, while $y = -e^x$ is negative and decreasing;
