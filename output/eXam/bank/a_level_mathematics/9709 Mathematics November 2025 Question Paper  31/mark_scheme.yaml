- number: '7'
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: $\dfrac{dy}{dt} = \dfrac{1}{(2t+1)^2}$, $\dfrac{dx}{dt} = 2t
    - \dfrac{2}{2t+1} = \dfrac{2(2t-1)(t+1)}{2t+1}$. So $\dfrac{dy}{dx} = \dfrac{1}{2(2t+1)(2t-1)(t+1)}
    = \dfrac{1}{2(t+1)(4t^2-1)}$.
  mark_scheme: []
  graphics: []
- number: '8'
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Separating: $-\tfrac12 e^{-2y} = \tfrac{k}{2}\ln(x^2+1) + C$.
    Using $(0,0)$: $C = -\tfrac12$; using $(1,-\tfrac12)$: $k = \dfrac{1-e}{\ln 2}$.
    At $x = \sqrt3$ ($\ln 4 = 2\ln 2$): $-\tfrac12 e^{-2y} = (1-e) - \tfrac12 \Rightarrow
    e^{-2y} = 2e - 1$, so $y = -\tfrac12\ln(2e - 1)$.'
  mark_scheme: []
  graphics: []
- number: 9a
