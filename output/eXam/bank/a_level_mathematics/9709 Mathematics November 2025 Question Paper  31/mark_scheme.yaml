  mark_scheme_answer: $3\sqrt2\sin(x+45\degree) = 3(\sin x + \cos x)$, so the expression
    $= 3\sin x + 4\cos x = R\cos(x-\alpha)$ with $R = 5$ and $\tan\alpha = \tfrac34
    \Rightarrow \alpha = 36.9\degree$. So $5\cos(x - 36.9\degree)$.
  mark_scheme: []
  graphics: []
