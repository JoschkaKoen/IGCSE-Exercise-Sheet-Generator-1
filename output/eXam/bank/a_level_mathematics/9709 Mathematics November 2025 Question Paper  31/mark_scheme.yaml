- number: '4'
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: $\dfrac{dy}{dx} = e^{\sin 2x}(2\cos 2x\cos 4x - 4\sin 4x) =
    0 \Rightarrow \cos 4x = 4\sin 2x \Rightarrow 2\sin^2 2x + 4\sin 2x - 1 = 0 \Rightarrow
    \sin 2x = \tfrac{\sqrt6 - 2}{2}$. So $x = \tfrac12\sin^{-1}\!\tfrac{\sqrt6-2}{2}
    \approx 0.113$.
  mark_scheme: []
  graphics: []
- number: 5a
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: The circle has centre $1 - 2i$ and radius $2$, and the line
    is $\operatorname{Re}(z) = 2$. The region is $|z - 1 + 2i| \leqslant 2$ and $\operatorname{Re}(z)
    \geqslant 2$.
  mark_scheme: []
  graphics: []
- number: 5b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: The least (most negative) $\arg z$ occurs at the corner where
    $\operatorname{Re}(z) = 2$ meets the lower circle, $z = 2 - (2+\sqrt3)i$. $\arg
    z = -\tan^{-1}\!\dfrac{2+\sqrt3}{2} \approx -1.08$ rad ($-61.8\degree$).
  mark_scheme: []
  graphics: []
