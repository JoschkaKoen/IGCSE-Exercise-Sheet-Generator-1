  mark_scheme_answer: $9x^2 - 38x - 15 = 0 \Rightarrow x = \dfrac{19 \pm 4\sqrt{31}}{9}$.
    Only $x = \dfrac{19 + 4\sqrt{31}}{9} \approx 4.59$ is valid (need $3x - 1 > 0$).
  mark_scheme: []
