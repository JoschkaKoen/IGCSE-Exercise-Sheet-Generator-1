  mark_scheme_answer: If $x_{n+1} = \tfrac12\cos^{-1}(-e^{-x_n}) \to L$, then $\cos
    2L = -e^{-L}$, so $\sec 2L = -e^{L}$ — i.e. $L$ satisfies $\sec 2x = -e^x$.
  mark_scheme: []
