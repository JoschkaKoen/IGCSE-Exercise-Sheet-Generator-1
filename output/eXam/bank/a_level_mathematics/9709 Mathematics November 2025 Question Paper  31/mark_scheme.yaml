questions:
- number: '1'
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'By parts: $\int \ln 3x\,dx = x\ln 3x - x$. So $\int_1^2 \ln
    3x\,dx = (2\ln 6 - 2) - (\ln 3 - 1) = 2\ln 6 - \ln 3 - 1 = \ln 12 - 1 = -1 + \ln
    12$.'
  mark_scheme: []
  graphics: []
- number: 2a
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: $2\log_4(3x-1) - 2 = \log_4\dfrac{(3x-1)^2}{16}$, so $2x+1 =
    \dfrac{(3x-1)^2}{16} \Rightarrow 16(2x+1) = (3x-1)^2 \Rightarrow 9x^2 - 38x -
    15 = 0$.
  mark_scheme: []
  graphics: []
- number: 2b
