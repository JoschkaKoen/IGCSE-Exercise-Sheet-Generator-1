  text: A manufacturer of cell phones claims that 25% of students own a Pumpkin phone.
    Jeyeraj thinks that the proportion of students at his large college who own a
    Pumpkin phone is less than 25%. He plans to test the manufacturer's claim. He
    chooses a random sample of 30 students at his college. If the number of students
    who own a Pumpkin phone is less than 5, Jeyeraj will reject the manufacturer's
    claim.
  answer_options: []
  subquestions:
