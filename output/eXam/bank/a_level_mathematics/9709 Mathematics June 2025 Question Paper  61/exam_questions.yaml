    question_type: short_answer
    page: 8
    subpage_row: 1
    subpage_col: 1
    marks: 1
    text: State suitable hypotheses for the test.
    answer_options: []
    subquestions: []
  - number: 6b
    question_type: calculation
    page: 8
    subpage_row: 1
    subpage_col: 1
    marks: 3
    text: Given that the true proportion of students at the college who own a Pumpkin
      phone is 10%, use a binomial distribution to find the probability of a Type
      II error.
    answer_options: []
    subquestions: []
  - number: 6c
    question_type: calculation
    page: 9
    subpage_row: 1
    subpage_col: 1
    marks: 3
    text: At Florence's college, in a random sample of 40 students, it was found that
      5 own a Pumpkin phone. Calculate an approximate 95% confidence interval for
      the proportion of students at Florence's college who own a Pumpkin phone.
    answer_options: []
    subquestions: []
