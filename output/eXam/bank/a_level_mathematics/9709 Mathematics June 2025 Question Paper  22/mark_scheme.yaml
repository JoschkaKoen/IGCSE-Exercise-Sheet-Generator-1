  mark_scheme_answer: 'Put $y = e^{-1}$ ($\ln y = -1$): $-(x^2-3) + 6x = 14 \Rightarrow
    x^2 - 6x + 11 = 0$; discriminant $36 - 44 = -8 < 0$, so there is no real $x$ —
    no such point (AG).'
  mark_scheme: []
