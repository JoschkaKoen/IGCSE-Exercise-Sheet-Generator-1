  mark_scheme_answer: 'Implicit differentiation: $2x\ln y + \dfrac{x^2-3}{y}\dfrac{dy}{dx}
    + 6 = 0$. At $(2, e^2)$: $8 + \dfrac{1}{e^2}\dfrac{dy}{dx} + 6 = 0 \Rightarrow
    \dfrac{dy}{dx} = -14e^2$. Tangent: $y = -14e^2 x + 29e^2$.'
  mark_scheme: []
