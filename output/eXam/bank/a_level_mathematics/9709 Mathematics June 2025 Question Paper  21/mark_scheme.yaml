  mark_scheme_answer: $\dfrac{dx}{dt} = \dfrac{5}{(3t+4)^2}$, $\dfrac{dy}{dt} = \dfrac{6}{3t+4}$,
    so $\dfrac{dy}{dx} = \dfrac{6}{3t+4}\cdot\dfrac{(3t+4)^2}{5} = \tfrac65(3t+4)$;
    $c = \tfrac65$.
  mark_scheme: []
  graphics: []
- number: 6b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: $2\ln(3t+4) = \ln 100 \Rightarrow 3t+4 = 10 \Rightarrow t =
    2$; then $a = \dfrac{2(2)+1}{3(2)+4} = \tfrac12$ and $m = \tfrac65(10) = 12$.
  mark_scheme: []
  graphics: []
