  mark_scheme_answer: $p(x) = 2x^3 + 9x^2 - 2x - 24 = (2x-3)(x^2+6x+8) = (2x-3)(x+2)(x+4)$.
  mark_scheme: []
  graphics: []
- number: 5c
  question_type: calculation
