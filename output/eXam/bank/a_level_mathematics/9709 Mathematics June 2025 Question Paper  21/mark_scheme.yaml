- number: 3a
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: $y = 3e^{-2x}$ is a decreasing positive curve through $(0,3)$;
    $y = \sec x$ rises from $(0,1)$ to $+\infty$ as $x \to \tfrac12\pi$. They meet
    once.
  mark_scheme: []
  graphics: []
- number: 3b
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: At intersection $3e^{-2x} = \sec x \Rightarrow e^{2x} = 3\cos
    x \Rightarrow 2x = \ln(3\cos x) \Rightarrow x = \tfrac12\ln(3\cos x)$ (AG).
  mark_scheme: []
  graphics: []
- number: 3c
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: Iterating $x_{n+1} = \tfrac12\ln(3\cos x_n)$ (radian mode) converges
    to $x = 0.487$ (3 d.p.).
  mark_scheme: []
  graphics: []
