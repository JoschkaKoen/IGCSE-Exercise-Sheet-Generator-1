  mark_scheme: []
  graphics: []
- number: 4b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: Curve meets $x$-axis at $x = \ln 6$. Area $= \int_0^{\ln 6}\!\big(6e^{2x}-e^{3x}\big)\,dx
    = \big[3e^{2x} - \tfrac13 e^{3x}\big]_0^{\ln 6} = \dfrac{100}{3}$.
  mark_scheme: []
  graphics: []
- number: 5a
