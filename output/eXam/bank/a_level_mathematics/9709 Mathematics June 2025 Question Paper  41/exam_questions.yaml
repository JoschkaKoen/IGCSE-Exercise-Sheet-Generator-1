  text: Two particles, $P$ and $Q$, of masses 0.3 kg and 0.6 kg respectively, are
    attached to the ends of a light inextensible string. The string passes over a
    smooth pulley fixed at a point $B$ where the inclined planes $AB$ and $BC$ meet.
    $P$ lies on the smooth plane $AB$ which is inclined at an angle $\theta\degree$
    to the horizontal where $\sin\theta\degree = 0.4$. $Q$ lies on the plane $BC$
    which is inclined at $30\degree$ to the horizontal. The string is taut and the
    particles can move on lines of greatest slope of the two planes (see diagram).
    The particles are released from rest.
