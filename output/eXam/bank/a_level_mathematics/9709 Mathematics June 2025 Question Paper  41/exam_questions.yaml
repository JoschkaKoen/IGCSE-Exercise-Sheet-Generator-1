      and the acceleration of $Q$.
    answer_options: []
    subquestions: []
  - number: 6b
    question_type: calculation
    page: 9
    subpage_row: 1
    subpage_col: 1
    marks: 4
    text: It is given instead that the plane $BC$ is rough. The work done against
