- number: '8'
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Separating variables: $\tfrac14\ln(4x+3) = \tfrac12\ln(\sin
    2\theta) + C$. Using $x = 0$ at $\theta = \tfrac{\pi}{12}$ gives $4x + 3 = 12\sin^2
    2\theta$, i.e. $x = 3\sin^2 2\theta - \tfrac34 = \tfrac34 - \tfrac32\cos 4\theta$.'
  mark_scheme: []
  graphics: []
