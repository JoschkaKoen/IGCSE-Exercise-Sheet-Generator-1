- number: '3'
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: Shade the intersection of the disc $|z - 3i| \leqslant 2$ (centre
    $(0,3)$, radius 2) with the wedge from $(1,2)$ where $\arg(z-1-2i)$ lies between
    $\tfrac14\pi$ and $\tfrac34\pi$ (region between the two half-lines of gradient
    $\pm 1$ from $(1,2)$, opening upward).
  mark_scheme: []
  graphics: []
- number: '4'
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Using $\cot 2x = \dfrac{\cot^2 x - 1}{2\cot x}$: $\cot^2 x
    - 3\cot x + 2 = 0 \Rightarrow \cot x = 1$ or $2 \Rightarrow \tan x = 1$ or $\tfrac12$.
    So $x = 45\degree$ and $x = 26.6\degree$.'
  mark_scheme: []
  graphics: []
- number: '5'
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: '$(x+iy)^2 = -1 - 4\sqrt5\,i \Rightarrow x^2 - y^2 = -1$ and
    $2xy = -4\sqrt5$. Eliminating $y$: $x^4 + x^2 - 20 = 0 \Rightarrow x^2 = 4$. The
    square roots are $2 - \sqrt5\,i$ and $-2 + \sqrt5\,i$.'
  mark_scheme: []
  graphics: []
- number: 6a
