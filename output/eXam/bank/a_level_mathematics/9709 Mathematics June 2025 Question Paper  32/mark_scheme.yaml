  mark_scheme_answer: $y = |x-2|$ is a V with vertex $(2,0)$; $y = 2\sin\tfrac12 x$
    rises from $O$ to $(\pi,2)$. The graphs meet exactly once in $0 < x < \pi$.
  mark_scheme: []
  graphics: []
