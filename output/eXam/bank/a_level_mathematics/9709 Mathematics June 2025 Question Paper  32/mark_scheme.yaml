- number: 11a
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: $y = \tfrac52\sin 2x + \tfrac54\sin 4x \Rightarrow \tfrac{dy}{dx}
    = 5\cos 2x + 5\cos 4x = 0 \Rightarrow 2\cos^2 2x + \cos 2x - 1 = 0 \Rightarrow
    \cos 2x = \tfrac12$. So $x = \tfrac{\pi}{6}$.
  mark_scheme: []
