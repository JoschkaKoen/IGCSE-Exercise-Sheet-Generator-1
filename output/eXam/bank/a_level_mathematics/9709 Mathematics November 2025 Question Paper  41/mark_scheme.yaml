  mark_scheme_answer: '$A$ falls 0.75 m, $B$ rises $0.75\sin\theta = 0.45$ m. Energy:
    $mg(0.75) = 3g(0.45) + \tfrac{10}{3}(0.75) + \tfrac12(m+3)(2^2) \Rightarrow 7.5m
    = 22 + 2m \Rightarrow m = 4$.'
  mark_scheme: []
