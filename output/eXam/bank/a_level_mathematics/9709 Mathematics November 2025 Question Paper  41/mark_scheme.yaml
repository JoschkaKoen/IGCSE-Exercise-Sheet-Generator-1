  mark_scheme_answer: 'Down the smooth plane $a = g\sin\theta = 2$, so $A$ reaches
    the collision at $4\text{ m s}^{-1}$. Momentum (down +): $2.5(4) + 3(-3.5) = 2.5v_A''
    + 3(0.5) \Rightarrow v_A'' = -0.8$ (up). Then $0 = 0.8^2 - 2(2)s \Rightarrow s
    = 0.16$ m.'
