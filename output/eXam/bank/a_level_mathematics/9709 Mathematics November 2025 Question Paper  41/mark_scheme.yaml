- number: '5'
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Perpendicular: $R = mg\cos\theta + 8mg\sin\theta$. On the point
    of slipping down, $\mu R$ acts up: $0.5(\cos\theta + 8\sin\theta) = \sin\theta
    + 8\cos\theta \Rightarrow \tan\theta = 2.5 \Rightarrow \theta = 68.2\degree$.'
  mark_scheme: []
  graphics: []
- number: '6'
  question_type: calculation
  correct_answer: null
