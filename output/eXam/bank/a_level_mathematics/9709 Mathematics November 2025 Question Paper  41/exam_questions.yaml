  text: Two particles, $A$ and $B$, of masses $m$ kg and 3 kg respectively, are connected
    by a light inextensible string. Particle $B$ is on a fixed plane at an angle of
    $\sin^{-1} 0.6$ to the horizontal ground; the string passes over a smooth pulley
    at the top of the plane and $A$ hangs vertically, 0.75 m above the ground. The
    system is released from rest; $B$ moves up the plane (not reaching the pulley)
    against a constant resistance of $\tfrac{10}{3}$ N, and the speed of $A$ immediately
    before it hits the ground is $2\text{ m s}^{-1}$. Use an energy method to find
    the value of $m$.
  answer_options: []
  subquestions: []
