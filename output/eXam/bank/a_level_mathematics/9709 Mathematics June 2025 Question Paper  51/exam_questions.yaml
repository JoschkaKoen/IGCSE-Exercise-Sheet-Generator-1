    question_type: calculation
    page: 6
    subpage_row: 1
    subpage_col: 1
    marks: 4
    text: How many competitors would you expect to have times within 1.2 minutes of
      the mean time?
    answer_options: []
    subquestions: []
  - number: 4b
    question_type: calculation
    page: 6
    subpage_row: 1
    subpage_col: 1
    marks: 3
    text: In this Saturday's event, 60% of the competitors had times less than 36.0
      minutes. 9 competitors who took part are selected at random. Find the probability
      that at least 2 and fewer than 8 of these competitors had times less than 36.0
      minutes.
    answer_options: []
    subquestions: []
  - number: 4c
    question_type: calculation
    page: 7
    subpage_row: 1
    subpage_col: 1
    marks: 5
