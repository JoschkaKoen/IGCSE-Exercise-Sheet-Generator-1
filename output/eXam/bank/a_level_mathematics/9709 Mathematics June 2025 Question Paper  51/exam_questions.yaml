  text: Every Saturday, a particular community holds a 'Puzzle' event to raise money
    for a new Leisure Centre. Competitors attempt to solve a puzzle as quickly as
    possible. Last Saturday, 600 competitors took part. The times taken to complete
    the puzzle were normally distributed with mean 32.4 minutes and standard deviation
    2.5 minutes.
  answer_options: []
