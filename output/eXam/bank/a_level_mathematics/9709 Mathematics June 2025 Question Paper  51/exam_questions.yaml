  subpage_row: 1
  subpage_col: 1
  marks: 0
  text: 'Last Sunday, teams of runners took part in a charity event. The time taken,
    in seconds, to run 50 m was recorded, correct to 1 decimal place, for each runner.
    The times recorded for 11 runners from each of the Gulls and the Herons are shown
    in the table. Gulls: 7.9, 8.2, 8.3, 8.6, 8.6, 8.8, 9.2, 9.7, 9.8, 10.0, 10.4.
    Herons: 9.5, 9.9, 8.5, 8.1, 9.2, 10.8, 8.3, 9.7, 9.3, 9.9, 8.7.'
  answer_options: []
  subquestions:
  - number: 3a
    question_type: short_answer
    page: 4
    subpage_row: 1
    subpage_col: 1
    marks: 4
    text: Draw a back-to-back stem-and-leaf diagram to represent this information,
      with Gulls on the left-hand side.
    answer_options: []
    subquestions: []
  - number: 3b
    question_type: calculation
    page: 4
    subpage_row: 1
    subpage_col: 1
    marks: 3
    text: Find the median and the interquartile range of the times of the runners
      from the Gulls.
    answer_options: []
    subquestions: []
  - number: 3c
    question_type: calculation
    page: 5
    subpage_row: 1
    subpage_col: 1
    marks: 2
    text: Two other teams, the Eagles and the Swifts, also took part. The recorded
      times in seconds for 20 runners from the Eagles and 30 runners from the Swifts
      are denoted by $x$ and $y$ respectively. It is given that $\sum x = 175.0$ and
      that the mean of $y$ is 8.4. Find the mean of the times taken by all 50 runners.
    answer_options: []
    subquestions: []
  - number: 3d
    question_type: calculation
    page: 5
    subpage_row: 1
    subpage_col: 1
    marks: 3
    text: It is given that $\sum x^2 = 1823.0$. It is also known that the standard
      deviation of the times taken by all 50 runners is 1.38 seconds. Find the value
      of $\sum y^2$, correct to 1 decimal place.
    answer_options: []
    subquestions: []
