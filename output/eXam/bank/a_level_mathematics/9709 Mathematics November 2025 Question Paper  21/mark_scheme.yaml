- number: '4'
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'With $t = \tan\theta$ and $\tan(\theta+45\degree) = \tfrac{t+1}{1-t}$:
    $\tfrac1t\cdot\tfrac{t+1}{1-t} = 7 \Rightarrow 7t^2 - 6t + 1 = 0 \Rightarrow t
    = \tfrac{3\pm\sqrt2}{7}$. So $\theta = 12.8\degree$ or $32.2\degree$.'
  mark_scheme: []
