  mark_scheme_answer: $\dfrac{dx}{d\theta} = \sec^2\theta$, $\dfrac{dy}{d\theta} =
    \cos\theta(1 - 6\sin^2\theta)$, so $\dfrac{dy}{dx} = \cos^3\theta(1 - 6\sin^2\theta)
    = \cos^3\theta(6\cos^2\theta - 5) = 6\cos^5\theta - 5\cos^3\theta$.
  mark_scheme: []
