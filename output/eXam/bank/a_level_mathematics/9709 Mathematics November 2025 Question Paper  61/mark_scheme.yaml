- number: 4a
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Width $\propto z$-value: $\tfrac{z_\alpha}{z_{90}} = 1.414
    \Rightarrow z_\alpha = 1.414 \times 1.645 = 2.326$. $\Phi(2.326) = 0.99 \Rightarrow
    \tfrac{1 + \alpha/100}{2} = 0.99 \Rightarrow \alpha = 98$.'
  mark_scheme: []
  graphics: []
- number: 4b
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: The 90% interval lies inside the 98% interval (same centre),
    so $\{90\% \text{ contains } \mu\} \subset \{98\% \text{ contains } \mu\}$. Hence
    the probability $= \tfrac{0.90}{0.98} = 0.918$.
  mark_scheme: []
  graphics: []
