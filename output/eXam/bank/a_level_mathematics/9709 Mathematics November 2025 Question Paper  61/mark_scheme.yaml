  mark_scheme_answer: '$\bar{x} = 499.5$, $s^2 = \tfrac{1}{59}\!\left(14970300 - \tfrac{29970^2}{60}\right)
    = 4.831$. $H_0\!: \mu = 500$, $H_1\!: \mu \neq 500$. $z = \tfrac{499.5 - 500}{\sqrt{4.831/60}}
    = -1.76$; $|z| < 1.96$, so do not reject $H_0$ — no evidence the mean differs
    from 500 g.'
