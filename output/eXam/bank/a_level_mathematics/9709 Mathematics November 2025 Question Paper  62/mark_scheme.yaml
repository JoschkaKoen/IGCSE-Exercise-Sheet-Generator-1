- number: 6c
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Critical mean $\bar{x} = 736 - 2.054\cdot\dfrac{26}{\sqrt{35}}
    = 726.97$. With true mean 718: $P(\text{Type II}) = P(\bar{X} > 726.97) = P\!\left(Z
    > \dfrac{726.97 - 718}{26/\sqrt{35}}\right) = P(Z > 2.04) = 0.0206$.'
  mark_scheme: []
