- number: 5bii
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: $E(X) = \int_0^2 x\cdot\tfrac34(2x^2 - x^3)\,dx = 1.2$; $P(X
    \leqslant 1.2) = \tfrac34\!\left[\tfrac{2x^3}{3} - \tfrac{x^4}{4}\right]_0^{1.2}
    = 0.4752$. So $P(1.2 \leqslant X \leqslant m) = 0.5 - 0.4752 = 0.0248$.
  mark_scheme: []
  graphics: []
- number: 6a
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Assume the standard deviation is unchanged (26) and the distribution
    still normal. $H_0\!: \mu = 736$, $H_1\!: \mu < 736$. $z = \dfrac{725 - 736}{26/\sqrt{35}}
    = -2.50 < -2.054$, so reject $H_0$: there is evidence the mean weekly profit has
    decreased.'
  mark_scheme: []
  graphics: []
