  mark_scheme_answer: $\int_0^2 k(2x^2 - x^3)\,dx = k\left[\tfrac{2x^3}{3} - \tfrac{x^4}{4}\right]_0^2
    = k\cdot\tfrac43 = 1 \Rightarrow k = \tfrac34$. AG.
