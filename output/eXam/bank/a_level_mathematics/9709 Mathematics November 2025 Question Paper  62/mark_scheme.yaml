  mark_scheme_answer: 'Assume cups are flawed independently. $H_0\!: p = 0.18$, $H_1\!:
    p < 0.18$, $X \sim B(40, 0.18)$. $P(X \leqslant 3) = 0.0542 > 0.05$, so do not
    reject $H_0$ — insufficient evidence that the percentage is less than 18%.'
  mark_scheme: []
