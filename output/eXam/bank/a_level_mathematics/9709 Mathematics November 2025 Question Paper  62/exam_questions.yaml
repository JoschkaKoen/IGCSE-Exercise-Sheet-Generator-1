- number: '3'
  question_type: calculation
  page: 4
  subpage_row: 1
  subpage_col: 1
  marks: 0
  text: The times, in minutes, taken by students to complete a test have mean $\mu$
    and standard deviation $\sigma$. The times taken by a random sample of 100 students
    are noted and are used to calculate a 95% confidence interval for $\mu$.
  answer_options: []
  subquestions:
  - number: 3a
    question_type: calculation
    page: 4
    subpage_row: 1
    subpage_col: 1
    marks: 3
    text: Given that the end points of the 95% confidence interval are 31.02 and 33.98,
      correct to 4 significant figures, calculate the value of $\sigma$.
    answer_options: []
    subquestions: []
  - number: 3b
    question_type: short_answer
    page: 4
    subpage_row: 1
    subpage_col: 1
    marks: 1
    text: The calculation of the confidence interval required the use of the Central
      Limit theorem. Explain why it is valid to use the Central Limit theorem in this
      case.
    answer_options: []
    subquestions: []
  - number: 3c
    question_type: calculation
    page: 4
    subpage_row: 1
    subpage_col: 1
    marks: 4
    text: A researcher calculates a number, $r$, of 95% confidence intervals for $\mu$.
      Find the largest value of $r$ such that the probability that all $r$ confidence
      intervals contain the true value of $\mu$ is greater than 0.5.
    answer_options: []
    subquestions: []
