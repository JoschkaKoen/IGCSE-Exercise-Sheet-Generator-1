- number: 6a
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: $\int\left(\tfrac12 e^{2x} + \tfrac14 e^{-x}\right)dx = \tfrac14
    e^{2x} - \tfrac14 e^{-x}$. Evaluating $-2a$ to $a$ gives $\tfrac12 e^{2a} - \tfrac14
    e^{-a} - \tfrac14 e^{-4a} = 5 \Rightarrow e^{2a} = 10 + \tfrac12 e^{-a} + \tfrac12
    e^{-4a} \Rightarrow a = \tfrac12\ln(\cdots)$. AG.
  mark_scheme: []
  graphics: []
