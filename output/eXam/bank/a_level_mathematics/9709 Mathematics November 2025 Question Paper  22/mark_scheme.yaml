  mark_scheme_answer: $10xy + 5x^2\dfrac{dy}{dx} + 8e^{2y}\dfrac{dy}{dx} - 7 = 0 \Rightarrow
    \dfrac{dy}{dx} = \dfrac{7 - 10xy}{5x^2 + 8e^{2y}}$. At $y = 0$ the curve gives
    $x = 2$, so gradient $= \dfrac{7}{20 + 8} = \tfrac14$.
  mark_scheme: []
