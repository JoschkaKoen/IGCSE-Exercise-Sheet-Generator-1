- number: 9a
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'By parts: $\int 6x\ln x\,dx = 3x^2\ln x - \tfrac32 x^2$. Limits
    1 to $a$ equal 4: $3a^2\ln a - \tfrac32 a^2 + \tfrac32 = 4 \Rightarrow \ln a =
    \tfrac16\!\left(\tfrac{5}{a^2}+3\right)$, i.e. $a = \exp\!\left(\tfrac16\!\left(\tfrac{5}{a^2}+3\right)\right)$
    (AG).'
  mark_scheme: []
  graphics: []
- number: 9b
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'With $f(x) = 6x\ln x - 3x^2$: $f(2) = 4.636 < 5$ and $f(2.1)
    = 6.402 > 5$, so $a$ lies between 2 and 2.1.'
  mark_scheme: []
  graphics: []
- number: 9c
