- number: '3'
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: '$\dfrac{z+5i}{z-5}$ real $\Rightarrow x - y = 5$; with $|z|^2
    = 17$: $x^2 + (x-5)^2 = 17 \Rightarrow x^2 - 5x + 4 = 0$. So $z = 4 - i$ and $z
    = 1 - 4i$.'
  mark_scheme: []
  graphics: []
- number: '4'
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'At $(e,3)$: $\tan t = 1$. $\dfrac{dx}{dt} = \sec^2 t\,e^{\tan
    t}$, $\dfrac{dy}{dt} = 6\tan t\sec^2 t$, so $\dfrac{dy}{dx} = 6\tan t\,e^{-\tan
    t} = \dfrac6e$. Tangent: $y = \dfrac6e x - 3$.'
  mark_scheme: []
  graphics: []
