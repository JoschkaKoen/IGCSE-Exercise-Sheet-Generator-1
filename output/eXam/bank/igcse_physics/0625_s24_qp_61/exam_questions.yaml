    \ 0.00 N.\n\nDescribe one technique you would use to obtain an accurate value\
    \ for l 0. Draw a diagram to\nillustrate your answer [2]\n\n(b) The student suspends\
    \ a load L = 1.00 N from the spring. He records the new length l of the\nspring\
    \ in Table 1.1.\n\nHe calculates the extension e of the spring using the equation\
