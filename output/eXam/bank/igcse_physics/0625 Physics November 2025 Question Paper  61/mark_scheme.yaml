    Q4.

    Further guidance on the mark scheme for this question

    Please put ticks / crosses by the side of the response in the order of the marking
    points.

    Each marking point should be judged independently: if the correct answer is seen,
    the mark is awarded. If a wrong investigation is described, an

    ECF should be applied only for MP6 and MP7 (the table and conclusion).

    A few candidates answer Q4 with a series of bullet points which may correspond
    to the bullet points in the question. Be aware of this.

    Thus the third bullet point of the response might say merely ‘Volume of water’.
    That then scores MP5.

    Q2.

    Additional graph notes:

    NOTE: The principle to apply here is ‘could I draw a significantly better line,
    using these points, under examination conditions?’ If the answer is

    definitely ‘yes’, do not award the mark.

    NOTE: –

    •

    If candidate’s scale consists of actual readings at equal intervals this will
    produce a perfect straight line! The only marks available in this case

    are the first (axes right way round and labelled). So maximum 1.

    •

    If axes are wrong way round, the other 3 marks are still available.

    Guidance on significant figures.

    Some questions are intended to assess this, and give the number of figures which
    are acceptable in the final answer.

    Where the mark scheme does not mention them, accept any number of significant
    figures from two upwards so long as the answer rounds to the

    value in the mark scheme. This includes recurring notation.

    Guidance on rounding errors.

    A rounding error in an answer should be penalised, but only where it occurs within
    one of the first three figures. Beyond that it may be ignored.'
