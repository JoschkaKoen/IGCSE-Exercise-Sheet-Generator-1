questions:
  - number: "17"
    type: multiple_choice
    text: |
      A student draws a diagram to show two different properties of a water wave. The arrows show the wave directions.

      shallow water
      deep water

      Which two wave properties does the diagram show?
    options:
      - letter: A
        text: |
          refraction and diffraction
      - letter: B
        text: |
          reflection and dispersion
      - letter: C
        text: |
          reflection and diffraction
      - letter: D
        text: |
          reflection and refraction
  - number: "18"
    type: multiple_choice
    text: |
      A seismic wave consists of vibrations that are parallel to the direction of propagation.

      What is the type of wave and what is the name of the seismic wave?

      \begin{tabular}{|c|c|c|}
      \hline
       & type of wave & \begin{tabular}[c]{@{}c@{}}name of\\ seismic wave\end{tabular} \\ \hline
      \textbf{A} & longitudinal & P-wave \\ \hline
      \textbf{B} & longitudinal & S-wave \\ \hline
      \textbf{C} & transverse & P-wave \\ \hline
      \textbf{D} & transverse & S-wave \\ \hline
      \end{tabular}
    options:
      - letter: A
        text: |
          longitudinal, P-wave
      - letter: B
        text: |
          longitudinal, S-wave
      - letter: C
        text: |
          transverse, P-wave
      - letter: D
        text: |
          transverse, S-wave
  - number: "19"
    type: multiple_choice
    text: |
      A person stands $1.0\text{ m}$ in front of a plane mirror. The mirror is moved away from the person at a speed of $1.0\text{ m/s}$.

      Which statement is correct?
    options:
      - letter: A
        text: |
          The image moves away from the person at a speed of $1.0\text{ m/s}$.
      - letter: B
        text: |
          The image moves away from the person at a speed of $2.0\text{ m/s}$.
      - letter: C
        text: |
          The image moves towards the person at a speed of $1.0\text{ m/s}$.
      - letter: D
        text: |
          The image moves towards the person at a speed of $2.0\text{ m/s}$.