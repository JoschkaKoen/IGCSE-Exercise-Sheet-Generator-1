    \ to the line MR that passes through the centre of MR. Label the normal NL.\n\
    •\nLabel the point at which NL crosses MR with the letter B.\n•\nDraw a line 10.0\
    \ cm long from B at an angle of incidence i = 40° to the normal below MR\nand\
    \ to the left of the normal. Label the end of this line A.\n[2]\n,\t\t,\n\n(b)\
    \ The student places the reflecting face of the mirror vertically on the line\
    \ MR.\n\nHe places two pins, P1 and P2, on line AB.\n\nMark the positions of P1\
    \ and P2 with crosses (X) on line AB at a suitable distance apart for\nthis type\
    \ of ray-trace experiment. Label the positions of P1 and P2.\n[1]\n\n(c) The student\
    \ views the images of pins P1 and P2 from the direction indicated by the eye in\n\
    Fig. 3.1. He places two pins, P3 and P4, so that pins P3 and P4 and the images\
    \ of P2 and P1\nall appear exactly one behind the other. The positions of P3 and\
    \ P4 are shown on Fig. 3.1.\n\n(i) Draw a line through the positions of P3 and\
    \ P4. Continue the line until it meets MR.\n[1]\n\n(ii) Measure the acute angle\
    \ α between this line and the horizontal line MR. An acute angle\nis an angle\
