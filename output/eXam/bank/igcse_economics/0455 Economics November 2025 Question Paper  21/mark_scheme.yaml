    Expected relationship: generally negative / inverse

    relationship (1) as the global growth rate falls, the value of

    the Swiss Franc rises / as the global growth rate rises, the

    value of the Swiss Franc falls (1).

    Supporting evidence: fall in global growth rate led to rise in

    the value of Swiss Franc from 2018–2019 or 2019–2020 (1),

    rise in global growth rate led to fall in the value of Swiss

    Franc from 2020–2021 (1).

    Analysis: Swiss Franc’s status as a “safe haven” currency

    (1) when investors are unsure about the economy, they

    usually keep their money in Swiss francs (1).

    Exception: 2021–2022 (1) where global growth was falling

    but Swiss Franc was stable / rising only slightly (1).

    Analysis for exception:

    Other reasons could affect the value of Swiss Franc (1), for

    example  Switzerland was also affected by the Covid–19

    pandemic (1).

    5 Responses do not have to be in the format suggested but

    they should address the expected / normal relationship, offer

    supporting evidence of that, highlight any exceptions to that,

    and analyse the overall data.

    0455/21

    October/November 2025

    Guidance'
