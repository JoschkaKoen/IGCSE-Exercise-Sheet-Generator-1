  text: '2

    In the first half of 2022, Guyana’s GDP grew by 36.4%. Most of this growth was
    due to higher

    output in the primary sector. The government used some of the tax revenue generated
    from this

    growth to fund long‑run development projects such as infrastructure and education.
    However, in

    the short run, there was a rise in house prices.


    (a) Identify two examples of primary sector industries.

    [2]


    (b) Explain two causes of rising GDP.

    [4]


    (c) Analyse why house prices may increase.

    [6]


    (d) Discuss whether or not increased government spending on education will lead
    to economic

    development.

    [8]'
