  mark_scheme_answer: 'Discuss whether or not deregulation in education in

    Egypt will increase living standards.

    Award up to 4 marks for logical reasons why it might, which

    may include:

    •

    deregulation has led to an increased number of schools

    / universities in Egypt (1) may increase competition

    between private schools / universities (1) may lower

    fees (1) raise quality (1)

    •

    more people have opportunities for education and

    training (1) making people more educated / skilled /

    qualified / literate / productive (1) easier to find jobs (1)

    earn an income (1) increasing affordability of goods and

    services (1) more educated people tend to enjoy better

    health / spend more on healthcare (1) longer life

    expectancy (1) increase HDI (1)

    •

    more school buildings will increase employment (1) of

    builders (1) teachers (1)

    •

    may reduce government spending on education (1)

    allowing the government to spend more on items that

    could increase living standards e.g. healthcare (1).

    Award up to 4 marks for logical reasons why it might not:

    •

    opening more private schools and universities in Egypt

    might increase the level of inequality (1) as private

    education remains unaffordable to lower income groups

    (1) restricting their employment opportunities (1) as

    private education is usually more expensive than state-

    provided education (1)

    •

    standards of living only improve for those from higher

    income groups (1) lower income groups remain in

    relative poverty (1) widen gap between rich and poor /

    increase relative poverty (1)

    •

    private schools and universities may prioritise profits (1)

    over the quality / standards of education provided (1).

    6 Answers not referring to education, max 3 marks.

    Apply this example to all questions with the command

    word DISCUSS

    (1(g), 1(h), 2(d), 3(d), 4(d) and 5(d))

    Each point may be credited only once, on either side of an

    argument, but separate development as to how/why the

    outcome may differ is rewarded.

