    One of the world’s more expensive roads opened in Montenegro in 2022. To build
    the road, the

    Montenegro Government was helped by a foreign commercial bank and another multinational

    company (MNC). This new road could help the Montenegro Government achieve its

    macroeconomic aims and increase Montenegro’s international trade. MNCs can have
    a significant

    impact on the host countries in which they locate.


    (a) Define international trade.

    [2]


    (b) Explain the importance of commercial banks to governments.

    [4]


    (c) Analyse how building roads can help a government achieve its macroeconomic
    aims.

    [6]


    (d) Discuss whether or not MNCs benefit host countries.

    [8]'
