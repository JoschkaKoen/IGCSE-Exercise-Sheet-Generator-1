    The Peruvian government is under pressure from its industries to improve the country’s
    transport

    system. Peru’s third largest industry is tourism. There are many firms in the
    Peruvian tourism

    industry. Another major industry in Peru is fruit farming. In recent years, trade
    union membership

    in the Peruvian fruit-farming industry has increased.


    (a) Identify two examples of labour employed in the tourism industry.

    [2]


    (b) Explain two reasons why countries with a good transport system often have
    a high GDP. [4]


    (c) Analyse the benefits consumers may gain from a competitive market.

    [6]


    (d) Discuss whether or not an increase in trade union membership will benefit
    an economy.

    [8]'
