  text: '4

    In 2022, more than a quarter of a million workers, including doctors, left Sri
    Lanka to work in other

    countries. This was largely due to economic problems, including an inflation rate
    of 50% and a

    concern that unemployment might rise. The Sri Lankan Government increased direct
    taxation. It

    also encouraged some public sector workers to work abroad temporarily. People
    who work abroad

    often send money home to relatives.


    (a) Identify two types of unemployment.

    [2]


    (b) Explain two ways that money received from relatives working abroad could raise
    their

    families’ living standards.

    [4]


    (c) Analyse how an increase in direct taxation could increase unemployment.

    [6]


    (d) Discuss whether or not a doctor would benefit from working in another country.

    [8]'
