    consumers do not appreciate its full value / has external

    benefits / can be produced by the private sector / can be

    produced by the private sector and the public sector / is a

    private good / is rival and excludable (1) e.g. education /

    healthcare / fruit (1).

    A public good would not be produced by the private sector /

    is (usually) supplied / produced by the government / funded

    by the government (1) non-excludable / non-rival (1) e.g.

    street lighting / defence / flood control (1).

    4 One mark for an explanation of a merit good and one mark

    for an example of a merit good.

    One mark for an explanation of a public good and one mark

    for an example of a public good.

    Accept but do not expect reference to non-rejectable / zero

    cost of producing an extra unit for a public good.

    Allow public park.

    No mark for roads unless qualified by e.g. uncrowded roads

    with many entry and exit points.

