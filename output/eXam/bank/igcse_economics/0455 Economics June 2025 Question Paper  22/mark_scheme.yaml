  mark_scheme_answer: 'Analyse the relationship between healthcare spending

    as a percentage of GDP and life expectancy.

    Expected relationship:

    Direct / positive relationship (1). Generally, the higher

    healthcare spending, the higher the life expectancy (1).

    Supporting evidence:

    E.g.: Haiti has the second lowest % healthcare spending

    and the shortest life expectancy (1) Canada spends a higher

    % on healthcare than Egypt and has a longer life

    expectancy / Canada spends the highest percentage on

    health care and has the second highest longest life

    expectancy / Canada and Sweden spend a high % on

    healthcare and have long life expectancy (1).

    Analysis of the supporting information:

    Higher spending on healthcare would be expected to raise

    the health of the population / provide better quality

    healthcare (1) increase awareness of need for healthy

    living / provide more check-ups / preventative medical

    care / reduce the death rate (1).

    Exception:

    Monaco (1) spends the lowest % on healthcare but has the

    longest life expectancy (1).

    Analysis of exception:

    1.9% of a very high GDP can mean higher spending than

    e.g. 12.9% of a lower GDP / Monaco may have a high GDP

    (1). There are other influences on life expectancy e.g.

    nutrition / education/housing/war (1).

    5 Responses do not have to be in the format suggested but

    they should address the expected/normal relationship, offer

    supporting evidence of that, highlight any exceptions to that,

    and analyse the overall data.

    Supporting evidence should involve interpretation, not just

    description.

    0455/22

    May/June 2025

    Mark

    Guidance'
  mark_scheme: []
  graphics: []
