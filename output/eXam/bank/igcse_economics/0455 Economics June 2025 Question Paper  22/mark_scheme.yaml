    self-esteem / loss of self-confidence / making it more difficult

    to get another job / reduced life expectancy / due to

    difficulty/time to find another job (1).

    May have to sell possessions (1) to gain money / to meet

    bills (1).

    Demotivation (1) give up looking for work / become a

    discouraged worker / become voluntarily unemployed (1).

    Reduced ability to save (1) reduced ability to cope with

    unexpected events / to finance e.g. education / healthcare /

    retirement (1).

