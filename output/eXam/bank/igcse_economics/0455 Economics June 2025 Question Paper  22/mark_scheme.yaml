  mark_scheme_answer: 'Discuss whether or not deflation is likely to have

    harmed St. Kitts and Nevis.

    Award up to 4 marks for logical reasons why it might, which

    may include:

    •

    may have increased real value of debt (1) may default

    (1) may have decreased investment (1)

    •

    may have resulted in a deflationary spiral (1) may have

    resulted from lower total demand (1) lower GDP / lower

    output / reduce economic growth / may cause a

    recession (1) lower employment / increased

    unemployment (1) lowered wages / income (1)

    •

    may reduce confidence (1) may discourage MNCs (1)

    •

    may reduce consumer expenditure / save more / create

    uncertainty (1) delay buying goods and services (until

    price is lower) (1).

    Award up to 4 marks for logical reasons why it might not,

    which may include:

    •

    may have increased purchasing power / real

    income / with the same income more goods and

    services can be purchased (1) (some) people may

    spend / consume more (1)

    •

    value of saving may have increased (1) increasing

    wealth (1)

    •

    may be the result of higher total supply (1) due to

    advances in technology / lower costs of production (1)

    higher output / economic growth (1) higher employment

    (1)

    •

    may have increased international competitiveness of its

    products / lower export prices (1) increased

    exports / export revenue (1) reduced imports / import

    expenditure (1) improve current account balance (1).

    6 Award one mark for malign (bad) deflation is harmful

    whereas benign (good) deflation is beneficial.

    Mark for higher employment and mark for higher GDP can

    only be awarded if come from higher total supply.

    ‘save more’ may be credited on either side but only once.

    0455/22

    May/June 2025

    Mark

    Guidance'
