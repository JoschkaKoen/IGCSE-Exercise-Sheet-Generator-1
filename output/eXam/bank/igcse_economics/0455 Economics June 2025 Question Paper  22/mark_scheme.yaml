  mark_scheme_answer: 'Discuss whether or not an increase in the size of its

    fishing industry would benefit St. Kitts and Nevis.

    Award up to 4 marks for logical reasons why it might, which

    may include:

    •

    may reduce imports of fish (1) reduce risk of supply-side

    shocks / imports being cut off (1) enable fish to be

    exported (1) may improve the current account

    balance / improve the balance of payments (1)

    •

    may increase employment / increase job

    opportunities / reduce unemployment (1) raise incomes

    (1) increase living standards (1) increase

    GDP / increase output / cause economic growth (1)

    higher tax revenue (1)

    •

    may enable greater advantage to be taken of

    economies of scale (1) example (1) lower average cost

    (1) lower fish prices (1)

    •

    (larger boats) may be more efficient / more productive

    (1) make the industry more profitable / increase profits

    from fishing (1).

    6 Award one mark in total for higher / lower average costs,

    one mark for lower / higher fish prices, one mark for higher /

    lower profits (1).

    Higher / lower profits should be linked to the fishing industry.

    Apply this example to all questions with the command

    word DISCUSS

    (1(g), 1(h), 2(d), 3(d), 4(d) and 5(d))

    Each point may be credited only once, on either side of an

    argument, but separate development as to how/why the

    outcome may differ is rewarded.

