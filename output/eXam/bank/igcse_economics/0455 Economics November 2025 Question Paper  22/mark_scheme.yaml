  mark_scheme_answer: 'Analyse the relationship between global GDP per head

    and global air passenger numbers.

    Coherent analysis which might include the following.

    Expected relationship:

    Generally, a positive relationship (1) the higher the global

    GDP head, the higher the air passenger numbers (1).

    Supporting evidence:

    2016–2019 GDP per head rose and air passenger numbers

    increased (1).

    Analysis of expected relationship:

    Higher GDP per head increases purchasing power / ability to

    pay for air travel (1) as people get richer, they travel more

    for leisure and business (1).

    Exception:

    2021 (1) GDP per head rose but air passenger numbers

    decreased (1).

    Analysis of exception:

    May have been a time delay in people gaining confidence in

    flying after COVID-19 pandemic / other influences on

    demand e.g. air fares (1).

    5 Responses do not have to be in the format suggested but

    they should address the expected / normal relationship, offer

    supporting evidence of that, highlight any exceptions to that,

    and analyse the overall data.

    Supporting evidence should involve interpretation, not just

    description.

    0455/22

    October/November 2025

    Guidance'
