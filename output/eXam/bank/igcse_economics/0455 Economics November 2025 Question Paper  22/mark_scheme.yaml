    inflation (1)

    •

    may reduce imports (1) improve the current account of

    the balance of payments (1)

    •

    provide finance for investment (1) firms able to borrow

    from banks (1)

    •

    may enable households to finance future expenditure

    (1) on e.g. healthcare / education / provide for

    retirement / provide support for individuals in difficult

    times (1)

    •

    may enable government to cut benefits, e.g. pensions

    (1) spend money saved on other priorities, e.g.

    healthcare (1).

    Award up to 4 marks for logical reasons why it might not,

    which may include:

    •

    may lower total demand (1) reduce GDP (1) increase

    unemployment (1) cyclical unemployment (1) could

    cause a recession (1)

    •

    may reduce investment as demand is low (1) reduce

    improvements in technology (1)

    •

    Less indirect tax raised (1) may lead to reduced

    government spending (1).

    6 Reference to AD / total demand falling can be credited on

    either side of the argument, but only once.

