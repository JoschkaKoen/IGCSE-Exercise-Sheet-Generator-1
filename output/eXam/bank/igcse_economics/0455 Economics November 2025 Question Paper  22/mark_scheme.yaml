  mark_scheme_answer: 'Discuss whether or not perfume should be taxed at a

    higher rate than food.

    In assessing each answer, use the table opposite.

    Why it should:

    •

    perfume is a luxury whereas food is a necessity

    •

    rich spend more on perfume than the poor

    •

    taxing food more may increase poverty as poor spend a

    high proportion of their income on food

    •

    perfume is less likely than food to be a merit good

    •

    a higher price for perfume will not significantly contribute

    to inflation, not a significant item in CPI

    •

    perfume may be imported while food may be supplied

    by domestic firms.

    Why it should not:

    •

    demand for perfume may be elastic and so may not

    raise much revenue. In contrast, inelastic demand for

    food so may raise high tax revenue

    •

    perfume may be an important domestic industry. Higher

    taxes may result in closure / unemployment

    •

    some food is a demerit good e.g. food with a high sugar

    content

    •

    taxing demerit food may improve health

    •

    taxing food may reduce obesity.

