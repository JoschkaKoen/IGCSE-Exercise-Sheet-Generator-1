  mark_scheme_answer: 'Analyse how price elasticity of demand can influence a

    firm’s pricing decisions.

    Coherent analysis which might include the following.

    Price elasticity of demand is a measure of the

    responsiveness of demand to a change in price (1).

    If demand is elastic, a rise in price will cause a greater

    percentage change in demand (1) may indicate the firm’s

    product has close substitutes / is not a necessity / takes a

    significant proportion of consumers’ incomes (1) may

    encourage firms to lower price (1) raise revenue (1).

    If demand is inelastic, a rise in price will cause a smaller

    percentage change in demand (1) may indicate the firm’s

    product has few substitutes / is a necessity / takes a small

    proportion of consumers’ incomes (1) may encourage firms

    to raise prices (1) revenue would increase (1).

    6 Reward, but do not expect:

    Facilitate price discrimination (1) charging higher prices in

    markets with inelastic demand (1) valid example, e.g. higher

    rail fares at peak times (1).

