  text: '2

    Unemployment in the United Kingdom (UK) fell in December 2021 to 4.1%. Market
    forces would

    usually mean that wages would increase due to this lower unemployment. However,
    workers’

    living standards did not increase. New international trade deals were not made
    fast enough to

    offset the decreasing trade between the UK and the European Union.


    (a) Identify two ways of measuring unemployment.

    [2]


    (b) Explain two factors that could influence living standards, apart from unemployment
    rates. [4]


    (c) Analyse how market forces can increase wages.

    [6]


    (d) Discuss whether or not free trade between countries increases economic growth.

    [8]'
