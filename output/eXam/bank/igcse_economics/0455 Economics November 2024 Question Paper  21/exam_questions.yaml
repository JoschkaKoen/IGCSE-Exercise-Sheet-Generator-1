- number: '4'
  question_type: short_answer
  marks: 0
  text: '4

    The World Trade Organization (WTO) estimates that India has the largest levels
    of trade protection

    of any major economy. The highest tariffs are imposed on products from the primary
    sector. For

    example, in 2018 India imposed a tariff of approximately 90% on imports of coffee
    to protect its

    coffee farmers. However, the markets for coffee substitutes and complements do
    not have such

    levels of government intervention.


    (a) Identify two methods of trade protection apart from a tariff.

    [2]


    (b) Explain how the price of coffee substitutes and complements can affect the
    demand for

    coffee.

    [4]


    (c) Analyse possible reasons why a government may want to intervene in a market.

    [6]


    (d) Discuss whether or not high tariffs can reduce unemployment.

    [8]'
