  mark_scheme_answer: 'Analyse the relationship between the literacy rate and

    the percentage of the labour force employed in

    agriculture.

    Coherent analysis which might include:

    Expected relationship:

    •

    Generally, an inverse / negative relationship (1) the

    higher the literacy rate, the smaller the % of the labour

    force employed in agriculture (1).

    Supporting evidence:

    •

    South Africa had the highest literacy rate and the lowest

    % of the labour force employed in agriculture (1).

    •

    Zambia / Sierra Leone / Mali had the lowest literacy

    rates and the highest %s of labour force employed in

    agriculture (1).

    Analysis of expected relationship:

    •

    A high literacy rate may increase the chance of workers

    gaining jobs in high paid tertiary jobs (1) a low literacy

    rate may mean workers have to undertake unskilled

    jobs in agriculture / a high proportion of workers

    employed in agriculture may mean that high literacy rate

    is not required (1).

    Exception:

    •

    Gabon (1) Gabon has a high literacy rate but also a high

    % of the labour force employed in agriculture (1).

    Analysis of exception:

    •

    Some jobs in agriculture are skilled / secondary and

    tertiary sectors may be small (1).

    5 Responses do not have to be in the format suggested but

    they should address the expected/normal relationship, offer

    supporting evidence of that, highlight any exceptions to that,

    and analyse the overall data.

    Supporting evidence should involve interpretation, not just

    description. Simply stating percentages without analysis of

    being high or low gets no marks.

    Accept as analysis where two countries with different levels

    of adult literacy and percentage employed in agriculture are

    directly compared.

    0455/21

    May/June 2025

    Guidance'
