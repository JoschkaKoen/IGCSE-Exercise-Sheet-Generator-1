  mark_scheme_answer: 'Discuss whether or not a government should pay

    private sector firms to give work experience to

    unemployed young people.

    Award up to 4 marks for logical reasons why it should,

    which may include:

    •

    can enable young workers to develop their skills / raise

    their productivity (1) increase their confidence /

    motivation to get a job / get higher paid jobs (1) young

    people may make mistakes and cost firm money while

    being trained (1)

    •

    can increase the chances of young people gaining a job

    (1) reduce unemployment (1) reduce the cost of

    unemployment benefits (1) reduce future training costs

    (1) increase tax revenue (1) leads to economic growth

    (1).

    Award up to 4 marks for logical reasons why it should

    not, which may include:

    •

    the quality of the work experience may not be good (1)

    the young may be given unskilled jobs (1) poor working

    conditions / not regulated (1)

    •

    opportunity cost [implied] (1) government spending

    could be used to e.g. improve state education (1)

    government incurs additional expenditure / raises taxes

    to pay for it (1) the young may have been employed by

    the private sector without payment by the government

    (1)

    •

    it may reduce the efficiency of private firms (1) reduce

    their output (1) firms may be corrupt (1).

    6 Apply this example to all questions with the command

    word DISCUSS

    (1(g), 1(h), 2(d), 3(d), 4(d) and 5(d))

    Each point may be credited only once, on either side of an

    argument, but separate development as to how/why the

    outcome may differ is rewarded.

    Generic example

    mark

    Tax revenue may decrease

    1

    because of reason e.g. incomes may be lower.

    1

    Tax revenue may increase because incomes

    may be higher i.e. reverse of a previous

    argument.

    0

    Tax revenue may increase because of a

    different reason i.e. not the reverse of a

    previous argument e.g. government spending

    on subsidies may stimulate the economy more

    than spending on education.

    1

