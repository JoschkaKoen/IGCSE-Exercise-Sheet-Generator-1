  mark_scheme_answer: 'Analyse the influences on whether demand for shoes is

    elastic or inelastic.

    Coherent analysis which might include:

    •

    Shoes have substitutes in the form of sandals and boots

    (1) may make demand (price) elastic (1) as a change in

    price will cause consumers to switch between different

    forms of footwear (1) especially if the types are close

    substitutes / close in price (1).

    •

    PED of particular brands of shoes will be more elastic

    than demand for shoes as a whole (1)

    •

    Proportion of income spent on the shoes (1) the lower

    the proportion, the more inelastic the demand (1) as a

    change in price will not have such a significant impact

    on demand (1).

    •

    Whether shoes are considered to be a necessity or a

    luxury (1) shoes are likely to be considered a necessity

    (1) and therefore inelastic (1).

    •

    It may not be possible to delay the purchase of shoes

    (1) making demand inelastic (1).

    •

    Durability of shoes (1) the more durable the more

    inelastic (1).

    •

    Demand for some shoe may be addictive (1) making

    demand inelastic (1).

    6

