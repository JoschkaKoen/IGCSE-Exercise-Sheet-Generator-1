    economies and diseconomies of scale or just stating

    economies of scale and diseconomies of scale may be

    experienced without references to examples.

    Essentially full marks can be gained for identification and

    explanation of two economies of scale and one diseconomy

    of scale OR one economy of scale and two diseconomies of

    scale.

