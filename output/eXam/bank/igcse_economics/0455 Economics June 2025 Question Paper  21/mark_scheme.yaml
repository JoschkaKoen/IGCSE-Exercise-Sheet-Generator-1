    •

    Risk of retaliation (1) resulting in trade war /

    unemployment (1).

    •

    Raise price of imports (1) which may raise price of

    domestically produced goods (because of the lack of

    competition) (1) .

    •

    Raise the price of imported raw materials / capital goods

    (1) cause cost-push inflation (1) .

    •

    Reduce quality (1) due to lower competition (1)

    •

    Protected industries / infant industries / declining

    industries may become inefficient (1) if become reliant

    on tariff (protection) (1).

    •

    Reduce output / consumption / less quality / less choice

    (1) lower living standards (1).

    •

    Reduce ability of countries to specialise (1) less efficient

