    labour productivity (1)

    •

    managerial economies (1) employ specialists (1)

    •

    technical economies (1) using advanced capital

    equipment (1)

    •

    buying / purchasing economies (1) receiving a discount

    as buying in bulk (1)

    •

    selling economies (1) reducing transport costs (1)

    •

    marketing economies (1) spreads fixed costs over more

    output (1)

    •

    financial economies (1) easier / cheaper to borrow (1)

    •

    research and development economies (1) introduce

    new products / new production methods (1)

    •

    risk bearing economies (1) able to suffer fall in demand

    for one product or supply problems connected to one

    product (1)

    •

    may experience external economies of scale (1)

    example (1).

    Award up to 4 marks for logical reasons why it might

    not, which may include:

    •

    difficulty of controlling a large firm (1) may be slower to

    make decisions (1)

