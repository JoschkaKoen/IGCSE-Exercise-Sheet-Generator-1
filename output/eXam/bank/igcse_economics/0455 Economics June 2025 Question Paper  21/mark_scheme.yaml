  mark_scheme_answer: 'Discuss whether or not having a floating exchange rate

    benefits an economy.

    In assessing each answer, use the table opposite.

    Why it might:

    •

    may eliminate a current account imbalance

    •

    if there is a current account deficit, exchange rate may

    fall making exports fall in price and imports rise in price

    •

    no need to keep reserves of foreign exchange

    •

    no need to change interest rates to influence the

    exchange rate

    •

    enable government to concentrate on other aims as

    does not have to keep the exchange rate fixed.

    Why it might not:

    •

    may make it difficult for firms to plan, not knowing how

    much they will have to pay for imports and earn from

    exports

    •

    may create uncertainty

    •

    discourage investment

    •

    speculation can cause (significant) destabilising

    changes in the exchange rate.

