  text: '2

    The shape of Colombia’s population pyramid is changing. The income distribution
    of this South

    American country, however, is not changing significantly. The country has one
    of the most unequal

    income distributions in the world. Some Colombians work in its footwear industry
    which produces

    shoes, sandals and boots. Although footwear is produced in the private sector,
    Colombia has a

    mixed economic system.


    (a) Define population pyramid.

    [2]


    (b) Explain two reasons why income may become more unevenly distributed.

    [4]


    (c) Analyse the influences on whether demand for shoes is elastic or inelastic.

    [6]


    (d) Discuss whether or not a mixed economic system will benefit the people who
    live in that

    economy.

    [8]'
