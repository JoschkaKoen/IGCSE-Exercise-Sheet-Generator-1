  text: '1

    (a) Calculate the value of Gabon’s oil production as a percentage of Gabon’s GDP.

    [1]


    (b) Identify two external benefits of rainforests.

    [2]


    (c) Explain what effect an increase in tourism may have on Gabon’s current account
    of the

    balance of payments.

    [2]


    (d) Explain two reasons why the Gabonese Government wants to reduce reliance on
    oil.

    [4]


    (e) Draw a demand and supply diagram to show the effect of the discovery of new
    gold deposits

    on the market for gold.

    [4]


    (f) Analyse the relationship between the literacy rate and the percentage of the
    labour force

    employed in agriculture.

    [5]


    (g) Discuss whether or not a government should pay private sector firms to give
    work experience

    to unemployed young people.

    [6]


    (h) Discuss whether or not a growth in the size of firms in Gabon’s textile industry
    will reduce

    their average cost of production.

    [6]

    Section B

    Answer any three questions.

    Each question is introduced by stimulus material. In your answer you may refer
    to this material and/or

    to other examples that you have studied.'
