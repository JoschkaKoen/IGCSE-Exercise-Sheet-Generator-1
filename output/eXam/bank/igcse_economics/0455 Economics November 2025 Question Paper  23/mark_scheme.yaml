- number: 1f
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Analyse the relationship between GDP per head and the

    percentage of children who complete primary

    education.

    Coherent analysis which might include the following.

    Expected relationship:

    Generally, a direct / positive relationship (1) the higher the

    GDP per head, the higher the percentage of children who

    complete primary education (1).

    5 Responses do not have to be in the format suggested but

    they should address the expected / normal relationship, offer

    supporting evidence of that, highlight any exceptions to that,

    and analyse the overall data.

    Supporting evidence should involve interpretation, not just

    description e.g. simply quoting data without reference to

    high or low.

    0455/23

    October/November 2025

    Guidance

    Supporting evidence:

    Four countries with the highest GDP per head had the

    highest percentage of children who complete primary

    education / Malawi / Uganda have the lowest of both (1).

    South Africa had the highest GDP per head and the highest

    percentage of children who complete primary education (1).

    Comparison of two countries (e.g. Namibia and Senegal

    where GDP falls as does percentage of children completing

    primary education).

    Analysis of the expected relationship:

    Parents in countries with high incomes are more likely to be

    able to afford to keep their children in primary education (1).

    Government tax revenue is likely to be higher in countries

    with high incomes and so will be able to spend more on

    primary education (1).

    Completing primary education may increase the chance of

    skilled / occupationally mobile high income earning workers

    (1).

    Exception:

    Malawi / Uganda (1) Malawi has a lower GDP per head but

    a higher percentage of children who complete primary

    education than Uganda (1).

    Analysis of exception:

    A higher percentage of children may complete primary

    education but the quality of the education may be low

    leading to a low GDP per head / GDP per head may be high

    but there may be a high degree of inequality with a relatively

    high proportion of the population unable to keep their

    children in primary education (1).

    0455/23

    October/November 2025

    Guidance'
  mark_scheme: []
  graphics: []
