  mark_scheme_answer: 'Discuss whether or not a government should try to stop

    its country’s foreign exchange rate falling in value.

    Award up to 4 marks for logical reasons why it should try to

    stop it falling in value e.g. the disadvantages of the fall,

    including:

    •

    will increase import prices (1) reducing imports (1) may

    increase cost of imported raw materials and capital

    goods cost (1) cause cost-push inflation (1) cause slow

    economic growth (1)

    •

    may reduce pressure on domestic firms to keep prices

    low (1) quality high (1)

    •

    may reduce confidence in the economy (1) reduce

    investment (1) increase debt (1).

    Award up to 4 marks for logical reasons why it should allow

    a fall in value e.g. the advantages of the fall, including:

    •

    will reduce export prices (1) increase exports (1) reduce

    imports (1)

    •

    make domestic goods more competitive (1) reduce a

    current account deficit / improve the balance of

    payments (1)

    •

    may increase economic growth (1) reduce

    unemployment (1) attract MNCs / attract investment (1)

    increase tourism (1)

    •

    opportunity cost / costly for government to intervene (1)

    e.g. less funding for education / healthcare / housing (1)

    •

    may increase government tax revenue (1).

    6 Note:  many candidates provide incorrect analysis e.g.

    wrong way around.

    Maximum of 3 marks if there is no development / evaluation

    of reasons given.

    0455/23

    October/November 2025

    Guidance'
