  mark_scheme_answer: 'Identify two ways central banks differ from commercial

    banks.

    Award one mark for a characteristic of the central bank such

    as:

    •

    in the public sector / owned by the government

    •

    operate monetary policy

    •

    main objective is usually price stability

    •

    hold the accounts of the government

    •

    lend to governments and sometimes commercial banks

    •

    manage foreign exchange rate.

    Award one mark for a characteristic of a commercial bank

    such as:

    •

    usually in the private sector / owned by individuals

    •

    provide services for consumers

    •

    main objective is profiting maximization or growth

    •

    hold the accounts of firms and households

    •

    lend to households and firms

    •

    buy and sell foreign currency to firms and households.

    2 If more than two ways are given, consider the first three.

    The second mark must be a linked difference and not a

    negative comment e.g. central bank controls money supply,

    but commercial banks do not, only gets one mark.

    0455/23

    October/November 2025

    Guidance'
