  mark_scheme_answer: 'Discuss whether or not Malawi should develop a solar

    energy industry.

    Award up to 4 marks for logical reasons why it might, which

    may include:

    •

    a sustainable source of energy (1) enables future

    generations to access energy (1)

    •

    would create less pollution / external costs than burning

    wood and charcoal / improve air quality (1) reduce

    deforestation (1) improve health (1)

    •

    may enable more Malawian households to gain access

    to electricity (1) increase living standards / reduce

    inequality (1)

    •

    setting up solar panels creates jobs (1) leads to

    increased output / economic growth / access to

    electricity for Malawian firms (1)

    •

    long hours / 3000 hours of sunshine (1) a good / viable

    source of energy (1)

    •

    less need to import energy (1) reduce current account

    deficit (1)

    •

    develops employment opportunities (1) raising incomes

    (1).

    6 Apply this example to all questions with the command

    word DISCUSS

    (1g, 1h, 2d, 3d, 4d and 5d)

    Each point may be credited only once, on either side of an

    argument, but separate development as to how / why the

    outcome may differ is rewarded.

    Generic example

    mark

    Tax revenue may decrease…

    1

    ...because of reason e.g. incomes may be lower.

    1

    Tax revenue may increase because incomes

    may be higher i.e. reverse of a previous

    argument.

    0

    Tax revenue may increase because of a different

    reason i.e. not the reverse of a previous

    argument e.g. government spending on subsidies

    may stimulate the economy more than spending

    on education.

    1

    0455/23

    October/November 2025

    Guidance

    Award up to 4 marks for logical reasons why it might not,

    which may include:

    •

    opportunity cost of installing (1) example (1)

    •

    opportunity cost of land use (1) reduced agricultural

    output (1)

    •

    dependent on weather / sunshine and days lost (1)

    unstable supply (1) may experience storm damage /

    natural disasters (1)

    •

    visual pollution (1) might reduce tourism / reduce house

    prices (1)

    •

    cost of developing an electricity distribution network

    may be prohibitive

    •

    cost of switching from fossil-fuel burning domestic

    appliances to electrical ones may not be affordable to

    households (1) limiting the impact of the switch (1)

    •

    expensive to install (1) worsen government budget

    position (1)

    •

    visual pollution (1) might reduce tourism / reduce house

    prices (1)

    •

    solar panels could be damaged by storms (1) making

    them inefficient (1).

    0455/23

    October/November 2025

    Guidance'
