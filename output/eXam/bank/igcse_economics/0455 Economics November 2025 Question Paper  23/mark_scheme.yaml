  mark_scheme_answer: 'Analyse how an increase in consumer spending could

    increase economic growth.

    Coherent analysis which might include an increase in

    consumer spending may:

    •

    increase total demand (1) this may increase confidence

    (1) may encourage firms to increase their output (1)

    firms’ revenue / profits increase (1) leads to more

    investment / innovation (1) new firms may start up (1)

    raise GDP (1)

    •

    increase output, firms may buy capital goods / invest (1)

    this will increase productive capacity (1)

    •

    increase output, more workers may be employed (1)

    this will reduce unemployment (1) increase incomes (1)

    increase consumer spending further (1)

    •

    increase (indirect) tax revenue (1) which can be spent

    on e.g. infrastructure / education / healthcare (1) leading

    to further increase in productive capacity / GDP (1).

    6 Only reward increasing productive capacity and raising GDP

    once.

    Reward but do not expect reference to the multiplier effect.

