- number: '5'
  question_type: short_answer
  marks: 0
  text: '5

    In 2023, the Canadian Prime Minister said that his country’s aim was to increase
    immigration to

    half a million a year. This was because the country was experiencing labour shortages
    and an

    increase in life expectancy. More workers in Canada would increase the tax revenue
    available to

    spend on pensions, and more workers would also increase consumer spending. An
    increase in

    the immigration of both skilled and unskilled workers might affect the country’s
    car industry.


    (a) Identify two causes of an increase in life expectancy.

    [2]


    (b) Explain two ways a firm could attract skilled workers from another country.

    [4]


    (c) Analyse how an increase in consumer spending could increase economic growth.

    [6]


    (d) Discuss whether or not the wages of workers employed by car firms will increase
    in the future.


    [8]'
