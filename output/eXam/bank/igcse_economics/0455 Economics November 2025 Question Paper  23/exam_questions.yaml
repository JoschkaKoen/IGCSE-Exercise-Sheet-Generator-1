  text: '4

    The Central African country Chad has a triangle-shaped population pyramid and
    a high level of

    poverty. It regularly has an overall deficit on the current account of its balance
    of payments. Chad

    usually has a surplus on its secondary income. However, its trade in goods, trade
    in services and

    primary income are all usually in deficit. Some economists suggest that the Chadian
    Government

    should impose import quotas to reduce its trade in goods deficit.


    (a) Define primary income.

    [2]


    (b) Explain two influences on the shape of a country’s population pyramid.

    [4]


    (c) Analyse the causes of poverty.

    [6]


    (d) Discuss whether or not imposing import quotas will reduce a trade in goods
    deficit.

    [8]'
