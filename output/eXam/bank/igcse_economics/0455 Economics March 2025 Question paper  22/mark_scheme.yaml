  mark_scheme_answer: 'Analyse the relationship between GDP per head and average

    spending on food as a percentage of total household spending.

    Relationship (up to 2 marks):

    Generally, an inverse relationship / negative relationship (1) the higher

    the GDP per head, the lower the average household spending on food as

    a % of household spending (1).

    Supporting evidence (up to 2 marks):

    E.g. the five countries with the lowest GDP per head had the highest %

    average household spending on food (1). Ethiopia had the lowest GDP

    per head and the highest average household spending on food as a % of

    total spending (1) Cambodia had the second lowest GDP per head and

    the second highest spending on food as a % of total spending (1) Egypt

    had the third lowest GDP per head and the third highest spending on

    food as a % of total spending (1).

    Analysis of relationship (up to 2 marks):

    As households get richer, they can afford to spend more in total on food /

    higher quality food (1) but can afford to buy more of other items / buy

    more luxury items / spend less on necessities (1).

    Exception (up to 2 marks):

    Norway / USA (1) Norway had a higher GDP per head but also a higher

    % of household spending on food (1).

    Analysis of exception (up to 1 mark):

    Food may be more expensive in Norway / Norwegians may have a

    different diet / buy a higher proportion of high quality food (1).

    5 Responses do not have to be in the format

    suggested but they should address the

    expected/normal relationship, offer supporting

    evidence of that, highlight any exceptions to

    that, and analyse the overall data.

    Supporting evidence should involve

    interpretation, not just description but note:

    A mark can be given for an implied comparison

    e.g.

    after stating that there is a negative relationship

    (1):

    e.g. Belgium had a GDP per head of $52 100

    and only spent 13% of their total spending on

    food whereas Romania had a GDP per head of

    $15 000 and spent 26% of their spending on

    food (1),

    Rewarding GDP per head (income) but not just

    GDP.

    0455/22

    February/March 2025

    Guidance'
