  mark_scheme_answer: 'Explain why commercial banks may increase their lending.

    Logical explanation which might include:

    To increase profits / revenue (1) earn more interest / high interest rates

    (1) as most commercial banks are in the private sector (1) main aim is

    likely to be profit maximisation (1).

    Increase in demand for loans (1) due to low interest rates (1) increase

    optimism about the future (1) higher demand for bank loans may increase

    profits (1).

    Increased confidence loans will be repaid (1) due to e.g. rise in incomes

    (1).

    Increase in bank deposits (1) more money to lend (1).

    Take advantage of economies of scale (1) lower average costs (1).

    Central bank / government encouragement / (expansionary) monetary

