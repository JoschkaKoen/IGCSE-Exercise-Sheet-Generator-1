  mark_scheme_answer: 'Discuss whether or not a higher proportion of women is likely
    to

    enter Romania’s labour force in the future.

    Award up to 4 marks for logical reasons why it might, which may include:

    •

    there may be an increase in childcare facilities (1) making it easier

    for women who are parents to work (1)

    •

    more part-time work / more job opportunities for women / shortage of

    labour / higher demand for labour (1) lower birth rate (1) which may

    enable women to combine work and child rearing (1)

    •

    increase in female education / qualifications / training (1) which may

    increase skills / productivity (1) which may increase wages (1).

    •

    increase in healthcare / family planning (1) reduce size of families (1)

    •

    may seek to reduce poverty / improve living standards (1) by earning

    an income (1).

    Award up to 4 marks for logical reasons why it might not, which may

    include:

    •

    discrimination may occur (1) in terms of jobs available / wages (1).

    •

    negative social attitudes may continue (1) e.g. other workers may

    make the working environment uncomfortable for women (1).

    •

    women may emigrate (1) leaving the labour force (1)

    •

    working hours may increase (1) making it more difficult for women to

    combine work and home life (1).

    •

    An increase in income / higher household income (1) may enable

    women to work fewer hours / reduce need to work (1).

    6 Extract from the source material:

    There is a range of influences on whether

    women enter the labour force. These include

    social attitudes, female education and whether

    childcare facilities and part-time work are

    available.

    No marks for just reproducing these words.

    Interpretation needed e.g. more part-time work.

    Many of the influences can be given either way

    but only reward identification of the influence

    once e.g., one mark for there may be increase

    in childcare facilities or a decrease in childcare

    facilities.

    0455/22

    February/March 2025

