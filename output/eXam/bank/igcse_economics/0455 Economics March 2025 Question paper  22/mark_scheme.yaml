  mark_scheme_answer: 'Discuss whether or not foreign MNCs reduce poverty in their
    host

    countries.

    Award up to 4 marks for logical reasons why they might, which may

    include:

    •

    they may increase employment / reduce unemployment (1) which

    may increase incomes / increase wages (1) cause economic growth /

    raise GDP (1) enabling people to buy more basic necessities / raise

    purchasing power (1).

    •

    may train workers (1) increase skills (1).

    •

    they may have lower costs of production / more efficient (1) use

    more advanced technology (1) may take advantage of economies of

    scale (1) able to charge lower prices (1).

    •

    they may pay tax / less may be spent on unemployment benefit (1)

    some of this could be spent on e.g. education / healthcare / training

    unemployed (1) income could be redistributed (1).

    Award up to 4 marks for logical reasons why it might not, which may

    include:

    •

    they may replace domestic firms / drive domestic firms out of

    business (1) may employ workers from their own countries (1)

    leaving employment / unemployment unchanged (1).

    •

    they may use capital-intensive methods (1) reducing demand for

    unskilled workers (1).

    •

    they may use up non-renewable resources (1) reducing incomes in

    the future / raising prices (1).

    •

    they may send profits back home (1) making them unavailable for re-

    investment in the host country (1).

    •

    may increase relative poverty / not reduce relative poverty (1) may

    widen gap in pay between e.g. skilled and unskilled workers (1).

    •

    may become a monopoly (1) charge high prices (1).

    6 Apply this example to all questions with the

    command word DISCUSS

    (1g, 1h, 2d, 3d, 4d and 5d)

    Each point may be credited only once, on either

    side of an argument, but separate development

    as to how/why the outcome may differ is

    rewarded.

    Generic example

    Mark

    Tax revenue may decrease…

    1

    ...because of reason e.g. incomes

    may be lower.

    1

    Tax revenue may increase because

    incomes may be higher i.e. reverse

    of a previous argument.

    0

    Tax revenue may increase because

    of a different reason i.e. not the

    reverse of a previous argument e.g.

    government spending on subsidies

    may stimulate the economy more

    than spending on education.

    1

    Extract from the source material:

    More MNCs may affect poverty because of the

    possible effects on unemployment and prices.

    0455/22

    February/March 2025

    Guidance'
