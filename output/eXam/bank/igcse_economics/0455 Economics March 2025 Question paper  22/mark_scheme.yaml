  mark_scheme_answer: 'Analyse the influences on whether supply of a product is elastic
    or

    inelastic.

    Coherent analysis which might include:

    Elasticity of supply is a measure of the responsiveness of supply to a

    change in price / formula / elastic supply is when pes is > 1/ inelastic

    supply is when pes <1 (1).

    Elastic supply occurs when supply changes by a greater percentage than

    the change in price / inelastic supply is when supply changes by a

    smaller percentage than the change in price (1).

    Whether the product can be stored / non-perishable (1) if it can be, it will

    be elastic (1) able to adjust supply quickly to changes in price (1) as if

    price rises, goods can be taken out of storage (1).

    Whether the production time is short (1) if so, output can be increased

    quickly to take advantage of higher prices (1).

    Cost of altering supply (1) if it is costly to alter the supply, supply is likely

    to be inelastic (1).

    Whether there are unemployed resources / level of capacity (1) if there

    are, supply can be adjusted by taking on more resources (1).

    Whether resources / factors of production are mobile (1) if they can

    change use / location (1).

    Time (1) supply usually becomes more elastic, the longer the time period

    (1).

    Level of competition (1) supply is likely to be more elastic in a competitive

    than in a monopoly market (1).

    6

    0455/22

    February/March 2025

    Guidance'
