    demand for foreign

    currency.


    (a) Identify two costs of unemployment.

    [2]


    (b) Explain how the key resource allocation decisions are made in a mixed economic
    system.


    [4]


    (c) Analyse the causes of an increase in the demand for foreign currency.

    [6]


    (d) Discuss whether or not inflation will harm a country’s firms.

