- number: '2'
  question_type: short_answer
  marks: 0
  text: "2\n(a) A student used DCPIP solution to compare the concentration of vitamin\
    \ C in five solutions.\n\nThe student used this method:\n•\nPut 1 cm3 of 1% DCPIP\
    \ solution into a test-tube.\n•\nUse a syringe to add drops of 125 mg per dm3\
    \ vitamin C solution to the test-tube.\n•\nKeep adding drops of vitamin C solution\
    \ until the DCPIP solution becomes colourless.\n•\nRecord the total volume of\
    \ the 125 mg per dm3 vitamin C solution added.\n\nThis method was repeated with\
    \ four other concentrations of vitamin C solution.\n\n(i) State the expected colour\
    \ of the DCPIP solution before the vitamin C solution was\nadded [1]\n\n(ii) State\
    \ two variables that were kept constant by the student in this investigation.\n\
    1   2   [2]\n\nThe results of the investigation are shown in Table 2.1.\nTable\
    \ 2.1\nconcentration of vitamin C\n/ mg per dm3\ntotal volume of vitamin C\nsolution\
    \ added / cm3\n 125\n1.6\n 250\n1.4\n 500\n1.1\n 750\n0.8\n1000\n0.5\n,\t,\n\n\
    (b) (i) Plot a line graph on the grid of the data in Table 2.1.\n\n[4]\n\n(ii)\
    \ The student tested a sample of orange juice.\n\n They found that 1.2 cm3 of\
    \ orange juice was needed to react with 1 cm3 of 1% DCPIP\nsolution.\n\n Use your\
    \ graph to estimate the vitamin C concentration of the orange juice.\n\n Show\
    \ on the graph how you obtained your estimate mg per dm3\n[2]\n,\t,\n\n(c) The\
    \ student wanted to investigate the effect of storage on the vitamin C concentration\
    \ in\napple juice.\n\nThree samples of fresh apple juice and three samples of\
    \ stored apple juice were tested.\n\nThe results are shown in Table 2.2.\nTable\
    \ 2.2\nsample\nconcentration of\nvitamin C in fresh\napple juice\n/ mg per dm3\n\
    concentration of\nvitamin C in stored\napple juice\n/ mg per dm3\n1\n281\n170\n\
    2\n276\n 96\n3\n272\n104\n\n(i) State a conclusion for the data shown in Table\
    \ 2.2 [1]\n\n(ii) The student decided that the result of one sample shown in Table\
    \ 2.2 was anomalous.\n\n State what is meant by an anomalous result [1]\n\n(iii)\
    \ Draw a circle around the anomalous result in Table 2.2.\n[1]\n,\t\t,\n\n(iv)\
    \ Using the data for sample 3 in Table 2.2, calculate the percentage change in\
    \ the\nvitamin C concentration of the apple juice when it is stored.\n\n Give\
    \ your answer to one decimal place.\n\n Space for working % [3]\n,\n,\n\n(d) Fig.\
    \ 2.1 is a photograph of a fruit from a strawberry plant, Fragaria ananassa, that\
    \ has been\ncut in half.\nP\nQ\nmagnification ×1.8\nFig. 2.1\n\n(i) Draw a large\
    \ diagram of the strawberry fruit shown in Fig. 2.1.\n\n[4]\n,\t,\n\n(ii) Line\
    \ PQ in Fig. 2.1 represents the maximum diameter of the strawberry fruit.\n\n\
    \ Measure the length of line PQ in Fig. 2.1.\nlength of PQ   mm\n\n Calculate\
    \ the actual diameter of the strawberry fruit using the formula and your\nmeasurement.\n\
    magnification =\nlength of line PQ in Fig. 2.1\nactual diameter of the strawberry\
    \ fruit\n\n Give your answer to three significant figures.\n\n Space for working\
    \ mm\n[3]\n\n(e) Describe a method the student could use to test a strawberry\
    \ fruit for reducing sugars [2]\n\n[Total: 24]\n,\t,"
