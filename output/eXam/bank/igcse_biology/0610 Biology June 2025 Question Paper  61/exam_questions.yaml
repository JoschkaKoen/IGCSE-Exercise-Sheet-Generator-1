  text: "1\nA student investigated the effect of concentration on diffusion.\n\nThe\
    \ student used pieces of agar which contained universal indicator. Universal indicator\
    \ is green\nin substances with a neutral pH and red in substances with an acidic\
    \ pH.\n\nThe student placed the pieces of agar into different concentrations of\
    \ hydrochloric acid solution\nand measured the time taken for the acid to diffuse\
    \ to the centre of each piece of agar. At the start\nof the investigation the\
    \ agar was green.\n\nThe student used this method:\n\nStep 1\n Label four test-tubes\
    \ 0.4, 0.6, 0.8, 1.0.\n\nTable 1.1 shows the volumes of 1.0 mol per dm3 hydrochloric\
    \ acid solution and distilled water used\nto make the different concentrations\
    \ of hydrochloric acid solution.\nTable 1.1\nconcentration of\nhydrochloric acid\
    \ solution\n/ mol per dm3\nvolume of 1.0 mol per dm3\nhydrochloric acid\nsolution\
    \ / cm3\nvolume of distilled water\n/ cm3\n0.4\n4\n6\n0.6\n6\n4\n0.8\n8\n2\n1.0\n\
    10\n0\n\nStep 2\n Use a 10 cm3 syringe to put the volumes of 1.0 mol per dm3 hydrochloric\
    \ acid solution\nshown in Table 1.1 into the test-tubes labelled 0.4, 0.6, 0.8,\
    \ 1.0.\n\nStep 3\n Use the 10 cm3 syringe to put the volumes of distilled water\
    \ shown in Table 1.1 into the\ntest-tubes labelled 0.4, 0.6, 0.8, 1.0.\n\nStep\
    \ 4\n A block of agar which measures approximately 1 cm × 2 cm × 2 cm is provided.\
    \ Use the\nknife to cut the agar block into four pieces.\nagar block\nnot to scale\n\
    white tile\nFig. 1.1\n,\t,\n\nStep 5\nPlace all the test-tubes into a warm water-bath.\n\
    \nStep 6\n Put one agar piece into each of the test-tubes and immediately start\
    \ the stop-clock.\nObserve the colour of the agar pieces as they change from green\
    \ to red.\n\nThe student recorded the time taken for each piece of agar to become\
    \ completely red.\n\nThe stop-clocks from step 6 are shown in Fig. 1.2.\nminutes:seconds\n\
    0.4\nminutes:seconds\n0.6\nminutes:seconds\n0.8\nminutes:seconds\n1.0\nFig. 1.2\n\
    \n(a) (i) Prepare a table to record the results of the investigation.\n\n Convert\
    \ the times on the stop-clocks shown in Fig. 1.2 to seconds and record these\n\
    times in your table.\n\n[4]\n,\t,\n\n(ii) State a conclusion for the results [1]\n\
    \n(iii) State the independent and dependent variables in this investigation.\n\
    independent variable   dependent variable   [2]\n\n(iv) Suggest two improvements\
    \ to the method used for this investigation.\n1   2   [2]\n\n(v) Identify two\
    \ hazards in this investigation [1]\n,\t,\n\n(b) Plan an investigation to determine\
    \ the effect of temperature on osmosis in potato plant tissue [6]\n\n[Total: 16]\n\
    ,\t,"
