  text: "5\nA student investigated the effect of humidity on water vapour loss in\
    \ plant leaves. As water vapour\nwas lost, the mass of the leaves decreased.\n\
    \nSimilar‑sized leaves were collected from one species of plant.\n\nThe leaves\
    \ were divided into two groups, A and B. The leaves in group A were placed in\
    \ a low\nhumidity environment and the leaves in group B were placed in a high\
    \ humidity environment. The\nleaves in each group were kept in their environment\
    \ for 12 hours.\n\nThe temperature in each environment was maintained at 20 °C.\n\
    \nThe mass of the leaves in each group was measured at the start of the investigation\
    \ and then\nevery hour throughout the 12‑hour period.\n\nThe student calculated\
    \ the mass of water vapour lost as a percentage of the starting mass of the\n\
    leaves for each group.\n\nFig. 5.1 shows the student’s results.\n0\n0\n5\n10\n\
    15\n20\n25\n30\n35\n1\n2\n3\n4\n5\n6\ntime / hours\nmass of water\nvapour lost\
    \ from\nthe leaves as a\npercentage of\nthe starting\nmass\n7\n8\n9\n10\n11\n\
    12\nA\nkey\nB\nlow humidity environment\nhigh humidity environment\nFig. 5.1\n\
    \n(a) (i) State the name of the process by which water vapour is lost from plant\
    \ leaves [1]\n,\t,\n\n(ii) Compare and explain the effects of high and low humidity\
    \ shown in Fig. 5.1 [5]\n\n(iii) The students repeated the investigation at a\
    \ temperature of 35 °C.\n\n The leaves were kept in a low humidity environment.\n\
