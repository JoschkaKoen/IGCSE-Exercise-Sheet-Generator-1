  text: "2\nA student investigated the effect of temperature on the rate of respiration\
    \ in yeast cells.\n\nThey used the apparatus shown in Fig. 2.1.\nclamp\nmeasuring\n\
    cylinder\nwater\nwater-bath\nyeast\nsuspension\nFig. 2.1\n\nThe student used this\
    \ method:\n•\nPut 25 cm3 of yeast suspension into a test-tube.\n•\nPut the test-tube\
    \ into a water-bath and add water at 10 °C to the water-bath.\n•\nLeave the apparatus\
    \ for five minutes before moving on to the next step.\n•\nStart a stop-clock and\
    \ count the number of bubbles produced by the respiring yeast cells in\nthree\
    \ minutes.\n•\nRepeat the procedure using a water-bath maintained at different\
    \ temperatures.\n\n(a) (i) State two variables that the student kept constant\
    \ in this investigation.\n1   2   [2]\n\n(ii) State one possible source of error\
