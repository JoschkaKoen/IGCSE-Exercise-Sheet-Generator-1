  text: "1\nYeast cells produce an enzyme called invertase. Invertase catalyses the\
    \ breakdown of sucrose\ninto reducing sugars. Sucrose is not a reducing sugar.\n\
    \nA student investigated the effect of two different concentrations of invertase\
    \ extract on a sucrose\nsolution.\n\nThe student used this method:\n\nStep 1\n\
    Label three test-tubes A, B and W.\n\nStep 2\nUse a syringe to put 2 cm3 of sucrose\
    \ solution into all three test-tubes.\n\nStep 3\nUse a clean syringe to put 2\
    \ cm3 of 100% invertase extract into test-tube A.\n\nStep 4\nUse a clean syringe\
    \ to put 2 cm3 of 10% invertase extract into test-tube B.\n\nStep 5\nUse a clean\
    \ syringe to put 2 cm3 of distilled water into test-tube W.\n\nStep 6\nPut all\
    \ three test-tubes in a warm water-bath at 40 °C for 15 minutes.\n\nStep 7\nMeasure\
    \ the temperature of the liquid in the test-tubes.\n\n(a) State the name of the\
    \ piece of equipment that is used to measure temperature [1]\n\nStep 8\nUse a\
    \ clean syringe to add 4 cm3 of Benedict’s solution to all three test-tubes.\n\
    \nStep 9\nPlace all three test-tubes into a hot water-bath for five minutes.\n\
    \nStep 10 After five minutes, record the colour of the liquid in each test-tube.\n\
    \nFig. 1.1 shows the notes the student made about their observations in step 10.\n\
    the liquid in test-tube A is brick-red\nthe liquid in test-tube B is green\nW\
    \ remains blue\nFig. 1.1\n,\t,\n\n(b) Prepare a table and record the results of\
    \ this investigation using the information in Fig. 1.1.\n\n[3]\n\n(c) State a\
    \ conclusion for the results shown in test-tube A and test-tube B [1]\n\n(d) Explain\
    \ the purpose of test-tube W [2]\n\n(e) State the independent variable in this\
    \ investigation [1]\n\n(f) Explain why the test-tubes were placed in the warm\
    \ water-bath in step 6 [1]\n,\t,\n\n(g) Explain why a clean syringe was used in\
    \ steps 3, 4 and 5 [1]\n\n(h) Invertase is a protein.\n\nState the reagent used\
    \ to test for the presence of protein [1]\n\n[Total: 11]\n,\t,"
