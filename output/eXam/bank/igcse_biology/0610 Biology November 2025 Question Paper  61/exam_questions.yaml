  text: "1\nA student investigated the effect of temperature on the movement of water\
    \ in celery stalks. The\nwater contained a blue dye.\n\nIn plant stems such as\
    \ a celery stalk, water moves in the xylem tissue within the vascular bundles.\n\
    \nThe student used this method:\n\nStep 1\nTake two stalks of celery and cut them\
    \ so that they are both 10 cm long.\n\nStep 2\nPrepare an ice-cold water-bath\
    \ C and a warm water-bath W.\n\nPlace a beaker of blue dye into each water-bath,\
    \ as shown in Fig. 1.1.\nlarge\nbeaker C\ncontaining\nice-cold\nwater\nlarge\n\
    beaker W\ncontaining\nwarm water\nblue dye\nblue dye\nFig. 1.1\n\nStep 3\nMeasure\
    \ the temperatures of the water in water-bath C and water-bath W.\n\nStep 4\n\
    Let the blue dye equilibrate in the water-baths for three minutes.\n\nStep 5\n\
    \ After three minutes, place one celery stalk into each beaker of blue dye, as\
    \ shown\nin Fig. 1.2.\n\nKeep the celery stalks in the blue dye for ten minutes.\n\
    10 cm long\ncelery stalk\nnot to scale\nwater-bath\nblue dye\nFig. 1.2\n\nStep\
    \ 6\n After ten minutes, measure the final temperatures of the water in water-bath\
    \ C and\nwater-bath W.\n,\t,\n\n(a) (i) Complete Table 1.1 by calculating the\
    \ change in the water temperature for each water-bath.\nTable 1.1\nwater-bath\n\
    water temperature\nin step 3 / °C\nwater temperature\nin step 6 / °C\nchange in\
    \ water temperature\n/ °C\nC\n 4\n15\n W\n40\n28\n [1]\n\nStep 7\nRemove the celery\
    \ stalk from the blue dye in water-bath C and put it on a white tile.\n\nStep\
    \ 8\n Cut a section across the celery stalk 5 mm from the end that was in the\
    \ blue dye, as\nshown in Fig. 1.3.\nend of the celery stalk that\nwas in the blue\
    \ dye\ncut across the celery stalk to\nform a 5 mm wide section\nnot to scale\n\
    Fig. 1.3\n\nStep 9\nExamine the xylem tissue of the cut section of celery stalk\
    \ to see if the blue dye is visible.\n\nFig. 1.4 shows the position of the xylem\
    \ tissue in a cut section of a celery stalk.\nposition of the xylem\nFig. 1.4\n\
    \nStep 10  If the blue dye is still visible in the celery stalk, cut another 5\
    \ mm wide section from the\ndyed end of the remaining part of the celery stalk.\n\
    \n Continue cutting 5 mm wide sections from the celery stalk until the blue dye\
    \ is no longer\nvisible in the cut section.\n\nStep 11  Count the number of sections\
    \ you have cut from the celery stalk that contain the blue dye.\n\nStep 12 Repeat\
    \ steps 7 to 11 with the celery stalk from water-bath W.\n,\t,\n\nThe student’s\
    \ results are shown in Fig. 1.5.\nnumber of 5 mm wide sections cut\nfrom the celery\
    \ stalk in C = 4\nnumber of 5 mm wide sections cut\nfrom the celery stalk in W\
    \ = 13\nFig. 1.5\n\n(ii) Prepare a table and record the results shown in Fig.\
    \ 1.5.\n\n Include the number of sections cut and the total distance moved by\
    \ the blue dye in each\ncelery stalk.\n\n[4]\n,\t,\n\n(iii) Calculate the rate\
    \ of movement of the blue dye in the celery stalk in beaker W.\n\n Include the\
    \ unit [2]\n\n(iv) State a conclusion for this investigation [1]\n\n(v) This investigation\
    \ was only done once.\n\n Explain why it is better to repeat an investigation\
    \ [1]\n\n(b) Identify two variables that were kept constant in this investigation.\n\
    1   2   [2]\n\n(c) (i) The data you have recorded in Table 1.1 may indicate that\
    \ there is a source of error with\nthe method used in this investigation.\n\n\
    \ Identify the possible error, and describe an improvement to the method to reduce\
    \ the\neffect of this error.\nerror   improvement   [2]\n,\t,\n\n(ii) In step\
    \ 9, it is difficult to determine precisely the final position of the blue dye\
    \ in the xylem.\n\n Suggest an improvement to the method that would reduce this\
    \ source of error [1]\n\n(d) Xylem forms cylinder-like structures in a celery\
    \ stalk.\n\nCalculate the volume of a cylinder which is 100 mm long and has a\
