questions:
  - number: "3"
    type: long_answer
    text: |
      Hydrogencarbonate indicator can be used to determine the concentration of carbon dioxide in a solution. The table shows the colour of the indicator at different concentrations of carbon dioxide.

      \begin{tabular}{|l|l|}
      \hline
      \begin{tabular}[c]{@{}l@{}}carbon dioxide\\ concentration\end{tabular} & \begin{tabular}[c]{@{}l@{}}hydrogencarbonate\\ indicator colour\end{tabular} \\ \hline
      high & yellow \\ \hline
      medium & red \\ \hline
      low & purple \\ \hline
      \end{tabular}

      Aquatic plants photosynthesise and use up carbon dioxide when in the light. Aquatic plants respire and produce carbon dioxide in the light and in the dark.

      When the carbon dioxide produced is equal to carbon dioxide used, hydrogencarbonate indicator is red.

      Using an aquatic plant, plan an investigation to determine the light intensity at which the rate of photosynthesis is equal to the rate of respiration. [6]