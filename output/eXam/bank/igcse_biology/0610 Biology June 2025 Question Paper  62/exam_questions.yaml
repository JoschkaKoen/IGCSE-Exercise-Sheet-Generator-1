- number: '2'
  question_type: short_answer
  marks: 0
  text: "2\n(a) The enzyme pectinase is used in the production of apple juice.\n\n\
    In an experiment, a student investigated the production of apple juice using five\
    \ different\nconcentrations of pectinase solution.\n\nFor each concentration,\
    \ the student:\n•\nput 100 g of crushed apple into a beaker\n•\nadded 10 cm3 of\
    \ the pectinase solution to the crushed apple\n•\nleft the crushed apple and enzyme\
    \ mixture for 30 minutes at 40 °C\n•\nfiltered the apple juice from the mixture\n\
    •\nmeasured the volume of apple juice produced.\n\n(i) The temperature was maintained\
    \ at 40 °C.\n\n Describe how the student could maintain the crushed apple and\
    \ enzyme mixture at a\nconstant temperature [1]\n\n(ii) State two other variables\
    \ that were kept constant in this investigation.\n1   2   [2]\n\n(b) The results\
    \ of this investigation are shown in Table 2.1.\nTable 2.1\npercentage concentration\n\
    of the pectinase solution\nvolume of apple juice\nproduced / cm3\n0.1\n4\n0.2\n\
    6\n0.4\n12\n0.8\n22\n1.6\n22\n\n(i) Plot a line graph on the grid of the data\
    \ in Table 2.1.\n\n[4]\n\n(ii) Use your graph to estimate the volume of apple\
    \ juice produced with a 0.5% pectinase\nsolution.\n\n Show on your graph how you\
    \ obtained your answer cm3\n\n[2]\n\n(iii) Describe the effect of pectinase solution\
    \ concentration on apple juice production [1]\n\n(iv) Pectinase is used to produce\
    \ apple juice commercially.\n\n Suggest what extra data would be required to determine\
    \ if a 0.8% pectinase solution is\nthe optimum concentration for the production\
    \ of apple juice [1]\n\n(v) Draw and label the apparatus the student could use\
    \ to filter and measure the volume of\napple juice produced.\n\n[3]\n\n[Total:\
    \ 14]"
