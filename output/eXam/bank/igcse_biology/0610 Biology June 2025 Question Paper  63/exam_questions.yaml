  text: "2\n(a) Fig. 2.1 is a photograph of an acorn from a Caucasian oak, Quercus\
    \ macranthera.\nQ\nP\nmagnification ×3.4\nFig. 2.1\n\n(i) Make a large drawing\
    \ of the acorn in Fig. 2.1.\n[4]\n,\t,\n\n(ii) Line PQ represents the length of\
    \ the acorn in Fig. 2.1.\n\n Measure the length of line PQ in Fig. 2.1.\n\n length\
    \ of line PQ  mm\n\n Calculate the actual length of the acorn using the formula\
    \ and your measurement.\nmagnification = length of line PQ in Fig. 2.1\nactual\
    \ length of the acorn\n\n Give your answer to two significant figures.\n\n Space\
    \ for working mm\n\n[3]\n,\t,\n\n(iii) Fig. 2.2 shows photographs of acorns from\
    \ a Caucasian oak and from a Turkey oak,\nQuercus cerris.\nmagnification ×3.4\n\
    cupule\nnut\nFig. 2.2\n\n Describe two visible differences between the acorns\
    \ in Fig. 2.2.\n1   2   [2]\n\n(b) Different species of oak tree have acorns of\
    \ different masses.\n\nScientists investigated if the mass of acorns affected\
    \ the proportion of acorns that germinated\nin three different species of oak\
    \ tree.\n•\nThe scientists took 100 acorns from each of three species of oak tree.\n\
    •\nThe mass of each acorn was measured and recorded.\n•\nEach acorn was then placed\
    \ in a pot with the same type of soil in a dark room at 25 °C\nand watered every\
    \ 48 hours.\n•\nThe scientists recorded the proportion of acorns that had germinated\
    \ in 60 days.\n\n(i) State two factors that were kept constant in the investigation\
    \ described in 2(b).\n1   2   [2]\n,\t\t,\n\nThe results are shown in Table 2.1.\n\
    Table 2.1\nspecies of\noak tree\nmean mass\nof acorns / g\nproportion of\nacorns\
    \ that\ngerminated\nA\n0.52\n0.44\nB\n1.92\n0.56\nC\n2.30\n0.64\n\n(ii) Plot a\
    \ bar chart on the grid of all the data in Table 2.1.\n\n Include a key on your\
    \ bar chart.\n\n[4]\n\n(iii) The study measured 100 acorns for each species.\n\
    \n Suggest why a large number of acorns was measured [1]\n,\n,\n\n(iv) Water is\
    \ required for germination.\n\n The scientists measured the mass of one acorn\
    \ from each species. The acorns were\nthen dried in an oven and the mass of each\
    \ acorn was measured again. The scientists\nused these data to calculate the percentage\
    \ water content of the acorns.\n\n The results are shown in Table 2.2.\nTable\
    \ 2.2\nspecies of oak tree\ninitial mass of the acorn\n/ g\ndried mass of the\
    \ acorn\n/ g\npercentage water\ncontent of the acorn\nA\n0.49\n0.36\n26.5\nB\n\
    1.96\n0.74\nC\n2.34\n0.98\n58.1\n\n Calculate the percentage water content of\
    \ the acorn from species B % [1]\n\n(c) State the name of the reagent used to\
    \ test for protein [1]\n\n[Total: 18]\n,\t,"
