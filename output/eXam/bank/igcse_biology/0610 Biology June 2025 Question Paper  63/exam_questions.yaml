  text: "1\nPotato cells contain the enzyme catalase. Catalase catalyses the breakdown\
    \ of hydrogen peroxide\ninto water and oxygen gas. The oxygen gas forms a foam.\
    \ The height of the foam indicates how\nactive the enzyme is.\n\nA student investigated\
    \ the effect of temperature on the activity of the enzyme catalase.\n\nThe student\
    \ used this method:\n\nStep 1\nLabel three test-tubes C, R and H.\n\nStep 2\n\
    \ Use a syringe to add 4 cm3 of hydrogen peroxide solution to each of the test-tubes\n\
    labelled C, R and H.\n\nStep 3\nPlace test-tube C into a cold water-bath.\n\n\
    Step 4\nPlace test-tube R in a test-tube rack to keep it at room temperature.\n\
    \nStep 5\nPlace test-tube H into a hot water-bath.\n\nStep 6\nLeave the test-tubes\
    \ for five minutes.\n\nStep 7\n After five minutes, use a clean syringe to add\
    \ 1 cm3 of potato extract to test-tube C. Start\nthe stop-clock.\n\nStep 8\nRepeat\
    \ step 7 for test-tube R and test-tube H.\n\nFig. 1.1 shows the test-tubes 30\
    \ seconds after adding the potato extract.\nC\nR\nH\nfoam\npotato extract and\
    \ hydrogen\nperoxide solution\nFig. 1.1\n,\t,\n\n(a) (i) Prepare a table for the\
    \ results of the investigation.\n\n Measure the maximum height of the foam, in\
    \ mm, in each of test-tubes C, R and H\nshown in Fig. 1.1.\n\n Record these measurements\
    \ in your table.\n\n[4]\n\n(ii) State a conclusion for these results [1]\n\n(iii)\
    \ State the independent and dependent variables in the investigation.\nindependent\
    \ variable   dependent variable   [2]\n,\t,\n\n(iv) Explain why test-tube C and\
    \ test-tube H were kept in the water-baths for five minutes in\nstep 6 [1]\n\n\
    (v) The student suggests repeating the investigation twice more.\n\n Explain how\
    \ this would give you more confidence in these results [1]\n\n(vi) Potato extract\
    \ can be prepared by cutting a potato into pieces and then grinding it with a\n\
    mortar and pestle and some water.\n\n Describe a safety precaution that would\
    \ reduce the hazards in producing potato extract\nusing this method [1]\n\n(b)\
    \ (i) Another student did the same experiment and measured the height of the foam\
    \ in one of\nthe test-tubes as 29 mm. The diameter of the test-tube was 25 mm.\n\
    \n Calculate the volume of foam produced, and give your answer in cm3 to one decimal\n\
    place.\n\n Use 3.14 as the value for π cm3 [3]\n\n(ii) Suggest a more accurate\
    \ method of measuring the volume of oxygen gas produced [1]\n,\t,\n\n(c) Potatoes\
    \ are a source of starch and vitamin C.\n\n(i) Iodine solution was used to test\
    \ a sample of potato for starch.\n\n State the result of a positive test for starch\
    \ [1]\n\n(ii) State the name of a reagent that can be used to test for vitamin\
    \ C [1]\n\n(d) Photosynthesis also produces oxygen gas.\n\nPlan an investigation\
    \ to determine the effect of light intensity on the rate of photosynthesis in\n\
    aquatic plants [6]\n\n[Total: 22]\n,\t,"
