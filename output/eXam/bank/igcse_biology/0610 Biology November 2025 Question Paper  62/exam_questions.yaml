    \ the diameter of the necklace starfish.\n\n Measure the length of line PQ in\
    \ Fig. 3.1.\nlength of line PQ  mm\n\n Calculate the actual diameter of the necklace\
    \ starfish using the formula and your\nmeasurement.\nmagnification =\nlength of\
    \ line PQ in Fig. 3.1\nactual diameter of the necklace starfish\n\n Give your\
    \ answer to two significant figures.\n\n Space for working mm\n\n[3]\n,\n,\n\n\
    (iii) Fig. 3.2 is a photograph of a spiny starfish, Marthasterias glacialis. Fig.\
    \ 3.3 is a\nphotograph of a necklace starfish.\n\n The magnifications of the photographs\
    \ are not the same.\nspiny starfish\nnecklace starfish\n\nFig. 3.2\n\nFig. 3.3\n\
    \n State two ways the spiny starfish in Fig. 3.2 differs from the necklace starfish\
    \ in Fig. 3.3,\nand one way it is similar.\n\n Do not include references to size\
    \ in your answer.\ndifference 1  difference 2  similarity 1   [3]\n,\t,\n\n(b)\
    \ Seven‑armed starfish live in the sea.\n\nScientists investigated the distribution\
