  text: "1\nA student investigated the rate of respiration in yeast using different\
    \ concentrations of glucose.\n\nThey used a 5% glucose solution to make a 1% glucose\
    \ solution and a 4% glucose solution.\n\nThe student used this method:\n\nStep\
    \ 1\nLabel two small test‑tubes 1% and 4%.\n\nStep 2\nUse a syringe to put 1 cm3\
    \ of 5% glucose solution into the small test‑tube labelled 1%.\n\nPut 4 cm3 of\
    \ 5% glucose solution into the small test‑tube labelled 4%.\n\nStep 3\nUse a clean\
    \ syringe to put 4 cm3 of distilled water into the small test‑tube labelled 1%.\n\
    \nPut 1 cm3 of distilled water into the small test‑tube labelled 4%.\n\nStep 4\n\
    Pour yeast suspension into the small test‑tube labelled 1% until it is completely\
    \ full.\n\nStep 5\n Keep the small test‑tube upright and carefully place a large\
    \ test‑tube over the top of the\nsmall test‑tube labelled 1%. Push the small test‑tube\
    \ up to the top of the large test‑tube,\nas shown in Fig. 1.1A. Quickly invert\
    \ the test‑tubes, as shown in Fig. 1.1B.\nfinger holding the small test-tube in\
    \ position\nwhile the test-tubes are inverted\nB\nC\nA\nwater-bath\ncontaining\n\
    warm\nwater\nlarge\ntest-tube\nsmall\ntest-tube\ncontaining\nyeast\nsuspension\n\
    and glucose\nsolution\nFig. 1.1\n\nStep 6\n Put the large test‑tube and the small\
    \ test‑tube labelled 1% into a warm water‑bath, as\nshown in Fig. 1.1C.\n\nStep\
    \ 7\nStart the stop‑clock and wait for five minutes.\n,\t,\n\nStep 8\n After five\
    \ minutes, stop the stop‑clock and use a ruler to measure the height of the yeast\n\
    suspension in the large test‑tube, as shown in Fig. 1.2.\nheight of the yeast\n\
    suspension in the\nlarge test-tube after\nfive minutes\nFig. 1.2\n\nStep 9\nRemove\
    \ the test‑tubes from the warm water‑bath and discard them.\n\nStep 10  Pour yeast\
    \ suspension into the small test‑tube labelled 4% until it is completely full.\n\
    \nStep 11 Repeat steps 5 to 8 with the small test‑tube labelled 4%.\n,\t,\n\n\
    (a) Fig. 1.3 is a diagram of the water‑baths in steps 8 and 11.\n1% glucose solution\n\
    4% glucose solution\nlarge test-tube\nFig. 1.3\n\n(i) Measure the height of the\
    \ yeast suspension in each of the large test‑tubes shown in\nFig. 1.3.\n\n Prepare\
    \ a table for the results and record your measurements from Fig. 1.3.\n\n[4]\n\
    ,\t,\n\n(ii) State a conclusion for the results of this investigation [1]\n\n\
    (iii) State the independent and dependent variables in this investigation.\nindependent\
    \ variable   dependent variable   [2]\n\n(iv) Describe how the temperature of\
    \ the water‑bath could be maintained [1]\n\n(v) Explain why a clean syringe was\
    \ used in step 3 [1]\n,\t,\n\n(b) A student extended the investigation by using\
    \ more concentrations of glucose solution.\n\nCalculate the volumes of 5% glucose\
    \ solution and distilled water that are needed to make\n5 cm3 of a 3% glucose\
    \ solution.\n\nvolume of 5% glucose solution   cm3\n\nvolume of distilled water\
    \   cm3\n\n[1]\n\n(c) Sports drinks often contain glucose, which is a reducing\
    \ sugar.\n\nState how you could test a sample of a sports drink for reducing sugar\
    \ [2]\n\n(d) (i) The ethanol emulsion test can be used to show that a sample of\
    \ food contains fat.\n\n State the result of a positive test [1]\n\n(ii) Suggest\
    \ one safety precaution that should be followed when using ethanol [1]\n\n[Total:\
