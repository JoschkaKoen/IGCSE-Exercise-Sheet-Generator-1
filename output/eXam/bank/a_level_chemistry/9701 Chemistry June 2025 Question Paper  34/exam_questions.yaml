  text: '\textbf{Qualitative analysis}


    For each test you should record all your observations in the spaces provided.


    Examples of observations include:

    \begin{itemize}

    \item colour changes seen

    \item the formation of any precipitate and its solubility (where appropriate)
    in an excess of the reagent added

    \item the formation of any gas and its identification (where appropriate) by a
    suitable test.

    \end{itemize}


    You should record clearly at what stage in a test an observation is made.


    Where no change is observed, you should write ‘no change’.


    Where reagents are selected for use in a test, the name or correct formula of
    the element or compound must be given.


    If any solution is warmed, a boiling tube must be used. If a solid is heated,
    a hard-glass test-tube must be used.


    Rinse and reuse test-tubes and boiling tubes where possible.


    No additional tests should be attempted.'
