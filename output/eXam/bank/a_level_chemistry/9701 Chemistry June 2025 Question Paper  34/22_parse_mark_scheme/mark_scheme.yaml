    Test 3 $FeSO_4$ & No change * (award one * if both no changes highlighted correctly recorded) & Green ppt * \newline (ppt) turns brown (on standing) * & Either solution OR turns AND yellow / yellow-orange / orange-brown / yellow-brown / (light) brown * \newline Fizzing * \newline (Gas / oxygen) relights a glowing splint (only award if not awarded in FB 8 test 1 above) \\ \hline
    \end{tabular}

    2 * = 1 mark (round down)
