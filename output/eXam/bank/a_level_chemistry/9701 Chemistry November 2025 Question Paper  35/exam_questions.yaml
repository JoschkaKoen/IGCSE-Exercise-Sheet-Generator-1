    \n(i) Give your answers to (c)(ii), (c)(iii) and (c)(iv) to the appropriate number\
    \ of significant\nfigures.\n[1]\n\n(ii) Calculate the amount, in mol, of manganate(VII)\
    \ ions, MnO4\n–, in the volume of FA 2\ncalculated in (b).\n\namount of MnO4\n\
    – =  mol [1]\n\n(iii) Calculate the amount, in mol, of ethanedioic acid that reacts\
    \ with the manganate(VII)\nions in (c)(ii).\n\namount of (COOH)2 =  mol\n\n Hence\
    \ calculate the concentration, in mol dm–3, of ethanedioic acid in FA 1.\n\nconcentration\
    \ of (COOH)2 =  mol dm–3\n\n[2]\n\n(iv) Calculate the relative molecular mass,\
    \ Mr, of the ethanedioic acid in FA 1.\n\nMr =  [1]\n\n(v) Calculate the value\
