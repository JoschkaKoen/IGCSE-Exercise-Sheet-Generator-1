  text: "2\nHydrated zinc sulfate has the formula ZnSO4•yH2O where y is an integer.\n\
    \nHydrated zinc sulfate decomposes when heated, losing only its water of crystallisation\
    \ and\nbecoming anhydrous.\n\nYou will determine the value of y in ZnSO4•yH2O\
    \ by heating the hydrated salt until it becomes\nanhydrous.\n\nFA 4 is hydrated\
    \ zinc sulfate, ZnSO4•yH2O.\n\n(a) Method\n\n●\nWeigh the crucible with its lid.\
    \ Record the mass in the space for Results.\n\n●\nAdd between 3.20 g and 3.40\
    \ g of FA 4 to the crucible.\n\n●\nWeigh the crucible with its lid and FA 4. Record\
    \ the mass.\n\n●\n Place the crucible on the pipeclay triangle. Gently heat the\
    \ crucible and contents for\napproximately 2 minutes with the lid on.\n\n●\nRemove\
    \ the lid. Heat the crucible and contents strongly for approximately 4 minutes.\n\
    \n●\nReplace the lid and leave the crucible and residue to cool for at least 5\
    \ minutes.\nYou may wish to begin work on Question 3 while the crucible is cooling.\n\
    \n●\nWeigh the crucible with its lid and its contents. Record the mass.\n\n●\n\
    Remove the lid. Heat the crucible strongly for approximately 3 minutes.\n\n●\n\
    Replace the lid and leave the crucible and residue to cool for at least 5 minutes.\n\
    \n●\nWeigh the crucible with its lid and its contents. Record the mass.\n\n●\n\
    Calculate the mass of FA 4 used and the mass of residue obtained. Record the masses.\n\
    \nResults\n\n[5]\nI\nII\nIII\nIV\nV\n,\t,\n\n(b) Calculations\n\n(i) Calculate\
    \ the amount, in mol, of anhydrous zinc sulfate residue formed in the\ndecomposition\
    \ of FA 4.\n\namount of ZnSO4 =  mol\n\n Calculate the amount, in mol, of water\
    \ of crystallisation lost.\n\namount of H2O =  mol\n\n[2]\n\n(ii) Calculate the\
    \ value of y in the formula ZnSO4•yH2O.\n\n Show your working.\n\ny =  [2]\n\n\
    (c) A student suggests using this thermal decomposition method to investigate\
    \ the number of\nmoles of water of crystallisation in hydrated ethanedioic acid.\
    \ The teacher says that this\nmethod is unsuitable.\n\nSuggest why this method\
    \ is unsuitable [1]\n\n[Total: 10]\n,\t,\nQualitative analysis\nFor each test\
    \ you should record all your observations in the spaces provided.\nExamples of\
    \ observations include:\n\n●\ncolour changes seen\n\n●\n the formation of any\
    \ precipitate and its solubility (where appropriate) in an excess of the reagent\n\
    added\n\n●\nthe formation of any gas and its identification (where appropriate)\
    \ by a suitable test.\nYou should record clearly at what stage in a test an observation\
    \ is made.\nWhere no change is observed, you should write ‘no change’.\nWhere\
    \ reagents are selected for use in a test, the name or correct formula of the\
    \ element or compound\nmust be given.\nIf any solution is warmed, a boiling tube\
    \ must be used. If a solid is heated, a hard-glass test-tube must\nbe used.\n\
    Rinse and reuse test-tubes and boiling tubes where possible.\nNo additional tests\
    \ should be attempted.\n,\t,"
