  text: "1\nHydrated ethanedioic acid is a diprotic acid with the formula (COOH)2•xH2O\
    \ where x is an integer.\n\nEthanedioic acid reacts with manganate(VII) ions when\
    \ heated.\n5(COOH)2(aq)  +  2MnO4\n–(aq)  +  6H+(aq)\n  10CO2(g)  +  2Mn2+(aq)\
    \  +  8H2O(l)\n\nYou will determine the value of x in (COOH)2•xH2O by titrating\
    \ a solution containing ethanedioic\nacid with manganate(VII) ions.\n\n●\nFA 1\
    \ is 6.20 g dm–3 aqueous ethanedioic acid, (COOH)2•xH2O.\n\n●\nFA 2 is 0.0200\
    \ mol dm–3 potassium manganate(VII), KMnO4.\n\n●\nFA 3 is 1.0 mol dm–3 sulfuric\
    \ acid, H2SO4.\n\n(a) Method\n\n●\nFill the burette with FA 2.\n\n●\nPipette 25.0\
    \ cm3 of FA 1 into a conical flask.\n\n●\nUse the measuring cylinder to add approximately\
    \ 20 cm3 of FA 3 to the conical flask.\n\n●\n Place the conical flask on a tripod\
    \ and gauze and heat carefully until the temperature of\nthe solution is approximately\
    \ 70 °C.\n\n●\nRemove the flame.\n\n●\nCarefully lift the hot conical flask and\
    \ place it on the white tile under the burette.\n\n●\n Add FA 2 drop-wise for\
    \ the first 2–3 cm3. Any initial pink colouring may take several\nseconds to disappear.\n\
    \n●\n If the reaction mixture turns brown, reheat it to about 70 °C. If the brown\
    \ colour disappears,\ncontinue the titration. If the brown colour remains, discard\
    \ the contents of the flask and\nbegin a new titration.\n\n●\nThe end-point is\
    \ reached when a permanent pale pink colour is formed.\n\n●\nPerform a rough titration\
    \ with FA 2. Record your burette readings in the space below.\nThe rough titre\
    \ is  cm3.\n\n●\nCarry out as many titrations as you think necessary to obtain\
    \ consistent results.\n\n●\nMake sure any recorded results show the precision\
    \ of your practical work.\n\n●\nRecord all your burette readings and the volume\
    \ of FA 2 added in each accurate titration.\n\nResults\n\n[7]\n\n(b) From your\
    \ accurate titration results, calculate a suitable mean value to be used in your\n\
    calculations.\n\nShow clearly how you obtained this value.\n\n25.0 cm3 of FA 1\
