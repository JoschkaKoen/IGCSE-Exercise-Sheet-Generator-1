  text: "1\nChromium, Cr, and its compounds are widely used in many chemical reactions.\n\
    \n(a) Cr exists as four stable isotopes.\n\n(i) The most common isotope of Cr\
    \ is chromium-52.\n\n Determine the number of protons, neutrons and electrons\
    \ in an atom of chromium-52.\n\n number of protons  neutrons  electrons  [1]\n\
    \n(ii) Describe how an atom of chromium-54 differs from an atom of chromium-52.\
    \ Refer to\nnumbers of particles in your answer [1]\n\n(iii) The relative isotopic\
    \ masses of the isotopes of Cr can be determined using mass\nspectrometry.\n\n\
    \ State what other information is needed to calculate the relative atomic mass,\
    \ Ar , of Cr [1]\n\n(iv) Atoms of 52Cr, 53Cr and 54Cr make up more than 95% of\
    \ naturally occurring chromium\natoms. The Ar of naturally occurring Cr is 51.996.\n\
    \n Suggest what these statements imply about the relative isotopic mass of the\
    \ fourth stable\nisotope of chromium [1]\n\n(b) The shorthand electronic configuration\
    \ of chromium is [Ar] 3d54s1.\n\n(i) Complete the full electronic configuration\
    \ of chromium 3d54s1\n[1]\n\n(ii) Deduce the total number of unpaired electrons\
    \ in an atom of chromium [1]\n,\t,\n\n(c) Acidified dichromate(VI) ions will convert\
    \ methanal, CH2O, to carbon dioxide. The movement\nof electrons to or from relevant\
    \ species is shown in the following half-equations.\n\nhalf-equation 1\nCH2O \
    \ +  H2O\n  CO2  +  4H+  +  4e–\n\nhalf-equation 2\nCr2O7\n2–  +  14H+  +  6e–\n\
    \  2Cr3+  +  7H2O\n\n(i) Identify the species that is reduced in half-equation\
    \ 2. Explain your answer [1]\n\n(ii) The oxidation state of the carbon atom in\
    \ methanal is 0.\n\n Calculate the oxidation state of carbon in carbon dioxide\
    \ [1]\n\n(iii) Construct the ionic equation for the reaction of dichromate(VI)\
    \ ions with methanal in\nacidic conditions [2]\n\n(iv) Methanal is a liquid at\
    \ –30 °C but carbon dioxide is a gas at this temperature. Explain\nwhy [2]\n,\t\
    ,\n\n(d) In acidic conditions, a dynamic equilibrium is established between CrO4\n\
    2–(aq) and\nCr2O7\n2–(aq).\n2CrO4\n2–(aq)  +  2H+(aq)\n  Cr2O7\n2–(aq)  +  H2O(l)\
    \   ΔH > 0\n\n(i) State what is meant by dynamic equilibrium [1]\n\n(ii) Identify\
    \ the condition necessary to establish dynamic equilibrium [1]\n\n(iii) CrO4\n\
    2–(aq) ions are yellow and Cr2O7\n2–(aq) ions are orange.\n\n State what is observed\
    \ when the following changes are made to an equilibrium mixture\nof acidified\
    \ CrO4\n2–(aq) and Cr2O7\n2–(aq) ions.\n\n Explain your answers.\n•\nThe equilibrium\
    \ mixture is warmed gently.\nobservation   explanation   •\nDilute HCl (aq) is\
    \ added to the equilibrium mixture.\nobservation   explanation   [4]\n\n(e) Chromium(IV)\
    \ fluoride, CrF4, is a covalent molecule that shows similar chemical properties\
    \ to\nSiCl 4.\n\nSuggest the type of reaction that occurs when CrF4 is placed\
    \ in water.\n\nConstruct a relevant equation for this reaction.\ntype of reaction\
    \   equation   [2]\n\n[Total: 20]\n,\t,"
