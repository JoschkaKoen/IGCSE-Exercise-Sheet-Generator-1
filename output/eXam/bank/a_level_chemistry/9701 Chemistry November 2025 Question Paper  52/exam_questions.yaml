  text: "1\nAqueous silver ions, Ag+(aq), react slowly with aqueous iron(II) ions,\
    \ Fe2+(aq). An equilibrium is\nestablished.\nAg+(aq)  +  Fe2+(aq)\n  Ag(s)  +\
    \  Fe3+(aq)\n\nThe concentration of Ag+(aq) at equilibrium can be determined by\
    \ titration with a standard solution\nof aqueous potassium thiocyanate, KSCN(aq).\n\
    \nDuring the titration, the remaining Ag+(aq) ions react with SCN–(aq) ions to\
    \ form a precipitate of\nAgSCN(s).\nAg+(aq)  +  SCN–(aq)\n  AgSCN(s)\n\nWhen all\
    \ Ag+(aq) ions have been removed from solution, excess SCN–(aq) ions react with\
    \ Fe3+(aq)\nto form a complex ion, FeSCN2+(aq), which has a red colour.\nFe3+(aq)\
    \  +  SCN–(aq)\n  FeSCN2+(aq)\n\nThe appearance of the red colour indicates the\
    \ end-point.\n\nA student carries out an experiment to determine the equilibrium\
    \ constant, Kc.\nKc =\n[Fe3+(aq)]eqm\n[Fe2+(aq)]eqm [Ag+(aq)]eqm\n\nThe student\
    \ makes 250.0 cm3 of 0.0200 mol dm–3 KSCN(aq) to use in the titration.\n\n(a)\
    \ Calculate the mass of solid potassium thiocyanate, KSCN(s), needed to make 250.0\
    \ cm3 of\n0.0200 mol dm–3 KSCN(aq).\n\nmass of KSCN(s) =   g [1]\n,\t,\n\n(b)\
    \ Describe how the student should make 250.0 cm3 of 0.0200 mol dm–3 KSCN(aq) starting\
    \ from\nthe mass of KSCN(s) calculated in (a) in a 50 cm3 beaker.\n\nGive the\
    \ name and size of any key apparatus used.\n\nWrite your answer using a series\
    \ of numbered steps [3]\n\n(c) The student uses the following method to determine\
    \ Kc.\n\nstep 1  Add 25.0 cm3 of 0.100 mol dm–3 aqueous silver nitrate, AgNO3(aq),\
    \ into a dry conical\nflask. Label this flask A.\n\nstep 2  Add 25.0 cm3 of 0.100\
    \ mol dm–3 aqueous iron(II) sulfate, FeSO4(aq), into flask A.\n\nstep 3  Seal\
    \ flask A, using a bung.\n\nstep 4  Allow flask A to stand for twelve hours.\n\
    \nstep 5  Transfer 10.0 cm3 of the mixture from flask A into another conical flask,\
    \ flask B,\nwithout disturbing the precipitate in flask A.\n\nstep 6  Titrate\
    \ the sample in flask B with 0.0200 mol dm–3 aqueous potassium thiocyanate,\n\
    KSCN(aq).\n\nstep 7  Repeat steps 5 and 6 until concordant values are obtained.\n\
    \n(i) Suggest why flask A is sealed with a bung in step 3 [1]\n\n(ii) Suggest\
    \ why flask A is left to stand for twelve hours in step 4 [1]\n\n(iii) Identify\
    \ the precipitate in flask A in step 5 [1]\n,\t,\n\n(d) The student’s results\
    \ are shown in Table 1.1\n\nTable 1.1\nrough\ntitration\ntitration 1\ntitration\
    \ 2\ntitration 3\nfinal burette\nreading / cm3\n22.50\n21.75\n31.65\n32.20\ninitial\
    \ burette\nreading / cm3\n0.00\n0.00\n9.75\n10.20\ntitre / cm3\n22.50\n21.75\n\
    21.90\n22.00\n\n(i) State if concordant titres have been achieved.\n\n Explain\
    \ your answer [1]\n\n(ii) Calculate the percentage error in the titre volume in\
    \ titration 2.\n\n Show your working.\n\npercentage error =   [1]\n\n(iii) The\
    \ student repeats the experiment using KSCN(aq) at a higher concentration. The\n\
    student obtains smaller titres.\n\n Suggest one reason why a larger titre is better\
    \ than a smaller titre [1]\n,\t,\n\n(e) Another student calculates a mean titre\
    \ of 21.85 cm3. Use this value to complete the following\ncalculation.\n\n(i)\
    \ Calculate [Ag+(aq)] in the equilibrium mixture in flask A.\n\n[Ag+(aq)]eqm =\
    \   mol dm–3 [1]\n\n(ii) Calculate [Fe3+(aq)] in the equilibrium mixture in flask\
    \ A.\n\n[Fe3+(aq)]eqm =   mol dm–3 [1]\n\n(iii) The formula for the equilibrium\
    \ constant, Kc, is shown.\nKc =\n[Fe3+(aq)]eqm\n[Fe2+(aq)]eqm [Ag+(aq)]eqm\n\n\
    \ Determine the value of Kc.\n\n Give the units of Kc.\n\nKc =   units   [2]\n\
    ,\t,\n\n(f) Several other students perform the same experiment at different temperatures.\
    \ The Kc values\nthat they obtain are used to produce the graph in Fig. 1.1.\n\
    280\n2.5\n2.7\n2.9\nKc\n/ units not shown\n3.1\n3.3\n2.6\n2.8\n3.0\n3.2\n3.4\n\
    3.5\n300\n320\n340\n360\ntemperature / K\n380\n\nFig. 1.1\n\n(i) One student suggests\
    \ that Kc is directly proportional to temperature.\n\n State and explain if the\
    \ results displayed in Fig. 1.1 support this suggestion [1]\n\n(ii) Another student\
    \ suggests that the data represented in the graph in Fig. 1.1 is reliable.\n\n\
    \ Explain how the graph supports this suggestion [1]\n,\t,\n\n(iii) Use the data\
    \ displayed in Fig. 1.1 to state if the forward reaction is exothermic or\nendothermic.\n\
    Ag+(aq)  +  Fe2+(aq)\n  Ag(s)  +  Fe3+(aq)\n\n Explain your answer.\nforward reaction\
    \  explanation   [1]\n[Total: 17]\n,\t,"
