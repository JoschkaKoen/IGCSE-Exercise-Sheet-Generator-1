    \nstep 3  Stir the mixture and record the conductivity of the contents of the\
    \ beaker as shown in\nFig. 2.1.\n\nstep 4  Repeat steps 2 and 3 until a total\
    \ of 40.00 cm3 of 0.100 mol dm–3 Ba(OH)2(aq) has\nbeen added to the beaker.\n\
