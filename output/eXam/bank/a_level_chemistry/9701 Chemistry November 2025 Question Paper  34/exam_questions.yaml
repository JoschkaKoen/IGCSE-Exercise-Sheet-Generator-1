  text: "2\nIn this experiment you will determine the percentage by mass of a sodium\
    \ halide impurity present\nin a sample of sodium hydrogencarbonate by titration.\n\
    NaHCO3(s)  +  HCl (aq)\n  NaCl (aq)  +  H2O(l)  +  CO2(g)\n\nFB 4 is an aqueous\
    \ solution made by dissolving 17.20 g of the impure sodium hydrogencarbonate\n\
    in each dm3 of solution.\n\nFB 5 is 0.200 mol dm–3 hydrochloric acid, HCl.\n\n\
    FB 6 is methyl orange indicator.\n\n(a) Method\n•\nFill the burette with FB 5.\n\
    •\nPipette 25.0 cm3 of FB 4 into a conical flask.\n•\nAdd several drops of FB\
    \ 6 to the conical flask.\n•\nPerform a rough titration and record your burette\
    \ readings in the space below.\n\nThe rough titre is  cm3.\n•\nCarry out as many\
    \ accurate titrations as you think necessary to obtain consistent results.\n•\n\
    Make sure any recorded results show the precision of your practical work.\n•\n\
    Record all your burette readings and the volume of FB 5 added in each accurate\
    \ titration.\nKeep FB 4 for use in Question 3.\n\nResults\nI\nII\nIII\nIV\nV\n\
    VI\nVII\n\n[7]\n\n(b) From your accurate titration results, calculate a suitable\
    \ mean value to be used in your\ncalculations.\n\nShow clearly how you obtained\
    \ this value.\n\n25.0 cm3 of FB 4 required  cm3 of FB 5. [1]\n,\t,\n\n(c) Calculations\n\
    \n(i) Give your answers to (c)(ii) and (c)(iii) to an appropriate number of significant\
    \ figures.\n\n[1]\n\n(ii) Use your answer to (b) to calculate the amount, in mol,\
    \ of hydrochloric acid in your mean\ntitre.\n\namount of HCl =  mol\n\n Hence\
    \ determine the amount, in mol, of sodium hydrogencarbonate present in 25.0 cm3\n\
    of FB 4.\n\namount of NaHCO3 =  mol\n\n[1]\n\n(iii) Calculate the mass of sodium\
    \ hydrogencarbonate present in each dm3 of solution.\n\nmass of NaHCO3 =  g\n\n\
    \ Hence calculate the percentage by mass of the sodium halide impurity in FB 4.\n\
    \n Show your working.\n\npercentage by mass =  %\n\n[2]\n\n(d) A student carries\
    \ out the experiment in Question 1 using the impure sodium hydrogencarbonate\n\
    dissolved to make FB 4.\n\nState how this affects the value of ΔH1 determined\
    \ in 1(b)(iii) compared to the value the\nstudent would get if pure sodium hydrogencarbonate\
    \ were used State what assumption you have made about the sodium halide impurity\
    \ [2]\n\n[Total: 14]\n,\t,\nQualitative analysis\nFor each test you should record\
    \ all your observations in the spaces provided.\nExamples of observations include:\n\
    •\ncolour changes seen\n•\nthe formation of any precipitate and its solubility\
    \ (where appropriate) in an excess of the reagent\nadded\n•\nthe formation of\
    \ any gas and its identification (where appropriate) by a suitable test.\nYou\
    \ should record clearly at what stage in a test an observation is made.\nWhere\
    \ no change is observed, you should write ‘no change’.\nWhere reagents are selected\
    \ for use in a test, the name or correct formula of the element or compound\n\
    must be given.\nIf any solution is warmed, a boiling tube must be used. If any\
    \ solid is heated a hard‑glass test‑tube\nmust be used.\nRinse and reuse test‑tubes\
    \ and boiling tubes where possible.\nNo additional tests should be attempted.\n\
    ,\t,"
