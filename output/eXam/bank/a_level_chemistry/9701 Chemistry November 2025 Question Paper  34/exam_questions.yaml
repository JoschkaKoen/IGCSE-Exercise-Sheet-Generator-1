  text: "1\nSodium carbonate can be manufactured using a two‑step process. The first\
    \ step involves making\nsodium hydrogencarbonate, NaHCO3, which is then converted\
    \ into sodium carbonate, Na2CO3, in\nthe second step of the process by the following\
    \ reaction.\n2NaHCO3(s)\n  Na2CO3(s)  +  H2O(l)  +  CO2(g)\n\nIn this experiment\
    \ you will determine the enthalpy change, ΔHr, for this reaction. You will do\
    \ this\nby calculating the enthalpy changes when separate samples of sodium hydrogencarbonate\
    \ and\nsodium carbonate are added to excess hydrochloric acid, HCl (aq). You will\
    \ then combine these\nvalues using Hess’s law.\nNaHCO3(s)  +  HCl (aq)\n  NaCl\
    \ (aq)  +  H2O(l)  +  CO2(g)      ΔH1\nNa2CO3(s)  +  2HCl (aq)\n  2NaCl (aq) \
    \ +  H2O(l)  +  CO2(g)    ΔH2\n\nFB 1 is 2.0 mol dm–3 hydrochloric acid, HCl.\n\
    \nFB 2 is sodium hydrogencarbonate, NaHCO3.\n\nFB 3 is sodium carbonate, Na2CO3.\n\
    \n(a) Method\n\nExperiment 1\n•\nSupport a cup in the 250 cm3 beaker.\n•\nUse\
    \ the 25 cm3 measuring cylinder to transfer 20.0 cm3 of FB 1 into the cup.\n•\n\
    Weigh the container with FB 2. Record the mass.\n•\nMeasure the temperature of\
    \ the acid in the cup. Record this temperature.\n•\nCarefully add all of the FB\
    \ 2, in small portions to avoid acid spray. Stir to dissolve. Record\nthe lowest\
    \ temperature.\n•\nReweigh the container with any residual FB 2. Record the mass.\n\
    •\nCalculate and record the mass of FB 2 used.\n•\nCalculate and record the decrease\
    \ in temperature.\n\nExperiment 2\n•\nSupport the second cup in the 250 cm3 beaker.\n\
    •\nUse the 25 cm3 measuring cylinder to transfer 20.0 cm3 of FB 1 into the second\
    \ cup.\n•\nWeigh the container with FB 3. Record the mass.\n•\nMeasure the temperature\
    \ of the acid in the cup. Record this temperature.\n•\nCarefully add all of the\
    \ FB 3, in small portions to avoid acid spray. Stir to dissolve. Record\nthe highest\
    \ temperature.\n•\nReweigh the container with any residual FB 3. Record the mass.\n\
    •\nCalculate and record the mass of FB 3 used.\n•\nCalculate and record the increase\
    \ in temperature.\nKeep FB 1 for use in Question 3.\n\nResults\nI\nII\nIII\nIV\n\
    \n[4]\n\n(b) Calculations\n\n(i) Calculate the amount, in mol, of FB 2 that reacts\
    \ with FB 1 and the amount, in mol, of\nFB 3 that reacts with FB 1.\nExperiment\
    \ 1\nExperiment 2\namount of FB 2 =  mol\namount of FB 3 =  mol\n\n[2]\n\n(ii)\
    \ Calculate the energy changes, in J, for each reaction.\nExperiment 1\nExperiment\
    \ 2\nenergy change =  J\nenergy change =  J\n\n[1]\n\n(iii) Calculate the enthalpy\
    \ change, ΔH, in kJ mol–1 for each reaction.\nExperiment 1\nExperiment 2\nΔH1\
    \ =  kJ mol–1\n\nsign\nvalue\nΔH2 =  kJ mol–1\n\nsign\nvalue\n\n[2]\n,\t,\n\n\
    (iv) Construct an enthalpy cycle and use Hess’s law to determine the enthalpy\
    \ change, ΔHr,\nfor the reaction shown.\n\n Show your working.\n2NaHCO3(s)\n \
    \ Na2CO3(s)  +  H2O(l)  +  CO2(g)\n\n (If you were unable to calculate values\
    \ in (b)(iii) then assume that ΔH1 is +27.3 kJ mol–1\nand that ΔH2 is –24.9 kJ\
    \ mol–1. These may not be the correct values.)\nΔHr =  kJ mol–1\n\nsign\nvalue\n\
    \n[2]\n\n[Total: 11]\n,\t,"
