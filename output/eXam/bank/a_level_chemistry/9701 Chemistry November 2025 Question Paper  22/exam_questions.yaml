  text: "1\nManganese, Mn, and its compounds are widely used in many chemical reactions.\n\
    \n(a) Mn is usually found as a single isotope, manganese-55.\n\n(i) Determine\
    \ the number of protons, neutrons and electrons in an atom of manganese-55.\n\n\
    \ number of protons  neutrons  electrons  [1]\n\n(ii) Define isotopes [1]\n\n\
    (iii) A sample of manganese from the Moon is found to contain manganese-53 in\
    \ addition to\nmanganese-55.\n\n State the two pieces of information needed to\
    \ determine the relative atomic mass, Ar , of\nmanganese in this sample.\n1  \
    \ 2   [2]\n\n(b) The shorthand electronic configuration of manganese is [Ar] 3d5\
    \ 4s2.\n\n(i) Complete the full electronic configuration of manganese 3d5 4s2\n\
    [1]\n\n(ii) Deduce the total number of unpaired electrons in an atom of manganese\
    \ [1]\n,\t,\n\n(c) Manganese(IV) oxide reacts with methanal, CH2O, in acidic conditions\
    \ to produce carbon\ndioxide. The movement of electrons to or from relevant species\
    \ is shown in the following\nhalf-equations.\n\nhalf-equation 1\n\nCH2O + H2O\n\
    \ CO2 + 4H+ + 4e–\n\nhalf-equation 2\n\nMnO2 + 4H+ + 2e–\n Mn2+ + 2H2O\n\n(i)\
    \ Identify the species that is reduced in half-equation 2. Explain your answer\
    \ [1]\n\n(ii) The oxidation state of carbon in methanal is 0.\n\n Calculate the\
    \ oxidation state of carbon in carbon dioxide [1]\n\n(iii) Construct the ionic\
    \ equation for the reaction of manganese(IV) oxide with methanal in\nacidic conditions\
    \ [2]\n\n[Total: 10]\n,\t,"
