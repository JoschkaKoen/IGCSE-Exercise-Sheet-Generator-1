- number: '2'
  question_type: short_answer
  marks: 0
  text: "2\nThe Period 3 elements show trends in physical and chemical properties\
    \ across the period.\n\n(a) (i) Explain why the elements Na to Al are good electrical\
    \ conductors [1]\n\n(ii) Explain why the elements P, S and Cl do not conduct electricity\
    \ [1]\n\n(b) Fig. 2.1 shows the variation in melting point of the Period 3 elements\
    \ Si to Cl.\n1800\n1600\n1400\n1200\n1000\nmelting\npoint / K\n800\n600\n400\n\
    Si\nP\nS\nCl\n200\n0\nFig. 2.1\n\nThe Period 3 elements Si to Cl are all non-metals.\n\
    \nExplain why there is a large difference between the melting point of Si and\
    \ the melting points\nof P, S and Cl [2]\n,\t,\n\n(c) Table 2.1 gives some information\
    \ about some Period 3 chlorides.\n\nRow B refers to the pH of the solution that\
    \ forms when the Period 3 chloride is added to\nwater.\nTable 2.1\nformula of\
    \ Period 3 chloride\nNaCl\nMgCl 2\nAl Cl 3\nSiCl4\nPCl 5\nA\noxidation number\
    \ of\nelement bonded to Cl\nB\npH of solution\n6.5\nC\nbonding\nionic\nD\nstructure\n\
    giant\n\nComplete Table 2.1.\n\nYou may use the following abbreviations.\nI =\
    \ ionic, C = covalent, M = metallic\nG = giant, S = simple\n\n[4]\n\n(d) (i) Write\
    \ an equation for the formation of Al Cl 3 from its elements [1]\n\n(ii) Write\
    \ an equation for the formation of H3PO4 from PCl 5 [1]\n\n(e) S2Cl2(l) reacts\
    \ with Cl2(g) in a reversible reaction to form SCl2(l). Under certain conditions,\
    \ a\ndynamic equilibrium is established.\nS2Cl2(l) + Cl2(g)\n 2SCl2(l)     ΔH\
    \ = – 41 kJ mol–1\n\n(i) State what is meant by dynamic equilibrium [1]\n\n(ii)\
    \ Identify the condition necessary to establish dynamic equilibrium [1]\n,\t,\n\
    \n(iii) S2Cl2(l) is yellow and SCl2(l) is red.\n\nS2Cl2(l) + Cl2(g)\n 2SCl2(l)\
    \     ΔH = – 41 kJ mol–1\n\n State what is observed when the following changes\
    \ are made to an equilibrium mixture\nof S2Cl2(l) and SCl2(l).\n\n Explain your\
    \ answers.\n•\nThe equilibrium mixture is warmed gently.\nobservation   explanation\
    \   •\nThe overall pressure of the equilibrium mixture is increased.\nobservation\
    \   explanation   [4]\n\n(f) Aqueous MgCl 2 reacts with aqueous Na2CO3 to form\
    \ a white precipitate. Upon heating, the\nwhite precipitate undergoes thermal\
    \ decomposition.\n\n(i) Construct an equation to show the reaction of aqueous\
    \ MgCl 2 with aqueous Na2CO3.\nUse state symbols in your equation [2]\n\n(ii)\
    \ Identify the products of the thermal decomposition of the white precipitate\
    \ [1]\n\n(iii) State the trend in thermal stability of the Group 2 carbonates\
    \ down the group [1]\n\n[Total: 20]\n,\t,"
