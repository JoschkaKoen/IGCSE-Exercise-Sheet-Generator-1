  text: "3\nThe alkanes are a homologous series of organic molecules. Alkanes are\
    \ generally unreactive and\nare commonly used as fuels.\n\n(a) Define homologous\
    \ series [2]\n\n(b) Give two reasons to explain the general unreactivity of alkanes.\n\
    1   2   [2]\n\n(c) Alkanes with low relative molecular mass, Mr , are more useful\
    \ than those found in heavier\ncrude oil fractions.\n\nName the process that is\
    \ used to obtain alkanes with low Mr from heavier crude oil fractions [1]\n\n\
    (d) Hexane, C6H14, has four structural isomers.\n\nFig. 3.1 shows hexane and two\
    \ of its structural isomers.\nD\nC\nB\nA\nhexane\nFig. 3.1\n\n(i) Complete Fig.\
    \ 3.1 by drawing structures for C and D, the other two structural isomers of\n\
    hexane.\n[2]\n\n(ii) A, B and hexane have different boiling points.\n\n Arrange\
    \ A, B and hexane in order of increasing boiling point.\n\n Explain your answer.\n\
    \n lowest  <  <  highest\n  [3]\n,\t\t,\n\n(e) Hexane can be converted into compounds\
    \ E and F at high temperature and pressure. Fig. 3.2\nshows the reaction scheme\
    \ involving hexane, E and F.\nreaction 3\n∆H2\nreaction 2\n∆H1 = +215 kJ mol−1\n\
    \            reaction 1\nE\nF\nFig. 3.2\n\n(i) Identify a suitable reagent for\
    \ reaction 3 [1]\n\n(ii) Use the data in Fig. 3.2 and in Table 3.1 to calculate\
    \ the enthalpy change of reaction 2,\nΔH2.\nTable 3.1\ncompound\nenthalpy change\
    \ of\nformation, ∆Hf / kJ mol−1\n−156\n+48\n\nΔH2 =   kJ mol–1 [2]\n\n(iii) Write\
    \ an equation for the complete combustion of hexane [1]\n[Total: 14]\n,\n,"
