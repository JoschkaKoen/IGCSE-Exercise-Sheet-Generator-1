  text: "2\nA student uses the following method to investigate the kinetics of the\
    \ reaction between iodine and\ntin to produce tin(IV) iodide, SnI4.\n\nstep 1\n\
    Rinse a block of tin with distilled water and then rinse it with propanone.\n\n\
    step 2\n Place 50 cm3 of a 0.400 mol dm–3 solution of iodine dissolved in methylbenzene\
    \ in a\n100 cm3 beaker.\n\nstep 3\n Suspend the block of tin from a three decimal\
    \ place balance as shown in Fig. 2.1. Start a\ntimer.\n\nstep 4\nRecord the balance\
    \ reading every 100 seconds.\nblock of tin\nwire\niodine dissolved\nin methylbenzene\n\
    balance\n4.979\nFig. 2.1\n\n(a) (i) Suggest why the student rinses the block of\
    \ tin with propanone after rinsing it with\ndistilled water in step 1 [1]\n\n\
    (ii) Suggest why water is not used as the solvent for iodine [1]\n,\t,\n\n(iii)\
    \ Suggest why a three decimal place balance is more suitable than a two decimal\
    \ place\nbalance for this experiment [1]\n\n(iv) Suggest a control experiment\
    \ that could be used to verify that the loss in mass of tin is\ncaused by reaction\
    \ with iodine and not any other factor [1]\n\n(b) The student’s results are shown\
    \ in Table 2.1.\n\nComplete Table 2.1.\nTable 2.1\ntime / s\nbalance reading /\
