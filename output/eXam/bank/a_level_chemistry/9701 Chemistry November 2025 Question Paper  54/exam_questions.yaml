  text: "1\nA student uses a technique called the Winkler method to determine the\
    \ mass of oxygen dissolved\nin a sample of water from a lake.\n\nTwo solutions,\
    \ X and Y, are prepared.\n\nSolution X is 2.30 mol dm–3 aqueous manganese(II)\
    \ sulfate, MnSO4(aq).\n\nSolution Y is alkaline aqueous potassium iodide, KI(aq).\n\
    \n(a) Calculate the mass of solid hydrated manganese(II) sulfate, MnSO4•H2O(s),\
    \ needed to make\n100.0 cm3 of solution X.\n\nGive your answer to two decimal\
    \ places.\n\nmass of MnSO4•H2O(s) =   g [1]\n\n(b) The student is given a small\
    \ beaker containing the mass of MnSO4•H2O(s) calculated in (a).\nDescribe how\
    \ the student should prepare exactly 100.0 cm3 of solution X.\n\nInclude the names\
    \ and capacities of each piece of key apparatus used.\n\nWrite your answer using\
    \ a series of numbered steps [3]\n,\t,\n\n(c) Solution Y is prepared as follows.\n\
    \nstep 1\nPlace 100 cm3 of distilled water in a 250 cm3 beaker.\n\nstep 2\nAdd\
    \ about 8 g of solid sodium hydroxide, NaOH(s), and stir to dissolve.\n\nstep\
    \ 3\nCool the solution to room temperature using an ice‑bath.\n\nstep 4\nRepeat\
    \ steps 2 and 3 until a total of 32 g of NaOH(s) has been dissolved.\n\nstep 5\n\
    \ Dissolve about 14 g of potassium iodide, KI(s), into the solution formed in\
    \ step 4.\n\n(i) Solution Y is corrosive.\n\n Other than wearing safety goggles,\
    \ state one safety precaution that the student should\ntake when preparing solution\
    \ Y [1]\n\n(ii) Suggest why the solution is cooled in step 3 [1]\n,\t,\n\n(d)\
    \ The student uses the following procedure to determine the mass of oxygen dissolved\
    \ in a\nsample of water from the lake.\n\nstep 1\nCollect a 250 cm3 sample of\
    \ lake water in a bottle.\n\nstep 2\nAdd 1 cm3 of solution X and 1 cm3 of solution\
    \ Y to the bottle.\n\nstep 3\nImmediately stopper the bottle, ensuring as little\
    \ air as possible is trapped.\n\nstep 4\nShake the bottle to mix its contents.\n\
    \nA brown precipitate, manganese(III) hydroxide, Mn(OH)3(s), is formed.\n\nstep\
    \ 5\nAdd 1.5 cm3 of concentrated sulfuric acid to the contents of the bottle.\n\
    \nThe precipitate dissolves, and iodine is formed.\n\nstep 6\nDilute this solution\
    \ to exactly 500.0 cm3 using distilled water to form solution Z.\n\nstep 7\n Transfer\
    \ 25.0 cm3 of solution Z into a conical flask, and titrate with\n1.00 × 10–3 mol\
    \ dm–3 aqueous sodium thiosulfate, Na2S2O3(aq). Add 1 cm3 of\nstarch solution\
    \ near to the end‑point.\n\nstep 8\nRepeat step 7 as many times as necessary.\n\
    \n(i) Suggest why it is important to avoid trapping air inside the bottle in step\
    \ 3 [1]\n\n(ii) Identify the piece of apparatus that the student should use to\
    \ transfer the 25.0 cm3 of\nsolution Z in step 7 [1]\n\n(iii) Suggest why starch\
    \ solution is added in step 7 [1]\n,\t,\n\n(e) The student records the results\
    \ shown in Table 1.1.\nTable 1.1\nrough\ntitration\ntitration 1\ntitration 2\n\
    titration 3\nfinal burette reading / cm3\n13.60\n12.75\n26.20\n14.50\ninitial\
    \ burette reading  / cm3\n 0.00\n 0.05\n13.15\n 1.35\ntitre / cm3\n13.60\n\n(i)\
    \ Complete Table 1.1 and calculate the mean titre.\n\nmean titre =   cm3 [2]\n\
    \n(ii) Explain why the student does not need to carry out any further titrations\
    \ [1]\n\n(iii) Calculate the percentage error in the measurement of the titre\
    \ for titration 3.\n\n Show your working.\n\npercentage error =   % [1]\n,\t,\n\
    \n(f) The following equations show the reactions that take place during the procedure\
    \ in (d).\n\nsteps 2, 3 and 4\n\n4Mn2+(aq)  +  8OH–(aq)  +  O2(aq)  +  2H2O(l)\n\
    \  4Mn(OH)3(s)\n\nstep 5\n\n2Mn(OH)3(s)  +  2I–(aq)  +  6H+(aq)\n  I2(aq)  + \
    \ 6H2O(l)  +  2Mn2+(aq)\n\nstep 7\n\nI2(aq)  +  2S2O3\n2–(aq)\n  2I–(aq)  +  S4O6\n\
    2–(aq)\n\n(i) Calculate the amount, in mol, of iodine, I2(aq), in 25.0 cm3 of\
    \ solution Z.\n\namount of I2(aq) =   mol [1]\n\n(ii) Use your answer to (f)(i)\
    \ and the equations given to calculate the amount, in mol, of\ndissolved oxygen,\
    \ O2(aq), in 500.0 cm3 of solution Z.\n\namount of O2(aq) in 500.0 cm3 of solution\
    \ Z =   mol [1]\n\n(iii) Dissolved oxygen content, mg dm–3, is the mass of oxygen\
    \ dissolved in water.\n\n Use your answer to (f)(ii) to calculate the dissolved\
    \ oxygen content in the lake water\ncollected in step 1.\n\n [If you were unable\
    \ to obtain an answer to (f)(ii), then use amount of O2(aq) in 500.0 cm3\nof solution\
    \ Z = 7.12 × 10–5 mol. This is not the correct answer.]\n\ndissolved oxygen content\
    \ =   mg dm–3 [1]\n[Total: 16]\n,\t,"
