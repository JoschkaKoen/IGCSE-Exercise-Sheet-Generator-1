  text: "3\nHalf-fill the 250 cm3 beaker with water and place it on a tripod and gauze.\
    \ Heat the water until\nboiling then switch off your Bunsen burner. This will\
    \ be your hot water bath for use in (b)(i). Start\n(a)(i) while the water is heating.\n\
    \n(a) FA 4 is an aqueous solution containing three ions. One ion is not listed\
    \ in the Qualitative\nanalysis notes. FA 5 is an aqueous solution containing two\
    \ ions. The cation in FA 5 is listed in\nthe Qualitative analysis notes. The anions\
    \ in both FA 4 and FA 5 contain sulfur.\n\n(i) Carry out the following tests using\
    \ a 1 cm depth of either FA 4 or FA 5 in a test-tube.\n\n Record your observations\
    \ in Table 3.1.\nTable 3.1\ntest\nobservations\nFA 4\nFA 5\nTest 1\nAdd aqueous\n\
    sodium hydroxide.\nTest 2\nAdd aqueous ammonia.\nTest 3\nAdd aqueous\nsodium carbonate.\n\
    Test 4\nAdd aqueous barium chloride\nor aqueous barium nitrate.\nTest 5\nAdd acidified\
    \ aqueous\npotassium manganate(VII).\n\n[5]\n\n(ii) From your observations in\
    \ (a)(i), deduce the identities of the ions present in FA 4 and\nFA 5. Give the\
    \ formula of each ion in Table 3.2. If you are unable to identify an ion write\n\
    ‘unknown’.\nTable 3.2\nions present\nFA 4\nFA 5\ncations\nanions\n\n[3]\n,\t,\n\
    \n(b) (i) Both FA 6 and FA 7 are one of propan-1-ol, propan-2-ol, methanoic acid\
    \ or ethanoic\nacid. You will carry out tests to investigate the identities of\
    \ FA 6 and FA 7. For each test\nuse a 1 cm depth of FA 6 or FA 7 in a test-tube.\
    \ Record your observations in Table 3.3.\nTable 3.3\ntest\nobservations\nFA 6\n\
    FA 7\nTest 1\nAdd a few drops of acidified\naqueous potassium\nmanganate(VII),\
    \ then\nplace the test-tube in the hot\nwater bath.\nTest 2\nAdd a 2 cm depth\
    \ of aqueous\niodine followed by drops of\naqueous sodium hydroxide\nuntil the\
    \ colour just disappears.\nIf no reaction is visible, place\nthe test-tube in\
    \ the hot water\nbath.\nTest 3\nAdd aqueous\nsodium carbonate.\n\n[3]\n\n(ii)\
    \ From your observations in (b)(i) deduce the identities of FA 6 and FA 7. Give\
    \ reasons for\nyour answers.\n\n FA 6 is  reasons   FA 7 is  reasons   [2]\n,\t\
    ,\n\n(c) A student carrying out a similar set of tests identifies two unknown\
    \ compounds to be ethanol\nand propanoic acid.\n\nWrite an equation for the reaction\
    \ between these two compounds [1]\n\n[Total: 14]\n,\t,\nQualitative analysis notes\n\
    1\nReactions of cations\ncation\nreaction with\nNaOH(aq)\nNH3(aq)\naluminium,\
    \ Al 3+(aq)\nwhite ppt. soluble in excess\nwhite ppt. insoluble in excess\nammonium,\
    \ NH4\n+(aq)\nno ppt.\nammonia produced on warming\n–\nbarium, Ba2+(aq)\nfaint\
    \ white ppt. is observed unless\n[Ba2+(aq)] is very low\nno ppt.\ncalcium, Ca2+(aq)\n\
    white ppt. unless [Ca2+(aq)] is very\nlow\nno ppt.\nchromium(III), Cr3+(aq)\n\
    grey-green ppt. soluble in excess\ngiving dark green solution\ngrey-green ppt.\
    \ insoluble in excess\ncopper(II), Cu2+(aq)\npale blue ppt. insoluble in excess\n\
    pale blue ppt. soluble in excess\ngiving dark blue solution\niron(II), Fe2+(aq)\n\
    green ppt. turning brown on\ncontact with air\ninsoluble in excess\ngreen ppt.\
    \ turning brown on\ncontact with air\ninsoluble in excess\niron(III), Fe3+(aq)\n\
    red-brown ppt. insoluble in excess\nred-brown ppt. insoluble in excess\nmagnesium,\
    \ Mg2+(aq)\nwhite ppt. insoluble in excess\nwhite ppt. insoluble in excess\nmanganese(II),\
    \ Mn2+(aq)\noff-white ppt. rapidly turning brown\non contact with air\ninsoluble\
    \ in excess\noff-white ppt. rapidly turning brown\non contact with air\ninsoluble\
    \ in excess\nzinc, Zn2+(aq)\nwhite ppt. soluble in excess\nwhite ppt. soluble\
    \ in excess\n2\nReactions of anions\nanion\nreaction\ncarbonate, CO3\n2–\nCO2\
    \ liberated by dilute acids\nchloride, Cl –(aq)\ngives white ppt. with Ag+(aq)\
    \ (soluble in NH3(aq))\nbromide, Br –(aq)\ngives cream / off-white ppt. with Ag+(aq)\
    \ (partially soluble in NH3(aq))\niodide, I–(aq)\ngives pale yellow ppt. with\
    \ Ag+(aq) (insoluble in NH3(aq))\nnitrate, NO3\n–(aq)\nNH3 liberated on heating\
    \ with OH–(aq) and Al foil\nnitrite, NO2\n–(aq)\nNH3 liberated on heating with\
    \ OH–(aq) and Al foil;\ndecolourises acidiﬁed aqueous KMnO4\nsulfate, SO4\n2–(aq)\n\
    gives white ppt. with Ba2+(aq) (insoluble in excess dilute strong acids);\ngives\
    \ white ppt. with high [Ca2+(aq)]\nsulﬁte, SO3\n2–(aq)\ngives white ppt. with\
