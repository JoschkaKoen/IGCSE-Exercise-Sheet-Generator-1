  text: "2\nWhen hydrated sodium thiosulfate is dissolved in water the temperature\
    \ of the liquid changes. You\nwill carry out an experiment to determine the enthalpy\
    \ change, ΔH, when one mole of hydrated\nsodium thiosulfate dissolves in water.\n\
    \nFA 3 is hydrated sodium thiosulfate, Na2S2O3•5H2O.\n\n(a) Method\n•\nSupport\
    \ the cup in the 250 cm3 beaker.\n•\nUse the 50 cm3 measuring cylinder to transfer\
    \ 30.0 cm3 of distilled water into the cup.\n•\nMeasure the temperature of the\
    \ water in the cup. Record this in the space for results.\n•\nWeigh the container\
    \ with FA 3. Record the mass.\n•\nTip all the FA 3 into the cup.\n•\nStir the\
    \ mixture until the minimum temperature is obtained. Record this temperature.\n\
    •\nWeigh the container with any residual FA 3. Record the mass.\n•\nCalculate\
    \ and record the mass of FA 3 added.\n•\nCalculate and record the temperature\
    \ change.\nResults\n\n[4]\n\n(b) Calculations\n\n(i) Calculate the amount, in\
    \ mol, of hydrated sodium thiosulfate added.\n\namount of Na2S2O3•5H2O =  mol\
    \ [1]\n\n(ii) Calculate the energy change, in J, in your experiment.\n\nenergy\
    \ change =  J [1]\nI\nII\nIII\nIV\n,\t\t,\n\n(iii) Calculate the enthalpy change,\
    \ ΔH, in kJ mol−1, when 1.00 mol of hydrated sodium\nthiosulfate dissolves in\
    \ water. Show your working.\n\nΔH =  kJ mol−1\n\nsign\nvalue\n[1]\n\n(c) The value\
    \ calculated in (b)(iii) can be used to determine the enthalpy change, ΔHr , for\
    \ the\nfollowing reaction.\nNa2S2O3(s)  +  5H2O(l)\n  Na2S2O3•5H2O(s)\n\nOutline\
    \ the method of one further experiment you would need to carry out to obtain the\
    \ data\nnecessary to calculate the value of ΔHr .\n\nShow how you would use your\
    \ results from this experiment and (b)(iii) to calculate ΔHr .\n\nDo not carry\
    \ out your experiment.\nmethod   calculation   [4]\n\n[Total: 11]\n,\n,\nQualitative\
    \ analysis\nFor each test you should record all your observations in the spaces\
    \ provided.\nExamples of observations include:\n•\ncolour changes seen\n•\n the\
    \ formation of any precipitate and its solubility (where appropriate) in an excess\
    \ of the reagent\nadded\n•\nthe formation of any gas and its identification (where\
    \ appropriate) by a suitable test.\nYou should record clearly at what stage in\
    \ a test an observation is made.\nWhere no change is observed, you should write\
    \ ‘no change’.\nWhere reagents are selected for use in a test, the name or correct\
    \ formula of the element or compound\nmust be given.\nIf any solution is warmed,\
    \ a boiling tube must be used. If a solid is heated, a hard-glass test-tube must\n\
    be used.\nRinse and reuse test-tubes and boiling tubes where possible.\nNo additional\
    \ tests should be attempted.\n,\t,"
