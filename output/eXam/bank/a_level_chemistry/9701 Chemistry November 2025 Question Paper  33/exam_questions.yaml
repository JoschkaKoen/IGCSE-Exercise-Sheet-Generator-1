  text: "1\nThe thiosulfate ion, S2O3\n2–, decomposes when an acid is added.\nS2O3\n\
    2–(aq)  +  2H+(aq)\n  S(s)  +  SO2(aq)  +  H2O(l)\n\nThe rate of this reaction\
    \ can be investigated by measuring how long it takes for the solid sulfur\nforming\
    \ to obscure the print on the insert.\n\nYou will investigate how the concentration\
    \ of the thiosulfate ion affects the rate of the reaction.\n\nNote: A small amount\
    \ of sulfur dioxide gas may be formed in the experiment. It is very\nimportant\
    \ that you avoid inhaling any fumes. As soon as each experiment is complete, add\n\
    the reaction mixture to the quenching bath and rinse the beaker thoroughly.\n\n\
    FA 1 is 0.100 mol dm–3 sodium thiosulfate, Na2S2O3.\n\nFA 2 is 2.00 mol dm–3 hydrochloric\
    \ acid, HCl.\n\n(a) Method\n\nExperiment 1\n•\nFill a burette with FA 1.\n•\n\
    Run 40.00  cm3 of FA 1 into the 100 cm3 beaker.\n•\nUse the 25 cm3 measuring cylinder\
    \ to measure 10.0 cm3 of FA 2.\n•\nAdd the FA 2 to the FA 1 in the beaker and\
    \ start timing immediately.\n•\nStir the mixture once and place the beaker on\
    \ the printed insert.\n•\nView the printing on the insert from above through the\
    \ solution.\n•\nStop timing when the print on the insert becomes obscured.\n•\n\
    Record this reaction time to the nearest second in the space for results.\n•\n\
    Empty the contents of the beaker into the quenching bath.\n•\nRinse and dry the\
    \ beaker so it is ready to use in Experiment 2.\n\nExperiment 2\n•\nRefill the\
    \ burette with FA 1.\n•\nFill the second burette with distilled water.\n•\nRun\
    \ 20.00 cm3 of FA 1 into the 100 cm3 beaker.\n•\nRun 20.00 cm3 of distilled water\
    \ into the same beaker.\n•\nUse the 25 cm3 measuring cylinder to measure 10.0\
    \ cm3 of FA 2.\n•\nAdd the FA 2 to the FA 1 in the beaker and start timing immediately.\n\
    •\nStir the mixture once and place the beaker on the printed insert.\n•\nView\
    \ the printing on the insert from above through the solution.\n•\nStop timing\
    \ when the print on the insert becomes obscured.\n•\nRecord this reaction time\
    \ to the nearest second in the space for results.\n•\nEmpty the contents of the\
    \ beaker into the quenching bath.\n•\nRinse and dry the beaker so it is ready\
    \ to use in the next experiment.\n\nExperiments 3–5\n•\n Carry out three further\
    \ experiments to investigate how using different volumes of FA 1\naffects the\
    \ reaction time.\n\nNote: the combined volumes of FA 1 and distilled water must\
    \ always be 40.00 cm3.\n\nDo not use a volume of FA 1 that is less than 15.00\
    \ cm3.\n\nRecord all your results in a table. You should include the volume of\
    \ FA 1, the volume of\ndistilled water, the reaction time and the reaction rate\
    \ for each of your five experiments.\n\nThe rate of reaction can be calculated\
    \ using the following formula.\nrate =\n1000\nreaction time\n\nResults\n\n[8]\n\
    \n(b) (i) On the grid in Fig. 1.1, plot the rate (y-axis) against the volume of\
    \ FA 1 (x-axis).\n\n Start each axis at the origin (0, 0).\n\n Ring any anomalous\
    \ points. Draw a line of best fit.\nI\nII\nIII\nIV\nV\nVI\nVII\nVIII\n,\t,\nFig.\
    \ 1.1\n[3]\nI\nII\nIII\n,\t,\n\n(ii) Use your graph in Fig. 1.1 to determine the\
    \ time it would take for the print to be obscured\nif 7.50 cm3 of FA 1, 32.50\
    \ cm3 of water and 10.0 cm3 of FA 2 had been used.\n\n Show clearly on the graph\
    \ how you worked out your answer.\n\ntime for printing to be obscured =  s [2]\n\
    \n(c) A student carries out the same method as given in (a) but using a different\
    \ concentration of\nacid. The student’s calculated values for the rate are plotted\
    \ on the grid in Fig. 1.2.\n0.00\n0\n10\n20\n30\n40\n50\n60\n5.00 10.00 15.00\
    \ 20.00 25.00\nvolume of FA 1\nrate vs volume of FA 1\n30.00 35.00 40.00 45.00\n\
    rate\nFig. 1.2\n\nState whether the student’s results show that the rate is directly\
    \ proportional to the volume of\nFA 1 used.\n\nExplain your answer [2]\n\n[Total:\
    \ 15]\n,\t,"
