    I2(aq)\npropan-2-ol\nL\nK\nFig. 3.1\n\n(a) (i) Draw the structure of organic compound\
    \ K.\n\n[1]\n\n(ii) State an observation you would make in reaction 2 [1]\n\n\
    (iii) State the type of reaction that is shown in reaction 3 [1]\n\n(iv) Complete\
    \ Fig. 3.2 to show the pi (π) bond in L that is formed from orbital overlap.\n\
    H\nH\nC\nC\nH3C\nH\nFig. 3.2\n\n[1]\n,\t\t,\n\n(b) Propan-2-ol reacts with sodium\
    \ to produce (CH3)2CH–O – anions.\n\nThese anions react with 2-bromopropane to\
    \ form compound N, as shown in Fig. 3.3.\nBr\n(CH3)2CH–O–\nO\nN\nFig. 3.3\n\n\
    (i) Write an equation for the reaction of propan-2-ol with sodium [1]\n\n(ii)\
