  text: "2\nAluminium oxide, Al 2O3, and phosphorus(V) oxide, P4O10, are both used\
    \ as reagents\nand catalysts.\n\n(a) The melting point of Al 2O3 is 2072 °C. The\
    \ melting point of P4O10 is 340 °C.\n\nExplain the difference in the melting points\
    \ of these two compounds [3]\n\n(b) A 5.00 dm3 sealed flask contains 0.400 mol\
    \ of CO(g) and 0.800 mol of H2(g) and an Al 2O3\ncatalyst. The flask is heated\
    \ to a temperature of 290 °C and allowed to reach equilibrium.\nEquation 1 shows\
    \ the reaction.\n\nequation 1\nCO(g)  +  2H2(g)\n  CH3OH(g)\n\nThe equilibrium\
    \ constant, Kc, of equation 1 is given.\nKc =\n[CH3OH]\n[CO][H2]2\n\n(i) State\
    \ the units of Kc [1]\n\n(ii) The equilibrium mixture contains 0.280 mol of CH3OH(g).\n\
    \n Calculate the value of Kc.\n\n Give your answer to three significant figures.\n\
    \nvalue of Kc =   [3]\n\n(iii) State and explain the effect, if any, on the value\
    \ of Kc when the overall pressure in the\nsealed flask is increased [1]\n,\t,\n\
    \n(c) P4O10 catalyses the reversible reaction of CO with H2 to form CH3OH.\n\n\
    equation 1\nCO(g)  +  2H2(g)\n  CH3OH(g)\n\nP4O10 then acts as a dehydrating agent,\
    \ causing CH3OH to form CH3OCH3.\n\n(i) Explain how the presence of a catalyst\
    \ affects a chemical reaction [1]\n\n(ii) Construct an equation for the dehydration\
    \ reaction of CH3OH to form CH3OCH3 [1]\n\n(iii) Write an equation to show the\
    \ reaction of P4O10 with an excess of water [1]\n\n[Total: 11]\n,\t,"
