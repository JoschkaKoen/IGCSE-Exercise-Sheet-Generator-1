  text: "1\nThe Group 17 elements are oxidising agents.\n\n(a) (i) Explain how the\
    \ Group 17 elements act as oxidising agents [1]\n\n(ii) Write an equation to show\
    \ the reaction in which Cl 2 oxidises aluminium metal [1]\n\n(iii) A student heats\
    \ equal amounts of I2(g) and H2(g) in a sealed flask. The student leaves\nthe\
    \ contents to cool.\n\n State what you would observe during the reaction [1]\n\
    \n(b) Cl 2 and Br2 can each react with NH3 to give N2 and a hydrogen halide, HX.\n\
    3X2  +  2NH3\n  N2  +  6HX\n\nX = Cl or Br\n\nThe relative bond strengths of X–X\
    \ and H–X determine the difference in enthalpy change of\nthe two reactions.\n\
    \n(i) Describe and explain the difference in the X–X bond strengths of Cl 2 and\
    \ Br2 [2]\n\n(ii) Describe the relative thermal stabilities of HCl and HBr [1]\n\
    ,\t,\n\n(iii) Define enthalpy change of formation, ΔHf [2]\n\n(iv) Table 1.1 gives\
    \ data relevant to the reaction of Cl 2(g) with NH3(g).\nTable 1.1\ncompound\n\
    enthalpy change of\nformation, ΔHf / kJ mol–1\nNH3(g)\n– 46\nHCl (g)\n–92\n\n\
    \ Use the data in Table 1.1 to calculate the enthalpy change of the reaction of\
    \ Cl 2(g)\nwith NH3(g).\n\nenthalpy change of reaction =   kJ mol–1 [2]\n\n(v)\
    \ I2 reacts with NH3 to form NI3.\n\n Predict the shape of a molecule of NI3.\
    \ Explain your answer.\nshape   explanation   [2]\n,\t,\n\n(c) Table 1.2 shows\
    \ some information about reactions of NaCl , NaBr and NaI.\nTable 1.2\nNaCl\n\
    NaBr\nNaI\nobservation\nwith Ag+(aq)\nwhite precipitate\ntype of reaction with\n\
    concentrated H2SO4\nacid–base\nacid–base, then redox\nacid–base, then redox\n\
    observations with\nconcentrated H2SO4\n•\nblack solid\n•\nyellow solid\n•\neffervescence\n\
    \n(i) Complete Table 1.2.\n[4]\n\n(ii) Suggest an identity for the species that\
    \ produces each observation in the reaction of NaI\nwith concentrated H2SO4.\n\
    black solid   yellow solid   effervescence   [2]\n\n(d) Table 1.3 gives some information\
    \ about MgCl 2 and SiCl 4.\nTable 1.3\nMgCl 2\nSiCl 4\nelectrical conductivity\
    \ when liquid\nconducts\ndoes not conduct\nobservation when added to water\ndissolves\n\
    vigorous reaction\n\n(i) Explain the difference between the electrical conductivity\
    \ of liquid MgCl 2 and of liquid\nSiCl 4. Refer to bonding and relevant particles\
    \ in your answer [2]\n\n(ii) Suggest the pH of the solutions that form when each\
    \ chloride is added to water.\n\n MgCl 2  SiCl 4  [2]\n[Total: 22]\n,\t,"
