  text: "1\nThe concentration of aqueous chloride ions can be found by titration with\
    \ aqueous silver nitrate,\nAgNO3(aq).\nAg+(aq) + Cl –(aq)\n AgCl(s)\n\nThe indicator\
    \ used is aqueous potassium chromate(VI), K2CrO4(aq).\n\nAs AgNO3(aq) is added\
    \ to aqueous chloride ions, a white precipitate of AgCl(s) is formed.\n\nWhen\
    \ all the chloride ions have reacted, further addition of AgNO3(aq) leads to the\
    \ formation of\na red precipitate of silver chromate(VI), Ag2CrO4(s). The first\
    \ appearance of the red precipitate\nshows the end-point of the titration.\n\n\
    A student carries out an experiment to determine the number of molecules of water\
    \ of crystallisation,\nx, in hydrated barium chloride, BaCl 2•xH2O(s).\n\n(a)\
    \ The student makes 250.0 cm3 of 0.0500 mol dm–3 AgNO3(aq) to use for the titration.\n\
    \n(i) Calculate the mass of solid silver nitrate, AgNO3(s), needed to make 250.0\
    \ cm3 of\n0.0500 mol dm–3 AgNO3(aq).\n\n Give your answer to two decimal places.\n\
    \nmass of AgNO3(s) =  g [1]\n\n(ii) Describe how the student should make 250.0\
    \ cm3 of 0.0500 mol dm–3 AgNO3(aq) starting\nfrom the mass of AgNO3(s) calculated\
    \ in (a)(i) in a 50 cm3 beaker.\n\n Give the name and size of any key apparatus\
    \ used.\n\n Write your answer using a series of numbered steps [3]\n,\t,\n\n(b)\
    \ The student uses the following method.\nstep 1\nDissolve 1.58 g of BaCl 2•xH2O(s)\
    \ to form 250 cm3 of aqueous solution. Label this\nsolution A.\nstep 2\nTransfer\
    \ 20.0 cm3 of solution A into a conical flask.\nstep 3\nAdd aqueous sodium sulfate,\
    \ Na2SO4(aq), to the flask and swirl the mixture to\nremove barium ions from the\
    \ solution.\nstep 4\nAdd 2–3 drops of K2CrO4(aq) indicator to the flask.\nstep\
    \ 5\nTitrate the contents of the flask against 0.0500 mol dm–3 AgNO3(aq).\nstep\
    \ 6\nRepeat steps 2 to 5 to collect sufficient data for analysis.\n\n(i) Suggest\
    \ a suitable piece of apparatus for transferring 20.0 cm3 of solution A in step\
    \ 2 [1]\n\n(ii) Suggest why barium ions are removed in step 3 before performing\
    \ the titration [1]\n\n(iii) Suggest why chemically resistant gloves should be\
    \ worn to carry out step 4 [1]\n\n(c) The student’s results are shown in Table\
    \ 1.1.\nTable 1.1\nrough titration\ntitration 1\ntitration 2\ntitration 3\nburette\
    \ reading\n(final) / cm3\n20.10\n40.55\n20.75\n20.90\nburette reading\n(initial)\
    \ / cm3\n0.00\n20.25\n0.05\n0.30\ntitre / cm3\n20.10\n20.30\n20.70\n20.60\n\n\
    The student uses the titres from titrations 2 and 3 shown in Table 1.1 to calculate\
    \ a mean titre\nvalue of 20.65 cm3.\n\n(i) Explain why only these two values are\
    \ used [1]\n,\t,\n\n(ii) Calculate the percentage error in the titre volume for\
    \ titration 3.\n\n Show your working.\n\npercentage error =  [1]\n\n(d) The equation\
    \ for the reaction of silver nitrate with barium chloride is shown.\n2AgNO3(aq)\
    \ + BaCl 2(aq)\n Ba(NO3)2(aq) + 2AgCl(s)\n\n(i) Calculate the amount, in mol,\
    \ of AgNO3(aq) in the mean titre of 20.65 cm3.\n\namount of AgNO3 =  mol [1]\n\
    \n(ii) Calculate the amount, in mol, of BaCl 2(aq) in 250 cm3 of solution A.\n\
    \namount of BaCl 2 =  mol [1]\n\n(iii) Calculate the value of x in the formula\
    \ BaCl 2•xH2O.\n\nx =  [2]\n,\t,\n\n(e) Another student uses a different experimental\
    \ method to check the value of x obtained by the\nmethod described in (b).\n\n\
    Give a brief description of another method, not involving titration, that could\
    \ be used to\ndetermine the value of x in the formula BaCl 2•xH2O(s). Write your\
    \ answer using a series of\nnumbered steps.\n\nYour plan should include details\
    \ of the following:\n•\nthe apparatus and method you would use\n•\nthe measurements\
    \ you would make.\n\nYou are provided with standard laboratory apparatus [3]\n\
    \n[Total: 16]\n,\t,"
