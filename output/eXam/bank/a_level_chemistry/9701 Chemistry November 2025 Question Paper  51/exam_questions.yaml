  text: "2\nEffusion is the process in which a gas escapes through a small hole.\n\
    \nA student investigates the relationship between rate of effusion and relative\
    \ molar mass of a gas\nusing the apparatus shown in Fig. 2.1.\ngas syringe\nside-arm\
    \ tube\nplunger\ngas being tested\nthree-way tap\naluminium foil with small hole\n\
    Fig. 2.1\n\nThe following method is used:\nstep 1\nTurn the tap and remove any\
    \ gas from the syringe through the side-arm tube, by pushing\nin the plunger.\n\
    step 2\nAdd 50 cm3 of the gas being tested to the syringe through the side-arm\
    \ tube.\nstep 3\nRemove the gas from the syringe, through the side-arm tube, by\
    \ pushing in the plunger.\nstep 4\nAdd 70 cm3 of the gas being tested to the syringe\
    \ through the side-arm tube.\nstep 5\nTurn the tap to connect the syringe to the\
    \ tube with the aluminium foil and small hole.\nstep 6\nAllow the syringe plunger\
    \ to fall and start a timer when the volume of gas in the syringe\nreaches 60\
    \ cm3.\nstep 7\nStop the timer when the volume of gas in the syringe reaches 10\
    \ cm3. Record the time\ntaken.\nstep 8\nRepeat steps 1 to 7 with different gases.\n\
    ,\t,\n\n(a) Suggest why the student adds 50 cm3 of the gas being tested to the\
    \ syringe in step 2 and\nthen removes this gas in step 3 [1]\n\n(b) The student’s\
    \ results are shown in Table 2.1.\nTable 2.1\ngas\nhydrogen, H2\nhelium, He\n\
