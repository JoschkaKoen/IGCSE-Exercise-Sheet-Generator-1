- number: '11'
  question_type: long_answer
  page: 12
  subpage_row: 1
  subpage_col: 1
  marks: 15
  text: 'A one-player game uses the two-dimensional (2D) array \texttt{Grid[]} to
    store the location of a secret cell to be found by the player in 10 moves. Each
    row and column has 5 cells.


    At the start of the game:

    \begin{itemize}

    \item The program places an ''X'' in a random cell (\textbf{not} in \texttt{Grid[1,1]})
    and empties all the other cells in the grid.

    \item The player starts at the top left of the grid.

    \item The player has 10 moves.

    \end{itemize}


    During the game:

    \begin{itemize}

    \item The player can move left, right, up or down by one cell and the move must
    be within the grid.

    \item ``You Win'''' is displayed if the player moves to the cell with ''X'' and
    has played 10 moves or less.

    \item ``You Lose'''' is displayed if the player has made 10 moves without finding
    the ''X''.

    \end{itemize}


    Write a program that meets these requirements.


    You must use pseudocode or program code \textbf{and} add comments to explain how
    your code works.


    You do \textbf{not} need to declare any arrays or variables; you may assume that
    this has already been done.


    All inputs and outputs must contain suitable messages.'
  answer_options: []
  subquestions: []
