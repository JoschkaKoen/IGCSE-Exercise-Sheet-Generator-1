  text: 'An algorithm has been written in pseudocode to find and display the maximum
    and minimum values in an array of 1000 positive numbers. The array \texttt{List[]}
    starts at index 1


    \begin{alltt}

    01 Max <- List

    02 Min <- List

    03 FOR Counter <- 2 TO 1000

    04     IF List[Counter] < Max

    05         THEN

    06             Max <- List[Counter]

    07     ENDIF

    08     IF List[Count] < Min

    09         THEN

    10             Min <- List[Counter]

    11     ENDWHILE

    12 NEXT Counter

    13 OUTPUT "Maximum value is ", Max

    14 OUTPUT "Minimum value is ", Min

    \end{alltt}'
