questions:
  - number: "1"
    type: multiple_choice
    text: |
      Tick ($\checkmark$) \textbf{one} box to show which check is used for verification when data is input.
    options:
      - letter: A
        text: |
          length check
      - letter: B
        text: |
          range check
      - letter: C
        text: |
          type check
      - letter: D
        text: |
          visual check
  - number: "2"
    type: multiple_choice
    text: |
      Tick ($\checkmark$) \textbf{one} box to identify which option is used to show the inputs and output of a Boolean expression.
    options:
      - letter: A
        text: |
          flowchart
      - letter: B
        text: |
          trace table
      - letter: C
        text: |
          truth table
      - letter: D
        text: |
          variable
  - number: "3"
    type: short_answer
    text: |
      Four operators and \textbf{three} types of operator are shown.

      Draw \textbf{one or more} lines from each operator to its correct operator type.

      \textbf{Operators}
      \begin{itemize}
      \item \texttt{>=}
      \item \texttt{AND}
      \item \texttt{DIV}
      \item \texttt{+}
      \end{itemize}

      \textbf{Operator types}
      \begin{itemize}
      \item Boolean
      \item Arithmetic
      \item Logical
      \end{itemize}