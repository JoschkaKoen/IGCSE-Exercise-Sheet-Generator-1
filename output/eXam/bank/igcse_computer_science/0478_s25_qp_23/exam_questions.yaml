  text: "This pseudocode represents an algorithm.\n\n\\begin{alltt}\nDECLARE Store\
    \ : ARRAY[1:100] OF CHAR\nDECLARE Word : STRING\nDECLARE Index : INTEGER\nDECLARE\
    \ Letter : CHAR\nINPUT Word\nFOR Index <- 1 TO LENGTH(Word)\n  Letter <- SUBSTRING(Word,\
    \ Index, 1)\n  CASE OF Letter\n    'A' : Letter <- \"\"\n    'E' : Letter <- \"\
    \"\n    'I' : Letter <- \"\"\n    'O' : Letter <- \"\"\n    'U' : Letter <- \"\
    \"\n  ENDCASE\n  Store[Index] <- Letter\nNEXT Index\nFOR Index <- 1 TO LENGTH(Word)\n\
    \  IF Store[Index] <> \"\"\n  THEN\n    OUTPUT Store[Index]\n  ENDIF\nNEXT Index\n\
    \\end{alltt}"
