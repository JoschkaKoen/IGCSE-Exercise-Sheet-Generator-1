    \nParallel data transmission\nReasons for your choice   [3]\n\n(ii) The connection\
    \ will also use full‑duplex data transmission.\n\n Define full‑duplex data transmission\
    \ [2]\n\n(c) The data transmission will use parity checks.\n\n(i) The bytes need\
    \ to be sent using an even parity byte check.\n\n Complete the parity bit for\
    \ each byte.\nParity\nbit\nByte A\n1\n1\n0\n0\n0\n1\n1\nByte B\n0\n0\n0\n0\n0\n\
    0\n0\n\n[2]\n\n(ii) A parity block check can be used instead of a parity byte\
