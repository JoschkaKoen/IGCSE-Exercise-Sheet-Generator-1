  question_type: short_answer
  marks: 0
  text: "7\nAn algorithm has been written in pseudocode to calculate a check digit\
    \ for a four‑digit number.\nThe algorithm then outputs the five‑digit number including\
    \ the check digit.\n\nThe algorithm stops when –1 is input as the fourth digit.\n\
    \n01 Flag\n FALSE\n\n02 REPEAT\n\n03     Total\n 0\n\n04     FOR Counter\n 1 TO\
    \ 4\n\n05       OUTPUT \"Enter a digit \", Counter\n\n06       INPUT Number[Counter]\n\
    \n07       Total\n Total + Number * Counter\n\n08       IF Number[Counter] = 0\n\
    \n09         THEN\n\n10           Flag\n TRUE\n\n11       ENDIF\n\n12     NEXT\
    \ Counter\n\n13     IF NOT Flag\n\n14       THEN\n\n15         Number[5]\n MOD(Total,\
    \ 10)\n\n16         FOR Counter\n 0 TO 5\n\n17             OUTPUT Number[Counter]\n\
    \n18         NEXT\n\n19     ENDIF\n\n20 UNTIL Flag\n\n(a) Give the line number(s)\
    \ for the statements showing:\nTotalling   Count‑controlled loop   Post‑condition\
    \ loop   [3]\n\n(b) Identify the three errors in the pseudocode and suggest a\
    \ correction for each error.\nError 1   Correction   Error 2   Correction   Error\
    \ 3   Correction   [3]\n\n(c) The algorithm does not check that each input is\
    \ a single digit.\n\nIdentify the place in the algorithm where this check should\
    \ occur.\n\nWrite pseudocode for this check.\n\nYour pseudocode must make sure\
    \ that the input is a single digit and checks for –1\nPlace in algorithm   Pseudocode\
    \   [4]"
