  text: "6\nThe energy efficiency of an electrical appliance is the percentage of\
    \ useful energy out compared with\nthe total energy in.\n\nAn algorithm has been\
    \ written in pseudocode to calculate the energy efficiency of an appliance.\n\
    Values for total energy in and useful energy out are input. The efficiency is\
    \ calculated and output\nas a percentage.\n\nThe entry of the number –1 for either\
    \ value stops the algorithm.\n\n01 REPEAT\n\n02     OUTPUT \"Enter total energy\
    \ in \"\n\n03     INPUT TotalEnergyIn\n\n04     OUTPUT \"Enter useful energy out\
    \ \"\n\n05     OUTPUT UsefulEnergyOut\n\n06     IF TotalEnergyIn <> -1 AND UsefulEnergy\
    \ <> -1\n\n07       THEN\n\n08         Efficiency\n (UsefulEnergyOut / TotalEnergyIn)\
    \ * 100\n\n09         OUTPUT \"Efficiency is \", Efficiency, \"%\"\n\n10     ENDIF\n\
    \n11 UNTIL TotalEnergyIn <> -1 OR UsefulEnergyOut <> -1\n\n(a) Identify the three\
    \ errors in the pseudocode and suggest corrections.\nError 1   Correction   Error\
    \ 2   Correction   Error 3   Correction   [3]\n\n(b) Write pseudocode to check\
    \ for an efficiency of 92% or over for this appliance and to output\n“A-rated”\
    \ if the efficiency is 92% or over [2]"
