    electronically.


    Some digital currencies have digital ledgers called \underline{\hspace{1.5em}}.


    These are decentralised databases where each transaction is stored as a new set
    of data with a \underline{\hspace{1.5em}} and is linked to the previous set of
    data. This means that transactions cannot be altered, only new transactions added,
