questions:
  - number: "8"
    type: short_answer
    text: |
      A database table called \texttt{Hangar1} stores details of a collection of historic aircraft at a museum.

      \begin{tabular}{|c|l|l|c|c|c|}
      \hline
      \textbf{ID} & \textbf{Make} & \textbf{Model} & \textbf{Year} & \textbf{Engines} & \textbf{Airworthy} \\ \hline
      JM1 & Hawker Siddeley & Nimrod & 1966 & 4 & Y \\ \hline
      JM2 & Douglas & DC-10 & 1970 & 3 & Y \\ \hline
      JM3 & Aérospatiale-BAC & Concorde & 1973 & 4 & N \\ \hline
      PB1 & De Havilland & DH-9 & 1918 & 1 & Y \\ \hline
      PB2 & Hawker & Fury & 1935 & 1 & Y \\ \hline
      PB3 & Hawker & Nimrod & 1934 & 1 & Y \\ \hline
      PM1 & Fieseler & Storch & 1942 & 1 & N \\ \hline
      PM2 & Hawker & Hurricane & 1942 & 1 & Y \\ \hline
      PM3 & Supermarine & Spitfire & 1942 & 1 & N \\ \hline
      PM4 & Douglas & C-47 Dakota & 1942 & 2 & N \\ \hline
      PS1 & Boeing & 314 Clipper & 1936 & 4 & N \\ \hline
      \end{tabular}
  - number: "8a"
    type: short_answer
    text: |
      State the number of fields and records in the database table.

      Fields \hrulefill
      Records \hrulefill
  - number: "8b"
    type: short_answer
    text: |
      Give the output that would be produced by the structured query language (SQL) statement:

      \begin{alltt}
      SELECT Model, Year, Engines
      FROM Hangar1
      WHERE Engines > 1
      ORDER BY Year;
      \end{alltt}