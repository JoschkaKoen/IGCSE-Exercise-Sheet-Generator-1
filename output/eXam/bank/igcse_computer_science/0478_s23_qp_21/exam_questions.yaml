  text: '5

    An algorithm has been written in pseudocode to allow some numbers to be input.
    All the positive

    numbers that are input are totalled and this total is output at the end.


    An input of 0 stops the algorithm.


    01 Exit ← 1


    02 WHILE Exit <> 0 DO


    03     INPUT Number


    04     IF Number < 0


    05       THEN


    06         Total ← Total + Number


    07       ELSE


    08         IF Number = 0


    09           THEN


    10             Exit ← 1


    11         ENDIF


    12     ENDIF


    13 ENDIF


    14 OUTPUT "The total value of your numbers is ", Number


    (a) Identify the four errors in the pseudocode and suggest a correction for each
    error.

    Error 1   Correction   Error 2   Correction   Error 3   Correction   Error 4   Correction   [4]


    (b) Describe how you could change the corrected algorithm to record and output
    how many

    positive numbers have been included in the final total.


    You do not need to rewrite the algorithm [4]'
