    Arrays or lists Days[], Readings[], AverageTemp[]

    Variables

    WeekLoop, DayLoop, InTemp, TotalDayTemp, TotalWeekTemp, AverageWeekTemp

    Requirements (techniques):

    R1 Input and store hourly temperatures and validation of input temperatures for
    each day (with prompts, range check and

    (nested)iteration)

    R2 Calculate, round to one decimal place and store daily average temperatures
    and calculate the weekly average

    temperature rounded to one decimal place (iteration, totalling and rounding)

    R3 Convert all average temperatures to Fahrenheit (to one decimal place) and output
    the average temperatures in both

    Celsius and Fahrenheit. Output with appropriate messages. (output and rounding)

    15

