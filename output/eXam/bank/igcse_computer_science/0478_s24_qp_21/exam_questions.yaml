- number: '4'
  question_type: short_answer
  page: 4
  subpage_row: 1
  subpage_col: 1
  marks: 0
  text: 'This pseudocode algorithm is intended to allow, at random, between 1 and
    20 values to be entered and totalled. The total and average of the entered values
    are output at the end of the algorithm.


    \begin{alltt}

    01 DECLARE Loop : STRING

    02 DECLARE Limit : INTEGER

    03 DECLARE Value : REAL

    04 DECLARE Total : REAL

    05 Total <- 0

    06 Limit <- ROUND(RANDOM() * 19,0) + 1

    07 IF Loop <- 1 TO Limit

    08     OUTPUT "Enter a number"

    09     INPUT Loop

    10     Total <- Total * Value

    11 NEXT Loop

    12 OUTPUT "The total of the numbers entered is ", Total

    13 OUTPUT "The average of the numbers entered is ", Total / Limit

    \end{alltt}'
  answer_options: []
  subquestions:
