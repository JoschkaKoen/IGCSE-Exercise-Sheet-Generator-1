- number: '10'
  question_type: long_answer
  page: 12
  subpage_row: 1
  subpage_col: 1
  marks: 15
  text: "A sports club uses a six-character alphanumeric membership code to identify\
    \ each member of the club.\n\nThe one-dimensional (1D) array \\texttt{MemberID[]}\
    \ is used to store the unique membership codes for club members.\n\nThe two-dimensional\
    \ (2D) array \\texttt{Name[]} is used to store the names of the club members.\
    \ The first and last name of each member will be stored in separate array elements.\n\
    \nThe system can store details for a maximum of 1000 members.\n\nThe position\
    \ of any member's data is the same in both arrays. For example, the data in index\
    \ 2 of \\texttt{MemberID[]} belongs to the member in index 2 of \\texttt{Name[]}\n\
    \nThe variable \\texttt{NewID} is used to input a new membership code.\n\nWrite\
    \ a program that meets the following requirements:\n\n\\begin{itemize}\n\\item\
    \ Provide a menu that offers the choices: inputting a new member, outputting a\
    \ list of membership codes and first and last names, or stopping.\n\\item Input\
    \ and validate a response to the menu.\n\\item When inputting a new member, input\
    \ a new membership code and check that it contains six characters:\n  \\begin{itemize}\n\
    \  \\item If the new code is six characters, check it against all the previously\
    \ stored membership codes to make sure it is unique.\n  \\item If the code is\
    \ \\textbf{not} unique, a new code must be entered and checked.\n  \\item If the\
    \ code is unique, it is stored in the first available space in the appropriate\
    \ array and the new member is required to enter their first name and last name,\
    \ which are also stored in the corresponding location of the appropriate array.\n\
    \  \\end{itemize}\n\\item When outputting a list of membership codes and names,\
    \ output for each member: their membership code, first name and last name.\n\\\
    item The program will continue until the stop option on the menu is selected.\n\
    \\end{itemize}\n\nYou must use pseudocode or program code \\textbf{and} add comments\
    \ to explain how your code works.\n\nYou do \\textbf{not} need to declare any\
    \ arrays, variables or constants; assume this has already been done.\n\nYou do\
    \ \\textbf{not} need to initialise the data in the arrays.\n\nYou do need to initialise\
    \ any variables or constants used if appropriate.\n\nAll inputs and outputs must\
    \ contain suitable messages."
  answer_options: []
  subquestions: []
