- number: 3cii
  question_type: long_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: '\textbf{One mark from:}

    \begin{itemize}

    \item Serial

    \item Parallel

    \end{itemize}

    \textbf{One mark from:}

    \begin{itemize}

    \item Half-duplex

    \item Full-duplex

    \item Simplex

    \end{itemize}

    \textbf{Any four from (for descriptions matching transmission types given):}

    \newline

    \textbf{serial}

    \begin{itemize}

    \item Serial would send bits in order // serial uses only one wire.

    \item ... so won''t be skewed // less likely to have errors

    \item Serial transmission speed would be adequate.

    \end{itemize}

    \textbf{parallel}

    \begin{itemize}

    \item Parallel would transmit data faster.

    \item ... as multiple bits are sent at the \textbf{same time} // ... as multiple
    wires are used.

    \item For parallel, chance of \textbf{skewing/errors} would be low as \textbf{short
    distance} transmission only required.

    \end{itemize}

    \textbf{half/full duplex}

    \begin{itemize}

    \item To allow data to be sent in both directions

    \item ... so any interrupts/notifications for errors can be sent back to the computer.

    \end{itemize}

    \textbf{simplex}

    \begin{itemize}

    \item Data \textbf{only} needs to be sent one direction // Data transmission doesn''t
    need to be two-way.

    \item ... as the printer may not need to send errors back to the computer

    \end{itemize}'
  mark_scheme: []
  graphics: []
- number: 3ciii
  question_type: long_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: '\begin{itemize}

    \item A parity bit is added to each \textbf{byte}.

    \item … to make the number of 1s/0s even // that will be 1 if the number of 1s/0s
    is odd // that will be 0 if the number of 1s/0s is even.

    \item The number of 1s/0s in each byte is counted \textbf{after transmission}.

    \item If any bytes have an odd number of 1s/0s an error is detected

    \end{itemize}'
  mark_scheme: []
  graphics: []
- number: 4a
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'One mark for each correct component or description

    \newline

    \begin{tabular}{|c|l|}

    \hline

    \textbf{Component} & \multicolumn{1}{c|}{\textbf{Description}} \\ \hline

    \textbf{Control unit // CU} & It sends signals to all the components in the CPU
    to manage the flow of data through the CPU. \\ \hline

    \textbf{Arithmetic and logic unit // ALU} & It carries out all the arithmetic
    and logic operations in the CPU. \\ \hline

    Cache & \textbf{It stores frequently used data/instructions} \\ \hline

    Program counter (PC) & \textbf{It stores the address of the next instruction to
    be fetched} \\ \hline

    \textbf{Clock} & It controls the number of fetch-decode-execute (FDE) cycles that
    are performed per second. \\ \hline

    \textbf{Memory data register // MDR} & It stores data immediately before it is
    transmitted to RAM and immediately after it is received from RAM. \\ \hline

    \end{tabular}'
  mark_scheme: []
  graphics: []
