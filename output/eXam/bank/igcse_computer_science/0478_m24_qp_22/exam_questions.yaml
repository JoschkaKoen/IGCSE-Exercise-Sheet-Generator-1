- number: '11'
  question_type: long_answer
  page: 14
  subpage_row: 1
  subpage_col: 1
  marks: 15
  text: "Students in a class are recording the amount of time in minutes spent in\
    \ front of a screen for each day of the week.\n\nThe one-dimensional (1D) array\
    \ \\texttt{StudentName[]} contains the names of the students in the class.\n\n\
    The two-dimensional (2D) array \\texttt{ScreenTime[]} is used to input the number\
    \ of minutes on each day spent in front of a screen.\n\nThe position of each student's\
    \ data in the two arrays is the same. For example, the student stored at index\
    \ 10 in \\texttt{StudentName[]} and \\texttt{ScreenTime[]} is the same.\n\nThe\
    \ variable \\texttt{ClassSize} contains the number of students in the class.\n\
    \nWrite a program that meets these requirements:\n\n\\begin{itemize}\n\\item allows\
    \ all the students to enter their daily minutes of screen times for the past week\n\
    \\item calculates the total number of minutes of screen time for each student\
    \ in the week\n\\item counts, for each student, the number of days with more than\
    \ 300 minutes of screen time\n\\item calculates the average weekly minutes of\
    \ screen time for the whole class\n\\item finds the student with the lowest weekly\
    \ minutes of screen time\n\\item outputs for each student:\n  \\begin{itemize}\n\
    \  \\item name\n  \\item total week's screen time in hours and minutes\n  \\item\
    \ number of days with more than 300 minutes of screen time\n  \\end{itemize}\n\
    \\item outputs the average weekly minutes of screen time for the whole class\n\
    \\item outputs the name of the student with the lowest weekly screen time.\n\\\
    end{itemize}\n\nYou must use pseudocode or program code \\textbf{and} add comments\
    \ to explain how your code works. All inputs and outputs must contain suitable\
    \ messages.\n\nAssume that the array \\texttt{StudentName[]} and the variable\
    \ \\texttt{ClassSize} already contain the required data.\n\nYou do not need to\
    \ declare any arrays or variables; you may assume that this has already been done."
  answer_options: []
  subquestions: []
