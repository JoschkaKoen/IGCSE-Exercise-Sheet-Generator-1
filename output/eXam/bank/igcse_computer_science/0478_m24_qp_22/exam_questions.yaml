  subpage_row: 1
  subpage_col: 1
  marks: 0
  text: 'An algorithm has been written in pseudocode to calculate the profit when
    an item is sold. Values for cost price and selling price are input, the profit
    is calculated (selling price – cost price) and output. The input of zero for either
    value stops the algorithm.


    \begin{alltt}

    01 REPEAT

    02   OUTPUT "Enter cost price "

    03   INPUT Cost

    04   OUTPUT "Enter selling price "

    05   OUTPUT Sell

    06   IF Cost <> 0 OR Sell <> 0

    07     THEN

    08       Profit <- Sell - Cost

    09       OUTPUT "Profit is ", Profit

    10   NEXT

    11 UNTIL Cost = 0 OR Sell = 0

    \end{alltt}'
