      \begin{tabular}{|c|c|c|c|c|}
      \hline
      \textbf{A} & \textbf{B} & \textbf{C} & \textbf{Working space} & \textbf{X} \\ \hline
      0 & 0 & 0 & & \\ \hline
      0 & 0 & 1 & & \\ \hline
      0 & 1 & 0 & & \\ \hline
      0 & 1 & 1 & & \\ \hline
      1 & 0 & 0 & & \\ \hline
      1 & 0 & 1 & & \\ \hline
      1 & 1 & 0 & & \\ \hline
      1 & 1 & 1 & & \\ \hline
      \end{tabular}