- number: '6'
  question_type: short_answer
  page: 6
  subpage_row: 1
  subpage_col: 1
  marks: 0
  text: "This pseudocode is an algorithm.\n\n\\begin{alltt}\nDECLARE Word : STRING\n\
    DECLARE V1 : INTEGER\nDECLARE V2 : INTEGER\nDECLARE Number : INTEGER\nDECLARE\
    \ Index : INTEGER\nDECLARE L1 : CHAR\nDECLARE L2 : CHAR\nDECLARE Continue : BOOLEAN\n\
    INPUT Number\nFOR Index <- 1 TO Number\n    INPUT Word\n    Continue <- TRUE\n\
    \    V1 <- 1\n    V2 <- LENGTH(Word)\n    WHILE Continue = TRUE AND V1 < V2 DO\n\
    \        L1 <- SUBSTRING(Word, V1, 1)\n        L2 <- SUBSTRING(Word, V2, 1)\n\
    \        IF L1 <> L2\n        THEN\n            Continue <- FALSE\n        ELSE\n\
    \            V1 <- V1 + 1\n            V2 <- V2 - 1\n        ENDIF\n    ENDWHILE\n\
    \    IF Continue = TRUE\n    THEN\n        OUTPUT \"Successful\"\n    ELSE\n \
    \       OUTPUT \"NOT successful\"\n    ENDIF\nNEXT Index\n\\end{alltt}"
