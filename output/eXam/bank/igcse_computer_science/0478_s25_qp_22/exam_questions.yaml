- number: '5'
  question_type: short_answer
  page: 4
  subpage_row: 1
  subpage_col: 1
  marks: 0
  text: "This pseudocode algorithm should allow 500 names of people and their heights\
    \ to be entered and stored in two one-dimensional (1D) arrays. The name of a person\
    \ and the height of that person are in the same index in both the \\texttt{Names[]}\
    \ and the \\texttt{Heights[]} arrays.\n\nThe algorithm performs as follows:\n\n\
    \\begin{itemize}\n\\item at the start, the following data is entered:\n  \\begin{itemize}\n\
    \  \\item name of person\n  \\item height of person in cm\n  \\end{itemize}\n\\\
    item the data is stored in the relevant arrays\n\\item the heights of the people\
    \ are totalled\n\\item the shortest person is found\n\\item at the end, the following\
    \ is output:\n  \\begin{itemize}\n  \\item name of shortest person\n  \\item height\
    \ of shortest person\n  \\item average height of all 500 people.\n  \\end{itemize}\n\
    \\end{itemize}\n\n\\begin{alltt}\n01 DECLARE Names : ARRAY[1:500] OF REAL\n02\
    \ DECLARE Heights : ARRAY[1:500] OF REAL\n03 DECLARE Shortest : REAL\n04 DECLARE\
    \ Total : REAL\n05 DECLARE Counter : INTEGER\n06 DECLARE Index : INTEGER\n07 Shortest\
    \ <- 500\n08 Index <- 0\n09 Total <- 100\n10 FOR Counter <- 1 TO 500\n11     INPUT\
    \ Names[Index]\n12     INPUT Heights[Counter]\n13     Total <- Counter + Heights[Counter]\n\
    14     IF Heights[Counter] < Shortest\n15     THEN\n16         Shortest <- Heights[Counter]\n\
    17         Index <- Counter\n18     ENDIF\n19 NEXT Counter\n20 OUTPUT \"The shortest\
    \ height is \", Heights\n21 OUTPUT \"The shortest person is \", Names[Index]\n\
    22 OUTPUT \"The average height is \", Total / 500\n\\end{alltt}"
  answer_options: []
