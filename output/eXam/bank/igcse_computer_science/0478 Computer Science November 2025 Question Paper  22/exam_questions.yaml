- number: '8'
  question_type: long_answer
  page: 12
  subpage_row: 1
  subpage_col: 1
  marks: 15
  text: "A program is required to test the fairness of the random number generator.\n\
    \nThe one-dimensional (1D) array \\texttt{RandomNumber[]} is used to store 100000\
    \ random integers.\n\nThe two-dimensional (2D) array \\texttt{CountedNumber[]}\
    \ is used to store the integers 1 to 10, inclusive, and the frequency of each\
    \ integer (the number of times each integer was generated).\n\nWrite a program\
    \ that meets the following requirements:\n\n\\begin{itemize}\n\\item Generate\
    \ 100000 random integers between 1 and 10, inclusive.\n\\item Store each integer\
    \ in the appropriate array.\n\\item Calculate the frequency of each of the integers\
    \ 1 to 10 and store these values in the appropriate array.\n\\item Sort the contents\
    \ of the counted number array in \\textbf{descending order} of frequency.\n\\\
    item Calculate the chance of generating each of the integers 1 to 10, rounded\
    \ to four decimal places.\nUse the formula: chance = frequency / 100000\n\\item\
    \ Output each of the integers 1 to 10 in the order they are stored in the counted\
    \ number array, along with the chance of generating them.\n\\end{itemize}\n\n\
    The following is an example of an algorithm that sorts a 2D array in an ascending\
    \ order:\n\n\\begin{alltt}\nF <- TRUE\nWHILE F DO\n  F <- FALSE\n  FOR I <- 1\
    \ TO 9\n    IF A[I, 2] > A[I + 1, 2]\n    THEN\n      T1 <- A[I, 1]\n      T2\
    \ <- A[I, 2]\n      A[I, 1] <- A[I + 1, 1]\n      A[I, 2] <- A[I + 1, 2]\n   \
    \   A[I + 1, 1] <- T1\n      A[I + 1, 2] <- T2\n      F <- TRUE\n    ENDIF\n \
    \ NEXT I\nENDWHILE\n\\end{alltt}\n\nYou must use pseudocode or program code \\\
    textbf{and} add comments to explain how your code works.\n\nAll arrays, variables\
    \ or constants used must be declared for this algorithm.\n\nAll inputs and outputs\
    \ must contain suitable messages."
  answer_options: []
  subquestions: []
