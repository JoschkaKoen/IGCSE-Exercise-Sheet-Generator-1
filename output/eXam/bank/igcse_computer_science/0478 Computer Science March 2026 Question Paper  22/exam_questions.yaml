- number: '9'
  question_type: long_answer
  page: 14
  subpage_row: 1
  subpage_col: 1
  marks: 15
  text: 'A program is required to enable voting in class surveys, for example to find
    the most popular smartphone.


    The one-dimensional (1D) array \texttt{Options[]} is used to store between 2 and
    12 options on which users can vote.


    The one-dimensional (1D) array \texttt{Votes[]} is used to store the votes of
    between 2 and 1000 users.


    The one-dimensional (1D) array \texttt{VoteCount[]} is used to store the number
    of votes for each of the options. The array index represents the option number.


    Write a program for the following requirements:


    \begin{itemize}

    \item Initialise all the arrays before they are used.

    \item Input and validate the number of options and the number of voters.

    \item Input each of the required options and store them in the array \texttt{Options[]}

    \item Display the list of options for each voter and allow each voter to input
    their preferred option. Validate this input and store it in the array \texttt{Votes[]}

    \item Once all the votes have been input, count the number of voters who chose
    each option and find the most and least popular options.

    \item Output the most and least popular options as well as the number of voters
    who selected each of these options.

    \end{itemize}


    The program does \textbf{not} need to identify if two or more options are the
    equal most or least popular.


    You must use pseudocode or program code, and add comments to explain how your
    code works.


    Do \textbf{not} declare arrays, variables or constants for this algorithm; assume
    this has been done. Initialisation must be carried out as appropriate.


    All inputs and outputs must contain suitable messages.'
  answer_options: []
  subquestions: []
