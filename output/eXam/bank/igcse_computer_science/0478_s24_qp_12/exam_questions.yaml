    \hline

    \textbf{error detection method} & \textbf{statement} \\ \hline

    \hrulefill & An odd or even process can be used. \\ \hline

    \hrulefill & A value is calculated from the data, using an algorithm. This happens
    before and after the data is transmitted. \\ \hline

    \hrulefill & A copy of the data is sent back to the sender by the receiver. \\
    \hline

    \hrulefill & Acknowledgement and timeout are used. \\ \hline

    \hrulefill & A value is appended to data that has been calculated using the data.
    This value is checked on data entry. \\ \hline

    \end{tabular}'
