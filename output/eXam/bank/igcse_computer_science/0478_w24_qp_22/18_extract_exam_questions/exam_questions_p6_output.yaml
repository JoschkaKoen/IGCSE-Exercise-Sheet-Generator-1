    type: short_answer
    text: |
      This pseudocode represents an algorithm.

      An input of $-1$ will terminate the algorithm.

      \begin{alltt}
      DECLARE Count : INTEGER
      DECLARE Answer : INTEGER
      DECLARE Value : INTEGER
      REPEAT
        INPUT Value
        IF Value <> -1
        THEN
          Answer <- Value
          FOR Count <- Value - 1 TO 1 STEP -1
            Answer <- Answer * Count
          NEXT Count
          OUTPUT Answer
        ENDIF
      UNTIL Value = -1
      \end{alltt}
