  text: "This pseudocode represents an algorithm.\n\nAn input of $-1$ will terminate\
    \ the algorithm.\n\n\\begin{alltt}\nDECLARE Count : INTEGER\nDECLARE Answer :\
    \ INTEGER\nDECLARE Value : INTEGER\nREPEAT\n  INPUT Value\n  IF Value <> -1\n\
    \  THEN\n    Answer <- Value\n    FOR Count <- Value - 1 TO 1 STEP -1\n      Answer\
    \ <- Answer * Count\n    NEXT Count\n    OUTPUT Answer\n  ENDIF\nUNTIL Value =\
    \ -1\n\\end{alltt}"
