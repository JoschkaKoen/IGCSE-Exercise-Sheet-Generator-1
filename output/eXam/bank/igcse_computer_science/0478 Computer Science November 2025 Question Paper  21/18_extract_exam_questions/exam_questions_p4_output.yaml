    type: short_answer
    text: |
      The restaurant offers a discount on a meal if the person ordering is either a student or is 65 years or older. The discount ($X = 1$) can only be given if the amount of the order is \$20.00 or over.

      \begin{tabular}{|c|l|c|}
      \hline
      rule A & a student & 0 \\ \cline{2-3}
             & not a student & 1 \\ \hline
      rule B & under 65 years old & 0 \\ \cline{2-3}
             & 65 years or older & 1 \\ \hline
      rule C & under \$20.00 & 0 \\ \cline{2-3}
             & \$20.00 or over & 1 \\ \hline
      \end{tabular}
