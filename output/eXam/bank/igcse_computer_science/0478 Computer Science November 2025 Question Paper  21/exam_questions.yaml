- number: '11'
  question_type: long_answer
  page: 14
  subpage_row: 1
  subpage_col: 1
  marks: 15
  text: "The scores for each competitor in an archery competition are recorded.\n\n\
    The one-dimensional (1D) array \\texttt{CompetitorName[]} is used to store the\
    \ names of the competitors.\n\nThe maximum number of competitors is 30.\n\nThere\
    \ are 10 rounds in the competition with a maximum score of 30 per round.\n\nThe\
    \ two-dimensional (2D) array \\texttt{CompetitorScore[]} stores the score in each\
    \ of the 10 rounds for each competitor.\n\nThe first index of the array \\texttt{CompetitorScore[]}\
    \ is the same as the index of the competitor in \\texttt{CompetitorName[]}\n\n\
    After the 10 rounds have been completed, the highest score and the lowest score\
    \ for each competitor are discarded.\n\nThe overall score for each competitor\
    \ is the total of the remaining 8 scores (after discarding the highest and lowest\
    \ scores).\n\nA competitor with an overall score of 210 or more moves onto the\
    \ next competition. A competitor with an overall score between 180 and 209 inclusive\
    \ becomes a reserve competitor. A competitor with an overall score below 180 does\
    \ not qualify.\n\nWrite a program that meets the following requirements:\n\n\\\
    begin{itemize}\n\\item inputs the total score (out of 30) for each competitor\
    \ in each round\n\\item validates each input is between 0 and 30 inclusive\n\\\
    item calculates the overall score for each competitor discarding the highest and\
    \ lowest scores\n\\item outputs the name of each competitor and if they move onto\
    \ the next competition, are a reserve or do not qualify\n\\item calculates and\
    \ outputs the number of competitors who:\n  \\begin{itemize}\n  \\item have qualified\
    \ for the next competition\n  \\item are reserve competitors\n  \\item do not\
    \ qualify.\n  \\end{itemize}\n\\end{itemize}\n\nYou must use pseudocode or program\
    \ code \\textbf{and} add comments to explain how your code works.\n\nYou do \\\
    textbf{not} need to declare any arrays or variables; assume that this has already\
    \ been done.\n\nAll inputs and outputs must contain suitable messages."
  answer_options: []
  subquestions: []
