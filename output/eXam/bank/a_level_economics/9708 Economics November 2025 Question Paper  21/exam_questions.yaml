    Mexico’s backward-looking energy policy is bad for the country and the planet


    In 2023, Mexico’s energy policies looked increasingly out of step with those in
    the rest of the

    world. The Mexican President reversed recent reforms of Mexico’s energy market.
    These reforms

    increased the role of private sector firms. He changed the balance of the mixed
    economy by

    prioritising state-owned companies and stressed that Mexico should produce its
    own energy

    rather than importing it.


    The government invested in a new oil refinery and decided to keep coal-fired power
    stations

    running. It also gave state-owned electricity and oil companies priority over
    private sector rivals,

    so it was harder for private firms to obtain permits to generate electricity or
    to explore for oil.


    Mexico has traditionally exported crude oil and imported natural gas. However,
    the new plan is

    that the oil will be used to generate the country’s electricity. There has been
    a global shift towards

    energy self-sufficiency but it is unclear whether Mexico has the capacity to produce
    enough

    electricity for its 130 million people. There may also be an impact on the country’s
    balance of trade

    in goods which was in deficit for nine months of 2022, as shown in Figure 1.1.

    Jan-22

