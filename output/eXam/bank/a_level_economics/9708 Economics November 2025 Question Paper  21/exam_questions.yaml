    Fig. 1.1 Mexico’s balance of trade in goods, January 2022 to December 2022


    Energy is likely to become more expensive. Operating costs of the state-owned
    electricity

    producers are significantly higher than their private sector rivals. Its old and
    inefficient plants are

    expensive to maintain. These costs will be passed on to the consumer, either directly
    or by the

    government having to spend more on subsidies to keep down the price.


    The environment will also suffer. Mexico will see less investment in renewable
    energy because of

    its change in energy policy. In the past, domestic and foreign firms in the private
    sector did much

    of the investing. The policy change means that Mexico is unlikely to meet its
    pledge to produce

    35% of its electricity from renewable sources by 2024.


    The impact of the energy policy may be felt in the economy more broadly. The earlier
    energy

    reforms had helped to bring manufacturers to Mexico by making power cheaper and
    more reliable.

    Now the uncertainty is deterring investors.


    The opportunity cost of Mexico’s new energy policy is huge. Economists reckon
    that Mexico could

    have produced almost half its electricity from renewable sources long before its
    target of 2050.

    Multinational companies were looking at Mexico as an alternative location to other
    countries, but

    because of Mexico’s change in energy policy, those companies are likely to go
    elsewhere.

    Source: Adapted from: ‘Mexico’s energy policy’, The Economist,

    The World Ahead 2023, published 2022


    (a) Using the information provided, explain whether Mexico is a mixed economy.

    [2]


    (b) Explain what is meant by ‘The opportunity cost of Mexico’s new energy policy
    is huge.’

    [2]


    (c) Consider the extent to which direct provision of electricity in Mexico through
    state-owned

    companies may be advantageous to consumers.

    [4]


    (d) With the help of a diagram, assess whether the potential advantages of providing
    a subsidy

    to keep down the price of electricity in Mexico will outweigh the potential disadvantages.
    [6]


    (e) Assess the potential benefits and limitations of Mexico keeping its oil to
    generate the country’s

    electricity.

    [6]

