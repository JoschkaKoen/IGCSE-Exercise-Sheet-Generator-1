    Malaysia’s uncertain economic prospects

    Malaysia is an emerging middle-income country. Its increasing population is an
    important factor

    in promoting future economic growth. The country, however, faces two underlying
    problems.

    First, the fertility rate, the average number of children a woman can expect to
    give birth to, has

    fallen consistently as Malaysia’s economy has developed. This rate is now below
    the critical level

    where a population replaces itself. Second, Malaysia has an ageing population,
    with an increasing

    proportion of its population over 65 years of age. In 2015 the average age of
    Malaysia’s population

    was 28.2 years; in 2030 it is forecast to reach 34.1 years. Malaysia’s forecast
    total population to

    2027 and its ageing population from 2017 to 2022 are shown in Figs. 1.1 and 1.2
    below.

    Fig. 1.1 Total population of Malaysia, 2017 to 2027

    0

    percent

    2017

    2018

