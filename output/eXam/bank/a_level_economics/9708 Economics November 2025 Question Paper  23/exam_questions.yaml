    *2022 is forecast

    Fig. 1.2 Share of population older than 65 years in Malaysia, 2017 to 2022

    The key issue for Malaysia’s government is whether it is prepared for this fundamental
    shift in its

    population. There is plenty of scope for optimism. The economy appears to have
    recovered from

    the shock of the COVID-19 pandemic. Its growth rate in 2021 and the 2022 forecast
    was above

    the government’s target of 5.1%, with substantial growth in exports of electrical
    and electronic

    goods, palm oil, gas and oil supplies. Unemployment is below 4% and the current
    account of the

    balance of payments was projected to have a record surplus in 2022.

    Content removed due to copyright restrictions.


    Economists, however, fear that Malaysia’s government and its people are not ready
    to meet the

    challenges of an ageing population. In a recent survey, 70% of respondents felt
    it was the duty of

    the young to take care of the elderly, but they were also concerned that the economy
    could not

    cope with the pressure on its human capital and other resources. More resources
    will have to be

    allocated to meet the needs of the elderly.


    It was further argued that Malaysia needed a proper plan for dealing with this
    situation. According

    to one economist, free childcare for working parents was essential and tax incentives
    should be

    used to keep more elderly workers in employment.

    Source: Saw Yee Fung, Low rates impact on Malaysia’s human capital and economic
    development,

    The Star (KL) 15 October 2022.


    (a) Use the information in Figs. 1.1 and 1.2 to compare the change in Malaysia’s
    total population

    from 2017 to 2022 with the change in its ageing population from 2017 to 2022.

    [2]


    (b) Explain one example of ‘what to produce’ in Malaysia that may have to change
    in order to

    meet the needs of its ageing population.

    [2]


    (c) With the help of a production possibility curve (PPC) diagram, consider the
    extent to which

    Malaysia’s productive capacity is likely to change with its projected change in
    total population.


    [4]


    (d) Assess whether the Malaysian government should provide free childcare to working
    parents.


    [6]


    (e) Excluding net exports, assess the likely impact of the change in Malaysia’s
    total population

    on aggregate demand.

    [6]

    Section B

