  mark_scheme_answer: 'Assess whether the Malaysian government should provide free

    childcare to working parents.

    Up to 3 marks for explanation/analysis of why the Malaysian government

    should provide free childcare to working parents.

    •

    Supports low-income families by reducing childcare costs, helping to

    reduce poverty and income inequality.

    •

    Raises overall consumption and tax revenue, supporting higher economic

    growth.

    •

    Reduces financial pressure on parents by removing childcare costs,

    allowing them to save or consume on other goods and services.

    •

    Makes it easier for both parents to work, improving household income

    and living standards.

    Up to 3 marks for explanation/analysis of why the Malaysian government

    should not provide free childcare to working parents.

    •

    Providing free childcare has a high opportunity cost, as government

    spending could be better used on healthcare, pensions, or infrastructure.

    •

    It distorts the price mechanism by making childcare artificially cheap,

    leading to overconsumption and inefficient use of resources.

    •

    It may reduce incentives for private childcare providers, lowering quality,

    efficiency, and competition in the market.

    •

    Funding it through higher taxes could discourage work and investment,

    reducing overall economic productivity.

    Up to 3 marks maximum for each perspective, with an overall maximum

    of 4 marks.

    Guidance: The assessment must clearly demonstrate economic impacts.

    If only the reason why or why not free childcare should be provided, then a

    maximum of 3 marks.

    Up to 2 marks for evaluation

    •

    That clearly considers both viewpoints. For example, although free

    childcare helps families and can increase economic growth, but the

    government must consider the opportunity cost and how it might distort

    the price mechanism.

    •

    Comes to a reasoned conclusion as to whether the government should

    provide free childcare to working parents (reserve 1 mark.)

    No mark for eval can be awarded if just one perspective is considered.

    6

    9708/23

    October/November

    2025'
