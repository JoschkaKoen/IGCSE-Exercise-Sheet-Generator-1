  mark_scheme_answer: 'With the help of a production possibility curve (PPC) diagram,
    consider

    the extent to which Malaysia’s productive capacity is likely to change

    with its projected change in total population.

    •

    Correctly labelled axes (both must be goods. For example, capital goods

    and consumer goods) (1)

    •

    PPC diagram that touches both axes. Either straight line or concave. (1)

    •

    An outwards shift of the PPC–this must touch both axes and show an

    increased productive potential of both goods (1).

    For valid evaluation

    •

    The size of the outwards shift may depend on the extent to which

    Malaysia improves productivity (e.g. through technology or retraining

    older workers) (1).

    •

    If the retirement age does not change then a larger proportion of the

    labour force will retire which may limit or reverse the outward shift in the

    PPC. (1)

    •

    Other relevant comments that focus on the extent to which Malaysia’s

    PPC will shift outwards or otherwise.

