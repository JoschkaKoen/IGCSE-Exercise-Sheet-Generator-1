  mark_scheme_answer: 'Excluding net exports, assess the likely impact of the change
    in

    Malaysia’s total population on aggregate demand.

    Up to 3 marks for explanation/analysis of the change in Malaysia’s total

    population would increase the level of aggregate demand.

    •

    A larger population means more consumers, so overall spending on

    goods and services (consumption) increases, causing AD to rise.

    •

    Population growth creates higher demand for housing and infrastructure,

    encouraging firms to invest more, which raises investment in AD.

    •

    The government may need to spend more on healthcare, education, and

    other public services, increasing government expenditure, a component

    of AD.

    •

    More people can lead to a bigger workforce, increasing total income in

    the economy and allowing households to spend more, boosting

    consumption.

    Up to 3 marks for explanation/analysis of the change in Malaysia’s total

    population would reduce the level of aggregate demand.

    •

    If population growth causes unemployment to rise, many people may

    have lower or no income, reducing overall consumption and limiting AD

    growth.

    •

    If people decide to save more due to uncertainty about the future, the

    increase in consumption will be smaller, so AD won’t rise much.

    •

    Increased demand from a larger population might cause prices to rise

    (inflation), reducing the real value of incomes and spending power.

    •

    Government budgets may be strained by population growth, limiting its

    ability to increase spending, so the impact on AD could be limited.

    Up to 3 marks maximum for each perspective, with an overall maximum

    of 4 marks.

    Up to 2 marks for evaluation

    •

    That clearly considers both viewpoints. For example, although population

    growth can increase aggregate demand, but higher costs, inflation, and

    unemployment may limit how much demand actually rises.

    •

    Comes to a reasoned conclusion as to whether the likely impact of the

    change in Malaysia’s total population on aggregate demand (reserve 1

    mark)

    No mark for evaluation can be awarded if just one perspective is

    considered.

    6

    9708/23

    October/November

    2025

    Section B

    EITHER'
