    With the help of a diagram, evaluate the impact on consumers and

    producers of an increase in market contestability.

    Use Table A: AO1 Knowledge and understanding and AO2 Analysis and

    Table B: AO3 Evaluation to mark candidate responses to this question.

    AO1 and AO2 out of 14 marks. AO3 out of 6 marks.

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding and AO2 Analysis

    •

    Market contestability should be explained by referring to how open a

    market might be to new competition.

    •

    Existing factors which might limit contestability can be identified, including

    examples of barriers to entry, particularly high sunk costs.

    20

    9708/43

    October/November

    2025

    2

    •

    Recognition and description of the conditions that will exist when a

    market is not contestable. A clearly labelled, accurate diagram should be

    provided showing profit maximization price and output. (accept either

    Oligopoly or Monopoly diagram)

    •

    Analysis should examine the impact on consumers when barriers to entry

    are removed. A diagram could be used to indicate that consumers might

    benefit from lower prices and more choice

    •

    Analysis can be used to assess the impact of an increase in contestability

    on firms. It is likely that abnormal profits might be reduce.

    •

    Analysis could also be used to indicate why contestability might create

    incentives for a business to reduce their unit costs by avoiding any X-

    inefficiencies

    AO3 Evaluation

    •

    The removal of barriers to entry and a subsequent loss of market share

    might mean that a firm cannot benefit from economies of scale to the

    same extent. It is possible that as a result of this lower prices might not

    be passed on to the consumer.

    •

    The respective impact on consumers and producers will be determined

    by the degree of contestability introduced and how well it can be

    maintained.

    •

    The type of industry will also determine whether an increase in

    contestability will have a positive effect on consumers and producers. For

    example, natural monopolies by their nature, are unlikely to become more

    efficient when barriers to entry are removed.

    •

    Firms with high barriers to entry may lose the opportunity to make

    sufficient abnormal profits to ensure dynamic efficiency is maintained.

    This may lead to higher prices for some consumers.

    •

    A conclusion should be attempted which examines the net benefits that

    might be gained by introducing more contestable markets to either/or

    consumers/producers

    Accept all valid responses.

    No diagram L2 Max

    AO1 Knowledge and understanding and AO2 Analysis

    14

    AO3 Evaluation

