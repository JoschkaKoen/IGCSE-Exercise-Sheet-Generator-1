    With the help of a diagram, evaluate the effectiveness of using monetary

    policy to increase the rate of economic growth in an economy.

    Use Table A: AO1 Knowledge and understanding and AO2 Analysis and

    Table B: AO3 Evaluation to mark candidate responses to this question.

    AO1 and AO2 out of 14 marks. AO3 out of 6 marks.

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding and AO2 Analysis

    •

    A clear outline of different types of monetary policy, including changes to

    the money supply, changes in interest rates and exchange rate policy.

    •

    A detailed explanation of what is meant by ‘economic growth’ and why it

    is important.

    •

    An accurate, clearly labelled diagram indicating the link between an

    increase in aggregate monetary demand and an increase in real

    GDP/output.

    •

    Analysis can be used to show how a government will be able to increase

    the money supply, which in turn might reduce interest rates, increase

    investment and ultimately increase aggregate demand and GDP, thus

    achieving economic growth.

    •

    Central banks might directly reduce interest rates which would be

    expected to increase borrowing and consumer expenditure and ultimately

    lead to an increase in real GDP.

    •

    Alternative analysis might focus upon the impact of changes in the

    exchange rate and how a devaluation of the currency might lead to an

    export led growth of income, employment and real GDP.

    No diagram Max L3

    20

    9708/43

    October/November

    2025

    4

    AO3 Evaluation

    •

    The immediate impact of monetary policy on income, output and growth

    will depend upon the existing state of the economy when the policy is

    introduced. The policy will have a greater impact when the economy has

    significant spare capacity.

    •

    An increase of the money supply might be relatively ineffective due to the

    existence of the liquidity trap or due to a low elasticity of the MEC curve.

    •

    Negative expectations would also determine the extent to which a

    decrease in interest rates is likely to increase consumer expenditure,

    which will then reduce the impact on output.

    •

    Currency devaluation will only be effective if this results in a net increase

    in trade. This will be determined to some extent by the Marshall-Lerner

    condition.

    •

    Increase in money supply might cause high inflation.

    •

    In a situation of ‘stagflation’ when unemployment is high and prices are

    high the use of monetary policy might solve one problem at the expense

    of the other. A more appropriate long-term policy might be supply-side

    based. For example, investment in skills training/education

    •

    A conclusion should attempt to assess the relative effectiveness of each

    type of policy approach and consider which approach is likely to be the

    most effective in the short run and then compare this with possible

    outcomes that might be achieved in the long run.

    Accept all valid responses.

    AO1 Knowledge and understanding and AO2 Analysis

    14

    AO3 Evaluation

    6

