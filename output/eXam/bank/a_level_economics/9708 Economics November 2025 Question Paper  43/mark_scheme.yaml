    With the help of a diagram, assess the importance of the supply of

    labour in relation to the wage and employment levels for firms operating

    in perfectly competitive and monopsony labour markets.

    Use Table A: AO1 Knowledge and understanding and AO2 Analysis and

    Table B: AO3 Evaluation to mark candidate responses to this question.

    AO1 and AO2 out of 14 marks. AO3 out of 6 marks.

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding and AO2 Analysis

    •

    Characteristics of a perfectly competitive labour market should be

    described.

    •

    The assumptions which determine the shape of the supply of labour to a

    firm in a perfectly competitive labour market.

    •

    A diagram should be provided which shows how wages are determined

    and employment will be determined within a firm operating in a perfectly

    competitive labour market.

    •

    An explanation of how wages and employment might be determined in a

    monopsony labour market

    •

    Analysis should refer to the perfectly competitive labour market and why

    firms operating in this market have a perfectly elastic supply of labour and

    how this relates to demand for labour and employment

    •

    Analysis can be used to determined how an equilibrium wage would be

    determined in a monopsony labour market. The importance of an upward

    sloping supply of labour should be discussed.

    •

    Analysis should then be used to show why workers are likely to receive

    lower wages and less employment opportunities primarily due to the

    supply of labour being influence by a monopsony buyer of labour.

    20

    9708/43

    October/November

    2025

    3

    AO3 Evaluation

    •

    Although the supply of labour to a firm in a perfect labour market is

    perfectly elastic, this does not mean the wage rate is fixed. For example,

    an increase in labour productivity across the market will lead to an

    increase in the wage paid by each firm plus an increase in employment in

    each firm.

    •

    It should also be recognized that a shortage of labour supply in a perfect

    labour market will also lead to higher wages paid by individual firms as

    well as an increase in unemployment.

    •

    An increase in the marginal productivity in a perfect labour market within

    a firm will not lead to an increase in wages paid by the firm, nevertheless

    it should still lead to an increase of employment of labour.

    •

    A firm in a monopsony market will employ labour up to the point where

    the marginal cost of employing labour is equal to the marginal revenue

    product of labour. This will mean that employees will receive a wage

    lower than that determined by the interaction of the supply of and demand

    for labour.

    •

    Sometimes, a government will intervene in a monopsony labour by

    establishing a minimum wage, this will produce a perfectly elastic supply

    of labour at that wage, while increasing wages and employing. Trade

    union intervention may achieve a similar outcome.

    •

    A conclusion should attempt to evaluate the state in the using the

    preceding discussion.

    No diagram L2 Max

    Must refer to both markets for L3

    Accept all valid responses.

    AO1 Knowledge and understanding and AO2 Analysis

    14

    AO3 Evaluation

