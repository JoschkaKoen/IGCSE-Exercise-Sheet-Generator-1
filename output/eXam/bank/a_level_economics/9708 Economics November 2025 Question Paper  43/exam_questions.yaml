  text: "1\n\nInequality and globalisation\n\nA government commission published a\
    \ report saying that global poverty and inequality were\nworsening and there was\
    \ a risk that the gap between the rich and the poor would increase.\n\nBut, according\
    \ to a newspaper, a lot of what is said about inequality is wrong. It overlooks\
    \ the\nfact that the past 50 years saw a period of dramatic reduction in global\
    \ inequality. The normal\nmeasurement of relative inequality is the Gini coefficient.\
    \ The figure for global inequality in 1975\nwas 0.75, in 2020 it was 0.72 and\
    \ in 2022 it was 0.67.\n\nIt is important to understand this trend rather than\
    \ make the mistake of the commission.\n\nThe fall in global inequality should\
    \ not come as a surprise. For about two hundred years the\nbenefits of industrialisation\
    \ went mainly to countries in Europe and North America. Income\ninequality between\
    \ these countries and poorer countries worsened. The spread of globalisation in\n\
    recent decades has meant this difference has lessened. Countries such as China\
    \ and India have\nbenefited from large increases in per capita (average) income,\
    \ as shown in Table 1.1.\nTable 1.1 Per capita (average) income and Gini coefficient\
    \ for China and India 1990 and 2016\nPer capita (average)\nincome (US$)\nGini\
    \ coefficient\n1990\n2016\n1990\n2016\nChina\n<1 000\n>13 000\n0.32\n0.38\nIndia\n\
    <1 200\n >7 000\n0.32\n0.36\n\nWith such an increase in per capita incomes maybe\
    \ some level of inequality does not matter.\nIndeed, it might be a necessary condition\
    \ for economic growth. Instead of concentrating on\neliminating inequality perhaps\
    \ the focus should be on the absolute position of the poorest.\n\nIf the attention\
    \ is on the relief of poverty rather than the wealth of the richest, improvements\
    \ can\nbe seen. Life expectancy has increased, most noticeably by ten years in\
    \ the past two decades in\nthe poorest region of sub-Saharan Africa. Literacy\
    \ rates have also increased. Those in absolute\npoverty across the world have\
    \ fallen from more than a third to under a tenth of the world’s\npopulation. And\
    \ all this while the world’s population has increased.\n\nCritics of globalisation\
    \ and foreign direct investment (FDI) by multinational companies point to the\n\
    possible negative environmental effects, the weakening of individual cultures\
    \ and the reliance on\ninternational financial institutions that can fail. They\
    \ also claim there can be exploitation of workers\nleading to greater wage inequality\
    \ and possible increases in domestic unemployment as cheaper\ngoods are imported.\n\
    Source: The Times, 23 August 2021\n\n(a) The article refers to the Gini coefficient.\
    \ With the help of a diagram explain the link between a\nGini coefficient and\
    \ a Lorenz curve.\n[5]\n\n(b) (i) Distinguish between equity and equality.\n[2]\n\
    \n(ii) ‘But, according to a newspaper, a lot of what is said about inequality\
    \ is wrong.’\n\n Analyse whether there is a conflict between what the newspaper\
    \ wrote about changes in\nequality and Table 1.1.\n[5]\n\n(c) With reference to\
    \ the article, explain the idea of globalisation and assess whether there is\n\
    enough evidence to conclude that globalisation has a net benefit for everyone.\n\
    [8]\nSection B\nAnswer one question.\nEITHER"
