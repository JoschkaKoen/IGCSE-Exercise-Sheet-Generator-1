  mark_scheme_answer: 'Using two tools of protection, explain what is meant by protectionism

    and consider the extent to which these two tools may benefit an

    economy.

    Follow the point-based marking guidance at the top of this mark scheme and

    award:

    up to 3 marks for AO1 Knowledge and understanding up to 3 marks for AO2

    Analysis

    up to 2 marks for AO3 Evaluation.

    AO1 Knowledge and Understanding (max 3 marks)

    •

    Protectionism is when governments seek to protect domestic industries

    from foreign competition. (1)

    •

    Two examples of protectionism from import tariffs, import quotas, export

    subsidies, embargoes, and excessive administrative burdens (1)

    •

    With some explanation as to how both tools protect domestic industries.

    (1)

    AO2 Analysis (max 3 marks)

    •

    For an explanation of the possible benefits of the selected tools to an

    economy, e.g., improve the current account, preserve strategic industries,

    maintain employment (1 per selected tool MAX 2 marks)

    •

    For an explanation of the possible drawbacks of the selected tools to an

    economy, e.g., the policies may not work, e.g., because of elasticity

    values, retaliation by other countries. (1 per selected tool MAX 2 marks)

    3 marks maximum for analysis.

    Note: If only 1 tool is considered then 2 marks maximum.

    AO3 Evaluation (max 2 marks)

    For an assessment of the extent to which the selected examples may benefit

    an economy including possible drawbacks, e.g., retaliation. Note: the second

    mark is reserved for a justified conclusion.

    Please use a text box to show the mark split, e.g., 2,2,1

    8

    AO1 Knowledge and understanding

    3

    AO2 Analysis

    3

    AO3 Evaluation

    2

