  mark_scheme_answer: 'Compare the forecast rates of economic growth for the US and

    Eurozone between 2023 and 2024.

    •

    The forecasts for both the US and Eurozone have shown real economic

    growth between 2023 and 2024

    •

    The forecast for the US has shown higher real economic growth than the

    Eurozone in both periods.

    •

    The forecast for the US has shown a fall in the rate of growth between

    2023 and 2024 whereas the forecast for the Eurozone has shown an

    increase.

    Guidance:

    Only award marks for a valid comparison between the two years and the two

    economies.

    Note: answers which suggest GDP in the US has fallen between 2023

    and 2024 must not be credited as it is the rate of growth that has fallen.

    2'
  mark_scheme: []
