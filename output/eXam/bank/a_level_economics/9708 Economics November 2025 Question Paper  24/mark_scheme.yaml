- number: 5b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Low unemployment is a macroeconomic policy objective for a

    government.

    Assess the extent to which this is most likely to be achieved by supply-

    side policy.

    Use Table A: AO1 Knowledge and understanding and AO2 Analysis and

    Table B: AO3 Evaluation to mark candidate responses to this question.

    AO1 and AO2 out of 8 marks. AO3 out of 4 marks.

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding and AO2 Analysis

    •

    An understanding of what is meant by supply side policy.

    •

    Analysis of different types of supply side policy designed to reduce

    unemployment which may include training and education, reducing

    benefits, infrastructure development, reducing taxes

    •

    Analysis of the limitations of such policies.

    •

    Analysis of other policies such as fiscal and monetary policy designed to

    increase AD and may be more appropriate if unemployment is cyclical.

    •

    Examples may include extra government spending and reducing income

    taxes together with reducing interest rates.

    •

    Analysis of the limitations of alternative policies.

    Level 1 responses will be assertive and lacking in explanations/mainly

    descriptive and/or or mainly lacking in relevance to the question.

    Level 2 responses may contain some inaccuracies and may be one sided.

    Analysis will be explained at least in part and will be largely relevant to the

    question.

    Level 3 responses will consider alternative policies / concepts etc. and will

    be balanced. Explanations of points raised will be offered and will be accurate

    and relevant to the question.

    AO3 Evaluation

    Of the extent to which a low level of unemployment is most likely to be achieved

    by supply side policy and arrives at a reasoned and justified conclusion.

    A one-sided response cannot gain any marks for evaluation.

    Accept all valid responses.

    12

    AO1 Knowledge and understanding and AO2 Analysis

    8

    AO3 Evaluation

    4'
