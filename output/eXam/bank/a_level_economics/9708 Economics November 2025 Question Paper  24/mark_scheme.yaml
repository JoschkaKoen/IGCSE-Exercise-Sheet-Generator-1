- number: 1b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Explain one reason why the IMF uses percentage change in real
    GDP

    and not percentage change in nominal GDP when measuring economic

    growth.

    •

    Nominal GDP growth shows the growth without taking into account

    inflation whereas real GDP growth removes the effects of inflation. (1)

    •

    It allows for a better / more meaningful comparison between years. (1)

    Note: do not award the 2nd mark without some understanding of the two

    terms in the question.

    2'
  mark_scheme: []
  graphics: []
- number: 1c
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Explain, with the help of a diagram, why an increase in productivity
    in

    US firms may reduce the price of their products and consider whether

    this will always be the outcome.

    •

    An increase in productivity suggests production is more efficient and will

    reduce costs. (1)

    •

    This should have the effect of shifting the supply curve to the right as

    shown on an accurately labeled diagram. (1)

    •

    The fall in price should be shown on the diagram, e.g., by an arrow or P1

    P2, and linked to the increase in productivity. (1)

    For evaluation 1 mark maximum:

    An assessment why the price may not fall, e.g., because businesses decide

    not to pass the fall in potential price on to consumers and include the extra

    profit in their costs meaning the supply curve does not shift to the right or

    other costs increase to offset the improvement in productivity; due to perfectly

    elastic demand. (1)

