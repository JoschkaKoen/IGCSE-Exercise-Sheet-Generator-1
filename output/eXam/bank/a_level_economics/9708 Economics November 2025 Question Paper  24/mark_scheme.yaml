- number: 1d
  question_type: long_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Assess whether the costs of inflation are always likely to
    be greater than

    the benefits of inflation for the US.

    Up to 4 marks MAX for analysis of both benefits and costs

    Up to 3 marks for analysis of the possible benefits of inflation, e.g., it may

    be a sign of economic growth and may encourage businesses to produce

    more and therefore reduce levels of unemployment etc. if the inflation rate is

    low and stable. Also, borrowers may gain.

    Up to 3 marks for analysis of the possible costs of inflation, e.g., menu and

    shoe leather costs, lenders may lose, fiscal drag, reduced international

    competitiveness etc., if the inflation rate is high or becomes prolonged. This

    may result in reduced investment due to uncertainty.

    Up to 2 marks for evaluation of positive and negative effects, e.g., it will

    depend on the level of inflation and whether it is likely to be prolonged. It
    also

    may depend on the rate of inflation in other countries. Reserve 1 mark for a

    justified conclusion.

    Note: evaluation should be in the context of the US to gain any credit. For

    example, the data suggests that inflation in the US is largely the result of

    rising AD and less due to rising costs of production. Any valid evaluation must

    reflect this.

    6'
