- number: 5a
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Explain the difference between structural unemployment and
    cyclical

    unemployment and consider the extent to which structural

    unemployment is likely to be more damaging to an economy than

    cyclical unemployment.

    Follow the point-based marking guidance at the top of this mark scheme and

    award:

    up to 3 marks for AO1 Knowledge and understanding up to 3 marks for AO2

    Analysis

    up to 2 marks for AO3 Evaluation.

    AO1 Knowledge and Understanding (max 3 marks)

    •

    Unemployment is a situation where people are willing and able to work

    but do not have a job. (1)

    •

    Structural unemployment occurs due to structural changes in an economy

    because of changes in the pattern of supply and demand for products,

    services, and labour. (1)

    •

    Cyclical unemployment occurs due to a lack of aggregate demand within

    an economy because of, e.g., a downturn in the economic cycle. (1)

    AO2 Analysis (max 3 marks)

    Analysis may focus on the following but must compare the two types. Note: if

    only one type is analysed, two marks max and no evaluation marks may be

    awarded.

    •

    Structural unemployment may be more serious depending on the

    importance of the affected industry to an economy because it is more

    likely to be permanent.

    •

    It can be focused on entire regions, whereas:

    •

    Cyclical unemployment may be more serious as it affects the entire

    country.

    •

    Both will lead to a loss of income and people affected are less likely to be

    able to find work.

    AO3 Evaluation (max 2 marks)

    For an assessment of which type is likely to be most serious and may consider

    the timescale, the ease of retraining (if structural), the number of people

    affected, etc. Note: the second mark is reserved for a justified conclusion.

    8

    AO1 Knowledge and understanding

    3

    AO2 Analysis

    3

    AO3 Evaluation

    2

    9708/24

    October/November

    2025'
