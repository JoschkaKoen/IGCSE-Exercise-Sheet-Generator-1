- number: 2b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Assess the extent to which a government should subsidise the

    production of merit goods to increase the consumption of these goods.

    Use Table A: AO1 Knowledge and understanding and AO2 Analysis and Table

    B: AO3 Evaluation to mark candidate responses to this question.

    AO1 and AO2 out of 8 marks. AO3 out of 4 marks.

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding and AO2 Analysis

    •

    An understanding of what is meant by a merit good and a subsidy and

    how this might increase the consumption of merit goods.

    •

    An analysis of the advantages and disadvantages (effectiveness) of using

    a subsidy (including the limitations, e.g., imperfect information.)

    •

    Advantages include the fact that subsidies lead to lower costs for

    producers which should lead to lower prices for consumers and therefore

    increased consumption whereas:

    •

    Disadvantages include the cost to the government and imperfect

    information which may mean that consumption does not increase despite

    lower prices

    •

    An analysis of the advantages and disadvantages of at least one

    alternative policy that may be used, e.g., information provision, direct

    provision, (together with their limitations.)

    Level 1 responses will be assertive and lacking in explanations/mainly

    descriptive and/or or mainly lacking in relevance to the question.

    Level 2 responses may contain some inaccuracies and may be one sided.

    Analysis will be explained at least in part and will be largely relevant to the

    question.

    Level 3 responses will consider alternative policies/concepts, etc. and will be

    balanced. Explanations of points raised will be offered and will be accurate

    and relevant to the question.

    AO3 Evaluation

    That considers the extent to which a government should subsidise the

    production of merit goods to increase their consumption and arrives at a

    reasoned and justified conclusion.

    A one-sided response cannot gain any marks for evaluation.

    Accept all valid responses.

    12

    AO1 Knowledge and understanding and AO2 Analysis

    8

    AO3 Evaluation

    4

    9708/24

    October/November

    2025

    OR'
