  mark_scheme_answer: 'Explain what is meant by the incidence of an indirect tax and
    consider

    the extent to which it is possible for the incidence to pass from a

    producer of a good to a consumer of that good.

    Follow the point-based marking guidance at the top of this mark scheme and

    award:

    up to 3 marks for AO1 Knowledge and understanding up to 3 marks for AO2

    Analysis

    up to 2 marks for AO3 Evaluation.

    AO1 Knowledge and Understanding (max 3 marks)

    Of the meaning of an indirect tax and the incidence of an indirect tax. Note:
    a

    diagram is NOT essential but can be used, with a separate explanation, to

    show what is meant by an indirect tax and/or the incidence.

    •

    The incidence of tax refers to the extent of the burden/ proportion of tax

    borne by the producer and/ or consumer. (1)

    •

    An indirect tax is a tax placed on goods or services. (1)

    •

    It can be specific, i.e., a fixed amount per purchase or ad valorem, i.e., a

    % of the price charged by the retailer. (1)

    •

    Allow references to the fact that it is seen as regressive if explained, OR

    accurate examples OR that it can be used to reduce consumption of

    demerit goods or raise revenue for governments. (1)

    Award a maximum of two marks if no explanation of incidence.

    AO2 Analysis (max 3 marks)

    Of the possibility of passing the incidence from a producer to a consumer

    depending on PED. Note: a diagram is NOT essential but can be used, to

    assist an explanation in words, the possibility of passing the incidence from
    a

    producer to a consumer depending on PED.

    •

    The indirect tax has the effect of raising the price of the product or service

    by shifting the supply curve to the left. (1)

    •

    Analysis of the impact on the incidence if the PED is elastic. (1)

    •

    Analysis of the impact on the incidence if the PED is inelastic. (1)

    AO3 Evaluation (max 2 marks)

    The extent to which it is possible to pass the incidence of tax onto the

    consumer depends upon the PED.

    For explained assessment that it is more possible to pass on the incidence of

    tax to the consumer if the PED is inelastic. Note: the second mark is

    reserved for a justified conclusion.

    8

    9708/24

    October/November

    2025

    AO1 Knowledge and understanding

    3

    AO2 Analysis

    3

    AO3 Evaluation

    2

    9708/24

    October/November

    2025'
