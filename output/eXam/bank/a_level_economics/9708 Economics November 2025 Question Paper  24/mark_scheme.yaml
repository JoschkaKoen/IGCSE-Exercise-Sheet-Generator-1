  mark_scheme_answer: 'Explain what determines elastic and inelastic price elasticity
    of supply

    (PES) and consider the extent to which the value of PES may differ

    between an agricultural good and a manufactured good.

    Follow the point-based marking guidance at the top of this mark scheme and

    award:

    up to 3 marks for AO1 Knowledge and understanding up to 3 marks for AO2

    Analysis

    up to 2 marks for AO3 Evaluation.

    AO1 Knowledge and Understanding (max 3 marks)

    •

    For an accurate definition (with reference to the responsiveness of supply

    to a % change in price) or formula for PES (1)

    •

    For an explanation of what is meant by both an elastic and an inelastic

    PES (with reference to the responsiveness of supply to a % change in

    price) (1)

    •

    An explanation of at least one factor that determines whether a good has

    an elastic or inelastic PES, e.g., time, stock levels, perishability (1)

    AO2 Analysis (max 3 marks)

    •

    An explanation of the factors that explain the PES for agricultural goods,

    e.g., an explanation that they are more likely to be inelastic due to, e.g.

    time taken to produce, the difficulty of holding stocks etc. (up to 2 marks)

    •

    An explanation of the factors that explain the PES for manufactured

    goods, e.g., an explanation that the value may be more elastic due to,

    e.g. spare capacity, ability to store unfinished and finished goods, time

    taken to produce. (Up to 2 marks).

    AO3 Evaluation (max 2 marks)

    For an evaluation as to the extent that the value may differ, e.g., due to their

    perishable nature, agricultural goods may be more PES inelastic unless better

    ways can be found to store them. Note: the second mark is reserved for a

    justified conclusion.

    8

    AO1 Knowledge and understanding

    3

    AO2 Analysis

    3

    AO3 Evaluation

    2

    9708/24

    October/November

    2025'
