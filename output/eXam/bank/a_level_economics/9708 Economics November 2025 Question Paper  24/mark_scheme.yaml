- number: 3b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Firms will often try to estimate elasticity values to judge
    the possible

    success of decisions to change prices or to introduce new products.

    Assess the extent to which an understanding of income elasticity of

    demand (YED) may be more useful than cross elasticity of demand

    (XED) in increasing the income from sales for a firm.

    Use Table A: AO1 Knowledge and understanding and AO2 Analysis and Table

    B: AO3 Evaluation to mark candidate responses to this question.

    AO1 and AO2 out of 8 marks. AO3 out of 4 marks.

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding and AO2 Analysis

    •

    An understanding of the concepts of YED and XED.

    •

    YED can be used to predict the demand for different categories of goods

    depending on changes in income.

    •

    It can therefore be used to predict changes in possible sales revenue.

    •

    XED can be used to predict changes in revenue depending on whether it

    is a complement or a substitute and the closeness of the relationship.

    •

    It can then be used to predict sales revenue depending upon the actions

    of other businesses in setting their prices.

    •

    An assessment of the limitations of both measures, e.g., they are

    estimates and will change over time.

    Level 1 responses will be assertive and lacking in explanations / mainly

    descriptive and/or or mainly lacking in relevance to the question.

    Level 2 responses may contain some inaccuracies and may be one sided.

    Analysis will be explained at least in part and will be largely relevant to the

    question.

    Level 3 responses will consider alternative policies / concepts etc. and will

    be balanced. Explanations of points raised will be offered and will be accurate

    and relevant to the question.

    Unless the answer is directly related to increasing the income from

    sales for a firm, then award a maximum of mid-Level 2 marks.

    AO3 Evaluation

    Of the extent to which the knowledge of YED is more useful than XED in

    increasing sales revenue and arrives at a reasoned and justified conclusion.

    A one-sided response cannot gain any marks for evaluation.

    Accept all valid responses.

    12

    AO1 Knowledge and understanding and AO2 Analysis

    8

    9708/24

    October/November

    2025

    AO3 Evaluation

    4

    9708/24

    October/November

    2025

    Section C

    EITHER'
