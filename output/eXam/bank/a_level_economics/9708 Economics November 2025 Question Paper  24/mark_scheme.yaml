  mark_scheme_answer: 'Assess the extent to which maintaining interest rates at a
    high level will

    be the best policy for the US to control inflation.

    Up to 4 marks MAX for analysis of both advantages and disadvantages

    Up to 3 marks for analysis of the possible advantages of maintaining

    interest rates at a high level, e.g., it is a contractionary demand policy that
    will

    reduce AD by reducing consumer expenditure and investment. This should

    lower inflationary pressure and keep inflation rates lower.

    Up to 3 marks for analysis of the possible disadvantages, e.g., it may

    reduce economic growth and increase unemployment if the policy is

    maintained for a long period of time. It may reduce international

    competitiveness if it leads to an increase in exchange rates. It may also not
    be

    appropriate if the cause of inflation is due to cost push factors,

    Up to 2 marks for evaluation of the advantages and disadvantages of

    maintaining interest rates at a high level to control inflation in the US. This

    may also include an assessment (although this is not essential) of  other

    policies such as supply-side policy may be less damaging and fiscal policy. It

    also depends on the timescale. Reserve 1 mark for a justified conclusion.

    Note: evaluation should be in the context of the US to gain any credit. For

    example, the data suggests that inflation in the US is largely the result of

    rising AD and less rising costs of production. Any valid evaluation must reflect

    this.

    6

