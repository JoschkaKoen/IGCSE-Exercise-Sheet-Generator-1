- number: 1c
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Consider whether a buffer stock system controlled by the government
    of

    Ivory Coast would be likely to prevent fluctuations in the price of cocoa

    beans.

    •

    A buffer stock system combines both maximum price and minimum price

    controls / is designed to minimise price fluctuations / price falls (1)

    •

    If the price falls below a certain fixed point / minimum price the

    government will purchase and store cocoa beans therefore reducing

    supply/controlling demand to raise the price of cocoa beans (1). If the

    price rises beyond a certain point / maximum price, this buffer stock is

    released thus increasing supply and reducing the price of cocoa beans

    (1).

    Guidance

    •

    A response that only refers to governments buying stocks of cocoa

    beans in times of a surplus and selling them in times of a shortage to

    minimise price fluctuations is worth 1 additional mark maximum for

    analysis.

    Reserve 1 mark for valid evaluation e.g.,

    •

    Cocoa beans may be difficult/expensive to store / perishable/ may be an

    illegal market set up so it may not prevent fluctuations in the price of

    cocoa beans / the government do not have the budget to buy any surplus.

    (1)

    Guidance

    •

    The eval mark can be awarded even without any analysis marks being

    given PROVIDED there is a reasonable understanding that a buffer stock

    scheme only works when stocks can be held/released.

    4

    9708/22

    October/November

    2025'
