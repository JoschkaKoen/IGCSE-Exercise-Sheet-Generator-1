- number: 1d
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Assess the extent to which the use of a minimum pricing policy
    would

    be the best way to ensure ‘cocoa bean farmers get paid a living wage’.

    Up to 3 marks for an explanation / analysis of the reasons why the use

    of a minimum pricing policy would be the best way to ensure cocoa

    bean farmers get paid a living wage e.g.:

    •

    It ensures that farmers receive a guaranteed price above the equilibrium

    market price enabling them to receive a higher income

    •

    It encourages farmers to maintain / increase production as there is more

    financial security again leading to a living wage

    •

    It reduces the instability caused by fluctuations in the global price of

    cocoa beans leading to a more stable income for farmers.

    Up to 3 marks for an explanation / analysis of the reasons why the use

    of a minimum pricing policy may not be the best way to ensure cocoa

    bean farmers get paid a living wage e.g.:

    •

    It may not be set at an appropriate level / may not be enforceable e.g.,

    due to the costs of enforcement

    •

    It may lead to a surplus due to increased supply and reduced demand for

    e.g. chocolate products meaning this surplus may fail to be sold

    •

    Budget constraints for the government may make it impossible for them

    to buy the surplus and this makes the scheme collapse

    •

    May make farmers complacent therefore failing to invest and in the LR

    incomes fall.

    Guidance:

    •

    Allow any reasonable point for either perspective, BUT it must be linked

    how it affects farmer’s incomes.

    •

    Candidates may choose to compare the advantages and disadvantages

    of an alternative method e.g., transfer payments / subsidies to farmers.

    Provided this is clear that a comparison to a minimum pricing policy

    has been attempted, this approach can also gain full marks.

    •

    Do not allow answers that refer to minimum wages as the policy or as an

    alternative.

    Note: 4 marks maximum for analysis

    •

    Evaluation that clearly assesses both sides (1) and comes to a justified

    conclusion whether it is the best way (1).

    6

    9708/22

    October/November

    2025'
