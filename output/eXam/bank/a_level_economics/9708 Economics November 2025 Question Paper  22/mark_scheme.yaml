- number: 1e
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Assess the advantages and disadvantages of the government of
    Ivory

    Coast continuing to specialise in the production and export of cocoa

    beans.

    Up to 3 marks for an explanation / analysis of the advantages of the

    government of Ivory Coast continuing to specialise in the production

    and export of cocoa beans e.g.:

    •

    It allows producers to benefit from comparative advantage and become

    even more efficient, which will reduce costs and prices further and

    increase output

    •

    It allows producers to further benefit from the increasing worldwide

    demand for cocoa beans and increase sales

    •

    This can encourage / lead to economic growth as exports increase.

    Up to 3 marks for an explanation / analysis of the disadvantages of the

    government of Ivory Coast continuing to specialise in the production

    and export of cocoa beans e.g.:

    •

    Dependence on cocoa beans may make the economy vulnerable to

    global reductions in demand / crop failures

    •

    It may mean less land is available for other essential food crops leading

    to an overreliance on imports

    •

    A lack of diversification may hinder economic growth and also make the

    economy more at risk of external shocks

    •

    It may exhaust the supply of cocoa beans and other natural resources

    leading to unemployment in Ivory Coast.

    Note: 4 marks maximum for analysis

    •

    Evaluation that clearly assesses both sides (1) and comes to a justified

    conclusion. (1)

    6

    9708/22

    October/November

    2025

    Section B

    EITHER'
