  text: '1

    How do we make sure cocoa bean farmers get paid a living wage?

    Chocolate is very big business.

    Perhaps the long-term solution is to reduce the country’s dependence on cocoa
    bean exports and

    diversify into other products that can offer more and better paid job opportunities.

    Source: Adapted from Reuters, 4 April 2023

    Content removed due to copyright restrictions.

    (a)

    (i) Identify one possible reason for the value of price elasticity of demand (PED)
    for

    chocolate.

    [1]

    (ii)

    Calculate the percentage change in the value of global sales of chocolate between
    2017

    and 2026, as shown in Table 1.1.

    [1]

    (b) With the help of a demand and supply diagram, demonstrate why cocoa bean prices
    continued

    to fall in 2023.

    [2]

    (c) Consider whether a buffer stock system controlled by the government of Ivory
    Coast would

    be likely to prevent fluctuations in the price of cocoa beans.

    [4]

    (d) Assess the extent to which the use of a minimum pricing policy would be the
    best way to

    ensure cocoa bean farmers get paid a living wage.

    [6]

    (e) Assess the advantages and disadvantages of Ivory Coast continuing to specialise
    in the

    production and export of cocoa beans.

    [6]

    Section B

    Answer one question.

    EITHER'
