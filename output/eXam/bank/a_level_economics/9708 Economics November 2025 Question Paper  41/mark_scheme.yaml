    Economic growth can only occur when an economy is below full

    employment.

    Evaluate this statement.

    Use Table A: AO1 Knowledge and understanding and AO2 Analysis and Table

    B: AO3 Evaluation to mark candidate responses to this question.

    AO1 and AO2 out of 14 marks. AO3 out of 6 marks.

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding and AO2 Analysis

    •

    Definition of economic growth: increase in real GDP/output over time.

    •

    Definition of full employment: when all resources, especially labour, are

    used efficiently (natural rate of unemployment remains).

    •

    Below full employment (Keynesian range):

    Growth possible via increase in AD (e.g., higher consumption,

    investment).

    Movement from inside PPF towards PPF.

    Little inflationary pressure due to spare capacity.

    •

    At full employment (Classical range):

    Growth possible only through potential growth – rightward shift of LRAS

    or outward shift of PPF.

    Driven by productivity, technology, education, capital formation.

    •

    Diagrams:

    AD–AS showing movement along the AS curve below full employment.

    LRAS shift showing potential growth.

    20

    9708/41

    October/November

    2025

    5

    AO3 Evaluation

    •

    The statement is too narrow – growth can occur both below and at full

    employment.

    •

    Context matters:

    In a recession, growth typically comes from AD increases (below full

    employment).

    In the long run, growth depends on supply-side improvements (even at

    full employment).

    •

    Inflationary pressures: At/near full employment, AD-led growth may

    cause inflation rather than real growth.

    •

    Judgement: Economic growth can occur when below full employment

    (actual growth) and at full employment (potential growth) – so the

    statement is partially correct.

    •

    Is unemployment the principal economic problem and the opportunity

    costs of pursuing low unemployment rather than balance of payments

    equilibrium etc.

    •

    The effect of the multiplier when considering the extent of the increase in

    GNI.

    •

    A discussion of whether C, I or (X–M) can increase without

    unemployment.

    AO1 Knowledge and understanding and AO2 Analysis

    14

    AO3 Evaluation

    6'
