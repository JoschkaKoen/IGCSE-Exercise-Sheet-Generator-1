    Market failure is to blame for climate change and the inefficient

    allocation of resources. The only solution is for governments to

    intervene to improve resource allocation.

    Assess the extent to which you agree with this statement

    AO1 Knowledge and understanding and AO2 Analysis

    •

    Climate change can be regarded as a form of market failure can be

    explained by linking this to the requirement to allocate resources to

    maximise consumer satisfaction. This can be supported by a diagram

    illustrating a level of output where AR = MC or MSB = MSC which is

    consistent with an outcome that achieves allocative efficiency.

    •

    Negative externalities occur when the consumption/use of a good

    produces a cost to society which is greater than that received by an

    individual producer MPB ⩾ MSB or MSC ⩾MPC. This is sometimes

    described as a negative ‘spill-over’ effect. The negative externality leads

    to an over production of the good carbon dioxide or other greenhouse

    gas.

    •

    Government intervention takes place to address the failure of market

    forces to allocate resources efficiently. In this case positive externalities

    would lead to under–consumption of a good or service.

    •

    Different types of government intervention can be used to correct the

    under-production of output to enable consumer satisfaction to be

    maximised.

    •

    Forms of government intervention might include: the use of subsidies for

    consumers to move to less polluting forms of consumption and also

    producers to change production methods, use of positive advertising; the

    direct provision of goods and services such as alternative transport

    methods. Alternatively indirect taxation might be applied to the CO 2

    producing source. Nudge theory effects.

    •

    A clearly labelled, accurate diagram can be used to show the impact of a

    positive/negative externality on the level of output and the welfare change

    will be identified.

    •

    The diagram could show the market equilibrium point which does not take

    into account the existence of a negative consumption externality and may

    compare this with the allocatively efficient level of output when the

    negative externality is taken into account. The diagram may be amended

    or re-drawn to show the impact of a chosen policy(ies) and the impact on

    consumption or production shown.

    •

    Reference to the diagram and the outcomes it illustrates is made in the

    text.

    20

    9708/41

    October/November

    2025

    2

    AO3 Evaluation

    •

    A government might introduce a subsidy to encourage producers to

    increase output to enable allocative efficiency, however it is difficult to

    measure the precise value of the subsidy. Subsidies are costly in that the

    funds might have been used by governments for other purposes. This

    means governments will have to make a value judgement when deciding

    whether to provide a subsidy. There are opportunity costs of the subsidy.

    •

    Also, the impact on price and output in some circumstances takes a long

    time to become effective.

    •

    Advertising is often costly and it is not always certain that it will have a

    sufficiently persuasive effect to ensure the correct level of output/

    consumption is reached.

    •

    Direct provision is also costly and sometimes less efficient than that

    provided through market forces.

    •

    It is possible to show that government intervention can reduce the level of

    inefficiency caused by the existence of positive externalities but it is not

    clear whether the net effect of government intervention will always be

    positive. Some types of intervention will be more effective than others

    depending on the nature of the good/service under consideration.

    •

    Government failure.

    Concluding point which considers ‘only’ aspect.

    Accept all valid responses.

    AO1 Knowledge and understanding and AO2 Analysis

