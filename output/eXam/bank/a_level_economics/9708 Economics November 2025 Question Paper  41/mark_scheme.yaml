    The degree of competition a firm experiences is determined only by the

    barriers to entry into its market.

    With the aid of diagrams, evaluate this statement.

    Use Table A: AO1 Knowledge and understanding and AO2 Analysis and Table

    B: AO3 Evaluation to mark candidate responses to this question.

    AO1 and AO2 out of 14 marks. AO3 out of 6 marks.

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding and AO2 Analysis

    •

    A discussion of types of barriers to entry.

    •

    The impact of barriers to entry on market structures.

    •

    A detailed analysis of at least 2 forms of market structure one with no

    barriers (perfect competition or monopolistic competition) and one with

    barriers to entry (oligopoly or monopoly) to include reference to product,

    knowledge levels, profit levels.

    •

    Diagrams are correctly labelled and accurately drawn.

    •

    with correct labelling and relevant reference to it/them in the answer.

    •

    Max L2 if no diagram

    •

    Max L2 if only one type of structure

    AO3 Evaluation

    •

    Competition is linked to the number of firms who can access a market, so

    the simple answer is yes because barriers to entry prevent firms entering

    a market.

    •

    Perfect competition and monopolistic competition with their lack of

    barriers are both highly competitive.

    •

    Competition takes place in oligopoly through product differentiation and

    sales and marketing.

    •

    Monopolies are subject to limitations on their ability to exploit the

    consumer by the limitations of contestable markets.

    •

    Regulation

    Accept all valid responses

    20

