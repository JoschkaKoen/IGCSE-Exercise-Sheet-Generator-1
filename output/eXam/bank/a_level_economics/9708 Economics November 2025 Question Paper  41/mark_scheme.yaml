  mark_scheme_answer: 'The article states: ‘The remittances received by those countries
    in 2022

    was $650 billion.’

    Analyse how this is likely to benefit the migrants’ home economies.

    Remittances a form of invisible earning for the migrant’s home country (1)

    thus the US$650 are secondary income for the home country (1)

    There BoP effect is to increase exports (X) (1) and to increase the (X–M)

    element in the aggregate demand equation (1).

    The increase in AD will shift the AD curve to the right (1)

    and GDP will increase (1)

    Candidates can show this effect through an AD/AS diagram (2)

    NOTE: Candidates may take a wider view than the macro mark scheme and

    consider groups within the economies as the references in data.

