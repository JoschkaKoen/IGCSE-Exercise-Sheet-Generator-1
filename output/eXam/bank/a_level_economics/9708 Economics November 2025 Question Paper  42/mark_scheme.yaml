    Traffic congestion is a cause of allocative inefficiency.

    Evaluate, with the help of diagram(s) two policies that a government

    may introduce to reduce the problem of allocative inefficiency caused

    by traffic congestion.

    AO1 Knowledge and understanding and AO2 Analysis

    •

    Market failure regarding this question would relate to allocative

    inefficiency. Market failure can be explained by defining allocative

    efficiency and linking this to the requirement to allocate resources to

    maximise consumer satisfaction. This can be supported by a diagram

    illustrating a level of output where AR = MC or MSB = MSC which is

    consistent with an outcome that  achieves allocative efficiency.

    •

    Negative externalities occur when the consumption/use of a good

    produces a cost to society which is greater than that received by an

    individual consumer MPB > MSB. This is sometimes described as a

    negative ‘spill-over’ effect. The negative externality leads to an over

    production of the good.

    •

    Government intervention takes place to address the failure of  market

    forces to allocate resources efficiently.

    •

    Different types of government intervention can be used to correct the over

    consumption to enable consumer satisfaction to be maximised.

    •

    Forms of government intervention might include: the use of subsidies for

    consumers to increase consumption of alternative forms of transport, use

    of positive advertising of alternatives; the direct provision of goods and

    services such as alternative transport methods. Indirect taxation. Nudge

    theory effects.

    •

    A clearly labelled, accurate diagram can be used to show the impact of a

    negative externality on the level of output and the welfare change will be

    identified.

    •

    The diagram could show the market equilibrium point which does not take

    into account the existence of a negative consumption externality and may

    compare this with the allocatively efficient level of output when the

    negative externality is taken into account. The diagram may be amended

    or re-drawn to show the impact of a chosen policy(ies) and the impact on

    consumption or production shown.

    •

    Reference to the diagram and the outcomes it illustrates is made in the

    text.

    20

    9708/42

    October/November

    2025

    2

    AO3 Evaluation

    •

    A government might introduce a subsidy for alternative forms of transport

    e.g. mass rapid transport to encourage production to enable allocative

    efficiency, however it is difficult to measure the precise value of the

    subsidy. Subsidies have opportunity costs and are costly in that the funds

    might have been used by governments for other purposes. This means

    governments will have to make a value judgement when deciding

    whether to provide a subsidy.

    •

    Consumer demand for alternatives may be low due to the reluctance to

    price in-elasticity of demand for public transport/alternatives.

    •

    The impact on price and output in some circumstances takes a long time

    to become effective.

    •

    Advertising of alternative methods of transport is often costly and it is not

    always certain that it will have a sufficiently persuasive effect to ensure

    the correct level of consumption is reached.

    •

    Public sector provision is costly and sometimes less efficient than that

    provided through market forces.

    Accept all valid responses.

