    Evaluate whether the presence of multinational companies (MNCs) in

    low-income countries is always beneficial.

    Use Table A: AO1 Knowledge and understanding and AO2 Analysis and Table

    B: AO3 Evaluation to mark candidate responses to this question.

    AO1 and AO2 out of 14 marks. AO3 out of 6 marks.

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding and AO2 Analysis

    •

    Definitions of a MNC and a low-income country (LIC).

    •

    Explanation of benefits of MNC to LIC: Development of infrastructure,

    employment of workers, training and development of workers, expansion

    of GDP/GNI, increased range of products improvement of SoL.

    •

    Analysis of presences of MNC: Impact on Actual growth This could be via

    AD/AS analysis of expansion of NI:

    •

    Changes in Current Balance and Capital Balance through movement of

    goods and capital reflected in impact on the Exchange rate through

    demand and supply of foreign exchange.

    •

    Impact on employment both positive and negative as demand increases

    and decreases in the industry(ies) being affected by MNC. Increase in

    structural unemployment.

    •

    Analysis of presences of MNC: Impact on Potential growth: Exploration

    and development of raw materials and education of workforce expanding

    the production possibility curve. Development of associated

    infrastructure: roads, rail ports and education and health services.

    AO3 Evaluation

    •

    Substitution of low cost MNC production of goods displacing local owned

    production.

    •

    Changes in work and cultural practices and effect on non-material

    standard of living.

    •

    Corruption of local officials to gain permission for development.

    •

    The use of modern manufacturing processes may lead to increases in

    unemployment.

    •

    externalities in production/consumption from the manufacturing/use of the

    goods. Raw materials exports and the problem of the ‘Dutch’ disease of

    high exchange rate and its impact on decreasing the level of existing

    exports leading to structural unemployment.

    Accept all valid responses.

    20'
