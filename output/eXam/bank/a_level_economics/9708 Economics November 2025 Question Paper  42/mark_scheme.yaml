    Evaluate the effect of a fall in the exchange rate on the achievement of

    the macroeconomic aims of a country.

    AO1 Knowledge and understanding and AO2  Analysis

    •

    Knowledge and understanding of the effect of depreciation/devaluation on

    the exchange rate (ER), and economic growth.

    •

    Analysis of Ex R fall on the price of exports (X) and imports (M) and the

    consequences for their demand, links to aggregate demand (AD) through

    the balance of payments effect (X–M).

    •

    Candidates may refer to this change in terms of injections and leakages

    and their effect on AD.

    •

    The use of AD and AS diagram to show this effect on the level of national

    income and economic growth.

    •

    Alternatively, the analysis of the increased injection may be through the

    multiplier effect and/or the 45° diagram.

    •

    Identification of at least two macroeconomic aims of a country: e.g.

    balance of payments, economic growth, inflation, employment.

    •

    Analysis of the impact of the change in ER on at least 2 macroeconomic

    aims to comment on their likely achievement.

    AO3 Evaluation

    •

    The ability of supply capacity in the country to react to the effect of the fall

    in the exchange rate.

    •

    The nature of exports from many countries where exports of agricultural

    commodities are price inelastic in supply.

    •

    The short run effect on employment (positive) and inflation (negative),

    reference to the Phillips curve.

    •

    Effect on a country’s ability to service international debt positive if

    denominated in domestic currency but negative if borrowings are in a

    foreign currency.

    •

    The impact of the inflow of capital in terms of FDI/MNC and the effect on

    output, employment and growth.

    •

    The proportion of international trade in relation to GDP.

    Accept all valid responses.

