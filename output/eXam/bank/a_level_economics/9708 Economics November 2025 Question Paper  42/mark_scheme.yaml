    The average wage of chief executives in large companies in a country is

    over 100 times greater than the average wage of their employees.

    Assess how economic theory can account for this variation in average

    wages.

    Use Table A: AO1 Knowledge and understanding and AO2 Analysis and Table

    B: AO3 Evaluation to mark candidate responses to this question.

    AO1 and AO2 out of 14 marks. AO3 out of 6 marks.

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding and AO2 Analysis

    •

    Explanation of wages determined by demand and supply of labour.

    •

    Demand for labour determined by marginal physical product (MPP) and

    the price (P) of the good made to give marginal revenue product (MRP) =

    MPP  P.

    •

    Determinants of the supply of labour; skills education, training or ability,

    reference to elasticity of supply.

    •

    Analysis of why wages differ depending on MRP and supply.

    •

    Use of the concepts of economic rent.

    •

    The application of the theory to the statement concerning chief

    executives’ pay relative to that of other workers.

    •

    Difference based on labour market for chief executives and workers.

    •

    A comparison of the labour markets for CE and workers.

    AO3 Evaluation

    •

    How to measure the MPP of a factor of production is difficult.

    •

    Wages of chief executives (CE) are sometimes determined by people in a

    similar position and so may inflate the wage level.

    •

    Monopsony employer may underpay workers.

    •

    Prejudice and discrimination leads to low wages for workers.

    Accept all valid responses.

