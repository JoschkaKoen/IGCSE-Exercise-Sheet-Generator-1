  question_type: short_answer
  marks: 0
  text: "1\n\nVietnam’s ‘Economic Miracle’\n\nThirty years ago, Vietnam was one of\
    \ the poorest countries in Southeast Asia. Since then, its real\nGDP has increased\
    \ rapidly. A series of economic and political reforms has been responsible for\
    \ its\nso-called ‘economic miracle’.\n\nVietnam has benefitted from the increased\
    \ protectionism in trade between China and the United\nStates (US). For example,\
    \ Vietnam has increased production of goods that are substitutes to\nthose made\
    \ in China to such an extent that Vietnam is popularly referred to as ‘China plus\
    \ one’, in\nrecognition of its similar comparative advantage to China.\n\nRising\
    \ export revenue is only one reason for Vietnam’s spectacular economic growth.\
    \ With a\nrapidly growing population, Vietnam has invested heavily in its human\
    \ capital and physical capital\nin the form of infrastructure, including cheap\
    \ access to the internet.\n\nA third reason for this success is how Vietnam has\
    \ moved towards trade liberalisation. This is\nshown through its free trade agreement\
    \ with the US and its membership of organisations of\ncountries that have agreed\
    \ to trade freely with each other, such as ASEAN and the TPP. These\ninitiatives\
    \ involve the removal of tariffs and other tools of protection, increasing the\
    \ potential for\nVietnam to trade with other countries.\n\nNevertheless, there\
    \ are possible dangers in this strategy. Vietnam’s economy is heavily dependent\n\
    on its exports which in 2017 were over 90% of GDP. This reliance puts Vietnam\
    \ at risk from\ndownturns in the global economy and in the economies of its main\
    \ trading partners. Even more\nworrying is the repeated threat from the US that\
    \ it may put import tariffs on manufactured goods\nfrom Vietnam.\n\nSource: World\
    \ Economic Forum, 2018\nTable 1.1 Vietnam’s balance of trade in goods and services\
    \ and real GDP growth,\n2009 to 2018\nBalance of trade in goods\nand services\
    \ (‘000 billion\ndong)1\nReal GDP growth\n(% change from previous\nyear)\n2009\n\
    –188 557\n5.4\n2010\n–177 215\n6.4\n2011\n–114 887\n6.2\n2012\n+113 697\n5.3\n\
    2013\n +77 350\n5.4\n2014\n+128 965\n6.0\n2015\n +33 169\n6.7\n2016\n+115 342\n\
    6.2\n2017\n+140 282\n6.8\n2018\nna\n7.1\n\n1 The dong is Vietnam’s currency.\n\
    Source: Trading Economics August 2019\n\n(a) \t Using the data in Table 1.1, compare\
    \ Vietnam’s balance of trade in goods and services\nbetween 2009 and 2011 with\
    \ that from 2015 to 2017.\n[2]\n\n(b)\t (i)\t Explain the relationship you would\
    \ expect between the annual change in the balance of\ntrade in goods and services\
    \ and the annual change in real GDP growth.\n[2]\n\n(ii)\t Consider the extent\
    \ to which this relationship is evident in the data in Table 1.1.\n[2]\n\n(c)\t\
    \ Using the information provided, explain one supply-side reason why Vietnam has\
    \ experienced\n‘spectacular economic growth’.\n[2]\n\n(d)\t Assess the likely\
    \ macroeconomic effects of pressure on the exchange rate of the Vietnamese\ndong\
    \ arising from Vietnam’s increased exports.\n[6]\n\n(e)\t Assess whether Vietnam’s\
    \ ‘economic miracle’ is likely to persist over the next few years. [6]\nSection\
    \ B\nAnswer one question.\nEITHER"
