- number: 1d
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Assess the likely macroeconomic effects of pressure on the
    exchange

    rate of the Vietnamese dong arising from Vietnam’s increased exports.

    Up to 4 marks for explanation/analysis:

    •

    Explanation that an increase in Vietnam’s exports will lead to a rise in the

    value of the dong. (1) The price of exports will rise and import prices will

    fall. (1) (max 2)

    •

    Analysis of the likely impact of the rise in the dong on macroeconomic

    indicators such as employment, national output, inflation and the trade

    balance. (max 2)

    Guidance:

    Award 2 marks if detailed analysis with reference to just 1 indicator or

    less detailed analysis of 2 indicators. Award 1 mark for less detailed

    analysis of 1 indicator.

    Up to 2 marks for evaluation:

    •

    Relevant evaluation which weighs up the factors on both sides. (1)

    •

    A conclusion on the likely overall effect. (1)

    6'
