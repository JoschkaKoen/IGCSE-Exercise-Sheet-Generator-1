- number: 2a
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: "An economy contains just two sectors, an agricultural sector\
    \ and an\nindustrial sector.\nWith the help of a diagram, explain how a production\
    \ possibility\ncurve (PPC) can be used to show the concept of opportunity cost\n\
    and consider whether opportunity cost is likely to remain constant if\nresources\
    \ are reallocated from the agriculture sector to the industrial\nsector.\nFollow\
    \ the point-based marking guidance at the top of this mark scheme and\naward:\n\
    up to 3 marks for AO1 Knowledge and understanding\nup to 3 marks for AO2 Analysis\n\
    up to 2 marks for AO3 Evaluation.\nAO1 Knowledge and Understanding (max 3 marks)\n\
    An understanding of a PPC shown through an accurate diagram (1), correctly\nlabelled\
    \ axes with agriculture on one axis and industrial products on the\nother axis\
    \ (1). Defines or demonstrates clear understanding of the concept of\nopportunity\
    \ cost (1).\nAO2 Analysis (max 3 marks)\nUses the PPC to explain that a movement\
    \ along the curve involves a\nreallocation of resources (1), as resources are\
    \ shifted between the two types\nof product, there is an opportunity cost involved\
    \ (1), measured by a sacrifice\nof agricultural products as more industrial products\
    \ are produced. (1)\nAO3 Evaluation (max 2 marks)\nThose resources least suited\
    \ to agriculture will be redeployed first so there\nwill be low opportunity costs\
    \ (1) so opportunity costs will always rise as\nresources are increasingly reallocated\
    \ from agriculture to industrial uses (1).\n8\nAO1 Knowledge and understanding\n\
    3\nAO2 Analysis\n3\nAO3 Evaluation\n2\n9708/02\nFor examination\nSPECIMEN\b\n\
    from 2023"
  mark_scheme: []
  graphics: []
- number: 2b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: "Assess whether the free market should be used to provide all\
    \ types of\ngoods in an economy.\nUse Table A: AO1 Knowledge and understanding\
    \ and AO2 Analysis and\nTable B: AO3 Evaluation to mark candidate responses to\
    \ this question.\nAO1 and AO2 out of 8 marks.\nAO3 out of 4 marks.\nIndicative\
    \ content\nResponses may include:\nAO1 Knowledge and understanding and AO2 Analysis\n\
    •\nHow supply and demand functions to provide goods in a free market with\nreference\
    \ to the distinction between private goods and public goods.\n•\nAn explanation\
    \ of the reasons for free market provision of private goods\nwith reference to\
    \ the distinction between merit and demerit goods.\n•\nAn explanation of the reason\
    \ for state provision of public goods.\nAO3 Evaluation\n•\nPublic goods can only\
    \ be provided by governments.\n•\nMerit goods will be underprovided in the free\
    \ market and governments\nshould intervene to increase provision.\n•\nDemerit\
    \ goods will be overprovided by the free market and should be\ncontrolled in provision.\n\
    •\nIn conclusion, the free market should not be used to provide all types of\n\
    goods in an economy.\nAccept all valid responses.\n12\nAO1 Knowledge and understanding\
    \ and AO2 Analysis\n8\nAO3 Evaluation\n4\n9708/02\nFor examination\nSPECIMEN\b\
    \nfrom 2023\nOR"
  mark_scheme: []
  graphics: []
