  question_type: calculation
  page: 3
  subpage_row: 1
  subpage_col: 1
  marks: 4
  text: A particle $P$ of mass $m$ is attached to two light inextensible strings each
    of length $l$. The end of one string is attached to a fixed point $A$ and the
    end of the other to a fixed point $B$, with $A$ vertically above $B$. Angle $APB$
    is a right angle. The particle $P$ rotates in a horizontal circle at constant
    angular speed $\omega$ with both strings taut (see diagram). Find the tension
    in string $AP$ in terms of $m$, $g$, $l$ and $\omega$.
  answer_options: []
  subquestions: []
- number: '2'
  question_type: calculation
  page: 4
  subpage_row: 1
  subpage_col: 1
  marks: 0
  text: One end of a light elastic string of natural length $a$ and modulus of elasticity
    $2mg$ is attached to a fixed point $A$ on a rough horizontal surface. The other
    end is attached to a particle $P$ of mass $m$. The particle and string rest on
    the surface. The coefficient of friction between $P$ and the surface is $\mu$.
    The particle $P$ is initially held in equilibrium at a distance $\tfrac{4}{3}a$
    from $A$, then released from rest.
  answer_options: []
  subquestions:
  - number: 2a
    question_type: calculation
    page: 4
    subpage_row: 1
    subpage_col: 1
    marks: 3
    text: Given that the string never becomes slack, find the minimum value of $\mu$.
    answer_options: []
    subquestions: []
  - number: 2b
    question_type: calculation
    page: 5
    subpage_row: 1
    subpage_col: 1
    marks: 3
    text: It is now given that $\mu = \tfrac{1}{2}$. Find the extension of the string
      when the particle comes to rest.
    answer_options: []
    subquestions: []
