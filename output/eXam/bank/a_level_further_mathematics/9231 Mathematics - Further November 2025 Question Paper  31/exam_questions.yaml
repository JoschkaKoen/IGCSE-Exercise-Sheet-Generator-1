  marks: 4
  text: Two uniform smooth spheres $A$ and $B$ of equal radii have masses $4m$ and
    $m$ respectively. Sphere $B$ is at rest on a smooth horizontal surface. Sphere
    $A$ is moving on the surface with speed $u$ and collides directly with sphere
    $B$. After the collision, the momentum of $A$ is three times the momentum of $B$.
    Find the value of the coefficient of restitution $e$.
  answer_options: []
  subquestions: []
- number: '2'
  question_type: calculation
  page: 3
  subpage_row: 1
  subpage_col: 1
  marks: 4
  text: A particle $P$ of mass $m$ is moving in a horizontal circle with angular speed
    $\omega_1$ on the smooth inner surface of a hemispherical shell of radius $r$.
    The angle between the upward vertical and the normal reaction of the surface on
    $P$ is $\theta_1$, where $\tan\theta_1 = \tfrac34$. When the angular speed is
    increased to $\omega_2$, the angle between the upward vertical and the normal
    reaction of the surface on $P$ becomes $\theta_2$, where $\tan\theta_2 = \tfrac43$.
    Find the ratio $\dfrac{\omega_1}{\omega_2}$.
  answer_options: []
  subquestions: []
