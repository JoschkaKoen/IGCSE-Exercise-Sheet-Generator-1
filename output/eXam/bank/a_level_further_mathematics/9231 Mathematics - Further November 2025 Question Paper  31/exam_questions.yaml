  text: A particle $P$ of mass $m$ is attached to one end of a light inextensible
    string of length $a$. The other end of the string is attached to a fixed point
    $O$. Initially $P$ is held with the string taut and making an angle of $60\degree$
    with the upward vertical through $O$. The particle $P$ is projected perpendicular
    to the string in a downwards direction with speed $\sqrt{17ag}$. It then starts
    to move along a circular path in a vertical plane with centre $O$ (see diagram).
    At the lowest point of its path, vertically below $O$, the particle $P$ collides
    with a stationary particle $Q$.
  answer_options: []
