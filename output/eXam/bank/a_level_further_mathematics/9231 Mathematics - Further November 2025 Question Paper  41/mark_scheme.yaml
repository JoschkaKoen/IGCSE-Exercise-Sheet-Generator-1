  mark_scheme_answer: '$\displaystyle\int_0^4 \tfrac{1}{16}\sqrt x\,dx + \int_4^9
    \tfrac{1}{k\sqrt x}\,dx = 1$: $\tfrac{1}{16}\left[\tfrac23 x^{3/2}\right]_0^4
    + \tfrac1k\left[2\sqrt x\right]_4^9 = \tfrac13 + \tfrac2k = 1$, so $\tfrac2k =
    \tfrac23$, giving $k = 3$ (AG).'
  mark_scheme: []
  graphics: []
- number: 5b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Since $\int_0^4 = \tfrac13 < \tfrac12$, the median $m$ satisfies
    $4 < m < 9$: $\tfrac13 + \tfrac13\int_4^m x^{-1/2}\,dx = \tfrac12$, i.e. $\tfrac13
    + \tfrac23(\sqrt m - 2) = \tfrac12$. So $\sqrt m = \tfrac94$, $m = \tfrac{81}{16}
    = 5.0625$.'
  mark_scheme: []
  graphics: []
- number: 5c
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'CDF: $\mathrm{F}(x) = \tfrac{1}{24}x^{3/2}$ for $0\leqslant
    x<4$, $\tfrac23\sqrt x - 1$ for $4\leqslant x\leqslant9$. With $Y = \sqrt X$,
    $\mathrm{G}(y) = \mathrm{F}(y^2) = \tfrac{1}{24}y^3$ for $0\leqslant y<2$, $\tfrac23
    y - 1$ for $2\leqslant y\leqslant3$. Differentiating: $\mathrm{g}(y) = \tfrac18
    y^2$ for $0\leqslant y<2$, $\tfrac23$ for $2\leqslant y\leqslant3$, $0$ otherwise.'
  mark_scheme: []
  graphics: []
- number: 6a
