  mark_scheme_answer: 'Boys: $\sum(x - \bar x)^2 = 9\times0.36 = 3.24$. Girls ($\sum
    x = 16.6$, $\sum x^2 = 55.8$): $\sum(x-\bar x)^2 = 55.8 - \tfrac{16.6^2}{5} =
    0.688$. Pooled variance $= \dfrac{3.24 + 0.688}{10 + 5 - 2} = 0.302$, so $s =
    0.550$.'
  mark_scheme: []
