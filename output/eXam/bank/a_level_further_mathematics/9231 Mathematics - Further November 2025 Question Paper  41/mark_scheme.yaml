  mark_scheme_answer: '$H_0$: Po(2.8) fits the data; $H_1$: Po(2.8) does not fit the
    data. $\chi^2 = 2.739 + 0.241 + 2.152 + 2.049 + 0.425 + 3.753 + 0.037 = 11.4$.
    With 6 degrees of freedom, the critical value is $\chi^2_{0.95}(6) = 12.59$. Since
    $11.4 < 12.59$, do not reject $H_0$: there is insufficient evidence to suggest
    that Po(2.8) is not a good fit (i.e. that the manager''s claim is false).'
  mark_scheme: []
