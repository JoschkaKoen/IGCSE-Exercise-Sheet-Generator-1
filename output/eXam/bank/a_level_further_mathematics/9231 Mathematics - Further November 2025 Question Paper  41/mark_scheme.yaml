- number: '4'
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Normal approximation: mean $= \tfrac14\cdot28\cdot29 = 203$,
    variance $= \tfrac{1}{24}\cdot28\cdot29\cdot57 = 1928.5$. Two-tailed 1\% test,
    critical $z = -2.576$. No rejection requires $\dfrac{T + 0.5 - 203}{\sqrt{1928.5}}
    > -2.576$, so $T > 89.4$. The least possible value is $T = 90$.'
  mark_scheme: []
