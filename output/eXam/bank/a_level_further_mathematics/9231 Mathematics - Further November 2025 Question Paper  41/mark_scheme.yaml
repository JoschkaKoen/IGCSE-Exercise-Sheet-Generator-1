  mark_scheme_answer: '$H_0$: $\mu_B = \mu_A$; $H_1$: $\mu_B > \mu_A$ (population
    means, before vs after). Differences (before $-$ after): $5, 0, -1, 6, 1, -2,
    8, 7, 15$; $\bar d = \tfrac{39}{9}$, $s_d^2 = \tfrac18\left(405 - \tfrac{39^2}{9}\right)
    = 29.5$. $t = \dfrac{39/9}{\sqrt{29.5/9}} = 2.393$. With 8 d.f., critical $t =
    1.860$. Since $2.393 > 1.860$, reject $H_0$: there is sufficient evidence that
    the new training programme reduces times.'
