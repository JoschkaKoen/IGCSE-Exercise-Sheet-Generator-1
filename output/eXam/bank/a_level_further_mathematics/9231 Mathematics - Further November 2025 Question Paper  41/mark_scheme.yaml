- number: 7b
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: $\mathrm{G}_X''(t) = 2b$, so $\mathrm{G}_X''(1) = 2b$. $\mathrm{Var}(X)
    = \mathrm{G}_X''(1) + \mathrm{G}_X'(1) - [\mathrm{G}_X'(1)]^2 = 2b + (2a+2b) -
    (2a+2b)^2 = 2b + (2a+2b)(1 - (2a+2b)) = 2b + 2(a+b)(1 - 2a - 2b)$ (AG).
  mark_scheme: []
  graphics: []
- number: 7c
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: $\mathrm{G}_Y(t) = [\mathrm{G}_X(t)]^{10} = (a + 2at + bt^2)^{10}$.
    $\mathrm{G}_Y'(t) = 10(a + 2at + bt^2)^9(2a + 2bt)$, so $\mathrm{E}(Y) = \mathrm{G}_Y'(1)
    = 10(3a+b)^9(2a+2b)$. Since the total probability is $3a + b = 1$, $\mathrm{E}(Y)
    = 10(2a + 2b) = 10\mathrm{E}(X)$.
  mark_scheme: []
