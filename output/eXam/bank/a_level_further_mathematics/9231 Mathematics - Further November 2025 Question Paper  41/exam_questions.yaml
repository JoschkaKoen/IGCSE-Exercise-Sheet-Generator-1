  question_type: calculation
  page: 4
  subpage_row: 1
  subpage_col: 1
  marks: 4
  text: 'A random sample of 10 newborn baby boys is taken and their masses in kg are
    recorded. From this sample, the population standard deviation of all newborn baby
    boys is estimated as 0.6 kg. A random sample of 5 newborn baby girls is taken
    and their masses in kg are recorded as follows: 3.9, 3.1, 2.9, 3.1, 3.6. It is
    assumed that the masses of newborn baby boys and girls have the same population
    standard deviation, $\sigma$ kg. By pooling the two samples, calculate an estimate
    of $\sigma$.'
  answer_options: []
  subquestions: []
