  text: 'Nine athletes in a club have a new coach. The coach adopts a new training
    programme which he believes will reduce the race times of these athletes. Each
    athlete completes a 1500 m time trial before and after completing the new training
    programme. Their times, in seconds (s), are recorded (athletes $A$–$I$: before
    250, 251, 252, 267, 276, 291, 310, 320, 335; after 245, 251, 253, 261, 275, 293,
    302, 313, 320).'
