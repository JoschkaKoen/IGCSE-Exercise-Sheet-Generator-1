  marks: 5
  text: A researcher believes that the median $m$ of a population has changed from
    its known previous value $m_0$. The researcher collects a random sample of size
    28. She ranks the data and calculates a test statistic $T$ using the Wilcoxon
    signed-rank test. The conclusion of the test carried out at a 1\% significance
    level is that there is not sufficient evidence to support her belief. Using a
    normal approximation, find the least possible value of $T$.
  answer_options: []
  subquestions: []
