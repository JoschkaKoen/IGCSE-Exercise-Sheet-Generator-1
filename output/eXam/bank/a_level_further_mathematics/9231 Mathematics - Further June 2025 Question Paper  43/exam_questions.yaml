  question_type: calculation
  page: 2
  subpage_row: 1
  subpage_col: 1
  marks: 6
  text: A person's eye colour may be categorised as ``brown'', ``blue'' or ``other''.
    A scientist claims that these eye colours are uniformly distributed and hence
    are equally likely to occur in the population. A survey of 120 people from this
    population found that 38 people had brown eyes, 52 people had blue eyes and 30
    people had eyes which were neither brown nor blue. Use the data to carry out a
    goodness of fit test at the 5\% significance level to test the scientist's claim.
  answer_options: []
  subquestions: []
- number: '2'
  question_type: calculation
  page: 3
  subpage_row: 1
  subpage_col: 1
  marks: 7
  text: 'A farmer is investigating whether using a new fertiliser will increase the
    yield of tomato plants. The farmer selects 40 tomato plants at random and gives
    them the new fertiliser; the crop mass, $x$ kg, of each is recorded. A further
    60 tomato plants are given a standard fertiliser; the crop mass, $y$ kg, of each
    is recorded. The results are summarised as follows: $\sum x = 168$, $\sum x^2
    = 720$, $\sum y = 228$, $\sum y^2 = 900$. Find a 90\% confidence interval for
    the difference in mean crop mass associated with each type of fertiliser.'
  answer_options: []
  subquestions: []
