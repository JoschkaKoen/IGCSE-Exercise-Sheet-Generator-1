  mark_scheme_answer: $\mathrm{G}_Z'(t) = \tfrac{1}{15} + \tfrac{42}{15}t^2$, so $\mathrm{E}(Z)
    = \mathrm{G}_Z'(1) = \tfrac{1}{15} + \tfrac{42}{15} = \tfrac{43}{15} \approx 2.87$.
  mark_scheme: []
