- number: 6a
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: '$X$ (number of red balls): $\mathrm{P}(X=0) = \tfrac{1}{15}$,
    $\mathrm{P}(X=1) = \tfrac{7}{15}$, $\mathrm{P}(X=2) = \tfrac{7}{15}$, so $\mathrm{G}_X(t)
    = \tfrac{1}{15} + \tfrac{7}{15}t + \tfrac{7}{15}t^2$. $Y$ (number of different
    colours): $\mathrm{P}(Y=1) = \tfrac{8}{15}$, $\mathrm{P}(Y=2) = \tfrac{7}{15}$,
    so $\mathrm{G}_Y(t) = \tfrac{8}{15}t + \tfrac{7}{15}t^2$.'
  mark_scheme: []
  graphics: []
- number: 6b
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: $X$ and $Y$ are not independent, so the PGF of $Z = X + Y$ is
    not the product $\mathrm{G}_X(t)\,\mathrm{G}_Y(t)$.
  mark_scheme: []
  graphics: []
- number: 6c
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: The non-zero cases are $(X,Y) = (0,1)$ giving $Z = 1$ with $\mathrm{P}
    = \tfrac{1}{15}$; $(1,2)$ giving $Z = 3$ with $\mathrm{P} = \tfrac{7}{15}$; and
    $(2,1)$ giving $Z = 3$ with $\mathrm{P} = \tfrac{7}{15}$. So $\mathrm{P}(Z=1)
    = \tfrac{1}{15}$, $\mathrm{P}(Z=3) = \tfrac{14}{15}$, and $\mathrm{G}_Z(t) = \tfrac{1}{15}t
    + \tfrac{14}{15}t^3$.
  mark_scheme: []
  graphics: []
- number: 6d
  question_type: calculation
