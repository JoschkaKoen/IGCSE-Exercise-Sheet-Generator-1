- number: 5c
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: $\mathbf{M}^{-1} = \begin{pmatrix} 1 & 0 \\ 0 & -1 \end{pmatrix}\begin{pmatrix}
    \cos\tfrac{\pi}{12} & \sin\tfrac{\pi}{12} \\ -\sin\tfrac{\pi}{12} & \cos\tfrac{\pi}{12}
