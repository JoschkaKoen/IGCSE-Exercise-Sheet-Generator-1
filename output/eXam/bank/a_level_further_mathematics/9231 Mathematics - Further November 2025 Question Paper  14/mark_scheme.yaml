- number: 6c
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Distance from initial line $y = r\sin\theta = \cos\tfrac12\theta\sin\theta$.
    $\dfrac{dy}{d\theta} = 0$: $\cos\tfrac12\theta\cos\theta - \tfrac12\sin\theta\sin\tfrac12\theta
    = 0 \Rightarrow 3\cos^2\tfrac12\theta - 2 = 0 \Rightarrow \cos^2\tfrac12\theta
    = \tfrac23$. Then $y = 2\cos^2\tfrac12\theta\sin\tfrac12\theta = 2\left(\tfrac23\right)\sqrt{1-\tfrac23}
    = \tfrac43\sqrt{\tfrac13} = \tfrac49\sqrt3$.'
  mark_scheme: []
  graphics: []
