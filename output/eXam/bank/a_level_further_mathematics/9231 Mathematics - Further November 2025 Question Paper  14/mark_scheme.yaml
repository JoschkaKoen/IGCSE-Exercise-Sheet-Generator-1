questions:
- number: '1'
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Base case $n=1$: LHS $=\left(\tfrac65\right)^1=\tfrac65$, RHS
    $=1+\tfrac15=\tfrac65$ ✓. Assume $\left(\tfrac65\right)^k \geqslant 1+\tfrac15
    k$ for some positive integer $k$. Then $\left(\tfrac65\right)^{k+1} \geqslant
    \tfrac65\left(1+\tfrac15 k\right) = \tfrac65 + \tfrac{6}{25}k \geqslant \tfrac65
    + \tfrac15 k = 1 + \tfrac15(k+1)$. Hence by induction $\left(\tfrac65\right)^n
    \geqslant 1+\tfrac15 n$ for every positive integer $n$.'
  mark_scheme: []
  graphics: []
- number: 2a
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Since $\beta\gamma = \beta\cdot\tfrac1\beta = 1$ and $\alpha\beta\gamma
    = -d$, we have $\alpha = -d$. Using $\alpha+\beta+\gamma = -b$ with $\gamma =
    \tfrac1\beta$: $-d + \beta + \tfrac1\beta = -b$, so $\beta + \tfrac1\beta = d
    - b$ (AG).'
  mark_scheme: []
  graphics: []
- number: 2b
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Using $\alpha\beta + \beta\gamma + \gamma\alpha = c$ with $\gamma
    = \tfrac1\beta$ and $\alpha = -d$: $-d\beta + 1 - \tfrac{d}{\beta} = c$, so $-d\left(\beta+\tfrac1\beta\right)
    = c - 1$, giving $\beta + \tfrac1\beta = \dfrac{1-c}{d}$ (AG).'
  mark_scheme: []
  graphics: []
- number: 2ci
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'With $b=3$, $c=-3$, equating the results of (a) and (b): $d
    - 3 = \dfrac{1-(-3)}{d} = \dfrac4d \Rightarrow d^2 - 3d - 4 = 0 \Rightarrow (d-4)(d+1)=0$.
    Since $d>0$, $d = 4$.'
  mark_scheme: []
  graphics: []
- number: 2cii
