- number: 5d
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: '$\mathbf{M} = \begin{pmatrix}\cos\tfrac{\pi}{12} & \sin\tfrac{\pi}{12}
    \\ \sin\tfrac{\pi}{12} & -\cos\tfrac{\pi}{12}\end{pmatrix}$ transforms $(x, mx)$;
    using $Y = mX$: $\sin\tfrac{\pi}{12}\,x - m\cos\tfrac{\pi}{12}\,x = m\left(\cos\tfrac{\pi}{12}\,x
    + m\sin\tfrac{\pi}{12}\,x\right)$, giving $\sin\tfrac{\pi}{12}\,m^2 + 2m\cos\tfrac{\pi}{12}
    - \sin\tfrac{\pi}{12} = 0$ (AG). By the quadratic formula with $\cos^2\tfrac{\pi}{12}+\sin^2\tfrac{\pi}{12}=1$:
    $m = \dfrac{-2\cos\tfrac{\pi}{12} \pm \sqrt{4\cos^2\tfrac{\pi}{12} + 4\sin^2\tfrac{\pi}{12}}}{2\sin\tfrac{\pi}{12}}
    = -\cot\tfrac{\pi}{12} \pm \mathrm{cosec}\,\tfrac{\pi}{12}$ (i.e. $a=-1$, $b=\pm1$).'
  mark_scheme: []
  graphics: []
