- number: 3a
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: $\displaystyle\sum_{r=1}^n (r^3+6r^2+11r+6) = \tfrac14 n^2(n+1)^2
    + n(n+1)(2n+1) + \tfrac{11}{2}n(n+1) + 6n = \tfrac14 n(n^3 + 10n^2 + 35n + 50)$.
    So $b=10$, $c=35$, $d=50$.
  mark_scheme: []
  graphics: []
- number: 3b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Partial fractions: $\dfrac{2}{(r+1)(r+2)(r+3)} = \dfrac{1}{r+1}
    - \dfrac{2}{r+2} + \dfrac{1}{r+3}$. With $f(r) = \tfrac{1}{r+1}$ the sum telescopes
    to $\displaystyle\sum_{r=1}^n = \tfrac16 - \dfrac{1}{n+2} + \dfrac{1}{n+3}$ $\left(=
    \tfrac16 - \dfrac{1}{(n+2)(n+3)}\right)$.'
  mark_scheme: []
  graphics: []
