- number: '7'
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: '$\displaystyle\int\dfrac{x+5}{x^2+10x+61}\,dx = \tfrac12\ln(x^2+10x+61)$,
    so the integrating factor is $\mathrm{e}^{-\frac12\ln(x^2+10x+61)} = \dfrac{1}{\sqrt{x^2+10x+61}}$.
    Then $\dfrac{d}{dx}\!\left(\dfrac{y}{\sqrt{x^2+10x+61}}\right) = \dfrac{1}{\sqrt{x^2+10x+61}}$.
    Completing the square $x^2+10x+61 = (x+5)^2+36$: $\dfrac{y}{\sqrt{x^2+10x+61}}
    = \sinh^{-1}\!\left(\dfrac{x+5}{6}\right) + C$. Using $y=0$ at $x=3$: $C = -\sinh^{-1}\tfrac43
    = -\ln 3$. So $\dfrac{y}{\sqrt{x^2+10x+61}} = \sinh^{-1}\!\left(\dfrac{x+5}{6}\right)
    - \sinh^{-1}\tfrac43$.'
  mark_scheme: []
  graphics: []
- number: 8a
