  mark_scheme_answer: '$\dfrac{d}{dt}\!\left(\dfrac{dy}{dx}\right) = \dfrac{t}{\sqrt{1-t^2}}
    - \dfrac{1-t^2}{t\sqrt{1-t^2}} - 2t\,\mathrm{sech}^{-1}t$. Multiplying by $\dfrac{dt}{dx}
    = 1-t^2$: $\dfrac{d^2y}{dx^2} = t\sqrt{1-t^2} - \dfrac{(1-t^2)^{3/2}}{t} - 2t(1-t^2)\mathrm{sech}^{-1}t$.'
