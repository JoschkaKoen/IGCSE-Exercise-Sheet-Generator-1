  mark_scheme_answer: $\mathbf{A}\mathbf{e} = \lambda\mathbf{e}$. Then $\mathbf{A}^3\mathbf{e}
    = \mathbf{A}^2(\mathbf{A}\mathbf{e}) = \mathbf{A}^2(\lambda\mathbf{e}) = \lambda\mathbf{A}(\mathbf{A}\mathbf{e})
    = \lambda\mathbf{A}(\lambda\mathbf{e}) = \lambda^2(\mathbf{A}\mathbf{e}) = \lambda^3\mathbf{e}$.
    So $\mathbf{e}$ is an eigenvector of $\mathbf{A}^3$ with eigenvalue $\lambda^3$.
  mark_scheme: []
  graphics: []
- number: 8b
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: $\det(\mathbf{A} - \lambda\mathbf{I}) = (-1-\lambda)\big((1-\lambda)(5-\lambda)
    - 0\big) - 3(0) + 4(0) = (-1-\lambda)(1-\lambda)(5-\lambda) = 0$, so $\lambda
    = -1, 1, 5$ (AG).
  mark_scheme: []
  graphics: []
- number: 8c
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Eigenvectors of $\mathbf{A}$: $\lambda = -1 \to (1,0,0)$; $\lambda
    = 1 \to (5,2,1)$; $\lambda = 5 \to (2,0,3)$. $\mathbf{A} - 2\mathbf{I}$ has the
    same eigenvectors with eigenvalues $-3, -1, 3$. So $\mathbf{P} = \begin{pmatrix}
    1 & 5 & 2 \\ 0 & 2 & 0 \\ 0 & 1 & 3 \end{pmatrix}$ and $\mathbf{D} = \begin{pmatrix}
    -3 & 0 & 0 \\ 0 & -1 & 0 \\ 0 & 0 & 3 \end{pmatrix}$.'
  mark_scheme: []
