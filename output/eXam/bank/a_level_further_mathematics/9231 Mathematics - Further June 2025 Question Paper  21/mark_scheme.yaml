- number: '3'
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'With $z - z^{-1} = 2\mathrm{i}\sin\theta$: $(z - z^{-1})^5
    = (z^5 - z^{-5}) - 5(z^3 - z^{-3}) + 10(z - z^{-1})$. Using $z^n - z^{-n} = 2\mathrm{i}\sin
    n\theta$: $2^5\mathrm{i}\sin^5\theta = 2\mathrm{i}\sin 5\theta - 5(2\mathrm{i}\sin
    3\theta) + 10(2\mathrm{i}\sin\theta)$, so $16\sin^5\theta = \sin 5\theta - 5\sin
    3\theta + 10\sin\theta$, giving $\mathrm{cosec}^5\theta = \dfrac{16}{\sin 5\theta
    - 5\sin 3\theta + 10\sin\theta}$ ($a = 16$, $b = -5$, $c = 10$).'
  mark_scheme: []
  graphics: []
- number: 4a
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Left-endpoint rectangle sum (increasing curve): $\displaystyle\sum_{r=1}^{n-1}\dfrac{1}{\sqrt
    r}\mathrm{e}^{\sqrt r} < \int_1^n \dfrac{1}{\sqrt x}\mathrm{e}^{\sqrt x}\,dx =
    \left[2\mathrm{e}^{\sqrt x}\right]_1^n = 2\mathrm{e}^{\sqrt n} - 2\mathrm{e}$.
    Adding the $r = n$ term: $\sum_{r=1}^n\dfrac{1}{\sqrt r}\mathrm{e}^{\sqrt r} <
    2\mathrm{e}^{\sqrt n} - 2\mathrm{e} + \dfrac{1}{\sqrt n}\mathrm{e}^{\sqrt n} =
    \left(2 + \dfrac{1}{\sqrt n}\right)\mathrm{e}^{\sqrt n} - 2\mathrm{e}$ (AG).'
  mark_scheme: []
  graphics: []
- number: 4b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Right-endpoint rectangles give $\displaystyle\sum_{r=2}^n\dfrac{1}{\sqrt
    r}\mathrm{e}^{\sqrt r} > \int_1^n \dfrac{1}{\sqrt x}\mathrm{e}^{\sqrt x}\,dx =
    2\mathrm{e}^{\sqrt n} - 2\mathrm{e}$. Adding the $r = 1$ term: $\sum_{r=1}^n\dfrac{1}{\sqrt
    r}\mathrm{e}^{\sqrt r} > 2\mathrm{e}^{\sqrt n} - 2\mathrm{e} + \mathrm{e} = 2\mathrm{e}^{\sqrt
    n} - \mathrm{e}$.'
  mark_scheme: []
  graphics: []
- number: '5'
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Auxiliary equation $6m^2 + 3m + 6 = 0 \Rightarrow m = -\tfrac14
    \pm \tfrac14\mathrm{i}\sqrt{15}$, so CF $= \mathrm{e}^{-\frac14 t}\left(A\cos\tfrac{\sqrt{15}}{4}t
    + B\sin\tfrac{\sqrt{15}}{4}t\right)$. PI $x = k\mathrm{e}^{-t}$: $6k - 3k + 6k
    = 1 \Rightarrow k = \tfrac19$. General solution $x = \mathrm{e}^{-\frac14 t}\left(A\cos\tfrac{\sqrt{15}}{4}t
    + B\sin\tfrac{\sqrt{15}}{4}t\right) + \tfrac19\mathrm{e}^{-t}$. Initial conditions:
    $A = -\tfrac19$, $B = \tfrac{1}{3\sqrt{15}}$. So $x = \tfrac13\mathrm{e}^{-\frac14
    t}\left(-\tfrac13\cos\tfrac{\sqrt{15}}{4}t + \tfrac{1}{\sqrt{15}}\sin\tfrac{\sqrt{15}}{4}t\right)
    + \tfrac19\mathrm{e}^{-t}$.'
  mark_scheme: []
  graphics: []
- number: 6a
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: $\tanh u = \dfrac{\mathrm{e}^u - \mathrm{e}^{-u}}{\mathrm{e}^u
    + \mathrm{e}^{-u}}$ and $\mathrm{sech}\,u = \dfrac{2}{\mathrm{e}^u + \mathrm{e}^{-u}}$.
    Then $1 - \tanh^2 u = \dfrac{(\mathrm{e}^u + \mathrm{e}^{-u})^2 - (\mathrm{e}^u
    - \mathrm{e}^{-u})^2}{(\mathrm{e}^u + \mathrm{e}^{-u})^2} = \dfrac{4}{(\mathrm{e}^u
    + \mathrm{e}^{-u})^2} = \mathrm{sech}^2 u$ (AG).
  mark_scheme: []
  graphics: []
- number: 6b
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: '$u = \mathrm{sech}^{-1}t \Rightarrow \mathrm{sech}\,u = t$.
    Differentiating implicitly: $-\tanh u\,\mathrm{sech}\,u\,\dfrac{du}{dt} = 1$,
    so $\dfrac{du}{dt} = -\dfrac{1}{\tanh u\,\mathrm{sech}\,u} = -\dfrac{1}{t\sqrt{1-t^2}}$
    (using part (a), $\tanh u = \sqrt{1-t^2}$) (AG).'
  mark_scheme: []
  graphics: []
- number: 6c
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: $\dfrac{dy}{dt} = \mathrm{sech}^{-1}t + t\left(-\dfrac{1}{t\sqrt{1-t^2}}\right)
    = \mathrm{sech}^{-1}t - \dfrac{1}{\sqrt{1-t^2}}$ and $\dfrac{dx}{dt} = \dfrac{1}{1-t^2}$.
    So $\dfrac{dy}{dx} = \dfrac{dy}{dt}\cdot\dfrac{dt}{dx} = \left(\mathrm{sech}^{-1}t
    - \dfrac{1}{\sqrt{1-t^2}}\right)(1-t^2) = -\sqrt{1-t^2} + (1-t^2)\mathrm{sech}^{-1}t$
    (AG).
  mark_scheme: []
  graphics: []
- number: 6d
  question_type: calculation
