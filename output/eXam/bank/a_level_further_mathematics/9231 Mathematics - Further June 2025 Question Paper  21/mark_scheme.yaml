- number: 8d
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: $(\mathbf{A} - 2\mathbf{I})^3 = \mathbf{A}^3 - 6\mathbf{A}^2
    + 12\mathbf{A} - 8\mathbf{I}$. The characteristic equation gives $\mathbf{A}^3
    = 5\mathbf{A}^2 + \mathbf{A} - 5\mathbf{I}$, so $(\mathbf{A} - 2\mathbf{I})^3
    = 5\mathbf{A}^2 + \mathbf{A} - 5\mathbf{I} - 6\mathbf{A}^2 + 12\mathbf{A} - 8\mathbf{I}
    = -\mathbf{A}^2 + 13\mathbf{A} - 13\mathbf{I}$ ($a = -1$, $b = 13$, $c = -13$).
  mark_scheme: []
