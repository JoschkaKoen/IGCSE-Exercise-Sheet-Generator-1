- number: 2a
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: $I_n = \left[(1-x)^n\cosh x\right]_0^1 + n\displaystyle\int_0^1
    (1-x)^{n-1}\cosh x\,dx = -1 + n\left(\left[(1-x)^{n-1}\sinh x\right]_0^1 + (n-1)\int_0^1
    (1-x)^{n-2}\sinh x\,dx\right)$. The bracket term is 0, so $I_n = -1 + n(n-1)I_{n-2}$
    (AG).
  mark_scheme: []
  graphics: []
- number: 2b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: $I_0 = \displaystyle\int_0^1\sinh x\,dx = [\cosh x]_0^1 = \cosh
    1 - 1$. So $I_2 = -1 + 2(1)I_0 = -1 + 2(\cosh 1 - 1) = 2\cosh 1 - 3$ $\left(=
    \mathrm{e} + \mathrm{e}^{-1} - 3\right)$.
  mark_scheme: []
