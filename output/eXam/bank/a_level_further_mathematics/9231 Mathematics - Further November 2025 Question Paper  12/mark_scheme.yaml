  mark_scheme_answer: At $\theta = \tfrac18\pi$, $r^2 = \tan\tfrac14\pi = 1$, so the
    greatest distance from the pole is $1$. The curve runs from the pole at $\theta
    = 0$ out to $r = 1$ at $\theta = \tfrac18\pi$.
  mark_scheme: []
