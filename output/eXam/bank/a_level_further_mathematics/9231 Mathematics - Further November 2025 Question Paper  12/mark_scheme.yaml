- number: 5b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: Area $= \tfrac12\displaystyle\int_0^{\pi/8}\tan 2\theta\,d\theta
    = \tfrac12\!\left[-\tfrac12\ln\cos 2\theta\right]_0^{\pi/8} = \tfrac18\ln 2$.
  mark_scheme: []
  graphics: []
- number: 5c
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'With $x = r\cos\theta$, $y = r\sin\theta$: $r^2\cos 2\theta
    = \sin 2\theta \Rightarrow r^2(x^2 - y^2) = 2xy \Rightarrow (x^2+y^2)(x^2-y^2)
    = 2xy \Rightarrow x^4 - 2xy - y^4 = 0$. AG.'
  mark_scheme: []
  graphics: []
- number: 5d
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: The curve and the half-line bound a region inside triangle $OPQ$
    where $P = (\cos\tfrac18\pi, \sin\tfrac18\pi)$, $Q = (\cos\tfrac18\pi, 0)$. Required
    area $= \tfrac12\cos\tfrac18\pi\sin\tfrac18\pi - \tfrac18\ln 2 = \tfrac{\sqrt2}{8}
    - \tfrac18\ln 2 = \tfrac18(\sqrt2 - \ln 2)$.
  mark_scheme: []
  graphics: []
