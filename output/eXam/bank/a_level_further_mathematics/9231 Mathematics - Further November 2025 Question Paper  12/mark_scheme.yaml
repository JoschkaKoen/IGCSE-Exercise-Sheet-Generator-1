- number: 4b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: $\mathbf{AB} = \begin{pmatrix} 0 & m \\ -k & m \\ k & m \end{pmatrix}$;
    the $3\times3$ product $\mathbf{ABC}$ passes through the $2\times2$ matrix $\mathbf{B}$,
    so $\operatorname{rank}(\mathbf{ABC}) \leqslant 2 < 3$, giving $\det(\mathbf{ABC})
    = 0$ — i.e. $\mathbf{ABC}$ is singular.
  mark_scheme: []
  graphics: []
- number: 5a
