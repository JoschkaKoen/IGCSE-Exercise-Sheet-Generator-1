- number: 2b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Using Newton''s identities with $e_1 = 2$, $e_2 = \tfrac12$:
    solving via $p_3$ and $p_4 = 5$ gives $e_3 = \alpha\beta\gamma = -\tfrac{7}{16}$.
    Since $\alpha\beta\gamma = -d$, $d = \tfrac{7}{16}$.'
  mark_scheme: []
  graphics: []
- number: 3a
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Base: $u_1 < 5$. Step: $5 - u_{k+1} = 5 - \dfrac{6u_k+5}{u_k+2}
    = \dfrac{5 - u_k}{u_k + 2} > 0$ when $u_k < 5$ (and $u_k > 0$), so $u_{k+1} <
    5$. By induction $u_n < 5$ for all $n$.'
  mark_scheme: []
  graphics: []
- number: 3b
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: $u_{n+1} - u_n = \dfrac{6u_n+5}{u_n+2} - u_n = \dfrac{-(u_n-5)(u_n+1)}{u_n+2}$,
    which is $> 0$ since $0 < u_n < 5$. Hence $u_{n+1} > u_n$.
  mark_scheme: []
  graphics: []
