  mark_scheme_answer: Common point e.g. $(0,7,0)$; direction $= (5,-2,1)\times(3,2,-1)
    = (0,8,16) \parallel (0,1,2)$. So $\mathbf{r} = \begin{pmatrix}0\\7\\0\end{pmatrix}
