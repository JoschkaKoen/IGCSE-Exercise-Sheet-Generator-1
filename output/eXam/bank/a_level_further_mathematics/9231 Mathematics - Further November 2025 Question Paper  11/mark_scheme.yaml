- number: 7e
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Critical points: $\dfrac{x+2}{x^2+3x+1}=2 \Rightarrow x=-\tfrac52,
    0$; $=-2 \Rightarrow x=-\tfrac74\pm\tfrac14\sqrt{17}$. Solution: $-\tfrac74-\tfrac14\sqrt{17}
    < x < -\tfrac52$ and $-\tfrac74+\tfrac14\sqrt{17} < x < 0$, excluding the asymptotes
    $x = -\tfrac32\pm\tfrac12\sqrt5$.'
  mark_scheme: []
  graphics: []
