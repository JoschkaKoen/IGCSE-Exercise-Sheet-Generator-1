- number: 6a
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: A single loop from the pole in the first quadrant; line of symmetry
    $\theta = \tfrac16\pi$.
  mark_scheme: []
  graphics: []
- number: 6b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: Area $= \tfrac12\int_0^{\pi/3}\sin^2 3\theta\,d\theta = \tfrac14\int_0^{\pi/3}(1-\cos
    6\theta)\,d\theta = \tfrac14\big[\theta - \tfrac16\sin 6\theta\big]_0^{\pi/3}
    = \tfrac{1}{12}\pi$.
  mark_scheme: []
  graphics: []
- number: 6c
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: $y = r\sin\theta = (3\sin\theta - 4\sin^3\theta)\sin\theta =
    3\sin^2\theta - 4\sin^4\theta$; $\tfrac{dy}{d\theta} = 0 \Rightarrow \sin^2\theta
    = \tfrac38$, giving maximum distance $y = \tfrac{9}{16}$.
  mark_scheme: []
  graphics: []
- number: 6d
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Using $y = r\sin\theta$ and $r^2 = x^2+y^2$: $(x^2+y^2)^2 =
    y(3x^2 - y^2)$.'
  mark_scheme: []
  graphics: []
