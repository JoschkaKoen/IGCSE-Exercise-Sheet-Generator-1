- number: 7b
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: $\tfrac{dy}{dx} = \dfrac{(x^2+3x+1) - (x+2)(2x+3)}{(x^2+3x+1)^2}$;
    setting the numerator to 0 gives $x^2 + 4x + 5 = 0$, discriminant $16-20 = -4
