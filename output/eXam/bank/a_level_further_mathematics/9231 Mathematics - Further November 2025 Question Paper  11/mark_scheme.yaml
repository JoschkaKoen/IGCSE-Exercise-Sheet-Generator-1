- number: 2c
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: $\mathbf{AB} = \begin{pmatrix} \frac{13}{4} & \frac32 \\ \frac32
    & 1 \end{pmatrix}$ and $\det\mathbf{AB} = \det\mathbf{A}\,\det\mathbf{B} = 1\times1
    = 1$, so the area is unchanged.
  mark_scheme: []
  graphics: []
- number: 2d
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: '$\tfrac32 x + my = m\!\left(\tfrac{13}{4}x + \tfrac32 my\right)
    \Rightarrow m^2 + \tfrac32 m - 1 = 0 \Rightarrow m = \tfrac12$ or $-2$. Invariant
    lines: $y = -2x$ and $y = \tfrac12 x$.'
  mark_scheme: []
  graphics: []
- number: '3'
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Base $n=1$: $\tfrac{d}{dx}(x\cos x) = \cos x - x\sin x = (-1)^1(x\sin
    x - \cos x)$ ✓. Assume true for $n=k$; differentiating the hypothesis twice gives
    $\tfrac{d^{2k+1}}{dx^{2k+1}}(x\cos x) = (-1)^{k+1}(x\sin x - (2k+1)\cos x)$ —
    the $n=k+1$ case. Hence true for all positive integers $n$ by induction.'
  mark_scheme: []
  graphics: []
- number: 4a
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: $y = 2x+1 \Rightarrow x = \tfrac12(y-1)$; substituting into
    $x^4+x^3+x^2+x+1=0$ and simplifying gives $y^4 - 2y^3 + 4y^2 + 2y + 11 = 0$ (AG).
  mark_scheme: []
  graphics: []
- number: 4b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: For the new quartic $S_1 = 2$ and $\sum$ pairs $= 4$, so $S_2
    = S_1^2 - 2\sum\text{pairs} = 2^2 - 2(4) = -4$.
  mark_scheme: []
  graphics: []
- number: 4c
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Newton''s identity: $S_4 - 2S_3 + 4S_2 + 2S_1 + 44 = 0 \Rightarrow
    S_4 = 2(-22) - 4(-4) - 2(2) - 44 = -76$.'
  mark_scheme: []
  graphics: []
