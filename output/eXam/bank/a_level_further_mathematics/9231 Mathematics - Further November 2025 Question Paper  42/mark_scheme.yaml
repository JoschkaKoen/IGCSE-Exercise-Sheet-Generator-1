- number: 3b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Combine cells so each expected $\geqslant 5$: classes 0, 1,
    2, $\geqslant 3$ with observed 88, 73, 26, 13 and expected 99.317, 69.522, 24.333,
    6.828. $\chi^2 = 1.290 + 0.174 + 0.114 + 5.579 = 7.16$. With $\nu = 3$, $\chi^2_{0.05}
    = 7.815$; since $7.16 < 7.815$, do not reject $H_0$ — the Poisson(0.7) model fits.'
  mark_scheme: []
