- number: 1b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: '$H_0$: median $= 32500$, $H_1$: median $\neq 32500$. Signs
    of (salary $-32500$): 4 positive, 11 negative. Under $H_0$ the number of $+$ signs
    $\sim B(15, 0.5)$; $P(X \leqslant 4) = 0.0592 > 0.05$ (two-tailed at 10%), so
    do not reject $H_0$ — insufficient evidence against the claim.'
  mark_scheme: []
