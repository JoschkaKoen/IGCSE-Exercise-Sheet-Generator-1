- number: 4a
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Continuity at $x = 1$: $\tfrac15 + a = 0 \Rightarrow a = -\tfrac15$.
    At $x = 4$: $\tfrac45 - \tfrac15 = \tfrac{16}{50} + b \Rightarrow b = \tfrac{7}{25}$.'
  mark_scheme: []
  graphics: []
- number: 4b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: $f(x) = \tfrac15$ for $1 \leqslant x < 4$; $f(x) = \tfrac{x}{25}$
    for $4 \leqslant x \leqslant 6$; $f(x) = 0$ otherwise.
  mark_scheme: []
  graphics: []
- number: 4c
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: $E(X^2) = \int_1^4 \tfrac15 x^2\,dx + \int_4^6 \tfrac{1}{25}x^3\,dx
    = \tfrac{21}{5} + \tfrac{52}{5} = \tfrac{73}{5}$. $\mathrm{Var}(X) = \tfrac{73}{5}
    - \left(\tfrac{529}{150}\right)^2 = \tfrac{48659}{22500} \approx 2.16$.
  mark_scheme: []
  graphics: []
- number: 4d
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: '$F(x) = 0.1$ on $[1,4)$: $\tfrac15 x - \tfrac15 = 0.1 \Rightarrow
    x = 1.5$. $F(x) = 0.9$ on $[4,6]$: $\tfrac{1}{50}x^2 + \tfrac{7}{25} = 0.9 \Rightarrow
    x^2 = 31 \Rightarrow x = \sqrt{31}$. So $P_{10} = 1.5$, $P_{90} = \sqrt{31} \approx
    5.57$.'
  mark_scheme: []
  graphics: []
- number: '5'
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: $\bar{x}_A = 408$, $\bar{x}_B = 401$; $\sum(x-\bar{x})^2 = 136$
    (A) and $158$ (B). Pooled $s_p^2 = \tfrac{136 + 158}{12} = 24.5$. $t = \dfrac{408
    - 401}{\sqrt{24.5}\sqrt{\tfrac18 + \tfrac16}} = 2.62$. With $\nu = 12$, $t_{0.025}
    = 2.179$; since $2.62 > 2.179$, reject $H_0$ — there is evidence of a difference
    in mean tensile strengths.
  mark_scheme: []
  graphics: []
- number: 6a
  question_type: calculation
