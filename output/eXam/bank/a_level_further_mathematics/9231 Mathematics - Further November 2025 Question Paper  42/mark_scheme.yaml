  mark_scheme_answer: $G_X'(t) = (3-2t)^{-2} + 4t(3-2t)^{-3} \Rightarrow E(X) = G_X'(1)
    = 5$. $G_X''(1) = 32$, so $\mathrm{Var}(X) = G_X''(1) + G_X'(1) - [G_X'(1)]^2
    = 32 + 5 - 25 = 12$.
  mark_scheme: []
