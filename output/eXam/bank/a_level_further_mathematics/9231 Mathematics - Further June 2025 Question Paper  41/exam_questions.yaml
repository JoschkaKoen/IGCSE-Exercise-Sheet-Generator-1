    page: 6
    subpage_row: 1
    subpage_col: 1
    marks: 1
    text: It is decided to carry out a goodness of fit test at the 0.5\% significance
      level to determine whether a binomial distribution fits the data. The expected
      frequency for 1 broken egg is $a$. Show that $a = 162.6$ correct to 1 decimal
      place.
    answer_options: []
