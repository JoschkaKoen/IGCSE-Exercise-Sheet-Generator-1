  text: 'Eggs in a supermarket are sold in boxes of six. A supermarket manager wishes
    to model the number of broken eggs in the boxes sold in the store. A random sample
    of 2000 boxes is taken and the number of broken eggs recorded. Observed frequencies
    (0--6 broken eggs): 1844, 143, 11, 0, 1, 0, 1.'
