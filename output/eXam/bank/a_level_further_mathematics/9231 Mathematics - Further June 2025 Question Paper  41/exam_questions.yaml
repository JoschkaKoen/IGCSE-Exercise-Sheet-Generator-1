  marks: 7
  text: 'The manager of a hardware store is interested in whether there is a difference
    in the amount spent per customer on weekdays ($\$x$) compared to weekends ($\$y$).
    Random samples of 120 customers on weekdays and 80 customers on weekends are taken
    and the amount spent by each customer is recorded. The results are summarised
    as follows: $\sum x = 10470$, $\sum(x-\bar x)^2 = 12283$, $\sum y = 6560$, $\sum(y-\bar
    y)^2 = 13520$. Test at the 1\% significance level whether there is a difference
    in the mean amount spent per customer on weekdays compared to weekends. You should
    not assume that the population variances of the amounts spent on weekdays and
    weekends are equal.'
  answer_options: []
  subquestions: []
