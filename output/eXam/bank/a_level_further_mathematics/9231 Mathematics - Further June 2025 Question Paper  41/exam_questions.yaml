      level to test the researcher's belief.
    answer_options: []
    subquestions: []
  - number: 5b
    question_type: calculation
    page: 11
    subpage_row: 1
    subpage_col: 1
    marks: 3
    text: Show that using a paired-sample sign test at the 5\% significance level
      would result in the opposite conclusion to that found in part (a).
    answer_options: []
    subquestions: []
  - number: 5c
    question_type: short_answer
    page: 11
    subpage_row: 1
    subpage_col: 1
    marks: 1
