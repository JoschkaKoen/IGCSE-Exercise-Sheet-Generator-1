  text: 'Two jigsaw puzzles have the same number of pieces with identical shapes but
    have different pictures printed on them (a seaside picture and a cartoon picture).
    A researcher believes that children will complete the cartoon puzzle more quickly.
    To test this belief, 10 children are randomly selected and the time taken in seconds
    for each child to complete each puzzle is recorded. Children $A$--$J$: Seaside:
    182, 130, 193, 181, 192, 204, 184, 192, 180, 189; Cartoon: 161, 111, 195, 159,
    202, 200, 168, 165, 145, 160.'
  answer_options: []
  subquestions:
