questions:
- number: '1'
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: '$H_0$: $\mu_x = \mu_y$; $H_1$: $\mu_x \neq \mu_y$ (population
    means). Unbiased estimates $s_x^2 = \tfrac{12283}{119} = 103.218$, $s_y^2 = \tfrac{13520}{79}
    = 171.139$, so $\tfrac{s_x^2}{120} + \tfrac{s_y^2}{80} = 2.999$. $z = \dfrac{\frac{10470}{120}
    - \frac{6560}{80}}{\sqrt{2.999}} = \dfrac{87.25 - 82}{1.732} = 3.03$. Two-tailed
    1\% test, critical $z = 2.576$. Since $3.03 > 2.576$, reject $H_0$: there is sufficient
    evidence that the mean spend per customer is different on weekends compared to
    weekdays.'
  mark_scheme: []
  graphics: []
- number: 2a
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Total area $= 1$: rectangle $5a$ plus triangle $\tfrac12\cdot3\cdot
    a$, so $5a + \tfrac32 a = \tfrac{13}{2}a = 1$, giving $a = \tfrac{2}{13}$ (AG).
    The line $b - cx$ passes through $(5, a)$ and $(8, 0)$: $b = 8c$ and $a = 3c$,
    so $c = \tfrac{a}{3} = \tfrac{2}{39}$ and $b = \tfrac{16}{39}$.'
  mark_scheme: []
  graphics: []
- number: 2b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: $\mathrm{E}(X) = \displaystyle\int_0^5 x\cdot\tfrac{2}{13}\,dx
    + \int_5^8 x\left(\tfrac{16}{39} - \tfrac{2}{39}x\right)dx = \left[\tfrac{1}{13}x^2\right]_0^5
    + \left[\tfrac{8}{39}x^2 - \tfrac{2}{117}x^3\right]_5^8 = \tfrac{43}{13} = 3.31$.
  mark_scheme: []
  graphics: []
- number: 2c
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'The median $m$ lies in $0 < m < 5$: $\tfrac{2}{13}m = 0.5$,
    so $m = \tfrac{13}{4} = 3.25$.'
  mark_scheme: []
  graphics: []
- number: 2d
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'CDF of $X$: $\mathrm{F}(x) = \tfrac{2}{13}x$ for $0\leqslant
    x\leqslant5$; $\tfrac{16}{39}x - \tfrac{1}{39}x^2 - \tfrac{25}{39}$ for $5 < x\leqslant8$.
    With $Y = X^2$, $\mathrm{G}(y) = \mathrm{F}(\sqrt y) = 0$ for $y<0$; $\tfrac{2}{13}\sqrt
    y$ for $0\leqslant y\leqslant25$; $\tfrac{16}{39}\sqrt y - \tfrac{1}{39}y - \tfrac{25}{39}$
    for $25 < y\leqslant64$; $1$ for $y > 64$.'
  mark_scheme: []
  graphics: []
- number: 3a
