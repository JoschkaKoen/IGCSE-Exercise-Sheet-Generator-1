  mark_scheme_answer: Expanding $(1 - at^2)^{-1} = 1 + at^2 + \cdots$, so $\mathrm{P}(Y=0)
    = k$ and $\mathrm{P}(Y=2) = ka$. Hence $\mathrm{P}(Y > 2) = 1 - k(1 + a) = 1 -
    (1 - a)(1 + a) = 1 - (1 - a^2) = a^2$ (AG).
