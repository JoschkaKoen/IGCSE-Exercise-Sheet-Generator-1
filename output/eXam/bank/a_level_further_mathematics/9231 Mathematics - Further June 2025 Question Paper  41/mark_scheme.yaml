  mark_scheme_answer: $\mathrm{P}(\text{egg broken}) = \dfrac{0\cdot1844 + 1\cdot143
    + 2\cdot11 + 3\cdot0 + 4\cdot1 + 5\cdot0 + 6\cdot1}{2000\times6} = \dfrac{175}{12000}
    = \tfrac{7}{480} \approx 0.01458$.
  mark_scheme: []
  graphics: []
- number: 3b
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: With $X \sim \mathrm{B}\!\left(6, \tfrac{7}{480}\right)$, the
    expected frequency for 1 broken egg is $a = 2000 - (1831.3 + 6.016 + 0.119 + 0.001)
    = 162.6$ (AG). Equivalently $a = \binom{6}{1}\cdot\tfrac{7}{480}\left(1 - \tfrac{7}{480}\right)^5\times2000
    = 162.6$.
  mark_scheme: []
  graphics: []
- number: 3c
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: '$H_0$: a binomial distribution is a satisfactory model; $H_1$:
    it is not. Combining the tail cells ($\geqslant 2$ broken: observed 13, expected
    6.136), $\chi^2 = \dfrac{(1844-1831.3)^2}{1831.3} + \dfrac{(143-162.6)^2}{162.6}
    + \dfrac{(13-6.136)^2}{6.136} = 0.0881 + 2.363 + 7.678 = 10.1$. With 3 cells and
    1 estimated parameter, $\nu = 3 - 1 - 1 = 1$, critical $\chi^2_{0.995}(1) = 7.879$.
    Since $10.1 > 7.879$, reject $H_0$: there is sufficient evidence that the manager''s
    (binomial) model is not satisfactory.'
  mark_scheme: []
  graphics: []
