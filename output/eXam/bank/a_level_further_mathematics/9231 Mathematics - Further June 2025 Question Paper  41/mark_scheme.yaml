- number: 5a
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: '$H_0$: $m_s = m_c$; $H_1$: $m_s > m_c$ (population medians,
    seaside vs cartoon). Differences (seaside $-$ cartoon): $21, 19, -2, 22, -10,
    4, 16, 27, 35, 29$. Signed ranks: $6, 5, -1, 7, -3, 2, 4, 8, 10, 9$, so $P = 51$,
    $Q = 4$ and $T = 4$. For $n = 10$, one-tailed 5\%, critical value $= 10$. Since
    $4 \leqslant 10$, reject $H_0$: there is sufficient evidence that children, on
    average, complete the cartoon puzzle more quickly than the seaside puzzle (supporting
    the researcher''s belief).'
  mark_scheme: []
  graphics: []
- number: 5b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Sign test: 8 differences are positive and 2 are negative. Under
    $H_0$, $X \sim \mathrm{B}(10, 0.5)$, and $\mathrm{P}(X \leqslant 2) = 0.0547$.
    Since $0.0547 > 0.05$, do not reject $H_0$ (not significant). In part (a) $H_0$
    was rejected but here $H_0$ is accepted, so the opposite conclusion is reached.'
  mark_scheme: []
  graphics: []
