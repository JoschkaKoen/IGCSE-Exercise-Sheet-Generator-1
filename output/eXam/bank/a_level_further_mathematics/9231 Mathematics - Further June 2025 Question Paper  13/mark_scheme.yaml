- number: 6e
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Critical points: $\dfrac{x^2+a}{x+a} = a \Rightarrow x^2 -
    ax + a - a^2 = 0$; the case $= -a$ gives $x^2 + ax + a + a^2 = 0$ which has no
    real roots ($a>0$). For two real solutions need the discriminant of $x^2 - ax
    + a - a^2 = 0$ positive: $a^2 - 4(a - a^2) = 5a^2 - 4a > 0 \Rightarrow a > \tfrac45$.'
  mark_scheme: []
  graphics: []
- number: 7a
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: '$r^2 = \mathrm{e}^{\sin\theta}\cos\theta$; $\dfrac{d(r^2)}{d\theta}
    = \mathrm{e}^{\sin\theta}(\cos^2\theta - \sin\theta) = 0 \Rightarrow \cos^2\theta
    - \sin\theta = 0 \Rightarrow \sin^2\theta + \sin\theta - 1 = 0 \Rightarrow \sin\theta
    = \tfrac12(-1+\sqrt5)$. Furthest point from the pole: $(r, \theta) = (1.208,\
    0.666)$.'
  mark_scheme: []
  graphics: []
- number: 7b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Distance from the half-line $\theta = \tfrac12\pi$ is $x =
    r\cos\theta = \mathrm{e}^{\frac12\sin\theta}\cos^{3/2}\theta$. $\dfrac{dx}{d\theta}
    = 0 \Rightarrow -3\sin\theta + \cos^2\theta = 0 \Rightarrow \sin^2\theta + 3\sin\theta
    - 1 = 0 \Rightarrow \sin\theta = \tfrac12(-3+\sqrt{13})$. Point: $(r, \theta)
    = (1.136,\ 0.308)$.'
  mark_scheme: []
  graphics: []
