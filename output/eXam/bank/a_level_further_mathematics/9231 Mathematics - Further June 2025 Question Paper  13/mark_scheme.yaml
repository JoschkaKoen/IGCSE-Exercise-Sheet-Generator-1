- number: 6a
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: Vertical asymptote $x = -a$. Dividing, $y = \dfrac{(x+a)(x-a)
    + a^2 + a}{x+a} = x - a + \dfrac{a^2 + a}{x+a}$, so the oblique asymptote is $y
    = x - a$.
  mark_scheme: []
  graphics: []
