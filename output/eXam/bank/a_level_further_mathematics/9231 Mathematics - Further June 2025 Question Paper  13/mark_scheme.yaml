questions:
- number: 1a
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: Stretch $= \begin{pmatrix}14 & 0 \\ 0 & 1\end{pmatrix}$, rotation
    $= \begin{pmatrix}\tfrac12 & -\tfrac{\sqrt3}{2} \\ \tfrac{\sqrt3}{2} & \tfrac12\end{pmatrix}$.
    In the correct order, $\mathbf{M} = \begin{pmatrix}\tfrac12 & -\tfrac{\sqrt3}{2}
    \\ \tfrac{\sqrt3}{2} & \tfrac12\end{pmatrix}\begin{pmatrix}14 & 0 \\ 0 & 1\end{pmatrix}
    = \begin{pmatrix}7 & -\tfrac{\sqrt3}{2} \\ 7\sqrt3 & \tfrac12\end{pmatrix}$, so
    $2\mathbf{M} = \begin{pmatrix}14 & -\sqrt3 \\ 14\sqrt3 & 1\end{pmatrix}$ (AG).
  mark_scheme: []
  graphics: []
- number: 1b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'For $y = mx$: $7\sqrt3 x + \tfrac12 mx = m\left(7x - \tfrac{\sqrt3}{2}mx\right)$,
    giving $\sqrt3 m^2 - 13m + 14\sqrt3 = 0$, so $m = 2\sqrt3$ or $m = \tfrac{7}{\sqrt3}$.
    Invariant lines: $y = 2\sqrt3\,x$ and $y = \tfrac{7}{\sqrt3}x$.'
  mark_scheme: []
  graphics: []
- number: 1c
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: The required matrix is $\mathbf{M}^{-1} = \tfrac{1}{14}\begin{pmatrix}\tfrac12
    & \tfrac{\sqrt3}{2} \\ -7\sqrt3 & 7\end{pmatrix} = \tfrac12\begin{pmatrix}\tfrac{1}{14}
    & \tfrac{\sqrt3}{14} \\ -\sqrt3 & 1\end{pmatrix}$ (the inverse of $\mathbf{M}$).
  mark_scheme: []
  graphics: []
- number: '2'
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Base case $n=1$: $2025 + 47 - 2 = 2070 = 45\times46$, divisible
    by 46 âś“. Assume $2025^k + 47^k - 2$ is divisible by 46. Then $2025^{k+1} + 47^{k+1}
    - 2 = (2024+1)2025^k + (46+1)47^k - 2 = (2025^k + 47^k - 2) + 2024\times2025^k
    + 46\times47^k$, where $2024\times2025^k + 46\times47^k = 46(44\times2025^k +
    47^k)$ is divisible by 46. Hence by induction it is true for every positive integer
    $n$.'
  mark_scheme: []
  graphics: []
- number: 3a
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: '$(\alpha+\beta+\gamma+\delta)^2 = \sum\alpha^2 + 2\sum\alpha\beta$,
    with $\sum\alpha = 0$ and $\sum\alpha\beta = 7$: $0 = \sum\alpha^2 + 2(7)$, so
    $\alpha^2+\beta^2+\gamma^2+\delta^2 = -14$.'
  mark_scheme: []
  graphics: []
- number: 3b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Newton''s identity for the quartic ($S_1 = 0$, $S_2 = -14$):
    $S_4 + 7S_2 + 3S_1 + 88 = 0 \Rightarrow S_4 = -7(-14) - 88 = 10$. So $\alpha^4+\beta^4+\gamma^4+\delta^4
    = 10$.'
  mark_scheme: []
  graphics: []
- number: 3c
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: $(r+\alpha^2)^2 = r^2 + 2\alpha^2 r + \alpha^4$, so the sum
    $= \displaystyle\sum_{r=1}^{10}\left(4r^2 + 2(\textstyle\sum\alpha^2)r + \textstyle\sum\alpha^4\right)
    = \sum_{r=1}^{10}(4r^2 - 28r + 10) = 4\cdot\tfrac{10}{6}(11)(21) - 28\cdot\tfrac{10\cdot11}{2}
    + 10(10) = 1540 - 1540 + 100 = 100$.
  mark_scheme: []
