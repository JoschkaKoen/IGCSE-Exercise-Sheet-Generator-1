  mark_scheme_answer: 'Foot $\overrightarrow{OF} = \overrightarrow{OP} + t\,\mathbf{n}
    = (4+6t,\,2-t,\,9+8t)$. Substituting into $\Pi$: $6(4+6t) - (2-t) + 8(9+8t) =
    -7 \Rightarrow 101t + 94 = -7 \Rightarrow t = -1$. So $\overrightarrow{OF} = -2\mathbf{i}
    + 3\mathbf{j} + \mathbf{k}$.'
