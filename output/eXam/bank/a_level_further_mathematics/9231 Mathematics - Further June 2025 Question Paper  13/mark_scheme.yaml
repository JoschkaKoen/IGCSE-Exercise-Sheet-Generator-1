- number: 4b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: $\displaystyle\sum_{r=1}^n u_r = \tfrac{1}{10}\sum_{r=1}^n (w_{r+1}
    - w_r) = \tfrac{1}{10}(w_{n+1} - w_1) = \tfrac{1}{10}(n+1)(n+2)\ldots(n+10) -
    9!$ (since $w_1 = 10!$ and $\tfrac{10!}{10} = 9!$).
  mark_scheme: []
  graphics: []
- number: 4c
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: $v_1 + v_2 + \ldots + v_n = x^{w_{n+1}} - x^{w_1}$. For $-1
    < x < 1$, $x^{w_{n+1}}\to0$, so the sum to infinity is $-x^{w_1} = -x^{10!}$.
    For $x = \pm1$ every term is 0, so the sum to infinity is 0. Hence the series
    converges for $-1 \leqslant x \leqslant 1$.
  mark_scheme: []
  graphics: []
