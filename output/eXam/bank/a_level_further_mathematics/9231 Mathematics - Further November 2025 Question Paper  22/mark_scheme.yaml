- number: 3a
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Differentiating: $2xy + x^2 y'' + 3(x+y)^2(1 + y'') = 0$. At
    $(-1, 2)$ (so $x+y = 1$): $-4 + y'' + 3(1 + y'') = 0 \Rightarrow 4y'' = 1 \Rightarrow
    y'' = \tfrac14$.'
  mark_scheme: []
  graphics: []
- number: 3b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Differentiating again: $2y + 4xy'' + x^2 y'''' + 6(x+y)(1+y'')^2
    + 3(x+y)^2 y'''' = 0$. At $(-1, 2)$, $y'' = \tfrac14$: $4 - 1 + y'''' + 6\left(\tfrac54\right)^2
    + 3y'''' = 0 \Rightarrow \tfrac{99}{8} + 4y'''' = 0 \Rightarrow y'''' = -\tfrac{99}{32}$.'
  mark_scheme: []
  graphics: []
- number: 4a
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: $z + \tfrac1z = 2\cos\theta$ and $(z + \tfrac1z)^6 = (z^6+z^{-6})
    + 6(z^4+z^{-4}) + 15(z^2+z^{-2}) + 20 = 2\cos6\theta + 12\cos4\theta + 30\cos2\theta
    + 20$. So $64\cos^6\theta = 2\cos6\theta + 12\cos4\theta + 30\cos2\theta + 20$,
    giving $a = \tfrac{1}{32}$, $b = \tfrac{3}{16}$, $c = \tfrac{15}{32}$, $d = \tfrac{5}{16}$.
  mark_scheme: []
  graphics: []
- number: 4b
