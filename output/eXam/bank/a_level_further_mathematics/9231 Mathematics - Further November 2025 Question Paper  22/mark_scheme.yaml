- number: 8d
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: The characteristic equation is $\lambda^3 - 3\lambda^2 + 8\lambda
    = 0$, so by Cayley–Hamilton $\mathbf{A}^3 = 3\mathbf{A}^2 - 8\mathbf{A}$. Then
    $\mathbf{A}^4 = 3\mathbf{A}^3 - 8\mathbf{A}^2 = 3(3\mathbf{A}^2 - 8\mathbf{A})
    - 8\mathbf{A}^2 = \mathbf{A}^2 - 24\mathbf{A}$, so $p = 1$, $q = -24$.
  mark_scheme: []
  graphics: []
