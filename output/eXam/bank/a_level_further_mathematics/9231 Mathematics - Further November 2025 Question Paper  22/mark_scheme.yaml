  mark_scheme_answer: $r = e^{\theta/4}$, $\dfrac{dr}{d\theta} = \tfrac14 e^{\theta/4}$,
    so $r^2 + \left(\tfrac{dr}{d\theta}\right)^2 = \tfrac{17}{16}e^{\theta/2}$. $L
    = \displaystyle\int_0^{\pi}\tfrac{\sqrt{17}}{4}e^{\theta/4}\,d\theta = \sqrt{17}\left(e^{\pi/4}
    - 1\right)$.
  mark_scheme: []
