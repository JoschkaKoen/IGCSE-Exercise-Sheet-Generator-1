- number: 5a
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: Auxiliary equation $m^2 + 4m + 3 = 0 \Rightarrow m = -1, -3$;
    CF $= Ae^{-x} + Be^{-3x}$. Particular integral $y = \tfrac12\cos x + \sin x$.
    General solution $y = Ae^{-x} + Be^{-3x} + \tfrac12\cos x + \sin x$.
  mark_scheme: []
  graphics: []
- number: 5b
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: As $x \to \infty$, $Ae^{-x}, Be^{-3x} \to 0$, so $y \approx
    \tfrac12\cos x + \sin x = R\sin(x + \phi)$ with $R = \tfrac{\sqrt5}{2}$ and $\phi
    = \tan^{-1}\tfrac12 = 0.4636$.
  mark_scheme: []
  graphics: []
