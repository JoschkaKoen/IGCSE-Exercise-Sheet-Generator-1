  mark_scheme_answer: $x = \tfrac{1}{\sqrt2}\sinh u \Rightarrow 2x^2 + 1 = \cosh^2
    u$, $dx = \tfrac{1}{\sqrt2}\cosh u\,du$, so the integral $= \displaystyle\int
    \tfrac{1}{\sqrt2}\,du = \tfrac{1}{\sqrt2}\sinh^{-1}(\sqrt2\,x) + C$.
  mark_scheme: []
