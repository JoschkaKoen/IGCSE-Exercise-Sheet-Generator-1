- number: 6b
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: $\sum_{r=1}^{n}\tfrac{1}{\sqrt{2r^2+n^2}} = \sum_{r=1}^{n}\tfrac1n\,y\!\left(\tfrac
    rn\right)$ is the right-endpoint Riemann sum; since $y$ is decreasing it underestimates
    $\int_0^1 y\,dx = \tfrac{1}{\sqrt2}\sinh^{-1}\sqrt2 = \tfrac{\sqrt2}{2}\ln(\sqrt2+\sqrt3)$.
    Hence the sum $< \tfrac12\sqrt2\,\ln(\sqrt2+\sqrt3)$.
  mark_scheme: []
  graphics: []
- number: 6c
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: Since $y$ decreases, $\tfrac1n y\!\left(\tfrac rn\right) \geqslant
    \int_{r/n}^{(r+1)/n} y\,dx$; summing gives the lower bound $\displaystyle\int_{1/n}^{(n+1)/n}
    y\,dx = \tfrac{\sqrt2}{2}\left[\sinh^{-1}\!\tfrac{\sqrt2(n+1)}{n} - \sinh^{-1}\!\tfrac{\sqrt2}{n}\right]$.
  mark_scheme: []
  graphics: []
- number: 6d
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: Both bounds tend to $\int_0^1 y\,dx$, so $\displaystyle\lim_{n\to\infty}\sum_{r=1}^{n}\tfrac{1}{\sqrt{2r^2+n^2}}
    = \tfrac{\sqrt2}{2}\ln(\sqrt2 + \sqrt3)$.
  mark_scheme: []
  graphics: []
- number: 7a
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: Differentiating gives $\tfrac12\sqrt{4-x^2} - \tfrac{x^2}{2\sqrt{4-x^2}}
    + \tfrac{2}{\sqrt{4-x^2}} = \tfrac{(4-x^2) - x^2 + 4}{2\sqrt{4-x^2}} = \tfrac{4-x^2}{\sqrt{4-x^2}}
    = \sqrt{4-x^2}$. AG.
  mark_scheme: []
  graphics: []
- number: 7b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Integrating factor $\sqrt{2+x}$: $\tfrac{d}{dx}\!\left(y\sqrt{2+x}\right)
    = \sqrt{(2+x)(2-x)} = \sqrt{4-x^2}$. So $y\sqrt{2+x} = \tfrac12 x\sqrt{4-x^2}
    + 2\sin^{-1}\tfrac x2 + C$ (part (a)). At $x=1$, $y=\tfrac12$: $C = -\tfrac\pi3$.
    Hence $y = \dfrac{\tfrac12 x\sqrt{4-x^2} + 2\sin^{-1}\tfrac x2 - \tfrac\pi3}{\sqrt{2+x}}$.'
  mark_scheme: []
  graphics: []
- number: 8a
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: $\det\begin{pmatrix}1&-1&2k\\k&1&2\\2&-1&1\end{pmatrix} = -2k^2
    - 3k - 1 = 0 \Rightarrow 2k^2 + 3k + 1 = 0 \Rightarrow k = -\tfrac12$ or $k =
    -1$.
  mark_scheme: []
  graphics: []
- number: 8b
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: With $k = -\tfrac12$, eliminating variables leads to $0 = 2$,
    a contradiction, so the system is inconsistent. Geometrically the three planes
    have no common point — they form a triangular prism (their pairwise lines of intersection
    are parallel).
  mark_scheme: []
  graphics: []
- number: 8c
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'With $k = -1$, equations 1 and 2 reduce to $x - y - 2z = 1$
    and $x - y - 2z = -2$: these are parallel, distinct planes, so there is no common
    point and the system is inconsistent.'
  mark_scheme: []
