  mark_scheme_answer: With $\theta = 2x$, integrating over $[0, \tfrac\pi2]$ all the
    cosine terms vanish, leaving $\displaystyle\int_0^{\pi/2}\cos^6 2x\,dx = \tfrac{5}{16}\cdot\tfrac\pi2
