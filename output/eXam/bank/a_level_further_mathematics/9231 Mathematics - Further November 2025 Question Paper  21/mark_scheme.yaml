  mark_scheme_answer: '$I_{-1} = \left[\tan^{-1}x\right]_0^1 = \tfrac14\pi$. Applying
    the reduction formula with $n = -1$: $-I_{-1} = \tfrac12 - 2I_{-2}$, so $-\tfrac14\pi
    = \tfrac12 - 2I_{-2}$, giving $I_{-2} = \tfrac14 + \tfrac18\pi$.'
  mark_scheme: []
