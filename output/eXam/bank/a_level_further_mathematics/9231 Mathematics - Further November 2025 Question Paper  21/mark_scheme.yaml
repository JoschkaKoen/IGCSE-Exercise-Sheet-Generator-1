- number: 2b
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: $\dfrac{d}{dt}\left(\dfrac{1+\sinh t}{\cosh t}\right) = \dfrac{\cosh
    t(\cosh t) - (1+\sinh t)\sinh t}{\cosh^2 t} = \dfrac{1 - \sinh t}{\cosh^2 t}$.
    Then $\dfrac{d^2y}{dx^2} = \dfrac{d}{dt}\!\left(\dfrac{dy}{dx}\right)\dfrac{dt}{dx}
    = \dfrac{1 - \sinh t}{\cosh^2 t}\cdot\dfrac{1}{\cosh t} = \dfrac{1 - \sinh t}{\cosh^3
    t}$ (AG).
  mark_scheme: []
  graphics: []
- number: 2c
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'At $t = 0$: $x = \sinh 0 = 0$, $y = 0 + \cosh 0 = 1$, $y''(0)
    = \dfrac{1+0}{1} = 1$, $y''''(0) = \dfrac{1-0}{1} = 1$. So $y = y(0) + xy''(0)
    + \tfrac{x^2}{2!}y''''(0) = 1 + x + \tfrac12 x^2$.'
  mark_scheme: []
  graphics: []
- number: 3a
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: '$\dfrac{d}{dx}\left(x(1+x^2)^n\right) = 2nx^2(1+x^2)^{n-1}
    + (1+x^2)^n$. Using $x^2 = (1+x^2) - 1$: $= 2n(1+x^2)^n - 2n(1+x^2)^{n-1} + (1+x^2)^n$.
    Integrating from 0 to 1: $\left[x(1+x^2)^n\right]_0^1 = 2nI_n - 2nI_{n-1} + I_n$,
    i.e. $2^n = (2n+1)I_n - 2nI_{n-1}$, so $(2n+1)I_n = 2^n + 2nI_{n-1}$ (AG).'
  mark_scheme: []
  graphics: []
- number: 3b
