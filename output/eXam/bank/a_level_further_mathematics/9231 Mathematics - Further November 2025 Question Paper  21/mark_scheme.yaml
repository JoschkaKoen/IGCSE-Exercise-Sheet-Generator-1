- number: '4'
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Auxiliary equation $5m^2 + 2m + 1 = 0 \Rightarrow m = -\tfrac15
    \pm \tfrac25\mathrm{i}$, so CF $= \mathrm{e}^{-\frac15 x}\left(A\cos\tfrac25 x
    + B\sin\tfrac25 x\right)$. PI $y = px^2 + qx + r$ gives $p = 1$, $q = 1$, $r =
    -9$. General solution $y = \mathrm{e}^{-\frac15 x}\left(A\cos\tfrac25 x + B\sin\tfrac25
    x\right) + x^2 + x - 9$. Initial conditions: $A - 9 = 0$ and $\tfrac25 B - \tfrac15
    A + 1 = 0 \Rightarrow A = 9$, $B = 2$. So $y = \mathrm{e}^{-\frac15 x}\left(9\cos\tfrac25
    x + 2\sin\tfrac25 x\right) + x^2 + x - 9$.'
  mark_scheme: []
  graphics: []
- number: 5a
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: Right-endpoint rectangle sum $= \displaystyle\sum_{k=1}^n \tfrac1n\left(\tfrac13\left(\tfrac{k}{n}\right)^3
    + \tfrac{k}{n}\right) = \tfrac{1}{3n^4}\cdot\tfrac{n^2(n+1)^2}{4} + \tfrac{1}{n^2}\cdot\tfrac{n(n+1)}{2}
    = \tfrac{1}{12}\left(1+\tfrac1n\right)^2 + \tfrac12\left(1+\tfrac1n\right) = \tfrac{1}{12}\left(1+\tfrac1n\right)\left(7+\tfrac1n\right)$.
    Since the curve is increasing, the integral $<$ this sum $= U_n$ (AG).
  mark_scheme: []
  graphics: []
- number: 5b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: Using left-endpoint rectangles, $L_n = \tfrac{1}{12}\left(1-\tfrac1n\right)^2
    + \tfrac12\left(1-\tfrac1n\right) = \tfrac{1}{12}\left(1-\tfrac1n\right)\left(7-\tfrac1n\right)$
    (equivalently $L_n = U_n - \tfrac{4}{3n}$).
  mark_scheme: []
  graphics: []
- number: 5c
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: $U_n - L_n = \tfrac{1}{12}\left[\left(1+\tfrac1n\right)\left(7+\tfrac1n\right)
    - \left(1-\tfrac1n\right)\left(7-\tfrac1n\right)\right] = \tfrac{1}{12}\cdot\tfrac{16}{n}
    = \tfrac{4}{3n} \to 0$ as $n\to\infty$.
  mark_scheme: []
