- number: 7a
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Using $\tanh^{-1}x = \tfrac12\ln\!\left(\dfrac{1+x}{1-x}\right)$:
    $\dfrac{d}{dx}\left(\tanh^{-1}x\right) = \tfrac12\cdot\dfrac{1-x}{1+x}\cdot\dfrac{(1-x)(1)
    - (1+x)(-1)}{(1-x)^2} = \tfrac12\cdot\dfrac{1-x}{1+x}\cdot\dfrac{2}{(1-x)^2} =
    \dfrac{1}{1-x^2}$ (AG). (Alternatively $\tanh y = x \Rightarrow \mathrm{sech}^2
    y\,\tfrac{dy}{dx} = 1 \Rightarrow \tfrac{dy}{dx} = \tfrac{1}{1-\tanh^2 y} = \tfrac{1}{1-x^2}$.)'
  mark_scheme: []
  graphics: []
- number: 7b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: '$\dfrac{dy}{dx} - \dfrac{y}{x} = x\tanh^{-1}x$; integrating
    factor $\mathrm{e}^{-\int x^{-1}dx} = x^{-1}$, so $\dfrac{d}{dx}(x^{-1}y) = \tanh^{-1}x$.
    Then $x^{-1}y = x\tanh^{-1}x - \displaystyle\int\dfrac{x}{1-x^2}\,dx = x\tanh^{-1}x
    + \tfrac12\ln(1-x^2) + C$. Using $y=0$ at $x=\tfrac12$: $C = -\tfrac14\ln\tfrac{27}{16}$.
    So $x^{-1}y = x\tanh^{-1}x + \tfrac12\ln(1-x^2) - \tfrac14\ln\tfrac{27}{16}$ (i.e.
    $y = x\left(x\tanh^{-1}x + \tfrac12\ln(1-x^2) - \tfrac14\ln\tfrac{27}{16}\right)$).'
  mark_scheme: []
  graphics: []
