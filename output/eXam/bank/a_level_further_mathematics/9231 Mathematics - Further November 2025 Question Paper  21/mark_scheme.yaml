- number: 8b
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: With $z = \tfrac12\mathrm{e}^{\mathrm{i}\theta}$, $\displaystyle\sum_{m=1}^n\left(\tfrac12\right)^m\mathrm{e}^{\mathrm{i}m\theta}
    = \dfrac{z^{n+1}-z}{z-1}$. Multiplying numerator and denominator by the conjugate
    of $z-1$ and taking the imaginary part (using $\sin(A-B)$) gives $\displaystyle\sum_{m=1}^n\left(\tfrac12\right)^m\sin
    m\theta = \dfrac{\left(\tfrac12\right)^{n+2}\sin n\theta - \left(\tfrac12\right)^{n+1}\sin(n+1)\theta
    + \tfrac12\sin\theta}{\tfrac54 - \cos\theta}$ (AG).
  mark_scheme: []
  graphics: []
- number: 8c
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: '$\displaystyle\sum_{m=1}^n\left(\tfrac12\right)^m m\cos m\theta
    = \dfrac{d}{d\theta}\left[\sum_{m=1}^n\left(\tfrac12\right)^m\sin m\theta\right]$.
    Differentiating the result in (b) by the quotient rule: $= \dfrac{\left(\tfrac54-\cos\theta\right)\left(\left(\tfrac12\right)^{n+2}n\cos
    n\theta - \left(\tfrac12\right)^{n+1}(n+1)\cos(n+1)\theta + \tfrac12\cos\theta\right)
    - \left(\left(\tfrac12\right)^{n+2}\sin n\theta - \left(\tfrac12\right)^{n+1}\sin(n+1)\theta
    + \tfrac12\sin\theta\right)\sin\theta}{\left(\tfrac54-\cos\theta\right)^2}$.'
  mark_scheme: []
  graphics: []
- number: 8d
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: As $n\to\infty$ the $\left(\tfrac12\right)^{n+\ldots}$ terms
    vanish, so $\displaystyle\sum_{m=1}^\infty\left(\tfrac12\right)^m m\cos m\theta
    = \dfrac{\left(\tfrac54-\cos\theta\right)\left(\tfrac12\cos\theta\right) - \left(\tfrac12\sin\theta\right)\sin\theta}{\left(\tfrac54-\cos\theta\right)^2}
    = \dfrac{\tfrac58\cos\theta - \tfrac12}{\left(\tfrac54-\cos\theta\right)^2}$.
  mark_scheme: []
  graphics: []
