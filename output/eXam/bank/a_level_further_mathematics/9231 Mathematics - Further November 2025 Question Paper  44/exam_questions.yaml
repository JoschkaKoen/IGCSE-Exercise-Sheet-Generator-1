- number: '3'
  question_type: calculation
  page: 6
  subpage_row: 1
  subpage_col: 1
  marks: 0
  text: 'Two different types of juice extractor, machine $X$ and machine $Y$, are
    being compared. The manufacturer claims that machine $Y$ extracts more juice per
    orange on average than machine $X$. A random sample of 20 oranges is selected,
    paired by similar size and mass and numbered 1 to 10; one orange from each pair
    is randomly allocated to machine $X$ and the other to machine $Y$. The amount
    of juice, in ml, extracted is recorded (pairs 1--10): machine $X$: 65, 73, 58,
    61, 72, 79, 64, 65, 69, 71; machine $Y$: 68, 72, 64, 63, 75, 82, 63, 63, 72, 74.'
  answer_options: []
  subquestions:
  - number: 3a
    question_type: calculation
    page: 6
    subpage_row: 1
    subpage_col: 1
    marks: 7
    text: Use a $t$-test to test the manufacturer's claim at the 1\% significance
      level.
    answer_options: []
    subquestions: []
  - number: 3b
    question_type: short_answer
    page: 7
    subpage_row: 1
    subpage_col: 1
    marks: 1
    text: State an assumption required for the test in part (a) to be valid.
    answer_options: []
    subquestions: []
  - number: 3c
    question_type: calculation
    page: 7
    subpage_row: 1
    subpage_col: 1
    marks: 2
    text: The manufacturer notices that the amount of juice extracted from the oranges
      in pair 4 were recorded incorrectly. In fact, the amount of juice extracted
      from machine $X$ was 60 ml and from machine $Y$ was 62 ml. Explain, with justification,
      whether the conclusion of the test in part (a) remains the same.
    answer_options: []
    subquestions: []
