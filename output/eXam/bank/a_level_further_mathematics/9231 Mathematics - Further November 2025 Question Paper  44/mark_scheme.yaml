  mark_scheme_answer: '$\mathrm{E}(X) = \tfrac85$, $\mathrm{E}(X^2) = \tfrac{14}5$,
    so $\mathrm{Var}(X) = \tfrac{14}5 - \left(\tfrac85\right)^2 = \tfrac{6}{25}$.
    Hence $\mathrm{Var}(Y) = 4\,\mathrm{Var}(X) = \tfrac{24}{25} = 0.96$. (Via the
    PGF: $\mathrm{G}_Y''(1) = \tfrac{32}5 = 6.4$, $\mathrm{G}_Y''''(1) = \tfrac{888}{25}
    = 35.52$, $\mathrm{Var}(Y) = \tfrac{888}{25} + \tfrac{32}5 - \left(\tfrac{32}5\right)^2
    = \tfrac{24}{25}$.)'
  mark_scheme: []
