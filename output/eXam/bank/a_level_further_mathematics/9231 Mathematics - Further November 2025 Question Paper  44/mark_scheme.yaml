- number: '5'
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: '$H_0$: performance is independent of age; $H_1$: performance
    is not independent of age. Expected frequencies: pass $27.93, 44.69, 8.38$; fail
    $22.07, 35.31, 6.62$. $\chi^2 = \dfrac{(34-27.93)^2}{27.93} + \cdots + \dfrac{(9-6.62)^2}{6.62}
    = 5.21$. With $(2-1)(3-1) = 2$ degrees of freedom, the critical value is $\chi^2_{0.90}(2)
    = 4.605$. Since $5.21 > 4.605$, reject $H_0$: there is sufficient evidence that
    performance and age are not independent (i.e. they are associated).'
  mark_scheme: []
  graphics: []
- number: 6a
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: '$H_0$: the population median mark for school $A$ equals that
    for school $B$; $H_1$: they are not equal. Mean $= \tfrac12\cdot123\cdot(123+147+1)
    = 16666.5$; variance $= \tfrac{1}{12}\cdot123\cdot147\cdot(123+147+1) = 408329.25$.
    With continuity correction, $z = \dfrac{15355 + 0.5 - 16666.5}{\sqrt{408329.25}}
    = -2.05$. Two-tailed 5\% test: since $-2.05 < -1.96$, reject $H_0$: there is sufficient
    evidence of a difference in average marks between the students in school $A$ and
    school $B$.'
  mark_scheme: []
