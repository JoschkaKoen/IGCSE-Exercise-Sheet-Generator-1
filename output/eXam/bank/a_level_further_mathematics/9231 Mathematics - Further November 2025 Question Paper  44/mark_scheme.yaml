- number: 3a
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: '$H_0$: $\mu_Y = \mu_X$; $H_1$: $\mu_Y > \mu_X$ (population
    means). Differences ($Y - X$): $3, -1, 6, 2, 3, 3, -1, -2, 3, 3$; $\sum d = 19$,
    $s_d^2 = \tfrac19\left(91 - \tfrac{19^2}{10}\right) = 6.1$. $t = \dfrac{19/10}{\sqrt{6.1/10}}
    = 2.43$. With 9 d.f., critical $t = 2.821$. Since $2.43 < 2.821$, do not reject
    $H_0$: there is insufficient evidence to support the manufacturer''s claim (that
    machine $Y$ extracts more juice on average).'
  mark_scheme: []
