    question_type: calculation
    page: 12
    subpage_row: 1
    subpage_col: 1
    marks: 6
    text: Sphere $B$ then collides with a fixed vertical barrier. Immediately before
      the collision, the direction of motion of $B$ makes an angle $\alpha$ with the
      barrier. Immediately after the collision, the direction of motion of $B$ makes
      an angle $\beta$ with the barrier. The coefficient of restitution between $B$
      and the barrier is $\tfrac45$. As a result of the collision, the velocity of
      $B$ is reduced to $\tfrac{12}{25}\sqrt5\,u$. Find the value of $\sin(\alpha
      + \beta)$.
    answer_options: []
