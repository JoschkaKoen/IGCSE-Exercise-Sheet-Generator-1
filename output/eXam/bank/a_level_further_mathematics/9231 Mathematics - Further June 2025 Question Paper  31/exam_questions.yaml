  text: A particle $P$ of mass 8 kg is moving in a straight horizontal line. At time
    $t$ s, $P$ has displacement $x$ m from a fixed point $O$ on the line and velocity
    $v\text{ m s}^{-1}$. The only horizontal force acting on $P$ has magnitude $(x^3
    + 4x)$ N and acts in the direction $OP$. When $t = 0$, $x = 0$ and $v = 1$.
  answer_options: []
  subquestions:
  - number: 1a
    question_type: calculation
    page: 3
    subpage_row: 1
    subpage_col: 1
    marks: 3
    text: Find an expression for $v$ in terms of $x$, giving your answer in the form
      $v = ax^2 + b$, where $a$ and $b$ are constants to be determined.
    answer_options: []
    subquestions: []
  - number: 1b
    question_type: calculation
    page: 3
    subpage_row: 1
    subpage_col: 1
    marks: 2
    text: Find an expression for $x$ in terms of $t$.
    answer_options: []
    subquestions: []
