    $u$, and sphere $B$ is stationary. Sphere $A$ collides directly with $B$, and
    they both then move in the same direction with speeds $v_A$ and $v_B$ respectively.
    After the collision, the kinetic energy of $B$ is $\tfrac92$ times the kinetic
    energy of $A$.
