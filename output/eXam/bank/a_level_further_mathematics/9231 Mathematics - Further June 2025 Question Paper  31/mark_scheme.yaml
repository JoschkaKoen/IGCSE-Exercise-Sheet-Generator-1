- number: '5'
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'At $v_{\max}$ (zero acceleration): $T = 2g\sin\alpha = \tfrac{14}{25}g$
    ($\sin\alpha = \tfrac{7}{25}$). $\dfrac{14x}{0.5} = \tfrac{14}{25}g$ gives extension
    $x = \tfrac15$. Energy from start ($AP = 0.8$, at rest, extension $0.3$) to max-velocity
    point ($AP = 0.7$ below $A$, extension $0.2$), a slope distance of $1.5$ m: $2g\sin\alpha(0.8
    + 0.5 + 0.2) + \dfrac{14(0.3)^2}{2(0.5)} = \dfrac{14(0.2)^2}{2(0.5)} + \tfrac12(2)v^2$.
    So $v^2 = 0.91g = 9.1$, giving $v = 3.02\text{ m s}^{-1}$.'
  mark_scheme: []
  graphics: []
- number: 6a
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'KE condition: $\tfrac92\cdot\tfrac12(2m)v_A^2 = \tfrac12 m
    v_B^2$, so $v_B = 3v_A$. Conservation of momentum: $2mu = 2m v_A + m v_B$, i.e.
    $2u = 2v_A + v_B$. With $v_B = 3v_A$: $v_A = \tfrac25 u$, $v_B = \tfrac65 u$ (AG).'
  mark_scheme: []
  graphics: []
- number: 6b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Let $w = \tfrac{12}{25}\sqrt5\,u$ be the speed after the collision.
    Parallel to wall (unchanged): $v_B\cos\alpha = w\cos\beta$, i.e. $\sqrt5\cos\alpha
    = 2\cos\beta$. Perpendicular to wall (restitution): $e\,v_B\sin\alpha = w\sin\beta$,
    i.e. $2\sin\alpha = \sqrt5\sin\beta$. Squaring and using $\sin^2 + \cos^2 = 1$:
    $\tfrac{576}{625}\sin^2\alpha + \tfrac{36}{25}(1 - \sin^2\alpha) = \tfrac{144}{125}$,
    giving $\sin^2\alpha = \tfrac59$, so $\sin\alpha = \tfrac13\sqrt5$, $\cos\alpha
    = \tfrac23$, $\sin\beta = \tfrac23$, $\cos\beta = \tfrac13\sqrt5$. Hence $\sin(\alpha
    + \beta) = \sin\alpha\cos\beta + \cos\alpha\sin\beta = \tfrac59 + \tfrac49 = 1$.'
  mark_scheme: []
  graphics: []
- number: 7a
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'At $A$ (centripetal horizontal): $R_A = \dfrac{mu^2}{a}$. At
    $B$: $R_B = \dfrac{mv^2}{a} - mg\cos\theta$, with $\cos\theta = k$. Energy $A$
    to $B$ (rise $ka$): $v^2 = u^2 - 2agk$. Using $R_B = \tfrac12 R_A$: $\dfrac{mv^2}{a}
    - mgk = \tfrac12\dfrac{mu^2}{a}$, so $v^2 = \tfrac12 u^2 + agk$. Equating: $\tfrac12
    u^2 + agk = u^2 - 2agk \Rightarrow u^2 = 6agk$. With $u^2 = \tfrac65 ga$: $k =
    \tfrac15$.'
  mark_scheme: []
  graphics: []
- number: 7b
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Just reaches $B$ means $R_B = 0$: $\dfrac{mv^2}{a} = mgk \Rightarrow
    v^2 = agk$, and $u^2 = v^2 + 2agk = 3agk = \tfrac35 ag$ (with $k = \tfrac15$).
    So $u = \sqrt{\tfrac35 ag}$.'
  mark_scheme: []
  graphics: []
- number: 7c
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: At $B$ the particle leaves the surface and travels as a projectile
    to $C$ (same height, horizontal separation $2a\sin\theta$). Time of flight $t
    = \dfrac{2v\sin\theta}{g}$; horizontally $2a\sin\theta = v\cos\theta\cdot t =
    \dfrac{2v^2\sin\theta\cos\theta}{g}$, so $v^2 = \dfrac{ag}{\cos\theta} = 5ag$
    (with $\cos\theta = k = \tfrac15$). Then $u^2 = v^2 + 2agk = 5ag + \tfrac25 ag
    = \tfrac{27}{5}ag$, so $u = \sqrt{\tfrac{27}{5}ag}$.
  mark_scheme: []
  graphics: []
