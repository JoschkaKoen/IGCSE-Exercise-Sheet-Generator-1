questions:
- number: 1a
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'N2L: $x^3 + 4x = 8v\dfrac{dv}{dx}$. Separating: $\displaystyle\int(x^3
    + 4x)\,dx = \int 8v\,dv$, so $\tfrac14 x^4 + 2x^2 + c = 4v^2$. At $x=0$, $v=1$:
    $c = -4$. Hence $v^2 = \tfrac{1}{16}x^4 + \tfrac12 x^2 + 1 = \left(\tfrac14 x^2
    + 1\right)^2$, so $v = \tfrac14 x^2 + 1$ ($a = \tfrac14$, $b = 1$).'
  mark_scheme: []
  graphics: []
- number: 1b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: '$\dfrac{dx}{dt} = \tfrac14 x^2 + 1$, so $\displaystyle\int\dfrac{1}{\tfrac14
    x^2 + 1}\,dx = \int dt$, giving $t = 4\int\dfrac{1}{x^2 + 4}\,dx = 2\tan^{-1}\!\left(\tfrac12
    x\right) + C$. At $t=0$, $x=0$: $C=0$. So $x = 2\tan\!\left(\tfrac12 t\right)$.'
  mark_scheme: []
  graphics: []
- number: 2a
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Using the trajectory equation with $(35, 10)$, $u = 24$, $g
    = 10$: $10 = 35t - \dfrac{g}{2\cdot24^2}\cdot35^2(1 + t^2)$ where $t = \tan\theta$,
    giving $6125t^2 - 20160t + 11885 = 0$ (OE $1225t^2 - 4032t + 2377 = 0$). So $\tan\theta
    = 0.769$ ($\theta = 37.6\degree$) or $\tan\theta = 2.52$ ($\theta = 68.4\degree$).'
  mark_scheme: []
  graphics: []
- number: 2b
