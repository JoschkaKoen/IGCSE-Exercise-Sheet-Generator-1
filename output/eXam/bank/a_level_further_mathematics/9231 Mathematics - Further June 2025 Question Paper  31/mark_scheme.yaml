- number: 3b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Vertically ($\uparrow$): $R = 1.6g - 8\cos\alpha$ ($\cos\alpha
    = 0.8$). Horizontally (centripetal, friction inward as $P$ is on the point of
    slipping outward): $1.6\cdot1.5\,\omega^2 = 8\sin\alpha + \mu R$. Substituting:
    $2.4\omega^2 = 8(0.6) + 0.5(1.6g - 8(0.8)) = 9.6$, so $\omega^2 = 4$, $\omega
    = 2$. Revolutions per minute $= \dfrac{\omega}{2\pi}\times60 = \dfrac{60}{\pi}
    = 19.1$.'
  mark_scheme: []
  graphics: []
- number: 4a
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Cone: height $= 6r$ (since $\tan\theta = \tfrac{3r}{H} = \tfrac12$),
    volume $18\pi r^3$, CoM $\tfrac32 r$ above base. Hemisphere: volume $\tfrac{16}{3}\pi
    r^3$, CoM $\tfrac34 r$ above base. Object: volume $18\pi r^3 - \tfrac{16}{3}\pi
    r^3 = \tfrac{38}{3}\pi r^3$. Moments: $\left(\tfrac{38}{3}\pi r^3\right)\bar y
    = 18\pi r^3\left(\tfrac32 r\right) - \tfrac{16}{3}\pi r^3\left(\tfrac34 r\right)$,
    giving $\bar y = \dfrac{69}{38}r$.'
  mark_scheme: []
  graphics: []
