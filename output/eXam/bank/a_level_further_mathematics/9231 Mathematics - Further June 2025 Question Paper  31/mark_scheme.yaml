  mark_scheme_answer: 'Using the trajectory with $y = 0$ and the larger value of $\theta$
    ($68.4\degree$): $0 = x\tan\theta - \dfrac{g}{2\cdot24^2}x^2(1 + \tan^2\theta)$,
    giving range $x = 39.5$ m (accept $39.4 \leqslant x \leqslant 39.5$). This is
    the minimum landing distance.'
