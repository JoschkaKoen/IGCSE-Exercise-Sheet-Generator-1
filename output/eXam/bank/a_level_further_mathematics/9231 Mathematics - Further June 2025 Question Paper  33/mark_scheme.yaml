- number: '4'
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Lamina (mass $m$): rectangle area $2a^2$, distance $\tfrac12
    a$ to the left of $D$; triangle area $a^2$, distance $\tfrac23 a$ to the right
    of $D$. Moments give the lamina''s centre of mass $\tfrac19 a$ to the left of
    $D$. On the point of toppling about $D$, the particle''s moment balances the lamina''s:
    $m\left(\tfrac19 a\right) = km(2a)$, so $k = \tfrac{1}{18}$.'
  mark_scheme: []
  graphics: []
- number: 5a
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Energy $A$ to $B$ (rise $r\cos\alpha$): $\tfrac12 mv^2 + mgr\cos\alpha
    = \tfrac12 m\left(\tfrac32 gr\right)$, so $v^2 = \tfrac32 gr - 2gr\cos\alpha$.
    Loses contact at $B$ ($R = 0$): $mg\cos\alpha = \dfrac{mv^2}{r}$. Combining: $g\cos\alpha
    = \tfrac32 g - 2g\cos\alpha$, so $\cos\alpha = \tfrac12$, $\alpha = 60\degree$.'
  mark_scheme: []
  graphics: []
- number: 5b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: At $B$, $v^2 = \tfrac12 gr$ (with $\alpha = 60\degree$). As
    a projectile, the rise above $B$ is $h$ where $0 = (v\sin 60\degree)^2 - 2gh$,
    giving $h = \tfrac{3}{16}r$. Greatest height above $O$ $= \tfrac{3}{16}r + r\cos
    60\degree = \tfrac{3}{16}r + \tfrac12 r = \tfrac{11}{16}r$.
  mark_scheme: []
  graphics: []
- number: 6a
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Let $v$, $w$ be the components of $A$, $B$ along the line of
    centres after the collision. Momentum: $2mu\cos\theta - mu\cos\theta = mv + mw$.
    Restitution: $w - v = e(3u\cos\theta)$. Solving: $w = \tfrac12(3e + 1)u\cos\theta$.
    As $B$ moves perpendicular to its initial direction, $\dfrac{\frac12(3e+1)u\cos\theta}{u\sin\theta}
    = \tan\theta$, giving $\tan^2\theta = \tfrac12(3e + 1)$, so $\tan\theta = \sqrt{\tfrac12(3e
    + 1)}$.'
  mark_scheme: []
  graphics: []
- number: 6b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: $A$ moves perpendicular to the line of centres, so $v = 0$.
    With $v = \tfrac12(1 - 3e)u\cos\theta = 0$, $e = \tfrac13$. Then $\tan^2\theta
    = \tfrac12(3\cdot\tfrac13 + 1) = 1$, so $\tan\theta = 1$ and $\theta = 45\degree$.
  mark_scheme: []
  graphics: []
