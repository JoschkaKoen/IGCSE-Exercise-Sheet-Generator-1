- number: 2a
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Energy equation (down a distance $x$, at rest): $\dfrac{mg}{2a}(x-a)^2
    = mgx\sin 30\degree - \tfrac{11}{30}mgx$. Simplifying: $15x^2 - 34ax + 15a^2 =
    0$, i.e. $(3x - 5a)(5x - 3a) = 0$. So $x = \tfrac53 a$ (rejecting $x = \tfrac35
    a$).'
  mark_scheme: []
  graphics: []
- number: 2b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'At $x = \tfrac53 a$, tension $T = \dfrac{mg(x-a)}{a} = \dfrac{mg(\frac23
    a)}{a} = \tfrac23 mg$. For equilibrium: $F = T - mg\sin 30\degree = \tfrac23 mg
    - \tfrac12 mg = \tfrac16 mg$.'
  mark_scheme: []
  graphics: []
- number: 3a
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Moving up: $-mg - mkv^2 = mv\dfrac{dv}{dx}$, so $\displaystyle\int
    dx = -\int\dfrac{v}{g + kv^2}\,dv$, giving $x = -\dfrac{1}{2k}\ln(g + kv^2) +
    c$. At $x = 0$, $v = U$: $c = \dfrac{1}{2k}\ln(g + kU^2)$. Hence $x = \dfrac{1}{2k}\ln\!\left(\dfrac{g
    + kU^2}{g + kv^2}\right)$ (AG).'
  mark_scheme: []
  graphics: []
- number: 3b
  question_type: calculation
