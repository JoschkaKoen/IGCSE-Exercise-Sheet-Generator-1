  mark_scheme_answer: $T\cos\theta = mg$ and $T\sin\theta = m\omega^2 r$, with $r
    = a\sin\theta$. So $T = \tfrac53 mg$ ($\cos\theta = \tfrac35$), and $\tfrac53
    mg\sin\theta = m\omega^2 a\sin\theta$, giving $\omega^2 = \dfrac{5g}{3a}$, i.e.
    $\omega = \sqrt{\dfrac{5g}{3a}}$.
