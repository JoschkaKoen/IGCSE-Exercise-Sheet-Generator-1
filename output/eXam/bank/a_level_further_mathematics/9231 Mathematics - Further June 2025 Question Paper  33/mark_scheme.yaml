- number: 7c
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: '$D = \dfrac{U}{\sqrt2}T$ and $H = \left|\dfrac{U}{\sqrt2}T
    - \tfrac12 gT^2\right|$. Forming the ratio (substituting $T$): $\dfrac{H}{D} =
    \left|\dfrac{1 - \sqrt3}{2}\right|$, so $H : D = 1 : 1 + \sqrt3$ (equivalently
    $\sqrt3 - 1 : 2$).'
  mark_scheme: []
