- number: 7b
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'At $T$: $\dfrac{v_y}{v_x} = -\tan 60\degree$, so $\dfrac{\frac{U}{\sqrt2}
    - gT}{\frac{U}{\sqrt2}} = -\sqrt3$, giving $U - \sqrt2\,gT = -\sqrt3\,U$, i.e.
    $T = \dfrac{U}{\sqrt2\,g}(1 + \sqrt3) = \dfrac{U}{2g}(\sqrt2 + \sqrt6)$ (AG).'
  mark_scheme: []
