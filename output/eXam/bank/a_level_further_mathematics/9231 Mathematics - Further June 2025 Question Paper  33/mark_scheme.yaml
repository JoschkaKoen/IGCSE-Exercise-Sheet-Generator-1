  explanation: null
  mark_scheme_answer: 'Moving up: $10 + \tfrac{1}{40}v^2 = -\dfrac{dv}{dt}$, so $\displaystyle\int
    dt = -\int\dfrac{40}{400 + v^2}\,dv$, giving $t = -2\tan^{-1}\!\left(\tfrac{1}{20}v\right)
    + C$. At $t = 0$, $v = 20$: $C = \tfrac12\pi$. At maximum height $v = 0$: $t =
    -2\tan^{-1}(0) + \tfrac12\pi = 1.57$ s.'
