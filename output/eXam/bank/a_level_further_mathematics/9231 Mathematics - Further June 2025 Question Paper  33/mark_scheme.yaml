- number: 7d
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'On the bounce the horizontal component is unchanged ($\tfrac{U}{\sqrt2}$)
    and the vertical component is reversed and scaled by $e = \tfrac23$: $w_y = \tfrac23\cdot\dfrac{\sqrt3}{\sqrt2}U
    = \dfrac{\sqrt2}{\sqrt3}U$. So $w^2 = w_y^2 + \left(\dfrac{U}{\sqrt2}\right)^2
    = \tfrac23 U^2 + \tfrac12 U^2 = \tfrac76 U^2$, giving $w = U\sqrt{\tfrac76}$.'
  mark_scheme: []
