  text: A particle $P$ of mass $m$ is attached to one end of a light inextensible
    string of length $a$. The other end of the string is attached to a fixed point
    $O$. The particle moves in a horizontal circle with constant angular speed $\omega$
    and with the string inclined at an angle of $\theta$ to the downward vertical.
    Given that $\tan\theta = \tfrac43$, find $\omega$ in terms of $a$ and $g$.
  answer_options: []
  subquestions: []
