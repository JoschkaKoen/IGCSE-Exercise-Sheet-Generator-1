  text: A particle $P$ of mass $m$ is attached to one end of a light elastic string
    of natural length $a$ and modulus of elasticity $mg$. The other end of the string
    is attached to a fixed point $O$ on a rough plane inclined at an angle of $30\degree$
    to the horizontal. The particle $P$ is held at rest at point $O$ before being
    released. The frictional force acting on $P$ as it slides down the plane is $\tfrac{11}{30}mg$.
  answer_options: []
