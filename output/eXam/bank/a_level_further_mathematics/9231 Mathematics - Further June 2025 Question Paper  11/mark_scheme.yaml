- number: 7e
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Critical values from $\dfrac{2x^2-5x}{2x^2-7x-4} = \tfrac19$
    ($16x^2 - 38x + 4 = 0 \Rightarrow x = \tfrac{19}{16} \pm \tfrac{3}{16}\sqrt{33}$)
    and $= -\tfrac19$ ($20x^2 - 52x - 4 = 0 \Rightarrow x = \tfrac{13}{10} \pm \tfrac{3}{10}\sqrt{21}$).
    Solution: $\tfrac{13}{10} - \tfrac{3}{10}\sqrt{21} < x < \tfrac{19}{16} - \tfrac{3}{16}\sqrt{33}$
    and $\tfrac{19}{16} + \tfrac{3}{16}\sqrt{33} < x < \tfrac{13}{10} + \tfrac{3}{10}\sqrt{21}$.'
  mark_scheme: []
  graphics: []
