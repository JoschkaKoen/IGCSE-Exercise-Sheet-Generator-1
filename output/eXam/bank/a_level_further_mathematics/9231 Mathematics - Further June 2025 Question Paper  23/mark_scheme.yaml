- number: 8b
  question_type: short_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Characteristic equation $\left(\lambda - \tfrac32\right)(\lambda
    - 3)(\lambda + 1) = \lambda^3 - \tfrac72\lambda^2 + \tfrac92 = 0$, so $\tfrac92\mathbf{I}
    = \tfrac72\mathbf{A}^2 - \mathbf{A}^3$. Multiplying by $\mathbf{B}^2 = \mathbf{A}^{-2}$:
    $\tfrac92\mathbf{B}^2 = \tfrac72\mathbf{I} - \mathbf{A}$, so $\mathbf{B}^2 = \tfrac79\mathbf{I}
    - \tfrac29\mathbf{A}$ ($p = \tfrac79$, $q = -\tfrac29$).'
  mark_scheme: []
  graphics: []
- number: 8c
