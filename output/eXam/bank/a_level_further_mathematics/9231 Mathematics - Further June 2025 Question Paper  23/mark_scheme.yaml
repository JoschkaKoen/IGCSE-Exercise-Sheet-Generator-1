  mark_scheme_answer: Eigenvalues of $\mathbf{A}$ are $\tfrac32, 3, -1$ with eigenvectors
    $(1,0,0)$, $(2,1,0)$, $(2,1,-1)$. $\mathbf{A}^{-1}$ has the same eigenvectors
    with reciprocal eigenvalues $\tfrac23, \tfrac13, -1$. So $\mathbf{P} = \begin{pmatrix}
    1 & 2 & 2 \\ 0 & 1 & 1 \\ 0 & 0 & -1 \end{pmatrix}$ and $\mathbf{D} = \begin{pmatrix}
    \tfrac23 & 0 & 0 \\ 0 & \tfrac13 & 0 \\ 0 & 0 & -1 \end{pmatrix}$.
