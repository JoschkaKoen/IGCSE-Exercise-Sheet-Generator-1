  mark_scheme_answer: 'Consider each of the following three methods PF could use to
    motivate

    its employees.  Which method should PF use? Justify your answer.

    •

    Paying bonuses

    •

    Piece-rate

    •

    Job rotation

    Level

    Description

    3

    Sound application of knowledge and understanding of

    relevant business concepts using appropriate terminology.

    Detailed discussion of two of more methods.

    Well-justified recommendation.

    Candidates discussing all three methods in detail, in

    context and with a well-justified recommendation,

    including why the alternative methods were rejected,

    should be rewarded with the top marks in the band.

    9–12

    2

    Sound application of knowledge and understanding of

    relevant business concepts using appropriate terminology.

    Detailed discussion of at least one method.

    Judgement with some justification/some evaluation of

    choice made.

    Candidates discussing two or more methods in detail

    and  applying them to the case should be rewarded with

    the top  marks in the band.

    5–8

    1

    Limited application of knowledge and understanding of

    relevant business concepts.

    Limited ability to discuss the methods with little/no

    explanation.

    Simple judgement with limited justification/limited

    evaluation of choice made.

    Candidates outlining all three methods in context should

    be  rewarded with the top marks in the band.

    1–4

    0

    No creditable response.

    0

    12

    0450/21

    May/June 2025

    Relevant points might include:

    Paying bonuses

    •

    May be flexible in the way it is paid – higher pay if

    the production team increase output of shoes –

    ensuring that they each work harder so the team

    has an increased payment

    •

    May bring pay up to the same rate paid by

    local businesses for similar work – employees

    less likely to leave – lowering PF’s recruitment

    costs

    •

    May cause disagreements if only some of the 20

    employees are working hard – may be seen as

    unfair if all get the same bonus while not all the

    employees work as hard as each other

    •

    Paying a bonus is likely to mean profits for the

    business are lower than expected – may limit

    retained profit for expansion

    •

    Can become expected and if not paid then

    employees become demotivated – reducing

    productivity

    Piece-rate

    •

    Wages paid to employees will increase if there is a

    higher output, so workers will be motivated to

    increase their output and produce more shoes in

    a shorter time – increasing efficiency

    •

    If work is rushed to obtain more wages, then

    quality of the shoes might suffer – leading to a

    poor reputation for the business – fewer repeat

    customers – lower revenue in the future

    •

    May be hard to calculate the contribution of each

    employee to the total number of shoes produced

    •

    It may be seen as unfair by employees if different

    jobs produce more output than others – then

    motivation may reduce rather than increase

    0450/21

    May/June 2025

    Job rotation

    •

    Production workers carry out one task for a period

    of time and then swap round to carry out another

    task using natural rubber to make the job more

    interesting and less boring – provides a greater

    variety of work

    •

    Makes rotating the workers around the new

    factory easier – so can fill in for colleagues who

    are absent – means less likely to have hold-ups in

    production – output produced on time

    •

    May require training for employees which

    increases costs – but once trained the employee

    should be more productive – a one-off cost that

    will not keep being paid

    Recommendation  Justification might include:

    •

    Paying a bonus is the best way to motivate the 20

    employees as this will add extra to their wages

    for the work they do producing shoes and

    encourage them to work harder. Paying piece-

    rate may be difficult to calculate each week as

    employees do different jobs, and some may take

    longer than others. Job rotation may be difficult to

    introduce if the tasks are very different.

    •

    Paying workers using piece-rate is the best way

    to motivate employees as this means that

    employees who work harder producing shoes will

    be rewarded with higher wages which will make

    them feel it is all worth the effort, based on

    Taylor’s theory of motivation.

    •

    Job rotation is the best way to motivate

    employees as this is the only one which makes

    the job of producing shoes more interesting and

    less boring. Money motivates only for a short

    time and then the effects will decrease.

    0450/21

    May/June 2025'
