    0450/21

    May/June 2025

    Relevant points might include:

    Basic points might

    include:

    •

    The non-current assets are forecast to increase

    by $500 000

    •

    Inventories are forecast to increase by $20 000

    •

    Long-term bank loans are forecast to increase by

    $460 000

    •

    The amount of retained profit is forecast to

    increase by $40 000 to $100 000 in 2026

    More developed

    points might

    include:

    •

    The current ratio for 2025 is 1.25

    •

    The current ratio forecast for 2026 is 1.2

    •

    The acid test ratio for 2025 is 1

    •

    The acid test ratio forecast for 2026 is 0.6

    •

    The current ratio for 2025 could be considered

    low and is better to be nearer 2 which would

    show that the business is able to pay its short-

    term debts and has sufficient liquidity

    •

    The current ratio forecast for 2026 is lower than

    for 2025 and is a cause for concern as to why it

    has fallen. This may mean that the business will

    have expanded too quickly and may have cash

    flow problems in the future

    •

    The low acid test ratio for 2026 suggests that the

    business is likely to have liquidity problems after

    the new factory is built

    •

    The expansion appears to have been forecast to

    be mainly funded by a large bank loan of

    $460 000 – this may cause problems in the future

    as the interest repayments of this loan will result

    in a large increase in expenses – possibly

    reducing profitability in the future

    Recommendation

    Justification might include:

    •

    Philip’s sister should invest in PF as the non-

    current assets are forecast to increase by nearly

    double and the building of the new factory is

    predicted to be financed mainly by a bank loan.

    The bank will be confident of a successful

    expansion of PF, or it will not grant such a big

    loan. This should help reassure Philip’s sister that

    the investment will provide good returns in the

    future.

    •

    Philip’s sister should not invest in PF as the

    forecast statement of financial position suggests

    that there may be significant liquidity problems

    producing shoes in the future with an expected

    fall in the current ratio of 0.05 and an expected

    fall in the acid test ratio of 0.4.'
