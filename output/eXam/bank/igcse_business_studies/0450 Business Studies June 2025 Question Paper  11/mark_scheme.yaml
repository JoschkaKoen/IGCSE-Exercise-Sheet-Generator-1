  mark_scheme_answer: 'Explain two pricing methods a new business might use.

    Which is likely to be the best method to use? Justify

    your answer.

    Award up to 2 marks for identification of relevant points.

    Award up to 2 marks for relevant development of points.

    Award up to 2 marks for a justified decision as to which is

    the best pricing method for a new business to use.

    Points might include:

    •

    Cost-plus [k] by adding a percentage onto the costs of

    production [an] it is easy to calculate [an]

    •

    Penetration pricing [k] setting a lower price than

    competitors [an] could attract customers [an]

    •

    Competitive pricing [k] setting a price similar/just below

    competitors [an] which may not cover costs [an]

    •

    Price skimming [k] allows the business to recover

    development costs quicker [an] may lead to low sales

    [an]

    •

    Promotional pricing [k]

    Other appropriate responses should be credited.

    Justification might include:

    Cost-plus pricing [k] is easy to calculate [an]. Price skimming

    [k] allows the business to recover development costs quickly

    [an]. Cost-plus pricing is the best method as the business

    will make profit on each item sold [eval] whereas with price

    skimming they may not attract customers to their new

    business [eval].

    6 This is a general question so there are no marks for

    application.

    Candidates must name the method to access the knowledge

    marks.

    Analysis can be awarded for explaining the method or

    advantages/disadvantages

    Some points can be awarded as advantages or

    disadvantages of different methods but only award the same

    point once.

    To access evaluation must discuss two relevant methods.

    Accept but do not expect:

    •

    Dynamic pricing [k]

    •

    Psychological pricing [k]

    0450/11

    May/June 2025

    Guidance'
