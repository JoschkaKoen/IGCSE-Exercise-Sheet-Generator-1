  mark_scheme_answer: 'Do you think the advantages of external recruitment for

    a business are greater than the disadvantages? Justify

    your answer.

    Award up to 2 marks for identification of relevant points.

    Award up to 2 marks for relevant development of points.

    Award up to 2 marks for a justified decision as to whether

    the advantages of external recruitment for a business are

    greater than the disadvantages.

    Points might include:

    Advantages:

    •

    Brings new skills/ideas [k] improving productivity /

    efficiency [an]

    •

    Wider choice of applicants [k] increases possibility of

    finding the best person for the job [an]

    •

    Can bring valuable knowledge/experience of

    competition [k] so might gain a competitive advantage

    [an]

    •

    Avoids creating a vacancy which will need to be filled [k]

    •

    Avoids risk of upsetting employees when someone

    internal is promoted [k] which could demotivate/cause

    others to leave [an]

    Disadvantages:

    •

    Higher recruitment costs [k] increasing cash outflows

    [an]

    •

    No knowledge of how business works / current

    operations [k] so may need (induction) training [an]

    •

    More time spent / takes longer to fill vacancy [k] which

    could be used for other purposes [an]

    Other appropriate responses should be credited.

    6 This is a general question so there are no marks for

    application.

    Award only once:

    Advantage avoids upsetting employees

    or

    Disadvantage demotivates existing employees

    0450/11

    May/June 2025

    Guidance

    Justification might include:

    External recruitment can bring in new skills [k] improving

    productivity [an]. However, the new employee will not know

    how business works [k] so might need induction training

    [an]. External recruitment is better because the new ideas

    could lead to lower costs in the long term, [eval] which can

    more than cover the extra cost of any induction training

    needed [eval].

    Guidance'
