  mark_scheme_answer: 'Do you think increasing prices is the best way for a

    business to increase its profit? Justify your answer.

    Award up to 2 marks for identification of relevant points.

    Award up to 2 marks for relevant development of points.

    Award up to 2 marks for a justified decision as to whether

    increasing price is the best way for a business to increase its

    profit.

    Points might include:

    Increasing prices:

    •

    Increases revenue (if sell the same amount of products)

    [k]

    •

    Higher prices may suggest better quality [k] therefore

    customers will be willing to pay the higher prices. [an]

    •

    Fewer customers [k] because customers may switch to

    competitors [an] reducing their market share [an]

    •

    Increase profit margin [k]

    Alternatives to increasing prices:

    •

    Buy cheaper raw materials [k] which may lower quality

    [an] leading to fewer sales [an]

    •

    Improve packaging/quality of product [k] increasing the

    number of sales [an]

    •

    Target new markets/develop new products [k] which

    could increase advertising costs [an]

    •

    Lower rent/expenses or other examples [k] lowering

    fixed costs [an]

    Other appropriate responses should be credited.

    6 This is a general question so there are no marks for

    application.

    Some analysis can be used for different points, but only

    award once.

    Allow lower costs only once as either [k] or [an]

    Allow lower sales/higher sales as [an] only once.

    Customers may switch to competitors maybe [k] or [an] but

    allow only once.

    0450/11

    October/November 2024

    Notes

    Justification might include:

    Increasing prices could increase revenue [k] if sales stay the

    same [an]. Reducing the cost of raw materials could

    increase the profit margin [k] but lower the quality [an].

    Increasing prices is a better way to increase profit because

    lower quality products could damage their reputation [eval]

    and higher prices if linked to quality may attract more

    customers [eval]

    Notes'
