  mark_scheme_answer: 'Explain two factors a manufacturing business should

    consider when relocating its operations to another

    country. Which factor is likely to be the most important?

    Justify your answer.

    Award up to 2 marks for identification of relevant points.

    Award up to 2 marks for relevant development of points.

    Award up to 2 marks for a justified decision as to which

    factor is likely to be the most important for a manufacturing

    business when relocating its operations to another country.

    Points might include:

    •

    Access to raw materials [k] as without materials it can

    delay/stop production [an] so not able to meet orders

    [an]

    •

    Labour issues e.g. cost/access to

    suitable/skilled/enough employees [k] as lower wage

    rates could help lower labour costs [an] increasing its

    profit margin [an]

    •

    Land issues e.g. availability/cost of suitable land [k]

    which could increase/lower fixed costs [an]

    •

    Trade restrictions such as tariffs/quotas [k] as quotas

    could limit the amount of goods allowed into a country

    [an]

    •

    Availability of government grants / rates of taxation [k]

    which could reduce the amount of finance needed [an]

    •

    Legal controls [k] as this could stop/determine where

    the business can operate [an]

    •

    Infrastructure (accept only once) e.g. access to utilities,

    communications [k] as without suitable power it would

    be difficult to operate (efficiently) [an]

    •

    Available market/demand for the product/level of

    competition [k] which may reduce transport costs [an]

    •

    Language/cultural problems [k]

    6 This is a general question so there are no marks for

    application.

    Some analysis could be used for different points, but only

    award once.

    Accept costs [k] once if there is no specific reason for the

    costs given.

    0450/11

    October/November 2024

    Notes

    Other appropriate responses should be credited.

    Justification might include:

    Access to raw materials [k] without materials there may be

    delays in production [an]. Another factor is employees [k] as

    a lack of skills could lead to lower quality products [an].

    Access to raw materials is the most important because

    without materials there is nothing to sell, lowering potential

    revenue [eval]. However, a business could train employees

    to produce quality products [eval].

    Notes'
