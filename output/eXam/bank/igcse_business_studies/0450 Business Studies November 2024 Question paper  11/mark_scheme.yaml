  mark_scheme_answer: 'Do you think the opportunities of ecommerce for a new

    business are greater than the threats? Justify your

    answer.

    Award up to 2 marks for identification of relevant points.

    Award up to 2 marks for relevant development of points.

    Award up to 2 marks for a justified decision as to whether

    the opportunities of ecommerce for a new business are

    greater than the threats.

    Points might include:

    Opportunities:

    •

    More potential customers/sales/widen market [k] which

    can increase market share [an]

    •

    No/fewer shops needed [k] so less rent/lower fixed

    costs [an] which increases its profit margin [an]

    •

    Fewer employees needed [k] lower labour/wage costs

    [an]

    •

    Easy to update [k]

    Threats:

    •

    Increased competition [k] so may have to spend more

    on advertising / have to set lower prices [an]

    •

    Potential customers do not trust online business / risk of

    fraud/hacking [k] therefore they are less likely to

    purchase [an]

    •

    Not everyone has access to the internet [k] which could

    reduce potential customer base [an]

    •

    Lack of personal service/no face-to-face contact [k] so

    difficult to maintain customer loyalty [an]

    •

    Increased costs of postage/distribution [k] which could

    lead to higher prices [an]

    •

    Cost to set up/maintain website [k] which business

    might not be able to afford [an]

    6 This is a general question so there are no marks for

    application.

    Lower costs may be [k] or [an] but allow only once.

    0450/11

    October/November 2024

    Notes

    Other appropriate responses should also be credited.

    Justification might include:

    One opportunity is more potential customers [k] increasing

    market share [an]. However, there may be increased

    competition [k] increasing promotional costs [an]. The

    opportunity is greater because more customers could

    increase revenue which is likely to cover the additional costs

    [eval] increasing the chances of a new business being

    successful. [eval]

    Notes'
