  mark_scheme_answer: 'Do you think price skimming is the best pricing method for
    a

    business to use when introducing a new product? Justify your

    answer.

    Award 1 mark for each relevant point [max 2].

    Award 1 mark for each relevant explanation [max 2].

    Award up to 2 marks for justified decision as to whether price skimming

    is the best pricing method to use when introducing a new product.

    Points might include:

    Price skimming:

    •

    Gives the image of high quality [k] which may increase reputation

    [an]

    •

    May be quick to recover research/development costs [k] to break

    even sooner [an]

    •

    Increase profit margin [k]

    •

    (High price) may encourage competitors to enter the market [k]

    which can decrease market share [an]

    •

    (High price) may decrease demand [k] which may decrease

    revenue [an]

    Other pricing methods include:

    •

    Penetration pricing [k] as the low price may be more affordable [an]

    which increases sales [an]

    •

    Cost-plus pricing [k] as is simple to use [an]

    •

    Competitive pricing [k] so should not lose sales to competition on

    price alone [an]

    Other appropriate answers should be credited.

    6 This is a general question so there are no marks

    for application.

    To access marks, points must refer to a specific

    pricing method.

    Advantages or disadvantages of other methods

    can be awarded as [an].

    Some points can be awarded as [an] for different

    methods, but only award once.

    0450/12

    February/March 2025

    Guidance

    Justification might include:

    Price skimming means that it may be quick to recover development

    costs [k] which means funds can be reinvested back into the business

    [an]. Whereas using penetration pricing [k] can make the product more

    affordable [an]. Price skimming is not the best method because the high

    price might discourage customers from trying the product whereas

    penetration pricing could generate more sales [eval] and increase

    market share for the new product [eval].

    Guidance'
