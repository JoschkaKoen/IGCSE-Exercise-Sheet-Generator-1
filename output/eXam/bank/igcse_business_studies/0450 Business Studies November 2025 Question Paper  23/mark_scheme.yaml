  mark_scheme_answer: 'Explain two benefits of ES having a short chain of command.

    Award 1 mark for each benefit (max 2).

    Award a maximum of 3 additional marks for each explanation of the benefit of

    having a short chain of command – one of which must be in context.

    Relevant benefits might include:

    •

    Communication is quick – as there are few levels for messages to be

    passed through – queries can be answered straight away

    •

    The owners are not remote from the employees – therefore they will be

    more in touch with the opinions of the employees if there is a problem –

    making it easier to solve the problem and maintain motivation

    •

    Span of control may be wider – leading to more delegation and less

    control of each worker – making them feel motivated as trusted to get on

    with the job

    •

    Decision-making may be faster

    •

    Messages are less likely to get distorted

    For example: Communication in the business is quick (1) as there are few

    levels of hierarchy for messages to pass through (1). Therefore, queries can

    be answered straight away (1) as they passed on from the one owner of ES

    (app).

    Application might include: boats; 20 years’ experience; sole trader; sailing;

    12 skilled employees; 4 new employees; high quality; well-established brand;

    voted 3rd best in the country; flat organisational structure; information from

    Appendix 2 or Appendix 3.

    8

    0450/23

    October/November

    2025'
