- number: 1b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Consider the advantages and disadvantages of the following
    two types

    of business organisation that Tim could use when his brothers join the

    business. Which would be the best type for Tim to choose?  Justify your

    answer.

    •

    Partnership

    •

    Private limited company

    Level

    Description

    3

    Sound application of knowledge and understanding of

    relevant business concepts using appropriate terminology.

    Detailed discussion of both types of business

    organisation.

    Well-justified recommendation.

    Candidates discussing both types of business

    organisation, in context and with a well-justified

    recommendation, including why the alternative type of

    business organisation was rejected, should be rewarded

    with the top marks in the band.

    9–12

    2

    Sound application of knowledge and understanding of

    relevant business concepts using appropriate terminology.

    Detailed discussion of one type of business organisation.

    Judgement with some justification / some evaluation of

    choice made.

    Candidates discussing in detail one or more types of

    business organisation and applying it to the case should

    be rewarded with the top marks in the band.

    5–8

    1

    Limited application of knowledge and understanding of

    relevant business concepts.

    Limited ability to discuss the types of business

    organisation with little/no explanation.

    Simple judgement with limited justification / limited

    evaluation of choice made.

    Candidates outlining the two types of business

    organisation in context should be rewarded with the top

    marks in the band.

    1–4

    0

    No creditable response.

    0

    12

    0450/23

    October/November

    2025

    Relevant points might include:

    Advantages

    Disadvantages

    Partnership

    •

    It is easy to set-up –

    as there are few legal

    requirements –

    reducing the costs of

    setting up, such as

    accountancy costs

    •

    More capital can be

    invested – as three

    partners investing

    their own money into

    the business

    •

    More owners to share

    responsibilities with

    and discuss business

    decisions – each

    partner can specialise

    in different aspects of

    the business, such as

    one brother has

    experience of

    financial

    management – more

    efficient as each

    partner uses their

    expertise

    •

    More new ideas as

    there are three

    partners – so may

    make better decisions

    •

    Complete privacy –

    they do not have to

    share any financial

    details with anyone

    else outside the

    business – as has

    been the case for the

    last 4 years - apart

    from the tax office, as

    they will still have to

    pay tax

    •

    All three owners are

    motivated to work

    hard as it is their

    business and no one

    else benefits from

    their efforts

    •

    Unlimited liability / no

    limited liability –

    which means all their

    personal possessions

    are at risk – not just

    the money they

    invested in the

    business

    •

    No continuity as the

    business and the

    owners do not have a

    separate legal

    identity – if one of the

    partners leaves,

    because the partners

    are ‘the business’ it

    will end

    •

    Partners may

    disagree on business

    decisions, and this

    may make decision-

    making slower

    •

    If one of the partners

    doesn’t work hard or

    is dishonest then the

    other two partners

    will also have

    responsibility for their

    actions

    0450/23

    October/November

    2025

    Advantages

    Disadvantages

    Private limited

    company

    •

    The three brothers

    and the business

    have a separate legal

    identity – company

    can be sued instead

    of the owners

    •

    The business can sell

    shares to family and

    friends to raise more

    capital for the boat

    business – larger

    amounts of capital

    may be raised than if

    a partnership

    •

    Limited liability – will

    not lose personal

    possessions if

    business fails

    •

    Cannot be taken over

    without the consent

    of the shareholders

    •

    Accounts for the boat

    manufacturer are

    not private –

    competitors may

    access the accounts

    •

    Not easy to transfer

    shares so may make

    it more difficult for the

    business to sell

    shares to family and

    friends

    •

    Legal formalities to

    operate the company

    – needs to have

    accounts audited and

    registered with the

    government takes

    time and increases

    costs for ES

    •

    Legal formalities

    setting up the

    company – have to

    complete paperwork

    to register the

    company which takes

    time and money -

    may take more time

    for ES than setting up

    as a partnership

    Recommendation  Justification might include:

    •

    The business should be set up as a partnership

    because the brothers will have complete control of

    which boats to produce and will be able to keep

    all the profit from their hard work without having to

    share it if they had other shareholders. They

    should not become a private limited company as

    this would mean that competitors may be able to

    see some of their accounts and they could not

    keep the financial data private. They will also have

    to pay to have the accounts audited each year

    which will increase costs.

    •

    The business should be set up as a private limited

    company because the three brothers will have the

    protection of limited liability which means if ES

    goes bankrupt, they will not lose their personal

    possessions only the money they invested in the

    business at the start.

    0450/23

    October/November

    2025'
