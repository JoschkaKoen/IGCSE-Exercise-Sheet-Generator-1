  mark_scheme_answer: 'Consider the advantages and disadvantages of ES using on-the-job
    or

    off-the-job training for its new employees. Which method should Tim

    use? Justify your answer.

    •

    On-the-job training

    •

    Off-the-job training

    Level

    Description

    3

    Sound application of knowledge and understanding of

    relevant business concepts using appropriate

    terminology.

    Detailed discussion of both training methods.

    Well-justified recommendation.

    Candidates discussing both training methods in detail, in

    context and a with well-justified recommendation,

    including why the alternative training method was

    rejected, should be rewarded with the top marks in the

    band.

    9–12

    2

    Sound application of knowledge and understanding of

    relevant business concepts using appropriate

    terminology.

    Detailed discussion of at least one training method.

    Judgement with some justification / some evaluation of

    choices made.

    Candidates discussing one or more training method in

    detail and applying it to the case should be rewarded with

    the top marks in the band.

    5–8

    1

    Limited application of knowledge and understanding of

    relevant business concepts.

    Limited ability to discuss the training methods with

    little/no explanation.

    Simple judgement with limited justification / limited

    evaluation of choices made.

    Candidates outlining both training methods in context

    should be rewarded with the top marks in the band.

    1–4

    0

    No creditable response.

    0

    12

    0450/23

    October/November

    2025

    Relevant points might include:

    Advantages

    Disadvantages

    On-the-job

    training

    •

    Individual tuition is

    given – tailored to the

    specific needs of the

    tasks of

    manufacturing

    boats in the exact

    way ES wants the

    tasks to be carried

    out

    •

    Ensures some

    production takes

    place – helps to

    supply more high-

    quality boats when

    ordered

    •

    It is relatively cheap

    compared to off-the-

    job training – as no

    need to pay

    expenses - such as

    course fees for the

    two days a week of

    training

    •

    Trainer may pass on

    bad habits – leading

    to more errors when

    carrying out the tasks

    required to

    manufacture boats –

    damaging its well-

    known brand image

    •

    Trainer will not be as

    productive whilst

    training – slows down

    output of tasks

    toward making the

    boats from the

    experienced worker

    doing the training

    •

    Employees might not

    learn the most up-to-

    date methods – hence

    may be less efficient

    – making ES less

    competitive against

    large boat

    companies

    •

    Employees may

    make mistakes whilst

    learning – creating

    faulty products –

    increases costs from

    part-finished boats as

    component parts

    are being thrown

    away

    •

    If mistakes are made,

    then its reputation is

    likely to be damaged

    0450/23

    October/November

    2025

    Advantages

    Disadvantages

    Off-the-job

    training

    •

    A broad range of skills

    can be taught for boat

    production

    •

    Often uses expert

    trainers – gives better

    training to the 4 new

    employees – may be

    more efficient at

    carrying out tasks for

    boat manufacturing

    •

    Most up-to-date

    techniques are learnt

    – makes ES more

    competitive than other

    large boat

    manufacturers

    •

    May be no output of

    boats whilst training -

    so wages may be

    paid but no work

    done whilst training

    •

    May make it easier

    for employee to find

    alternative

    employment as may

    have a recognised

    qualification –

    employee leaves and

    increases cost to

    recruit and train a

    new employee

    •

    Costs are usually

    higher than on-the-job

    training

    Recommendation Justification may include:

    •

    On-the-job training may be better to choose as it

    will allow workers to keep working at the same

    time as being trained and therefore will still be

    producing some output of boats. This will save ES

    training costs as it uses some of its existing 12

    skilled workers to carry out the training. It may

    not be able to afford to send all 4 workers on

    training courses as it is likely to be expensive and

    may not be specific to ES’s needs.

    •

    Off-the-job training may be better to choose as it

    may lead to higher quality training being given to

    the 4 new employees. These are skilled jobs, and

    the employees need to maintain the brand

    image of high-quality workmanship of ES.

    0450/23

    October/November

    2025'
