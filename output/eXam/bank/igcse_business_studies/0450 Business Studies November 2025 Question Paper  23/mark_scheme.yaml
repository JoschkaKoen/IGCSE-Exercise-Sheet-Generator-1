- number: 1a
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Explain two reasons why customers might buy from ES rather
    than from

    one of its competitors.

    Award 1 mark for each reason why customers may be more willing to buy

    from ES rather than one of its competitors (max 2).

    Award a maximum of 3 additional marks for each explanation of the reason -

    one of which must be applied to this context.

    Reasons might include:

    •

    ES has a brand name that is well-known so makes it easy to identify – its

    brand name makes the business stand out from competitors – customers

    more likely to choose the branded boats over less well-known ones

    •

    Customers are assured of the quality they expect to receive – so may

    attract more customers – as boat is less likely to have faults or errors in

    the manufacture

    •

    Customers may think the quality is higher than unbranded products –

    may be more willing to pay a higher price – feel confident that the boats

    have been manufactured by skilled employees

    •

    ES has a good reputation – giving customers confidence that ES is a

    reliable business to buy from – feel reassured that ES will meet their

    needs

    •

    ES’s products may be cheaper than its competitors

    For example: ES has a brand name that is well-known so makes it easy for

    customers to identify it (1) as its brand name make the business stand out

    from competitors (1) so customers more likely to choose ES over a less well-

    known competitors (1) when they are buying a new boat (app).

    Application might include: boats; 20 years’ experience; started own business

    4 years ago; sailing; 12 skilled employees; may use social media to promote

    the business; 4 new employees; high quality; well-established brand; voted 3rd

    best in the country; promotion in sailing magazines; information from

    Appendix 2 or Appendix 3.

    8

    0450/23

    October/November

    2025'
