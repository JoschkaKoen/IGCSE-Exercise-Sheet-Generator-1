  mark_scheme_answer: 'Explain four benefits to a business of using social media as
    its method

    of promotion.

    Award 1 mark for each benefit (max 4).

    Award a maximum of 1 additional mark for each explanation of the benefit of

    using social media for promotion.

    There are no application marks available for this question.

    Benefits could include:

    •

    Can target specific demographic groups who can then share the

    information on social media with friends – at no cost to the business

    •

    Can target customers who will see the advert when they log on to social

    media – reaches existing customers to encourage repeat sales

    •

    Information can be updated quickly – so can change quickly in response

    to market changes

    •

    Low or no cost to advertise on social media – if not paying to have the

    advert on specific sites

    •

    It can be used to reach groups that are difficult to reach in any other way

    – particularly if they live in other countries

    •

    It can be interactive which can be attractive – possibly leading to higher

    sales

    •

    Can provide more information in adverts than some other forms of

    advertising

    •

    Links can be attached to adverts to take customers to other products the

    customer may be interest in

    •

    May link to a website where the product can be easily ordered

    For example: Can target specific demographic groups who may be interested

    in your products (1). They can then share the information on social media with

    friends at no cost to the business (1).

    8

    0450/23

    October/November

    2025'
