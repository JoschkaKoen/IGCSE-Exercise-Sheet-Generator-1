- number: 4b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Consider the opportunities and threats of globalisation for
    ES. Are the

    threats likely to be greater than the opportunities for ES? Justify your

    answer.

    Level

    Description

    3

    Sound application of knowledge and understanding of

    relevant business concepts using appropriate terminology.

    Detailed discussion of both opportunities and threats.

    Well-justified conclusion.

    Candidates discussing both opportunities and threats in

    detail, in context and with a well-justified conclusion,

    including why the alternative was rejected, should be

    rewarded with the top marks in the band.

    9–12

    2

    Sound application of knowledge and understanding of

    relevant business concepts using appropriate terminology.

    Detailed discussion of either opportunities or threats.

    Judgement with some justification / some evaluation of

    choice made.

    Candidates discussing opportunities and/or threats in

    detail and applying it to the case should be rewarded with

    the top marks in the band.

    5–8

    1

    Limited application of knowledge and understanding of

    relevant business concepts.

    Limited ability to discuss the opportunities and threats with

    little/no explanation.

    Simple judgement with limited justification / limited

    evaluation of choice made.

    Candidates outlining both the opportunities and threats in

    context should be rewarded with the top marks in the

    band.

    1–4

    0

    No creditable response.

    0

    12

    0450/23

    October/November

    2025

    Relevant points might include:

    Opportunities

    •

    Can increase the number of markets ES operates in

    as Tim wants to start selling to customers in other

    countries - as now easier to communicate with

    buyers in other countries using social media -

    increases sales and revenue

    •

    Easier to export to other countries where tariffs and

    quotas have been removed – making ES boats more

    competitive with boat manufacturers in other

    countries

    •

    Easier to import products, such as component parts

    for boats, into country X – as likely to be no trade

    restrictions between countries - and may lead to

    lower unit costs – ES may become more competitive

    in country X and in other countries

    •

    May become cheaper to produce boats in another

    country in the future – where costs, such as labour,

    are lower than country X

    •

    Spreads risk

    •

    Economies of scale

    •

    Access to resources that it might not have otherwise

    •

    Access to new technologies

    Threats

    •

    Increasing imports of competitors’ boats into the

    home market from multinational companies –

    increases competition – sales from businesses based

    in other countries may reduce market share in

    country X

    •

    Lack of knowledge of new markets, competition and

    local tastes – may make it more difficult to

    successfully export into global markets

    •

    Increased investment from multinational companies in

    country X’s market - setting up factories making

    boats for the domestic market – may also lead to

    increased competition in country X

    •

    Employees may leave to go and work for the

    multinational companies setting up in the home

    market – increased wages and more opportunities

    may be attractive – higher labour turnover for ES -

    increased costs of recruitment and training for ES

    •

    Supply chain problems e.g. transport problems

    •

    Exchange rate fluctuations

    •

    Differences in legal controls e.g. labour laws,

    consumer laws

    0450/23

    October/November

    2025

    Conclusion

    Justification might include:

    •

    As ES will be new to selling to other countries, then it

    may find it difficult to compete with multinational

    businesses. Hence the threats from multinational

    businesses may be greater than the opportunities to

    sell boats in other countries for ES to increase

    revenue. This could lead to lower market share for ES

    overall and it may no longer be voted number 3 for

    being the best boat builder in country X.

    •

    There are more opportunities for ES from

    globalisation as it may benefit from lower unit costs

    for its boats if it uses cheaper imported components

    as there are now no tariffs, making it more competitive

    than many other businesses both in the home country

    and in markets in other countries as prices can be

    reduced. Therefore, the opportunities to expand and

    increase revenue are greater than the threats of

    increased competition.'
