  mark_scheme_answer: 'Explain one way each of the following ES stakeholder groups
    might find

    the financial information in Appendix 3 useful.

    •

    Owners

    •

    Employees

    •

    Suppliers

    •

    Bank

    Award 1 mark for each way the financial information may be useful to the

    stakeholder group (max 4).

    Award a maximum of 1 additional mark for each explanation of the way the

    stakeholder group might find the information useful which must be in

    context.

    Relevant ways might include:

    Owners

    •

    To be reassured that they would be likely to receive a share of the profit –

    as ES made a $100 000 profit last year

    •

    To measure the success of the business against previous years

    •

    To see the liquidity of the business and if they need to make any changes

    Employees

    •

    To see if they can ask for a wage increase - from last years’ 50%

    increase in revenue

    •

    To see how secure their job is

    Suppliers

    •

    They will want to see if ES will have enough liquidity to pay for the

    materials – has a safe current ratio of 2

    •

    To decide whether to allow trade credit for ES

    Bank

    •

    To see if the business would be able to pay back a loan - if ES has

    enough liquidity with an acid test ratio of 0.5 to reassure the bank

    •

    To see whether it should offer an overdraft facility if ES needs one

    For example: To see how much profit is likely to be paid to them (1) out of the

    $100 000 profit from last year (app).

    Application might include: boats; 20 years’ experience; started own business

    4 years ago; sole trader; sailing; 12 skilled employees; 2 brothers; 4 new

    employees; high quality; well-established brand; voted 3rd best in the country;

    expand by selling in other countries; promotion in sailing magazines;

    information from Appendix 2 or Appendix 3.

    8

    0450/23

    October/November

    2025'
