- number: 2b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Using Appendix 2 and other information, consider the two new
    products

    ES could produce. Which product should Tim choose? Justify your

    answer using break-even calculations.

    •

    Product A

    •

    Product B

    Level

    Description

    3

    Sound application of knowledge and understanding of

    relevant business concepts using appropriate terminology.

    Detailed discussion of both products.

    Well-justified recommendation.

    Candidates discussing both products, in context and with

    a well-justified recommendation, including why the

    alternative product was rejected, should be rewarded with

    the top marks in the band.

    9–12

    2

    Sound application of knowledge and understanding of

    relevant business concepts using appropriate terminology.

    Detailed discussion of at least one product.

    Judgement with some justification / some evaluation of

    choice made.

    Candidates discussing both products in detail and

    applying them to the case should be rewarded with the

    top marks in the band.

    5–8

    1

    Limited application of knowledge and understanding of

    relevant business concepts.

    Limited ability to discuss the products with little/no

    explanation.

    Simple judgement with limited justification / limited

    evaluation of choice made.

    Candidates outlining the two products in context should

    be rewarded with the top marks in the band.

    1–4

    0

    No creditable response.

    0

    12

    0450/23

    October/November

    2025

    Relevant points might include:

    Product A

    •

    Has potential to export this product in the future –

    may lead to higher revenue if sales are high in

    other countries

    •

    Price is $300 000 higher than for Product B at a

    price of $500 000 per boat

    •

    Break even number of boats is 8 in the first year

    •

    Margin of safety is 1 boat in the first year

    •

    Contribution is $50 000 per boat

    •

    Total revenue for 9 boats is $4 500 000

    •

    Total cost for 9 boats is $4 450 000

    •

    Profit for the first year from this product is $50  000

    •

    Fixed costs are the same for both products at

    $400 000

    Product B

    •

    Sales are forecast to grow in country X and ES

    familiar with this market – may better meet the

    needs of this target market

    •

    Price for Product B is price of $200 000 per boat

    which is lower than Product A

    •

    Break even number of boats is 20 in the first year

    •

    Margin of safety is 4 boats in the first year

    •

    Contribution is $20 000 per boat

    •

    Total revenue for 24 boats is $4 800 000

    •

    Total cost for 24 boats is $4 720 000

    •

    Profit for the first year from this product is $80  000

    •

    Profit is higher by $30 000 in the first year

    Recommendation Justification might include:

    •

    ES should choose to start producing Product A

    which is a larger boat with a higher price. The

    contribution per boat is higher than Product B by

    $30 000 so if in the future ES can successfully

    export more of these boats to customers in other

    countries and is forecast to break even with a

    fewer number of boats sold at 8 in the first year.

    •

    ES should choose to start producing Product B

    which is a small boat and makes a higher profit by

    $30 000 in the first year and has a higher margin of

    safety by 3 boats than Product A.

    0450/23

    October/November

    2025'
