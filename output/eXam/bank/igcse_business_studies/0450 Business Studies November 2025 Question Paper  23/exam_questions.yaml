  text: "4\nTalula owns a hairdressing salon. She also rents out part of her property\
    \ to Sheila, who offers a range\nof beauty treatments. Talula provided the following\
    \ information for the year ended 30 September 2025.\n\n$\n\nSalaries\n81 500\n\
    \nElectricity charges\n23 500\n\nWater charges\n4 150\n\nIncome from hairdressing\n\
    124 700\n\nInsurance\n2 067\n\nGeneral expenses\n952\n\nProperty tax\n3 045\n\n\
    Rent received from Sheila\n6 400\n\nAdditional information:\n\n1\nInsurance of\
    \ $2067 is for the period from 1 October 2024 to 31 October 2025.\n\n2\n Sheila\
    \ commenced renting property from Talula on 1 October 2024. There remains two\
    \ months\nof rental payments in arrears.\n\n3\nProperty tax of $3045 is for the\
    \ period 1 October 2024 to 31 December 2025.\n\nREQUIRED\n\n(a) Prepare Talula’s\
    \ income statement for the year ended 30 September 2025.\nTalula\nIncome Statement\
    \ for the year ended 30 September 2025\n$\n$\n [5]\n,\t,\n\nTalula has been notified\
    \ by her electricity supplier that costs of electricity will increase by 15% with\n\
    effect from January 2026.\n\nREQUIRED\n\n(b) Suggest two courses of action that\
