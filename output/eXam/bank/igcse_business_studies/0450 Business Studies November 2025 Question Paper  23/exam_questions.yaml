    \nCash\n8 400\n92 900\n\n312 900\n\nCapital and liabilities\n\nCapital – opening\
    \ balance\n199 100\n\nProfit for the year\n36 000\n\n235 100\n\nLess: Drawings\n\
    12 000\n223 100\n\nNon-current liabilities\n\nLong-term bank loan\n49 000\n49\
    \ 000\n\nCurrent liabilities\n\nTrade payables\n31 000\n\nBank\n9 800\n40 800\n\
    \n312 900\n\nRushil has provided the following additional information:\n\n1\n\
    Inventory at 1 October 2024 was $30 000.\n\n2\n The profit for the year in his\
    \ statement of financial position was after having deducted loan\ninterest charges\
    \ of $2450.\n\n3\nFor the year ended 30 September 2025:\n•\nsales totalled $482\
    \ 000 ($387 000 were on credit; the remainder were cash sales)\n•\npurchases totalled\
    \ $310 000 (all on credit).\n,\t\t,\n\nREQUIRED\n\n(a) Complete the following\
    \ table.\nReturn on capital employed (ROCE)\nAnswer (correct to\ntwo decimal places)\n\
    Workings\nRate of inventory turnover\nAnswer (correct to\ntwo decimal places)\n\
    Workings\nTrade receivables turnover (days)\nAnswer (round up to\nthe next whole\
    \ day)\nWorkings\nTrade payables turnover (days)\nAnswer (round up to\nthe next\
    \ whole day)\nWorkings\nCurrent ratio\nAnswer (correct to\ntwo decimal places)\n\
    Workings\n\n[8]\n,\n,\n\n(b) (i) Suggest two ways that Rushil might improve his\
    \ return on capital employed (ROCE).\n1   2   [2]\n\n(ii) Suggest two ways that\
