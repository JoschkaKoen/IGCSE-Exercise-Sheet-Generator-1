  text: "1\nSid owns a business selling cars. He operates a petty cash system and\
    \ maintains the float at\n$350. The float is restored on the first day of each\
    \ month from the business bank account.\n\nSid has provided the following information:\n\
    \n2025\n\n$\n\nApril  1\nBalance b/d\n350\n\n3\nBought petrol\n36\n\n4\nBought\
    \ tea, coffee and juice – for staff\n34\n\n9\nPaid taxi fare for customer\n24\n\
    \n11\nPaid AB Autoparts, a credit supplier\n78\n\n12\nPaid for printer paper\n\
    8\n\n14\nPaid window cleaner\n30\n\n27\nBought train ticket for member of staff\n\
    8.50\n\n30\nPaid office cleaner\n45\n\nREQUIRED\n\n(a) Prepare Sid’s petty cash\
    \ book for the month of April on page 3. Balance the petty cash book at\n30 April\
    \ 2025 and bring down the balance at 1 May 2025. Restore the float to the agreed\
    \ level.\n,\t,\nDate\nDetails\nTotal\nreceived\n$\nDate\nDetails\nTotal\npaid\n\
    $\nCleaning\n$\nFuel\n$\nOffice\nexpenses\n$\nTravel\nexpenses\n$\nLedger\naccounts\n\
    $\nApril 1\n Balance\n 350\n [12]\n,\t,\n\n(b) State the name of the system used\
    \ to maintain petty cash books [1]\n\n(c) State one advantage of operating a petty\
    \ cash account [1]\n\n(d) State two reasons why there might be a difference between\
    \ the balance on the petty cash\naccount and the money in the petty cash box.\n\
    1   2   [2]\n\nSid made the following transactions during the month of May 2025:\n\
    •\nwithdrew $1500 cash from the business bank account for his own personal use\n\
