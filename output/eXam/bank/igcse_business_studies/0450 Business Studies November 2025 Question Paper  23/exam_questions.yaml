    \ Rushil’s closing inventory valuation were some items that had been damaged.\
    \ These\nwere included at a reduced value.\n\nREQUIRED\n\n(c) (i) State why the\
    \ inventory was included at a reduced value [1]\n\n(ii) Name the accounting principle\
