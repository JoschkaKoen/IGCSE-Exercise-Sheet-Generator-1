  mark_scheme_answer: 'Explain two reasons why profit is important for a

    business. Which reason is likely to be the most

    important? Justify your answer.

    Award up to 2 marks for identification of relevant points.

    Award up to 2 marks for relevant development of points.

    Award up to 2 marks for a justified decision about which

    reason is likely to be the most important.

    Points might include:

    •

    Provides a source of funds [k] as no interest to pay [an]

    •

    Reward for risk-taking [k] as owners invest their money

    in hope of making a return on investment / motivate

    them to continue [an]

    •

    Represents a return on shareholder/owner’s

    investment/enterprise [k] as otherwise they could invest

    elsewhere [an]

    •

    Help attract investors/finance [k] which could help the

    business to expand [an]

    •

    Measure of success [k] as low profit could suggest the

    business is not worth continuing/starting up [an]

    •

    Need for long-term survival [k]

    Other appropriate responses should be credited.

    Justification might include:

    It can provide a source of funds [k] for which there is no

    interest to pay [an]. It is also a reward for risk-taking [k] as

    owners invest their money in the hope of making a return on

    their investment [an].

    Providing a source of funds is most important because if

    successful, this could provide the owners with more profit in

    the future [eval] which may even lead to greater returns for

    owners [eval].

    6 This is a general question so there are no marks for

    application.

    To access evaluation must discuss two reasons.

    For evaluation to be awarded justification will usually follow

    on from relevant analysis of points.

    Some [an] can be used for more than one reason but only

    award once.

    0450/13

    October/November 2025

    Guidance'
