  mark_scheme_answer: 'Explain two ways a business could use to build

    customer loyalty. Which is likely to be the best way for a

    new business to use? Justify your answer.

    Award up to 2 marks for identification of relevant points.

    Award up to 2 marks for relevant development of points.

    Award up to 2 marks for a justified decision about which is

    the best way for a new business to build customer loyalty.

    Points might include:

    •

    Offer good customer service / train employees [k] which

    can make customers feel valued / builds trust [an]

    •

    Loyalty (reward) scheme / special offers/discounts to

    regular customers / membership discounts [k] so they

    have an incentive to return [an] but it takes time/cost to

    set up/operate [an]

    •

    Build customer relationships / communicate with

    customer or examples e.g. use newsletters to

    communicate [k] so customers remember your business

    [an]

    •

    Ask for feedback / carry out market research [k] so the

    items being sold match customer needs [an]

    •

    Respond to complaints quickly [k] so that customers are

    less likely to go to other businesses [an]

    •

    Offer extra services or examples such as after sales

    service / delivery / credit facilities [k] which show that

    the business cares [an]

    6 This is a general question so there are no marks for

    application.

    To access evaluation must discuss two ways.

    For evaluation to be awarded justification will usually follow

    on from relevant analysis of points.

    Some answers could be awarded as either [k] or [an] but do

    not award the same point twice.

    0450/13

    October/November 2025

    Guidance

    Other appropriate responses should be credited.

    Justification might include:

    One way is to offer good customer service [k] which can

    make customers feel valued [an]. Another way is to respond

    to complaints quickly [k] so that customers are less likely to

    go to other businesses [an].

    Offering good customer service is the best way for a new

    business because this is likely to reduce the number of

    mistakes which can help reduces the likelihood of

    complaints [eval] and improve its reputation which could

    help the new business compete [eval].

    0450/13

    October/November 2025

    Guidance'
