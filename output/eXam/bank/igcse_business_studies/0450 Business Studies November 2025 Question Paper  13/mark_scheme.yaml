  mark_scheme_answer: 'Explain two factors a business should consider when

    deciding who to recruit. Which factor is likely to be most

    important for a tertiary sector business? Justify your

    answer.

    Award up to 2 marks for identification of relevant points.

    Award up to 2 marks for relevant development of points.

    Award up to 2 marks for a justified decision as to which

    factor is likely to be the most important for a tertiary sector

    business to consider when deciding who to recruit.

    Points might include:

    •

    Experience/skills [k] as this shows the person is able to

    do the job [an] AND/OR may expect higher wages [an]

    •

    Education/qualifications [k] as person is likely to make

    less mistakes / provide better service [an]

    •

    Personality/attitude/whether trustable [k] as may want

    someone willing to learn [an]

    •

    Punctuality/disciplinary record [k] as if they are late, it

    could cause delays [an]

    Other appropriate responses should be credited.

    Justification might include:

    One factor is skills [k] as this shows that the person is able

    to do the job [an]. Another factor is personality [k] as

    someone with the right personality may be more willing to

    learn [an]. Skills are the most important as fewer mistakes

    can lead to a better reputation [eval] which is especially

    important for a tertiary sector business, whereas simply

    being willing to learn does not mean they can do the job

    [eval].

    6 This is a general question so there are no marks for

    application.

    Some analysis could work for more than one factor, but only

    award once.

    To access evaluation must discuss two factors.

    For evaluation to be awarded justification will usually follow

    on from relevant analysis of points.'
  mark_scheme: []
  graphics: []
