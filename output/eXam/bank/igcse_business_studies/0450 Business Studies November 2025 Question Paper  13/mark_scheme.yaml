  mark_scheme_answer: 'Do you think employees are the most important

    stakeholder group for a manufacturing business?

    Justify your answer.

    Award up to 2 marks for identification of relevant points.

    Award up to 2 marks for relevant development of points.

    Award up to 2 marks for justified decision about whether

    employees are the most important stakeholder group for a

    manufacturing business.

    Points might include:

    •

    Make/produce the products [k] otherwise there is

    nothing to sell/cannot meet demand [an]

    •

    Responsible for quality [k] which could improve/damage

    its reputation [an]

    •

    Without sufficient employees the business may not be

    able to meet demand [k]

    Other stakeholder groups include:

    •

    Shareholders/owners [k] who provide finance / invest

    money / capital for the business [an]

    •

    Customers [k] as they buy the products [an] generating

    revenue [an]

    •

    Suppliers [k] who provide materials/inventory [an]

    •

    Local community [k] who provide the workers for the

    business [an]

    •

    Government [k] as it provides the legal framework in

    which the business operates [an]

    •

    Bank [k] who provide finance/loans [an]

    Other appropriate responses should be credited.

    6 This is a general question so there are no marks for

    application.

    Candidates can focus solely on employees and still access

    evaluation.

    For evaluation to be awarded justification will usually follow

    on from relevant analysis of points.

    Some points can be relevant to more than one stakeholder

    group [an] but only award once.

    0450/13

    October/November 2025

    Guidance

    Justification might include:

    Employees are important as they make the products [k]

    otherwise there is nothing to sell [an]. Another stakeholder

    group is customers [k] as they buy the products [an].

    Customers are the most important stakeholder because

    without them, the manufacturing business cannot generate

    revenue, which is necessary to pay the costs including

    wages [eval] whereas the business could use machinery

    instead of some employees. [eval]

    0450/13

    October/November 2025

    Guidance'
