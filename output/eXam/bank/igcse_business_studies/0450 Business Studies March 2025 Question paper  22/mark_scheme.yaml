  mark_scheme_answer: 'Explain two functions of management for Charly when she is
    operating

    her new business.

    Award 1 mark for each function (max 2).

    Award a maximum of 3 additional marks for each explanation of the function

    of management – one of which must be applied to this context.

    Functions might include:

    •

    Planning – setting aims and targets for the business – will give a sense of

    direction with common targets to work towards

    •

    Organising – arranges the tasks for the employees – as a manager

    cannot do all the tasks and will need to delegate

    •

    Coordinating – bringing together the different departments/parts in the

    business – so tasks are carried out efficiently

    •

    Commanding – instructs the employees on how to carry out their tasks –

    gives guidance as required

    •

    Controlling – makes sure the employees produce the expected output

    each week – and that all aims are achieved

    For example: Planning (1) – setting aims and targets for the employees (1) so

    they remain efficient and produce the correct number of rugs (app). This will

    mean that CR will be able to meet orders and satisfy customer demand (1).

    Application could include: rugs; worked for a large rug manufacturer for 10

    years; luxury product; forecast demand is 20 rugs per week; 2 possible

    locations for the new factory; needs to produce a cash flow forecast; store

    inventories of raw materials / finished products; 4 or 8 employees; new

    factory.

    8

    0450/22

    February/March 2025'
