- number: 2b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Using Appendix 2 and other information, consider the following
    two

    possible locations for CR’s new factory. Which location should Charly

    choose? Justify your answer.

    •

    Location A

    •

    Location B

    Level

    Description

    3

    Sound application of knowledge and understanding

    of relevant business concepts using appropriate

    terminology.

    Detailed discussion of the two locations.

    Well-justified recommendation.

    Candidates discussing the two locations in detail, in

    context and with a well-justified recommendation,

    including why the alternative location was rejected,

    should be rewarded with the top marks in the band.

    9–12

    2

    Sound application of knowledge and understanding

    of relevant business concepts using appropriate

    terminology.

    Detailed discussion of at least one location.

    Judgement with some justification/some evaluation of

    choice made.

    Candidates discussing one or more locations in

    detail and applying them to the case should be

    rewarded with the top marks in the band.

    5–8

    1

    Limited application of knowledge and understanding

    of relevant business concepts.

    Limited ability to discuss the locations with little/no

    explanation.

    Simple judgement with limited justification/limited

    evaluation of choice made.

    Candidates outlining the two locations in context

    should be rewarded with the top marks in the band.

    1–4

    0

    No Creditable Response

    0

    12

    0450/22

    February/March 2025

    Relevant points might include:

    Location A:

    •

    Rent and other costs are much lower at $400

    per week – helping to reduce total costs to

    $1000 per week – may mean CR can charge a

    lower price for each rug – may be more

    competitive

    •

    Total costs may be less than half Location B

    even though output is half at 40 rugs per week

    – may not need to borrow $20 000 bank loan

    reducing interest payments in the future – less

    likely to have a cash flow problem

    •

    Total costs for Location A are $1000 whereas

    total costs for Location B are $2200

    •

    Average cost per rug for Location A if operating

    at maximum output is $50 but rises to $62.50 if

    there is disruption to output – a lower increase of

    $12.50 than Location B which is $18.33 more for

    each rug produced

    •

    If there are power cuts, then they can only

    produce 16 rugs a week – demand is likely to be

    20 – so they could be letting customers down

    and gain a poor reputation

    Location B:

    •

    Can produce double the output at 40 rugs each

    week – increases revenue if all the rugs are sold

    •

    Has 5% more impact on output if there are

    power cuts than Location A – reducing the

    number of rugs for sale to 30 – reducing

    possible revenue

    •

    Total costs are more than twice as much at

    $2200 per week – may lead to higher prices

    •

    Average cost to produce each rug is $55 if no

    power cuts but it rises to $73.33 if 25% output

    lost due to power cuts – this is a much higher

    increase than for Location A

    •

    Sales in the future could increase to 40 rugs per

    week so will be easier to meet this demand

    without needing to move to a larger factory or

    open another factory

    0450/22

    February/March 2025

    Recommendation Justification might include:

    •

    Charly should choose Location A as the total

    costs each week are less than half that for

    Location B and this will help CR get started

    without needing to borrow all $20 000 from the

    bank. A smaller bank loan will reduce interest

    payments and make it less likely that CR fails.

    Location B has higher average costs which may

    result in a higher price for the rugs making them

    less likely to sell.

    •

    Charly should choose Location B as it is twice

    as large as Location A and can produce double

    the output at 40 rugs each week so in the long

    term when CR has become well known Charly

    can meet demand without needing to move to a

    larger factory.

    0450/22

    February/March 2025'
