  mark_scheme_answer: 'Explain four reasons why new businesses are at a greater risk
    of failing

    than existing businesses.

    Award 1 mark for each relevant reason (max 4).

    Award a maximum of 1 additional mark for each explanation.

    There are no application marks available for this question.

    Relevant reasons might include:

    •

    Lacks finance – liquidity/cash flow problems

    •

    Poor planning – lack of experience / may not have a business plan

    •

    May lack management knowledge – lacks efficiency / not competitive /

    higher costs

    •

    Inadequate research – no effective market research / not identified

    customer needs

    •

    Lack of demand / poor quality product – cannot pay for costs from sales

    revenue

    •

    Difficulties entering a new market – does not have brand loyalty / there is

    high competition in the market

    •

    Difficulty competing with larger established firms in the market – as

    cannot benefit from economies of scale

    •

    Overexpansion – tries to grow too quickly at the start

    •

    Unable to respond quickly enough to changes in the external influences –

    for example not responding to increase in online sales

    For example: Lacks finance (1) may not have sufficient liquidity to pay current

    liabilities (1).

    8

    0450/22

    February/March 2025'
