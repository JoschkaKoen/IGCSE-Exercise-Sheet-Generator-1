  mark_scheme_answer: 'Using Appendix 3 and other information, consider the effects
    on CR of

    the decrease in taxes and the increase in interest rates in country P.

    Which change is likely to have the greatest effect on CR’s profit in its

    first year? Justify your answer.

    Level

    Description

    3

    Sound application of knowledge and understanding

    of relevant business concepts using appropriate

    terminology.

    Detailed discussion of both changes.

    Well-justified conclusion.

    Candidates discussing both changes in detail, in

    context and with a well-justified conclusion, including

    why the alternative change is rejected, should be

    rewarded with the top marks in the band.

    9–12

    2

    Sound application of knowledge and understanding

    of relevant business concepts using appropriate

    terminology.

    Detailed discussion of at least one change.

    Judgement with some justification/some evaluation

    of choices made.

    Candidates discussing both changes in detail and

    applying them to the case should be rewarded with

    the top marks in the band.

    5–8

    1

    Limited application of knowledge and understanding

    of relevant business concepts.

    Limited ability to discuss the changes with little/no

    explanation.

    Simple judgement with limited justification/limited

    evaluation of choices made.

    Candidates outlining both changes in context should

    be rewarded with the top marks in the band.

    1–4

    0

    No creditable response.

    0

    12

    0450/22

    February/March 2025

    Relevant points might include:

    Decrease in taxes •

    Reduction in tax on people’s income by 5% –

    leading to higher income available for spending

    by consumers – may lead to more spending by

    consumers on luxury rugs – increasing CR’s

    sales and revenue

    •

    A decrease in tax on profits by 2% may leave

    more for investment at the end of the first year –

    more retained profit and more investment into

    the new factory in its second year

    •

    Decrease in tax on spending – may lead to price

    of rugs being lower – decrease prices in shops –

    increases demand and sales

    •

    May reduce grants to businesses – if a decrease

    in government spending because of lower tax

    revenue

    Increase in

    interest rates

    •

    Increase the interest costs of the new bank loan

    – Charly may be less likely to invest in the rug

    making factory – may buy less new equipment

    – higher interest rates increase expenses

    •

    Increases the cost if overdraft needed –

    increases interest payments – higher costs is

    likely to result in a lower profit

    •

    May reduce the available income consumers

    can spend – if they have a mortgage or loan to

    repay – higher repayments – may decrease

    demand for rugs

    •

    Decreased demand for luxury rugs – as

    increase in interest rates may lead to lower

    economic growth in country P – leading to

    higher unemployment and lower incomes for

    consumers – lower revenue for CR

    0450/22

    February/March 2025

    Conclusion

    Justification could include:

    •

    A decrease in taxes will have the biggest effect

    on CR’s profit as consumers will have more

    income after tax to spend. Therefore, revenue

    from the sale of rugs may increase, and if costs

    do not also increase, then profit will increase.

