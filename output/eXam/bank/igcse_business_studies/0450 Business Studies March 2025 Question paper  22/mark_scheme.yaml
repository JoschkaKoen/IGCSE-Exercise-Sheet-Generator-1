    required to hold

    inventory before it is

    sent out to

    customers –

    increasing storage

    costs

    0450/22

    February/March 2025

    Advantages

    Disadvantages

    Selling to a

    wholesaler

    •

    Wholesaler buys in

    bulk – CR sells a

    large volume of rugs

    in one delivery –

    reducing delivery

    costs

    •

    Wholesaler will sell

    the rugs to a wider

    number of retailers –

    reaching a much

    larger market than

