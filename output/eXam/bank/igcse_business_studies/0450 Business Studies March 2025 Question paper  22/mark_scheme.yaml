- number: 1b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Consider the following two types of business organisation that
    Charly

    could choose for her new business. Which type of business

    organisation should Charly choose? Justify your answer.

    •

    Sole trader

    •

    Private limited company

    Level

    Description

    3

    Sound application of knowledge and understanding

    of relevant business concepts using appropriate

    terminology.

    Detailed discussion of the two types of business

    organisation.

    Well-justified recommendation.

    Candidates discussing the two types of business

    organisation in detail, in context and with a well-

    justified recommendation, including why the

    alternative type of business organisation was

    rejected, should be rewarded with the top marks in

    the band.

    9–12

    2

    Sound application of knowledge and understanding

    of relevant business concepts using appropriate

    terminology.

    Detailed discussion of at least one type of business

    organisation.

    Judgement with some justification/some evaluation of

    choice made.

    Candidates discussing one or more type of business

    organisation in detail and applying it to the case

    should be rewarded with the top marks in the band.

    5–8

    1

    Limited application of knowledge and understanding

    of relevant business concepts.

    Limited ability to discuss the types of business

    organisation with little/no explanation.

    Simple judgement with limited justification/limited

    evaluation of choice made.

    Candidates outlining the two types of business

    organisation in context should be  rewarded with the

    top marks in the band.

    1–4

    0

    No creditable response

    0

    12

    0450/22

    February/March 2025

    Relevant points might include:

    Advantages

    Disadvantages

    Sole trader

    •

    Owner is in complete

    control / makes all

    the decisions – likes

    being her  own boss

    with no one to tell

    her what to do –

    prefers making all

    the business

    decisions instead of

    having to consult

    others – such as

    which colour of

    rugs to produce

    •

    Does not have to

    share profits – as

    there is only one

    owner – keeps  all

    the returns from her

    own hard work

    •

    It is easy to set-up –

    as there are few legal

    requirements –

    reducing the costs of

    setting up, such as

    accountancy costs

    •

    Freedom to choose

    her own working

    hours or holidays –

    when she worked for

    the other business,

    she would have to

    work the hours

    stated in her

    employment contract

    – which she would

    have done when she

    worked for the rug

    manufacturer

    •

    Complete privacy –

    she does not have to

    share any financial

    details with anyone

    else – apart from the

    tax office, as she will

    still have to pay tax

    •

    Unlimited liability /

    no limited liability –

    which means all her

    personal

    possessions are at

    risk – not just the

    $10 000 she plans to

    invest in the business

    •

    There is no-one to

    share

    responsibilities with

    or discuss business

    decisions –

    everything for the

    sole trader to decide

    •

    Responsibility of the

    owner – this can be

    stressful, and she

    may be more likely

    to make mistakes

    •

    No continuity – if

    something happens

    to Charly because

    she is ‘the business’

    it will end – unlike a

    company where the

    shares allow it to

    carry on as it has a

    separate legal

    identity

    •

    Lack of capital /

    difficult to raise

    finance – as only the

    $10 000 investment

    from Charly and

    borrowing $20 000

    from the bank is

    available to the

    business – may

    make it more difficult

    to expand in the

    future

    •

    May need to work

    long hours / difficult

    to take holidays /

    increased workload

    0450/22

    February/March 2025

    Advantages

    Disadvantages

    Private limited

    company

    •

    Charly and the

    business are a

    separate legal

    identity – provides

    continuity if

    something happens

    to Charly – company

    can be sued instead

    of Charly

    •

    Charly can sell

    shares to family and

    friends to raise

    capital for the new

    business – larger

    amounts of capital

    may be raised than if

    a sole trader

    •

    Limited liability – will

    not lose personal

    possessions if

    business fails – and

    she is aware that

    as a new business

    is at a greater risk

    of failing

    •

    Cannot be taken

    over without the

    consent of the

    shareholders if there

    are more

    shareholders in the

    business

    •

    Accounts are not

    private – competitors

    producing rugs may

    access the accounts

    •

    Cannot sell shares

    to the public / cannot

    be sold on the stock

    exchange – not easy

    to transfer shares so

    may make it more

    difficult for Charly to

    sell shares to family

    and friends

    •

    Legal formalities

    setting up the rug

    company – has to

    complete paperwork

    to register the

    company which

    takes time and

    money – may take

    more time for Charly

    than setting up as a

    sole trader

    •

    Legal formalities to

    operate the

    company – needs to

    have accounts

    audited and

    registered with the

    government takes

    time and increases

    costs for CR

    0450/22

    February/March 2025

    Recommendation Justification might include:

    •

    Charly should set up as sole trader because she

    will have complete control of which rugs to

    produce and will be able to keep all the profits

    from her hard work without having to share them

    with shareholders, as she may have to give

    dividends to shareholders if she formed a private

    limited company. She should not become a

    private limited company as this would mean that

    competitors may be able to see some of her

    accounts and she could not keep her financial

    data private, which she could if she was a sole

    trader. She will also have to pay to have her

    accounts audited each year which will increase

    costs.

    •

    Charly should set up as a private limited

    company because she will have the protection

    of limited liability which means if CR goes

    bankrupt, she will not lose her personal

    possessions, as she would if she was a sole

    trader, only the $10 000 she plans to invest in

    the business at the start.

    0450/22

    February/March 2025'
