    •

    The website may be

    used to advertise the

    luxury rugs –

    reducing marketing

    costs

    •

    Payment made

    immediately

    compared to a

    wholesaler – may

    improve cash flow if

    revenue received

    before the rug is

    made

    •

    Customers cannot

    see the colours and

    patterns before they

    buy – may be put off

    making the purchase

    leading to lower

    sales

    •

    Can be very

    expensive to

    post/deliver the rugs

