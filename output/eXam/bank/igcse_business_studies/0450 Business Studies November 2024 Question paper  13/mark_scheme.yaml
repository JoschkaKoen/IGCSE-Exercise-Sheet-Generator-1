  mark_scheme_answer: 'Do you think batch production is the best method of production
    for a

    business to use? Justify your answer.

    Award up to 2 marks for identification of relevant points.

    Award up to 2 marks for relevant development of points.

    Award up to 2 marks for a justified decision as to whether batch production is

    the best method of production for a business to use.

    Points might include:

    Batch production:

    •

    (Some) flexibility [k] so can change what to make / quickly adapt to meet

    customer demands [an]

    •

    Production may not be greatly affected if machinery breaks down [k], so

    some output made [an]

    •

    Variety/range of products made [k] which could widen its customer

    base / help spread risk [an]

    6 This is a general question so there are no

    marks for application.

    Some points can be awarded as [k] or [an]

    but do not award the same point twice.

    0450/13

    October/November 2024

    Notes

    •

    Can motivate workers [k] leading to less absenteeism / lower labour turnover

    [an]

    •

    Time lost switching/resetting machines between batches [k] could lead to

    lost output / lower efficiency / lower productivity [an]

    •

    Need to move/store semi-finished goods [k] increased storage costs [an]

    •

    One fault could affect entire batch [k] leading to waste [an]

    Flow production [k]

    •

    High output [an]

    •

    Likely to benefit from (purchasing) economies of scale / discounts for bulk

    purchasing [an] reducing average costs [an]

    •

    Capital intensive methods can be used / fewer employees needed [an]

    lowering wage cost [an]

    •

    If one machine breaks down the whole production line will stop [an]

    •

    High set up costs [an]

    •

    Inflexible (if demand changes) [an]

    Job production [k]:

    •

    Unique / meet exact customer needs [an] which can help brand loyalty

    [an]

    •

    Can charge higher price [an] which may increase profit margin [an]

    •

    Skilled labour needed [an] which increases labour costs [an]

    •

    No economies of scale [an] leading to higher average cost [an]

    •

    Production can take a long time [an] lowering potential output [an]

    •

    Costs are higher as it is labour intensive [an]

    •

    Mistakes can be expensive to correct [an]

    Other appropriate responses should be credited.

    0450/13

    October/November 2024

    Notes

    Justification might include:

    Batch production is flexible [k] so can change what is made quickly to adapt to

    customer demands [an]. An alternative is flow production [k] which allows for

    high levels of output [an]. Batch production is the best method because there

    is limited value in producing a high level of output if there is no demand [eval].

    Being able to adapt to changes in customer demand is likely to be more

    important to ensure customer loyalty / revenue. [eval]

    0450/13

    October/November 2024

    Notes'
