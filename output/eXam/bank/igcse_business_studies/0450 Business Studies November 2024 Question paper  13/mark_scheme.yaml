  mark_scheme_answer: 'Do you think crowdfunding is the best source of finance for
    a start-up

    business to use? Justify your answer.

    Award up to 2 marks for identification of relevant points.

    Award up to 2 marks for relevant development of points.

    Award up to 2 marks for a justified decision as to whether crowdfunding is the

    best source of finance for a start-up business.

    Points might include:

    •

    No initial fee is payable [k] so does not increase cash outflows [an]

    •

    Allows for the public reaction to be tested / help advertise [k] which could

    lead to more customers [an]

    •

    Proposal may be rejected [k] using time which could have been used for

    other purposes [an]

    •

    May allow competitors the opportunity to learn more about your business

    before launch [k] which could lead to fewer sales / less revenue [an]

    •

    No guarantee can raise full amount / not raise enough funds [k] so may

    have to find another source [an]

    Other sources might include:

    •

    Own savings [k] as there is no need to repay [an] but may not have

    sufficient funds [an]

    •

    (Bank) loan [k] so more likely to raise full amount needed (quickly) [an] but

    will need to pay interest [an]

    Other appropriate responses should be credited.

    Justification might include:

    An advantage of crowdfunding is no initial fee is payable [k], so it does not

    increase cash outflows [an]. An alternative is a bank loan [k] which could raise

    the full amount needed [an]. Crowdfunding is the best source because a new

    business is risky so the bank may not lend to them anyway [eval] and even if it

    did, it may not be able to afford the repayments [eval].

    6 This is a general question so there are no

    marks for application.

    Some points can be awarded as [an] for

    different methods but do not award the

    same point twice.

    0450/13

    October/November 2024

    Notes'
