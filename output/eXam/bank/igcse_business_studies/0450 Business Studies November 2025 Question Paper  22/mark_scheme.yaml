  mark_scheme_answer: 'Consider the following two sources of finance which could be
    used for

    working capital when FF’s new shop opens. Which would be the best

    source for Kathryn to use? Justify your answer.

    •

    Bank overdraft

    •

    Trade credit

    Level

    Description

    3

    Sound application of knowledge and understanding of

    relevant business concepts using appropriate terminology.

    Detailed discussion of both sources of finance.

    Well-justified recommendation.

    Candidates discussing in detail both sources of finance, in

    context and with a well-justified recommendation, including

    why the alternative source is rejected, should be rewarded

    with the top marks in the band.

    9–12

    2

    Sound application of knowledge and understanding of

    relevant business concepts using appropriate terminology.

    Detailed discussion of one or more sources of finance.

    Judgement with some justification / some evaluation of

    choice made.

    Candidates discussing both sources of finance in detail and

    applying them to the case should be rewarded with the top

    marks in the band.

    5–8

    1

    Limited application of knowledge and understanding of

    relevant business concepts.

    Limited ability to discuss the sources of finance with little/no

    explanation.

    Simple judgement with limited justification / limited

    evaluation of choice made.

    Candidates outlining both sources of finance in context

    should be rewarded with the top marks in the band.

    1–4

    0

    No creditable response.

    0

    12

    0450/22

    October/November

    2025

    Relevant points might include:

    Advantages

    Disadvantages

    Bank overdraft

    •

    Can be quick to

    arrange – so finance

    available straight

    away

    •

    May be arranged for

    varying lengths of

    time for repayment –

    longer time to pay it

    back from the sale of

    wedding flowers –

    helping to avoid a

    cash flow problem

    •

    Amount overdrawn will

    have to be repaid with

    interest – increases

    expenses – may lead

    to higher prices for

    flower arrangements

    charged or reduced

    profits

    •

    May need to provide

    collateral – may lose

    assets if overdraft

    cannot be repaid

    •

    May have to pay a

    high interest rate due

    to it being a small

    business and may be

    seen as high risk –

    raises costs further

    •

    Interest rate may be

    variable so if interest

    rates increase later FF

    will be affected –

    increased risks for FF

    0450/22

    October/November

    2025

    Advantages

    Disadvantages

    Trade credit

    •

    Is effectively an

    interest-free loan –

    unless penalties for

    late payment are

    made

    •

    May be able to

    receive revenue from

    sales of flowers

    before paying

    supplier as has a

    good relationship

    with her supplier –

    improves cash flow

    •

    Supplier may refuse to

    supply if payment is

    not made as agreed –

    may damage the

    relationship with

    supplier – unable to

    meet orders spoiling

    FF’s good reputation

    •

    Supplier may refuse to

    offer discounts for the

    flowers at all if

    payment is not made

    as agreed – may

    increase costs – which

    could lead to higher

    prices as FF may use

    cost-plus pricing

    Recommendation Justification might include:

    •

    A bank overdraft is the best source of finance to

    use as a sufficient amount of capital may be

    arranged which will pay for all the operating costs

    for the new flower shop. Some suppliers may not

    be willing to provide FF with trade credit leaving

    them short of working capital.

    •

    Trade credit is the best source of finance to use as

    FF can use it to purchase the flowers and then sell

    them to receive the revenue before payment is

    due. This is an interest free source of finance for

    the day-to-day running of the third shop.

    0450/22

    October/November

    2025'
