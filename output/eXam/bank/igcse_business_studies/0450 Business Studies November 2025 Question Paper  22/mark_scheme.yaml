  mark_scheme_answer: 'Explain two reasons why FF uses job production.

    Award 1 mark for reason why FF uses job production (max 2).

    Award a maximum of 3 additional marks for each explanation of why FF uses

    job production – one of which must be applied to this context.

    Reasons might include:

    •

    Is suitable for individual/unique products – makes them more competitive

    – leading to higher revenue/sales

    •

    Meets the exact needs of customers – so increases customer satisfaction

    – increases reputation and word of mouth advertising

    •

    The employees have more varied jobs – as may carry out all the tasks to

    produce the product – increasing employee motivation

    •

    A higher price can be charged – as the product is a ‘one-off’ for the

    customer – willing to pay a higher price for a product that is exactly what

    they want

    •

    Production can be of a higher quality – because each product is

    individually made

    For example: The flower shop will produce wedding flower arrangements

    (app) that are specially designed for customers (1) and more closely meets

    the exact needs of these customers (1) so is more likely to increase customer

    recommendations (1).

    Application could include: new shop/third shop; 2 shops; flowers; source of

    finance required for working capital; weddings; bride/groom; ribbons;

    reputation for high quality; contribute to sustainable development; targets a

    niche market; 4/8 employees at each shop; bride; average price paid is

    $2000; supplies purchased each day; supplies are fresh; small business;

    marketing mix for the new shop; social media reviews.

    8

    0450/22

    October/November

    2025'
