  mark_scheme_answer: 'Consider the following two methods Kathryn could use to communicate

    with her suppliers. Which method should Kathryn use if an order is

    needed quickly? Justify your answer.

    •

    Telephone calls

    •

    Emails

    Level

    Description

    3

    Sound application of knowledge and understanding of

    relevant business concepts using appropriate terminology.

    Detailed discussion of both methods.

    Well-justified recommendation.

    Candidates discussing both methods, in context and with a

    well-justified recommendation, including why the alternative

    method was rejected, should be rewarded with the top

    marks in the band.

    9–12

    2

    Sound application of knowledge and understanding of

    relevant business concepts using appropriate terminology.

    Detailed discussion of at least one method.

    Judgement with some justification / some evaluation of

    choice made.

    Candidates discussing at least one method in detail and

    applying it to the case should be rewarded with the top

    marks in the band.

    5–8

    1

    Limited application of knowledge and understanding of

    relevant business concepts.

    Limited ability to discuss the methods with little/no

    explanation.

    Simple judgement with limited justification / limited

    evaluation of choice made.

    Candidates outlining both methods in context should be

    rewarded with the top marks in the band.

    1–4

    0

    No creditable response.

    0

    12

    0450/22

    October/November

    2025

    Relevant points might include:

    Advantages

    Disadvantages

    Telephone calls

    •

    Speaks directly to each

    supplier of ribbons –

    gets immediate

    feedback – so knows the

    message has been

    received

    •

    Can verify if the

    message for the order

    of fresh flowers is

    understood – answer

    questions about the

    orders – to ensure the

    correct flowers are

    delivered – possibly

    meeting customer

    orders more quickly

    •

    Know the message has

    been received – with

    having a good

    relationship with the

    supplier which means

    they will answer and

    take the order

    •

    Suppliers may not

    answer – delay in

    order being taken –

    delivery of flowers

    may be delayed –

    which slows

    production and may

    be late being

    delivered to a

    wedding

    •

    Poor connection

    over the network

    used – may distort

    the message and

    make it difficult to

    understand –

    resulting in wrong

    order being made –

    which may lead to

    under or over

    ordered flowers

    •

    Could take a long

    time to call

    suppliers – may not

    answer straight

    away and may

    need to call several

    times taking time

    that could be used

    for something else

    •

    No permanent

    record of the

    conversation – if an

    incorrect order is

    made there is no

    proof the supplier

    made a mistake

    0450/22

    October/November

    2025

    Advantages

    Disadvantages

    Emails

    •

    Provides a written

    record for FF to refer to

    – if the suppliers do not

    meet the order correctly

    and the wrong flowers

    are delivered

    •

    Can be referred to at

    different times to check

    on the amount of

    perishable supplies

    ordered to ensure the

    correct order is delivered

    on the correct date

    •

    Kathryn does not have

    to be in the office to

    send the order – can be

    sent out of usual office

    hours – may be more

    convenient especially as

    FF is a small business

    •

    Some suppliers

    may not have

    access to a reliable

    internet connection

    – so FF may not

    know the order for

    ribbons has not

    been received

    •

    The order may not

    be seen if there are

    too many emails to

    read and get lost or

    missed

    •

    May go into junk –

    so supplier of

    packaging is

    unaware there is an

    order

    Recommendation Justification might include:

    •

    A telephone call should be made if the order for

    ribbons is needed quickly to ensure the message is

    received. Feedback can clarify that the correct

    order has been made. An email may get lost

    amongst many emails and the urgency may not be

    realised, therefore making the order late being

    processed and delivery of the flower arrangements

    for the wedding being delayed.

    •

    An email should be used as it is sent straight away,

    and the supplier of fresh flowers can reply letting

    FF know that the order has been received and if it

    can be dispatched straight away.

    0450/22

    October/November

    2025'
