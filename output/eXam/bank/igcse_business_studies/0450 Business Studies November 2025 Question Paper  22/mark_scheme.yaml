  mark_scheme_answer: 'Explain four ways a business plan could help Kathryn.

    Award 1 mark for each relevant way (max 4).

    Award 1 additional mark for each explanation of the way applied to this

    context.

    Relevant ways might include:

    •

    To help gain a bank loan/overdraft – to open the new shop

    •

    To help give the business a sense of purpose and direction – selling

    wedding flowers

    •

    To calculate the costs of setting up the business – in this niche market

    •

    To predict cash flow problems – when deciding the source of finance for

    working capital

    •

    To help identify if there is sufficient demand for the product

    •

    To help set prices – for the high-quality products

    •

    To help identify the skills / type of employees needed – to prepare the

    flowers

    •

    To help choose the promotional methods to use

    •

    To help allocate resources

    For example: To help with an application for a bank loan (1) in order to open

    the new flower shop (app).

    Application could include: new shop/third shop; 2 shops; flowers; source of

    finance required for working capital; weddings; bride/groom; ribbons;

    reputation for high quality; contribute to sustainable development; targets a

    niche market; 4/8 employees at each shop; bride; average price paid is

    $2000; supplies purchased each day; supplies are fresh; uses job production;

    small business; marketing mix for the new shop.

    8

    0450/22

    October/November

    2025'
