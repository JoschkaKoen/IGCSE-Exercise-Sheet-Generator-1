  mark_scheme_answer: 'Explain two reasons why high quality is important for FF

    Award 1 mark for each reason (max 2).

    Award a maximum of 3 additional marks for each explanation of the reason

    why high quality is important – one of which must be applied to this context.

    Reasons might include:

    •

    To establish a brand image – so that customers are encouraged to buy

    the product – new customers are attracted

    •

    To maintain a good reputation / to not gain a bad reputation – friends and

    family tell others about the goods/service which may lead to a  good/bad

    reputation – increasing/decreasing sales

    •

    To increase sales / attract more customers – due to customer needs

    being satisfied by the products supplied

    •

    So that faulty products do not have to be replaced – which would reduce

    waste / ensures customer safety / avoids legal action

    •

    Able to charge a high price – may lead to higher profit margin / as may

    increase added value

    For example: To maintain a good reputation (1) because if quality is not good

    then friends and family will tell others about the product which may lead to a

    bad reputation (1) and sales will be lower (1) for the new flower shop (app).

    Application could include: new shop/third shop; 2 shops; flowers; source of

    finance required for working capital; weddings; bride/groom; ribbons;

    contribute to sustainable development; targets a niche market; 4/8 employees

    at each shop; bride; average price paid is $2000; supplies purchased each

    day; supplies are fresh; uses job production; small business; marketing mix

    for the new shop; social media reviews.

