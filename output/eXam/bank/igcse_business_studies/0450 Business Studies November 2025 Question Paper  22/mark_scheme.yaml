- number: 2a
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Explain two benefits and two limitations of a business operating
    in a

    niche market.

    Award 1 mark for each benefit/limitation (max 2 benefits/2 max limitations).

    Award a maximum of 1 additional mark for each explanation of the

    benefit/limitation.

    There are no application marks for this question.

    Relevant benefits might include:

    •

    Fewer businesses may be competitors in this part of the market – less

    need to spend on marketing the product

    •

    The needs of the consumer can be more closely focused on – therefore

    their needs will be met giving high consumer satisfaction

    •

    Increased sales and revenue as product meets customer needs

    •

    Higher price can be charged – as product may be seen as high-status or

    exclusive

    •

    Increased customer loyalty

    Relevant limitations might include:

    •

    Niche markets are usually relatively small – therefore sales are likely to

    be smaller than in a mass market

    •

    Limits potential growth in the market – profits may be limited in the future

    •

    May mean the business specialises in one product – increased risk if the

    product has a fall in demand

    •

    Small size of the market means that economies of scale are unlikely –

    resulting in higher unit costs

    •

    High profits may attract competitors into the market – prices may have to

    be reduced

    For example: The business can focus more closely on customer needs (1)

    therefore their needs will be met giving high consumer satisfaction (1).

    8

    0450/22

    October/November

    2025'
