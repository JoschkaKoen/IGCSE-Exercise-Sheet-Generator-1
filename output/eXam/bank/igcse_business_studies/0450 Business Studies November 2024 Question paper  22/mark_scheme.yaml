- number: 1b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Consider the advantages and disadvantages of the following
    three

    methods BB could use to motivate its production workers. Which

    method should BB use? Justify your answer.

    •

    Piece rate

    •

    Teamworking

    •

    Job rotation

    Level

    Description

    3

    Sound application of knowledge and understanding

    of relevant business concepts using appropriate

    terminology.

    Detailed discussion of two or more methods.

    Well-justified recommendation.

    Candidates discussing all three methods, in context

    and with a well-justified recommendation, including

    why the alternative methods were rejected, should

    be rewarded with the top marks in the band.

    9–12

    2

    Sound application of knowledge and understanding

    of relevant business concepts using appropriate

    terminology.

    Detailed discussion of at least one method.

    Judgement with some justification/some evaluation of

    choice made.

    Candidates discussing two or more methods in detail

    and applying these to the case should be rewarded

    with the top marks in the band.

    5–8

    1

    Limited application of knowledge and understanding

    of relevant business concepts.

    Limited ability to discuss the methods with little/no

    explanation.

    Simple judgement with limited justification/limited

    evaluation of choice made.

    Candidates outlining the three methods in context

    should be rewarded with the top marks in the band.

    1–4

    0

    No creditable response.

    0

    12

    0450/22

    October/November

    2024

    Relevant points might include:

    Piece rate

    •

    Employees would receive payment for each

    product/task they carry out – encourages them

    to work harder/carry out more tasks – produce

    more output – possibly increased sales from

    higher output of bikes

    •

    Taylor – increased pay leads to employees being

    more motivated and may reduce the high

    labour turnover

    •

    May be unfair if some tasks take longer than other

    tasks – so some employees gain more than

    others in higher payment – may demotivate some

    employees

    •

    If machinery breaks down, then the employees

    will earn less total pay

    •

    The 100 skilled production employees may

    work quickly to earn higher wages and hence may

    make more mistakes/reduce quality

    •

    May not be able to sell the increased output –

    increasing storage costs

    •

    May be difficult to measure the output of each of

    the 100 production employees – so difficult to

    calculate piece–rate and easier to stick to paying

    $10 per hour

    Teamworking

    •

    Production employees become more involved

    with the decision–making when working together

    in a team – makes them feel more valued as have

    more responsibility in the production process

    manufacturing bicycles

    •

    Feel have more control over tasks – more loyal

    to BB – less likely to leave so may reduce

    recruitment costs

    •

    Some parts of the flow production process may

    not easily be divided so a team of employees can

    work together/may not be easy to apply to the

    flow production process

    0450/22

    October/November

    2024

    Job rotation

    •

    Makes the employees’ job more interesting/less

    boring

    •

    Change tasks around from one product to another

    on the flow production line – and may need

    different skills to complete this work

    •

    May keep working with different employees from

    the 100 production workers which employees

    prefer

    •

    May increase training requirements as each

    worker may only be able to perform one task –

    so may need additional training to carry out

    different tasks – increases costs for BB

    •

    Quality of bikes may be lower if employees are

    less specialised in different tasks

    •

    May mean sometimes a worker does a job that is

    not liked – may reduce motivation

    •

    May only be motivating in the short term until the

    worker gets used to the new tasks

    •

    Does not make the individual tasks themselves

    more interesting

    Recommendation

    Justification might include:

    •

    Introducing piece–rate should be chosen as it will

    motivate the 100 production employees to

    increase output to increase their wages. BB will

    earn a higher revenue if all output is sold, and

    employees are less likely to leave. Teamworking

    may make employees feel more motivated but

    may not lead to a higher output just happier

    production employees. Job rotation may not

    increase motivation if the different tasks are all

    equally boring on the production line.

    •

    Introducing teamworking should be chosen as

    this will make employees feel some control over

    the tasks they carry out on the flow production

    line and will give them chance to work together

    leading to higher motivation and they are less

    likely to leave.

    •

    Introducing job rotation between tasks producing

    bikes is the best method to choose because it

    will not cost BB any money if no training is

    required. It will give variety to the employees’ jobs

    and will encourage them to stay at BB instead

    of leaving.

    0450/22

    October/November

    2024'
