  mark_scheme_answer: 'Explain one way each of the following stakeholder groups might
    be

    affected by a business becoming a multinational company.

    Award 1 mark for how each stakeholder group will be affected (max 2 marks

    for each stakeholder group).

    Award a maximum of 1 additional mark for each explanation of how the

    stakeholder group will be affected.

    There are no application marks available for this question.

    Effects on shareholders might include:

    •

    Value of assets of company increases – as increased profit can be

    reinvested

    •

    Increased dividends – profit increases from avoiding barriers to trade

    •

    Lower dividends – if need to fund expansion into other countries

    •

    Increased share price/value of shares increases – as becomes a more

    well-known business due to market share increasing

    •

    Easier to sell shares – as the company is known globally with higher

    revenue/profit/better image

    Effects on employees might include:

    •

    May lose jobs – as business moves to produce in a country with lower

    labour/production costs

    •

    May gain promotion – from business expanding into different markets

    / business can access a larger target market and additional jobs may be

    required

    •

    May have a more secure job – as business remains competitive if

    competitor companies are also expanding abroad

    •

    Higher wages paid – as business is more successful and can afford to

    increase wage rates

    Effects on suppliers:

    •

    May have increased sales – as output of multinational increases

    •

    May lose sales – as multinational may purchase from cheaper suppliers in

    other countries

    Effects on government:

    •

    Higher tax revenue if higher profit repatriated

    •

    May lose tax revenue if multinational locates head office in another

    country

    For example: Employees may lose their jobs (1) as the business becomes a

    multinational company and moves its production to another country to lower

    labour/production costs (1).

    8

    0450/22

    October/November

    2024'
