  mark_scheme_answer: 'Explain two effects of BB having a short chain of command.

    Award 1 mark for each effect (max 2).

    Award a maximum of 3 additional marks for each explanation of the effect of

    having a short chain of command – one of which must be applied to this

    context.

    Relevant effects might include:

    •

    Communication is more accurate – as fewer people for messages to be

    passed through – less chance of errors being passed on

    •

    Senior managers are less remote from lower levels in the hierarchy -

    allows these managers to be more aware of the views of employees -

    less likely to be disputes between production employees and managers

    •

    Decision–making can be quicker – as fewer levels to discuss issues and

    pass on decisions – react to customer changes more quickly

    •

    Manager may have a wider span of control – which may increase the

    opportunities for delegation – employees feel more trusted/greater job

    satisfaction

    •

    Managers may have less control of what their subordinates are doing

    may be more likely for subordinates to make mistakes – increases costs

    •

    Increased workload for managers

    •

    Communication is quicker

    For example: Communication is more accurate (1) as there are fewer people

    for messages to be passed through (1) less chance of errors in the messages

    (1) about the production of bikes (app).

    Application could include: new factory; bikes; flow production; wants to

    become a multinational company; bike manufacturer; exports 30%; target

    market of adults and young children; bike components e.g. gears; 100

    production workers; sells through specialist bicycle shops; higher labour

    turnover; flat organisational structure; named director/manager from Appendix

    1.

    8

    0450/22

    October/November

    2024'
