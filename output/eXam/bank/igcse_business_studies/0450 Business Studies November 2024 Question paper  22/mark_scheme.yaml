  mark_scheme_answer: 'Explain two advantages and two disadvantages of BB being a
    public

    limited company.

    Award 1 mark for each relevant advantage/disadvantage (max 4).

    Award 1 additional mark for each explanation of the advantage/disadvantage

    applied to this context.

    Relevant advantages might include:

    •

    Able to sell shares to the public – so additional capital can be raised to

    finance the new factory

    •

    Rapid expansion possible by raising large sums of capital – to become a

    multinational company

    •

    Limited liability would encourage more people to invest in the public

    limited company

    •

    Continuity

    Relevant disadvantages might include:

    •

    Accounts available to the public – competing bike manufacturers can see

    the accounts

    •

    Pressure to pay large dividends to shareholders – this restricts the

    planned expansion for the children’s bike

    •

    Risk of takeover/original owners may lose control – and use its flow

    production line to produce competitors’ products

    •

    Divorce between ownership and control

    •

    More complex accounting and reporting requirements/more legal

    formalities

    For example: Able to sell shares to the public (1) so additional capital can be

    raised to finance the new factory (app).

    Application could include: new factory; bikes; flow production; wants to

    become a multinational company; bike manufacturer; exports 30%; target

    market of adults and young children; components of bikes e.g. gears; 100

    production workers; sells through specialist bike shops; high labour turnover;

    sales have increased every year since set up.

    8

    0450/22

    October/November

    2024'
