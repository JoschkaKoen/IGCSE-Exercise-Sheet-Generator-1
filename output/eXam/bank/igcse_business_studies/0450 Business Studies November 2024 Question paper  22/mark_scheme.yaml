  mark_scheme_answer: 'Explain two reasons why BB might want to sell its products
    in new

    markets in other countries.

    Award 1 mark for each reason (max 2).

    Award a maximum of 3 additional marks for each explanation of the reason why

    BB might want to enter new markets in other countries – one of which must be

    applied to this context.

    Relevant reasons might include:

    •

    Much greater growth potential than existing market – populations may be

    increasing and incomes rising – enabling more people to afford BB’s

    products

    •

    Home market has slow growth – so future growth in sales is limited – new

    markets provide opportunities for growth not available in the existing

    market

    •

    May encourage more production to be located in other countries as well

    as sales – provides more information on these markets to lead to better

    understanding of these customers

    •

    New developments in marketing may make it easier to reach consumers

    in foreign markets

    •

    To increase sales of BB’s products – increases revenue and possibly

    profit if distribution costs are not too high

    •

    Spreads risk – less dependent on one market for its sales

    For example: There may be much greater growth potential than existing

    market (1) because population and incomes may be rising (1) which enables

    more people to afford BB’s bikes (app) so sales and revenue will increase (1).

    Application could include: new factory; bikes; flow production; wants to

    become a multinational company; bike manufacturer; exports 30%; target

    market of adults and young children; bike components e.g. gears; 100

    production workers; paid $10 per hour; sells through specialist bicycle shops;

    sales have not grown for 3 years.

    8

    0450/22

    October/November

    2024'
