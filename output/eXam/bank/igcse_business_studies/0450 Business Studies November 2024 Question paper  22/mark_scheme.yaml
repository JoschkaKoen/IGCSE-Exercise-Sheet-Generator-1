  mark_scheme_answer: 'Using Appendix 3 and other information, consider BB’s financial

    performance compared to its main competitor. Do you think BB’s

    financial performance is better than its competitor? Justify your answer

    using appropriate calculations.

    Level

    Description

    3

    Sound application of knowledge and understanding

    of relevant business concepts using appropriate

    terminology.

    Detailed discussion whether BB or its competitor has

    the better financial performance.

    Well-justified conclusion.

    Candidates discussing in detail whether or not BB

    has a better financial performance than its competitor,

    in context and with a well-justified conclusion should

    be rewarded with the top marks in the band.

    9–12

    2

    Sound application of knowledge and understanding

    of relevant business concepts using appropriate

    terminology.

    Detailed discussion of whether BB or its competitor

    has a good financial performance.

    Judgement with some justification/some evaluation of

    choice made.

    Candidates discussing in detail whether BB and its

    competitor has a good financial performance and

    applying it to the case with a well justified conclusion

    should be rewarded with the top marks in the band.

    5–8

    1

    Limited application of knowledge and understanding

    of relevant business concepts.

    Limited ability to discuss the financial performance of

    BB and its competitor with little/no explanation.

    Simple judgement with limited justification/limited

    evaluation of choice made.

    Candidates outlining the financial performance of BB

    and its competitor in context should be rewarded

    with the top marks in the band.

    1–4

    0

    No creditable response.

    0

    12

    0450/22

    October/November

    2024

    Relevant points might include:

    Level 1

    •

    The return on capital employed is twice as high

    as its competitor at 30%

    •

    BB has taken out a bank loan for $10m which is

    $50m lower than the competitor

    •

    Gross profit is only half the amount of the

    competitor’s at $60m

    •

    BB has $80m less revenue than its competitor at

    $120m for the year

    •

    The acid test ratio is higher at 1.3

    •

    Revenue is lower at $120m for BB and sales

    have not been increasing for its bestselling

    children‘s bicycle

    •

    Profit is a lot lower than its competitor’s profit

    statements

    Level 2

    statements

    •

    The return on capital employed is higher for BB

    at 30% and indicates that BB gains $30 return

    for every $100 dollars invested in BB but the

    competitor only returns $15 for every $100

    invested so BB is more efficient in its use of

    capital

    •

    The acid test ratio of 0.67 for BB’s competitor

    shows that after inventories have been removed

    from current assets it cannot pay all its current

    liabilities when they fall due for payment. This

    may make it difficult for the competitor to keep

    trading if it cannot pay its current liabilities

    without relying on cash inflows from the sale of

    inventories

    •

    The acid test ratio for BB is good at 1.3 and

    indicates that BB can repay its current liabilities

    by 1.3 times – so liquidity is good. However, this

    may suggest that current assets could be put to

    better use in the business to increase revenue

    •

    The gross profit margin for BB’s competitor is

    60%

    •

    The gross profit margin for BB is 50%

    •

    The profit margin for BB’s competitor is 20%

    •

    The profit margin for BB is 5%

    0450/22

    October/November

    2024

    Conclusion

    •

    BB’s financial performance is better than its

    competitor as the acid test ratio of 1.3 indicates

    that BB has better liquidity than its competitor

    with only an acid test ratio of 0.67. BB may be

    able to pay any current liabilities more easily. BB

    is at less risk of insolvency than its competitor

    and has $50m fewer loans to repay than its

    competitor. The competitor may have higher

    gross profit margin and higher profit margin, but

    these do not lead to a higher ROCE.

    •

    BB’s competitor has a better financial

    performance as the gross profit margin is higher

    by 10% and the profit margin is also higher by

    15%.'
