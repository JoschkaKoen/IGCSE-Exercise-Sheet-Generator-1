    Relevant points might include:

    Adding new

    features

    •

    Bike will have additional features – such as

    more gears – making it easier to ride and

    therefore attractive to a wider range of

    customers

    •

    Bikes may be better than competitors’ bikes

    – encouraging customers to buy BB’s bikes

    instead of competitors’ bikes

    •

    May encourage existing customers to get rid

    of their old bike and buy a bike with the new

    features – as they will want the most up-to-

    date version to show their friends – increasing

    revenue

    •

    Takes time and cost to develop the new

    features of the product

    Start selling in toy

    shops

    •

    A different target market will see the

    children’s bike in toy shops and may be

    attracted to buy it as usually sold through

    specialist bike shop so will not usually be

    seen by these other customers – increasing

    sales

    •

    May be more toy shops in country X than

    specialist bike shops – making the bike

    more accessible to potential customers –

    greater number of shops where can buy/see

    the bike so more likely to buy the bike

    •

    Potential customers go into toy shops to buy

    other products such as a scooter – see the

    bike whilst in the toy shop and may be

    attracted to buy one

    •

    Also selling competitors’ products so may be

    more competition

    0450/22

    October/November

    2024

    Television

    advertising

    campaign

    •

    A wider range of people will see the

    advertisement and will become aware of the

    bike – leading to higher sales

    •

    TV adverts can be attractive and persuasive

    – using moving images and colour to attract

    children or their parents to purchase a bike

    – can reinforce the brand image and attract

    customers

    •

    The TV advert can be put on between

    programmes that are watched by children –

    so they are seen by target customers –

    increasing the effectiveness of the marketing

    budget

    •

    High cost of television advertising

    Recommendation

    Justification might include:

    •

    Bikes with new features will attract existing

    customers to upgrade their bike leading to

    increased sales. These customers are already

    familiar with the BB brand and will want the

    latest version of the bike. Selling through toy

    shops will be less effective as customers may

    not go to toy shops to buy a bike, preferring

    instead to go to a specialist shop where they

    can get advice. A TV campaign may not be

    effective if customers do not watch television.

    •

    Starting to sell through toy shops should be

    used as it will enable BB to reach a wider

    market of potential customers including

    children and their parents and therefore,

    they may be more likely to buy a BB bike if

    they are now aware of the product.

    •

    A new TV campaign should be used as it will

    make many more people aware of the

    children’s bike and parents might be

    attracted to buy one leading to increased

    revenue.

    0450/22

    October/November

    2024'
