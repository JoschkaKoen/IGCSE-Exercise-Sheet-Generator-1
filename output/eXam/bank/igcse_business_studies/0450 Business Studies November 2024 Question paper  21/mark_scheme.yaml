  mark_scheme_answer: 'Explain two reasons why CC might need finance.

    Award 1 mark for each relevant reason (max 2).

    Award a maximum of 3 additional marks for each explanation of the reason why

    finance may have been needed – one of which must be applied to this

    context.

    Relevant answers might include:

    •

    For the purchase of investment / capital goods – buy equipment to

    replace worn out machinery – high amount of finance needed so may not

    all be from owner’s capital

    •

    To finance the expansion/growth of the business – the business plans to

    increase output on a larger scale so may need a larger factory

    •

    To invest in the latest technology – to remain competitive

    •

    To provide working capital / pay expenses / fixed costs / variable

    costs / overheads / day-to-day expenses – e.g. payment of wages / raw

    materials – if not able to pay costs then output cannot be produced and/or

    prevents cash flow problems / lack of liquidity

    •

    Development of new product / new markets – high cost of producing

    prototypes / cost of market research for new product – outflow of cash with

    no inflow for a certain time

    •

    Start up another new business – needs to purchase equipment / raw

    materials owner may lack sufficient capital and/or – may take time for

    sufficient cash to be built up in the business to pay for assets

    For example: For the purchase of investment goods (1) to replace old worn-out

    machinery (1) for example machinery to produce cookies (app) to improve

    productivity and remain competitive (1).

    Application could include: cookies; high-quality products; small business; sole

    trader; established for 5 years; considering taking out a bank loan; using

    specialized baking equipment; sells at own shop; wants to sell more cookies;

    developing new cookies;10 production employees; 5 shop employees;

    Operations manager; fresh ingredients purchased regularly.

    8

    0450/21

    October/November

    2024'
