  mark_scheme_answer: 'Explain two benefits and two limitations of CC using batch
    production.

    Award 1 mark for each relevant benefit/limitation (max 4).

    Award 1 additional mark for each explanation of the benefit/limitation

    applied to this context.

    Relevant benefits might include:

    •

    Flexible way of working – can easily change to produce cookies for

    different special occasions

    •

    More variety in tasks than if flow production is used – better motivation for

    the 10 production employees

    •

    More variety of products produced - to have personal messages written on

    them

    •

    Production may not be affected too much if baking equipment breaks

    down

    •

    Larger quantity produced than job production – can keep restocking the

    shop with full variety of cookies

    •

    Raw materials can be purchased in larger quantities than job production

    so gain discounts / economies of scale / lower unit cost of fresh

    ingredients

    Relevant limitations might include:

    •

    Can be expensive / awkward to move part-finished goods around the

    factory – the business is only small

    •

    Machines have to be reset between batches – takes time / delays

    production for the new Operations Manager

    •

    One mistake in production may mean the whole batch is affected / needs

    to be thrown away – wasted ingredients

    •

    Warehouse space needed - for finished batches stored before being sold

    in CC’s shop

    •

    Size of batch may be too small – not enough cookies to meet

    demand / may be too large / left over cookies if not popular

    •

    May be more repetitive than job production – 10 production workers may

    become bored

    For example: Flexible way of working (1) and can easily change the

    production process to produce different types of cookies (app).

    Application could include: cookies; sells at own shop; messages put on cookies;

    10 production employees; 5 shop employees; Operations manager; fresh

    ingredients; special occasions; small business; sole trader; established for 5

    years; competitors’ products sold in retail shops in other cities, personalised

    messages.

    8

    0450/21

    October/November

    2024'
