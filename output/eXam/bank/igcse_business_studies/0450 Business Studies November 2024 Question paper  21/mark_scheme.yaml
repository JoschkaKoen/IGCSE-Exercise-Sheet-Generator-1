- number: 2b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Consider how a decrease in interest rates and an increase in
    taxes in

    country P could affect CC. Which is likely to have the biggest effect on

    CC’s profit? Justify your answer.

    Level

    Description

    3

    Sound application of knowledge and

    understanding of relevant business concepts using

    appropriate terminology.

    Detailed discussion of both changes.

    Well-justified conclusion.

    Candidates discussing both changes in detail, in

    context and with a well-justified conclusion,

    including why the alternative change, is rejected

    should be rewarded with the top marks in the

    band.

    9–12

    2

    Sound application of knowledge and

    understanding of relevant business concepts using

    appropriate terminology.

    Detailed discussion of at least one change.

    Judgement with some justification / some

    evaluation of choices made.

    Candidates discussing both changes in detail and

    applying them to the case should be rewarded

    with the top marks in the band.

    5–8

    1

    Limited application of knowledge and

    understanding of relevant business concepts.

    Limited ability to discuss the changes with

    little / no explanation.

    Simple judgement with limited justification / limited

    evaluation of choices made.

    Candidates outlining both changes in context

    should be rewarded with the top marks in the

    band.

    1–4

    0

    No creditable response.

    0

    12

    0450/21

    October/November

    2024

    Relevant points might include:

    Decrease in

    interest rates

    •

    Decrease in interest costs of a new bank loan –

    Sam may be more likely to invest in batch

    production facilities using a bank loan – may

    buy new ovens – lower interest rates reduce

    expenses

    •

    Reduces the cost of overdrafts – reduces interest

    payment for expenses – lower costs

    •

    May lead to higher economic growth – lower

    unemployment – higher incomes for consumers –

    increased demand for cookies

    •

    Increases the available income consumers can

    spend

    •

    If customers had a mortgage to repay – lower

    repayments – may increase demand for high-

    quality cookies

    Increase in

    taxes

    •

    May reduce CC‘s sales – as a result of less

    spending by consumers on high-quality

    products

    •

    Less retained profit and less investment in

    bakery equipment

    •

    May lead to an increase in the price of cookies –

    may lead to lower sales and revenue

    •

    May allow an increase in government payments

    to people on a lower income – may increase the

    sale of CC cookies if these people choose to

    celebrate an occasion such as a birthday or

    wedding with a cookie

    Conclusion

    Justification could include:

    •

    A decrease in interest rates will have the biggest

    effect on CC’s profit as higher taxes may not

    affect demand for products that are not a high

    proportion of consumers incomes. Whereas a

    decrease in interest rates may encourage Sam to

    expand CC’s production facilities by purchasing

    bakery equipment and increase future profit

    from higher sales of cookies / reduced average

    costs.

    •

    An increase in taxes will have the biggest effect on

    CC’s profit as consumers will have less income

    after tax to spend and therefore revenue from the

    sale of cookies in their shop will fall reducing

    profit.

    0450/21

    October/November

    2024'
