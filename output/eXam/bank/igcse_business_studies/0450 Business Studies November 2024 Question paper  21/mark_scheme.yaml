  mark_scheme_answer: 'Explain four reasons why a business might remain small.

    Award 1 mark for each suitable reason (max 4).

    Award a maximum of 1 additional mark for each explanation of why a

    business remains small.

    There are no application marks for this question.

    Suitable reasons might include:

    •

    The product / service is specialised / may be personal / customised – not suitable

    for production on a large scale / produced using job production

    •

    Market size – doesn’t have a large market / maybe niche market / sales

    are low / lack of demand

    •

    Owner’s choice / owner’s preference / owner’s objective – to keep a work

    life balance / less stress /  less pressure / satisfied with current business

    performance

    •

    Easier to manage / control – owner makes decisions himself/herself / may

    not have the skills to manage a larger business

    •

    Owner knows all the employees – personal relationship / paternalistic

    style / easier communication

    •

    Lack of finance / fewer options of finance for a small business

    •

    Maintaining close customer relations – wishes to maintain customer

    loyalty / face-to-face customer service

    •

    Not willing to take many / additional risks – does not want more

    responsibility

    •

    Market dominated by large business / many competitors – restricting

    growth / sales

    For example: The product is specialised (1) and therefore is not suitable to be

    produced on a large scale (1).

    8

    0450/21

    October/November

    2024'
