- number: 4b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Consider the following three pricing methods CC could use for
    its

    existing products. Which pricing method should CC use? Justify your

    answer.

    •

    Cost-plus

    •

    Promotional

    •

    Competitive

    Level

    Description

    3

    Sound application of knowledge and

    understanding of relevant business concepts using

    appropriate terminology.

    Detailed discussion of two or more methods.

    Well-justified recommendation.

    Candidates discussing all three methods in detail,

    in context and with a well-justified

    recommendation, including why the alternative

    methods were rejected, should be rewarded with

    the top marks in the band.

    9–12

    2

    Sound application of knowledge and

    understanding of relevant business concepts using

    appropriate terminology.

    Detailed discussion of at least one method.

    Judgement with some justification / some

    evaluation of choices made.

    Candidates discussing two or more methods in

    detail and applying them to the case should be

    rewarded with the top marks in the band.

    5–8

    1

    Limited application of knowledge and

    understanding of relevant business concepts.

    Limited ability to discuss the methods with

    little / no explanation.

    Simple judgement with limited justification / limited

    evaluation of choices made.

    Candidates outlining three methods in context

    should be rewarded with the top marks in the

    band.

    1–4

    0

    No creditable response.

    0

    12

    0450/21

    October/November

    2024

    Relevant points might include:

    Advantages

    Disadvantages

    Cost-plus

    •

    Easy to apply to

    cookies – as just

    add a percentage

    mark-up to costs

    •

    Can have different

    mark-ups in

    different markets –

    can gain more

    profit from markets

    where a higher

    price can be

    charged

    •

    Each product

    makes a profit for

    the business

    •

    Profit will only be

    made if CC sells

    sufficient high-

    quality products

    to break-even

    •

    Time is taken to

    research costs of

    all the fresh

    ingredients and

    difficult to calculate

    costs

    •

    No incentive to

    reduce costs

    •

    If costs are high,

    then the selling

    price of the

    products with

    personalised

    messages may be

    too high to be

    competitive

    0450/21

    October/November

    2024

    Promotional

    •

    Low price attracts

    customers and

    increases sales of

    cookies for

    special occasions

    such as birthdays

    – attracts attention

    to the products to

    encourage new

    customers to try

    them – hopefully

    establish regular

    sales

    •

    Helps to ensure a

    successful launch

    into a new market

    in other cities –

    could increase

    sales and

    potentially increase

    market share

    •

    It is useful to get rid

    of unwanted

    inventory that did

    not sell – as

    cookies are

    perishable and

    need to be sold

    quickly

    •

    Can help to renew

    interest in a product

    if sales are falling

    •

    Low price will

    mean low profit per

    cookie

    •

    Customers may

    expect prices to

    remain low and

    therefore not

    purchase the

    products with

    personalised

    messages on

    them when the

    price is raised at a

    later date

    •

    Consumer may

    think low price is

    due to low quality

    product

    •

    May lead to price

    competition with

    competitors that

    sell in retail shops

    in other cities – so

    business may have

    to reduce prices

    again

    0450/21

    October/November

    2024

    Competitive

    •

    Sales are likely to

    be high due to

    prices being set

    around the same

    price as

    competitors’ prices

    in retail shops in

    other cities

    •

    May avoid price

    competition – so

    achieves steady

    revenue for the

    high-quality

    cookies

    •

    The cookies may

    not be very different

    to the cookies of

    competitors – so

    customers will buy

    from CC as they

    cannot tell the

    difference between

    products

    •

    May compete on

    quality rather than

    price

    •

    High research

    costs to find out

    competitor’s prices

    – may increase

    costs overall

    •

    If costs of fresh

    ingredients to

    produce the

    cookies are higher

    than the costs of

    competitors, then

    may be harder to

    achieve a profit –

    may even be a loss

    •

    Higher-quality

    cookies might

    need to be sold at a

    slightly higher

    prices than

    competitors to

    emphasise the

    higher quality

    image

    Recommendation

    Justification might include:

    •

    Cost-plus pricing method should be used as it

    ensures a profit is made on each cookie.

    Whereas promotional pricing does not ensure

    a profit is made and may even lead to a loss

    initially. The cookies are of high-quality

    which will mean the price is likely to be higher

    than competitors’ cookies and therefore low

    profits are likely if it uses competitive pricing.

    •

    Promotional pricing method should be used

    as it will ensure the cookies attract attention

    and renew interest in the products. Sales

    should increase as this will help to maintain

    customer loyalty when the price is raised

    later.

    •

    Competitive pricing method should be used

    as it will mean the cookies will often be

    chosen over competitors cookies that are

    sold in retail shops in other cities as it has

    a higher quality but sold at a similar price. So

    the cookies will have high sales increasing

    market share.'
