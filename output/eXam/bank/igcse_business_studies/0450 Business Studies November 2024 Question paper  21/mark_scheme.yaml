  mark_scheme_answer: 'Explain two functions of management for CC’s new manager.

    Award one mark for each named function (max 2).

    Award a maximum of 3 additional marks for each explanation of the function of

    management – one of which must be applied to this context.

    Functions might include:

    •

    Planning – setting aims and targets for the business – will give a sense of

    direction with common targets to work towards

    •

    Organising – arranges the tasks for the employees – as a manager

    cannot do all tasks and will need to delegate

    •

    Coordinating – bringing together the different departments in the

    organisation – so tasks are carried out efficiently

    •

    Commanding – instructs the employees on how to carry out their tasks –

    gives guidance as required

    •

    Controlling - checking the employees work so that the expected output is

    produced each week – and that all aims are achieved

    For example: Planning (1) setting aims and targets for the business (1) such

    as sales targets for the cookies (app) will give CC a sense of direction with

    common targets to work towards (1).

    Application could include: cookies; batch production; high-quality products;

    fresh ingredients; baking equipment; messages put on cookies; orders for

    birthdays or weddings; 10 production employees; 5 shop employees;

    Operations manager; oversee production; sole trader; small business;

    established for 5 years; sells at own shop in city centre.

    8

    0450/21

    October/November

    2024'
