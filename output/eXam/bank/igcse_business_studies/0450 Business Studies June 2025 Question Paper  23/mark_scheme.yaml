    Relevant points might include:

    Tianna

    •

    Wage costs are $4 per hour more than Vea

    •

    Working 40 hours a week will mean wage costs will

    be $480 compared to $320 for Vea

    •

    On-the-job training required by a chef at another

    franchise restaurant – cheaper to train than Vea at

