    detail, in context and with a well-justified

    recommendation, including why the alternative

    method of motivation was rejected, should be

    rewarded with the top marks in the band.

    9–12

    2

    Sound application of knowledge and understanding of

    relevant business concepts using appropriate

    terminology.

    Detailed discussion of at least one method of

    motivation.

    Judgement with some justification/some evaluation of

    choice made.

    Candidates discussing at least one method of

    motivation in detail and applying it  to the case should

    be rewarded with the top marks in the band.

    5–8

    1

    Limited application of knowledge and understanding of

    relevant business concepts.

    Limited ability to discuss the methods of motivation

    with little/no explanation.

    Simple judgement with limited justification/limited

    evaluation of choice made.

    Candidates outlining both methods of motivation in

    context should be rewarded with the top marks in the

    band.

    1–4

    0

    No creditable response.

    0

    12

    0450/23

    May/June 2025

    Relevant points might include:

    Job enrichment

    •

    Workers in the restaurant to carry out additional

    tasks that require more skill or responsibility so

    makes the job less boring – more customers served

    per hour – reducing average costs

    •

    Workers may become more involved in decision-

    making in the restaurant – makes them feel more

    valued by the business

    •

    May not want to take on additional responsibility –

    which may demotivate employees – leading to

    poorer customer service

    •

    May not have the skills to carry out the additional

    tasks – additional training likely to be required –

    increases costs

    Discount on

    meals in Jemi’s

    restaurant

    •

    Encourages employee loyalty – by giving the 12

    employees the incentive to eat in the restaurant

    with family and friends – increases sales

    •

    Likely to encourage lower labour turnover – if

    employee values the discounts

    •

    Lower revenue after discount applied to meals –

    reduces gross profit margin on meals served to

