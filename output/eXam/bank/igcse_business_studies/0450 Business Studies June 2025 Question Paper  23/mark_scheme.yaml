    •

    Already qualified chef with many years’ experience

    – should settle to the VV job quickly – may have

    good ideas from working in several restaurants

    over 20 years – may be able to improve efficiency

    – reducing unit costs of meals

    Vea

    •

    Wages are cheaper at $8 per hour than Tianna at

    $12 per hour – working 40 hours then wage cost is

    $320 – maybe helping to reduce total costs and

    increase profit

    •

    Off-the-job training at a chef training centre – may

    teach the latest techniques – so brings new ideas

    to the restaurant – may lead to increases in

    efficiency

    •

    Will be 10 weeks before they can start work as a

    fully qualified chef and this may delay the opening

    of the restaurant – delaying the inflow of revenue

    from customers

    •

    Only part-qualified so may not be as efficient and

    may produce lower quality meals

    •

    Has worked for 10 years assisting chefs in other

    vegan restaurants – may have more experience of

    producing these types of meals and the ingredients

    required

    Recommendation  Justification might include:

    •

    Tianna should be employed to be the chef at the

    new vegan restaurant. She is fully qualified and

    will not take as long to be trained and working to

    produce franchise meals. Vea is not suitable as she

    is only part-qualified and will take a lot longer at 10

    weeks before she can start to work in the

    restaurant which may delay the opening.

    •

    Vea should be employed as she is a lot cheaper to

    employ than Tianna at $8 per hour giving a lower

    wage cost of $320 per week.

    0450/23

    May/June 2025'
