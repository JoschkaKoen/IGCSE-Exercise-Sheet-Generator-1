    an increase in demand for vegan meals (app) because the government report

    suggests that eating more fruit and vegetables is healthy (1) especially for

    children and therefore may attract more families to the restaurant resulting in

    an increase in revenue (1).

    Application could include: vegan target market; plant-based ingredients;

