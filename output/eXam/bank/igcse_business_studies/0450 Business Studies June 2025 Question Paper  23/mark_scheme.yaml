    •

    May increase competition with other restaurants adding vegan meals to

    their menus / new restaurants opening up – which may lead to fewer

    sales for Jemi’s restaurant

    •

    Finding suppliers of fruit and vegetables may become more difficult –

    increased transport costs from buying from suppliers further away – more

    time taken to fetch deliveries

    •

    Increased demand from more restaurants serving vegan meals increased

    demand for ingredients – possibly higher prices for ingredients – higher

    costs / higher prices

