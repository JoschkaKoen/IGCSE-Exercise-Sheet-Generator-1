  mark_scheme_answer: 'Explain two advantages and two disadvantages to Jemi of buying
    a

    franchise.

    Award 1 mark for each advantage/disadvantage (max 2 advantages/max 2

    disadvantages).

    Award a maximum of 1 additional mark for each explanation of the

    advantage/disadvantage of buying a franchise which must be applied to this

    context.

    Relevant advantages might include:

    •

    Risk of business failure to the franchisee is much reduced – because the

    brand is well-known with people who like eating vegan meals

    •

    The franchisor pays for national advertising – reducing the costs of

    promotion for the restaurant

    •

    Supplies are obtained from central sources / quality will be assured as

    already checked by the franchisor – less need to research suppliers of

    plant-based ingredients

    •

    Fewer decisions to be made

    •

    Training for employees and management is provided/arranged by the

    franchisor

    •

    Banks may be more willing to lend as risk of failure is lower

    Relevant disadvantages might include:

    •

    Less independence than when operating a non-franchise business /

    franchisor will impose strict controls over what is allowed – which meals

    to sell

    •

    May be unable to make decisions to suit the local areas – and some local

    vegetables may be more popular than others nationally

    •

    Licence fee must be paid to the franchisor – costs $50 000

    •

    Local advertising will still have to be paid for by the franchisee

    •

    Royalty payment made to franchisor each year

    For example: The risk of business failure is much reduced (1) because the

    brand is well-known with people who like eating vegan meals (app).

    Application could include: restaurant; vegan target market; plant-based

    ingredients; meals; fruit and vegetables; $50  000; chefs; working 40 hours a

    week; 12 employees; increasing trend for people eating vegan meals; eating

    less meat is good for the environment; menus; recipes.

    8

    0450/23

    May/June 2025'
