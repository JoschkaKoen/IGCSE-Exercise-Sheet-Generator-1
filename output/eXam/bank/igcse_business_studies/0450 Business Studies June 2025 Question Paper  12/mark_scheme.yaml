  mark_scheme_answer: 'Do you think job rotation is the best method for a large

    business to use to motivate its employees? Justify your

    answer.

    Award up to 2 marks for identification of relevant points.

    Award up to 2 marks for relevant development of points.

    Award up to 2 marks for a justified decision as to whether

    job rotation is the best method for a large business to use to

    motivate its employees.

    Points might include:

    Job rotation:

    •

    More flexible/gain new skills [k] leading to higher

    productivity [an]

    •

    Can cover/replace others when someone is absent [k]

    so may be able to meet an order on time [an]

    •

    Makes the work more interesting/less boring for

    employees [k] so lower absenteeism/labour

    turnover/increase productivity [an]

    •

    Increased training needed [k] increasing costs/expenses

    [an]

    •

    Workers may not be willing/able to do different tasks [k]

    lowering quality/increasing waste/leading to mistakes

    [an]

    •

    Takes time to switch to/learn different tasks [k]

    Other methods might include:

    •

    Job enrichment [k] adding more

    responsibilities/challenging work/making workers feel

    more valued/recognised/trusted [an]

    •

    Bonus [k] only pay out if target reached [an]

    •

    Praise [k] involves no additional cost [an]

    •

    Training [k] which provides new skills [an]

    •

    Promotion (opportunities) [k]

    Other appropriate responses should be credited.

    6 This is a general question so there are no marks for

    application.

    To access knowledge candidates must name and not simply

    describe the method.

    For evaluation to be awarded justification will usually follow

    on from relevant analysis of points.

    0450/12

    May/June 2025

    Guidance

    Justification might include:

    One advantage is the work is less boring for employees [k]

    which can lower absenteeism [an]. Another method is

    increasing wages [k] but this will increase expenses [an].

    Job rotation is best for a large business because lower

    absenteeism would reduce costs of bringing in additional

    employees [eval] which could offset the higher labour costs

    for a large business which is likely to have many employees

    [eval].

    Guidance'
