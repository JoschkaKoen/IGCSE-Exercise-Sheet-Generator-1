  mark_scheme_answer: 'Explain two methods of communication a business

    could use to communicate with its suppliers. Which is

    likely to be the best method to use? Justify your

    answer.

    Award up to 2 marks for identification of relevant points.

    Award up to 2 marks for relevant development of points.

    Award up to 2 marks for a justified decision as to which is

    the best method of communication for a business to use

    when communicating with its suppliers.

    Points might include:

    •

    Email [k] can be saved for future reference [an]

    •

    Phone/telephone calls [k] as these allow for (immediate)

    feedback [an]

    •

    (Online) meeting [k] allows everyone to discuss

    points/ask questions [an]

    •

    Video conference/Zoom/Teams/Google Meet/FaceTime

    [k] as people do not have to travel [an]

    •

    Text/SMS/WhatsApp/WeChat/(Facebook) messenger

    [k] but can contain limited information [an]

    •

    Letter [k] but time consuming to write/expensive to send

    [an]

    •

    Websites [k] but no feedback/one way communication

    [an]

    Other appropriate responses should also be credited.

    6 This is a general question so there are no marks for

    application.

    Candidates must name the method to access the knowledge

    mark.

    For evaluation to be awarded justification will usually follow

    on from relevant analysis of points.

    To access [eval], must discuss 2 valid methods of

    communication.

    Do not award answers such as written/verbal/visual as need

    to specify the method.

    0450/12

    May/June 2025

    Guidance

