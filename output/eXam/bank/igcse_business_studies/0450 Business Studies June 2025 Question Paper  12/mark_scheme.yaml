- number: 1e
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Do you think the benefits of developing new products

    for a business are greater than the limitations? Justify

    your answer.

    Award up to 2 marks for identification of relevant points.

    Award up to 2 marks for relevant development of points.

    Award up to 2 marks for a justified decision as to whether

    the benefits of developing new products for a business are

    greater than the limitations.

    Points might include:

    Benefits:

    •

    Increase demand/customer (base)/sales [k] which may

    increase revenue/market share [an]

    •

    Can help spread risk/diversification [k] if sales fall for

    one product, this can be offset by sales of another

    product [an]

    •

    Provide competitive advantage/unique selling point

    (USP) [k] which could increase customer/brand loyalty

    [an]

    •

    Enter new markets [k]

    •

    Improve brand recognition/reputation [k]

    Limitations:

    •

    Must produce new/trial products/more raw materials [k]

    increases costs [an]

    •

    Need to carry out market research [k] increases cash

    outflows [an]

    •

    Need to launch/promote/market the new product [k]

    •

    Often requires large capital expenditure/cost of new

    machinery [k]

    •

    May need to recruit/train additional

    employees/specialists [k]

    Other appropriate responses should be credited.

    6 This is a general question so there are no marks for

    application.

    To access evaluation must discuss at least one benefit and

    one limitation.

    For evaluation to be awarded justification will usually follow

    on from relevant analysis of points.

    0450/12

    May/June 2025

    Guidance

    Justification might include:

    New products can help increase potential sales [k] which

    increases revenue [an]. However, there is a cost of

    developing new products [k] which increases cash outflows

    [an]. The benefits of developing new products are greater

    because the extra revenue gained could cover the additional

    costs [eval] which can increase the chance of growth/long

    term survival [eval].

    Guidance'
  mark_scheme: []
