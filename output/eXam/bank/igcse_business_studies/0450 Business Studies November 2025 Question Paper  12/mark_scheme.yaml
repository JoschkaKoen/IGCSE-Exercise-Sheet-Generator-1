  mark_scheme_answer: 'Explain two possible benefits to a country of a multinational
    company

    locating there. Which benefit is likely to be the most important? Justify

    your answer.

    Award up to 2 marks for identification of relevant points.

    Award up to 2 marks for relevant development of points.

    Award up to 2 marks for a justified decision as to which benefit is likely to
    be

    the most important to a country.

    Points might include:

    •

    Increase jobs/employment opportunities [k] increasing people’s income

    [an] AND/OR reducing unemployment [an] AND/OR improve standard of

    living/reduce poverty [an]

    •

    Generate taxes [k] which may be used to improve public services [an]

    •

    More competition [k] which could increase choice/quality of products /

    may lead to lower prices [an]

    •

    Increase reputation/recognition of country [k] which could encourage

    other businesses to set up/invest in the country [an]

    •

    Knowledge sharing / increase skills / gain technical knowhow [k] which

    could help improve production methods / increase efficiency/output [an]

    •

    Improve infrastructure/new investment [k]

    Other appropriate responses should be credited.

    Justification might include:

    One benefit to the country is increased competition [k] which could increase

    the choice of products available [an]. It could also increase the number of jobs

    [k] reducing unemployment. [an]

    The extra jobs are likely to be the most important because this could improve

    the standard of living for many families [eval] who may then be able to afford

    to buy the wider choice of goods [eval].

    6 This is a general question so there are no

    marks for application.

    To access evaluation marks, candidates

    must identify two valid benefits.

    For evaluation to be awarded justification

    will usually follow on from relevant analysis

    of points.

    Some points could be awarded as [k] or

    [an] but only award once.

    Some [an] can be used for different points

    but only award once.

    0450/12

    October/November 2025

    Guidance'
  mark_scheme: []
