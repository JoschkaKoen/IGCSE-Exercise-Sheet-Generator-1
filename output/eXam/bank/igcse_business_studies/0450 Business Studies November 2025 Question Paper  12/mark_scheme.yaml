    Multinational company / MNC

    •

    Aeroplanes

    •

    Quality assurance

    •

    Downsize (its workforce)

    •

    1 year (at BEI)

    •

    12 years (at other businesses)

    •

    Popular (with other employees)

    •

    Often late

    •

    Able to use (most of) the machinery

    •

    2 IGCSEs

    •

    5000 (employees)

    Other appropriate examples can be

    credited.

    Some points could be awarded as [k] or

    [an] but only award once.

    Some [an] could be used for different

    points but only award once.

