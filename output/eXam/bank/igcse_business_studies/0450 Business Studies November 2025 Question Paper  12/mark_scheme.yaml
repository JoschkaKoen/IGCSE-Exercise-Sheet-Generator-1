    which may lead to production delays [an]

    •

    May lower motivation of other employees [k] as employee A is popular

    with them [app] which could increase labour turnover [an]

    •

    May have to train someone else [k] which can increase costs [an]

    •

    Lower output [k]

    Other appropriate responses should be credited.

    6 To use words from the stem as application,

    the reference must be appropriate (i.e.

    make sense) in relation to the point being

    made.

    The following words are likely to be

    appropriate for this question:

