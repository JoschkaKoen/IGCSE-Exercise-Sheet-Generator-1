  mark_scheme_answer: 'Do you think access to employees is the most important factor
    for a new

    business to consider when deciding on a suitable location? Justify your

    answer.

    Award up to 2 marks for identification of relevant points.

    Award up to 2 marks for relevant development of points.

    Award up to 2 marks for a justified decision as to whether access to

    employees is the most important factor for a new business to consider when

    deciding on a suitable location.

    Points might include:

    Access to employees:

    •

    Availability/number of employees [k] as if high employment may be

    difficult to find enough employees / if many available could pay lower

    wages [an] helping to lower costs [an]

    •

    Distance/proximity from workers/workplace [k] as if far may increase

    transport costs / if many close it may be easier to recruit [an]

    •

    May need skilled/trained workers [k] to provide a good level of

    service/high(er) output / may not be suitable workers nearby [an]

    •

    Level of wages/salary (in local area) [k] if high wages need to be paid it

    could increase costs [an]

    Other factors might include:

    •

    Access to customers/demand / proximity to market [k] to increase sales

    [an] AND/OR revenue [an]

    •

    Availability of suitable premises/rent [k] as high rent will increase fixed

    costs [an]

    •

    Number of competitors [k] may lead to high/low footfall [an]

    •

    Distance to/from suppliers/transport links [k] which could increase

    transport costs [an]

    •

    Access to raw materials [k]

    •

    Legal controls [k]

    •

    Government grants [k]

    •

    Local infrastructure e.g. internet/water/electricity [k]

    •

    Personal preference [k]

    6 This is a general question so there are no

    marks for application.

    Evaluation can only be awarded if

    candidates discuss access to employees.

    For evaluation to be awarded justification

    will usually follow on from relevant analysis

    of points.

    Some points could be [k] or [an] but only

    award once.

    Some [an] could be used for different

    points but only award once.

    Answers must be from the business

    viewpoint, not the employee.

    0450/12

    October/November 2025

    Guidance

    Other appropriate responses should be credited.

    Justification might include:

    Availability of employees as if high employment may be difficult to find enough

    employees [k] reducing level of output [an]. Another factor is government

    grants [k] which could help pay the start-up costs [an].

    The grant is likely to be the most important factor for a new business because

    without enough finance, there may be no business [eval] and there would be

    no need to worry about recruiting employees [eval].

    Guidance'
