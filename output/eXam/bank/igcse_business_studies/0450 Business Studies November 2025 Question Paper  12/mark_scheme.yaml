  mark_scheme_answer: 'Explain two threats to a business of using ecommerce. Which
    threat is

    likely to be the most important? Justify your answer.

    Award up to 2 marks for identification of relevant points.

    Award up to 2 marks for relevant development of points.

    Award up to 2 marks for a justified decision as to which threat is likely to be

    most important to a business.

    Points might include:

    •

    Increased/more competition [k] so may have to set lower prices (to

    compete) / may have to spend more on advertising/promotion [an]

    •

    Need to design/build website [k] which increases costs [an]

    •

    Time/cost for maintenance/updating of the website [k] so may need to

    employ someone to do this [an]

    •

    No face-to-face contact with customer / suppliers / lack of personal

    service [k] so difficult to gain feedback [an] AND/OR may be difficult to

    build customer loyalty / supplier relationships / [an]

    •

    Need to deliver the products to customers [k] increasing

    transport/postage costs [an] leading to lower profit margin [an]

    •

    Technical problems/no power [k] so may lose potential sales [an]

    •

    Security threats / risk of hacking / computer viruses / data theft/fraud /

    scams [k] which could damage its reputation [an] AND/OR reduce

    customer loyalty [an]

    •

    Risk of bad reviews [k] lowering sales AND/OR revenue [an]

    •

    High level of returns [k]

    Other appropriate responses should be credited.

    Justification might include:

    One threat is an increase in competition [k] so may have to set lower prices

    (to compete) [an]. Another threat is technical problems [k] so the business

    may lose potential sales [an]. Technical problems are likely to be the most

    important threat because if customers cannot access the website setting a

    lower price may be ineffective [eval] so gaining any revenue could be difficult

    to achieve. [eval].

    6 This is a general question so there are no

    marks for application.

    To access evaluation must discuss two

    valid threats.

    For evaluation to be awarded justification

    will usually follow on from relevant analysis

    of points.

    Some points can be [k] or [an] but only

    award once e.g. high transport costs.

    Some analysis could be awarded for

    different threats, but only award once.

    Points must focus on the impact on

    business and not on customers.

    0450/12

    October/November 2025

    Guidance'
