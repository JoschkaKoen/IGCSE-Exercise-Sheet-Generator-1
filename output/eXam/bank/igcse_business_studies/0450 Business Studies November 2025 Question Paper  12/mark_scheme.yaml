  mark_scheme_answer: 'Outline, with reference to BEI, the difference between redundancy
    and

    dismissal.

    Award 1 mark for showing understanding of redundancy (max 1).

    Award 1 mark for showing understanding of dismissal (max 1).

    Award 1 mark for each relevant reference to this business (max 2).

    Points might include:

    Redundancy:

    •

    The job is no longer needed/exists [k] as business is downsizing [app]

    •

    The worker has done nothing wrong [k] when making aeroplanes [app]

    •

    Being asked to leave because the skills/experience of the employee are

    no longer needed [k]

    Dismissal:

    •

    Employee is incompetent/cannot do the job / not meeting targets [k] at

    the multinational company [app]

    •

    Being asked to leave because of poor behaviour/conduct of

    employees [k] which may affect quality assurance [app]

    •

    Termination of employment by the employer / when employee is

    told/made to leave job against will of employee [k]

    Other appropriate responses should be credited.

    4 To use words from the stem as application,

    the reference must be appropriate (i.e.

    make sense) in relation to the point being

    made.

    The following words are likely to be

    appropriate for this question:

    •

    Multinational company / MNC

    •

    Aeroplanes

    •

    Quality assurance

    •

    Downsize/reduce size of its workforce

    •

    5000 (employees)

    •

    Employee A is often late to work

    •

    Employee A worked for 1 year at BEI

    Other appropriate examples can be

    credited.

    Candidates must make it clear in the

    answer which term the point relates to.

    Max 1 [k] for points about redundancy and

    max 1 [k] for points about dismissal.

    Do not award:

    •

    Sacked / fired / laid off on own

    0450/12

    October/November 2025

    Guidance'
