    to survival [k] so may lose his investment/difficult to

    attract investment [an]

    •

    May have cash flow problems [k] so need

    overdraft/loan/cannot repay loans/day-to-day costs [an]

    •

    Customers may delay payment / more bad debts [k]

    •

    More difficult to raise finance/banks may not lend [k]

    Other appropriate responses should also be credited.

    6 To use words from the stem as application, the reference

