    question:

    •

    (Car) repair / garage or examples

    •

    2 workers

    •

    Full-time (employees)

    •

    Private sector business

    •

    Small business

    •

    Added value

    •

    Short-term/long-term finance/needs finance (for many

    reasons)

    Other appropriate examples can be credited.

    Some points such as lower costs can be [k] or [an] but only

    award once.

    Points about repay loans/interest/need to borrow from bank

    is [an] only.

    0450/12

    October/November 2024

    Notes'
