  mark_scheme_answer: 'Do you think the advantages to a business of being

    ethical are greater than the disadvantages? Justify your

    answer.

    Award up to 2 marks for identification of relevant points.

    Award up to 2 marks for relevant development of points.

    Award up to 2 marks for a justified decision as to whether the

    advantages to a business of being ethical are greater than

    the disadvantages.

    Points might include:

    Advantages:

    •

    Good image/reputation [k] so can charge high(er) prices

    [an]

    •

    Good relations with customers [k] which can develop

    customer loyalty [an]

    •

    Increase demand/sales/customers / enter new market

    [k] increasing revenue [an]

    •

    Help motivate workers [k] leading to lower absenteeism /

    lower labour turnover / increased productivity [an]

    •

    Help recruit/attract employees [k]

    •

    Investors more likely to invest [k] which may make it

    easier to expand/grow the business [an]

    •

    Can help create better supplier relations [k]

    Disadvantages:

    •

    Limited/fewer materials available [k] leading to less

    output [an]

    •

    High(er) costs [k] could lead to higher prices [an]

    •

    May take time to source suitable/ethical supplies [k] which

    could delay production [an]

    •

    May have to pay more to suppliers / for materials [k]

    leading to higher variable costs/cost of goods sold /

    lower gross profit margin [an]

    6 This is a general question so there are no marks for

    application.

    Some points could be awarded as either [k] or [an] but do not

    award the same point twice e.g. customer loyalty, increase

    prices.

    To access [eval], must discuss a valid advantage and a valid

    disadvantage.

    Accept problems of not being ethical e.g. damage reputation

    0450/12

    October/November 2024

    Notes

    Other appropriate responses should be credited.

    Justification might include:

    One disadvantage is the business may have higher cost of

    materials [k] leading to a lower gross profit margin [an]. The

    business may have a better reputation [k] so able to charge

    higher prices [an].

    Being ethical is better because higher prices could increase

    its profit margin [eval] which could cover the additional costs

    of materials [eval].

    0450/12

    October/November 2024

    Notes'
