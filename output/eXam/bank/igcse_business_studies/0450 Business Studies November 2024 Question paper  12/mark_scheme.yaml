  mark_scheme_answer: 'Define ‘licensing’.

    Award 2 marks for a full definition. Award 1 mark for a partial

    definition.

    Business gives permission for another company (in the new

    market being entered) to produce the branded/patented

    products (under licence) [2]

    OR

    A business in one country permits a firm (in a foreign country)

    to produce its branded products (under licence) [2]

    OR

    When a business gives the right to others to produce/sell its

    products (in another country) [2]

    Partial definition e.g. allow someone else to make/sell your

    products [1]

    2 For two marks need the idea of permission/rights given by

    one business to another business and idea of what i.e.

    produce/sell/operate for its products.

    Do not need to refer to other countries/new markets to gain

    two marks.

    0450/12

    October/November 2024

    Notes'
