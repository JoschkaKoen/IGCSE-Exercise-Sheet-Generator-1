  mark_scheme_answer: 'Explain two factors LB’s managers should consider when deciding

    which method of communication to use to inform employees about the

    expansion plans.

    Award 1 mark for each relevant factor (max 2).

    Award a maximum of 3 additional marks for each explanation of the factor

    that LB’s managers should consider when deciding which method of

    communication to use with employees about the expansion plans – one of

    which must be applied to this context.

    Relevant factors might include:

    •

    How many employees need to be informed – a large number of

    employees need to see the information – as everyone will be affected by

    the expansion

    •

    If feedback is needed – managers will know the message has been

    received – to make sure all employees understand what it will mean for

    their job role

    •

    How much information needs to be included in the message / complexity

    of the message – if it is a lot of information then a written form of

    communication should be used – such as an email or letter

    •

    If there is need for a written record – as legally a record may be needed

    for certain types of communication with employees – then there will be

    communication that can be referred to at some time in the future

    •

    Speed / urgency / importance of communication – employees need to be

    told quickly before rumours are spread around the factory

    •

    Cost of the communication methods chosen

    For example: How many employees need to be informed (1). A large number

    of employees will need to see the information (1) as everyone will be affected

    by the expansion plans (1) when building the new factory in country Y (app).

    Application could include: luxury bathroom products; baths/basins/showers;

    plan to produce a new range of bathroom products; plans to open a factory in

    another country; sells in specialist retail shops; website contains information

    on product range.

    8

    0450/21

    October/November

    2025'
