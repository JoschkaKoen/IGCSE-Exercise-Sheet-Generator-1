    •

    Reeta should be made redundant as she has

    worked the shortest time for LB, at 2 years, and

    therefore less experienced.

    •

    Amy should be made redundant as she has not

    worked for LB as long as Naga and has only been

    a supervisor for 5 years which is less time than

    Naga so has less experience.

    0450/21

    October/November

    2025'
