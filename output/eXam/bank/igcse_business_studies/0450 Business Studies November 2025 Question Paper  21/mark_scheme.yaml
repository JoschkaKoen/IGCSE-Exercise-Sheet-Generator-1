  mark_scheme_answer: 'Explain two reasons why working capital is important to LB.

    Award 1 mark for each reason why working capital is important (max 2).

    Award a maximum of 3 additional marks for each explanation of why working

    capital is important – one of which must be applied to this context.

    Relevant reasons might include:

    •

    To be able to pay for day-to-day expenses / fixed costs / variable costs /

    overheads – if not able to pay for these costs then output cannot be

    produced – and no products could be produced

    •

    To prevent cash flow problems – so the business does not lack liquidity –

    and does not become insolvent / cease trading / not survive

    •

    To support a bank loan application – as having enough working capital will

    help to show an ability to repay the loan

    •

    To be able to offer customers credit terms to encourage sales (1)

    •

    To pay for unexpected expenses (1)

    For example: Needed to pay day-to day expenses (1) as LB will need to buy

    components to manufacture the bathroom equipment (app). If there is

    insufficient working capital, the business may not have the cash to pay wages

    and other expenses (1) it will be difficult for LB to continue trading (1).

    Application might include: luxury bathroom products; baths/basins/showers;

    started 20 years ago; plan to produce a new range of bathroom products;

    sells in specialist retail shops; website contains information on product range;

    operates in a very competitive market.

    8

    0450/21

    October/November

    2025'
