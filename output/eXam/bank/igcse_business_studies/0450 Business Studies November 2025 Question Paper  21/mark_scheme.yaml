  mark_scheme_answer: 'Explain two advantages and two disadvantages to LB of using
    primary

    market research.

    Award 1 mark for each advantage/disadvantage (max 2 advantages/max 2

    disadvantages).

    Award a maximum of 1 additional mark for each explanation of the

    advantage/disadvantage in context.

    Relevant advantages might include:

    •

    Is up to date – finds out about current trends in bathroom products

    •

    Relevant to the business as direct contact with potential customers – that

    produces basins and showers

    •

    Is first–hand information / planned and carried out by those who want the

    information – about this very competitive market

    •

    Effective at gathering information about a specific problem – as to which

    new designs to choose to produce

    •

    Not available to other businesses

    Relevant disadvantages might include:

    •

    Can be expensive to collect information – about sales through specialist

    retail shops

    •

    May take time to collect / not available immediately – for this company

    that has been operating for over 20 years

    •

    May not be accurate if people carrying it out are not experienced in this

    type of research / interviewer bias

    •

    Less accurate results gathered if sample does not represent the target

    market

    For example: The information is up to date (1) so the business will be aware

    of current trends in designs of bathroom products (app).

    Application might include: luxury bathroom products; baths/basins/showers;

    plan to produce a new range of bathroom products; started 20 years ago; sells

    in specialist retail shops; website contains information on product range;

    operates in a very competitive market; need to decide which new designs to

    produce.

    8

    0450/21

    October/November

    2025'
