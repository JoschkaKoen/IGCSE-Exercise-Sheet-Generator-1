- number: 1b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Consider the following three economies of scale for LB.  Which

    economy of scale is likely to have benefited LB the most?  Justify your

    answer.

    •

    Financial

    •

    Purchasing

    •

    Managerial

    Level

    Description

    3

    Sound application of knowledge and understanding of

    relevant business concepts using appropriate

    terminology.

    Detailed discussion of two or more economies of

    scale.

    Well-justified conclusion.

    Candidates discussing all three economies of scale,

    in context and with a well-justified conclusion,

    including why the alternative economies of scale

    were rejected, should be rewarded with the top marks

    in the band.

    9–12

    2

    Sound application of knowledge and understanding of

    relevant business concepts using appropriate

    terminology.

    Detailed discussion of at least one economy of scale.

    Judgement with some justification / some evaluation

    of choice made.

    Candidates discussing in detail two or more

    economies of scale and applying these to the case

    should be rewarded with the top marks in the band.

    5–8

    1

    Limited application of knowledge and understanding

    of relevant business concepts.

    Limited ability to discuss the economies of scale with

    little/no explanation.

    Simple judgement with limited justification/limited

    evaluation of choice made.

    Candidates outlining all three economies of scale in

    context should be rewarded with the top marks in the

    band.

    1–4

    0

    No creditable response.

    0

    12

    0450/21

    October/November

    2025

    Relevant points might include:

    Financial

    •

    Raise finance more easily and cheaply – as lower risk of

    not repaying debts due to larger size of business

    •

    Banks may offer lower interest rates – lower costs of

    borrowing for the expansion of the large business than if

    it was a smaller business

    Purchasing •

    Bulk buy components – discounts / cheaper prices for

    bulk purchases – reduces average / unit cost of

    components

    •

    May be able to lower prices – as average cost of each

    product is lower – becomes more competitive –

    increases sales of bathroom products – revenue

    increases

    Managerial •

    Specialist managers can be employed – better at their

    jobs / more knowledgeable as only carried out this task –

    e.g. marketing manager knows best place to advertise to

    be more cost efficient

    •

    Able to attract the most talented managers – more

    efficient in manufacturing luxury bathroom products

    Conclusion Justification might include:

    •

    Financial economies of scale will have the greatest effect

    as LB plans to expand and build a new factory in

    another country and will probably need to raise some of

    the finance by borrowing. This will keep down the

    repayment costs of expanding. LB is already producing

    on a large scale so the increased benefits from the

    purchasing and managerial economies may be limited

    leaving financial economies giving the biggest reduction

    in unit costs.

    •

    Purchasing economies of scale will have the greatest

    effect on LB’s average costs as it produces bathroom

    products on a large scale so discounts on components

    will reduce unit costs by a significant amount, increasing

    gross profit and profit.

    •

    Managerial economies of scale will have the biggest

    effect on unit costs as all managers will be experienced

    in producing showers and baths and are specialists in

    their areas leading to efficiencies in all departments of

    the business.

    0450/21

    October/November

    2025'
