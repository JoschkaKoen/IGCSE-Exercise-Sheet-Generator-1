- number: 1a
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Explain two advantages and two disadvantages of a business
    being a

    private limited company.

    Award 1 mark for each advantage/disadvantage (max 2 advantages/max 2

    disadvantages).

    Award 1 additional mark for each explanation of the advantage/disadvantage.

    There are no application marks for this question.

    Relevant advantages might include:

    •

    Has a separate legal identity – company can be sued but not usually the

    owners

    •

    Can sell shares to family and friends to raise capital – larger amounts of

    capital may be raised than if a sole trader / partnership

    •

    Limited liability – owners will not lose personal possessions if business is

    unable to pay its debts

    •

    Cannot be taken over without the consent of the shareholders

    •

    Provides continuity on the death of the owner

    Relevant disadvantages might include:

    •

    Accounts are not private – competitors may access the accounts

    •

    Cannot sell shares to the public / shares cannot be sold on the stock

    exchange - not easy to transfer shares so family and friends may be less

    willing to buy shares

    •

    Legal formalities required to operate the company – need to have

    accounts audited and registered with government which takes time and

    increases costs

    •

    Legal formalities setting up the company – has to complete paperwork to

    register the company which takes time and money / may take more time

    for owner than setting up as a sole trader/partnership

    For example: Cannot sell shares to the public on the stock exchange (1) as it

    is not easy to transfer / sell shares family and friends may be less willing to

    buy shares in the first place (1).

    8

    0450/21

    October/November

    2025'
