  mark_scheme_answer: 'Consider the advantages and disadvantages of the two options
    LB

    could use to distribute its new product range in country X.  Which

    channel of distribution should LB use? Justify your answer.

    •

    Selling to specialist retail shops

    •

    Selling directly to customers through LB’s website

    Level

    Description

    3

    Sound application of knowledge and understanding of

    relevant business concepts using appropriate

    terminology.

    Detailed discussion of both options.

    Well-justified recommendation.

    Candidates discussing in detail both options, in context

    and with a well-justified recommendation, including why

    the alternative option was rejected, should be rewarded

    with the top marks in the band.

    9–12

    2

    Sound application of knowledge and understanding of

    relevant business concepts using appropriate

    terminology.

    Detailed discussion of at least one option.

    Judgement with some justification / some evaluation of

    choice made.

    Candidates discussing in detail at least one option and

    applying it to the case should be rewarded with the top

    marks in the band.

    5–8

    1

    Limited application of knowledge and understanding of

    relevant business concepts.

    Limited ability to discuss the options with little/no

    explanation.

    Simple judgement with limited justification / limited

    evaluation of choice made.

    Candidates outlining both options in context should be

    rewarded with the top marks in the band.

    1–4

    0

    No creditable response.

    0

    12

    0450/21

    October/November

    2025

    Relevant points might include:

    Advantages

    Disadvantages

    Selling to

    specialist retail

    shops

    •

    May be able to sell

    bathroom products in

    larger quantities to

    retailers – more likely

    to improve cash flow

    •

    Reduces distribution

    costs – if sell to a few

    large retail shops

    rather than direct to

    customers – fewer

    journeys for delivery

    lorries

    •

    Already has a

    relationship with these

    shops – may be

    familiar with the quality

    of the luxury

    bathroom products –

    can pass this

    information and advice

    on to customers –

    sales may be higher

    •

    Lower level of

    inventories – as some

    products are sent to

    the retailer

    •

    Retailer may pay for

    some of the advertising

    – may reduce

    marketing costs

    •

    Customers are

    already familiar with

    LB’s products being

    displayed in these

    specialist shops so

    may make it easier to

    sell a new range of

    products

    •

    Have less control

    over the way the

    basins and showers

    are displayed

    •

    Will be displayed

    alongside

    competitors’ products

    – may lead to fewer

    sales if luxury

    nature of products

    is less obvious

    •

    Price may be higher

    after retail profit

    margin added –

    leading to fewer sales

    •

    No direct contact with

    customers – so may

    not be able to

    emphasise the

    luxury bathroom

    products

    0450/21

    October/November

    2025

    Advantages

    Disadvantages

    Selling directly

    to customers

    through LB’s

    website

    •

    Lower price can be

    charged as no profit

    margin for the retailer

    included – may lead to

    higher demand –

    increased sales and

    revenue

    •

    Direct contact with

    customers – may gain

    useful feedback on

    showers and baths –

    less market research

    needed in the future

    •

    LB controls the way its

    new bathroom range is

    described and

    information provided for

    customers – more

    accurate than if sold

    through a retailer

    •

    Delivery costs paid by

    customers will be high

    as baths are large

    and heavy – may

    reduce sales

    •

    May get damaged

    when being delivered

    to customers’ homes

    – increasing costs

    from repair or

    replacement of

    products

    •

    The luxury nature of

    the products cannot

    be appreciated using

    online sales as

    customers cannot see

    or feel the luxury

    bathroom products

    – customers may not

    be willing to pay the

    higher price as do not

    appreciate the high

    quality

    •

    Storage costs will be

    higher – as products

    stored before being

    dispatched in small

    quantity to each

    customer

    •

    Increased cost of

    website being

    adapted to be able to

    take customer orders

    – also ongoing

    maintenance costs

    0450/21

    October/November

    2025

    Recommendation

    Justification might include:

    •

    LB should sell the new bathroom range to the

    existing specialist retail shops as it already has

    a good relationship with them, and their

    employees are likely to be familiar with LB’s

    products so can advise customers about their

    luxury nature encouraging customers to think

    paying the higher price is worth it. Selling

    directly to customers through its website will be

    a new way of distributing its products and may

    not be successful due to LB’s lack of

    experience.

    •

    LB should sell the new bathroom range

    directly to customers through LB’s website as it

    will allow LB to sell to a wider range of

    customers across a wider area than the current

    specialist retail shops and therefore have higher

    sales.

    0450/21

    October/November

    2025'
