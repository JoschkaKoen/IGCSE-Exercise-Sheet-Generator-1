  mark_scheme_answer: 'Identify four reasons why a business might remain

    small.

    Award 1 mark per reason (max 4).

    Points might include:

    •

    Limited access to/lack of capital (to expand)

    •

    Limited access to/lack of suitable labour

    •

    Limited access to/lack of suitable land

    •

    Limited access to/lack of suitable resources/raw

    materials

    •

    Personal preference / owners’ choice / owner does not

    want the responsibility / wants to keep control

    •

    Lack of skills/knowledge/experience (to expand)

    •

    Size of the market / amount of customers / level of

    demand / small market

    •

    To maintain close customers relationships / provide a

    personal service / type of industry

    •

    Some large firms dominate the market / low market

    share / too much competition

    •

    Can be flexible / respond quickly to changes in

    customer tastes

    •

    No economies of scale / to avoid diseconomies of scale

    •

    Operating at maximum possible output

    Other appropriate responses should be credited.

    4 Only award the first four responses given.

    Do not award vague statements such as less stressful/have

    more free time/less likely to have communication issues.

    0450/11

    October/November 2025

    Guidance'
