- number: 1e
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Explain two factors a manufacturing business should

    consider when deciding on a suitable location for a

    factory. Which factor is likely to be the most important?

    Justify your answer.

    Award up to 2 marks for identification of relevant points.

    Award up to 2 marks for relevant development of points.

    Award up to 2 marks for justified decision as to which

    location factor is likely to be the most important for a

    manufacturing business.

    This is a general question so there are no marks for

    application

    0450/11

    October/November 2025

    Guidance

    Points might include:

    •

    Access to skilled labour [k] as may be difficult to

    find/recruit / could increase recruitment/labour costs [an]

    •

    Access to raw materials/components [k] so production is

    not delayed [an]

    •

    Availability / rent of suitable land [k] which could restrict

    size of factory / increase fixed costs [an]

    •

    Good transport links [k] to ensure materials arrive /

    products sent when needed [an]

    •

    Proximity to market [k] to ensure sales/revenue can be

    made [an]

    •

    Type of product [k] a fragile/heavy product may need to

    be closer to customers to reduce risk of damage/cost

    [an]

    •

    Government grants [k] which could help reduce costs

    [an]

    •

    Legal controls [k] which may prevent the business from

    locating in certain areas [an]

    •

    Access to utilities/power/water [k] as needed for

    production [an]

    •

    Trade barriers [k]

    •

    Security of the area/level of crime [k]

    Other appropriate responses should be credited.

    Justification might include:

    Skilled labour [k] if difficult to find could increase recruitment

    costs [an]. Another factor is availability of suitable land [k]

    which could restrict the size of the factory [an]. Having

    suitable land is more important because this might limit

    output which could reduce its ability to meet demand [eval]

    whereas a business can train employees, and the extra cost

    might be covered by the additional revenue gained [eval].

    6 .

    0450/11

    October/November 2025

    Guidance'
