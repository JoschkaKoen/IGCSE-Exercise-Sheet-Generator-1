  mark_scheme_answer: 'Explain two objectives a private sector business might

    have. Which objective is likely to be the most

    important? Justify your answer.

    Award up to 2 marks for identification of relevant points.

    Award up to 2 marks for relevant development of points.

    Award up to 2 marks for justified decision as to which

    objective is likely to be the most important.

    Points might include:

    •

    Survival/stay in business [k] to breakeven/ensure costs

    are covered [an]

    •

    Make a profit [k] when revenue exceeds total costs [an]

    •

    Growth/expansion [k] as this can help spread risk [an]

    •

    Increase sales [k] as this can lead to higher revenue

    [an] which is necessary to cover costs [an]

    •

    Increase market share [k] which could provide an

    opportunity to control prices/dominate the market [an]

    •

    Socially/ethically/environmentally responsible / provide

    a service (to the community) [k]

    •

    Increase returns to shareholders/owners [k] to

    encourage investment [an]

    •

    Increase brand image / reputation / increase brand

    awareness [k]

    •

    Increase customer loyalty [k]

    •

    Customer satisfaction [k]

    Justification might include:

    One objective is survival [k] to ensure costs are covered

    [an]. Another objective is making a profit [k] to provide a

    source of finance [an]. Survival is likely to be the most

    important objective for private sector business as they may

    operate in a competitive market [eval.]  Without survival,

    there is no opportunity to make profit in the long term [eval].

    6 This is a general question so there are no marks for

    application.

    Analysis could focus on explaining what the objective is or

    advantages of that objective.

    Some points can be awarded as [k] or [an] e.g. break-even

    but only award once.

    0450/11

    October/November 2025

    Guidance'
