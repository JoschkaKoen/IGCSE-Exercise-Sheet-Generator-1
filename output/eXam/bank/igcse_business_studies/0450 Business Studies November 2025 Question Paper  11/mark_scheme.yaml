    (max 2).

    Award 1 mark for each relevant explanation (max 2).

    Points might include:

    Positive effects:

    •

    Improve quality / less waste / fewer mistakes [k] leading

    to a better reputation [an] for its furniture [app]

    •

    Increases productivity / efficiency / quicker production

    [k] leading to lower (average) costs [an] for this small

    business [app]

    •

    Improved communication [k] leading to fewer mistakes /

    better efficiency [an] in the factory [app]

    •

    Can design new products [k] which may increase sales /

    access new markets [an]

    •

    Greater job satisfaction/motivation [k] reducing

    absenteeism/lowering labour turnover [an]

    •

    Employees may gain new skills [k] leading to higher

    pay/chances of promotion [an]

    •

    Reduces time/costs to design new products [k]

    •

    Increase output [k]

    •

    Safer workplace [k]

    6 To use words from the stem as application, the reference

    must be appropriate (i.e. make sense) in relation to the point

    being made.

    The following words are likely to be appropriate for this

    question:

    •

    Furniture or related words such as tables/chairs

    •

    Trade union

    •

    Factory

    •

    Small business

    •

    Secondary sector/manufacturing

    •

    Location is important

    Other appropriate examples can be credited.

    Some points can be [k] or [an] but do not award the same

    point twice.

    Some analysis can be used for more than one point, but

    only award once.

    0450/11

    October/November 2025

    Guidance

    Negative effects:

    •

    Purchasing new equipment / expensive to buy/set up [k]

    increasing cash outflows/debt [an]

    •

    Need to train workers [k] which can increase costs [an]

    •

    If technology is rapidly changing it will need to change

    often to remain competitive [k] which will increase costs

    [an]

    •

    Some employees may lose their jobs/made redundant

    [k]

    •

    May demotivate employees [k]

    Other appropriate responses should be credited.'
