  mark_scheme_answer: 'Explain two methods of training a business might use.

    Which is likely to be the best method for a service

    business to use? Justify your answer.

    Award up to 2 marks for identification of relevant points.

    Award up to 2 marks for relevant development of points.

    Award up to 2 marks for a justified decision as to which is

    likely to be the best method for a service business to use.

    Points might include:

    On-the-job training [k]

    •

    Being trained in the workplace [an]

    •

    Watching a more experienced worker doing the job [an]

    •

    Allows business specific training to be given [an]

    •

    Low(er) cost [an]

    •

    Some work completed during training [an]

    •

    May learn bad habits from trainer [an]

    •

    Trainer may not be as productive as usual [an]

    Off-the-job training [k]

    •

    Being trained away from the workplace [an]

    •

    Allows employees to be trained by experts [an]

    •

    New/up-to-date skills/knowledge can be taught [an]

    •

    High(er) cost [an]

    •

    Wages paid but no work is being done [an]

    •

    Induction training [k]

    •

    Can help new employees understand / familiarise with

    the work/workplace/job role [an]

    •

    New workers settle into their job quickly [an]

    •

    Delays when start work [an]

    Other appropriate responses should be credited.

    6 This is a general question so there are no marks for

    application.

    Points can refer to the business or employee.

    Analysis can be awarded for explaining the

    method/advantages/disadvantages of using the named

    method.

    Some points can be written as an advantage of one method,

    or a disadvantage of another - only award once.

    0450/11

    October/November 2025

    Guidance

    Justification might include:

    On-the-job training [k] is where trainees watch a more

    experienced worker [an]. Alternatively, off-the-job training [k]

    will teach up to date skills [an]. Off-the-job training is the

    best method as the business is more likely to improve

    productivity by learning the ideas [eval] whereas on-the-job

    training may lead to employees picking up bad habits so

    would have limited value [eval].

    Guidance'
