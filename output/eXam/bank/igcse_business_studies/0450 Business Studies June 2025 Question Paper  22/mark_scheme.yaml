  mark_scheme_answer: 'Consider the following two benefits for TSE of having a well-motivated

    workforce. Which benefit is likely to be the most important to TSE?

    Justify your answer.

    •

    Reduced absenteeism

    •

    Low labour turnover

    Level

    Description

    3

    Sound application of knowledge and understanding

    of relevant business concepts using appropriate

    terminology.

    Detailed discussion of both benefits.

    Well-justified conclusion.

    Candidates discussing both benefits in detail, in

    context and with a well-justified conclusion,

    including why the alternative benefit was rejected,

    should be rewarded with the top marks in the band.

    9–12

    2

    Sound application of knowledge and understanding

    of relevant business concepts using appropriate

    terminology.

    Detailed discussion of at least one benefit.

    Judgement with some justification / some

    evaluation of choice made.

    Candidates discussing at least one benefit in detail

    and applying it to the case should be rewarded with

    the top marks in the band.

    5–8

    1

    Limited application of knowledge and

    understanding of relevant business concepts.

    Limited ability to discuss the benefits with little/no

    explanation.

    Simple judgement with limited justification / limited

    evaluation of choice made.

    Candidates outlining both benefits in context should

    be rewarded with the top marks in the band.

    1–4

    0

    No creditable response.

    0

    12

    0450/22

    May/June 2025

    Relevant points might include:

    Reduced

    absenteeism

    •

    Production not delayed/disrupted – no delay in

    producing planned output – meets customer orders

    and satisfies demand for sports equipment

    •

    No need to move skilled employees around to

    complete tasks for absent employees – more

    productive – leading to higher output and possibly

    increased sales if all the output is sold

    •

    If fewer absences occur, then may have lower

    production costs per unit – if absent the employees

    may still be paid but not producing any output

    Lower labour

    turnover

    •

    Lower recruitment costs – as fewer skilled

    employees leave and need to be replaced – less

    need for advertisements and interviews – saving

    time and money for HR department

    •

    Fewer new employees so less induction training

    required – reducing training costs and expenses for

    TSE

    •

    May be easier to promote employees internally –

    as there will be many experienced employees that

    are employed by the business – they will have

    more experience of TSE’s flow production line,

    and the chances of promotion will further increase

    motivation

    Conclusion

    Justification might include:

    •

    Reduced absenteeism is the most important

    benefit as when skilled employees are absent

    then other workers will need to move across and

    do their job, or the production will stop and output

    will be reduced. Lower labour turnover is less

    important as employing new workers can bring new

    ideas to TSE which can help to make the business

    more successful in the future.

    •

    Lower labour turnover is the most important benefit

    as TSE will not keep losing employees and will not

    need to spend time and money on recruiting and

    training new employees to operate the automated

    production line. This is likely to reduce costs for

    TSE.

    0450/22

    May/June 2025'
