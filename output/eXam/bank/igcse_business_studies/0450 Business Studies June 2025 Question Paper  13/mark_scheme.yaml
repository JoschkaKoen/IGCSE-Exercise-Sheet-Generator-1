- number: 2e
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Do you think the advantages of operating as a sole

    trader business are greater than the disadvantages?

    Justify your answer.

    Award up to 2 marks for identification of relevant points.

    Award up to 2 marks for relevant development of points.

    Award up to 2 marks for a justified decision as to whether

    the advantages of operating as a sole trader business are

    greater than the disadvantages.

    Points might include:

    Advantages:

    •

    Keeps all the profit [k] so has an incentive to work hard

    [an]

    •

    Makes all the decisions / no need to consult with

    anyone / complete control / own boss [k] so can take

    decisions more quickly / so less/no chance of

    disagreements [an]

    •

    Freedom to choose own holidays / when work [k] so can

    choose time off when the business is less busy so does

    not miss out on sales [an]

    •

    Can keep (financial) information private / no need to

    produce annual accounts [k] so competitors cannot use

    this information [an]

    •

    Has close contact with customers / able to offer a more

    personal service [k] which can help encourage customer

    loyalty [an]

    •

    Few legal regulations [k]

    This is a general question so there are no marks for

    application.

    0450/13

    May/June 2025

    Guidance

    Disadvantages:

    •

    Unlimited liability [k] so may lose personal assets to

    repay business debts [an]

    •

    Limited sources of finance [k] which could create cash

    flow problems / difficult to fund expansion [an]

    •

    No one to cover if owner is ill [k] so business may lose

    sales [an]

    •

    Only has own skills [k] so less able to compete / may

    not be able to do all jobs properly [an]

    •

    Must work long hours / difficult to take holidays / high

    workload [k] which could lead to mistakes [an]

    •

    No one to share risks / losses with [k]

    •

    Has all the responsibility / no one to help with decision-

    making [k]

    •

    No separate legal identity [k]

    •

    No continuity [k]

    Other appropriate responses should be credited.

    Justification might include:

    One advantage is there is no need to consult with anyone [k]

    so decisions can be taken more quickly [an]. A disadvantage

    is unlimited liability [k] so personal assets are at risk if

    unable to repay business debts [an]. The advantages are

    greater because being able to act quickly could mean they

    can gain from opportunities which otherwise they might miss

    [eval] and this could generate sufficient revenue to repay its

    debts anyway [eval].

    0450/13

    May/June 2025

    Guidance'
