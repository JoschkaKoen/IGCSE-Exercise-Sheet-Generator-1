  text: "1\nThe wall of the small intestine is highly folded to form villi. Between\
    \ the villi are infoldings known\nas crypts of Lieberkühn.\nFig. 1.1 is a diagram\
    \ of a section through a single villus and a crypt of Lieberkühn.\nlacteal\ncapillary\
    \ network\nenterocyte\ngut\nlumen\ngoblet cell\nenteroendocrine cell\nPaneth\n\
    cell\nvenule\nlymph vessel\nX\nintestinal\nstem cell\ncrypt of\nLieberkühn\nFig.\
    \ 1.1\nFig. 1.1 shows that the epithelium of the villus contains mainly goblet\
    \ cells and cells known as\nenterocytes. Both cell types have microvilli on the\
    \ apical surface (surface facing the gut lumen).\n,\t,\n\nGoblet cells are involved\
    \ in the production of mucus.\n\nEnterocytes are adapted for the absorption of\
    \ the soluble products of digestion. These products\nenter the circulatory system.\n\
    \n(a) A student incorrectly stated that an enterocyte has many cilia on its apical\
    \ surface.\n\nExplain the difference between a cilium and a microvillus [2]\n\n\
    (b) Suggest one role of the mucus produced by the goblet cells of the villus [1]\n\
    \n(c) In Fig. 1.1, blood vessel X delivers blood to the capillary network of the\
    \ villus, where tissue\nfluid is formed. Some of the fluid passes back into the\
    \ capillaries and then into the venule.\n\n(i) Blood vessel X receives blood from\
    \ an artery.\n\n Name the type of blood vessel represented by X [1]\n\n(ii) Describe\
    \ the formation of tissue fluid in the capillary network of the villus [2]\n,\t\
    ,\n\n(d) In response to the presence of compounds in the gut lumen, enteroendocrine\
    \ cells synthesise\nand release peptides (short chains of amino acids) that are\
    \ cell‑signalling molecules. One of\nthese cell‑signalling molecules is known\
    \ as GLP‑1.\n\nGLP‑1 initiates a number of responses in different body cells.\
    \ Some of these responses include:\n•\nthe increase in release of the hormone\
    \ insulin from cells in the pancreas\n•\nthe decrease in release of acid from\
    \ cells in the stomach.\n\nOutline, in sequence, the main stages involved in the\
    \ process of cell signalling by GLP‑1 [3]\n\n(e) Paneth cells, which are secretory\
    \ cells, are located between intestinal stem cells at the base\nof the crypt of\
    \ Lieberkühn, as shown in Fig. 1.1.\n\nA Paneth cell has a very different appearance\
    \ to an intestinal stem cell.\n\nFig. 1.2 is a transmission electron micrograph\
    \ of a Paneth cell.\nPaneth cell\nnucleus\nnucleus of adjacent\nintestinal stem\
    \ cell\nFig. 1.2\n,\t,\n\n(i) Paneth cells are formed following the mitotic division\
    \ of an intestinal stem cell during a\ncell cycle.\n\n Complete the cell cycle\
    \ shown in Fig. 1.3 by naming, in sequence, the stages of mitosis.\ninterphase\n\
    mitosis\nnames of stages of mitosis\n cytokinesis\nFig. 1.3\n\n[1]\n\n(ii) One\
    \ of the functions of a Paneth cell is to synthesise and secrete peptides and\
    \ proteins\nthat act against pathogens in the gut lumen.\n\n State and explain\
    \ the evidence, visible in Fig. 1.2, which suggests that a Paneth cell:\n•\nis\
    \ a secretory cell\n•\nsynthesises many peptides and proteins [3]\n\n(iii) Explain\
    \ why a Paneth cell has a very different appearance to an intestinal stem cell\
    \ [1]\n\n[Total: 14]\n,\t,"
