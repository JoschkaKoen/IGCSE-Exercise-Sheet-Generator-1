  text: "4\nBacteria can be classified according to the type of cell wall they have.\n\
    \nGram‑negative bacteria have a cell wall with an outer layer known as the outer\
    \ membrane.\n\nGram‑positive bacteria do not have an outer membrane, but have\
    \ a much thicker peptidoglycan\nlayer than Gram‑negative bacteria.\n\nFig. 4.1\
    \ is a diagram of a section through the cell wall of a Gram‑negative bacterium.\n\
    external environment\ncytoplasm\nlipopolysaccharide\nouter membrane\nprotein\n\
    periplasmic\nproteins\npeptidoglycan\nlayer\nouter\nmembrane\ncell wall\nperiplasm\n\
    cell surface membrane\nFig. 4.1\n\n(a) With reference to Fig. 4.1, outline the\
    \ similarities and differences between the outer membrane\nof a Gram‑negative\
    \ bacterial cell and the cell surface membrane of a eukaryotic cell [3]\n,\t,\n\
    \n(b) Pathogenic and non‑pathogenic Gram‑negative bacteria can produce extracellular\
    \ vesicles.\nFig. 4.2 summarises how two types of extracellular vesicle, OMVs\
    \ and O‑IMVs, are formed.\n\nO‑IMVs are formed from the outer membrane and the\
    \ cell surface membrane. O‑IMVs can\ncontain ATP and DNA.\nperiplasmic\nproteins\n\
    different cell\nproducts\nKey\nO-IMV\nplasmids\n(small, circular\nDNA)\ncell surface\
