- number: '3'
  question_type: short_answer
  marks: 0
  text: "3\nThe gene LCT codes for the enzyme lactase. In babies, lactase synthesis\
    \ is necessary for\ndigesting lactose, the sugar found in milk.\n\nAnother gene,\
    \ MCM6, has introns that have a regulatory role in the expression of gene LCT.\n\
    Gene MCM6 codes for a protein that has no involvement in lactase synthesis.\n\n\
    As children get older, the MCM6 introns are responsible for a decrease in lactase\
    \ synthesis.\nThis decrease in lactase synthesis is known as lactase non‑persistence.\n\
    \n(a) LCT and MCM6 are located on the same chromosome in humans.\n\nSuggest differences\
    \ between gene LCT and gene MCM6, other than their locations in\ndifferent positions\
    \ on the same chromosome [3]\n\n(b) With reference to the process of lactase synthesis,\
    \ explain the relationship between:\n•\na transcribed strand and a primary transcript\n\
    •\na primary transcript and messenger RNA (mRNA) [2]\n\n(c) A mutation in a regulatory\
    \ intron of MCM6 allows lactase synthesis to continue. This is known\nas lactase\
    \ persistence. In this mutation, the number of nucleotides in the intron remains\
    \ the\nsame, but one of the nucleotides is different to the original nucleotide.\n\
    \nState the type of mutation that is the cause of lactase persistence [1]\n,\t\
    \t,\n\n(d) Fig. 3.1 summarises the reaction catalysed by lactase.\nCH2OH\nO\n\
    O\nH\nH\nH\nH\nH\nlactose\ngalactose\nα-glucose\nOH\nOH\nOH\nCH2OH\nO\nH\nH\n\
    H\nH\nlactase\nH2O\nOH\nOH\nOH\nCH2OH\nO\nH\nH\nH\nOH\nH\nOH\nH\nOH\nOH\n+\nH\n\
    Fig. 3.1\n\nDraw the ring structure of α‑glucose in the box provided to complete\
    \ Fig. 3.1.\n[1]\n\n(e) Some people with lactase non‑persistence may be lactose\
    \ intolerant. They may have\nsymptoms, such as abdominal pain, if their diet contains\
    \ lactose.\n\n(i) Lactase supplements (tablets) can be taken before milk or milk‑based\
    \ products are\nconsumed to avoid symptoms of lactose intolerance.\n\n A student\
    \ compared the activity of two different concentrations of a lactase supplement\n\
    using an artificial substrate, ONPG, instead of lactose.\n\n A solution of ONPG\
    \ is colourless, but the hydrolysis of ONPG by lactase releases a\ncoloured product.\n\
    \n The student planned to follow the progress of the reaction for each concentration\
    \ of\nlactase using a colorimeter.\n\n Explain why the student chose to use a\
    \ colorimeter to follow the progress of the reaction\nfor each concentration of\
    \ lactase [2]\n,\n,\n\n(ii) The lactose in milk can be hydrolysed using immobilised\
    \ lactase or using lactase free in\nsolution (free lactase). This results in milk\
    \ and milk products that do not contain lactose\nand so are suitable for lactose‑intolerant\
    \ people.\n\n Scientists carried out an investigation to compare the activity\
    \ of lactase immobilised\nin very small magnetic beads (magnetic microspheres)\
    \ with free lactase, at different\ntemperatures and at different pH values.\n\n\
    \ Fig. 3.2 shows the activity of immobilised lactase and the activity of free\
    \ lactase at 5\ndifferent temperatures.\n\n Fig. 3.3 shows the activity of immobilised\
    \ lactase and the activity of free lactase at 8\ndifferent pH values.\n35\n40\n\
    45\ntemperature / °C\npercentage of\nmaximum activity\n50\n55\n0\n20\n40\n60\n\
    80\n100\nKey\n= immobilised lactase\n= free lactase\nFig. 3.2\n5.5\n6.5\n7.5\n\
    pH\npercentage of\nmaximum activity\n8.5\n6.0\n7.0\n8.0\n9.0\n0\n20\n40\n60\n\
    80\n100\nKey\n= immobilised lactase\n= free lactase\nFig. 3.3\n,\t,\n\n One advantage\
    \ of using magnetic microspheres with immobilised lactase is that they\ncan be\
    \ easily recovered using an electric field and reused.\n\n With reference to Fig.\
    \ 3.2 and Fig. 3.3, explain why the results indicate that there are\nother advantages\
    \ in using immobilised lactase instead of free lactase to produce\nlactose‑free\
    \ products [4]\n\n[Total: 13]\n,\t,"
