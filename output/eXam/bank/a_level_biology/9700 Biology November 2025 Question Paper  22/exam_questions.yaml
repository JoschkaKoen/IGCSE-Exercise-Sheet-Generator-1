- number: '2'
  question_type: short_answer
  marks: 0
  text: "2\nCholera is an infectious intestinal disease caused by a bacterial pathogen.\n\
    \n(a) Name the species of bacterium that causes cholera [1]\n\n(b) The World Health\
    \ Organization (WHO) recommends a number of different approaches for the\nprevention\
    \ and control of cholera. Two of these are:\n•\nAuthorities should provide access\
    \ to safe drinking water.\n•\nIndividuals and communities should practise preventive\
    \ personal hygiene.\n\nSuggest and explain how these two approaches help in the\
    \ prevention and control of cholera [4]\n,\t,\n\n(c) Mass vaccination using an\
    \ oral cholera vaccine (OCV) can be carried out in situations where\nthere is\
    \ a high risk of people developing the disease.\n\nPassive immunisation involves\
    \ transferring antibodies into a person for the prevention\nor treatment of an\
    \ infectious disease. Some of the infectious diseases for which passive\nimmunisation\
    \ is available use monoclonal antibody. Passive immunisation for cholera using\n\
    monoclonal antibody could be available in the future.\n\n(i) Complete Table 2.1\
    \ to compare an OCV and passive immunisation for cholera:\n•\nfill in the empty\
    \ box in row 1\n•\ncircle the correct answers from the choices given in rows 3,\
    \ 4 and 5.\nTable 2.1\nrow\nfeature\noral cholera vaccine\npassive immunisation\n\
    for cholera\n1\ncomponent causing the\ndesired response\nantibody\n2\ntype of\
    \ immunity gained\nartificial active\nartificial passive\n3\nstimulates production\
    \ of\nmemory lymphocytes\nyes / no\nyes / no\n4\nlength of time needed to\nhave\
    \ an effect\nshorter\nsame\nlonger\nlonger\nsame\nshorter\n5\nduration of immunity\n\
    shorter\nsame\nlonger\nlonger\nsame\nshorter\n\n[4]\n\n(ii) The production of\
    \ monoclonal antibodies for treatment involves the formation of\nhybridoma cells\
    \ from two different cell types.\n\n Name the two types of cell that fuse to form\
    \ a hybridoma cell and explain why this fusion\nis necessary [3]\n\n[Total: 12]\n\
    ,\t,"
