  text: "6\nIn the pulmonary circulation of a mammal, deoxygenated blood becomes oxygenated\
    \ when\nred blood cells pass through alveolar capillaries and haemoglobin within\
    \ the cells combines\nwith oxygen.\n\nThe blood returns to the heart to be pumped\
    \ around the systemic circulation.\n\n(a) Describe the sequence of events occurring\
    \ in the heart that allows blood returning in the\npulmonary circulation to then\
    \ enter the systemic circulation.\n\nYou should include in your description:\n\
    •\nthe names of the relevant blood vessels of the pulmonary circulation and systemic\n\
    circulation that are connected to the heart\n•\nreference to blood pressure changes\
    \ that cause the opening and closing of valves.\n\nYou do not need to include\
    \ details of control of the cardiac cycle [5]\n,\t,\n\n(b) Fig. 6.1 is a drawing\
    \ of a haemoglobin molecule to show its globular structure.\nFig. 6.1\n\n(i) Describe\
    \ the quaternary structure of a haemoglobin molecule [2]\n\n(ii) Outline how a\
    \ haemoglobin molecule can become fully saturated with oxygen to\nform oxyhaemoglobin\
