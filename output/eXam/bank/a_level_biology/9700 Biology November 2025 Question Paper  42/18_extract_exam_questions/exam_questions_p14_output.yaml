    text: |
      Suggest the role of the DNA ladder.
  - number: "5bii"
    type: short_answer
    text: |
      In the genetic test for MLD, PCR and gel electrophoresis are carried out before DNA sequencing.

      Suggest \textbf{and} explain reasons why PCR and gel electrophoresis are carried out before DNA sequencing.