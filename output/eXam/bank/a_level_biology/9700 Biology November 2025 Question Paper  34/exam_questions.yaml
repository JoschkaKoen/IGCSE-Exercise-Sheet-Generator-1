  text: "2\nL1 is a slide of a stained transverse section through a plant organ.\n\
    \n(a) (i) Draw a large plan diagram of the region on L1 indicated by the shaded\
    \ area in Fig. 2.1.\nUse a sharp pencil.\n\n Use one ruled label line and label\
    \ to identify one vascular bundle.\ndraw this\nregion\nFig. 2.1\n[5]\n,\t\t,\n\
    \n(ii) Observe the xylem vessel elements in the organ on L1.\n\n Select a line\
    \ of four adjacent xylem vessel elements.\n\n Each xylem vessel element must touch\
    \ at least one other xylem vessel element.\n•\nMake a large drawing of this line\
    \ of four xylem vessel elements.\n•\nUse one ruled label line and label to identify\
    \ the wall of one xylem vessel element.\n\n[5]\n\n(iii) Identify the plant organ\
    \ on L1 and give a reason for your answer [1]\n,\n,\n\n(b) Fig. 2.2 is a photomicrograph\
    \ of a stained transverse section of the same organ from a\ndifferent plant to\
    \ L1.\nFig. 2.2\n\nIdentify two observable differences, other than colour, between\
    \ the section on L1 and the\nsection in Fig. 2.2.\n\nRecord these two observable\
    \ differences in Table 2.1.\nTable 2.1\nfeature\nL1\nFig. 2.2\n1\n2\n[3]\n,\t\
    ,\n\n(c) Fig. 2.3 shows a photomicrograph of a stage micrometer scale that is\
    \ being used to calibrate\nan eyepiece graticule.\n\nOne division, on either the\
    \ stage micrometer scale or the eyepiece graticule, is the distance\nbetween two\
    \ adjacent lines.\n\nThe length of one division on the stage micrometer in Fig.\
    \ 2.3 is 1.0 mm.\nstage micrometer\neyepiece graticule\n50\n60\n70\n80\n90\n10\n\
    20\n30\n40\n100\n0\nFig. 2.3\n\n(i) Calculate the actual length of one eyepiece\
    \ graticule unit shown in Fig. 2.3.\n\n Give your answer in micrometres (µm).\n\
    \n Show your working.\n\nactual length =   µm\n [2]\n,\t,\n\nFig. 2.4 is the same\
    \ photomicrograph as that shown in Fig. 2.2. This was taken with the same\nmicroscope\
    \ and the same lenses used to take the photomicrograph in Fig. 2.3. The eyepiece\n\
    graticule has been placed across the width of the tissue.\n50\n60\n70\n80\n90\n\
    0\n10\n20\n30\n40\n100\nFig. 2.4\n\n(ii) Use your calibration of one eyepiece\
    \ graticule unit from (c)(i) to calculate the actual\nwidth of the tissue between\
    \ the arrows on Fig. 2.4.\n\n Show your working and use appropriate units.\n\n\
    actual width of the tissue between the arrows   [2]\n,\t,\n\n(iii) The width of\
    \ the tissue in Fig. 2.4 varies. Suggest how you could more accurately\ncalculate\
    \ the width of the tissue [1]\n\n[Total: 19]\n,\t,"
