- number: '1'
  question_type: short_answer
  marks: 0
  text: "1\n(a) A plant produces sugars in its leaves. The sugars produced are needed\
    \ by other parts of the\nplant and are transported through the phloem as sucrose.\n\
    \nSucrose is transported to the roots where it is stored as starch. Some of the\
    \ sucrose is\ntransported to the fruit of the plant where it is stored as fructose\
    \ and glucose. Sucrose is also\ntransported to the seeds of the plant.\n\nWater\
    \ and mineral ions are taken up through the roots where they are transported through\n\
    the xylem to the rest of the plant.\n\nSolutions were made to represent extracts\
    \ of different tissues and fluids found in a plant:\n•\nfluid in the phloem\n\
    •\nroot tissue\n•\nseed tissue\n•\nfruit tissue\n•\nfluid in the xylem\n\nYou\
    \ are provided with 4 solutions, S1, S2, S3 and S4.\n\nYou will:\n•\nidentify\
    \ the biological molecules present in each of the 4 solutions\n•\nsuggest which\
    \ solution, S1, S2, S3 or S4, could represent each of the plant extracts.\n\n\
    You are provided with the materials shown in Table 1.1.\nTable 1.1\nlabelled\n\
    contents\nhazard\nvolume / cm3\nA\ndilute hydrochloric acid\nirritant\n20\nH\n\
    sodium hydrogencarbonate powder\nlow\n‑\nBenedict’s\nBenedict’s solution\nharmful\
    \ irritant\n40\nIodine\niodine solution\nirritant\n20\nS1\nsolution 1\nlow\n60\n\
    S2\nsolution 2\nlow\n60\nS3\nsolution 3\nlow\n60\nS4\nsolution 4\nlow\n60\n\n\
    If any solution comes into contact with your skin, wash off immediately with cold\
    \ water.\n\nIt is recommended that you wear suitable eye protection.\n,\t,\n\n\
    You will need to:\n•\ncarry out the test for reducing sugars\n•\ncarry out the\
    \ test for non‑reducing sugars\n•\ncarry out the test for starch\n•\nidentify\
    \ the biological molecules in S1, S2, S3 and S4.\n\n(i) State the reagent or reagents\
    \ that are used to test for reducing sugars and the colour or\ncolours produced\
    \ if reducing sugars are present.\nreagent or reagents   colour or colours   Describe\
    \ how you will carry out the test for reducing sugars [1]\n\nstep 1\nLabel 4 test‑tubes\
    \ S1, S2, S3 and S4.\n\nstep 2\nPut 1 cm3 of each solution into the appropriately\
    \ labelled test‑tube.\n\nstep 3\nCarry out the test for reducing sugars on S1,\
    \ S2, S3 and S4 described in (a)(i).\n\nstep 4\nRecord the colours observed in\
    \ (a)(iii).\n\n(ii) State the reagent or reagents that are used to test for non‑reducing\
    \ sugars and the\ncolour or colours produced if non‑reducing sugars are present.\n\
    reagent or reagents   colour or colours   Describe how you will carry out the\
    \ test for non‑reducing sugars [2]\n,\t,\n\nstep 5\nLabel 4 clean test‑tubes S1,\
    \ S2, S3 and S4.\n\nstep 6\nPut 1 cm3 of each solution into the appropriately\
    \ labelled test‑tube.\n\nstep 7\n Carry out the test for non‑reducing sugars on\
    \ S1, S2, S3 and S4 described\nin (a)(ii).\n\nstep 8\nRecord the colours observed\
    \ in (a)(iii).\n\nstep 9\nLabel 4 clean test‑tubes S1, S2, S3 and S4.\n\nstep\
    \ 10\nPut 1 cm3 of each solution into the appropriately labelled test‑tube.\n\n\
    step 11\nCarry out the test for starch on S1, S2, S3 and S4.\n\nstep 12\nRecord\
    \ the colours observed in (a)(iii).\n\n(iii) Record your results in an appropriate\
    \ table.\n\n[5]\n,\t,\n\n(iv) Complete Table 1.2 to suggest which solution (S1,\
    \ S2, S3 or S4) could represent each of\nthe plant extracts.\n\n Use your results\
    \ in (a)(iii) and the information on plant transport given in (a).\n\n A solution\
    \ could represent more than one plant extract.\nTable 1.2\nplant extract\nsolution\n\
    fluid in the phloem\nS...\nroot tissue\nS...\nseed tissue\nS...\nfruit tissue\n\
    S...\nfluid in the xylem\nS...\n\n[2]\n\n(v) Protein could be present in some\
    \ of the solutions.\n\n Describe how you would identify which solutions contain\
    \ protein [2]\n,\t,\n\n(b) A scientist investigated the effect of light on the\
    \ concentration of sugars in a plant for 24 hours.\nThe plant was kept in the\
    \ dark for the first 8 hours and then exposed to light for the remaining\n16 hours.\n\
    \nSamples were taken from the leaves and from the phloem sieve tubes. The concentration\
    \ of\nsugars in each sample was measured.\n\nThe results are shown in Table 1.3.\n\
    Table 1.3\ntime / hours\nconcentration of sugars / µmol\nleaves\nphloem sieve\
    \ tubes\n0\n0.38\n0.22\n5\n0.21\n0.17\n8\n0.13\n0.11\n15\n0.24\n0.16\n24\n0.39\n\
    0.22\n\n(i) Plot a line graph of the data in Table 1.3 on the grid in Fig. 1.1.\n\
    \n Use a sharp pencil.\nFig. 1.1\n\n[4]\n,\t,\n\n(ii) Describe the trend for the\
    \ concentration of sugars in the leaves and phloem sieve tubes\nshown in Fig.\
    \ 1.1 [1]\n\n(iii) Suggest an explanation for the trend in the data when the plant\
    \ was in the dark and\nwhen the plant was in the light.\nplant in the dark   plant\
    \ in the light   [2]\n\n(iv) Calculate the percentage increase in the concentration\
    \ of sugars in the leaves between\n15 and 20 hours.\n\n Show your working.\n\n\
    percentage increase   %\n [2]\n\n[Total: 21]\n,\t,"
