- number: '1'
  question_type: short_answer
  marks: 0
  text: "1\nThe bacterium Streptococcus pneumoniae is commonly found in the throat.\
    \ S. pneumoniae\nproduces hydrogen peroxide as it grows. A sample can be taken\
    \ from a patient’s throat and tested\nto measure the concentration of hydrogen\
    \ peroxide. This can be used as a measure of the growth\nof the bacteria.\n\n\
    You will determine the growth of bacteria by measuring the concentration of hydrogen\
    \ peroxide in\na solution that represents a sample taken from a patient. You will\
    \ do this by measuring how long it\ntakes for a sample of hydrogen peroxide to\
    \ cause a colour change in a reaction mixture. The faster\nthe mixture changes\
    \ to a blue‑black colour, the higher the concentration of hydrogen peroxide,\n\
    and the greater the growth of bacteria.\n\nYou will use a range of known concentrations\
    \ of hydrogen peroxide to estimate the concentration\nof hydrogen peroxide in\
    \ a sample.\n\nYou are provided with the materials shown in Table 1.1.\nTable\
    \ 1.1\nlabelled\ncontents\nhazard\nvolume / cm3\nR1\ndilute sulfuric acid\nirritant\n\
    100\nR2\nstarch solution\nlow\n10\nR3\npotassium iodide solution\nlow\n10\nR4\n\
    sodium thiosulfate solution\nlow\n10\nH\n2.0% hydrogen peroxide solution\nirritant\n\
    25\nU\nsolution representing patient sample\nirritant\n10\nW\ndistilled water\n\
    low\n100\n\nIf any solution comes into contact with your skin, wash off immediately\
    \ with cold water.\n\nIt is recommended that you wear suitable eye protection.\n\
    \nYou will need to carry out a serial dilution of the 2.0% hydrogen peroxide solution,\
    \ H, to reduce\nthe concentration by half between each successive dilution.\n\n\
    You will need to prepare four concentrations of hydrogen peroxide solution in\
    \ addition to the 2.0%\nhydrogen peroxide solution, H.\n\nAfter the serial dilution\
    \ is completed, you will need to have 10 cm3 of each concentration available\n\
    to use.\n\n(a) (i) Complete Fig. 1.1 to show how you will prepare your serial\
    \ dilution.\n\n Each beaker should have:\n•\na labelled arrow to show the volume\
    \ of hydrogen peroxide solution transferred\n•\na labelled arrow to show the volume\
    \ of distilled water, W, added\n•\na label under the beaker to show the concentration\
    \ of the hydrogen peroxide solution.\n,\t,\n0 cm3 of W\n,\t,"
