    (ii) Observe the epidermis of the stem on J1.\n\n Select a group of four adjacent\
    \ epidermal cells.\n\n Each cell must touch at least one other cell.\n•\nMake\
    \ a large drawing of this group of four epidermal cells and waxy cuticle.\n•\n\
    Use one ruled label line and label to identify the waxy cuticle.\n\n[5]\n,\t,\n\
    \n(iii) Fig. 2.1 is a photomicrograph of a stained transverse section of a stem\
    \ from a different\ntype of plant from J1.\nFig. 2.1\n\n Identify three observable\
