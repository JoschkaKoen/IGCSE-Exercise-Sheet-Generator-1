- number: '2'
  question_type: short_answer
  marks: 0
  text: "2\n(a) Haemoglobin is a globular protein containing haem groups.\n\nExplain\
    \ how the presence of haem groups allows the haemoglobin molecule to transport\n\
    oxygen [2]\n\n(b) In certain situations, such as during intense exercise, a person\
    \ may breathe very quickly and\ndeeply. This is known as hyperventilation.\n\n\
    This hyperventilation causes more carbon dioxide to be exhaled. As a result, there\
    \ is a lower\nconcentration of carbon dioxide in the blood that passes through\
    \ the capillary network in\nrespiring tissues. This increases the affinity of\
    \ haemoglobin for oxygen so that there is a\ndecrease in the release of oxygen\
    \ from red blood cells.\n\nExplain why a decrease in the concentration of carbon\
    \ dioxide in the blood passing through\nrespiring tissues leads to a decrease\
    \ in the release of oxygen from red blood cells [3]\n,\t,\n\n(c) Fig. 2.1 is a\
    \ diagram of a section through the heart.\nX\nPurkyne\nfibre\natrioventricular\
    \ node (AVN)\nFig. 2.1\n\n(i) Describe and explain how the tunica media (middle\
    \ layer of the wall) of blood vessel X\nadapts the blood vessel for its function\
    \ [3]\n\n(ii) Describe the role of the atrioventricular node (AVN) and the Purkyne\
    \ tissue in the cardiac\ncycle [4]\n[Total: 12]\n,\t,"
