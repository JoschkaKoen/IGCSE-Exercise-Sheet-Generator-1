  text: "5\n(a) Fig. 5.1 is a photomicrograph of a longitudinal section through part\
    \ of the stem of a plant.\nT\nFig. 5.1\n\n(i) Name one substance transported in\
    \ T in Fig. 5.1 [1]\n\n(ii) State the name of the substance that forms the spiral\
    \ thickening around the structure\nlabelled T in Fig. 5.1 [1]\n,\t,\n\n(b) A scientist\
    \ studied the effect of leaf temperature on the rate of transpiration from the\
    \ leaves of\nthe wheat plant, Triticum aestivum.\n\nThe scientist repeated the\
    \ investigation using the cotton plant, Gossypium hirsutum.\n\nThe results of\
    \ the investigation are shown in Table 5.1.\nTable 5.1\nleaf temperature\n/ °C\n\
    rate of transpiration\nof T. aestivum\n/ mmol m–2 s–1\nrate of transpiration\n\
    of G. hirsutum\n/ mmol m–2 s–1\n25\n 7\n 9\n30\n12\n10\n35\n15\n11\n40\n22\n12\n\
    45\n31\n14\n\n(i) Suggest explanations for the relationship between leaf temperature\
    \ and the rate of\ntranspiration of T. aestivum as shown in Table 5.1 [3]\n\n\
    (ii) Suggest one difference between the structure of the leaves of T. aestivum\
    \ and the leaves\nof G. hirsutum that could explain the results shown in Table\
    \ 5.1 [1]\n,\t,\n\n(c) Nematodes are microscopic animals that infect a wide range\
    \ of economically important plant\ncrops including cotton plants. Nematodes feed\
    \ on the roots of plants, limiting their growth.\n\nWhen root cells become infected,\
    \ the nematodes disrupt the plant mitotic cell cycle. This\ncauses the formation\
    \ of a special type of feeding cell (cell G) in the plant, from which the\nnematodes\
    \ absorb nutrients. Cell G is formed as a result of multiple cell cycles without\
    \ any\ncytokinesis.\n\n(i) Suggest how cell G differs from cells produced during\
    \ a mitotic cell cycle that has not\nbeen disrupted by a nematode [1]\n\n(ii)\
    \ Nematodes can also stimulate a process called endoreplication. This process\
    \ causes a\nplant cell to go through multiple S phases during one cell cycle without\
    \ entering mitosis\nor undergoing cytokinesis.\n\n State how the nucleus of a\
    \ cell that has been through endoreplication may differ from the\nnucleus of a\
    \ cell in the same plant that has not been affected by the nematode [1]\n\n[Total:\
    \ 8]\n,\t,"
