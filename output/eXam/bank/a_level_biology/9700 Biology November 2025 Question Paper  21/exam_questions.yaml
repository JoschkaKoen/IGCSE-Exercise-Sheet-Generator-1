  text: "6\n(a) Alveolar macrophages are phagocytes found in the human gas exchange\
    \ system. They\nproduce hydrolytic enzymes, such as lysozyme, to digest pathogens\
    \ entering the alveolus.\n\n(i) State the term used to describe the sequence of\
    \ nucleotides in the DNA of the alveolar\nmacrophage that codes for a protein,\
    \ such as lysozyme [1]\n\n(ii) Synthesis of lysozyme occurs in two stages. The\
    \ first stage occurs in the nucleus using\none strand of DNA to synthesise mRNA.\n\
    \n State the name of the strand of DNA that is used to synthesise mRNA [1]\n\n\
    (iii) Name the organelle where the translation of mRNA takes place to produce\
    \ lysozyme [1]\n\n(iv) Lysozyme destroys bacterial cells by hydrolysing bonds\
    \ in peptidoglycan.\n\n Explain how the hydrolysis of bonds in peptidoglycan leads\
    \ to the destruction of bacterial\ncells [2]\n,\t,\n\n(b) (i) Alveolar macrophages\
    \ are found in contact with squamous epithelial cells in the walls of\nalveoli.\n\
    \n Explain how the cells lining the alveoli are adapted for gas exchange [2]\n\
    \n(ii) Describe the role of elastic fibres in the wall of an alveolus [2]\n\n\
    [Total: 9]\n,\t\t,"
