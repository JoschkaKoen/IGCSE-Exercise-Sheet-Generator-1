- number: '4'
  question_type: short_answer
  marks: 0
  text: "4\nFig. 4.1 is a photomicrograph of a copepod. These animals are found living\
    \ in sea water and in\nfresh water environments.\n1mm\nFig. 4.1\n\n(a) The outer\
    \ surface of a copepod is covered in a layer of the polysaccharide chitin.\n\n\
    Fig. 4.2 shows part of a chitin molecule.\nO\nOH\nCH2OH\nCH2OH\nOH\nNH\nC=O\n\
    O\nO\nO\nO\nCH3\nNH\nC=O\nCH3\n– – –\n– – –\nFig. 4.2\n\n(i) Draw a circle around\
    \ a glycosidic bond in Fig. 4.2.\n[1]\n,\t,\n\n(ii) In aquatic environments, Vibrio\
    \ cholerae can live on the surface of copepods. V. cholerae\nsecretes enzymes\
    \ to hydrolyse chitin to its N‑acetylglucosamine monomers. These can\nbe broken\
    \ down to provide carbon, nitrogen and a source of energy.\n\n Draw the monomer\
    \ that is formed when chitin is hydrolysed by V. cholerae.\n\n[2]\n,\t,\n\n(b)\
    \ V. cholerae is a pathogen that causes cholera.\n\nScientists studied the transmission\
    \ of V. cholerae in groups of people living in an area where\nthere is a high\
    \ number of cases of cholera.\n\nSome families living in this area filtered their\
    \ water through several layers of folded fabric\nfrom old clothing. The folded\
    \ fabric traps particles and organisms larger than 20 µm.\n\nThe scientists recorded\
    \ the number of cases of cholera in families that filtered their water\nthrough\
    \ folded fabric and compared this to the number of cases of cholera recorded in\n\
    families that did not filter their water through the folded fabric.\n\nThe results\
    \ are shown in Fig. 4.3.\n0.4\n0.0\n0.8\nnumber of\ncases of\ncholera\nper 1000\n\
    population\n1.2\nwater\nnot\nfiltered\nwater filtered\nthrough\nfolded fabric\n\
    water treatment\nFig. 4.3\n\nSuggest possible explanations for the results shown\
    \ in Fig. 4.3 [4]\n,\t,\n\n(c) The World Health Organization (WHO) recommends\
    \ the use of an oral cholera vaccine (OCV)\nto protect people living in an area\
    \ where a cholera outbreak has occurred.\n\nPeople who receive an OCV and make\
    \ changes in their behaviour are less likely to have a\nserious case of cholera.\n\
    \n(i) Describe one change in behaviour that a person can make, other than purifying\
    \ water,\nto help prevent a serious case of cholera [1]\n\n(ii) The antibiotic\
    \ tetracycline is used to treat cholera. However, some bacteria that cause\ncholera\
    \ have evolved resistance to this antibiotic.\n\n Scientists have reported that\
    \ resistant bacteria have an extra protein in their cell surface\nmembrane. This\
    \ protein has been found to use ATP.\n\n Suggest how the presence of this protein\
    \ in the cell surface membrane gives V. cholerae\nresistance to tetracycline [2]\n\
    \n(iii) For some vaccines, there may not be an effective secondary immune response\
    \ when a\nperson is infected by the specific pathogen. The antibodies that are\
    \ produced do not act\non the pathogen. This is known as immune evasion.\n\n Evolution\
    \ of resistance of bacteria to antibiotics occurs more frequently than immune\n\
    evasion.\n\n Suggest why bacteria evolve resistance to antibiotics more frequently\
    \ than vaccines that\nlose their effectiveness in protecting against bacterial\
    \ pathogens [2]\n\n[Total: 12]\n,\t,"
