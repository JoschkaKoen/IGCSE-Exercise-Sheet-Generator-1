- number: '3'
  question_type: short_answer
  marks: 0
  text: "3\n(a) The lock‑and‑key hypothesis and the induced‑fit hypothesis are used\
    \ to describe the\ninteraction of enzymes and their substrates.\n\nDescribe one\
    \ similarity and one difference between the lock‑and‑key hypothesis and the\n\
    induced‑fit hypothesis.\nsimilarity   difference   [2]\n\n(b) Phosphorylase enzymes\
    \ can catalyse the synthesis of starch and the breakdown of starch in\nsome plant\
    \ tissues. A reaction catalysed by starch phosphorylase is shown in Fig. 3.1.\n\
    glucose 1-\nphosphate\npart of a starch\nmolecule\nphosphate\nion\nstarch\nphosphorylase\n\
    +\n+\nP\nP\nFig. 3.1\n\nA student carried out an experiment to study the synthesis\
    \ of starch by phosphorylase found\nin potato tissue.\n\nThe student was provided\
    \ with a solution, E, extracted from potato tissue. The extract was\nfiltered\
    \ to remove all the starch grains.\n\nExtract E contained biological molecules\
    \ from the potato tissue including phosphorylase but\nno starch.\n\n(i) Iodine\
    \ solution was used to confirm that starch was not present in extract E.\n\n State\
    \ the colour observed when iodine solution was added to a sample of extract E\
    \ [1]\n,\t,\n\nThe student added a small drop of a dilute starch solution and\
    \ a solution of\nglucose 1‑phosphate to a test‑tube containing extract E.\n\n\
    Samples of the reaction mixture in the test‑tube were removed every minute and\
    \ a drop of\niodine solution was added to each.\n\nThe student used a colorimeter\
    \ to measure the absorbance of the solution in each sample.\n\nThe results are\
    \ shown in Fig. 3.2.\n0\n0.5\n1.0\nabsorbance\n1.5\n2.0\n2\n4\n6\ntime / min\n\
    8\n10\n12\nFig. 3.2\n\n(ii) Explain the results shown in Fig. 3.2 [3]\n,\t,\n\n\
    (iii) After 12 minutes, the student added a solution containing phosphate ions\
    \ to the reaction\nmixture. The student continued taking samples every minute,\
    \ adding iodine solution to\neach sample.\n\n The absorbance of the solution in\
    \ each of these samples was measured. The results\nshowed that the absorbance\
    \ decreased over time.\n\n Suggest why the absorbance decreased [1]\n,\t\t,\n\n\
    (c) Muscle cells contain glycogen phosphorylase.\n\nFig. 3.3 shows the effect\
    \ of caffeine on the activity of glycogen phosphorylase at different\nconcentrations\
    \ of substrate.\n0\n50\n100\nglycogen\nphosphorylase\nactivity\n/ arbitrary units\n\
    150\n200\n5\n10\n15\nconcentration of substrate / mmol dm–3\n20\n25\nKey\nwithout\
    \ caffeine\nwith caffeine\nFig. 3.3\n\nA student concluded that caffeine acts\
    \ as a non‑competitive inhibitor of glycogen\nphosphorylase.\n\nExplain how the\
    \ results in Fig. 3.3 support this conclusion [3]\n\n[Total: 10]\n,\n,"
