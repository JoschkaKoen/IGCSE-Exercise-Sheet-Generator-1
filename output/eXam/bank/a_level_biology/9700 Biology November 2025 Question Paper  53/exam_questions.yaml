- number: '1'
  question_type: short_answer
  marks: 0
  text: "1\nJuglone is a chemical produced by plants in the genus Juglans, which includes\
    \ different species\nof walnut tree.\n\nFig. 1.1 shows a black walnut tree.\n\
    Fig. 1.1\n\nJuglone produced by a black walnut tree can diffuse into the soil\
    \ surrounding the tree.\n\nGroups of scientists have observed that juglone affects\
    \ different species of plant growing close to\nblack walnut trees.\n\nJuglone\
    \ can reduce the percentage of seeds that germinate, delay the start of germination\
    \ or\nreduce growth. In some studies, juglone has no effect on germination or\
    \ growth.\n\nA student planned to investigate the effect of juglone on the cucumber\
    \ plant, Cucumis sativus.\n\nIn the investigation, the student:\n•\nplaced some\
    \ damp soil containing juglone in a tray\n•\nadded some cucumber seeds to the\
    \ soil\n•\nplaced the container in a suitable environment for germination and\
    \ growth.\n,\t,\n\nFig. 1.2 shows cucumber seedlings (young plants) a few days\
    \ after germination.\nFig. 1.2\n\nThe student planned to compare the effect of\
    \ exposing cucumber seeds to:\n•\njuglone solution with a concentration of 1.0\
    \ × 10–3 mol dm–3, which is a concentration that has\nbeen measured in soils surrounding\
    \ black walnut trees\n•\na control treatment.\n\nThe student planned to determine:\n\
    •\nthe percentage of cucumber seeds that germinated in soil\n•\nthe growth of\
    \ each cucumber seedling 10 days after the appearance of the seedling above\n\
    the soil.\n\n(a) Identify the independent variable in this investigation [1]\n\
    ,\t,\n\n(b) Juglone solutions are prepared using a mixture of solvents.\n\nThe\
    \ student was provided with:\n•\na juglone solution with a concentration of 0.1\
    \ mol dm–3\n•\nthe mixture of solvents.\n\nUsing the solution provided, the student\
    \ prepared a juglone solution with a volume of 500 cm3\nand a concentration of\
    \ 1.0 × 10–3 mol dm–3.\n\nThe student carried out 1 dilution to prepare the 1.0\
    \ × 10–3 mol dm–3 solution using measuring\ncylinders.\n\n(i) State the volumes\
    \ that the student used to carry out the dilution to produce 500 cm3 of\n1.0 ×\
    \ 10–3 mol dm–3 juglone solution [2]\n\n(ii) Outline one improvement the student\
    \ could make to reduce the percentage error while\ncarrying out the dilution [1]\n\
    \n(c) (i) State a suitable control that the student could use, and explain why\
    \ the student decided\nto include a control in the investigation.\ncontrol   explanation\
    \   [2]\n,\t,\n\n(ii) Describe a method the student could use to investigate the\
    \ effect of juglone on:\n•\nthe percentage of cucumber seeds that germinate\n\
    •\nthe growth of each cucumber seedling 10 days after the appearance of the seedling\n\
    above the soil.\n\n The description of your method should be set out in a logical\
    \ way and be detailed enough\nfor another person to follow [7]\n,\t,\n\n(d) Another\
    \ student investigated the effect of juglone on a different species of plant called\
    \ crimson\nclover, Trifolium incarnatum.\n\nThe student recorded the number of\
    \ days required for germination of:\n•\n10 seeds treated with a juglone solution\
    \ with a concentration of 1.0 × 10–3 mol dm–3\n•\n10 seeds not treated with a\
    \ juglone solution.\n\n(i) The student used the t-test to analyse the results.\
    \ The t-test is appropriate for the number\nof seeds that were used.\n\n Suggest\
    \ two other reasons why the t-test is an appropriate statistical test to use for\
    \ this\ninvestigation [2]\n,\t,\n\n(ii) The null hypothesis for this t-test was:\n\
    \n There is no difference between the time taken for seeds to germinate when\n\
    treated with juglone and the time taken for seeds to germinate when not treated\n\
    with juglone.\n\n The calculated value of t was 2.090.\n\n The student compared\
    \ 2.090 to the values in Table 1.1.\nTable 1.1\ndegrees of\nfreedom\nprobability\
    \ level (p)\n0.10\n0.05\n0.01\n0.001\n17\n1.740\n2.110\n2.898\n3.965\n18\n1.734\n\
    2.101\n2.878\n3.922\n19\n1.729\n2.093\n2.861\n3.883\n20\n1.725\n2.086\n2.845\n\
    3.850\n21\n1.721\n2.080\n2.831\n3.819\n\n Using Table 1.1 and the calculated value\
    \ of t of 2.090, state and explain what the student\ncan conclude about the results\
    \ [3]\n\n[Total: 18]\n,\t,"
