  text: "2\nThe buff‑tailed bumblebee, Bombus terrestris, is an insect that uses its\
    \ tongue to feed on the\nnectar and pollen of flowers.\n\nBuff‑tailed bumblebees\
    \ can feed on the nectar and pollen of flowers by either gripping (holding)\n\
    onto flower petals or by hovering (flying) in front of the flowers.\n\nFig. 2.1\
    \ shows the buff‑tailed bumblebee.\n10 mm\nclaw\nFig. 2.1\n\nThe buff‑tailed bumblebee\
    \ has adaptations, such as claws, to help it to grip on to flower petals to\n\
    obtain nectar and pollen.\n\nFig. 2.2 shows the buff‑tailed bumblebee using its\
    \ claws to grip on to the flower petals as the bee\nfeeds.\nflower\npetal\nclaw\
    \ used to\ngrip the flower\npetal\nFig. 2.2\n,\t,\n\nFig. 2.3 is a magnified image\
    \ of the claw of a bee.\nclaws\nFig. 2.3\n\n(a) Suggest a method that can be used\
    \ to measure the image length of the longest part of the\ncurved claw in Fig.\
    \ 2.3 [1]\n,\t,\n\n(b) The surfaces of flower petals of different plant species\
    \ have different textures.\n\nFig. 2.4 shows a scanning electron micrograph of\
    \ a rough surface of a flower petal.\nFig. 2.4\n\nFig. 2.5 shows a scanning electron\
    \ micrograph of a smoother surface of a flower petal.\nFig. 2.5\n,\t\t,\n\nA scientist\
    \ made an artificial flower apparatus, as shown in Fig. 2.6.\n60 mm diameter disc\
