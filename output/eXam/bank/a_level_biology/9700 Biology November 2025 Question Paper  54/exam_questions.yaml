  text: "3\n(a) Pectin is a polysaccharide found in plant cell walls. Pectinase is\
    \ an enzyme that hydrolyses\npectin.\n\nA student investigated the use of pectinase\
    \ to extract more juice from different types of fruit.\n\nThe student:\n•\nremoved\
    \ the outer skin and cut each type of fruit into small pieces\n•\nplaced each\
    \ type of fruit into a separate beaker with 5 cm3 of 1% pectinase solution\n•\n\
    incubated the mixture at 60 °C for 10 minutes\n•\npassed the contents of the beaker\
    \ through a filter funnel into a measuring cylinder\n•\nmeasured the volume of\
    \ juice extracted from each type of fruit.\n\nTable 3.1 shows the results.\nTable\
    \ 3.1\ntype of fruit\nvolume of juice extracted / cm3\nsample 1\nsample 2\nsample\
    \ 3\nmean of\nsamples\napple\n16\n17\n17\n\n orange\n30\n37\n33\n\n pineapple\n\
    41\n44\n45\n\n grapes\n17\n15\n11\n\n (i) Complete Table 3.1 by calculating the\
    \ means.\n[1]\n\n(ii) The independent variable is the type of fruit and the dependent\
    \ variable is the volume of\njuice extracted.\n\n Complete Table 3.2 to show the\
    \ type of variable and the type of data.\nTable 3.2\ntype of variable\ntype of\
    \ data\ntype of fruit\nvolume of juice extracted\n\n[2]\n,\t,\n\n(iii) State two\
    \ changes the student should make to their method to improve the quality of\n\
    their results [2]\n\n(b) The student wanted to determine the quantity of pectin\
    \ in the cell walls of different types of\nfruit.\n\nSuggest why the student could\
    \ not use the experiment in 3(a) to determine the quantity of\npectin in the cell\
    \ walls of different types of fruit [2]\n\n[Total: 7]\n,\t,"
