  text: "1\nBeta vulgaris vulgaris, as shown in Fig. 1.1, is a food crop with a swollen,\
    \ edible root known as\nbeetroot.\nleaves\nbeetroot\nwith outer skin\nmain taproot\n\
    Fig. 1.1\n\nA student determined the concentration of a sucrose solution that\
    \ has the same water potential as\nthe cells of the beetroot.\n\nThe student used\
    \ distilled water and a stock solution of 2.0 mol dm–3 sucrose to prepare a range\
    \ of\nsucrose solutions.\n\nEach sucrose solution was prepared using proportional\
    \ dilution and had a final volume of 30 cm3.\n\n(a) Complete Table 1.1 to show\
    \ how the concentrations were made.\nTable 1.1\nfinal concentration of\nsucrose\
    \ solution\n/ mol dm–3\nvolume of\ndistilled water\n/ cm3\nvolume of 2.0 mol dm–3\n\
    stock sucrose solution\n/ cm3\n2.0\n 0.0\n30.0\n\n 0.0\n30.0\n0.0\n\n[2]\n,\t\
    ,\n\n(b) Describe a method the student could use to collect the data needed to\
    \ determine the\nconcentration of a sucrose solution that has the same water potential\
    \ as the cells of the\nbeetroot.\n\nThe student was supplied with the sucrose\
    \ solutions prepared in 1(a) and standard laboratory\nequipment.\n\nDo not include\
    \ details of how the student:\n•\nprepared the sucrose solutions in 1(a)\n•\n\
    would use the data collected to determine the concentration of a sucrose solution\
    \ that\nhas the same water potential as the cells of the beetroot.\n\nYour method\
