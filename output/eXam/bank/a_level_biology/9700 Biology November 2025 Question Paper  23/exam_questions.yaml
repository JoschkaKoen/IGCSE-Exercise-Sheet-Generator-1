  text: "1\nMany substances can move through cell surface membranes between the cytoplasm\
    \ of animal\ncells and the extracellular environment.\n\n(a) A student made a\
    \ drawing to summarise the movement of substances across the cell surface\nmembranes\
    \ of mammalian red blood cells.\n\nFig. 1.1 shows the drawing made by the student:\n\
    •\nEach arrow indicates the movement of a substance through the membrane.\n•\n\
    The number of each of the 4 shapes represents the relative concentrations of each\n\
    substance in the cytoplasm and in the blood plasma.\nA\nB\nATP\nADP + Pi\ncytoplasm\
    \ of\nred blood cell\nblood plasma\nC\nD\nFig. 1.1\n\nThe student carried out\
    \ research and made a list of some of the substances found in\nred blood cells\
    \ as shown in Fig. 1.2.\nsodium ions\noxygen\nhaemoglobin\ncarbon dioxide\npotassium\
    \ ions\ncalcium ions\nchloride ions\ncarbonic anhydrase\nhydrogencarbonate ions\n\
    glucose\namino acids\nFig. 1.2\n,\t,\n\nTable 1.1 shows information about the\
    \ 4 types of movement of substances across the cell\nsurface membranes of red\
    \ blood cells as shown in Fig. 1.1.\n\nComplete Table 1.1 using the information\
    \ in Fig. 1.1 and Fig. 1.2.\nTable 1.1\nletter\nfrom\nFig. 1.1\ntype of movement\n\
    name of part of\nmembrane involved\nexample of a\nsubstance that moves\nacross\
    \ the membrane\n(from Fig. 1.2)\nA\nsimple diffusion\nphospholipids\nB\nfacilitated\
    \ diffusion\ncalcium ions\nC\nfacilitated diffusion\nD\n\n[5]\n\n(b) Some viruses\
    \ infect plants through the surfaces of damaged leaves. These plant viruses\n\
    can travel from one leaf cell to another without having to pass through any cell\
    \ surface\nmembranes.\n\nExplain how some plant viruses can travel from one cell\
    \ to another without passing through\ncell surface membranes [2]\n\n[Total: 7]\n\
    ,\t,"
