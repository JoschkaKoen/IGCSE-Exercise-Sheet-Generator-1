  text: "3\n(a) Describe the induced-fit hypothesis of enzyme action [3]\n\n(b) Many\
    \ marine organisms can become attached to hard surfaces such as rocks or the surfaces\n\
    of ships. These organisms are known as fouling organisms.\n\nThe larva of the\
    \ acorn barnacle, Amphibalanus amphitrite, is an example of a fouling\norganism.\
    \ One of these barnacle larvae is shown in Fig. 3.1.\nmagnification ×160\nFig.\
    \ 3.1\n\nThe larvae of A. amphitrite use a protein to attach themselves to the\
    \ surfaces of ships.\n\nIt is expensive to remove fouling organisms from ships.\
    \ Scientists have developed substances\nto prevent the attachment of larvae. However,\
    \ some of these substances are toxic and have\nbeen responsible for a decrease\
    \ in marine biodiversity.\n\nScientists investigated the effect of using an immobilised\
    \ protease, subtilisin A, to prevent the\nattachment of the larvae of A. amphitrite\
    \ to surfaces.\n\nThe scientists used 4 different concentrations of subtilisin\
    \ A which had been immobilised onto\nthe surface of a polymer film. As a control\
    \ they used denatured subtilisin A immobilised onto\nthe surface of the same polymer.\
    \ Glass slides were also used as a control.\n,\t\t,\n\nThe larvae were released\
    \ into 6 tanks of artificial sea water:\n•\n4 tanks, each with a polymer surface\
    \ and a different concentration of immobilised\nsubtilisin A\n•\n1 tank with a\
    \ polymer surface and denatured immobilised subtilisin A\n•\n1 tank with glass\
    \ slides instead of a polymer surface.\n\nThe number of larvae that attached to\
    \ the different surfaces in the tanks was counted after\n24 hours and again after\
    \ 48 hours.\n\nThe number of larvae attached in each tank was expressed as the\
    \ percentage of the total\nnumber of larvae released in each tank. The results\
    \ are shown in Fig. 3.2.\n0\n1\n2\n3\n4\n10\n20\n30\n40\n50\npercentage of\nlarvae\n\
    attached to\nsurfaces\npolymer surface\nwith denatured\nimmobilised\nsubtilisin\
    \ A\npolymer surface with\nimmobilised subtilisin A of\nincreasing concentration\n\
    glass slides\n(no polymer)\n60\n70\nKey\nafter 24 hours\nafter 48 hours\nFig.\
    \ 3.2\n\n(i) With reference to the data in Fig. 3.2, discuss whether subtilisin\
    \ A is effective in preventing\nthe attachment of the larvae [4]\n,\n,\n\n(ii)\
    \ The scientists extended their investigation by applying the polymer with immobilised\n\
    subtilisin A to the outside of the bottom of small ships.\n\n Two factors that\
    \ need to be taken into consideration in this type of investigation are the\n\
    temperature and pH of the sea water.\n\n Outline two other factors that need to\
    \ be taken into consideration when investigating the\nsuitability of immobilised\
    \ subtilisin A as an anti-fouling agent for ships [2]\n\n[Total: 9]\n,\t,\nQuestion\
    \ 4 starts on page 12.\n,\t,"
