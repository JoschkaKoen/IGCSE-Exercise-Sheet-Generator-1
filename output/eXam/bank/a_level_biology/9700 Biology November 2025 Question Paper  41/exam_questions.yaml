  text: "3\nPlants have several different photosynthetic pigments in their chloroplasts.\n\
    \n(a) A student separated and identified the chloroplast pigments present in a\
    \ leaf extract from a\nspinach plant using two slightly different methods.\n\n\
    Method A\n•\nA type of chromatography known as thin layer chromatography (TLC)\
    \ was used to\nseparate the pigments.\n•\nA mixture of ether and cyclohexane was\
    \ used as a solvent in TLC.\n\nMethod B\n•\nThe student repeated TLC but treated\
    \ the spinach leaf extract with a chemical. The\nchemical causes a magnesium ion\
    \ in a pigment to be replaced by two hydrogen ions.\n•\nThe student used a leaf\
    \ from the same spinach plant, and used the same solvent as in\nmethod A.\n\n\
    The student calculated Rf values and compared these to reference values to identify\n\
    the pigments.\n\nFig. 3.1 shows the results for method A and method B.\nA\nB\n\
    solvent front\nβ-carotene\nchlorophyll a\nchlorophyll b\nxanthophyll\nline of\
    \ origin\nsolvent front\nβ-carotene\nphaeophytin a\nphaeophytin b\nchlorophyll\
    \ b\nxanthophyll\nline of origin\nFig. 3.1\n,\t,\n\n(i) Calculate the Rf value\
    \ of β‑carotene in Fig. 3.1.\n\nRf =   [2]\n\n(ii) Suggest two explanations for\
    \ the differences in appearance of chromatograms A and B\nin Fig. 3.1.\n1   2\
    \   [2]\n\n(iii) The student found some different Rf values for the chloroplast\
    \ pigments of spinach in a\nscientific paper.\n\n The values in the scientific\
    \ paper were different from the reference values that the\nstudent originally\
    \ used to identify the pigments on chromatograms A and B in Fig. 3.1.\n\n Suggest\
    \ one reason, other than measurement error, for the different Rf values [1]\n\
    ,\t,\n\n(b) Fig. 3.2 shows the absorption spectra of some chloroplast pigments.\n\
    400\n0\n30\n60\n90\n500\n600\nwavelength of light / nm\npercentage\nabsorption\n\
    key\nchlorophyll a\nchlorophyll b\ncarotenoids (β-carotene and xanthophyll)\n\
    700\nblue\nred\nFig. 3.2\n\nUse Fig. 3.2 to compare the similarities and differences\
    \ between the absorption spectra of\nchlorophyll a and carotenoids [4]\n,\t\t\
    ,\n\n(c) In some species of plant, the absorption of light stimulates seed germination.\n\
