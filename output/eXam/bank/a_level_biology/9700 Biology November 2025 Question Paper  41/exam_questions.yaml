  text: "4\nThe wolf, Canis lupus, lives in North America. Wolves may have a grey\
    \ or a black coat colour. The\ncolour of an individual wolf depends on the DNA\
    \ it inherits at the CPD103 gene locus.\n•\nWolves inherit two copies of CPD103,\
    \ one from each parent.\n•\nWolves that inherit one copy of the black form of\
    \ the CPD103 gene have a black coat.\n\n(a) State the term used to describe:\n\
    \n•\nan organism that has two copies of each gene\n  •\na form of a gene\n  •\n\
    \ a form of a gene that gives a phenotypic\n\neffect in a heterozygote [3]\n\n\
    In addition to producing black coat colour, the protein coded for by the CPD103\
    \ gene also defends\nagainst infectious lung disease.\n\nCanine distemper virus\
    \ (CDV) causes serious lung disease in wolves. Wolves that have been\npreviously\
    \ infected by CDV have antibodies against CDV (anti‑CDV antibodies) in their blood.\n\
    \n(b) CDV can be passed from domestic dogs to wolves.\n•\nDomestic dogs are more\
    \ numerous in the southern part of the area occupied by wolves.\n•\nDomestic dogs\
    \ are less numerous in the northern part of the area occupied by wolves.\n•\n\
    The relative frequency of black wolves compared to grey wolves increases from\
    \ the\nnorth to the south of the area they occupy.\n\nExplain how natural selection\
    \ causes this trend in the distribution of black wolves [4]\n,\t,\n\n(c) Several\
    \ different populations of wolves were compared.\n\nFig. 4.1 shows the relationship\
    \ between the percentage of wolves in a population that have\nanti‑CDV antibodies\
    \ in their blood and the percentage of wolves in that population that are\nblack.\
    \ The line of best fit was calculated after comparing the different populations\
    \ of wolves.\n0\n0\n10\n20\n30\n40\n50\n60\n10\n20\npercentage of wolves with\n\
    anti-CDV antibodies\npercentage of\nblack wolves\nin population\n30\n40\nFig.\
    \ 4.1\n\nWith reference to Fig. 4.1, state the relationship between the percentage\
    \ of wolves with\nanti‑CDV antibodies and wolf coat colour, and suggest reasons\
    \ for this relationship [4]\n[Total: 11]\n,\t,"
