  text: "1\nGuinea pigs, Cavia porcellus, vary in the length and colour of their fur.\n\
    \nFig. 1.1 shows a guinea pig with short black fur.\nFig. 1.1\n\nTwo genes that\
    \ determine the length and colour of the fur occur at the A/a locus and the B/b\n\
    locus. These two gene loci are on separate autosomal chromosomes.\n•\nThe allele\
    \ A results in short fur.\n•\nThe allele a results in long fur.\n•\nA is dominant\
    \ to a.\n•\nThe allele B results in black fur.\n•\nThe allele b results in chocolate\
    \ fur.\n•\nB is dominant to b.\n\n(a) (i) List all the possible genotypes of a\
    \ guinea pig with short black fur [2]\n\n(ii) A test cross could be used to determine\
    \ the genotype of a female guinea pig with short\nblack fur.\n\n Describe the\
    \ phenotype of the male guinea pig that could be used to carry out this\ntest\
    \ cross [1]\n,\t,\n\n(b) A black guinea pig with long fur that was homozygous\
    \ at both loci was crossed with a\nchocolate guinea pig with short fur that was\
    \ homozygous at both loci. The F1 offspring of this\ncross had short black fur.\
    \ F1 offspring were mated together to produce the F2 offspring.\n\nComplete the\
    \ Punnett square to:\n•\nshow the cross between the F1 offspring\n•\npredict the\
    \ F2 offspring genotypes.\n\nYou should include the gametes in your answer.\n\n\
    State the ratio of F2 offspring phenotypes. You should include a key to link phenotypes\
    \ to\ngenotypes.\n\nratio of F2 offspring phenotypes:\n[4]\n\n(c) Some genes in\
    \ guinea pigs are structural genes and some are regulatory genes.\n\nDescribe\
    \ the difference between a structural gene and a regulatory gene [2]\n[Total:\
    \ 9]\n,\t,"
