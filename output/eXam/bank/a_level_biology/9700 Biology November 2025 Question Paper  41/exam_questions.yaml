  text: "2\nExserohilum turcicum is a fungal pathogen. The growth of the mycelium\
    \ of the fungus damages\nthe leaves of maize plants, Zea mays. Leaf damage reduces\
    \ crop yield.\n\n(a) (i) Complete Table 2.1 to show one structural difference\
    \ and one functional difference\nbetween E. turcicum and Z. mays.\nTable 2.1\n\
    E. turcicum\nZ. mays\nstructural\ndifference\nfunctional\ndifference\n[2]\n\n\
    (ii) Describe the principles by which organisms such as E. turcicum and Z. mays\
    \ are\nclassified in the taxonomic hierarchy [4]\n,\t,\n\n(b) Two inbred varieties\
    \ of maize, SKV50 and CML153, were crossed. The resulting F1 hybrids\nwere self‑crossed\
    \ to produce F2 offspring. The F2 plants were grown, and the percentage\narea\
    \ of leaf damage caused by E. turcicum was measured.\n\nFig. 2.1 shows the results\
    \ for the F2 generation. The arrows show the mean percentage area\nof leaf damage\
    \ for the two parent varieties.\n20\n0\n10\n20\n30\n40\n50\n30\npercentage area\
    \ of\nleaf damage\nSKV50\nCML153\nnumber\nof plants\n40\n50\n60\nFig. 2.1\n\n\
    (i) Explain how Fig. 2.1 can be used to determine which parent maize variety shows\
    \ the\ngreatest resistance to infection by E. turcicum [2]\n\n(ii) State the name\
    \ of the type of variation shown by the maize F2 generation in Fig. 2.1 [1]\n\n\
    (iii) Explain the genetic basis of the type of variation shown by the maize F2\
    \ generation [4]\n[Total: 13]\n,\t,"
