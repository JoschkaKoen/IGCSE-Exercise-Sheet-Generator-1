  text: "6\nThe distribution of the large blue butterfly, Phengaris arion, extends\
    \ across Europe and Asia. It is\nassessed by the International Union for Conservation\
    \ of Nature (IUCN) on the Red List™ as ‘Near\nThreatened’ globally and ‘Endangered’\
    \ in Europe.\n\nIn Europe, P. arion became extinct in the Netherlands in 1964\
    \ and in the United Kingdom in 1979.\n\nFig. 6.1 lists the conservation status\
    \ categories in the IUCN Red List™.\nconservation status\nExtinct (EX)\nExtinct\
    \ in the Wild (EW)\nCritically Endangered (CR)\nEndangered (EN)\nincreasing risk\
    \ of extinction\nVulnerable (VU)\nNear Threatened (NT)\nLeast Concern (LC)\nFig.\
    \ 6.1\n\nFig. 6.2 shows P. arion.\nFig. 6.2\n\n(a) (i) Explain how IUCN Red List™\
    \ assessments help to conserve biodiversity [3]\n,\t,\n\n(ii) With reference to\
    \ Fig. 6.1 and the IUCN assessments for P. arion, suggest how the\nabundance of\
    \ the butterfly differs across its distribution [2]\n\n(b) P. arion has been successfully\
    \ re‑introduced in the United Kingdom at 12 sites. These sites\nwere restored\
    \ to flower‑rich grassland.\n\nThe conservation management actions designed for\
    \ P. arion also resulted in the\nre‑establishment or increase of other species\
    \ at the restored sites. These included 12 species\nof flowering plant, 8 other\
    \ butterfly species and 4 species of other insects.\n\n(i) Use the information\
    \ given to suggest why P. arion went extinct in the United Kingdom\nin 1979 [2]\n\
