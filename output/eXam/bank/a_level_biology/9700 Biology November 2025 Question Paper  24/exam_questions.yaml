- number: '1'
  question_type: short_answer
  marks: 0
  text: "1\nThere are similarities and differences between the structure of a typical\
    \ plant cell and a typical\nanimal cell.\n\n(a) The nucleus of plant cells and\
    \ animal cells contains chromosomes. In interphase of the cell\ncycle, individual\
    \ chromosomes are present but cannot be seen. The chromosome material is\nknown\
    \ as chromatin.\n\n(i) Changes occur in interphase, which result in a difference\
    \ between the chromatin in the\nG1 phase compared with the chromatin in the G2\
    \ phase.\n\n State and explain the difference in chromatin in the G1 phase compared\
    \ with chromatin\nin the G2 phase [2]\n\n(ii) Describe the features of a nucleus,\
    \ other than containing chromatin.\n\n You may use the space below the lines for\
    \ a diagram [3]\n,\t,\n\n(b) Starch, cellulose and pectins are polysaccharides\
    \ found in plant cells but not in animal cells.\n\nPectins are complex polysaccharides\
    \ that are found in the cell wall.\n\n(i) Describe the structural features of\
    \ starch that are different from the structural features\nof cellulose [4]\n\n\
    (ii) Cell wall pectins can vary in different plant cell types and in different\
    \ stages of cell\ndevelopment. Pectin molecules are released from cells as basic\
    \ structures and then\nmodified within the cell wall by adding side chains.\n\n\
    \ RG‑I is a pectin molecule with a variable structure. The basic structure is\
    \ a repeated\ndisaccharide made from two different monosaccharides. RG‑I has three\
    \ different side\nchains that can be added in different positions.\n\n Monoclonal\
    \ antibodies (mAbs) are used to investigate the structure, location and role of\n\
    cell wall pectins.\n\n Suggest and explain why scientists need to use a number\
    \ of different monoclonal\nantibodies when investigating a pectin such as RG‑I\
    \ [3]\n[Total: 12]\n,\t,"
