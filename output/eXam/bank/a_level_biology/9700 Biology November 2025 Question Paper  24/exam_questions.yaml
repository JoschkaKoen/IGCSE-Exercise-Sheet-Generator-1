  text: "5\nVeins transport blood towards the heart. The structure of a vein is adapted\
    \ to its function.\n\n(a) The inner layer of a vein is the tunica intima, composed\
    \ of a single layer of endothelial cells\nthat form a protective barrier.\n\n\
    When the tunica intima of a blood vessel is damaged, endothelial cells can carry\
    \ out mitosis\nto allow tissue repair to occur.\n\n(i) The spindle that is formed\
    \ during mitosis is composed of spindle fibres.\n\n Name the cell structures that\
