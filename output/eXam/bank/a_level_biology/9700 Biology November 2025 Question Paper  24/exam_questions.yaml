  text: "4\nIn mammals, the gas exchange system includes a set of branching airways\
    \ that carry air to and\nfrom the gas exchange surface.\n\nAir from the external\
    \ atmosphere passes through different types of airway to reach the gas\nexchange\
    \ surface.\n\n(a) Name the type of airway of the gas exchange system that branches\
    \ into airways known\nas bronchioles [1]\n\n(b) Fig. 4.1 is a photomicrograph\
    \ of a section through a bronchiole.\nT\n\nFig. 4.1\n,\t,\n\n(i) The bronchiole\
    \ shown in Fig. 4.1 is not part of the gas exchange surface.\n\n Name one structure\
    \ in the gas exchange system, visible in Fig. 4.1, where gas\nexchange is carried\
    \ out [1]\n\n(ii) Name the type of cell found in the tissue labelled T in Fig.\
    \ 4.1 [1]\n\n(iii) State the features that help to identify the type of airway\
    \ shown in Fig. 4.1 as a bronchiole\nand not the other types of airway present\
    \ in the gas exchange system [3]\n\n(c) Blood is pumped to the lungs in the pulmonary\
    \ circulation.\n\nThe lungs also receive a supply of blood from the systemic circulation.\n\
    \nExplain why the pulmonary circulation and the systemic circulation need to supply\
    \ blood to\nthe lungs [2]\n[Total: 8]\n,\t,"
