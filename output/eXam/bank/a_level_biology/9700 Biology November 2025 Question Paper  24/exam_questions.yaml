- number: '3'
  question_type: short_answer
  marks: 0
  text: "3\nSmall interfering RNA (siRNA) is a short length of double‑stranded RNA\
    \ (dsRNA), approximately\n21 to 25 nucleotides long. siRNA helps to regulate protein\
    \ synthesis in cells.\n\n(a) Fig. 3.1 is an outline summary of one way in which\
    \ a primary transcript can be processed to\nproduce a molecule of siRNA. The transcript\
    \ does not code for a sequence of amino acids.\nprimary\ntranscript\nsection with\
    \ paired\nnucleotides\nloop with\nunpaired\nnucleotides\n5'\n3'\nDrosha\n5'\n\
    3'\nDicer\n5'\n3'\n5'\n3'\n3'\n5'\n21 nucleotides\nsiRNA\nstep 1: a primary transcript\
    \ is\nsynthesised from one strand of DNA\nstep 2: the primary transcript loops\
    \ and\na section of the RNA becomes\ndouble stranded\nstep 3: the enzyme Drosha\
    \ attaches\nand cleaves (cuts) the RNA to produce a\nshorter length\nstep 4: in\
    \ the cytoplasm, the enzyme\nDicer attaches and cleaves the RNA\nstep 5: siRNA,\
    \ which is double stranded\nand has 2 unpaired nucleotides at each\n3' end, is\
    \ produced\n\nFig. 3.1\n,\t\t,\n\n(i) In step 2 in Fig. 3.1, the single‑stranded\
    \ primary transcript loops and forms a section\nwhere dsRNA is present.\n\n Explain\
    \ how it is possible for the double‑stranded section of RNA to be held together\
    \ in\nstep 2 and maintained this way in steps 3, 4 and 5 [2]\n\n(ii) After step\
    \ 3, the shorter dsRNA produced by the action of Drosha is transported to the\n\
    cytoplasm, where it is cleaved further by Dicer to produce ds siRNA.\n\n Suggest\
    \ why two different enzymes, Drosha and Dicer, are needed to cut dsRNA into\n\
    shorter lengths [2]\n\n(b) From 2018, siRNA has been used as a therapeutic drug\
    \ to treat a number of diseases.\n\nThe presence of molecules of siRNA in the\
    \ cytoplasm can result in the cleavage of messenger\nRNA (mRNA) molecules coding\
    \ for a protein involved in the disease. This prevents the\nsynthesis of the protein.\n\
    \nDescribe the differences between a molecule of mRNA and a molecule of siRNA,\
    \ such as the\nsiRNA shown in step 5 in Fig. 3.1 [2]\n,\n,\n\n(c) Fig. 3.2 summarises\
    \ how mRNA coding for a protein involved in disease can be targeted and\ncleaved\
    \ by siRNA.\npassenger strand (not required)\nsiRNA\nguide strand\n(required)\n\
    guide strand\nAGO2\nproteins\npresence of siRNA\nactivates a protein,\nAGO2, which\
    \ binds\nsiRNA and other proteins\nto form a complex known\nas RISC\nRISC uses\
    \ guide strand to\ntarget and bind mRNA\nfor cleavage\npassenger strand is\nseparated\
    \ from RISC\nRISC\npassenger strand\nreleased into cytoplasm\nsite of cleavage\n\
    mRNA\n\nFig. 3.2\n,\t,\n\n(i) With reference to Fig. 3.2, state why the passenger\
    \ strand needs to be separated and\nreleased from the RISC [1]\n\n(ii) The aim\
    \ of siRNA therapy is to prevent or decrease the synthesis of a protein involved\
    \ in\nthe disease being treated.\n\n A target mRNA molecule can be cleaved in\
    \ a different location by a RISC with a\ndifferent siRNA.\n\n Suggest how cleaving\
    \ mRNA in different locations will have different effects on protein\nsynthesis\
    \ and explain how these different effects can result in a lack of functioning\
    \ protein [3]\n[Total: 10]\n,\t,"
