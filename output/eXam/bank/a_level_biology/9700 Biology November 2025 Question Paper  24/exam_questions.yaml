- number: '2'
  question_type: short_answer
  marks: 0
  text: "2\nCholera, malaria and tuberculosis (TB) are infectious diseases caused\
    \ by unicellular organisms.\n\n(a) For each of the diseases listed, state whether\
    \ the disease is caused by a eukaryotic or\nprokaryotic organism.\n\ncholera \
    \  malaria   TB   [1]\n\n(b) State the term given to an organism that causes diseases\
    \ such as cholera, malaria and TB [1]\n\n(c) Malaria is caused by species from\
    \ the genus Plasmodium.\n\nRing cells are one stage in the complex life cycle\
    \ of Plasmodium that are found within red\nblood cells. Fig. 2.1 is a scanning\
    \ electron micrograph showing two ring cells, surrounded by\nthe membrane of a\
    \ red blood cell, which has just lysed (burst).\nX\nY\nFig. 2.1\n\n(i) The actual\
    \ diameter of the ring cell along the length X–Y is 2 µm.\n\n Calculate the magnification\
    \ of the image shown in Fig. 2.1.\n\n Give your answer to 3 significant figures.\n\
    \nmagnification = ×  [2]\n,\t,\n\n(ii) Describe how Plasmodium is transmitted\
    \ from a person with malaria into the blood\nstream of an uninfected person [3]\n\
    \n(d) In a person with malaria, phagocytes destroy infected red blood cells. The\
    \ phagocytes\nrespond to the presence of particular molecules in the outer phospholipid\
    \ bilayer of the cell\nsurface membrane.\n\nThe cell surface membrane of a healthy,\
    \ uninfected red blood cell shows an uneven distribution\nof types of phospholipid\
    \ making up the bilayer (membrane asymmetry). For example, most of\nthe phospholipid\
    \ phosphatidylserine (PS) is located in the inner layer, facing the cytoplasm.\n\
    \n(i) After a red blood cell is infected, a much higher proportion of PS is found\
    \ in the outer\nlayer of the cell surface membrane, facing blood plasma.\n\n Suggest\
    \ how the presence of PS in the outer layer can cause a response in a\nphagocytic\
    \ cell [2]\n\n(ii) Suggest why some uninfected red blood cells in a person with\
    \ malaria can also be\ndestroyed by phagocytic cells [1]\n,\t,\n\n(e) Research\
    \ has shown that Plasmodium uses cholesterol from the cell surface membrane of\n\
    the red blood cell it has infected.\n\n(i) Suggest why cholesterol is needed by\
    \ Plasmodium [1]\n\n(ii) The use of cholesterol by Plasmodium causes a decrease\
    \ in the quantity of cholesterol\nin the cell surface membrane of the red blood\
    \ cell.\n\n Outline how a decrease in cholesterol could affect the cell surface\
    \ membrane of the red\nblood cell [2]\n\n(f) To achieve membrane asymmetry, which\
    \ is an essential feature of a healthy cell, the red\nblood cell needs a supply\
    \ of ATP and must maintain a very low concentration of calcium ions\n(Ca2+) within\
    \ the cytoplasm.\n\nTable 2.1 shows details of three membrane enzymes that are\
    \ involved in the movement of\nphospholipids between the inner and outer layers.\n\
    \nTable 2.1\n\nkey\n\nPS = phosphatidylserine\n\nPE = phosphatidylethanolamine\n\
    \nPC = phosphatidylcholine\nenzyme\nenzyme action\nflippase\nhydrolyses ATP and\
    \ moves PS and PE from the outer to the inner layer\nfloppase\nhydrolyses ATP\
    \ and moves PC from the inner to the outer layer\nscramblase\nafter binding Ca2+,\
    \ randomly moves PS, PE and PC between layers\ntype of phospholipid\n,\t,\n\n\
    A healthy red blood cell has most PS and PE located in the inner layer and most\
    \ PC located\nin the outer layer.\n\n(i) Phospholipids can occasionally move between\
    \ layers without the action of an enzyme,\nso the continued activity of flippase\
    \ and floppase is needed.\n\n With reference to Table 2.1, explain why the action\
    \ of the enzymes flippase and floppase\ninvolves the hydrolysis of ATP [1]\n\n\
    (ii) Blood plasma has a higher concentration of Ca2+ than the cytoplasm of red\
    \ blood cells.\n\n Suggest one way in which a red blood cell can have a very low\
    \ concentration of Ca2+\nwhen blood plasma has a higher concentration of Ca2+\
    \ [1]\n\n(iii) The concentration of Ca2+ within the red blood cell increases when\
    \ the cell is infected\nwith the malarial parasite. This leads to the loss of\
    \ membrane asymmetry.\n\n With reference to Table 2.1, suggest and explain how\
    \ membrane asymmetry is lost when\nthe concentration of Ca2+ within the red blood\
    \ cell increases [3]\n[Total: 18]\n,\t,"
