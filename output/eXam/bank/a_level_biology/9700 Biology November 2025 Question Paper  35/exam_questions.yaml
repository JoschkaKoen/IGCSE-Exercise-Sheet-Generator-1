- number: '2'
  question_type: short_answer
  marks: 0
  text: "2\nM1 is a slide of a stained transverse section through a plant stem.\n\n\
    (a) (i) Draw a large plan diagram of the region on M1 indicated by the shaded\
    \ area in Fig. 2.1.\nUse a sharp pencil.\n\n Use one ruled label line and label\
    \ to identify the xylem.\ndraw this region\nFig. 2.1\n[5]\n,\t,\n\n(ii) Observe\
    \ the xylem vessel elements in the stem on M1.\n\n Select a group of four adjacent\
    \ xylem vessel elements.\n\n Each xylem vessel element must touch at least one\
    \ other xylem vessel element.\n•\nMake a large drawing of this group of four xylem\
    \ vessel elements.\n•\nUse one ruled label line and label to identify the wall\
    \ of one xylem vessel element.\n[5]\n,\t,\n\n(b) Fig. 2.2 is a photomicrograph\
    \ of a stained transverse section of a stem from a different plant\nto M1.\nFig.\
    \ 2.2\n\nIdentify three observable differences, other than colour, between the\
    \ stem section on M1 and\nthe stem section in Fig. 2.2.\n\nRecord these three\
    \ observable differences in an appropriate table.\n[4]\n,\t,\n\n(c) Fig. 2.3 shows\
    \ a photomicrograph of a stage micrometer scale that is being used to calibrate\n\
    an eyepiece graticule.\n\nOne division, on either the stage micrometer scale or\
    \ the eyepiece graticule, is the distance\nbetween two adjacent lines.\n\nThe\
    \ length of one division on the stage micrometer in Fig. 2.3 is 1.0 mm.\nstage\
    \ micrometer\neyepiece graticule\n50 60 70 80 90\n0 10 20 30 40\n100\nFig. 2.3\n\
    \n(i) Calculate the actual length of one eyepiece graticule unit shown in Fig.\
    \ 2.3.\n\n Give your answer in micrometres (μm).\n\n Show your working and give\
    \ your answer to three significant figures.\n\nactual length of one eyepiece graticule\
    \ unit =   μm\n [3]\n,\t,\n\n(ii) Fig. 2.4 is the same photomicrograph as that\
    \ shown in Fig. 2.2. This was taken with the\nsame microscope and the same lenses\
    \ used to take the photomicrograph in Fig. 2.3.\n\n The eyepiece graticule has\
    \ been placed across the length of a vascular bundle.\n50\n60\n70\n80\n90\n0\n\
    10\n20\n30\n40\n100\nFig. 2.4\n\n Use the calibration of the eyepiece graticule\
    \ unit from (c)(i) to calculate the actual length\nof the vascular bundle in Fig.\
    \ 2.4.\n\n Show your working and use appropriate units.\n\nactual length of the\
    \ vascular bundle =   [2]\n[Total: 19]\n,\t,"
