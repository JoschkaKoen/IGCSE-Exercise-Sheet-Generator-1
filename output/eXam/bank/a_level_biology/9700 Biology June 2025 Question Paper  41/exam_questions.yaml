  text: "5\nThe Galápagos is a group of islands with a high biodiversity.\n\n(a) Geospiza\
    \ fortis is one of the many species of finch that live on the Galápagos islands.\
    \ On one\nof the Galápagos islands, Daphne Major, scientists measured the bill\
    \ size (length, width and\ndepth) of individuals in a population of G. fortis\
    \ over several years.\n\nFig. 5.1 shows a G. fortis female.\nbill\nFig. 5.1\n\n\
    G. fortis feed on seeds. Seed size and bill size vary. It is easier for G. fortis\
    \ with smaller bills\nto eat small seeds and for G. fortis with larger bills to\
    \ eat large seeds.\n\nIn 1977, a drought occurred on Daphne Major, which resulted\
    \ in a large decrease in the\navailability of seeds, particularly small seeds.\n\
    \nScientists observed an increase in the mean bill size in the G. fortis population\
    \ on\nDaphne Major after the drought.\n\n(i) State the type of natural selection\
    \ that occurred in the G. fortis population on\nDaphne Major as a result of the\
    \ drought [1]\n\n(ii) Fig. 5.2 shows the distribution of bill size in the G. fortis\
    \ population before the drought\nin 1977.\nnumber of\nG. fortis\nbill size\nFig.\
    \ 5.2\n\n Sketch a new curve on Fig. 5.2 to show the distribution of bill size\
    \ in the G. fortis\npopulation after the drought.\n\n[1]\n,\t,\n\n(b) G. fortis\
    \ also lives on Santa Cruz, another island in the Galápagos.\n\nMost of the seeds\
    \ available for G. fortis to eat on Santa Cruz are either small or large. There\n\
    are few intermediate sizes of seed.\n\nFig. 5.3 shows the distribution of bill\
    \ size in the G. fortis population on Santa Cruz.\nnumber of\nG. fortis\nbill\
    \ size\nFig. 5.3\n\nExplain how natural selection in the G. fortis population\
    \ on Santa Cruz has resulted in the\ndistribution in bill size shown in Fig. 5.3\
    \ [4]\n,\t,\n\n(c) Scientists studied the effect of an increase in the number\
    \ of tourists each year on the number\nof invasive alien species present in the\
    \ Galápagos islands.\n\nThe scientists recorded the number of invasive alien species\
    \ present each year in the\nGalápagos islands over many years. The scientists\
    \ also recorded the number of tourists\nvisiting the islands each year.\n\nFig.\
    \ 5.4 shows a graph of the data for five different years during the study.\nnumber\
    \ of tourists visiting Galápagos\neach year / thousands\n0\n0\n500\n1000\n1500\n\
    50\n100\n150\n200\n250\nnumber of\nrecorded\ninvasive alien\nspecies\nFig. 5.4\n\
    \n(i) The scientists carried out a Pearson’s linear correlation calculation for\
    \ the data in Fig. 5.4.\n\n The scientists calculated an r value of 0.930.\n\n\
    \ The scientists concluded that there is a significant correlation between the\
    \ number\nof tourists visiting the Galápagos islands each year and the number\
    \ of invasive alien\nspecies present.\n,\t,\n\n Table 5.1 shows a probability\
    \ table of critical values for Pearson’s linear correlation.\nTable 5.1\nnumber\
    \ of\nobservations\nprobability level (p)\n0.05\n0.01\n3\n0.997\n1.000\n4\n0.950\n\
    0.990\n5\n0.878\n0.959\n6\n0.811\n0.917\n7\n0.754\n0.875\n\n With reference to\
    \ Table 5.1, explain why the r value of 0.930 indicates that there is a\nsignificant\
    \ correlation between the number of tourists and the number of invasive alien\n\
    species [2]\n\n(ii) Invasive alien species are thought to have contributed to\
    \ extinctions recorded in the\nGalápagos islands.\n\n Discuss the negative effects\
    \ of introducing invasive alien species to an ecosystem [4]\n\n(iii) State two\
    \ factors, other than competition and the introduction of invasive alien species,\n\
    that can cause extinction.\n1   2   [2]\n\n[Total: 14]\n,\t,"
