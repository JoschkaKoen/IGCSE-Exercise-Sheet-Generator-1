    \ ATP [2]\n\n(b) Fig. 1.1 shows a molecule of ATP.\nHO\nP\nO\nO\nO–\nO\nO–\nO\n\
    O–\nP\nO\nP\nO\nOH\nOH\nO\nN\nNH2\nN\nN\nN\nFig. 1.1\n\nExplain the features of\
    \ ATP that make it suitable to be the universal energy currency of cells [4]\n\
    ,\t,\n\n(c) Identify the type of phosphorylation reaction to synthesise ATP that\
    \ occurs during glycolysis\nand the Krebs cycle [1]\n\n(d) (i) Pyruvate moves\
