- number: '3'
  question_type: short_answer
  marks: 0
  text: "3\nPorphyria is a group of rare genetic diseases in which molecules called\
    \ porphyrins accumulate in\nthe body.\n\nThree examples of porphyria are:\n•\n\
    X-linked protoporphyria\n•\nvariegate porphyria\n•\ncongenital erythropoietic\
    \ porphyria (CEP).\n\n(a) X-linked protoporphyria is caused by a mutant allele\
    \ located on the X chromosome.\n\nFig. 3.1 shows the pattern of inheritance of\
    \ X-linked protoporphyria in one family.\nkey\nfemale without the disease\nmale\
    \ without the disease\nfemale with the disease\nmale with the disease\n1\n2\n\
    3\n4\n5\n6\nFig. 3.1\n\nX-linked protoporphyria is described as a sex-linked disease.\n\
    \nUse the information in Fig. 3.1 to make one other conclusion about the pattern\
    \ of inheritance\nof X-linked protoporphyria.\n\nGive evidence to support your\
    \ conclusion.\nconclusion   evidence   [2]\n,\t,\n\n(b) Variegate porphyria occurs\
    \ in 1 in 100 000 people in Europe.\n\nIn the 1600s, approximately 100 Dutch people\
    \ migrated from Europe to South Africa.\n\nThe population of people of Dutch descent\
    \ in South Africa is now 2.5 million. Variegate\nporphyria occurs in 1 in 1000\
    \ people in this population.\n\nSuggest and explain why variegate porphyria is\
    \ more common among people of Dutch\ndescent in South Africa than among people\
    \ in Europe [3]\n\n(c) Microarrays can be used to detect various forms of porphyria\
    \ caused by mutant alleles.\n\nDescribe how microarrays can be used to detect\
    \ a disease by analysing gene expression [4]\n,\t,\n\n(d) The nucleotide sequences\
    \ of alleles that cause rare genetic diseases, such as the various\nforms of porphyria,\
    \ are stored in a database.\n\nState one benefit of having a database of nucleotide\
    \ sequences for alleles that cause\nrare diseases [1]\n\n(e) Congenital erythropoietic\
    \ porphyria (CEP) is caused by a substitution mutation in a gene\ncoding for an\
    \ enzyme.\n\nThe mutant CEP allele codes for an enzyme with little or no function.\n\
    \nScientists used gene editing in the laboratory to correct the nucleotide sequence\
    \ of the mutant\nallele in cultured human cells.\n\nThe scientists introduced\
    \ three molecules to the cells:\n•\nan enzyme called Cas9 that causes breaks in\
    \ DNA strands\n•\nguide RNA (gRNA), attached to Cas9, that is complementary to\
    \ the mutant CEP allele\n•\na short length of DNA, known as template DNA, that\
    \ can replace the section of the allele\nwhere the substitution mutation has occurred.\n\
    \nThe repair mechanism within the cell allows the template DNA to be inserted\
    \ so that the\nmutation is corrected.\n\nFig. 3.2 shows part of the nucleotide\
    \ sequence in the mutated CEP allele before and after the\ngene editing procedure.\n\
    \ngene editing\nT  A  T  G  G  C  T  C  G\n  T  A  C  G  G  C  T  C  G\nFig. 3.2\n\
    \nIn the future, this gene editing procedure may be used in a person with CEP\
    \ to prevent the\naccumulation of porphyrins in the body.\n\nSuggest and explain\
    \ how this gene editing procedure will prevent the accumulation of\nporphyrins\
    \ in a person with CEP without damaging other genes [3]\n[Total: 13]\n,\t\t,"
