- number: '4'
  question_type: short_answer
  marks: 0
  text: "4\nScientists have invented a way of producing food by artificial photosynthesis.\n\
    •\nSolar panels convert sunlight energy into electricity.\n•\nThe electricity\
    \ powers an electrolysis reaction between carbon dioxide gas and water to form\n\
    the organic product acetate.\n•\nThe single-celled alga Chlamydomonas, a protoctist,\
    \ can use acetate to grow and reproduce\nin the dark, instead of photosynthesising\
    \ in the light.\n•\nThe algae can be processed to make a food product.\n\nFig.\
    \ 4.1 shows an outline of the artificial photosynthesis process.\nalgae\nfood\n\
    solar panel\nacetate\nelectrolyser\nelectron\nflow\nH2O\nCO2\nO2\nFig. 4.1\n\n\
    (a) Identify three similarities between the artificial photosynthesis process\
    \ shown in Fig. 4.1 and\nthe normal process of photosynthesis [3]\n,\n,\n\n(b)\
    \ Fig. 4.2 shows the single-celled alga Chlamydomonas. It contains a large, cup-shaped\n\
    chloroplast for photosynthesis.\nB\nA\nFig. 4.2\n\nStructures A and B in Fig.\
    \ 4.2 are found within the chloroplast.\n\nName structures A and B.\nA  B  [2]\n\
    \n(c) Thylakoid membranes are the site of the light-dependent stage of photosynthesis.\n\
    \n(i) Name the products of the light-dependent stage of photosynthesis [1]\n,\t\
    ,\n\n(ii) Some of the protein components of the thylakoid membrane have a role\
    \ in the\nlight-dependent stage of photosynthesis.\n\n Explain the roles of the\
    \ different proteins that function in the light-dependent stage\nof photosynthesis\
    \ [4]\n\n(d) The products of the light-dependent stage of photosynthesis are used\
    \ in the Calvin cycle.\nCalvin cycle intermediates are used to produce amino acids,\
    \ carbohydrates and lipids.\n\nName the Calvin cycle intermediate that can be\
    \ used to produce starch [1]\n\n(e) Scientists claim that the artificial photosynthesis\
    \ process shown in Fig. 4.1 is more efficient at\nconverting light energy into\
    \ food than normal photosynthesis by crop plants.\n\nGive reasons why this claim\
    \ may or may not be true.\ntrue   not true   [3]\n\n[Total: 14]\n,\t,"
