  text: "2\nScientists investigated the effect of abscisic acid (ABA) on reducing\
    \ water loss in plants. The\nscientists predicted that ABA, as well as stimulating\
    \ stomatal closure, also reduces water loss in\nplants in other ways.\n\nThe scientists\
    \ used a mutant variety of thale cress, Arabidopsis thaliana, that has stomata\
    \ that\ndo not respond to ABA. When ABA is present, the stomata of the mutant\
    \ variety remain open.\n\nThe scientists sprayed different concentrations of ABA\
    \ on the leaves of the mutant variety and\nmeasured the transpiration rates of\
    \ the plants.\n\nThe results are shown in Fig. 2.1.\n0.0\n0\n10\n50\nABA concentration\n\
    / μmol dm−3\nError bars show ± 1 standard error (SE).\n0 μmol dm−3 ABA = distilled\
    \ water\n100\n400\n0.5\n1.0\n1.5\nmean\ntranspiration\nrate\n/ mmol m−2 s−1\n\
    2.0\n2.5\nFig. 2.1\n\n(a) Calculate the percentage decrease in transpiration rate\
    \ from 0 to 400 µmol dm–3 of ABA for\nthe mutant variety.\n\nShow your working.\n\
    \npercentage decrease =   [2]\n,\t\t,\n\n(b) With reference to Fig. 2.1, suggest\
    \ conclusions that can be made about the effect of different\nconcentrations of\
    \ ABA on the transpiration rates of the mutant variety.\n\n State the evidence\
    \ that supports your conclusions [2]\n\n(c) The scientists used a mutant variety\
    \ of thale cress that has stomata that do not respond\nto ABA.\n\nThe scientists\
    \ concluded that ABA reduces water loss in thale cress by ways other than\nstomatal\
    \ closure.\n\nSuggest additional information that is required to increase the\
    \ confidence in this conclusion [3]\n[Total: 7]\n,\n,"
