  text: "5\nThe fruit fly, Drosophila melanogaster, feeds on sugars found in damaged\
    \ fruits.\nA fruit fly with normal features is described as wild type. It has\
    \ a grey body and its wings are\nlonger than its abdomen. The genes for body colour\
    \ and wing length are located on different\nchromosomes.\nA fruit fly with mutations\
    \ in these two genes has a black body and short wings.\nFig. 5.1 shows a wild\
    \ type fruit fly and a mutant fruit fly.\nwild type\nmutant\ngrey body\nlong wing\n\
    black body\nshort wing\n3mm\nFig. 5.1\n\n(a) Fruit flies were first used for genetic\
    \ crosses by Thomas Morgan in 1908. They are one of the\nmost studied animals\
    \ in current genetic research.\n•\nMale fruit flies are easily distinguished from\
    \ female fruit flies.\n•\nFruit flies have a short life cycle and a female can\
    \ lay hundreds of eggs in a few days.\n•\nSome genes for development and cell\
    \ signalling in fruit flies are similar to those of\nhumans.\n\nSuggest why fruit\
    \ flies are still used in genetic crosses [3]\n,\t,\n\n(b) When a wild type fruit\
    \ fly was crossed with a mutant fruit fly with a black body and short\nwings,\
    \ all the F1 offspring had grey bodies and long wings.\n\nUsing appropriate symbols,\
    \ complete Fig. 5.2 to show the expected results of a cross between\ntwo of these\
    \ F1 fruit flies.\nsymbols:\nF1 phenotypes:\ngrey body\n×\ngrey body\n\nlong wing\n\
    \nlong wing\nF1 genotypes:\nPunnett\nsquare\noffspring phenotypes:\nphenotypic\
    \ ratio  Fig. 5.2\n\n[6]\n,\t,\n\n(c) Describe how you would determine the genotype\
    \ of an F2 fruit fly with a grey body and long\nwings [3]\n\n[Total: 12]\n,\t,"
