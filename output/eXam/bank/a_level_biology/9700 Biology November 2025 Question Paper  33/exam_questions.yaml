  text: "2\nK1 is a slide of a stained transverse section through a root.\n\n(a) (i)\
    \ Draw a large plan diagram of the region on K1 indicated by the shaded area in\
    \ Fig. 2.1.\nUse a sharp pencil.\n\n Use one ruled label line and the label T\
    \ to identify a tissue involved in transport of\nsubstances throughout the plant.\n\
    draw this region\nFig. 2.1\n\n[5]\n,\t,\n\n(ii) Observe the cells in the centre\
    \ of the root on K1.\n\n Select a group of four adjacent cells.\n\n Each cell\
    \ must touch at least one of the other cells.\n\n Make a large drawing of this\
    \ group of four cells.\n\n[4]\n,\t,\n\n(b) Fig. 2.2 is a photomicrograph of a\
    \ stained transverse section through the root of a different\nplant to K1.\n\n\
    One difference between the section in Fig. 2.2 and the section on K1 has been\
    \ labelled.\n\nIdentify three other observable differences between the section\
    \ in Fig. 2.2 and the section\non K1.\n\nDraw three label lines on Fig. 2.2 to\
    \ label the three differences you have identified. You\nshould complete the labels\
    \ to describe the differences you observe.\nThe width of\nthe cortex\ntissue is\n\
    smaller in\nFig. 2.2 than\non K1\n magnification ×35\nFig. 2.2\n\n[4]\n,\t,\n\n\
    (c) A student was asked to find the area of the vascular tissue in a transverse\
    \ section of root.\n\nThe student grew one plant for three weeks and took a section\
    \ from one of the roots. This\nsection is shown in Fig. 2.3.\nmagnification ×35\n\
    A\nB\nFig. 2.3\n\nThe vascular tissue is the central region of the section.\n\n\
    Assume that the vascular tissue is a circle. The line A–B is the diameter of the\
    \ vascular\ntissue.\n\n(i) Calculate the actual area of the vascular tissue.\n\
    \n Use the formula: area = πr2, where π = 3.14.\n\nactual area of the vascular\
    \ tissue =   mm2\n\n[4]\n,\t,\n\n(ii) The student wrote a hypothesis which stated\
    \ that:\n\n The area of vascular tissue in a root section changes as the plant\
    \ grows.\n\n Suggest modifications to the method used in (c) to investigate this\
    \ hypothesis [3]\n\n[Total: 20]\n,\t\t,"
