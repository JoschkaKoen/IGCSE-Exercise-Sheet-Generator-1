  text: "1\nDialysis tubing is a partially permeable membrane. Glucose molecules can\
    \ diffuse through the\ndialysis tubing.\n\nYou are required to investigate the\
    \ diffusion of glucose across dialysis tubing.\n\nYou are provided with the materials\
    \ shown in Table 1.1.\nTable 1.1\nlabelled\ncontents\nhazard\nvolume / cm3\nG\n\
    20.0% glucose solution\nlow\n 50\nW\ndistilled water\nlow\n200\nBenedict’s\nBenedict’s\
    \ solution\nharmful irritant\n 40\nD\nlength of dialysis tubing\nin distilled\
    \ water\nlow\n–\n\nIf any solution comes into contact with your skin, wash off\
    \ immediately with cold water. It is\nrecommended that you wear suitable eye protection.\n\
    \nYou will need to:\n•\nput glucose solution into dialysis tubing surrounded by\
    \ water\n•\ntake samples of the water surrounding the dialysis tubing\n•\ntest\
    \ for the presence of glucose in each sample of water.\n,\t,\n\nCarry out step\
    \ 1 to step 11.\n\nstep 1\nDraw a mark 8 cm from the top of a large test-tube,\
    \ as shown in Fig. 1.1.\nmark 8 cm from the top\n8 cm\nFig. 1.1\n\nstep 2\n Remove\
    \ the dialysis tubing from beaker D. Tie a knot in the dialysis tubing as close\
    \ as\npossible to one end, so that the end is sealed.\n\nstep 3\n The whole length\
    \ of the dialysis tubing needs to be separated to allow the tubing to\nbe filled\
    \ with solution. To do this, rub the whole length gently between your finger and\n\
    thumb.\n\nstep 4\nPut 10 cm3 of 20.0% glucose solution, G, into the open end of\
    \ the dialysis tubing.\n\nstep 5\nRinse the outside of the dialysis tubing by\
    \ dipping it in the water in beaker D.\n\nstep 6\n Put the dialysis tubing containing\
    \ G into the large test-tube and keep it in position using\nan elastic band as\
    \ shown in Fig. 1.2.\nmark on test-tube\nknot\ndialysis tubing\nlarge test-tube\n\
    10 cm3 of glucose solution\nelastic band\nFig. 1.2\n,\t,\n\nstep 7\n Put distilled\
    \ water into the large test-tube so that the top of the water is above the level\
    \ of\nthe glucose solution in the dialysis tubing.\n\nstep 8\n Start timing.\n\
    \nYou are required to take samples of the water surrounding the dialysis tubing\
    \ every 5 minutes for\n15 minutes. You will collect three samples.\n\nstep 9\n\
    Label three test-tubes with the times the samples of water will be taken (5, 10\
    \ and 15).\n\nstep 10  After 5 minutes (step 8), put a 1 cm3 syringe into the\
    \ water surrounding the dialysis tubing\nso that the end of the syringe is level\
    \ with the mark on the test-tube. Remove 1 cm3 from\nthe water surrounding the\
    \ dialysis tubing and put this into the test-tube labelled 5. Repeat\nthis action\
    \ to remove another 1 cm3 from the water surrounding the dialysis tubing and\n\
    put this into the test-tube labelled 5. The test-tube labelled 5 will now contain\
    \ a 2 cm3\nsample. Do not stop timing.\n\nstep 11  Repeat step 10 at 10 minutes\
    \ and at 15 minutes using the appropriately labelled\ntest-tubes.\n\nYou need\
    \ to carry out a dilution of the 20.0% glucose solution, G, to make a 1.0% glucose\
    \ solution.\nYou will need 20 cm3 of this 1.0% glucose solution.\n\n(a) (i) Complete\
    \ Table 1.2 to show the volume of distilled water, W, you will use to make 20\
    \ cm3\nof a 1.0% glucose solution.\nTable 1.2\nvolume of 20.0% glucose solution,\
    \ G\n/ cm3\nvolume of distilled water, W\n/ cm3\n1\n [1]\n\nstep 12 Prepare the\
    \ 1.0% glucose solution as shown in Table 1.2.\n\nYou will need to carry out a\
    \ serial dilution of the 1.0% glucose solution you have prepared in step\n12 as\
    \ shown in Fig. 1.3. You must reduce the concentration by half between each successive\n\
    dilution.\n\nYou will need to prepare four concentrations of glucose solution\
    \ in addition to the 1.0% glucose\nsolution from step 12.\n\nAfter the serial\
    \ dilution is completed, you will need to have 10 cm3 of each concentration available\n\
    to use.\n,\t,\n\n(ii) Complete Fig. 1.3 to show how you will prepare your serial\
    \ dilution.\n\nEach beaker should have:\n•\na labelled arrow to show the volume\
    \ of glucose solution transferred\n•\na labelled arrow to show the volume of distilled\
    \ water, W, added.\n1.0%\nglucose\nsolution\n0.5%\nglucose\nsolution\n0.25%\n\
    glucose\nsolution\n0.125%\nglucose\nsolution\n0.0625%\nglucose\nsolution\nFig.\
    \ 1.3\n\n[2]\n,\t,\n\nstep 13 Set up a boiling water-bath ready for step 18 and\
    \ step 22.\n\nstep 14 Prepare the concentrations of glucose solution as shown\
    \ in Fig. 1.3.\n\nstep 15 Label 5 test-tubes with the concentrations of glucose\
    \ solution shown in Fig. 1.3.\n\nstep 16 Put 2 cm3 of the 1.0% glucose solution\
    \ into the appropriately labelled test-tube.\n\n(iii) You are required to carry\
    \ out the Benedict’s test on the glucose solutions that you have\nprepared in\
    \ step 14.\n\n State the volume of Benedict’s solution you will use for each reducing\
    \ sugar test. Explain\nwhy you have selected this volume.\n\n volume of Benedict’s\
    \ solution  cm3\nexplanation   [1]\n\nstep 17  Put the volume of Benedict’s solution\
    \ stated in (a)(iii) into the test-tube labelled 1.0%.\nShake gently to mix.\n\
    \nstep 18  Put this test-tube into the boiling water-bath and record in Table\
    \ 1.3 the time to the\nfirst colour change.\n\n If there is no colour change after\
    \ 120 seconds, stop timing and record the time as\n‘more than 120’.\n\nstep 19\
    \ Remove the test-tube from the boiling water-bath.\n\nstep 20  Repeat step 16\
    \ to step 19 using 2 cm3 of each of the other concentrations of glucose\nsolution.\n\
    \n(iv) Complete Table 1.3 to record your results.\nTable 1.3\npercentage concentration\n\
    of glucose\n1.0\n0.5\n0.25\n0.125\n0.0625\n\n[1]\n,\t,\n\nYou are required to\
    \ carry out the Benedict’s test on the three samples collected from the\nwater\
    \ surrounding the dialysis tubing (5, 10 and 15).\n\nstep 21  Put the volume of\
    \ Benedict’s solution stated in (a)(iii) into the test-tube labelled 5.\nShake\
    \ gently to mix.\n\nstep 22  Put this test-tube into the boiling water-bath and\
    \ record in (a)(v) the time to the first\ncolour change.\n\n If there is no colour\
    \ change after 120 seconds, stop timing and record the time as\n‘more than 120’.\n\
    \nstep 23 Remove the test-tube from the boiling water-bath.\n\nstep 24 Repeat\
    \ step 21 to step 23 for the other samples (10 and 15).\n\n(v) Record your results\
    \ in an appropriate table.\n\n[4]\n\n(vi) State one source of error when carrying\
    \ out the Benedict’s test [1]\n\n(vii) Use your results in (a)(iv) and (a)(v)\
    \ to estimate the percentage concentration of glucose\nin the samples taken at\
    \ 5, 10 and 15 minutes.\n\n percentage concentration of glucose in sample 5 =\
    \  percentage concentration of glucose in sample 10 =  percentage concentration\
    \ of glucose in sample 15 =  [1]\n,\t,\n\n (viii) Suggest a reason for the percentage\
    \ concentrations of glucose estimated in (a)(vii) [1]\n,\t\t,\nQuestion 1 continues\
    \ on page 10.\n,\n,\n\n(b) A dialysis membrane, similar to dialysis tubing, is\
    \ used in the treatment of kidney disease.\n\nDuring this treatment, the blood\
    \ of a person with kidney disease is passed through a dialysis\nmachine to remove\
    \ unwanted waste products from the blood.\n\nThe machine contains dialysate which\
    \ is a solution of glucose and ions. Blood flows through\nthe dialysis machine\
    \ and is separated from the dialysate by a membrane. Some molecules\ndiffuse from\
    \ the blood into the dialysate. This is shown in Fig. 1.4.\nblood from\nperson\
    \ with\nkidney disease\nmolecules diffusing\ninto the dialysate\ndialysate (solution\
    \ of\nglucose and ions)\ndialysis membrane\nseparates the blood\nfrom the dialysate\n\
    Fig. 1.4\n\nScientists studied the movement of two molecules, P and Q, found in\
    \ the blood of a person\nwith kidney disease. They wanted to see if these two\
    \ molecules would remain in the blood or\nmove out of the blood across the dialysis\
    \ membrane into the dialysate.\n\nThe scientists took samples of blood from a\
    \ person using a dialysis machine every 5 minutes\nfor 20 minutes and recorded\
    \ the concentration of P and Q in these samples. The results are\nshown in Table\
    \ 1.4.\nTable 1.4\ntime sample was taken\nfrom the blood / min\nconcentration\
    \ of P in the\nblood / arbitrary units\nconcentration of Q in the\nblood / arbitrary\
    \ units\n 0\n200\n400\n 5\n205\n280\n10\n200\n150\n15\n195\n 90\n20\n200\n 75\n\
    ,\t,\n\n(i) Plot a line graph of the data in Table 1.4 on the grid in Fig. 1.5.\n\
    \n Use a sharp pencil.\nFig. 1.5\n\n[4]\n,\t,\n\n(ii) Calculate the percentage\
    \ decrease in concentration of Q between 5 minutes and\n20 minutes.\n\n Show your\
    \ working and give your answer to two significant figures %\n [2]\n\n(iii) Suggest\
    \ a reason for the rate of decrease in the concentration of Q from 0 to 10 minutes\n\
    and from 10 to 20 minutes.\n0 to 10 minutes   10 to 20 minutes   [2]\n\n[Total:\
    \ 20]\n,\t,\nQuestion 2 starts on page 14.\n,\t,"
