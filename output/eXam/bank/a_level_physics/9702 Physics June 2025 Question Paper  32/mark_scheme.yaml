- number: 2fi
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'A

    Two (sets of) readings are not enough to draw a (valid) conclusion (not “not enough
    for accurate results”, “few

    readings”).

    B

    Difficult to measure B with a reason e.g. difficult to judge the position of the
    centres of the masses / masses not parallel

    to each other on wire / B changes when clip and masses are suspended.

    C  Difficult to measure L with a reason e.g. parallax error / rubber cord moves
    when touched by rule / clip moves when

    touched by rule.

    D Difficult to measure d with a reason e.g. jaws of calipers compress width of
    rubber cord.

    E

    Difficult to measure T with a reason e.g. because oscillations die away (very)
    quickly / amplitude of oscillations

    decreases quickly / oscillations are heavily damped / difficult to judge start
    and/or end of oscillations.

    F

    Difficulty with oscillation (of cord/clip/masses) e.g. oscillations in more than
    one mode / vertical or side-to-side

    oscillations /oscillation affected if rubber cord is not attached at centre of
    lower clip / wire moves in the clip during

    oscillation.

    1 mark for each point up to a maximum of 4.

    4

    9702/32

    May/June 2025'
