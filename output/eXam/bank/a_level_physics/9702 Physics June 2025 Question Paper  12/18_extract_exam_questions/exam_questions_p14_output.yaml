questions:
  - number: "33"
    type: multiple_choice
    text: |
      The $I-V$ characteristics for three electrical components are shown.

      Which components obey Ohm's law?
    options:
      - letter: A
        text: |
          1, 2 and 3
      - letter: B
        text: |
          1 and 2 only
      - letter: C
        text: |
          1 and 3 only
      - letter: D
        text: |
          1 only

  - number: "34"
    type: multiple_choice
    text: |
      A resistor of resistance $200\,\Omega$ is connected to a supply that has a p.d. of $4.00\text{ V}$.

      How many electrons enter the resistor in $4.00\text{ s}$?
    options:
      - letter: A
        text: |
          $3.13 \times 10^{16}$
      - letter: B
        text: |
          $1.25 \times 10^{17}$
      - letter: C
        text: |
          $5.00 \times 10^{17}$
      - letter: D
        text: |
          $1.25 \times 10^{21}$

  - number: "35"
    type: multiple_choice
    text: |
      The diagram shows a cell of internal resistance $1.0R$ connected to a variable resistor.

      When the variable resistor has an initial resistance of $2.0R$, the current in the cell is $I_1$ and the terminal potential difference (p.d.) across the cell is $V_1$.

      The variable resistor is now adjusted to a new resistance of $4.0R$.

      What is the new current in the cell and the new terminal p.d. across the cell?
    options:
      - letter: A
        text: |
          current: $0.50I_1$, terminal p.d.: $1.0V_1$
      - letter: B
        text: |
          current: $0.50I_1$, terminal p.d.: $1.2V_1$
      - letter: C
        text: |
          current: $0.60I_1$, terminal p.d.: $1.0V_1$
      - letter: D
        text: |
          current: $0.60I_1$, terminal p.d.: $1.2V_1$