questions:
  - number: "8"
    type: multiple_choice
    text: |
      A stone is thrown upwards and follows a curved path.

      Air resistance is negligible.

      Why does the path have this shape?
    options:
      - letter: A
        text: |
          The stone has a constant horizontal acceleration and constant vertical velocity.
      - letter: B
        text: |
          The stone has a constant horizontal velocity and constant vertical acceleration.
      - letter: C
        text: |
          The stone has a constant upward acceleration followed by a constant downward acceleration.
      - letter: D
        text: |
          The stone has a constant upward velocity followed by a constant downward velocity.
  - number: "9"
    type: multiple_choice
    text: |
      A rocket engine ejects $90\text{ kg}$ of exhaust gas per second at a velocity of $190\text{ m}\,\text{s}^{-1}$ relative to the rocket.

      What is the force acting on the rocket due to the ejected gas?
    options:
      - letter: A
        text: |
          $2.1\text{ kN}$
      - letter: B
        text: |
          $17\text{ kN}$
      - letter: C
        text: |
          $18\text{ kN}$
      - letter: D
        text: |
          $162\text{ kN}$
  - number: "10"
    type: multiple_choice
    text: |
      Which statement does \textbf{not} describe an elastic collision between two objects?
    options:
      - letter: A
        text: |
          The relative speed of approach of the two objects equals the relative speed of separation.
      - letter: B
        text: |
          The total kinetic energy of the objects is conserved.
      - letter: C
        text: |
          The total kinetic energy of the objects is reduced.
      - letter: D
        text: |
          The total linear momentum of the objects is conserved.
  - number: "11"
    type: multiple_choice
    text: |
      A cyclist is riding at a constant speed on a level road.

      According to Newton’s third law of motion, what is equal and opposite to the backward push of the back wheel on the road?
    options:
      - letter: A
        text: |
          the force exerted by the cyclist on the pedals
      - letter: B
        text: |
          the forward push of the road on the back wheel
      - letter: C
        text: |
          the tension in the cycle chain
      - letter: D
        text: |
          the total air resistance and friction force