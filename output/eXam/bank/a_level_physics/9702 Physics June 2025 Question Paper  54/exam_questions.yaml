  text: "1\nA ball is dropped on to an inclined thin metal sheet, as shown in Fig.\
    \ 1.1.\nd\nz\nsheet\nball\nbench\nθ\nFig. 1.1 (not to scale)\n\nThe angle between\
    \ the sheet and the horizontal bench is θ. The height of the point of contact\n\
    of the ball and the sheet is z. The horizontal distance travelled by the ball\
    \ between its points of\ncontact with the sheet and the bench is d, as shown in\
    \ Fig. 1.1.\n\nIt is suggested that d is related to θ by the relationship\nd =\
    \ Pv 2 sin  4θ\ng\n + Q\nz\n\nwhere v is the speed of the ball as it makes contact\
    \ with the sheet, g is the acceleration of free fall,\nand P and Q are constants.\n\
    \nPlan a laboratory experiment to test the relationship between d and θ.\n\nDraw\
    \ a diagram showing the arrangement of your equipment.\n\nExplain how the results\
    \ could be used to determine values for P and Q.\n\nIn your plan you should include:\n\
    \n●\nthe procedure to be followed\n\n●\nthe measurements to be taken\n\n●\nthe\
    \ control of variables\n\n●\nthe analysis of the data\n\n●\nany safety precautions\
    \ to be taken.\n,\t,\nDiagram\n ,\t,\n [15]\n,\t,"
