- number: 2gi
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'A

    Two (sets of) readings are not enough to draw a (valid) conclusion (not “not enough
    for accurate results”, “few

    readings”).

    B

    Reason for difficulty in producing the rectangle of paper e.g. hard to make the
    sides parallel (or perpendicular) / hard to

    cut the sides straight / difficult to cut lengths accurately / cutting by hand
    with scissors (produces wavy sides) / paper

    twists / folds when cutting (because it is thin).

    C  Difficulty with measuring T with reason e.g. two edges are not parallel when
    they meet / difficult to ensure the stopwatch

    is started at the same time as the paper is placed (or dropped) on to the water / experiment
    cannot be repeated using

    the same piece of paper.

    D Difficulty with the paper staying central in the bowl e.g. paper floats / moves
    and touches the edge of bowl.

    E

    Reason for difficulty with placing the paper onto the water surface e.g. paper
    is tilted / is dropped / hard to lower the

    paper parallel to the water / water surface is disturbed / ripples when placing
    paper / paper gets wet before entering

    water / paper is curled before placing on water.

    1 mark for each point up to a maximum of 4.

    4'
  mark_scheme: []
