  - number: "2a"
    type: calculation
    text: |
      You are provided with a length of plastic channel. When the channel is positioned with its open side at the top, it forms a track with a pair of rails along which a sphere can roll.

      The distance between the rails is $x$.

      Measure and record $x$.

