    text: |
      You are provided with two spheres.

      Place the smaller sphere on the track. If necessary, adjust the position of the wooden block until the sphere is able to roll along the full length of the track and into the box.

      Secure the block to the track with a small piece of adhesive putty as shown in Fig. 2.3. \textbf{The block and track must remain in these positions for the rest of the experiment.}