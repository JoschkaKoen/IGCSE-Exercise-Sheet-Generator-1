  text: "1\nFig. 1.1 shows two identical cylindrical metal conductors P and Q, each\
    \ of length L and\ncross‑sectional area A.\nL\nX\nQ\nP\nq\np\nFig. 1.1\n\nThe\
    \ conductors are placed parallel to each other. The perpendicular distance from\
    \ the midpoint of\nP to point X is p. The perpendicular distance from the midpoint\
    \ of Q to point X is q.\n\nThe two conductors are electrically connected in parallel.\
    \ This parallel combination is connected\nin series to a power supply and a resistor.\
    \ The potential difference V between the ends of P is the\nsame as the potential\
    \ difference between the ends of Q.\n\nThe magnetic flux density at X due to the\
    \ currents in the conductors is B.\n\nIt is suggested that B is related to p by\
    \ the relationship\nB = YAV\nLp  + YZAV\nLq\n\nwhere Y and Z are constants.\n\n\
    Plan a laboratory experiment to test the relationship between B and p.\n\nDraw\
    \ a diagram showing the arrangement of your equipment.\n\nExplain how the results\
    \ could be used to determine values for Y and Z.\n\nIn your plan you should include:\n\
    •\nthe procedure to be followed\n•\nthe measurements to be taken\n•\nthe control\
