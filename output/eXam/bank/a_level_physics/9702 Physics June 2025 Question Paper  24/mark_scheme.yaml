  mark_scheme_answer: '(difference in path lengths, XQ – YQ) $= [72^2 + 30^2]^{\frac{1}{2}}
    - 72 = 6$ (cm)

    \newline

    Or calculate angle Q using tan and then cos to obtain XQ of 78

    $\tan\theta = 30 / 72$ so $\theta = 22.6$

    XQ $= 72 / \cos 22.6 = 78$ (cm)

    path difference $78 - 72 = 6$ (cm)

    \newline

    Or calculate angle X using tan and then cos to obtain XQ of 78

    $\tan\theta = 72 / 30$ so $\theta = 67.4$

    XQ $= 72 / \sin 67.4 = 78$ (cm)

    path difference $78 - 72 = 6$ (cm)'
  mark_scheme: []
