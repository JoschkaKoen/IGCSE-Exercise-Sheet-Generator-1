questions:
- number: '1'
  question_type: long_answer
  page: 2
  subpage_row: 1
  subpage_col: 1
  marks: 15
  text: 'A thin solid disc of radius $r$ and thickness $z$ is attached to a thin axle.
    String is wrapped around the axle, as shown in Fig. 1.1.


    A block of mass $m$ is attached to the string.


    The block is released from rest and falls downwards. The block has speed $v$ when
    it has fallen through a distance $h$ from the point of release. The value of $v$
    is determined using \textbf{one} light gate connected to a timer.


    It is suggested that $v$ is related to $m$ by the relationship


    $$\frac{h}{v^2} = \frac{\pi r^2 z}{2PQm} + \frac{1}{P}$$


    where $P$ and $Q$ are constants.


    Plan a laboratory experiment to test the relationship between $v$ and $m$.


    Draw a diagram showing the arrangement of your equipment.


    Explain how the results could be used to determine values for $P$ and $Q$.


    In your plan you should include:


    \begin{itemize}

    \item the procedure to be followed

    \item the measurements to be taken

    \item the control of variables

    \item the analysis of the data

    \item any safety precautions to be taken.

    \end{itemize}'
  answer_options: []
  subquestions: []
- number: '2'
  question_type: short_answer
  page: 5
  subpage_row: 1
  subpage_col: 1
  marks: 0
  text: 'A student investigates a circuit containing capacitors. The circuit is connected
    with a capacitor of capacitance $A$, as shown in Fig. 2.1.


    Fig. 2.1


    Two capacitors, each of capacitance $C$, are connected in parallel between P and
    Q.


    Initially, switch X and switch Z are closed and switch Y is open.


    Switches X and Z are opened. Switch Y is then closed. The maximum potential difference
    between P and Q is measured using the voltmeter. This procedure is repeated and
    the mean maximum potential difference $V$ between P and Q is determined.


    The experiment is then repeated by changing the number $n$ of capacitors, each
    of capacitance $C$, connected in parallel between P and Q.


    It is suggested that $V$ and $n$ are related by the equation

    $$EA = V(nC + A)$$

    where $E$ is the electromotive force (e.m.f.) of the battery.'
  answer_options: []
  subquestions:
  - number: 2a
    question_type: short_answer
    page: 5
    subpage_row: 1
    subpage_col: 1
    marks: 1
    text: 'A graph is plotted of $\frac{1}{V}$ on the $y$-axis against $n$ on the
      $x$-axis.


      Determine expressions for the gradient and $y$-intercept.


      gradient = \hrulefill

      $y$-intercept = \hrulefill'
    answer_options: []
    subquestions: []
  - number: 2b
    question_type: calculation
    page: 6
    subpage_row: 1
    subpage_col: 1
    marks: 2
    text: 'Values of $n$ and the two measured values of the maximum potential difference
      $V_1$ and $V_2$ are given in Table 2.1.


      \textbf{Table 2.1}


      \begin{tabular}{|c|c|c|c|c|}

      \hline

      $n$ & $V_1/\text{V}$ & $V_2/\text{V}$ & $V/\text{V}$ & $\frac{1}{V}/\text{V}^{-1}$
      \\ \hline

      2 & 4.30 & 4.20 & & \\ \hline

      3 & 3.65 & 3.75 & & \\ \hline

      4 & 3.30 & 3.20 & & \\ \hline

      5 & 2.85 & 2.95 & & \\ \hline

      6 & 2.65 & 2.55 & & \\ \hline

      7 & 2.30 & 2.40 & & \\ \hline

      \end{tabular}


      Calculate and record values of $V/\text{V}$ and $\frac{1}{V}/\text{V}^{-1}$
      in Table 2.1. Include the absolute uncertainties in $V$ and $\frac{1}{V}$.'
