questions:
  - number: "24"
    type: multiple_choice
    text: |
      Which row describes a progressive longitudinal wave?

      \begin{tabular}{|c|c|c|c|}
      \hline
       & \begin{tabular}[c]{@{}c@{}}transfers energy in\\a direction parallel\\to the oscillations\end{tabular} & \begin{tabular}[c]{@{}c@{}}requires a medium\\to travel through\end{tabular} & \begin{tabular}[c]{@{}c@{}}always travels at\\the same speed\end{tabular} \\ \hline
      \textbf{A} & false & false & true \\ \hline
      \textbf{B} & false & true & true \\ \hline
      \textbf{C} & true & false & false \\ \hline
      \textbf{D} & true & true & false \\ \hline
      \end{tabular}
    options:
      - letter: A
        text: |
          A
      - letter: B
        text: |
          B
      - letter: C
        text: |
          C
      - letter: D
        text: |
          D

