- number: 1ci
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Axes:

    Axes must be labelled with the correct quantities.

    Scales must be chosen so that the plotted points occupy

    at least half the graph grid in both the x and y directions.

    Scale markings are no more than 2 cm (one large square) apart.

    Sensible scales must be used, no awkward scales (e.g. 3:10 or fractions).

    1

    Plotting of points:

    All observations in the table must be plotted on the grid.

    Diameter of plotted points must be ⩽ half a small square.

    Points must be plotted to an accuracy of half a small square in both x and y directions.

    1

    Quality:

    General trend of points must be negative.

    All points in the table must be plotted (at least 5) for this mark to be awarded.

    It must be possible to draw a straight line that is within  0.001 g–1/2 on the
    1 / M axis of all plotted points.

    1'
  mark_scheme: []
  graphics: []
- number: 1cii
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Line of best fit:

    ‘Best fit’ is judged by the balance of all points on the grid (at least 5 points)
    about the candidate’s line.

    There must be an even distribution of points either side of the line along the
    full length.

    Lines must not be kinked or thicker than half a square.

    Some candidates may choose to identify an anomalous point. If they identify one
    point as anomalous (e.g. by circling or

    labelling) then this point is to be disregarded when judging the line of best
    fit. There must be at least 5 points left after the

    anomalous point is disregarded.

    1

    9702/38

    October/November 2025'
  mark_scheme: []
  graphics: []
- number: 1ciii
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Gradient:

    Gradient sign on answer line consistent with graph drawn.

    The hypotenuse of the triangle used should be greater than half the length of
    the drawn line.

    Both read offs must be accurate to half a small square in both the x and y directions.

    Method of calculation must be correct, not x / y.

    1

    y-intercept:

    Either

    Intercept read directly from the graph, with read off at

    x = 0, accurate to half a small square in y direction.

    Or

    Correct read off from a point on the line is substituted into y = mx + c or an
    equivalent expression.

    Read-off accurate to half a small square in both x and y directions

    1'
