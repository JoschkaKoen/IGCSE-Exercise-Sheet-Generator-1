questions:
  - number: "7"
    type: multiple_choice
    text: |
      An object is projected horizontally. The object falls a vertical distance $y$ and travels a horizontal distance $x$ before landing on the ground.

      A second object is projected horizontally with the same initial velocity and falls a vertical distance $4y$ before landing on the ground.

      Assume that air resistance is negligible.

      Which horizontal distance does the second object travel?
    options:
      - letter: A
        text: |
          $x$
      - letter: B
        text: |
          $2x$
      - letter: C
        text: |
          $4x$
      - letter: D
        text: |
          $16x$