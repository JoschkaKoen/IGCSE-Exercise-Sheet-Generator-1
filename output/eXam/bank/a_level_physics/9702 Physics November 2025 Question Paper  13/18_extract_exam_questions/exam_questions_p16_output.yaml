questions:
  - number: "36"
    type: multiple_choice
    text: |
      Two identical wires X and Y, each of length $L$ and radius $r$, are connected in parallel as shown.

      The total resistance of this combination is $R_1$.

      Wire X is replaced with a wire of the same material with length $L$ and radius $2r$.

      The total resistance of the new combination is $R_2$.

      What is the ratio $\frac{R_1}{R_2}$?
    options:
      - letter: A
        text: |
          $\frac{2}{5}$
      - letter: B
        text: |
          $\frac{2}{3}$
      - letter: C
        text: |
          $\frac{3}{2}$
      - letter: D
        text: |
          $\frac{5}{2}$
  - number: "37"
    type: multiple_choice
    text: |
      The diagram shows the currents in part of an electric circuit.

      The resistors are identical.

      Which equation is \textbf{not} correct?
    options:
      - letter: A
        text: |
          $I_1 = I_2 + I_4 + I_5$
      - letter: B
        text: |
          $I_2 = I_1 - I_3$
      - letter: C
        text: |
          $I_2 = I_3 + I_4 + I_5$
      - letter: D
        text: |
          $I_4 = I_3 - I_5$
  - number: "38"
    type: multiple_choice
    text: |
      The diagram shows a sequence of radioactive decays involving three $\alpha$-particles and a $\beta^-$ particle.

      $$\text{}^{237}_{93}\text{Np} \xrightarrow{\alpha} \text{Q} \xrightarrow{\beta^-} \text{R} \xrightarrow{\alpha} \text{S} \xrightarrow{\alpha} \text{T}$$

      What is nuclide T?
    options:
      - letter: A
        text: |
          $^{225}_{88}\text{Ra}$
      - letter: B
        text: |
          $^{231}_{88}\text{Ra}$
      - letter: C
        text: |
          $^{225}_{90}\text{Th}$
      - letter: D
        text: |
          $^{229}_{90}\text{Th}$