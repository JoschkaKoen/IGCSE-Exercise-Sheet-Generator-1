    of the spacecraft. Thruster C is a distance of $0.40\text{ m}$ upwards from the
    centre of gravity of the spacecraft.


    Thrusters A and B can produce forces on the spacecraft in the upwards direction
    only.

    Thruster C can produce a force on the spacecraft in the leftwards direction only.

    All the thrusters shown produce forces entirely in the same plane as the centre
    of gravity.'
