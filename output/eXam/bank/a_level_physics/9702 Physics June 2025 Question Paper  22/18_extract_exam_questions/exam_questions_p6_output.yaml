  - number: "2b"
    type: short_answer
    text: |
      A tree of mass $270\text{ kg}$ grows out of sloping ground and is supported by a post, as shown in Fig. 2.1.

      The ground applies a total force $R$ on the tree at point Q.
      The centre of gravity of the tree is a horizontal distance of $1.2\text{ m}$ from Q.
      The post applies a force $F$ of $1800\text{ N}$ perpendicular to the line PQ. The line of action of $F$ passes through point P at an angle $\theta$ to the vertical. P is a horizontal distance of $1.6\text{ m}$ from Q.
      The tree is in equilibrium and all forces act on the tree in the same plane.
  - number: "2bi"
    type: calculation
    text: |
      By taking moments about point Q, show that $\theta$ is $25^\circ$.