      \begin{tabular}{|c|c|c|}

      \hline

      $d / 10^{21}\text{ km}$ & $\frac{d}{c} / 10^{15}\text{ s}$ & $\lambda / \text{nm}$
      \\ \hline

      $0.48 \pm 0.12$ & & $658.4$ \\ \hline

      $1.04 \pm 0.12$ & & $661.2$ \\ \hline

      $1.45 \pm 0.12$ & & $664.2$ \\ \hline

      $1.80 \pm 0.12$ & & $665.7$ \\ \hline

      $2.85 \pm 0.12$ & & $672.4$ \\ \hline

      $3.75 \pm 0.12$ & & $678.2$ \\ \hline

      \end{tabular}

      \end{center}


      The value of $c$ is $3.00 \times 10^5\text{ km}\,\text{s}^{-1}$.


      Calculate and record values of $\frac{d}{c} / 10^{15}\text{ s}$ in Table 2.1.
      Include the absolute uncertainties in $\frac{d}{c}$.'
