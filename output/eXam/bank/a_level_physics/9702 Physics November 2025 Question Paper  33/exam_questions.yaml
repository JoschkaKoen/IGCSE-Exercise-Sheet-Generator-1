    text: '\begin{itemize}

      \item Set up the apparatus as shown in Fig. 1.2.

      \item The distance between the lower edge of the top of the board and the bench
      is $h$, as shown in Fig. 1.2.


      Adjust the position of the boss so that $h$ is approximately $22\text{ cm}$.

      \item Fix the position of the bottom of the board using adhesive putty.

      \item Measure and record $h$.

      \end{itemize}


      $h = \hrulefill \text{ cm}$


      \begin{itemize}

      \item Move the bob to the edge of the board, as shown in Fig. 1.3.

      \item Release the bob. The bob rolls across the board and the pendulum oscillates.

      \item Take measurements to determine the period $T$ of the oscillations.

      \end{itemize}


      $T = \hrulefill \text{ s}$'
