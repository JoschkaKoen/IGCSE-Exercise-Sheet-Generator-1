      be measured. The height of the movable glass tube is then adjusted so that the
      level of the liquid on the left-hand side aligns with the reference line X marked
      on the fixed glass tube. The reference line Y is marked on the side of the movable
      glass tube. The level of the liquid at Y is higher than at X as a result of
      the pressure of the gas in the glass bulb.


      The difference in height $\Delta h$ between the liquid levels at X and Y is
      then measured using the scale. The thermodynamic temperature $T$ of the gas
      is directly proportional to the pressure of the gas. This pressure is directly
      proportional to $\Delta h$.'
