  - number: "3c"
    type: calculation
    text: |
      An ice cube of mass $37.0\text{ g}$ at temperature $0.0^\circ\text{C}$ is placed in a beaker containing water of mass $208\text{ g}$ at temperature $26.4^\circ\text{C}$.

      When all the ice has melted, and all the water in the beaker has reached thermal equilibrium, the final temperature of all the water is $10.3^\circ\text{C}$.

      The specific heat capacity of water is $4.18\text{ J}\,\text{g}^{-1}\,^\circ\text{C}^{-1}$.

      The beaker has negligible specific heat capacity and is perfectly insulated from the surroundings.

      Determine a value, to three significant figures, for the specific latent heat of fusion of water.

      specific latent heat of fusion = \hrulefill $\text{J}\,\text{g}^{-1}$