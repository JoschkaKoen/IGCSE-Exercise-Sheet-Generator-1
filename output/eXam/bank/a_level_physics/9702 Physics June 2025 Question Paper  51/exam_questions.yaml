questions:
- number: '1'
  question_type: long_answer
  page: 2
  subpage_row: 1
  subpage_col: 1
  marks: 15
  text: 'Fig. 1.1 shows a thin coil of cross-sectional area $A$ and length $l$ connected
    to a resistor of resistance $S$ and two terminals.


    An alternating voltage is applied to the terminals. The peak value of the alternating
    voltage is $E$ and the frequency is $f$. The peak value of the potential difference
    $V$ across the resistor is determined using an oscilloscope.


    It is suggested that $V$ is related to $f$ by the relationship


    $$\frac{ES}{V} = \frac{KAN^2 f}{l}$$


    where $N$ is the number of turns on the coil and $K$ is a constant.


    Plan a laboratory experiment to test the relationship between $V$ and $f$.


    Draw a diagram showing the arrangement of your equipment.


    Explain how the results could be used to determine a value for $K$.


    In your plan you should include:


    \begin{itemize}

    \item the procedure to be followed

    \item the measurements to be taken

    \item the control of variables

    \item the analysis of the data

    \item any safety precautions to be taken.

    \end{itemize}'
  answer_options: []
  subquestions: []
- number: '2'
  question_type: short_answer
  page: 5
  subpage_row: 1
  subpage_col: 1
  marks: 0
  text: 'A student investigates an electrical circuit.


    The circuit is set up as shown in Fig. 2.1.


    A battery of negligible internal resistance is connected to a resistor of resistance
    $Z$. Five resistors, each of resistance $R$, are connected in parallel between
    P and Q.


    The switch is closed. The total current $I$ in the circuit is measured using the
    ammeter.


    The experiment is then repeated by changing the number $n$ of resistors, each
    of resistance $R$, connected in parallel between P and Q.


    It is suggested that $I$ and $n$ are related by the equation

    $$E = I \left(\frac{R}{n} + Z\right)$$

    where $E$ is the electromotive force (e.m.f.) of the battery.'
  answer_options: []
  subquestions:
  - number: 2a
    question_type: short_answer
    page: 5
    subpage_row: 1
    subpage_col: 1
    marks: 1
    text: 'A graph is plotted of $\frac{1}{I}$ on the $y$-axis against $\frac{1}{n}$
      on the $x$-axis.


      Determine expressions for the gradient and $y$-intercept.


      gradient = \hrulefill

      y-intercept = \hrulefill'
    answer_options: []
    subquestions: []
  - number: 2b
    question_type: calculation
    page: 6
    subpage_row: 1
    subpage_col: 1
    marks: 2
    text: 'Values of $n$, $\frac{1}{n}$ and $I$ are given in Table 2.1.


      \textbf{Table 2.1}


      \begin{tabular}{|c|c|c|c|}

      \hline

      $n$ & $\frac{1}{n}$ & $I / \mu\text{A}$ & $\frac{1}{I} / 10^3\text{A}^{-1}$
      \\ \hline

      5 & 0.200 & $455 \pm 5$ & \\ \hline

      6 & 0.167 & $525 \pm 5$ & \\ \hline

      7 & 0.143 & $580 \pm 5$ & \\ \hline

      8 & 0.125 & $635 \pm 5$ & \\ \hline

      9 & 0.111 & $685 \pm 5$ & \\ \hline

      11 & 0.0909 & $765 \pm 5$ & \\ \hline

      \end{tabular}


      Calculate and record values of $\frac{1}{I} / 10^3\text{A}^{-1}$ in Table 2.1.
      Include the absolute uncertainties in $\frac{1}{I}$.'
    answer_options: []
