    \\begin{tabular}{|c|c|c|}\n\\hline\n & \\begin{tabular}{c} results are accurate\
    \ \\\\ to within 1 mm \\end{tabular} & \\begin{tabular}{c} results are precise\
    \ \\\\ to within 1 mm \\end{tabular} \\\\\n\\hline\n\\textbf{A} & no & no \\\\\
    \n\\textbf{B} & no & yes \\\\\n\\textbf{C} & yes & no \\\\\n\\textbf{D} & yes\
    \ & yes \\\\\n\\hline\n\\end{tabular}"
