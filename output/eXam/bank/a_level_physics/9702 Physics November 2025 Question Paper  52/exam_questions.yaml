questions:
- number: '1'
  question_type: long_answer
  page: 2
  subpage_row: 1
  subpage_col: 1
  marks: 15
  text: 'Fig. 1.1 shows a model wind turbine with blades, each of length $L$, placed
    in moving air.


    The area of the circle swept by the blades of the turbine is $A$.


    The output of the turbine has two terminals. The turbine is connected to a resistor
    of resistance $R$. At a speed $v$ of the moving air, the current in the resistor
    is $I$.


    The atmospheric pressure is $P$ and the thermodynamic temperature of the air is
    $T$.


    It is suggested that $I$ is related to $v$ by the relationship


    $$\frac{I^2 R}{Q} = \frac{APv^3}{2T}$$


    where $Q$ is a constant.


    Plan a laboratory experiment to test the relationship between $I$ and $v$.


    Draw a diagram showing the arrangement of your equipment.


    Explain how the results could be used to determine a value for $Q$.


    In your plan you should include:


    \begin{itemize}

    \item the procedure to be followed

    \item the measurements to be taken

    \item the control of variables

    \item the analysis of the data

    \item any safety precautions to be taken.

    \end{itemize}'
  answer_options: []
  subquestions: []
- number: '2'
  question_type: short_answer
  page: 5
  subpage_row: 1
  subpage_col: 1
  marks: 0
  text: 'A student observes the orbits of some of the moons around the planet Saturn,
    as shown in Fig. 2.1.


    For the moon Pandora, the period of the orbit and the mean distance from the centre
    of Saturn are determined.


    The measurements of period $T$ and mean distance $r$ are repeated for other moons.


    It is suggested that $T$ and $r$ are related by the equation


    $$T = \frac{2\pi r^n}{k}$$


    where $n$ and $k$ are constants.'
  answer_options: []
  subquestions:
  - number: 2a
    question_type: short_answer
    page: 5
    subpage_row: 1
    subpage_col: 1
    marks: 1
    text: 'A graph is plotted of $\lg T$ on the $y$-axis against $\lg r$ on the $x$-axis.


      Determine expressions for the gradient and $y$-intercept.


      gradient = \hrulefill


      $y$-intercept = \hrulefill'
    answer_options: []
    subquestions: []
  - number: 2b
    question_type: calculation
    page: 6
    subpage_row: 1
    subpage_col: 1
    marks: 2
    text: 'Values of $r$ and $T$ are given for different moons in Table 2.1.


      \begin{center}

      \textbf{Table 2.1}


      \begin{tabular}{|c|c|c|c|c|}

      \hline

      moon & $r / 10^8\text{ m}$ & $T / 10^3\text{ s}$ & $\lg(r / 10^8\text{ m})$
      & $\lg(T / 10^3\text{ s})$ \\ \hline

      Pandora & 1.42 & $52 \pm 5$ & & \\ \hline

      Mimas & 1.86 & $81 \pm 5$ & & \\ \hline

      Enceladus & 2.38 & $120 \pm 10$ & & \\ \hline

      Tethys & 2.95 & $170 \pm 10$ & & \\ \hline

      Dione & 3.77 & $240 \pm 20$ & & \\ \hline

      Rhea & 5.28 & $390 \pm 30$ & & \\ \hline

      \end{tabular}

      \end{center}


      Calculate and record values of $\lg(r / 10^8\text{ m})$ and $\lg(T / 10^3\text{
      s})$ in Table 2.1. Include the absolute uncertainties in $\lg(T / 10^3\text{
      s})$.'
