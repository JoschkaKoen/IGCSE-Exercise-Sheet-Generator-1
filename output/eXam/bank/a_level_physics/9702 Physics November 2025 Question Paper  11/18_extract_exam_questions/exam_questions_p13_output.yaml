questions:
  - number: "28"
    type: multiple_choice
    text: |
      A student carries out a double-slit experiment using a laser emitting red light of wavelength of $680\text{ nm}$. The light is incident normally on a double slit.

      The diagram shows part of the pattern of bright fringes visible on a screen at a distance of $2.4\text{ m}$ from the slits. The distance across five bright fringes is measured as $34\text{ mm}$.

      What is the slit separation?
    options:
      - letter: A
        text: |
          $8.5 \times 10^{-3}\text{ m}$
      - letter: B
        text: |
          $2.4 \times 10^{-4}\text{ m}$
      - letter: C
        text: |
          $1.9 \times 10^{-4}\text{ m}$
      - letter: D
        text: |
          $4.8 \times 10^{-5}\text{ m}$
  - number: "29"
    type: multiple_choice
    text: |
      The diagram shows a stationary wave on a stretched spring at an instant in time.

      Two particles on the spring, P and Q, are shown.

      Which statement about the vibrations of P and Q is correct?
    options:
      - letter: A
        text: |
          They have different frequencies.
      - letter: B
        text: |
          They have the same amplitudes.
      - letter: C
        text: |
          They have different periods.
      - letter: D
        text: |
          They are always in phase.
  - number: "30"
    type: multiple_choice
    text: |
      Green laser light passes through a diffraction grating and forms an interference pattern.

      The diffraction grating contains 400 lines per mm.

      The wavelength of the laser light is $550\text{ nm}$.

      What is the highest order diffraction maximum produced by the grating?
    options:
      - letter: A
        text: |
          4
      - letter: B
        text: |
          5
      - letter: C
        text: |
          8
      - letter: D
        text: |
          9
  - number: "31"
    type: multiple_choice
    text: |
      There is a potential difference $V$ across a resistor of resistance $R$. The current in the resistor is $I$.

      Which equation gives the power $P$ dissipated by the resistor?
    options:
      - letter: A
        text: |
          $P = V^2 I$
      - letter: B
        text: |
          $P = \frac{V^2}{I}$
      - letter: C
        text: |
          $P = V^2 R$
      - letter: D
        text: |
          $P = \frac{V^2}{R}$