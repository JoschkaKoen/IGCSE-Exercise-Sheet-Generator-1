questions:
- number: '1'
  question_type: long_answer
  page: 2
  subpage_row: 1
  subpage_col: 1
  marks: 15
  text: 'Fig. 1.1 shows a horizontal turntable.


    Point C is at the centre of the turntable. Point P is a distance $r$ from the
    centre.


    Fig. 1.2 shows a side view of a d.c. motor attached to the turntable with a belt.


    The motor is used to rotate the turntable at frequency $f_0$. The motor is switched
    off and the turntable continues to rotate at frequency $f_0$.


    A sphere of adhesive putty of mass $m$ is dropped onto the turntable at point
    P. The frequency of the turntable is now $f$.


    It is suggested that $f$ is related to $m$ by the relationship


    $$\frac{Kf_0}{f} = \beta K + mr^2$$


    where $\beta$ and $K$ are constants.


    Plan a laboratory experiment to test the relationship between $f$ and $m$.


    Draw a diagram showing the arrangement of your equipment.


    Explain how the results could be used to determine values for $\beta$ and $K$.


    In your plan you should include:


    \begin{itemize}

    \item the procedure to be followed

    \item the measurements to be taken

    \item the control of variables

    \item the analysis of the data

    \item any safety precautions to be taken.

    \end{itemize}'
  answer_options: []
  subquestions: []
- number: '2'
  question_type: short_answer
  page: 5
  subpage_row: 1
  subpage_col: 1
  marks: 0
  text: 'A student places a slide with a double slit on a support clamped to the bench
    as shown in Fig. 2.1.


    The distance between the slide and the screen is $D$.


    The separation $s$ of the slits is determined.


    Light from a laser is incident normally on the double slit. An interference pattern
    is observed on the screen. The distance $w$ across 10 fringes is measured. The
    distance $y$ between the centres of adjacent fringes is calculated using the equation

    $$y = \frac{w}{10}.$$


    The experiment is repeated with slides of different slit separation $s$.


    It is suggested that $y$ and $s$ are related by the equation

    $$\lambda = \frac{sy}{D}$$

    where $\lambda$ is the wavelength of the incident light.'
  answer_options: []
  subquestions:
  - number: 2a
    question_type: short_answer
    page: 5
    subpage_row: 1
    subpage_col: 1
    marks: 1
    text: 'A graph is plotted of $y$ on the $y$-axis against $\frac{1}{s}$ on the
      $x$-axis.


      Determine an expression for the gradient.


      gradient = \hrulefill'
    answer_options: []
    subquestions: []
  - number: 2b
    question_type: calculation
    page: 6
    subpage_row: 1
    subpage_col: 1
    marks: 2
    text: 'Values of $s$ and $w$ are given in Table 2.1.


      \begin{center}

      \textbf{Table 2.1}

      \newline

      \begin{tabular}{|c|c|c|c|}

      \hline

      $s / \text{mm}$ & $\frac{1}{s} / \text{mm}^{-1}$ & $w / \text{mm}$ & $y / \text{mm}$
      \\ \hline

      $0.18 \pm 0.01$ & & $33.0$ & \\ \hline

      $0.21 \pm 0.01$ & & $28.9$ & \\ \hline

      $0.24 \pm 0.01$ & & $25.1$ & \\ \hline

      $0.27 \pm 0.01$ & & $22.6$ & \\ \hline

      $0.31 \pm 0.01$ & & $19.6$ & \\ \hline

      $0.38 \pm 0.01$ & & $15.9$ & \\ \hline

      \end{tabular}

      \end{center}


      Calculate and record values of $\frac{1}{s} / \text{mm}^{-1}$ and $y / \text{mm}$
      in Table 2.1. Include the absolute uncertainties in $\frac{1}{s}$.'
    answer_options: []
