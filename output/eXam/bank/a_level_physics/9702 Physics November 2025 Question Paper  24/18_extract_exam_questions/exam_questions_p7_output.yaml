      Show that the side length of the sheet is $0.48 \text{ m}$.
  - number: "2e"
    type: short_answer
    text: |
      Use the answer in \textbf{(b)} and the information in \textbf{(c)} and \textbf{(d)} to determine the position of the centre of gravity of the sheet. Indicate this position on Fig. 2.3 with a point labelled Y.