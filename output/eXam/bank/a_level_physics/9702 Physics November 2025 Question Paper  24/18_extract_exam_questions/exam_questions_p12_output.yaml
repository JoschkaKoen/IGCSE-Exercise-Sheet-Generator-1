questions:
  - number: "5"
    type: short_answer
    text: |
      A student uses a circuit containing an ammeter, a voltmeter and a cell to take measurements to determine the resistance of a length of nichrome wire.
  - number: "5a"
    type: short_answer
    text: ''
  - number: "5ai"
    type: short_answer
    text: |
      Define resistance.
  - number: "5aii"
    type: short_answer
    text: |
      Draw a circuit diagram to show how the components should be connected. Use the symbol for a resistor to represent the nichrome wire.
  - number: "5b"
    type: short_answer
    text: |
      The student also measures the length and the diameter of the wire. Table 5.1 shows the measurements recorded for each quantity.

      \textbf{Table 5.1}

      \begin{tabular}{|c|c|}
      \hline
      quantity & measurement \\ \hline
      length & $(0.864 \pm 0.001)\text{ m}$ \\
      diameter & $(0.496 \pm 0.002)\text{ mm}$ \\
      voltmeter reading & $(1.38 \pm 0.02)\text{ V}$ \\
      ammeter reading & $(0.276 \pm 0.001)\text{ A}$ \\ \hline
      \end{tabular}
  - number: "5bi"
    type: calculation
    text: |
      Show that the resistance of the wire is $5.00\ \Omega$.