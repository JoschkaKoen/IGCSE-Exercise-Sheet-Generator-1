- number: '4'
  question_type: short_answer
  marks: 0
  text: "4\nAn examination paper has a maximum of 75 marks. One of five pass grades\
    \ (A to E) is assigned,\ndepending on the mark obtained. The lowest mark for a\
    \ given grade is known as the grade boundary.\n\nA program is being written to\
    \ process examination marks.\n\nThe five grade boundaries are stored in a global\
    \ 1D array GB of type INTEGER, for example:\nIndex\nValue\nComment\n1\n65\nThe\
    \ minimum mark for an A grade.\n2\n57\nThe minimum mark for a B grade.\n3\n43\n\
    The minimum mark for a C grade.\n4\n35\nThe minimum mark for a D grade.\n5\n27\n\
    The minimum mark for an E grade.\n\nAny paper that achieves a mark within 2 marks\
    \ of a grade boundary must be checked. Using the\ngiven table, a paper with 45\
    \ marks would need to be checked.\n\n(a) The pseudocode algorithm to determine\
    \ whether a paper should be checked is as shown.\nThe mark for the paper is stored\
    \ in variable Mark. Global variables Mark, Index, Upper and\nLower are declared\
    \ as integers.\n\nComplete the pseudocode.\n\nFOR Index ← 1 TO  Lower ← GB[Index]\
    \ - 2\n\n   Upper ←  IF Mark  AND Mark  THEN\n\n      OUTPUT \"Check this paper\"\
    \n\n   ENDIF\n\nNEXT Index\n\n[4]\n\n(b) An alternative algorithm to determine\
    \ if a paper needs to be checked uses a global 1D array\nCheck, containing 76\
    \ elements of type BOOLEAN. The indices of the array are from 0 to 75\n(inclusive),\
    \ corresponding to the range of possible marks.\n\nAn element value in Check is\
    \ TRUE if the index is within 2 marks of a grade boundary. For\nexample, in the\
    \ case where the C grade boundary is 43 the corresponding part of the Check\n\
    array would be as follows:\nIndex\nValue\n40\nFALSE\n41\nTRUE\n42\nTRUE\n43\n\
    TRUE\n44\nTRUE\n45\nTRUE\n46\nFALSE\n← The grade boundary for a C grade\n,\t\t\
    ,\n\n(i) The mark for a given paper is stored in variable Mark.\n\n Describe how\
    \ an algorithm would use the Check array to determine whether this paper\nshould\
    \ be checked [2]\n\n(ii) A procedure GBInitialise() will initialise the Check\
    \ array using values from the GB\narray.\n\n Note it can be assumed that the maximum\
    \ grade boundary value for A is 70 and the\nminimum value for E is 15.\n\n Write\
    \ pseudocode for the procedure [6]\n,\n,"
