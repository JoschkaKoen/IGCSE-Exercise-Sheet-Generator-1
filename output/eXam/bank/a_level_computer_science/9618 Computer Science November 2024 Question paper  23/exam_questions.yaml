  text: "8\nA program is being developed to implement a game for up to six players.\n\
    \nDuring the game, each player assembles a team of characters. At the start of\
    \ the game there are\n45 characters available.\n\nEach character has four attributes,\
    \ as follows:\nAttribute\nExamples\nComment\nPlayer\n0, 1, 3\nThe player the character\
    \ is assigned to.\nRole\nBuilder, Teacher, Doctor\nThe job that the character\
    \ will perform in the\ngame.\nName\nBill, Lee, Farah, Mo\nThe name of the character.\
    \ Several characters\nmay perform the same role, but they will each\nhave a unique\
    \ name.\nSkill level\n14, 23, 76\nAn integer in the range 0 to 100, inclusive.\n\
    \nThe programmer has defined a record type to define each character. The record\
    \ type definition is\nshown in pseudocode as follows:\n\nTYPE CharacterType\n\n\
    \   DECLARE Player : INTEGER\n\n   DECLARE Role : STRING\n\n   DECLARE Name :\
    \ STRING\n\n   DECLARE SkillLevel : INTEGER\n\nENDTYPE\n\nThe Player field indicates\
    \ the player to which the character is assigned (1 to 6). This field value\nis\
    \ 0 if the character is not assigned to any player.\n\nThe programmer has defined\
    \ a global array to store the character data, as follows:\n\nDECLARE Character\
    \ : ARRAY[1:45] OF CharacterType\n\nAt the start of the game all record fields\
    \ are initialised, and all Player fields are set to 0\n\nThe programmer has defined\
    \ a program module as follows:\nModule\nDescription\nCount()\n•\ncalled with two\
    \ parameters:\n\n○\nan integer representing a player\n\n○\na string representing\
    \ a character role\n•\nsearches the Character array for characters with the given\
    \ role that are\nassigned to the given player\n•\ncounts the number of assigned\
    \ characters and sums their total skill level\n•\noutputs the result of the search\
    \ if characters with the given role are found,\nfor example:\n\n \"Player 3 has\
    \ 4 characters with the role of Teacher\nand the total skill level is 65\"\n•\n\
    if no characters with the given role are found, outputs:\n\n \"No characters with\
    \ that role are assigned to this\nplayer\"\n,\t,\n\n(a) Complete the pseudocode\
    \ for module Count().\n\nPROCEDURE Count(ThisPlayer : INTEGER, ThisRole : STRING)\n\
    \  ENDPROCEDURE\n\n[7]\n,\t,\n\n(b) The Character array data has been saved in\
    \ the text file SaveFile.txt\n\nEach line of the file contains one element of\
    \ the array (one record).\n\nNew modules are defined:\nModule\nDescription\nExtract()\n\
    (already written)\n•\ncalled with two parameters:\n\n○\na string representing\
    \ a complete line from the text file\n\n○\nan integer representing a field number\
    \ (see structure below)\n•\nreturns a string representing the required field\n\
    Restore()\n•\nopens the text file SaveFile.txt\n•\nreads lines from the file and\
    \ assigns values to each record in the\nCharacter array using data from each line\
    \ of the file\n\nAs a reminder, the record structure is repeated here:\n\nTYPE\
    \ CharacterType\n\n   DECLARE Player : INTEGER       //Field number 1\n\n   DECLARE\
    \ Role : STRING          //Field number 2\n\n   DECLARE Name : STRING        \
    \  //Field number 3\n\n   DECLARE SkillLevel : INTEGER   //Field number 4\n\n\
    ENDTYPE\n\nWrite pseudocode for module Restore().\n\nYou must use the module Extract()\
    \ ,\t,\n  [7]\n\n(c) The game can last for several days and users often find that\
    \ they have to close and rerun the\ngame program many times in order to complete\
    \ it.\n\nDescribe the benefit of using the file SaveFile.txt as described in part\
    \ (b) [2]\n,\t,"
