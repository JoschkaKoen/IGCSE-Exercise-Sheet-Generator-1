- number: '3'
  question_type: short_answer
  marks: 0
  text: "3\nThe text file HighScoreTable.txt stores the top seven player scores for\
    \ a game.\n\nThe data in the file is stored in the order:\n\nPlayer ID\n\nGame\
    \ level\n\nScore\n\nEach item of data is stored on a new line. For example, the\
    \ first set of data in the file is:\n\nPlayer ID:\nGHEH\n\nGame level:\n3\n\n\
    Score:\n10\n\n(a) The data about the players and their scores is stored in a 2D\
    \ array of strings with the identifier\nHighScores.\n\nThe first dimension of\
    \ the array has seven elements: one for each player. The second\ndimension of\
    \ the array has three elements: one for the player ID, one for the game level\
    \ and\none for the score. All data is stored in the array as strings.\n\nHighScores\
    \ is declared local to the main program, and all elements are initialised to an\n\
    empty string, for example \" \".\n\nWrite program code to declare and initialise\
    \ HighScores.\nSave your program as Question3_N24.\nCopy and paste the program\
    \ code into part 3(a) in the evidence document.\n\n[2]\n\n(b) The function ReadData()\
    \ reads the data from HighScoreTable.txt and stores the data\nin a 2D array. The\
    \ function returns the 2D array.\n\nThe function uses exception handling when\
    \ opening and reading data from the file.\n\nWrite program code for ReadData().\n\
    Save your program.\nCopy and paste the program code into part 3(b) in the evidence\
    \ document.\n\n[5]\n\n(c) The procedure OutputHighScores() takes a 2D array as\
    \ a parameter. It outputs each\nplayer’s ID, level and score in the order they\
    \ are in the array. The outputs are in the format:\n\n GHEH reached level 3 with\
    \ a score of 10\n\nWrite program code for OutputHighScores().\nSave your program.\n\
    Copy and paste the program code into part 3(c) in the evidence document.\n\n[2]\n\
    \n(d)  The scores in HighScoreTable.txt are not in order.\n\nThe player scores\
    \ are first sorted by the game level they reached. For example, all players\n\
    that reached level 5 are higher in the high score table than players that reached\
    \ level 4.\n\nThe players that reached the same level are then sorted in descending\
    \ order of score.\n\nAn example sorted high score table is:\nPosition\nPlayer\
    \ ID\nGame level\nScore\n1\nGFED\n5\n25\n2\nHJKM\n4\n21\n3\nRERR\n4\n19\n4\nTTYU\n\
    4\n15\n5\nWSVG\n3\n20\n6\nPPTR\n3\n15\n7\nSNQT\n2\n10\n\nThe function SortScores()\
    \ uses a bubble sort to sort the data as described and returns the\nsorted array.\n\
    \nWrite program code for SortScores().\nSave your program.\nCopy and paste the\
    \ program code into part 3(d) in the evidence document.\n\n[4]\n\n(e) (i) Amend\
    \ the main program to implement these steps in the order given:\n•\ncall ReadData()\
    \ and store the returned array in HighScores\n•\noutput \"Before\"\n•\ncall OutputHighScores()\
    \ with HighScores as a parameter\n•\ncall SortScores() and store the returned\
    \ array in HighScores\n•\noutput \"After\"\n•\ncall OutputHighScores() with HighScores\
    \ as a parameter.\nSave your program.\nCopy and paste the program code into part\
    \ 3(e)(i) in the evidence document.\n\n[2]\n\n(ii) Test your program\n\n Take\
    \ a screenshot of the output.\nSave your program.\nCopy and paste the screenshot\
    \ into part 3(e)(ii) in the evidence document.\n\n[2]"
