questions:
- number: '1'
  question_type: short_answer
  marks: 0
  text: "1\nA computer game is designed for users to select characters. Each character\
    \ can take part in a\ngroup of events. Each group has five events. There are four\
    \ types of event: jump, swim, run, drive.\n\nThe program is written using object-oriented\
    \ programming.\n\n(a) The class EventItem stores data about the events.\nEventItem\n\
    EventName : STRING\nstores the name of the event\nType : STRING\nstores the type\
    \ of event, either: jump, swim, run or drive\nDifficulty : INTEGER\nstores the\
    \ difficulty of the event from 1 (easiest) to 5\n(hardest)\nConstructor()\ninitialises\
    \ EventName, Type and Difficulty to its\nparameter values\nGetName()\nreturns\
    \ the name of the event\nGetDifficulty()\nreturns the difficulty of the event\n\
    GetEventType()\nreturns the type of event\n\n(i) Write program code to declare\
    \ the class EventItem and its constructor.\n\n Do not declare the other methods.\n\
    \n Use your programming language’s appropriate constructor.\n\n All attributes\
    \ must be private.\n\n If you are writing in Python, include attribute declarations,\
    \ using comments.\nSave your program as Question1_N24.\nCopy and paste the program\
    \ code into part 1(a)(i) in the evidence document.\n\n[4]\n\n(ii) The get methods\
    \ GetName(), GetDifficulty() and GetEventType() each return\nthe relevant attribute.\n\
    \n Write program code for the three get methods.\nSave your program.\nCopy and\
    \ paste the program code into part 1(a)(ii) in the evidence document.\n\n[3]\n\
    \n(b) The array Group stores five objects of type EventItem.\n\n(i) Write program\
    \ code to declare Group local to the main program.\nSave your program.\nCopy and\
    \ paste the program code into part 1(b)(i) in the evidence document.\n\n[1]\n\n\
    (ii) One group has the following events:\nEvent name\nEvent type\nEvent difficulty\n\
    Bridge\njump\n3\nWater wade\nswim\n4\n100 mile run\nrun\n5\nGridlock\ndrive\n\
    2\nWall on wall\njump\n4\n\n Write program code to create an instance of EventItem\
    \ for each of the five events, and\nstore them in Group.\nSave your program.\n\
    Copy and paste the program code into part 1(b)(ii) in the evidence document.\n\
    \n[3]\n\n(c) The class Character stores data about the characters in the game.\n\
    \nEach character has a skill level for each type of event. The skill level is\
    \ an integer between\n1 and 5 inclusive. Skill level 1 is the lowest skill level,\
    \ and skill level 5 is the highest skill level.\nCharacter\nCharacterName : STRING\n\
    stores the name of the character\nJump : INTEGER\nstores the character’s skill\
    \ level at events of type jump\nSwim : INTEGER\nstores the character’s skill level\
    \ at events of type swim\nRun : INTEGER\nstores the character’s skill level at\
    \ events of type run\nDrive : INTEGER\nstores the character’s skill level at events\
    \ of type drive\nConstructor()\ninitialises CharacterName, Jump, Swim, Run and\n\
    Drive to its parameter values\nGetName()\nreturns the name of the character\n\
    CalculateScore()\ntakes the type of event and difficulty as parameters.\nCalculates\
    \ and returns the chance of the character\ncompleting the event\n\nWrite program\
    \ code to declare the class Character, its constructor and get method.\n\nUse\
    \ your programming language’s appropriate constructor.\n\nAll attributes must\
    \ be private.\n\nIf you are writing in Python, include attribute declarations,\
    \ using comments.\nSave your program.\nCopy and paste the program code into part\
    \ 1(c) in the evidence document.\n\n[4]\n\n(d) The method CalculateScore() in\
    \ the Character class calculates and returns the\npercentage chance of a character\
    \ completing an event.\n\nWhen a character’s skill level is greater than or equal\
    \ to the difficulty of that event, the\npercentage chance of completing the event\
    \ is 100%.\n\nWhen a character’s skill level is less than the difficulty of that\
    \ event, the character’s skill level\nis subtracted from the difficulty of that\
    \ event. This difference is used to identify the percentage\nchance of success\
    \ using this table:\nDifference\nPercentage chance\nof success\n1\n80\n2\n60\n\
    3\n40\n4\n20\n\nFor example:\n•\nA character has a skill level of 3 for events\
    \ of type run.\n•\nAn event of type run has a difficulty level of 5\n•\nThe character’s\
    \ skill level is less than the difficulty, therefore the difference is calculated.\n\
    •\nThe difference is the character’s skill level subtracted from the event difficulty,\
    \ 5 – 3 = 2\n•\nThe difference is 2, therefore the percentage chance of succeeding\
    \ is 60%\n\nWrite program code for the method CalculateScore() to:\n•\ntake the\
    \ type of event and difficulty as parameters\n•\ncalculate the percentage chance\
    \ of the character completing the event\n•\nreturn the percentage chance of completing\
    \ the event as an integer number, for example\n60\nSave your program.\nCopy and\
    \ paste the program code into part 1(d) in the evidence document.\n\n[4]\n\n(e)\
    \ Two characters are attempting each event in the group you created in part 1(b).\n\
    \nOne character has the name Tarz and the skill levels:\n\nJump\n5\n\nSwim\n3\n\
    \nRun\n5\n\nDrive\n1\n\nThe second character has the name Geni and the skill levels:\n\
    \nJump\n2\n\nSwim\n2\n\nRun\n3\n\nDrive\n4\n\nEach Character object is stored\
    \ in a variable.\n\n(i) Amend the main program to declare and create an instance\
    \ of a Character object for\nTarz and for Geni.\nSave your program.\nCopy and\
    \ paste the program code into part 1(e)(i) in the evidence document.\n\n[2]\n\n\
    (ii) Both characters Tarz and Geni take part in each event in the group you created\
    \ in part\n1(b).\n\n These steps are repeated for all five events:\n•\nThe percentage\
    \ chance of each character completing the event is calculated and\ncompared.\n\
    •\nThe character with the highest percentage chance of completing the event gets\
    \ 1\npoint. Their character name is output together with a message telling them\
    \ they\nhave won that event.\n•\nIf both characters have the same percentage chance\
    \ of completing the event, the\nscores do not change, and a message is output\
    \ stating that the event is a draw.\n\n When the total score for each character\
    \ has been calculated, the name of the character\nwith the highest score is output\
    \ stating they have won and the number of points they\nhave. If both characters\
    \ have the same number of points, a message is output telling\nthem the group\
    \ is a draw.\n\n Amend the main program to:\n•\ncalculate the score for each character\
    \ in each event\n•\noutput the name of the character that wins each event or that\
    \ the event is a draw\n•\noutput the name of the character that has the most points\
    \ for the group or that the\ngroup is a draw.\nSave your program.\nCopy and paste\
    \ the program code into part 1(e)(ii) in the evidence document.\n\n[7]\n\n(iii)\
    \ Test your program.\n\n Take a screenshot of the output.\nSave your program.\n\
    Copy and paste the screenshot into part 1(e)(iii) in the evidence document.\n\n\
    [1]"
