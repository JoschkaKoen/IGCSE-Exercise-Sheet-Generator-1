    \\ \\hline\n & LDM & \\#n & Load the number n to ACC \\\\ \\hline\n & LDD & \\\
    texttt{<address>} & Load the contents of the location at the given address to\
    \ the ACC \\\\ \\hline\n & LDI & \\texttt{<address>} & The address to be used\
    \ is at the given address. Load the contents of this second address to the ACC\
    \ \\\\ \\hline\n & ADD & \\texttt{<address>} & Add the contents of the given address\
    \ to the ACC \\\\ \\hline\n & SUB & \\texttt{<address>} & Subtract the contents\
    \ of the given address from the ACC \\\\ \\hline\n & STO & \\texttt{<address>}\
    \ & Store the contents of the ACC at the given address \\\\ \\hline\n\\texttt{<label>:}\
    \ & & \\texttt{<data>} & Gives a symbolic address \\texttt{<label>} to the memory\
    \ location with contents \\texttt{<data>} \\\\ \\hline\n\\end{tabular}\n\n\\#\
    \ denotes a denary number, e.g. \\#123\n\\texttt{<label>} can be used in place\
