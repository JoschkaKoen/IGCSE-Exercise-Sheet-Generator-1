questions:
  - number: "9"
    type: short_answer
    text: |
      A stack has been implemented using pseudocode to store a maximum of 100 string items using the global variables in the following table:
  - number: "9a"
    type: short_answer
    text: |
      \begin{tabular}{|c|c|c|c|}
      \hline
      \textbf{Identifier} & \textbf{Data type} & \textbf{Description} & \textbf{Initialisation value} \\ \hline
      Base & INTEGER & pointer for the bottom of the stack & 0 \\ \hline
      Top & INTEGER & pointer for the top of the stack & -1 \\ \hline
      StackArray & STRING & 1D array to implement the stack & [0:99] \\ \hline
      Max & INTEGER & maximum number of items in the stack & 100 \\ \hline
      \end{tabular}

      The value of \texttt{Top} is incremented each time a data item is added to the stack and decremented every time a data item is removed.
  - number: "9ai"
    type: short_answer
    text: |
      Complete the \textbf{pseudocode} for the function to remove a data item from the stack.

      \begin{alltt}
      FUNCTION Pop() \hrulefill
          DECLARE DataItem : STRING
          DataItem <- ""

          IF \hrulefill THEN

              DataItem <- \hrulefill

              Top <- \hrulefill
          ELSE
              DataItem <- "You cannot remove data; the stack is empty"
          ENDIF

          \hrulefill
      ENDFUNCTION
      \end{alltt}
  - number: "9aii"
    type: short_answer
    text: |
      Write the \textbf{pseudocode} to output the data item removed from the stack with an appropriate message.