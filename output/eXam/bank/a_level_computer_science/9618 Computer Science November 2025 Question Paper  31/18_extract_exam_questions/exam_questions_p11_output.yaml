questions:
  - number: "11"
    type: short_answer
    text: |
      The table shows assembly language instructions for a processor that has one register, the Accumulator (ACC).

      \begin{tabular}{|l|l|l|l|}
      \hline
      \textbf{Label} & \textbf{Opcode} & \textbf{Operand} & \textbf{Explanation} \\ \hline
       & LDM & \#n & Load the number n to ACC \\ \hline
       & LDD & \texttt{<address>} & Load the contents of the location at the given address to the ACC \\ \hline
       & LDI & \texttt{<address>} & The address to be used is at the given address. Load the contents of this second address to the ACC \\ \hline
       & ADD & \texttt{<address>} & Add the contents of the given address to the ACC \\ \hline
       & SUB & \texttt{<address>} & Subtract the contents of the given address from the ACC \\ \hline
       & STO & \texttt{<address>} & Store the contents of the ACC at the given address \\ \hline
      \texttt{<label>:} & & \texttt{<data>} & Gives a symbolic address \texttt{<label>} to the memory location with contents \texttt{<data>} \\ \hline
      \end{tabular}

      \# denotes a denary number, e.g. \#123
      \texttt{<label>} can be used in place of \texttt{<address>}
