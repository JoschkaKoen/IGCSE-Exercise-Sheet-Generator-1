      The following table shows part of the instruction set for a processor. The processor has two registers: the Accumulator (ACC) and an Index Register (IX).

      \begin{tabular}{|l|l|l|}
      \hline
      \multicolumn{2}{|c|}{\textbf{Instruction}} & \multicolumn{1}{c|}{\textbf{Explanation}} \\ \hline
      \textbf{Opcode} & \textbf{Operand} & \\ \hline
      LDM & \texttt{\#n} & Immediate addressing. Load the number n to ACC \\ \hline
      STO & \texttt{<address>} & Store the contents of ACC at the given address \\ \hline
      ADD & \texttt{\#n/Bn/\&n} & Add the number n to the ACC \\ \hline
      ADD & \texttt{<address>} & Add the contents of the given address to the ACC \\ \hline
      SUB & \texttt{<address>} & Subtract the contents of the given address from the ACC \\ \hline
      SUB & \texttt{\#n/Bn/\&n} & Subtract the number n from the ACC \\ \hline
      DEC & \texttt{<register>} & Subtract 1 from the contents of the register (ACC or IX) \\ \hline
      JMP & \texttt{<address>} & Jump to the given address \\ \hline
      CMP & \texttt{<address>} & Compare the contents of ACC with the contents of \texttt{<address>} \\ \hline
      CMP & \texttt{\#n} & Compare the contents of ACC with number n \\ \hline
      JPE & \texttt{<address>} & Following a compare instruction, jump to \texttt{<address>} if the compare was True \\ \hline
      END & & Return control to the operating system \\ \hline
      \end{tabular}

      ACC denotes Accumulator
      \newline
      \texttt{<address>} can be an absolute or a symbolic address
      \newline
      \# denotes a denary number, e.g. \#123
      \newline
      B denotes a binary number, e.g. B01001010
      \newline
      \& denotes a hexadecimal number, e.g. \&4A
