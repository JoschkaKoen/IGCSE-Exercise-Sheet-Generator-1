    text: 'Complete the description of compilers and interpreters by writing the missing
      words.


      A compiler checks all the code before attempting to translate the program. If
      any errors are found, they are all reported at the same time and the program
      does not translate or run. If there are no errors found, the compiler produces
      \underline{\hspace{1.5em}} which can run without access to the \underline{\hspace{1.5em}}.


      An interpreter translates one line of code and then runs it, before moving to
      the next line of code. If the line of code has an error, the interpreter \underline{\hspace{1.5em}}
      and displays the error. The programmer can correct the error \underline{\hspace{1.5em}}
      and then the interpreter continues translating from that point.'
