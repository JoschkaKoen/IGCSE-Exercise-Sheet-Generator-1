- number: '11'
  question_type: short_answer
  page: 13
  subpage_row: 1
  subpage_col: 1
  marks: 5
  text: "The pseudocode algorithm below allows a user to input a new stock item. The\
    \ random file is searched for the next empty location in the file and the new\
    \ item is inserted there.\nA suitable message is displayed if the file is full.\n\
    \nComplete this pseudocode.\n\n\\begin{alltt}\nDECLARE Location : INTEGER\nDECLARE\
    \ NewStock : STRING\nDECLARE CurrentStock : STRING\nDECLARE Stored : BOOLEAN\n\
    DECLARE Max : INTEGER\nMax <- 100000\nStored <- FALSE\nLocation <- 1\n\\hrulefill\n\
    OUTPUT \"Enter the new item you wish to store: \"\nINPUT NewStock\nWHILE NOT Stored\
    \ AND Location <= Max\n   \\hrulefill\n   GETRECORD \"StockList.dat\", \\hrulefill\n\
    \   IF CurrentStock = \"\" THEN\n      \\hrulefill \"StockList.dat\", NewStock\n\
    \      Stored <- TRUE\n   ELSE\n      Location <- Location + 1\n   ENDIF\nENDWHILE\n\
    \\hrulefill THEN\n   OUTPUT \"The new item has not been stored as the file was\
    \ full.\"\nENDIF\nCLOSEFILE \"StockList.dat\"\n\\end{alltt}"
  answer_options: []
  subquestions: []
