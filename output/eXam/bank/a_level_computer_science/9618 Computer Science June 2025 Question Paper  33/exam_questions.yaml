  text: "The recursive procedure \\texttt{Delete()} is defined as follows:\n\n\\begin{alltt}\n\
    PROCEDURE Delete(Index, Target)\n  IF Numbers[Index] > 0 THEN\n    IF Numbers[Index]\
    \ >= Target THEN\n      Numbers[Index] <- Numbers[Index + 1]\n    ENDIF\n    Index\
    \ <- Index + 1\n    CALL Delete(Index, Target)\n  ENDIF\nENDPROCEDURE\n\\end{alltt}\n\
    \nAn array \\texttt{Numbers} is used to store a sorted data set of non-zero positive\
    \ integers. Unused cells contain zero.\n\nThe contents of the array at the start\
    \ of the algorithm are:\n\n\\begin{tabular}{|c|c|c|c|c|c|c|c|c|c|}\n\\hline\n\\\
    multicolumn{10}{|c|}{\\textbf{Numbers}} \\\\ \\hline\n\\textbf{} & \\textbf{}\
