  text: "11 The following diagram shows an ordered binary tree.\nRed\nGreen\nYellow\n\
    Blue\nOrange\nIndigo\nViolet\n\n(a) A linked list of nodes is used to store the\
    \ data. Each node consists of a left pointer, the data\nand a right pointer.\n\
    \n–1 is used to represent a null pointer.\n\nComplete this linked list to represent\
    \ the given binary tree.\n\nRootPtr\nLeftPtr\nRightPtr\nData\nRed\nGreen\nBlue\n\
    –1\n–1\n[4]\n,\t,\n\n(b) A user-defined record structure is used to store the\
    \ nodes of the linked list in part (a).\n\nComplete the diagram, using your answer\
    \ for part (a).\nRootPtr\nIndex\nLeftPtr\nData\nRightPtr\n0\n0\nRed\n1\nGreen\n\
    2\nYellow\n3\nBlue\n4\nOrange\n5\nIndigo\nFreePtr\n6\nViolet\n7\n\n[4]\n\n(c)\
    \ The linked list in part (a) is implemented using a 1D array of records. Each\
    \ record contains a\nleft pointer, data and a right pointer.\n\nThe following\
    \ pseudocode represents a function that searches for an element in the array of\n\
    records BinTree. It returns the index of the record if the element is found, or\
    \ it returns a null\npointer if the element is not found.\n\nComplete the pseudocode\
    \ for the function.\n\nFUNCTION SearchTree(Item : STRING)  NowPtr\n  WHILE NowPtr\
    \ <> -1\n\n      IF  THEN\n\n         NowPtr\n BinTree[NowPtr].LeftPtr\n\n   \
    \   ELSE\n\n         IF BinTree[NowPtr].Data < Item THEN\n\n             ELSE\n\
    \n            RETURN NowPtr\n\n         ENDIF\n\n      ENDIF\n\n   ENDWHILE\n\n\
    \   RETURN NowPtr\n\nENDFUNCTION\n\n[4]\n,\t,"
