- number: '2'
  question_type: short_answer
  marks: 0
  text: "2\nA computer program is designed to simulate horses doing show jumping.\
    \ In show jumping, horses\njump over obstacles called fences. A horse successfully\
    \ jumps a fence if it does not knock the\nfence down.\n\nThe program is written\
    \ using Object-Oriented Programming (OOP).\n\nThe class Horse stores data about\
    \ the horses.\nHorse\nName : STRING\nMaxFenceHeight : INTEGER\nPercentageSuccess\
    \ : INTEGER\nstores the name given to the horse\nstores the maximum height in\
    \ cm that the horse can\njump, for example 132\nstores the percentage chance of\
    \ a horse not knocking\ndown a fence, for example 70 represents a 70% chance\n\
    of jumping a fence successfully\nConstructor()\nGetName()\nGetMaxFenceHeight()\n\
    Success()\ninitialises Name, MaxFenceHeight and\nPercentageSuccess to its parameter\
    \ values\nreturns the name of the horse\nreturns the maximum height the horse\
    \ can jump\ncalculates and returns the percentage chance of a horse\nsuccessfully\
    \ jumping a specific fence\n\n(a) (i) Write program code to declare the class\
    \ Horse and its constructor.\n\n Do not declare the other methods.\n\n Use your\
    \ programming language’s appropriate constructor.\n\n All attributes must be private.\
    \ If you are writing in Python, include attribute declarations\nusing comments.\n\
    Save your program as Question2_N24.\nCopy and paste the program code into part\
    \ 2(a)(i) in the evidence document.\n\n[4]\n\n(ii) The get methods GetName() and\
    \ GetMaxFenceHeight() each return the relevant\nattribute.\n\n Write program code\
    \ for the get methods.\nSave your program.\nCopy and paste the program code into\
    \ part 2(a)(ii) in the evidence document.\n\n[3]\n\n(b) The array Horses stores\
    \ objects of type Horse.\n\n(i) The program has two horses:\n•\nThe horse named\
    \ ‘Beauty’ can jump a maximum height of 150 cm and has a success\npercentage rate\
    \ of 72%.\n•\nThe horse named ‘Jet’ can jump a maximum height of 160 cm and has\
    \ a success\npercentage rate of 65%.\n\n Write program code to:\n•\ndeclare the\
    \ array, Horses, local to the main program with space for two Horse\nobjects\n\
    •\nstore the two horses described in the array\n•\noutput the name of both Horse\
    \ objects from the array.\nSave your program.\nCopy and paste the program code\
    \ into part 2(b)(i) in the evidence document.\n\n[5]\n\n(ii) Test your program.\n\
    \n Take a screenshot of the output.\nSave your program.\nCopy and paste the screenshot\
    \ into part 2(b)(ii) in the evidence document.\n\n[1]\n\n(c) The class Fence stores\
    \ data about the fences. Each fence has a height in cm and a risk\nnumber.\n\n\
    The risk is a whole number between 1 and 5 inclusive. A risk of 1 means the fence\
    \ is the\neasiest type to jump. A risk of 5 means the fence is the hardest type\
    \ to jump.\nFence\nHeight : INTEGER\nRisk : INTEGER\nstores the height of the\
    \ fence in cm\nthe height is between 70 and 180 inclusive\nstores the risk as\
    \ a whole number between 1 and 5\ninclusive\nConstructor()\nGetHeight()\nGetRisk()\n\
    initialises Height and Risk to its parameter values\nreturns the height of the\
    \ fence\nreturns the risk of the fence\n\n(i) Write program code to declare the\
    \ class Fence, its constructor and get methods.\n\n Use your programming language’s\
    \ appropriate constructor.\n\n All attributes must be private.\n\n If you are\
    \ writing in Python, include attribute declarations using comments.\nSave your\
    \ program.\nCopy and paste the program code into part 2(c)(i) in the evidence\
    \ document.\n\n[4]\n\n(ii) The array Course stores four Fence objects. The user\
    \ inputs the height and risk for\neach fence, and these are validated before each\
    \ fence is created.\n\n Amend the main program to:\n•\ndeclare the local array\
    \ Course\n•\ntake as input the data for four fences from the user\n•\nloop the\
    \ input until both the height and risk are valid for each fence\n•\ncreate an\
    \ instance of Fence for each of the four valid fences and store each\ninstance\
    \ in the array.\nSave your program.\nCopy and paste the program code into part\
    \ 2(c)(ii) in the evidence document.\n\n[5]\n\n(d) The chance of a horse jumping\
    \ a fence without knocking it down is calculated as follows.\n\nIf the height\
    \ of the fence is more than the maximum height a horse can jump, the success\n\
    percentage is 20% of the horse’s PercentageSuccess. The risk does not affect this\
    \ value.\n\nIf the height of the fence is less than or equal to the maximum height\
    \ a horse can jump, the\nrisk gives a modifier value to multiply with the horse’s\
    \ PercentageSuccess.\n\nThe risk values and their modifiers are given in this\
    \ table:\nRisk\nModifier\n5\n0.6\n4\n0.7\n3\n0.8\n2\n0.9\n1\n1.0\n\nFor example:\n\
    •\nThe horse Jet has PercentageSuccess of 65 and MaxFenceHeight of 160.\n•\nA\
    \ fence has a height of 140 and a risk of 3.\n•\nThe height of the fence is less\
    \ than the horse’s MaxFenceHeight, therefore the risk is\nused.\n•\nThe risk of\
    \ 3 gives the modifier 0.8.\n•\nThe modifier 0.8 is multiplied by the horse’s\
    \ PercentageSuccess of 65, which gives 52.\n•\nThe chance of the horse successfully\
    \ jumping this fence is 52%.\n\nThe method Success() in the Horse class:\n•\n\
    takes the height and risk of a fence as parameters\n•\ncalculates the percentage\
    \ chance of success for that horse jumping the fence without\nknocking it down\n\
    •\nreturns the calculated percentage chance of success as a real number.\n\nWrite\
    \ program code for Success().\nSave your program.\nCopy and paste the program\
    \ code into part 2(d) in the evidence document.\n\n[5]\n\n(e) (i) Write program\
    \ code to amend the main program to:\n•\ncalculate and output the chance of the\
    \ first horse jumping each of the four fences without\nknocking each fence down\n\
    •\ncalculate and output the chance of the second horse jumping each of the four\
    \ fences\nwithout knocking each fence down.\n\n All outputs must have appropriate\
    \ messages including the name of the horse and the\nfence number.\n\n An example\
    \ output for one horse jumping two fences is:\n\n \"The horse Fox at fence 1 has\
    \ a 68% chance of success\n\n The horse Fox at fence 2 has a 72% chance of success\"\
    \nSave your program.\nCopy and paste the program code into part 2(e)(i) in the\
    \ evidence document.\n\n[3]\n\n(ii) Write program code to amend the main program\
    \ to:\n•\ncalculate and output the average chance of success for each horse jumping\
    \ over all\nfour fences without knocking each fence down (the average is the total\
    \ of values\ndivided by the quantity of values). An example output for one horse\
    \ jumping all of\nthe fences is:\n\n \"The horse Fox has an average 70% chance\
    \ of jumping over all four\nfences\"\n•\noutput the name of the horse that has\
    \ the highest average chance of success.\n\n You can assume that each average\
    \ will be different.\n\n All outputs must have appropriate messages.\nSave your\
    \ program.\nCopy and paste the program code into part 2(e)(ii) in the evidence\
    \ document.\n\n[2]\n\n(iii) Test your program with the following input data for\
    \ four fences:\nHeight\nRisk\n152\n5\n121\n1\n130\n3\n145\n4\n\n Take a screenshot\
    \ of the output.\nSave your program.\nCopy and paste the screenshot into part\
    \ 2(e)(iii) in the evidence document.\n\n[2]"
