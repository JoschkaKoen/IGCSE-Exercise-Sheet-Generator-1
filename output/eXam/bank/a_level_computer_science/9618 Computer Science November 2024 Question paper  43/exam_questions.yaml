- number: '3'
  question_type: short_answer
  marks: 0
  text: "3\nA linked list stores positive integer data in a 2D array. The first dimension\
    \ of the array stores the\ninteger data. The second dimension of the array stores\
    \ the pointer to the next node in the linked\nlist.\n\nA linked list node with\
    \ no data is initialised with the integer –1. These nodes are linked together\
    \ as\nan empty list. A pointer of –1 identifies that node as the last node.\n\n\
    The linked list can store 20 nodes.\n\nThe global 2D array LinkedList stores the\
    \ linked list.\n\nLinkedList is initialised as an empty list. The data in each\
    \ node is initialised to –1. Each node’s\npointer stores the index of the next\
    \ node. The last node stores the pointer value –1, which indicates\nit is the\
    \ last node.\n\nThe global variable FirstEmpty stores the index of the first element\
    \ in the empty list. This is the\nfirst node in the empty linked list when it\
    \ is initialised, which is index 0.\n\nThe global variable FirstNode stores the\
    \ index of the first element in the linked list. There is no\ndata in the linked\
    \ list when it is initialised, so FirstNode is initialised to –1.\n\nThis diagram\
    \ shows the content of the initialised array.\n\nFirstEmpty = 0\n\nFirstNode =\
    \ –1\nIndex\nData\nPointer\n0\n-1\n1\n1\n-1\n2\n2\n-1\n3\n3\n-1\n4\n4\n-1\n5\n\
    \n19\n-1\n-1\n\n(a) Write program code for the main program to declare and initialise\
    \ LinkedList, FirstNode\nand FirstEmpty.\nSave your program as Question3_N24.\n\
    Copy and paste the program code into part 3(a) in the evidence document.\n\n[2]\n\
    \n(b) The procedure InsertData() takes five positive integers as input from the\
    \ user and inserts\nthese into the linked list.\n\nEach data item is inserted\
    \ at the front of the linked list.\n\nThe table shows the steps to follow depending\
    \ on the state of the linked list:\nLinked list state\nSteps\nnot full\ninsert\
    \ the data in the index pointed to by FirstEmpty\nchange the pointer to the index\
    \ pointed to by FirstNode\nchange the values of FirstNode and FirstEmpty\nfull\n\
    end the procedure\n\nAny node that is at the end of the linked list has a pointer\
    \ of –1.\n\nWrite program code for InsertData().\nSave your program.\nCopy and\
    \ paste the program code into part 3(b) in the evidence document.\n\n[6]\n\n(c)\
    \ The procedure OutputLinkedList() outputs the data in the linked list in order\
    \ by following\nthe pointers from FirstNode.\n\n(i) Write program code for OutputLinkedList().\n\
    Save your program.\nCopy and paste the program code into part 3(c)(i) in the evidence\
    \ document.\n\n[2]\n\n(ii) Amend the main program to call InsertData() and then\
    \ OutputLinkedList().\nSave your program.\nCopy and paste the program code into\
    \ part 3(c)(ii) in the evidence document.\n\n[1]\n\n(iii) Test your program with\
    \ the test data:\n\n 5   1   2   3   8\n\n Take a screenshot of the output.\n\
    Save your program.\nCopy and paste the screenshot into part 3(c)(iii) in the evidence\
    \ document.\n\n[1]\n\n(d) The procedure RemoveData() removes a node from the linked\
    \ list.\n\nThe procedure takes the data item to be removed from the linked list\
    \ as a parameter.\n\nThe procedure checks each node in the linked list, starting\
    \ with the node FirstNode, until it\nfinds the node to be removed. This node is\
    \ added to the empty list, and pointers are changed\nas appropriate. The procedure\
    \ only removes the first occurrence of the parameter.\n\nAssume that the data\
    \ item being removed is in the linked list.\n\n(i) Write program code for RemoveData().\n\
    Save your program.\nCopy and paste the program code into part 3(d)(i) in the evidence\
    \ document.\n\n[5]\n\n(ii) Amend the main program to:\n•\ncall RemoveData() with\
    \ the parameter 5\n•\noutput the word \"After\"\n•\ncall OutputLinkedList().\n\
    Save your program.\nCopy and paste the program code into part 3(d)(ii) in the\
    \ evidence document.\n\n[1]\n\n(iii) Test your program with both sets of given\
    \ test data:\n\n Test data set 1:  5  6 8 9 5\n\n Test data set 2: 10 7 8 5 6\n\
    \n Take a screenshot of each output.\nSave your program.\nCopy and paste the screenshot(s)\
    \ into part 3(d)(iii) in the evidence document.\n\n[1]"
