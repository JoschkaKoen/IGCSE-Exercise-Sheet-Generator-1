- number: '1'
  question_type: short_answer
  marks: 0
  text: "1\nA program sorts string data using different sorting methods.\n\n(a) The\
    \ text file Data.txt stores string data items. Each data item is on a new line\
    \ in the text\nfile.\n\nThe function ReadData():\n•\nhas a local array of strings\
    \ that can store 45 items\n•\nreads each line of data and stores it in the array\n\
    •\nreturns the array.\n\nWrite program code for the function ReadData().\nSave\
    \ your program as Question1_N24.\nCopy and paste the program code into part 1(a)\
    \ in the evidence document.\n\n[6]\n\n(b) The function FormatArray() takes an\
    \ array of strings as a parameter. It concatenates the\ncontents of the array\
    \ into one string with a space between each array element. The function\nreturns\
    \ the concatenated string.\n\n(i) Write program code for FormatArray().\nSave\
    \ your program.\nCopy and paste the program code into part 1(b)(i) in the evidence\
    \ document.\n\n[2]\n\n(ii) The main program:\n•\ncalls ReadData() and stores the\
    \ returned array\n•\ncalls FormatArray() with the returned array and outputs the\
    \ returned string.\n\n Write program code for the main program.\nSave your program.\n\
    Copy and paste the program code into part 1(b)(ii) in the evidence document.\n\
    \n[3]\n\n(iii) Test your program.\n\n Take a screenshot of the output.\nSave your\
    \ program.\nCopy and paste the screenshot into part 1(b)(iii) in the evidence\
    \ document.\n\n[1]\n\n(c) The function CompareStrings():\n•\ntakes two strings\
    \ as parameters\n•\ncompares each string, one character at a time, to identify\
    \ which string comes first\nalphabetically. If the first two characters are the\
    \ same, the second character of each\nstring is compared. This continues until\
    \ the two characters are different.\n\nThe function:\n•\nreturns 1 if the first\
    \ parameter comes before the second alphabetically\n•\nreturns 2 if the second\
    \ parameter comes before the first alphabetically.\n\nWrite program code for CompareStrings().\n\
    \nAssume that all strings are in lower case.\n\nAssume that a difference between\
    \ two strings will always be identified before the end of one\nstring is reached.\n\
    \nDo not use an in-built string comparison function.\n\nThe strings must be compared\
    \ one character at a time.\nSave your program.\nCopy and paste the program code\
    \ into part 1(c) in the evidence document.\n\n[4]\n\n(d) The function Bubble()\
    \ takes an array of strings as a parameter and sorts the data into\nascending\
    \ alphabetical order, using a bubble sort. The bubble sort uses CompareStrings()\n\
    to compare each string.\n\nThe function returns the sorted list.\n\n(i) Write\
    \ program code for Bubble().\nSave your program.\nCopy and paste the program code\
    \ into part 1(d)(i) in the evidence document.\n\n[3]\n\n(ii) Write program code\
    \ to amend the main program to:\n•\ncall Bubble() with the unsorted array as a\
    \ parameter\n•\ncall FormatArray() with the sorted array and output the returned\
    \ string.\nSave your program.\nCopy and paste the program code into part 1(d)(ii)\
    \ in the evidence document.\n\n[2]\n\n(iii) Test your program.\n\n Take a screenshot\
    \ of the output.\nSave your program.\nCopy and paste the screenshot into part\
    \ 1(d)(iii) in the evidence document.\n\n[1]"
