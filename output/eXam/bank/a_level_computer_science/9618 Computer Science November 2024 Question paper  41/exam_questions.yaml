  text: 'A computer program is designed to simulate horses doing show jumping. In
    show jumping, horses jump over obstacles called fences. A horse successfully jumps
    a fence if it does not knock the fence down.


    The program is written using Object-Oriented Programming (OOP).


    The class \texttt{Horse} stores data about the horses.


    \begin{tabular}{|l|l|}

    \hline

    \multicolumn{2}{|c|}{\textbf{Horse}} \\ \hline

    \texttt{Name : STRING} & stores the name given to the horse \\

    \texttt{MaxFenceHeight : INTEGER} & stores the maximum height in cm that the horse
    can jump, for example 132 \\

    \texttt{PercentageSuccess : INTEGER} & stores the percentage chance of a horse
    not knocking down a fence, for example 70 represents a 70\% chance of jumping
    a fence successfully \\ \hline

    \texttt{Constructor()} & initialises \texttt{Name}, \texttt{MaxFenceHeight} and
    \texttt{PercentageSuccess} to its parameter values \\

    \texttt{GetName()} & returns the name of the horse \\

    \texttt{GetMaxFenceHeight()} & returns the maximum height the horse can jump \\

    \texttt{Success()} & calculates and returns the percentage chance of a horse successfully
    jumping a specific fence \\ \hline

    \end{tabular}'
