      \newline

      Step 4 : read a line from \underline{\hspace{1.5em}} and store in \underline{\hspace{1.5em}}
      \newline

      Step 5 : read a line from \underline{\hspace{1.5em}} and store in \underline{\hspace{1.5em}}
      \newline

      Step 6 : set \texttt{NewString} to \underline{\hspace{1.5em}} \newline

