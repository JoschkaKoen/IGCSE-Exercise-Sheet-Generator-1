      of the array to \texttt{FALSE}


      All variables used must be declared.'
    answer_options: []
    subquestions: []
  - number: 4b
    question_type: short_answer
    page: 7
    subpage_row: 1
    subpage_col: 1
    marks: 5
    text: "The pseudocode represents an algorithm to set the appropriate elements\
      \ of the array to \\texttt{TRUE}\n\nComplete the pseudocode:\n\n\\begin{alltt}\n\
      DECLARE EasyQ, HardQ : INTEGER\n\nFOR EasyQ <- \\underline{\\hspace{3em}} TO\
      \ 15 STEP \\underline{\\hspace{3em}}\n\n    FOR HardQ <- 0 TO \\underline{\\\
      hspace{3em}} STEP \\underline{\\hspace{3em}}\n\n        CheckTotal[\\underline{\\\
      hspace{6em}}] <- TRUE\n\n    NEXT HardQ\n\nNEXT EasyQ\n\\end{alltt}"
    answer_options: []
