    answer_options: []
    subquestions: []
  - number: 1b
    question_type: short_answer
    page: 2
    subpage_row: 1
    subpage_col: 1
    marks: 6
    text: 'The function \texttt{Enqueue()}:


      \begin{itemize}

      \item takes an integer as a parameter

      \item checks if the queue is full

      \item returns \texttt{FALSE} if the queue is full

      \item stores the parameter in the next position in the queue and returns \texttt{TRUE}
      if the queue is \textbf{not} full

      \item updates the appropriate pointers and \texttt{NumberItems}

      \end{itemize}


      Write program code for \texttt{Enqueue()}


      Save your program.


      Copy and paste the program code into part \textbf{1(b)} in the evidence document.'
    answer_options: []
    subquestions: []
  - number: 1c
    question_type: short_answer
    page: 3
    subpage_row: 1
    subpage_col: 1
    marks: 3
    text: 'The main program:


      \begin{itemize}

      \item attempts to store each of the integers 1 to 25 (inclusive) in the queue
      in ascending numerical order using \texttt{Enqueue()}

      \item outputs the integer that was passed to \texttt{Enqueue()} and "Successful"
      if it was stored in the queue, or "Unsuccessful" if it was not stored in the
      queue.

      \end{itemize}


      For example:

      \begin{itemize}

      \item if the integer 5 is passed to \texttt{Enqueue()} and is stored in the
      queue, the output will be: "5 Successful"

      \item if the integer 23 is passed to \texttt{Enqueue()} and is not stored in
      the queue, the output will be: "23 Unsuccessful"

      \end{itemize}


      Write program code for the main program.


      Save your program.


      Copy and paste the program code into part \textbf{1(c)} in the evidence document.'
    answer_options: []
    subquestions: []
