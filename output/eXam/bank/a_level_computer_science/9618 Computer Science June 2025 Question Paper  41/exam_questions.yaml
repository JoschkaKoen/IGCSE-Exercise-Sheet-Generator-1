    subpage_col: 1
    marks: 6
    text: 'The function \texttt{Dequeue()} returns -1 if the queue is empty. If the
      queue is not empty, the function returns the next item in the queue, updates
      the appropriate pointers and updates \texttt{NumberItems}


      Write program code for \texttt{Dequeue()}


      Save your program.


      Copy and paste the program code into part \textbf{1(d)} in the evidence document.'
