    question_type: short_answer
    page: 2
    subpage_row: 1
    subpage_col: 1
    marks: 2
    text: 'Write program code to declare and initialise \texttt{Queue}, \texttt{HeadPointer},
      \texttt{TailPointer} and \texttt{NumberItems}


      Save your program as \textbf{Question1\_J25}.


