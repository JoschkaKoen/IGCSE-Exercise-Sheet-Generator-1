  text: 'A program stores positive integers in a circular queue.


    The queue is stored as a global 1D array of 20 integers with the identifier \texttt{Queue}.
    Each index is initialised with the data $-1$


    The global variable \texttt{HeadPointer}, initialised to $-1$, points to the first
    element in the queue.

    The global variable \texttt{TailPointer}, initialised to $-1$, points to the last
    element in the queue.

    The global variable \texttt{NumberItems}, initialised to 0, stores the number
    of items in the queue.'
  answer_options: []
  subquestions:
