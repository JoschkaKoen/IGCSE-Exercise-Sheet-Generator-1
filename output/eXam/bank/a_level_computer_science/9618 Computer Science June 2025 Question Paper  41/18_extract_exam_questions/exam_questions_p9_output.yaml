questions:
  - number: "3d"
    type: short_answer
    text: |
      The recursive procedure \texttt{OutputInOrder()} outputs the data stored in the binary tree in ascending numerical order.

      The procedure takes a \texttt{Node} object as a parameter and then:
      \begin{itemize}
      \item checks if the left node is null. If there is a left node, the function calls itself with the left node
      \item outputs the data of the current node
      \item checks if the right node is null. If there is a right node, the function calls itself with the right node.
      \end{itemize}

      Write program code for \texttt{OutputInOrder()}

      Save your program.

      Copy and paste the program code into part \textbf{3(d)} in the evidence document.
