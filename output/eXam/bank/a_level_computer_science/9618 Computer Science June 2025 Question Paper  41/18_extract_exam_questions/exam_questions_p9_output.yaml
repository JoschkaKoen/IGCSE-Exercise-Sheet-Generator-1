  - number: "3ei"
    type: short_answer
    text: |
      Write program code to extend the main program to:
      \begin{itemize}
      \item create a new object of type \texttt{Tree} with the node containing the data 10 as the first node
      \item insert the nodes with the values 20, 5, 15 and 7 into the tree in the order given
      \item call \texttt{OutputInOrder()} with the tree's root node as a parameter.
      \end{itemize}

      Save your program.

      Copy and paste the program code into part \textbf{3(e)(i)} in the evidence document.
