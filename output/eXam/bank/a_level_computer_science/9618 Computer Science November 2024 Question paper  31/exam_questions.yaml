  - number: 11c
    question_type: short_answer
    page: 13
    subpage_row: 1
    subpage_col: 1
    marks: 4
    text: "The linked list in part (a) is implemented using a 1D array of records.\
      \ Each record contains a left pointer, data and a right pointer.\n\nThe following\
      \ pseudocode represents a function that searches for an element in the array\
      \ of records \\texttt{BinTree}. It returns the index of the record if the element\
      \ is found, or it returns a null pointer if the element is not found.\n\nComplete\
      \ the pseudocode for the function.\n\n\\begin{alltt}\nFUNCTION SearchTree(Item\
      \ : STRING) \\hrulefill\n\n    NowPtr <- \\hrulefill\n\n    WHILE NowPtr <>\
      \ -1\n\n        IF \\hrulefill THEN\n\n            NowPtr <- BinTree[NowPtr].LeftPtr\n\
      \n        ELSE\n\n            IF BinTree[NowPtr].Data < Item THEN\n\n      \
      \          \\hrulefill\n\n            ELSE\n\n                RETURN NowPtr\n\
      \n            ENDIF\n\n        ENDIF\n\n    ENDWHILE\n\n    RETURN NowPtr\n\n\
      ENDFUNCTION\n\\end{alltt}"
    answer_options: []
    subquestions: []
