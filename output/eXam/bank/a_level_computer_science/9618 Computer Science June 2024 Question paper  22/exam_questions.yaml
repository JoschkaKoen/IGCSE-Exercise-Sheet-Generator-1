  text: "8\nA teacher is designing a program to process pseudocode projects written\
    \ by her students.\n\nEach student project is stored in a text file.\n\nThe process\
    \ is split into a number of stages. Each stage performs a different task and creates\
    \ a\nnew file.\n\nFor example:\nFile name\nComment\nMichaelAday_src.txt\nStudent\
    \ project file produced by student Michael Aday\nMichaelAday_S1.txt\nFile produced\
    \ by stage 1\nMichaelAday_S2.txt\nFile produced by stage 2\n\n(a) Suggest a reason\
    \ why the teacher’s program has been split into a number of stages and give\n\
    the benefit of producing a different file from each stage.\nReason   Benefit \
    \  [2]\n\n(b) The teacher has defined the first program module as follows:\nModule\n\
    Description\nDeleteSpaces()\n•  called with a parameter of type string representing\
    \ a line of\npseudocode from a student’s project file\n•  returns the line after\
    \ removing any leading space characters\nThe following example shows a string\
    \ before and after the leading\nspaces have been removed:\n Before: \"      IF\
    \ X2 > 13 THEN\"\n After:     \"IF X2 > 13 THEN\"\n\nComplete the pseudocode for\
    \ module DeleteSpaces().\n\nFUNCTION DeleteSpaces(Line : STRING) RETURNS STRING\n\
    \  ENDFUNCTION\n[6]\n\n(c) Two modules are defined:\nModule\nDescription\nDeleteComment()\n\
    (already written)\n•  called with a parameter of type string representing a line\
    \ of\npseudocode from a student’s project file\n•  returns the line after removing\
    \ any comment\nStage_2()\n•  called with two parameters:\n ○ a string representing\
    \ an input file name\n ○ a string representing an output file name\n•  copies\
    \ each line from the input file to the existing output file having\nfirst removed\
    \ all leading spaces and comments from that line\n• does not write blank lines\
    \ to the output file\n• outputs a final message giving the number of blank lines\
    \ removed\n\nWrite pseudocode for module Stage_2().\n\nModules DeleteComment()\
    \ and DeleteSpaces() must be used in your solution [8]"
