  text: "5\nA program is being designed in pseudocode.\n\nThe program contains a global\
    \ 1D array Data of type string containing 200 elements.\n\nThe first element has\
    \ the index value 1.\n\nA procedure Process() is written to initialise the values\
    \ in the array:\n\nPROCEDURE Process(Label : STRING)\n\n  DECLARE Index : INTEGER\n\
    \n  Index\n 0\n\n  INPUT Data[Index]\n\n  WHILE Index < 200\n\n    Index\n Index\
    \ + 1\n\n    CASE OF (Index MOD 2)\n\n      0 : Data[Index]\n TO_UPPER(Label)\n\
    \n      1 : Data[Index]\n TO_LOWER(Label)\n\n      OTHERWISE : OUTPUT \"Alarm\
    \ 1201\"\n\n    ENDCASE\n\n  NEXT Index\n\n  OUTPUT \"Completed \" & Index & \"\
    \ times\"\n\nENDPROCEDURE\n\n(a) (i) The pseudocode contains two syntax errors\
    \ and one other error.\n\n Identify the errors.\nSyntax error 1   Syntax error\
    \ 2   Other error   [3]\n\n(ii) The procedure contains a statement that is not\
    \ needed.\n\n Identify the pseudocode statement and explain why it is not needed.\n\
    Statement   Explanation   [2]\n\n(b) After correcting all syntax errors, the pseudocode\
    \ is translated into program code which\ncompiles without generating any errors.\n\
    \nWhen the program is executed it unexpectedly stops responding.\n\nIdentify the\
