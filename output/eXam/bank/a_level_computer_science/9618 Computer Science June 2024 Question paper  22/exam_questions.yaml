  text: "7\nA fitness club has a computerised membership system.\n\nThe system stores\
    \ information for each club member: name, home address, email address, mobile\n\
    phone number, date of birth and exercise preferences.\n\nMany classes are full,\
    \ and the club creates a waiting list for each class. The club adds details of\n\
    members who want to join a class that is full to the waiting list for that class.\n\
    \nWhen the system identifies that a space is available in one of the classes,\
    \ a new module will send\na text message to each member who is on the waiting\
    \ list.\n\n(a) Decomposition will be used to break the new module into sub‑modules\
    \ (sub‑problems).\n\nIdentify three sub‑modules that could be used in the design\
    \ and describe their use.\nSub‑module 1   Use   Sub‑module 2   Use   Sub‑module\
    \ 3   Use   [3]\n\n(b)  A different part of the program is represented by the\
    \ following state‑transition diagram.\nS1\nSTART\nS4\nS3\nInput-B | Output-W\n\
    Input-A | Output-X\nInput-B | Output-Y\nInput-A | Output-W\nInput-B\nInput-B\n\
    Input-A\nInput-A\nS2\nS5\n\n(i) Complete the table to show the inputs, outputs\
    \ and next states.\n\n Assume that the current state for each row is given by\
    \ the ‘Next state’ on the previous\nrow. For example, the first Input‑A is made\
    \ when in state S1.\n\n If there is no output for a given transition, then the\
    \ output cell should contain ‘none’.\n\n The first two rows have been completed.\n\
    Input\nOutput\nNext state\nS1\nInput‑A\nnone\nS3\nOutput‑W\nnone\nInput‑B\nInput‑A\n\
    S4\n\n[5]\n\n(ii) Identify the input sequence that will cause the minimum number\
    \ of state changes in the\ntransition from S1 to S4 [1]"
