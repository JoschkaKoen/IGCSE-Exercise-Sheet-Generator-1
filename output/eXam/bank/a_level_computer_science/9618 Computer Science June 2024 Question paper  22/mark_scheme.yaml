    PROCEDURE IsRA()

    DECLARE a, b, c : INTEGER

    OUTPUT "Input length of the first side"

    INPUT a

    OUTPUT "Input length of the second side"

    INPUT b

    OUTPUT "Input length of the third side"

    INPUT c

    IF (a * a = (b * b) + (c * c)) OR__

    (b * b = (a * a) + (c * c)) OR__

    (c * c = (a * a) + (b * b)) THEN

    OUTPUT "It is right-angled"

    ELSE

    OUTPUT "Not right-angled"

    ENDIF

