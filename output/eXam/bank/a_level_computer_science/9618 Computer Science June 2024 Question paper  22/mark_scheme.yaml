- number: 8b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Example algorithm based on finding position of first non-space
    character and

    then using substring function:

    FUNCTION DeleteSpaces(Line : STRING) RETURNS STRING

    DECLARE NewLine : STRING

    DECLARE EndOfLeading : BOOLEAN

    DECLARE Count, NumSpaces : INTEGER

    DECLARE NextChar : CHAR

    CONSTANT Space = " "

    NumSpaces  0

    EndOfLeading  FALSE

    FOR Count  1 TO LENGTH(Line)

    NextChar  MID(Line, Count, 1)

    IF NextChar <> Space AND EndOfLeading = FALSE

    THEN

    NumSpaces  Count - 1 // the number to trim

    EndOfLeading = TRUE

    ENDIF

    NEXT Count

    NewLine  RIGHT(Line, LENGTH(Line) - NumSpaces)

    RETURN NewLine

    ENDFUNCTION

    Mark as follows:

    1

    Loop to length of parameter // Loop until first non-space

    character in Line

    2

    Extract a character in a loop

    3

    Identify first non-space character in a loop

    4

    Attempt at removing leading spaces in Line

    5

    Leading spaces removed from Line / / Create new string without leading

    space

    6

    Return a string following a reasonable attempt at removing leading spaces

    in Line

    6

    9618/22

    May/June 2024'
