questions:
  - number: "4"
    type: short_answer
    text: |
      An algorithm will:

      \begin{itemize}
      \item input 100 integer values, one value at a time
      \item store the first value input into the first location of the array \texttt{Number}
      \item store the next input value in the next unused location of the array \texttt{Number}
      \item output the contents of \texttt{Number} array in the opposite sequence to that in which the values were input.
      \end{itemize}

      Complete the program flowchart to represent the algorithm.

      Variable declarations are \textbf{not} required.