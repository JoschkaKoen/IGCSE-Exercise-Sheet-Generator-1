  - number: 5b
    question_type: long_answer
    page: 10
    subpage_row: 1
    subpage_col: 1
    marks: 8
    text: 'At the end of each sequence of pictures, the time is saved as a string
      in the format \texttt{<HH><MM><SS>} where:


      \begin{itemize}

      \item \texttt{HH} represents the hours using two digits

      \item \texttt{MM} represents the minutes using two digits

      \item \texttt{SS} represents the seconds using two digits.

      \end{itemize}


      For example:


      \begin{itemize}

      \item \texttt{"081230"} is stored to represent the time 8:12:30, in the morning

      \item \texttt{"152235"} is stored to represent the time 15:22:35, in the afternoon.

      \end{itemize}


      Each string is stored on a new line in the text file \texttt{TimeTaken.txt}


      An algorithm is required to process the content of the text file \texttt{TimeTaken.txt}
      once it has been transferred to the computer.


      For each hour when pictures are taken, output a suitable message showing the
      hour and the total number of sequences of pictures taken within that hour.


      Example outputs:


      \begin{alltt}

      Hour : 15  Total : 32

      Hour : 18  Total : 1

      \end{alltt}


      Write pseudocode for this algorithm.


      Assume the text file \texttt{TimeTaken.txt} contains at least one line.'
    answer_options: []
    subquestions: []
