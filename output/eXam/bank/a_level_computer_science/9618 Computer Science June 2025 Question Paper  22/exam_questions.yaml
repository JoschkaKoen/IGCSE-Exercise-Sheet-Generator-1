  text: "Two arrays \\texttt{Data} and \\texttt{Pointer} are accessed by the procedure\
    \ \\texttt{Place()}\n\n\\texttt{Data} and \\texttt{Pointer} are both global arrays\
    \ of type \\texttt{INTEGER}\n\nThe contents of these two arrays are shown:\n\n\
    \\begin{tabular}{cc|cc}\n\\multicolumn{2}{c}{\\textbf{Data}} & \\multicolumn{2}{c}{\\\
    textbf{Pointer}} \\\\\n1 & \\multicolumn{1}{|c|}{1018} & 1 & \\multicolumn{1}{|c}{7}\
    \ \\\\ \\cline{2-2} \\cline{4-4}\n2 & \\multicolumn{1}{|c|}{1007} & 2 & \\multicolumn{1}{|c}{3}\
    \ \\\\ \\cline{2-2} \\cline{4-4}\n3 & \\multicolumn{1}{|c|}{1010} & 3 & \\multicolumn{1}{|c}{1}\
    \ \\\\ \\cline{2-2} \\cline{4-4}\n4 & \\multicolumn{1}{|c|}{1056} & 4 & \\multicolumn{1}{|c}{6}\
    \ \\\\ \\cline{2-2} \\cline{4-4}\n5 & \\multicolumn{1}{|c|}{1092} & 5 & \\multicolumn{1}{|c}{-1}\
    \ \\\\ \\cline{2-2} \\cline{4-4}\n6 & \\multicolumn{1}{|c|}{1062} & 6 & \\multicolumn{1}{|c}{5}\
    \ \\\\ \\cline{2-2} \\cline{4-4}\n7 & \\multicolumn{1}{|c|}{1034} & 7 & \\multicolumn{1}{|c}{4}\
    \ \\\\ \\cline{2-2} \\cline{4-4}\n8 & \\multicolumn{1}{|c|}{0} & 8 & \\multicolumn{1}{|c}{9}\
    \ \\\\ \\cline{2-2} \\cline{4-4}\n9 & \\multicolumn{1}{|c|}{0} & 9 & \\multicolumn{1}{|c}{10}\
    \ \\\\ \\cline{2-2} \\cline{4-4}\n10 & \\multicolumn{1}{|c|}{0} & 10 & \\multicolumn{1}{|c}{-1}\
    \ \\\\ \\cline{2-2} \\cline{4-4}\n\\end{tabular}\n\nStudy the pseudocode:\n\n\\\
    begin{alltt}\nPROCEDURE Place(Value : INTEGER, Start : INTEGER, Unused : INTEGER)\n\
    \    DECLARE New, Current, Last : INTEGER\n    CONSTANT NullPointer = -1\n   \
    \ New <- Unused\n    Last <- NullPointer\n    Current <- Start\n    WHILE Current\
    \ <> NullPointer AND Data[Current] < Value\n        Last <- Current\n        Current\
    \ <- Pointer[Current]\n    ENDWHILE\n    Pointer[New] <- Pointer[Last]\n    Pointer[Last]\
    \ <- New\n    Data[New] <- Value\nENDPROCEDURE\n\\end{alltt}"
