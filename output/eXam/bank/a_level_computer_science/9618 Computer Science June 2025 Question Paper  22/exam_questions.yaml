    \hline

    \textbf{Current state} & \textbf{Event} & \textbf{Next state} \\ \hline

    standby mode & turn on & detect mode \\ \hline

    detect mode & turn off & standby mode \\ \hline

    detect mode & movement detected & active mode \\ \hline

    active mode & 20 seconds elapsed & sequence complete \\ \hline

    active mode & turn off & standby mode \\ \hline

    sequence complete & time saved & detect mode \\ \hline

    \end{tabular}'
