    \nSome of the tables in the database are given. The database is not normalised.\n\
    \nBATCH(BatchID, Type, Flavour, Size, SellingPrice, EndDate)\n\nCUSTOMER(CustomerID,\
    \ CompanyName, EmailAddress, TelephoneNumber)\n\nSALE(SaleID, BatchID, CustomerID,\
    \ Quantity, Date)\n\n(a) Identify two foreign keys in the table SALE and the table\
    \ that each foreign key references.\nForeign key 1   Table name 1   Foreign key\
    \ 2   Table name 2   [2]\n\n(b) Write an SQL script to return the total quantity\
    \ of ice cream sold to the customer with the ID of\n0034E in the year 2023 [3]\n\
    ,\t,\n\n(c) The table definition for BATCH is repeated here:\n\nBATCH(BatchID,\
    \ Type, Flavour, Size, SellingPrice, EndDate)\n\nSample data for the table BATCH\
    \ is given:\nBatchID\nType\nFlavour\nSize\nSellingPrice\nEndDate\nKlV12\nPlain\n\
    Vanilla\n1\n2.20\n12/12/2024\nRlC14\nPlain\nChocolate\n0.5\n1.80\n12/12/2024\n\
    TYL1\nNon-dairy\nLemon\n0.5\n2.10\n01/02/2025\nFYV2\nNon-dairy\nVanilla\n0.25\n\
    1.50\n02/02/2025\nBIV13\nPlain\nVanilla\n1\n2.20\n02/02/2024\n\n(i) Write an SQL\
