- number: '7'
  question_type: short_answer
  marks: 0
  text: "7\nThe following table shows part of the instruction set for a processor.\
    \ The processor has two\nregisters, the Accumulator (ACC) and the Index Register\
    \ (IX).\nInstruction\nExplanation\nOpcode\nOperand\nLDM\n#n\nImmediate addressing.\
    \ Load the number n to ACC\nLDD\n<address>\nDirect addressing. Load the contents\
    \ of the location at the given\naddress to ACC\nLDI\n<address>\nIndirect addressing.\
    \ The address to be used is at the given\naddress.\nLoad the contents of this\
    \ second address to ACC\nLDX\n<address>\nIndexed addressing. Form the address\
    \ from <address> + the\ncontents of the index register. Copy the contents of this\
    \ calculated\naddress to ACC\nLDR\n#n\nImmediate addressing. Load the number n\
    \ to IX\nADD\n#n/Bn/&n\nAdd the number n to the ACC\nADD\n<address>\nAdd the contents\
    \ of the given address to the ACC\nSUB\n#n/Bn/&n\nSubtract the number n from the\
    \ ACC\nSUB\n<address>\nSubtract the contents of the given address from the ACC\n\
    INC\n<register>\nAdd 1 to the contents of the register (ACC or IX)\nDEC\n<register>\n\
    Subtract 1 from the contents of the register (ACC or IX)\n<address> can be an\
    \ absolute or a symbolic address\n# denotes a denary number, e.g. #123\nB denotes\
    \ a binary number, e.g. B01001010\n& denotes a hexadecimal number, e.g. &4A\n\
    ,\t,\n\n(a) The current contents of memory are shown:\nAddress\nData\n50\n54\n\
    51\n55\n52\n50\n53\n52\n54\n100\n55\n25\n56\n50\n\nThe current contents of the\
    \ ACC and IX are shown:\nACC\n50\nIX\n45\n\nComplete the table by writing the\
    \ content of the ACC after each program has run.\nInstructions\nACC content\n\
    1\nLDD 50\nADD #4\nADD 54\n2\nLDI 53\nDEC ACC\nADD 56\n3\nLDM #55\nSUB #5\n\n\
    [3]\n,\t,\n\n(b) The instruction set also includes these bit manipulation instructions:\n\
    Instruction\nExplanation\nOpcode\nOperand\nAND\n#n/Bn/&n\nBitwise AND operation\
    \ of the contents of ACC with the operand\nAND\n<address>\nBitwise AND operation\
    \ of the contents of ACC with the contents\nof <address>\nXOR\n#n/Bn/&n\nBitwise\
    \ XOR operation of the contents of ACC with the operand\nXOR\n<address>\nBitwise\
    \ XOR operation of the contents of ACC with the contents\nof <address>\nOR\n#n/Bn/&n\n\
    Bitwise OR operation of the contents of ACC with the operand\nOR\n<address>\n\
    Bitwise OR operation of the contents of ACC with the contents of\n<address>\n\
    <address> can be an absolute or a symbolic address\n# denotes a denary number,\
    \ e.g. #123\nB denotes a binary number, e.g. B01001010\n& denotes a hexadecimal\
    \ number, e.g. &4A\n\nExplain how bit manipulation can be used to clear the data\
    \ in an 8-bit register.\n\nWrite the bit manipulation instruction that will be\
    \ used.\nExplanation   Instruction   [3]\n,\t,"
