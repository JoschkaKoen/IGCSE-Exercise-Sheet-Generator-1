- number: '6'
  question_type: short_answer
  marks: 0
  text: "6\nThree points on a grid form a triangle with sides of length A, B and C\
    \ as shown in the example:\n\n10\ny\nx\n9\n8\n7\n6\n5\n4\n1\n0\n2\n3\n4\n5\n6\n\
    7\n8\n9 10\nA\nC\nB\n3\n2\n1\n\nA triangle is said to be right-angled if the following\
    \ test is true (where A is the length of the longest\nside):\n\nA2 = B2 + C2\n\
    \nA2 means A multiplied by A, for example 32 means 3 × 3 which evaluates to 9\n\
    \nYou can calculate A2, B2 and C2 by using the coordinates of the endpoints of\
    \ each line.\n\nFor example, B2 is calculated as follows:\n\n10\ny\nx\n9\n8\n\
    7\n6\n5\n4\n1\n0\n2\n3\n4\n5\n6\n7\n8\n9 10\nB\nP2\nP2\nP1\nP1\n3\n2\n1\n(x1,\
    \ y1)\n(x1, y1)\n(x2, y2)\n(x2, y2)\n\nThe endpoints, P1 and P2, have the coordinates\
    \ (3, 2) and (6, 6).\n\nThe value B2 is given by the formula:\n\nB2 = (x1 − x2)2\
    \ + (y1 − y2)2\n\nIn this example:\n\nB2 = (3 − 6)2 + (2 − 6)2\n\nB2 = (–3)2 +\
    \ (–4)2\n\nB2 = 9 + 16\n\nB2 = 25\n\n(a) A function IsRA() will:\n•\ntake three\
    \ sets of integers as parameters representing the coordinates of the three\nendpoints\
    \ that form a triangle\n•\nreturn TRUE if the endpoints form a right-angled triangle,\
    \ otherwise return FALSE.\n\nIn pseudocode, the operator ‘^’ represents an exponent,\
    \ which is the number of times a value\nis multiplied by itself.  For example,\
    \ the expression Value2 may be written in pseudocode as\nValue ^ 2\n\nComplete\
    \ the pseudocode for the function IsRA().\n\nFUNCTION IsRA(x1, y1, x2, y2, x3,\
    \ y3 : INTEGER) RETURNS BOOLEAN\n  ENDFUNCTION\n\n[6]\n\n(b) The test used to\
    \ check if a triangle is right-angled can be written in two ways:\n\n A2 = B2\
    \ + C2\n\nor\n\n A = √(B2 + C2)\n\nThe symbol √ represents the square root operation.\
    \ For example, √81 = 9\n\nA new function SQRT() is written to perform the square\
    \ root operation. The function takes an\ninteger number as a parameter and returns\
    \ a positive real value representing the square root\nof the number.\n\nDuring\
    \ testing it is found that the SQRT() function returns a value that is only accurate\
    \ to\n4 decimal places.\n\nFor example, SQRT(25) returns 5.0000125 rather than\
    \ the correct value of 5.0\n\nThe function IsRA() from part (a) is modified to\
    \ use the new SQRT() function to test if a\ntriangle is right-angled.\n\nDescribe\
    \ a problem that might occur when using the modified IsRA() function and suggest\n\
    a solution that still allows the SQRT() function to be used.\nProblem   Solution\
    \   [2]"
