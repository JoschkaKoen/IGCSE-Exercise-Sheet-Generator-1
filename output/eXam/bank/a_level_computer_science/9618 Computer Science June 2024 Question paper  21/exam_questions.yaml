- number: '5'
  question_type: short_answer
  marks: 0
  text: "5\nA global 1D array of strings contains three elements which are assigned\
    \ values as shown:\n\nData[1]\n \"aaaaaa\"\n\nData[2]\n \"bbbbbb\"\n\nData[3]\n\
    \ \"cccccc\"\n\nProcedure Process() manipulates the values in the array.\n\nThe\
    \ procedure is written in pseudocode as follows:\n\nPROCEDURE Process(Format :\
    \ STRING)\n\n  DECLARE Count, Index, L : INTEGER\n\n  DECLARE Result : STRING\n\
    \n  DECLARE C : CHAR\n\n  Result\n \"****\"\n\n  FOR Count\n 1 TO LENGTH(Format)\
    \ STEP 2\n\n    C\n MID(Format, Count, 1)\n\n    L\n STR_TO_NUM(MID(Format, Count\
    \ + 1, 1))\n\n    Index\n (Count + 1) DIV 2\n\n    CASE OF C\n\n      'X' : Result\n\
    \ TO_UPPER(Data[Index])\n\n      'Y' : Result\n TO_LOWER(Data[Index])\n\n    \
    \  'Z' : Result\n \"**\" & Data[Index]\n\n    ENDCASE\n\n    Data[Index]\n LEFT(Result,\
    \ L)\n\n  NEXT Count\n\nENDPROCEDURE\n\n(a) Complete the trace table by dry running\
    \ the procedure when it is called as follows:\n\nCALL Process(\"X3Y2W4\")\nCount\n\
    C\nL\nIndex\nResult\nData[1]\nData[2]\nData[3]\n\n[6]\n\n(b) The procedure is\
    \ to be modified. If variable C is assigned a value other than 'X', 'Y' or 'Z',\n\
    then procedure Error() is called and passed the value of variable C as a parameter.\n\
    \nThis modification can be implemented by adding a single line of pseudocode.\n\
    \n(i) Write the single line of pseudocode [1]\n\n(ii) State where this new line\
    \ should be placed [1]"
