  text: "7\nA fitness club has a computerised membership system. The fitness club\
    \ offers a number of\ndifferent exercise classes.\n\nThe following information\
    \ is stored for each club member: name, home address, email address,\nmobile phone\
    \ number, date of birth and the exercise(s) they are interested in.\n\n(a) When\
    \ an exercise class is planned, a new module will send personalised text messages\
    \ to\neach member who has expressed an interest in that exercise. Members wishing\
    \ to join the\nclass send a text message back. Members may decide not to receive\
    \ future text messages\nby replying with the message ‘STOP’.\n\nThe process of\
    \ abstraction is used to filter out unnecessary information.\n\n(i) State one\
    \ advantage of applying abstraction to this problem [1]\n\n(ii) Identify three\
    \ items of information that will be required by the new module.\n\n Justify your\
    \ choices with reference to the given scenario.\nItem 1 required   Justification\
    \   Item 2 required   Justification   Item 3 required   Justification   [3]\n\n\
    (iii) Identify two operations that would be required to process data when the\
    \ new module\nreceives a text message back from a member.\nOperation 1   Operation\
    \ 2   [2]\n\n(b) The structure chart illustrates part of the membership program:\n\
    Sub-A\nSub-B\nP1\nT1\nP2\nName\nUpdate\nSub-C\nA\n\nData item notes:\n•\nName\
    \ contains the name of a club member\n•\nP1 and T1 are of type real.\n\n(i) Explain\
    \ the meaning of the diamond symbol (labelled with the letter A) in the chart\
