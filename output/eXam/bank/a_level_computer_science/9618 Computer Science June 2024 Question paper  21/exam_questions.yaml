- number: '8'
  question_type: short_answer
  marks: 0
  text: "8\nA teacher is designing a program to process pseudocode projects written\
    \ by her students.\n\nEach student project is stored in a text file.\n\nThe process\
    \ is split into a number of stages. Each stage performs a different task and creates\
    \ a\nnew file named as shown:\nFile name\nComment\nMichaelAday_src.txt\nstudent\
    \ project file produced by student Michael Aday\nMichaelAday_S1.txt\nfile produced\
    \ by stage 1\nMichaelAday_S2.txt\nfile produced by stage 2\n\nThe teacher has\
    \ defined the first program module as follows:\nModule\nDescription\nDeleteComment()\n\
    •  called with a parameter of type string representing a line of\npseudocode from\
    \ a student’s project file\n• returns the line after removing any comments\nNote\
    \ on comments:\nA comment starts with two forward slash characters and includes\
    \ all the\nremaining characters on the line.\nThe following example shows a string\
    \ before and after the comment has\nbeen removed:\nBefore: IF X2 > 13 THEN   //check\
    \ if limit exceeded\nAfter:   IF X2 > 13 THEN\n\n(a) Complete the pseudocode for\
    \ module DeleteComment().\n\nFUNCTION DeleteComment(Line : STRING) RETURNS STRING\n\
    \  ENDFUNCTION\n\n[8]\n\n(b) A second module is defined:\nModule\nDescription\n\
    Stage_1()\n• called with a parameter of type string representing a student name\n\
    • creates a new stage 1 file\n•  copies each line from the student’s project file\
    \ to the stage 1 file after\nremoving any comment from each line\n• does not write\
    \ blank lines to the stage 1 file\n• returns the number of lines written to the\
    \ stage 1 file\n\nWrite pseudocode for module Stage_1().\n\nModule DeleteComment()\
    \ must be used in your solution [7]"
