  mark_scheme_answer: 'FUNCTION DeleteComment(Line : STRING) RETURNS STRING

    DECLARE NewLine, TwoChars : STRING

    DECLARE Count, TrimTo : INTEGER

    CONSTANT Comment = "//"

    NewLine ´éČ Line

    TrimTo ´éČ 0

    Count ´éČ 1

    WHILE Count < LENGTH(Line) AND TrimTo = 0

    TwoChars ´éČ MID(Line, Count, 2) // extract 2 chars

    IF TwoChars = Comment THEN

    TrimTo ´éČ Count

    ENDIF

    Count ´éČ Count + 1

    ENDWHILE

    IF TrimTo <> 0 THEN

    NewLine ´éČ LEFT(Line, TrimTo - 1)

    ENDIF

    RETURN NewLine

    ENDFUNCTION

    Mark as follows:

    1

    Loop to length of Line (parameter) // length of Line -1

    2

    Terminate loop on first double slash

    3

