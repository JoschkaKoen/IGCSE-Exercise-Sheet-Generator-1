  text: "The table shows assembly language instructions for a processor that has one\
    \ register, the Accumulator (ACC).\n\n\\begin{tabular}{|c|c|l|p{7.5cm}|}\n\\hline\n\
    \\textbf{Label} & \\multicolumn{2}{c|}{\\textbf{Instruction}} & \\multicolumn{1}{c|}{\\\
    textbf{Explanation}} \\\\\n\\cline{2-3}\n & \\textbf{Opcode} & \\textbf{Operand}\
    \ & \\\\\n\\hline\n & \\texttt{LDM} & \\texttt{\\#n} & Load the number n to the\
    \ ACC \\\\\n\\hline\n & \\texttt{LDD} & \\texttt{<address>} & Load the contents\
    \ of the location at the given address to the ACC \\\\\n\\hline\n & \\texttt{LDI}\
    \ & \\texttt{<address>} & The address to be used is at the given address. \\newline\
    \ Load the contents of this second address to the ACC \\\\\n\\hline\n & \\texttt{ADD}\
    \ & \\texttt{<address>} & Add the contents of the given address to the ACC \\\\\
    \n\\hline\n & \\texttt{ADD} & \\texttt{\\#n} & Add the number n to the ACC \\\\\
    \n\\hline\n & \\texttt{SUB} & \\texttt{<address>} & Subtract the contents of the\
    \ given address from the ACC \\\\\n\\hline\n & \\texttt{SUB} & \\texttt{\\#n}\
    \ & Subtract the number n from the ACC \\\\\n\\hline\n & \\texttt{STO} & \\texttt{<address>}\
    \ & Store the contents of the ACC at the given address \\\\\n\\hline\n\\texttt{<label>:}\
    \ & & \\texttt{<data>} & Gives a symbolic address \\texttt{<label>} to the memory\
    \ location with the contents \\texttt{<data>} \\\\\n\\hline\n\\multicolumn{4}{|l|}{\\\
    # denotes a denary number, e.g. \\#123} \\\\\n\\multicolumn{4}{|l|}{\\texttt{<label>}\
    \ can be used in place of \\texttt{<address>}} \\\\\n\\hline\n\\end{tabular}\n\
    \n\\vspace{1em}\n\nThe current contents of memory are:\n\n\\begin{tabular}{|c|c|}\n\
    \\hline\n\\textbf{Address} & \\textbf{Contents} \\\\\n\\hline\n563 & 125 \\\\\n\
    \\hline\n899 & 63 \\\\\n\\hline\n\\end{tabular}"
