    49\n36\n64\n\n(a) A linked list of nodes is used to store the data. Each node\
    \ consists of a left pointer, the data\nand a right pointer.\n\n−1 is used to\
    \ represent a null pointer.\n\nComplete this linked list to represent the given\
    \ binary tree organisation.\nRootPtr\nLeftPtr    Data   RightPtr\n25\n4\n1\n–1\n\
    –1\n\n[4]\n,\t,\n\n(b) A 2D array is used to store the nodes of the linked list\
    \ in part (a).\n\nComplete the diagram using your answer for part (a).\nRootPtr\n\
    Index\nLeftPtr\nData\nRightPtr\n0\n0\n25\n1\n4\n2\n36\n3\n1\n4\n16\n5\n64\nFreePtr\n\
    6\n9\n7\n49\n8\n\n[4]\n\n(c) The linked list in part (a) is implemented using\
    \ a 1D array of records. Each record contains a\nleft pointer, data and a right\
    \ pointer.\n\nThe following pseudocode represents a function that searches for\
    \ an element in the array of\nrecords LinkList. It returns the index of the record\
    \ if the element is found, or it returns a\nnull pointer if the element is not\
    \ found.\n\nComplete the pseudocode for the function.\nFUNCTION SearchList(Item\
    \ : INTEGER) NullPtr\n −1\n    RootPtr\n   WHILE NowPtr <> NullPtr\n      IF LinkList[NowPtr].Data\
    \ < Item THEN\n         NowPtr\n LinkList[NowPtr].RightPtr\n      ELSE\n     \
    \    IF  THEN\n             NowPtr\n  ELSE\n            RETURN NowPtr\n      \
    \   ENDIF\n      ENDIF\n   ENDWHILE\n   RETURN NullPtr\nENDFUNCTION\n[4]\n,\t,"
