    FUNCTION SearchList(Item : INTEGER) RETURNS INTEGER

    NullPtr  -1

    NowPtr  RootPtr

    WHILE NowPtr <> NullPtr

    IF LinkList[NowPtr].Data < Item THEN

    NowPtr  LinkList[NowPtr].RightPtr

    ELSE

    IF LinkList[NowPtr].Data > Item THEN

    NowPtr  LinkList[NowPtr].LeftPtr

    ELSE

    RETURN NowPtr

    ENDIF

