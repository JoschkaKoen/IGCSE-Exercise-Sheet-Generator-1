  - number: 3b
    question_type: long_answer
    page: 6
    subpage_row: 1
    subpage_col: 1
    marks: 4
    text: "A function to add a value to \\texttt{ThisStack} is expressed in pseudocode\
      \ as shown.\nThe function will return a value to indicate whether the operation\
      \ was successful or not.\n\nComplete the pseudocode by filling in the gaps.\n\
      \n\\begin{alltt}\nFUNCTION Push(ThisValue : REAL) RETURNS BOOLEAN\n\n  DECLARE\
      \ ReturnValue : BOOLEAN\n\n  IF ................................................\
      \ THEN\n\n    RETURN ................................................ // stack\
      \ is already full\n\n  ENDIF\n\n  ................................................\
      \ <- ThisValue\n\n  SP <- ................................................\n\
      \n  OnStack <- OnStack + 1\n\n  RETURN TRUE\n\nENDFUNCTION\n\\end{alltt}"
