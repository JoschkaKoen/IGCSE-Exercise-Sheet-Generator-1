  text: "A program is being developed to implement a game for up to six players.\n\
    \nDuring the game, each player assembles a team of characters. At the start of\
    \ the game there are 45 characters available.\n\nEach character has four attributes,\
    \ as follows:\n\n\\begin{tabular}{|l|l|l|}\n\\hline\n\\textbf{Attribute} & \\\
    textbf{Examples} & \\textbf{Comment} \\\\ \\hline\nPlayer & 0, 1, 3 & The player\
    \ the character is assigned to. \\\\ \\hline\nRole & Builder, Teacher, Doctor\
    \ & The job that the character will perform in the game. \\\\ \\hline\nName &\
    \ Bill, Lee, Farah, Mo & The name of the character. Several characters may perform\
    \ the same role, but they will each have a unique name. \\\\ \\hline\nLevel &\
    \ 14, 23, 76 & The skill level of the character. An integer in the range 0 to\
    \ 100 inclusive. \\\\ \\hline\n\\end{tabular}\n\nThe programmer has defined a\
    \ record type to define each character.\n\nThe record type definition is shown\
    \ in pseudocode as follows:\n\n\\begin{alltt}\nTYPE CharacterType\n  DECLARE Player\
    \ : INTEGER\n  DECLARE Role : STRING\n  DECLARE Name : STRING\n  DECLARE Level\
    \ : INTEGER\nENDTYPE\n\\end{alltt}\n\nThe \\texttt{Player} field indicates the\
    \ player to which the character is assigned (1 to 6). The field value is 0 if\
    \ the character is \\textbf{not} assigned to any player.\n\nThe programmer has\
    \ defined a global array to store the character data as follows:\n\n\\begin{alltt}\n\
    DECLARE Character : ARRAY[1:45] OF CharacterType\n\\end{alltt}\n\nAt the start\
    \ of the game all record fields are initialised, and all \\texttt{Player} field\
    \ values are set to 0\n\nThe programmer has defined a program module as follows:\n\
    \n\\begin{tabular}{|l|l|}\n\\hline\n\\textbf{Module} & \\textbf{Description} \\\
    \\ \\hline\nAssign() & \\begin{tabular}[c]{@{}l@{}}• called with two parameters:\\\
    \\ \\quad \\(\\circ\\) an integer representing a player\\\\ \\quad \\(\\circ\\\
    ) a string representing a character role\\\\ • search the \\texttt{Character}\
    \ array for an unassigned character with the\\\\ \\quad required role\\\\ • If\
    \ found, assign the character to the given player and output a confirmation\\\\\
    \ \\quad message, for example:\\\\ \\quad \\texttt{\"Bill the Builder has been\
    \ assigned to player 3\"}\\\\ • If no unassigned character with the required role\
    \ is found, output a suitable\\\\ \\quad message.\\end{tabular} \\\\ \\hline\n\
    \\end{tabular}"
