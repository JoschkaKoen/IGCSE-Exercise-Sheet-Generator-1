  text: 'A program is being developed to process bank card information.


    When a card number is displayed, all the characters \textbf{except} the last four
    are replaced with the asterisk character ''*''.


    Card numbers are stored as strings. The strings are between 10 and 20 characters
    in length.


    The function \texttt{Conceal()} will take a string representing a card number
    and return a modified string.


    Example strings:


    \begin{tabular}{|l|l|}

    \hline

    \textbf{Original string} & \textbf{Modified string} \\ \hline

    \texttt{"1234567890"} & \texttt{"******7890"} \\ \hline

    \texttt{"1234567897652"} & \texttt{"*********7652"} \\ \hline

    \texttt{"1234567890123456"} & \texttt{"************3456"} \\ \hline

    \end{tabular}'
  answer_options: []
  subquestions:
