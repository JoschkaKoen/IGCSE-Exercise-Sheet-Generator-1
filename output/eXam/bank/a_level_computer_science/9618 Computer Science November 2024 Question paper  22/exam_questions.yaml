  text: "A global integer variable \\texttt{Tick} is always incremented every millisecond\
    \ (1000 times per second) regardless of the other programs running.\n\nThe value\
    \ of \\texttt{Tick} can be read by any program but the value should not be changed.\n\
    \nAssume that the value of \\texttt{Tick} does not overflow.\n\nAs an example,\
    \ the following pseudocode algorithm would output \"Goodbye\" 40 seconds after\
    \ outputting \"Hello\".\n\n\\begin{alltt}\nDECLARE Start : INTEGER\n\nOUTPUT \"\
    Hello\"\nStart <- Tick\n\nREPEAT\n  //do nothing\nUNTIL Tick = Start + 40000\n\
    \nOUTPUT \"Goodbye\"\n\\end{alltt}\n\nA program is needed to help a user to time\
    \ an event such as boiling an egg.\n\nThe time taken for the event is known as\
    \ the elapsed time.\n\nThe program contains a procedure \\texttt{Timer()} which\
    \ will:\n\n\\begin{itemize}\n\\item take two integer values representing an elapsed\
    \ time in minutes and seconds\n\\item use the value of variable \\texttt{Tick}\
    \ to calculate the elapsed time\n\\item output a warning message 30 seconds before\
    \ the elapsed time is up\n\\item output a final message when the total time has\
    \ elapsed.\n\\end{itemize}\n\nFor example, to set an alarm for 5 minutes and 45\
    \ seconds the program makes the following call:\n\n\\begin{alltt}\nCALL Timer(5,\
    \ 45)\n\\end{alltt}\n\nWhen 5 minutes and 15 seconds have elapsed, the program\
    \ will output:\n\n\"30 seconds to go\"\n\nWhen 5 minutes and 45 seconds have elapsed,\
    \ the program will output:\n\n\"The time is up!\""
  answer_options: []
  subquestions: []
