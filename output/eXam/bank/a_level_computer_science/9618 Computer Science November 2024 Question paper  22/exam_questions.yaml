  text: 'A program uses a stack to hold up to 60 numeric values.

    The stack is implemented using two integer variables and a 1D array.


    The array is declared in pseudocode as shown:


    \begin{alltt}

    DECLARE ThisStack : ARRAY[1:60] OF REAL

    \end{alltt}


    The stack operates as follows:


    \begin{itemize}

    \item Global variable \texttt{SP} acts as a stack pointer that points to the next
    available stack location. The value of \texttt{SP} represents an array index.

    \item Global variable \texttt{OnStack} represents the number of values currently
    on the stack.

    \item The stack grows upwards from array element index 1.

    \end{itemize}'
  answer_options: []
