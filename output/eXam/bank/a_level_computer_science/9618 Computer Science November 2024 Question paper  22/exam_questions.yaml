    question_type: long_answer
    page: 4
    subpage_row: 1
    subpage_col: 1
    marks: 6
    text: 'The function \texttt{Conceal()} will:


      \begin{itemize}

      \item take a numeric string as a parameter representing the card number

      \item return a string in which the asterisk character replaces all except the
      last four characters of the card number parameter.

      \end{itemize}


      Write pseudocode for the function \texttt{Conceal()}.'
