  text: 'The following table shows part of the instruction set for a processor. The
    processor has one register: the Accumulator (ACC).


    \begin{tabular}{|l|l|l|}

    \hline

    \multicolumn{2}{|c|}{\textbf{Instruction}} & \multicolumn{1}{c|}{\textbf{Explanation}}
    \\ \hline

    \textbf{Opcode} & \textbf{Operand} & \\ \hline

    LDD & <address> & Direct addressing. Load the contents of the location at the
    given address to ACC \\ \hline

    LDM & \#n & Immediate addressing. Load the number n to ACC \\ \hline

    STO & <address> & Store the contents of ACC at the given address \\ \hline

    ADD & \#n/Bn/\&n & Add the number n to the ACC \\ \hline

    ADD & <address> & Add the contents of the given address to the ACC \\ \hline

    INC & <register> & Add 1 to the contents of the register (ACC) \\ \hline

    CMP & <address> & Compare the contents of ACC with the contents of <address> \\
    \hline

    CMP & \#n & Compare the contents of ACC with number n \\ \hline

    JPE & <address> & Following a compare instruction, jump to <address> if the compare
    was True \\ \hline

    JMP & <address> & Jump to the given address \\ \hline

    END & & Return control to the operating system \\ \hline

    \end{tabular}


    ACC denotes Accumulator

    <address> can be an absolute or a symbolic address

    \# denotes a denary number, e.g. \#123

    B denotes a binary number, e.g. B01001010

    \& denotes a hexadecimal number, e.g. \&4A'
