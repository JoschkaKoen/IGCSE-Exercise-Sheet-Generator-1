questions:
  - number: "7b"
    type: short_answer
    text: |
      The table shows part of the instruction set for a processor. The processor has one register: the Accumulator (ACC).

      \begin{tabular}{|c|l|l|}
      \hline
      \multicolumn{2}{|c|}{\textbf{Instruction}} & \multicolumn{1}{c|}{\textbf{Explanation}} \\ \cline{1-2}
      \textbf{Opcode} & \multicolumn{1}{c|}{\textbf{Operand}} & \\ \hline
      \texttt{AND} & \texttt{\#n/Bn/\&n} & Bitwise AND operation of the contents of ACC with the operand \\ \hline
      \texttt{AND} & \texttt{<address>} & Bitwise AND operation of the contents of ACC with the contents of \texttt{<address>} \\ \hline
      \texttt{XOR} & \texttt{\#n/Bn/\&n} & Bitwise XOR operation of the contents of ACC with the operand \\ \hline
      \texttt{XOR} & \texttt{<address>} & Bitwise XOR operation of the contents of ACC with the contents of \texttt{<address>} \\ \hline
      \texttt{OR} & \texttt{\#n/Bn/\&n} & Bitwise OR operation of the contents of ACC with the operand \\ \hline
      \texttt{OR} & \texttt{<address>} & Bitwise OR operation of the contents of ACC with the contents of \texttt{<address>} \\ \hline
      \end{tabular}

      \texttt{<address>} can be an absolute or symbolic address
      \texttt{\#} denotes a denary number, e.g. \texttt{\#123}
      \texttt{B} denotes a binary number, e.g. \texttt{B01001010}
      \texttt{\&} denotes a hexadecimal number, e.g. \texttt{\&4A}
