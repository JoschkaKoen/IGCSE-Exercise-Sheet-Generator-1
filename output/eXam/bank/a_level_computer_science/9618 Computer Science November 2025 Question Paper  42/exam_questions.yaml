  text: 'A program stores integers in ascending order in an ordered binary tree. The
    tree is implemented as a 2D array.


    Each node is stored with three values:

    \begin{itemize}

    \item a pointer to the left node

    \item the data

    \item a pointer to the right node.

    \end{itemize}


    All null values are stored as $-1$


    The binary tree can store up to 50 nodes.


    Nodes cannot be deleted from the binary tree.'
  answer_options: []
  subquestions:
