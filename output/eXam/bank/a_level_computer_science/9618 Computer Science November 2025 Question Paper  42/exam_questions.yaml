    question_type: short_answer
    page: 10
    subpage_row: 1
    subpage_col: 1
    marks: 3
    text: 'The binary tree is stored as a global array with the identifier \texttt{TreeArray}.
      The left pointer, the data and the right pointer of each node are initialised
      to $-1$


      The global variable \texttt{RootPointer} stores the index of the root node in
      the tree, initialised to $-1$


      The global variable \texttt{FreeNode} stores the index of the next free node
      in the array, initialised to $0$


      Write program code to declare and initialise \texttt{TreeArray}, \texttt{RootPointer}
      and \texttt{FreeNode}


      Save your program as \textbf{Question3\_N25}.


      Copy and paste the program code into part \textbf{3(a)} in the evidence document.'
