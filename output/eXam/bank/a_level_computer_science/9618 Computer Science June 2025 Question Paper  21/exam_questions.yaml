  text: "Study the algorithm:\n\n\\begin{alltt}\nDECLARE Chars : ARRAY[1:4] OF CHAR\n\
    DECLARE I, J : INTEGER\nDECLARE Key : CHAR\nI <- 2\nChars <- 'D'\nChars <- 'T'\n\
    Chars <- 'H'\nChars <- 'R'\nWHILE I <= 4                                //Outer\
    \ loop\n    Key <- Chars[I]\n    J <- I - 1\n    WHILE J >= 0 AND Chars[J] > Key\
    \         //Inner loop\n        Chars[J + 1] <- Chars[J]\n        J <- J - 1\n\
    \    ENDWHILE\n    Chars[J + 1] <- Key\n    I <- I + 1\nENDWHILE\n\\end{alltt}"
