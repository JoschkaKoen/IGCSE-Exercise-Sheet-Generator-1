- number: '13'
  question_type: short_answer
  page: 13
  subpage_row: 1
  subpage_col: 1
  marks: 5
  text: "The pseudocode algorithm below uses random file access to copy 50 records\
    \ from a live file \\texttt{CurrentResults.dat} to a stored file \\texttt{StoredResults.dat}\
    \ one record at a time. It uses the user-defined type \\texttt{StudentResult}.\n\
    \n\\begin{alltt}\nTYPE StudentResult\n  DECLARE LastName : STRING\n  DECLARE FirstName\
    \ : STRING\n  DECLARE ExamGrade : STRING\nENDTYPE\n\\end{alltt}\n\nIf any grades\
    \ are missing in \\texttt{CurrentResults.dat}, the text \\texttt{\"Missing grade\"\
    } is added to the \\texttt{ExamGrade} field in \\texttt{StoredResults.dat}\n\n\
    Complete this file handling pseudocode algorithm.\n\n\\begin{alltt}\nDECLARE Grade\
    \ : StudentResult\nDECLARE Position : INTEGER\n\n\\hrulefill\n\nOPENFILE \"StoredResults.dat\"\
    \ FOR RANDOM\n\n\\hrulefill\n\n  SEEK \"CurrentResults.dat\", Position\n  GETRECORD\
    \ \"CurrentResults.dat\", Grade\n  IF Grade.ExamGrade = \"\" THEN\n\n\\hrulefill\n\
    \n  ENDIF\n\n\\hrulefill\n\n\\hrulefill\n\nNEXT Position\nCLOSEFILE \"CurrentResults.dat\"\
    \nCLOSEFILE \"StoredResults.dat\"\n\\end{alltt}"
  answer_options: []
  subquestions: []
