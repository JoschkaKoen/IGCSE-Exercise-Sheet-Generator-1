    text: 'The instruction set also includes these bit manipulation instructions:


      \begin{tabular}{|c|l|l|}

      \hline

      \multicolumn{2}{|c|}{\textbf{Instruction}} & \multicolumn{1}{c|}{\textbf{Explanation}}
      \\ \cline{1-2}

      \textbf{Opcode} & \textbf{Operand} & \\ \hline

      AND & \#n/Bn/\&n & Bitwise AND operation of the contents of ACC with the operand
      \\ \hline

      AND & <address> & Bitwise AND operation of the contents of ACC with the contents
      of <address> \\ \hline

      XOR & \#n/Bn/\&n & Bitwise XOR operation of the contents of ACC with the operand
      \\ \hline

      XOR & <address> & Bitwise XOR operation of the contents of ACC with the contents
      of <address> \\ \hline

      OR & \#n/Bn/\&n & Bitwise OR operation of the contents of ACC with the operand
      \\ \hline

      OR & <address> & Bitwise OR operation of the contents of ACC with the contents
      of <address> \\ \hline

      LSL & \#n & Bits in ACC are shifted logically n places to the left. Zeros are
      introduced on the right-hand end \\ \hline

      LSR & \#n & Bits in ACC are shifted logically n places to the right. Zeros are
      introduced on the left-hand end. \\ \hline

      \end{tabular}


      \begin{itemize}

      \item <address> can be an absolute or a symbolic address

      \item \# denotes a denary number, e.g. \#123

      \item B denotes a binary number, e.g. B01001010

      \item \& denotes a hexadecimal number, e.g. \&4A

