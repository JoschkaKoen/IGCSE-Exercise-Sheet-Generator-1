- number: '3'
  question_type: short_answer
  page: 6
  subpage_row: 1
  subpage_col: 1
  marks: 5
  text: "A program uses a stack to hold up to 30 integer values. The stack is implemented\
    \ using a global integer variable and a global 1D array.\n\nThe array is declared\
    \ in pseudocode:\n\\begin{alltt}\nDECLARE ThisStack : ARRAY[1:30] OF INTEGER\n\
    \\end{alltt}\n\nStack design notes:\n\\begin{itemize}\n\\item The global variable\
    \ \\texttt{SP} acts as a stack pointer. \\texttt{SP} contains the array index\
    \ of the last value pushed onto the stack.\n\\item If the stack is empty, then\
    \ \\texttt{SP} is assigned the value zero.\n\\item The first item added to the\
    \ stack will be stored in \\texttt{ThisStack}\n\\item \\texttt{SP} is incremented\
    \ each time an item is added to the stack.\n\\end{itemize}\n\nA function \\texttt{Pop()}\
    \ is written to remove an item from \\texttt{ThisStack}. The function returns\
    \ an item of type \\texttt{PopData} which is defined in pseudocode:\n\n\\begin{alltt}\n\
    TYPE PopData\n    DECLARE Data   : INTEGER\n    DECLARE Exists : BOOLEAN\nENDTYPE\n\
    \\end{alltt}\n\nThe value removed from the stack is assigned to \\texttt{Data}\
    \ and \\texttt{Exists} is set to \\texttt{TRUE}. If it is not possible to remove\
    \ a value from the stack, then \\texttt{Exists} is set to \\texttt{FALSE}\n\n\
    Complete the pseudocode for \\texttt{Pop()}\n\n\\begin{alltt}\nFUNCTION Pop()\
    \ RETURNS PopData\n\n    DECLARE ThisPop : \\hrulefill\n\n    IF \\hrulefill THEN\n\
    \n        PopData.Exists <- \\hrulefill // Stack is empty\n\n    ELSE\n\n    \
    \    PopData.Data <- \\hrulefill\n\n        PopData.Exists <- \\hrulefill\n\n\
    \        SP <- \\hrulefill\n\n    ENDIF\n\n    RETURN ThisPop\n\nENDFUNCTION\n\
    \\end{alltt}"
  answer_options: []
  subquestions: []
