    the book \newline\newline The first three characters of a \texttt{StudentID} represent
    a tutor ID. Each student has one tutor. \\ \hline

    \texttt{BookID} & \texttt{STRING} & the unique ID of the book being borrowed \\
    \hline

    \texttt{OnLoan} & \texttt{BOOLEAN} & \texttt{TRUE} if the book has \textbf{not}
    been returned \\ \hline

