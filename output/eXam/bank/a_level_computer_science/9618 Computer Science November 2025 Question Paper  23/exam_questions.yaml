  text: "A global 1D array \\texttt{Num} of integers contains four elements. A program\
    \ assigns values to these elements as shown:\n\n\\begin{alltt}\nNum <- 1\nNum\
    \ <- 2\nNum <- 5\nNum <- 3\n\\end{alltt}\n\nA procedure \\texttt{Process()} manipulates\
    \ the values in the array.\n\nThe procedure is written in pseudocode:\n\n\\begin{alltt}\n\
    PROCEDURE Process(Start : INTEGER)\n    DECLARE CaseVar, Index, Count : INTEGER\n\
    \n    Index <- Start\n    Count <- 0\n\n    WHILE Count <= 20\n        CaseVar\
    \ <- Num[Index]\n        CASE OF CaseVar\n            1 : Num[Index] <- Num[Index]\
    \ + Index //clause one\n                Index <- Index + 1\n                Count\
    \ <- Count + 1\n\n            2 : Num[Index] <- Num[Index] + Index //clause two\n\
    \                Index <- Index + 2\n                Count <- Count + 2\n\n  \
    \          3 : Num[Index] <- Num[Index] * 2     //clause three\n             \
    \   Index <- Index + 3\n                Count <- Count - 1\n\n            4 :\
    \ Count <- Count + 4               //clause four\n            OTHERWISE : Count\
    \ <- 20\n        ENDCASE\n\n        Index <- (Index MOD 4) + 1\n\n    ENDWHILE\n\
    \nENDPROCEDURE\n\\end{alltt}"
