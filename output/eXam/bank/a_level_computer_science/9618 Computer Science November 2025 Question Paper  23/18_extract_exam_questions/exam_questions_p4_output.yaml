      Describe up to \textbf{six} steps for this algorithm that could be used to produce pseudocode.

      Do \textbf{not} use pseudocode statements in your answer.

      Step 1 \hrulefill

      Step 2 \hrulefill

      Step 3 \hrulefill

      Step 4 \hrulefill

      Step 5 \hrulefill

      Step 6 \hrulefill
