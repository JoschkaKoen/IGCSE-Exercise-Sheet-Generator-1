questions:
  - number: "2"
    type: short_answer
    text: |
      A program contains a global 1D array of type \texttt{STRING} containing 65 elements.

      An existing text file is used to store the data in the array. Only non-blank elements (those that do not contain an empty string) are written to the text file.

      An algorithm will:
      \begin{itemize}
      \item write the first element of the array as a new line in the text file
      \item continue until all elements have been written, each to a new line of the text file.
      \end{itemize}
