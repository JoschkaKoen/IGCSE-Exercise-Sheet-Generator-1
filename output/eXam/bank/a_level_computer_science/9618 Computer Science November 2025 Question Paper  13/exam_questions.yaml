    text: "The table contains three algorithms that perform data validation. The third\
      \ algorithm uses the functions \\texttt{MID} and \\texttt{LENGTH}.\n\nThe functions\
      \ \\texttt{MID} and \\texttt{LENGTH} are defined as follows:\n\n\\begin{itemize}\n\
      \\item \\texttt{MID(ThisString : STRING, x : INTEGER, y : INTEGER) RETURNS STRING}\\\
      newline returns a string of length \\texttt{y} starting at position \\texttt{x}\
      \ from \\texttt{ThisString}\n\\item \\texttt{LENGTH(ThisString : STRING) RETURNS\
      \ INTEGER}\\newline returns the integer value representing the length of \\\
      texttt{ThisString}\n\\end{itemize}\n\nComplete the table to identify the method\
      \ of data validation for each algorithm. Each method of data validation must\
      \ be different.\n\n\\begin{tabular}{|p{9cm}|p{6cm}|}\n\\hline\n\\multicolumn{1}{|c|}{\\\
      textbf{Algorithm}} & \\multicolumn{1}{c|}{\\textbf{Method of data validation}}\
      \ \\\\ \\hline\n\\begin{alltt}\nINPUT x\n\nIF x < 1 or x > 26 THEN\n\n  OUTPUT\
      \ \"Invalid\"\n\nENDIF\n\\end{alltt} & \\\\ \\hline\n\\begin{alltt}\nINPUT x\n\
      \nIF x <> 'R' AND x <> 'G' AND x <> 'B' THEN\n\n  OUTPUT \"Invalid\"\n\nENDIF\n\
      \\end{alltt} & \\\\ \\hline\n\\begin{alltt}\nINPUT x\n\nFLAG <- FALSE\n\nFOR\
      \ INDEX <- 1 TO LENGTH(x)\n\n  IF MID(x, INDEX, 1) = \"@\" THEN\n\n    FLAG\
      \ <- TRUE\n\n  ENDIF\n\nNEXT INDEX\n\nIF NOT FLAG THEN\n\n  OUTPUT \"Invalid\"\
      \n\nENDIF\n\\end{alltt} & \\\\ \\hline\n\\end{tabular}"
    answer_options: []
    subquestions: []
