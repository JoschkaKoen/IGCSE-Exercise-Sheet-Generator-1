  text: "The table shows assembly language instructions for a processor that has one\
    \ register, the Accumulator (ACC).\n\n\\begin{tabular}{|c|c|l|l|}\n\\hline\n\\\
    multicolumn{1}{|c|}{} & \\multicolumn{2}{c|}{\\textbf{Instruction}} & \\multicolumn{1}{c|}{}\
    \ \\\\ \\cline{2-3}\n\\textbf{Label} & \\textbf{Opcode} & \\textbf{Operand} &\
    \ \\multicolumn{1}{c|}{\\textbf{Explanation}} \\\\ \\hline\n & \\texttt{LDM} &\
    \ \\texttt{\\#n} & Load the number n to the ACC \\\\ \\hline\n & \\texttt{LDD}\
    \ & \\texttt{<address>} & Load the contents of the location at the given address\
    \ to ACC \\\\ \\hline\n & \\texttt{LDI} & \\texttt{<address>} & \\begin{tabular}[c]{@{}l@{}}The\
    \ address to be used is at the given address.\\\\ Load the contents of this second\
    \ address to the ACC.\\end{tabular} \\\\ \\hline\n & \\texttt{ADD} & \\texttt{<address>}\
    \ & Add the contents of the given address to the ACC \\\\ \\hline\n & \\texttt{SUB}\
    \ & \\texttt{<address>} & Subtract the contents of the given address from the\
    \ ACC \\\\ \\hline\n & \\texttt{STO} & \\texttt{<address>} & Store the contents\
    \ of the ACC at the given address \\\\ \\hline\n\\texttt{<label>:} & & \\texttt{<data>}\
    \ & Gives a symbolic address \\texttt{<label>} to the memory location with the\
    \ contents \\texttt{<data>} \\\\ \\hline\n\\multicolumn{4}{|l|}{\\begin{tabular}[c]{@{}l@{}}\\\
    # denotes a denary number, e.g. \\texttt{\\#123}\\\\ \\texttt{<label>} can be\
    \ used in place of \\texttt{<address>}\\end{tabular}} \\\\ \\hline\n\\end{tabular}\n\
    \nThe current contents of memory are:\n\n\\begin{tabular}{|r|c|}\n\\hline\n\\\
    textbf{Address} & \\textbf{Contents} \\\\ \\hline\n150 & 26 \\\\ \\hline\n300\
    \ & 86 \\\\ \\hline\n420 & 150 \\\\ \\hline\n\\end{tabular}"
