questions:
  - number: "5"
    type: short_answer
    text: |
      A software developer follows a program development life cycle. The life cycle divides the development process into various stages.
  - number: "5a"
    type: short_answer
    text: |
      The following table lists some development activities.

      Complete the table by writing the name of the life cycle stage for each activity.

      \begin{tabular}{|l|l|}
      \hline
      \textbf{Activity} & \textbf{Name of life cycle stage} \\ \hline
      The walkthrough method is used. & \\ \hline
      An algorithm is implemented in a programming language. & \\ \hline
      The client is interviewed about problems with the current system. & \\ \hline
      The program is modified to run on new hardware. & \\ \hline
      Records and file structures are defined. & \\ \hline
      \end{tabular}
  - number: "5b"
    type: short_answer
    text: |
      The program contains a validation function.
  - number: "5bi"
