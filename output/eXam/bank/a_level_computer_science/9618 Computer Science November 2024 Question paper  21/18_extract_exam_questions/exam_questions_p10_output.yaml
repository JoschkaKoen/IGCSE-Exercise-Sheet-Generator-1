      \begin{itemize}
      \item take an integer value as a parameter
      \item return \texttt{TRUE} if the value is within the range 24 to 37, inclusive
      \item otherwise return \texttt{FALSE}.
      \end{itemize}

      Complete the table to define a test plan to thoroughly test the operation of the function.

      \begin{tabular}{|c|c|c|}
      \hline
      \textbf{Type of test data} & \textbf{Test data value} & \textbf{Expected result} \\ \hline
      Normal & 30 & \texttt{TRUE} \\ \hline
       & & \\ \hline
       & & \\ \hline
       & & \\ \hline
       & & \\ \hline
      \end{tabular}
  - number: "5bii"
    type: short_answer
    text: |
      The function is to be tested on its own. When it is shown to work correctly the function will be combined with other modules and testing will continue.

      Identify the type of testing that this represents.