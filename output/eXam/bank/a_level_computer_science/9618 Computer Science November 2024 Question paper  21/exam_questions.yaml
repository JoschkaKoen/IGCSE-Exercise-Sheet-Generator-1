  text: 'An algorithm will output the \textbf{last} three lines from a text file \texttt{Result.txt}


    The lines need to be output in the same order as they appear in the file.


    Assume:

    \begin{itemize}

    \item Three variables \texttt{LineX}, \texttt{LineY} and \texttt{LineZ} will store
    the three lines. These are of type string and all three variables have been initialised
    to an empty string.

    \item The file exists and contains \textbf{at least} three lines.

    \end{itemize}'
  answer_options: []
  subquestions:
  - number: 3a
    question_type: short_answer
    page: 6
    subpage_row: 1
    subpage_col: 1
    marks: 4
    text: 'The algorithm to output the lines is expressed in eight steps.


      Complete the steps.


      1. Open the file \hrulefill

      2. Loop until \hrulefill

      3. \hrulefill and store in \texttt{ThisLine}

      4. Assign \texttt{LineY} to \texttt{LineX}

      5. Assign \texttt{LineZ} to \texttt{LineY}

      6. Assign \texttt{ThisLine} to \texttt{LineZ}

      7. After the loop, \hrulefill

      8. Output \texttt{LineX}, \texttt{LineY}, \texttt{LineZ}'
    answer_options: []
    subquestions: []
  - number: 3b
    question_type: short_answer
    page: 6
