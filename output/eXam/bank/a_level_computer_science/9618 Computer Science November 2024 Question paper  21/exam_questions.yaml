  text: 'A program includes the following assignment statement:


    \begin{alltt}

    Result <- STR_TO_NUM(x) / STR_TO_NUM(y)

    \end{alltt}


    When the program evaluates the expression in the statement, it performs a calculation.


    Variable \texttt{Result} is of type real and variables \texttt{x} and \texttt{y}
    are of type string.


    Two checks are required before the calculation is performed:


    \begin{enumerate}

    \item The two strings represent valid numeric values.

    \item The numeric value of string \texttt{y} is not zero.

    \end{enumerate}'
