  text: "Refer to the \\textbf{insert} for the list of pseudocode functions and operators.\n\
    \nA program will calculate the tax payable based on the cost of an item.\n\nCalculations\
    \ will occur at many places in the program and these involve the use of one of\
    \ three tax rates.\n\nTax rate values represent a percentage. For example, a tax\
    \ rate value of 5.23 represents 5.23%. In this case, the tax payable on an item\
    \ costing $100 would be $5.23.\n\nTax rate values are used at several places within\
    \ the program. One example is given in pseudocode as follows:\n\n\\begin{alltt}\n\
    HighRate <- FALSE\nCASE OF ItemCost\n  <= 50  : TaxRate <- 3.75  // tax rate of\
    \ 3.75%\n  <= 200 : TaxRate <- 5.23  // tax rate of 5.23%\n  > 200  : TaxRate\
    \ <- 6.25  // tax rate of 6.25%\n           HighRate <- TRUE\nENDCASE\nTaxPayable\
    \ <- ItemCost * TaxRate // tax payable\n\\end{alltt}"
