    text: "The module to perform the checks and calculation will be implemented as\
      \ a function. The function will need to return both a real and a Boolean value.\
      \ To achieve this a record type is defined in pseudocode as follows:\n\n\\begin{alltt}\n\
      TYPE Result\n  DECLARE Done : BOOLEAN\n  DECLARE Value : REAL\nENDTYPE\n\\end{alltt}\n\
      \nThe function \\texttt{Evaluate()} will:\n\\begin{itemize}\n\\item take two\
      \ parameters of type string representing the two numeric values\n\\item return\
      \ a variable of type \\texttt{Result} with the \\texttt{Done} field set to \\\
      texttt{FALSE} if either of the following applies:\n  \\begin{itemize}\n  \\\
      item at least one of the strings does \\textbf{not} represent a valid numeric\
      \ value\n  \\item the numeric value of the string representing value \\texttt{y}\
      \ is zero\n  \\end{itemize}\n\\item otherwise return a variable of type \\texttt{Result}\
      \ with the \\texttt{Done} field set to \\texttt{TRUE} and the \\texttt{Value}\
      \ field assigned the result of the formula (based on the numeric value of the\
      \ two parameters).\n\\end{itemize}\n\nWrite pseudocode for the function \\texttt{Evaluate()}."
