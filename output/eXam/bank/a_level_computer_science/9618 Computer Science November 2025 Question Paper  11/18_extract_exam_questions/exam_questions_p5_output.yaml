      PC002 & LDEA01 & MSCM & 01/04/2024 & 08/05/2024 & FALSE \\ \hline
      PC003 & ALAU02 & NEAM & 09/03/2020 & 10/03/2021 & FALSE \\ \hline
      PC004 & LOLI75 & GOUZ & 07/06/2018 & 11/09/2018 & TRUE \\ \hline
      \end{tabular}
  - number: "2ci"
    type: short_answer
    text: |
