  text: "A program is being designed in pseudocode.\n\nThe program contains the following\
    \ declaration for the global array \\texttt{MyData}:\n\n\\begin{alltt}\nDECLARE\
    \ MyData : ARRAY[1:10000] OF STRING\n\\end{alltt}\n\nA function \\texttt{FindFirst()}\
    \ is written to search the array for a given string and to return the index of\
    \ the first element where that string is found, or to return -1 if the string\
    \ is \\textbf{not} found.\n\nThe function is written in pseudocode as shown:\n\
    \n\\begin{alltt}\nFUNCTION FindFirst(SearchString : STRING) RETURNS INTEGER\n\
    \  DECLARE Index, FoundAt : INTEGER\n  FoundAt <- -1\n  FOR Index <- 1 TO 10000\n\
    \    IF MyData[Index] = SearchString THEN // outer conditional clause\n      IF\
    \ FoundAt = -1 THEN             // inner conditional clause\n        FoundAt <-\
    \ Index\n      ENDIF\n    ENDIF\n  NEXT Index\n  RETURN FoundAt\nENDFUNCTION\n\
    \\end{alltt}"
