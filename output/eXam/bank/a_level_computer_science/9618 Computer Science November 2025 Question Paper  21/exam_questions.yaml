    the book \\ \hline

    \texttt{BookID} & \texttt{STRING} & the unique ID of the book being borrowed \\
    \hline

    \texttt{OnLoan} & \texttt{BOOLEAN} & \texttt{TRUE} if the book has \textbf{not}
    been returned \\ \hline

