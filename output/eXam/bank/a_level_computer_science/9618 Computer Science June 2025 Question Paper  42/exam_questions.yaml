  - number: 1d
    question_type: short_answer
    page: 3
    subpage_row: 1
    subpage_col: 1
    marks: 6
    text: 'The text file \texttt{StackData.txt} stores numbers and mathematical operators.
      Each number and operator are on a new line in the text file.


      The mathematical operators used in this program are:


      \begin{tabular}{|c|c|}

      \hline

      \textbf{mathematical operator} & \textbf{meaning} \\ \hline

      + & addition \\ \hline

      -- & subtraction \\ \hline

      / & division \\ \hline

      * & multiplication \\ \hline

      \^{} & power of \\ \hline

      \end{tabular}


      The procedure \texttt{ReadData()}:


      \begin{itemize}

      \item takes a string filename as a parameter

      \item opens the file and reads in each line of data

      \item uses the \texttt{Push()} function to insert each line of data onto the
      stack

      \item outputs \texttt{"Stack full"} if any data cannot be stored on the stack
      because the stack is full

      \item uses exception handling when opening and reading from the text file.

      \end{itemize}


      The procedure needs to work for a file that contains an unknown number of lines.


      Write program code for \texttt{ReadData()}


      Save your program.


      Copy and paste the program code into part \textbf{1(d)} in the evidence document.'
    answer_options: []
    subquestions: []
  - number: 1e
    question_type: short_answer
    page: 4
    subpage_row: 1
    subpage_col: 1
    marks: 7
    text: 'The values stored in the stack are used to perform mathematical operations.


      A total is initialised to the first value in the stack. The first value in the
      stack will always be a number.


      The next value will be a mathematical operator and the next value will be the
      number to apply to the calculation. This is repeated until there are no values
      left in the stack. There will always be a number following a mathematical operator.


      For example, the contents of a stack are:


      \begin{tabular}{|c|l}

      \cline{1-1}

      10 & $\longleftarrow$ TopOfStack \\ \cline{1-1}

      + & \\ \cline{1-1}

      3 & \\ \cline{1-1}

      $-$ & \\ \cline{1-1}

      2 & \\ \cline{1-1}

      \end{tabular}


      The total is initialised to the first value in the stack: 10


      total = 10


      The next two values are: + 3


      total = 10 + 3 = 13


      The next two values are: $-$ 2


      total = 13 $-$ 2 = 11


      The final total is 11 and this is returned.


      Write program code for the function \texttt{Calculate()} to:

      \begin{itemize}

      \item take each value from the stack

      \item calculate and return the final total.

      \end{itemize}


      Save your program.


      Copy and paste the program code into part \textbf{1(e)} in the evidence document.'
    answer_options: []
    subquestions: []
