  text: A program reads data from a text file and stores it in a stack. The stack
    \texttt{Stack} is stored as a 1D array of up to 20 elements. The pointer \texttt{TopOfStack}
    stores the index of the last element stored in the stack.
  answer_options: []
  subquestions:
