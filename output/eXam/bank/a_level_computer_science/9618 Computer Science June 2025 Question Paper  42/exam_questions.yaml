    subpage_col: 1
    marks: 4
    text: 'The function \texttt{Push()} takes a string parameter and attempts to store
      it on the stack.


      The function returns \texttt{-1} if the stack is full.


      The function returns \texttt{1} if the parameter is successfully pushed onto
      the stack.


      Write program code for \texttt{Push()}


      Save your program.


      Copy and paste the program code into part \textbf{1(b)} in the evidence document.'
