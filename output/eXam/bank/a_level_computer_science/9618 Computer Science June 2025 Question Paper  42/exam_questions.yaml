  text: 'A program stores data in a 1D array of records, \texttt{HashTable}. The array
    has space for 200 records. Each data item is stored in a specific index of the
    array that is calculated using an algorithm. The index is calculated from the
    key field using the formula: \texttt{Key MOD 200}


    If two key fields generate the same index, there is a collision. Any records that
    have a collision are stored in a second array, \texttt{Spare}. This array has
    space for 100 records. When a collision is detected, the record is stored in the
    next free space in \texttt{Spare}.'
  answer_options: []
  subquestions:
