      ENDTYPE\n\\end{alltt}\n\nWrite program code to declare the record type \\texttt{NewRecord}\n\
      \nIf your chosen programming language does not support record formats, a class\
      \ can be used instead.\n\nSave your program as \\textbf{Question2\\_J25}.\n\n\
      Copy and paste the program code into part \\textbf{2(a)} in the evidence document."
