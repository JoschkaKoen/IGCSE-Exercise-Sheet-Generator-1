    text: |
      The function \texttt{Search()} performs a binary search to find \texttt{ItemToFind} in \texttt{DataArray}

      The function takes \textbf{two} parameters:

      \begin{itemize}
      \item \texttt{DataArray}, an array of integers
      \item \texttt{ItemToFind}, an integer to find in \texttt{DataArray}
      \end{itemize}

      The function returns:

      \begin{itemize}
      \item the index of \texttt{ItemToFind} if it is in \texttt{DataArray}
      \item -1 if \texttt{ItemToFind} is not in \texttt{DataArray}
      \end{itemize}

      Write program code for \texttt{Search()}

      You must \textbf{not} use any inbuilt searching functions for your programming language.

      Save your program.

