  explanation: null
  mark_scheme_answer: "\\textbf{One mark for each correctly completed line (Max 5)}\n\
    \\begin{alltt}\nDECLARE Location : INTEGER\nDECLARE Item : STRING\nDECLARE Continue\
    \ : BOOLEAN\nDECLARE Answer : CHAR\nContinue <- TRUE\nOPENFILE \"StockList.dat\"\
    \ FOR RANDOM\n\nWHILE Continue\n  OUTPUT \"Enter a location between 1 and 500:\
    \ \"\n  INPUT Location\n  SEEK \"StockList.dat\", Location\n  GETRECORD \"StockList.dat\"\
    , Item\n\n  IF Item = \"\" THEN\n    THEN\n      OUTPUT \"This record is missing\"\
    \n    ELSE\n      OUTPUT \"The item in stock is \", Item\n  ENDIF\n\n  OUTPUT\
    \ \"Another location (Y or N)?\"\n  INPUT Answer\n\n  IF Answer <> 'Y' THEN\n\
    \    THEN\n      Continue <- FALSE\n  ENDIF\nENDWHILE\n\nCLOSEFILE \"StockList.dat\"\
    \nOUTPUT \"End of program\"\n\\end{alltt}"
  mark_scheme: []
