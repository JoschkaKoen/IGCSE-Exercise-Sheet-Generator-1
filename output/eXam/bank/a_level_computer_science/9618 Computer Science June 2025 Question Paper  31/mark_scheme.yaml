  mark_scheme_answer: '\textbf{One mark for each mark point (Max 4)}

    \begin{itemize}

    \item MP1 The interpreter translates the source code one line at a time

    \item MP2 If the line is syntax error free it is executed

    \item MP3 It is not stored in executable format

