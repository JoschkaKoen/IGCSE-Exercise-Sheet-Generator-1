- number: 8b
  question_type: long_answer
  correct_answer: null
  explanation: null
  mark_scheme_answer: '\textbf{One mark for each mark point (Max 3)}

    \begin{itemize}

    \item MP1 The processes are queued as they arrive

    \item MP2 Processes with the shortest burst time are executed first

    \item MP3 It is a pre-emptive scheduling function // When a process with a shorter
    burst time arrives the existing process is replaced by the shorter process.

    \item MP4 The scheduler will continue to choose shorter processes over longer
    processes if they continue to be added to the queue can cause starvation for longer
    jobs

    \end{itemize}

    \textbf{One mark for benefit (Max 1) e.g.}

    \begin{itemize}

    \item MP5 Processes with a short burst time are processed very quickly

    \item MP6 Waiting time is minimised

    \end{itemize}'
  mark_scheme: []
  graphics: []
