  text: "The pseudocode algorithm checks whether a location in a stock file \\texttt{StockList.dat}\
    \ is empty or not. The location is given by the user. If the location is empty,\
    \ a suitable message is displayed, otherwise the item stored at that location\
    \ is displayed.\n\nComplete this file-handling pseudocode algorithm.\n\n\\begin{alltt}\n\
    DECLARE Location : INTEGER\nDECLARE Item : STRING\nDECLARE Continue : BOOLEAN\n\
    DECLARE Answer : CHAR\nContinue <- TRUE\n\nOPENFILE \\hrulefill\nWHILE Continue\n\
    \  OUTPUT \"Enter a location between 1 and 500: \"\n  INPUT Location\n\n  \\hrulefill\n\
    \n  GETRECORD \\hrulefill\n  IF Item = \"\" THEN\n    OUTPUT \"This record is\
    \ missing.\"\n  ELSE\n    OUTPUT \"The item in stock is \", \\hrulefill\n  ENDIF\n\
    \  OUTPUT \"Another location (Y or N)?\"\n  INPUT Answer\n  IF Answer <> 'Y' THEN\n\
    \    Continue <- FALSE\n  ENDIF\nENDWHILE\n\n\\hrulefill\nOUTPUT \"End of program\"\
    \n\\end{alltt}"
  answer_options: []
  subquestions: []
