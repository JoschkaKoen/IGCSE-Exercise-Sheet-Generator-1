- number: '6'
  type: long_answer
  marks: 4
  mark_scheme_answer: |
    \textbf{One mark for each mark point (Max 4)}
    \begin{itemize}
    \item MP1 The interpreter translates the source code one line at a time
    \item MP2 If the line is syntax error free it is executed
    \item MP3 It is not stored in executable format
    \item MP4 If an error is found, the program halts with an error message
    \item MP5 Each line must be translated every time it is run, including lines running multiple times for example in loops
    \end{itemize}