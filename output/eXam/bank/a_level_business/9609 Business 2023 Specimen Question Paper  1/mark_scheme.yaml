- number: 3b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: "Explain one benefit to a business of using budgets.\nFollow\
    \ the point-based marking guidance at the top of this mark scheme and use Table\
    \ B to give marks for each candidate\nresponse.\nAO1 out of 1 mark.\nAO2 out of\
    \ 2 marks.\nIndicative content\nResponses may include:\nAO1 Knowledge and understanding\n\
    •\nA budget is a detailed financial plan for the future.\n•\nAny benefit of using\
    \ budgets, e.g. allocating resources, assessing performance, giving managers authority.\n\
    AO2 Application\n•\nBudgets are set for both sales revenue and business costs\
    \ – allowing a business to create and monitor profit centres and\ncost centres.\n\
    •\nBudgets require budget holders to consider their future financial requirements\
    \ – and to set realistic financial targets.\n•\nA system of budgets facilitates\
    \ financial performance measurement – and increases budget holder accountability.\n\
    •\nBudgets require careful financial planning – that should lead to a more efficient\
    \ allocation of resources.\n•\nBudgets may well serve to motivate budget/profit\
    \ and cost centre managers – creating an incentive to perform.\n•\nBudgets throughout\
    \ a business may encourage co-operation and co-ordination of business activities\
    \ – helping to avoid\nconflict.\n•\nBudgets are a measure of control – and allow\
    \ monitoring to provide financial discipline within a business.\n•\nBudgets may\
    \ indicate the need for change – by signalling the unrealistic nature of financial\
    \ plans in the light of changed\nsituations.\n•\nBudgets allow for the use of\
    \ variance analysis – which indicate major areas for management action.\nAccept\
    \ all valid responses.\n3\nAO1\n1\nAO2\n2\n9609/01\nFor examination\nSPECIMEN\b\
    \nfrom 2023"
  mark_scheme: []
  graphics: []
