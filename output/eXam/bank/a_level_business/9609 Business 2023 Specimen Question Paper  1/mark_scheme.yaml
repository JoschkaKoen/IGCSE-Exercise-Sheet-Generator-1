  mark_scheme_answer: "Evaluate the view that a mission statement is only important\
    \ to a bank if it significantly influences the strategy and\ntactics of that business.\n\
    Use Table E to mark each candidate response.\nAO1 out of 2 marks.\nAO2 out of\
    \ 2 marks.\nAO3 out of 2 marks.\nAO4 out of 6 marks.\nIndicative content\nResponses\
    \ may include:\nAO1 Knowledge and understanding\n•\nMission statements define\
    \ the core purpose and focus of a business.\n•\nInternally they are designed to\
    \ motivate employees and provide a context for all business activity.\n•\nStrategy\
    \ is about the long-term business decisions affecting the whole of the business\
    \ and the focus of senior managers.\n•\nTactics are short to medium-term decisions\
    \ taken by less senior managers in departments or divisions of a business.\nAO2\
    \ Application\n•\nMission statements can be devised by the directors of the bank\
    \ and referred to by all bank employees.\n•\nMission statements are devised to\
    \ become part of the operating focus of all the bank employees.\n•\nMission statements\
    \ are expected to influence all tactical and strategic behaviour in the bank in\
    \ terms of lending policy.\n12\n9609/01\nFor examination\nSPECIMEN\b\nfrom 2023\n\
    AO3 Analysis\n•\nA mission statement may provide direction which allows a business\
    \ to develop tactics and strategy and meet objectives\nsuch as profit and sales.\n\
    •\nWithout the direction a business’ stakeholders may pull in different directions\
    \ leading to inefficiency, increased costs,\nfailure.\n•\nIf mission statements\
    \ did not work they would not be used by so many businesses.\n•\nA business may\
    \ spend significant time formulating a mission statement which is so general that\
    \ it has little relation to\nactual direction of the business and does not provide\
    \ focus.\n•\nA business may be so focused on a ‘pre-set’ mission that it misses\
    \ new opportunities which could allow the business to\ndiversify.\n•\nA mission\
    \ statement might add no value to the business, increasing costs with no increase\
    \ in profit/profitability.\nAO4 Evaluation\n•\nWhat are the most important factors\
    \ that could affect the impact of a mission statement on a bank?\n•\nChanges in\
    \ the dynamic business environment can make a mission statement set several years\
    \ ago seem irrelevant.\n•\nAre mission statements often little more than vague\
    \ statements or wish lists that few believe in?\n•\nCan mission statements really\
    \ influence strategic and tactical business decisions when most banks are trying\
    \ to\nmaximise profits?\n•\nTo what extent might factors such as exceptional leadership\
    \ in a bank or a carefully crafted bank mission statement affect\nthe importance\
    \ and influence of a bank mission statement?\n•\nMission statements can also have\
    \ an external impact and allow businesses to be made accountable to stakeholders.\n\
    •\nJudgement made on the significance or importance of mission statements.\nAccept\
    \ all valid responses.\nAO1\n2\nAO2\n2\nAO3\n2\nAO4\n6\n9609/01\nFor examination\n\
    SPECIMEN\b\nfrom 2023\nOR"
  mark_scheme: []
  graphics: []
