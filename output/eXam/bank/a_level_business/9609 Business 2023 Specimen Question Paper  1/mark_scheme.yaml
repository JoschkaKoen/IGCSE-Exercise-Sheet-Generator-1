- number: 1b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: "Explain one advantage to a business of data collected using\
    \ primary research methods.\nFollow the point-based marking guidance at the top\
    \ of this mark scheme and use Table B to give marks for each candidate\nresponse.\n\
    AO1 out of 1 mark.\nAO2 out of 2 marks.\nIndicative content\nResponses may include:\n\
    AO1 Knowledge and understanding\n•\nPrimary research methods produce first-hand\
    \ data directly related to the needs of a business.\n•\nAdvantage of primary data\
    \ which shows knowledge of the term.\n•\nMethod of primary research which shows\
    \ knowledge of the term.\nAO2 Application\n•\nPrimary research methods may produce\
    \ data that will be more up-to-date than data from secondary sources – may\ntherefore\
    \ be more useful to a business.\n•\nPrimary research methods may produce data\
    \ that will be more relevant to a business than secondary sources – data will\n\
    be collected for a specific business purpose.\n•\nA business has direct control\
    \ as opposed to secondary sources – over what and how data is collected using\
    \ primary\nresearch methods.\n•\nThe data collected will be confidential unlike\
    \ secondary sources – and can be hidden from competitors.\nAccept all valid responses.\n\
    3\nAO1\n1\nAO2\n2\n9609/01\nFor examination\nSPECIMEN\b\nfrom 2023"
  mark_scheme: []
