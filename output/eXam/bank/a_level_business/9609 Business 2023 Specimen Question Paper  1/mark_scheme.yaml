  mark_scheme_answer: "Explain one reason why a manufacturing business might take\
    \ measures to improve the sustainability of its\noperations.\nFollow the point-based\
    \ marking guidance at the top of this mark scheme and use Table B to give marks\
    \ for each candidate\nresponse.\nAO1 out of 1 mark.\nAO2 out of 2 marks.\nIndicative\
    \ content\nResponses may include:\nAO1 Knowledge and understanding\n•\nThe identification\
    \ of one appropriate reason why a manufacturing business might take measures to\
    \ improve the\nsustainability of its operations, e.g. to improve company image,\
    \ to access new markets, happier workforce, avoid\npressure group activity, responding\
    \ to legal controls.\nAO2 Application\n•\nTo improve company image more people\
    \ are becoming willing to value sustainable business activities – and to value\
    \ and\nsupport eco-friendly practices, e.g. green consumerism.\n•\nTo gain access\
    \ to new markets where for example governments give preferential treatment to\
    \ businesses –\ndemonstrating sustainable practices, e.g. renewable energy.\n\
    •\nA happier and more productive workforce and a potentially more productive one\
    \ once a business has become greener\nand cleaner – using practices, e.g. responsible\
    \ disposal of waste.\nAccept all valid responses.\n3\nAO1\n1\nAO2\n2\n9609/01\n\
    For examination\nSPECIMEN\b\nfrom 2023"
  mark_scheme: []
  graphics: []
