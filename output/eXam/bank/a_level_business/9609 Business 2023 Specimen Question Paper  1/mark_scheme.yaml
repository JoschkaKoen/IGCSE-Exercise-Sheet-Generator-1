  mark_scheme_answer: "Analyse two possible disadvantages to a business of using performance-related\
    \ pay to motivate its employees.\nUse Table D to mark each candidate response.\n\
    AO1 out of 2 marks.\nAO2 out of 2 marks.\nAO3 out of 4 marks.\nIndicative content\n\
    Responses may include:\nAO1 Knowledge and understanding\n•\nPerformance-related\
    \ pay (PRP) links salaries/wages to an assessment of performance measured against\
    \ pre-agreed\nperformance criteria.\n•\nPRP may set non-achievable targets.\n\
    •\nMay lead to conflict between employees.\nAO2 Application\n•\nOften used to\
    \ remunerate employees whose output is not measurable in quantitative terms such\
    \ as management/\nsupervisory/clerical posts.\n•\nAn optional reward/motivation\
    \ method for employees who are considered to have given exceptional performance.\n\
    AO3 Analysis\n•\nFor some employees PRP is seen as a device to intensify work\
    \ demands, increase productivity leading to worker\nexploitation and high stress.\n\
    •\nIt can lead to rifts and divisions in teams if some are not included in a PRP\
    \ scheme – they will feel their work is less\nvalued.\n•\nThere are problems in\
    \ deciding how to measure ‘above average’ performance – employees’ views will\
    \ differ from\nmanagers’ views.\n•\nPRP can put power into the hands of managers\
    \ leading to favouritism or discrimination.\n•\nIt requires detailed information\
    \ about employees and their jobs.\nAccept all valid responses.\n8\nAO1\n2\n9609/01\n\
    For examination\nSPECIMEN\b\nfrom 2023\nAO2\n2\nAO3\n4"
  mark_scheme: []
  graphics: []
