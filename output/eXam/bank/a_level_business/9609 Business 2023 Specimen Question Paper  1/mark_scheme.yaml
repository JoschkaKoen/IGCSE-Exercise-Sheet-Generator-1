  mark_scheme_answer: "Define the term ‘zero budgeting’.\nFollow the point-based marking\
    \ guidance at the top of this mark scheme and use Table A to give marks for each\
    \ candidate\nresponse.\nAO1 out of 2 marks.\nIndicative content\nResponses may\
    \ include:\nAO1 Knowledge and understanding\n•\nAn approach to budgeting that\
    \ sets budgets to zero each year – not from the current year’s levels.\n•\nRequires\
    \ budget holders to justify their budgets each year – in order to gain financial\
    \ resources.\nAccept all valid responses.\n2\n9609/01\nFor examination\nSPECIMEN\b\
    \nfrom 2023"
  mark_scheme: []
