  mark_scheme_answer: "Analyse two reasons why it is important for a business to set\
    \ SMART objectives.\nUse Table D to mark each candidate response.\nAO1 out of\
    \ 2 marks.\nAO2 out of 2 marks.\nAO3 out of 4 marks.\nIndicative content\nResponses\
    \ may include:\nAO1 Knowledge and understanding\n•\nAn objective is a statement\
    \ of what a business hopes to achieve.\n•\nSMART is an acronym used as a guide\
    \ for setting objectives.\n•\nIt has come to mean objectives that are:\nSPECIFIC\n\
    MEASURABLE\nACHIEVABLE\nREALISTIC\nTIME-LIMITED.\nAO2 Application\n•\nSMART is\
    \ considered to be an effective business tool and helps to measure business performance.\n\
    •\nIt provides the clarity, focus, and motivation that is required if business\
    \ goals are to be met.\nAO3 Analysis\n•\nEffective business decisions require\
    \ SMART objective setting to allow business to measure whether it has met its\
    \ original\nobjectives.\n•\nA SPECIFIC approach requires objective setters to\
    \ ask the correct questions: what needs to be accomplished in this\nbusiness,\
    \ why it is important, what resources are involved.\n•\nA focus on a MEASURABLE\
    \ approach focusses on questions such as when it will be accomplished, so that\
    \ progress can\nbe tracked and assessed and deadlines reached.\n•\nA focus on\
    \ ACHIEVABLE drives attention to resource usage, affordability, and a recognition\
    \ of constraints.\n8\n9609/01\nFor examination\nSPECIMEN\b\nfrom 2023\n•\nA concern\
    \ with REALISTIC asks whether the timing is right and the conditions in the external\
    \ environment are\nappropriate.\n•\nTIME-LIMITED provides discipline and ensures\
    \ that short-term tasks do not take priority over longer term-objectives.\n•\n\
    Could SMART become inflexible and stifle creativity?\nAccept all valid responses.\n\
    AO1\n2\nAO2\n2\nAO3\n4"
  mark_scheme: []
  graphics: []
