  mark_scheme_answer: "‘The most important role of human resource management (HRM)\
    \ in a fast food restaurant is to maintain a high level\nof employee morale and\
    \ welfare.’\nEvaluate this view.\nUse Table E to mark each candidate response.\n\
    AO1 out of 2 marks.\nAO2 out of 2 marks.\nAO3 out of 2 marks.\nAO4 out of 6 marks.\n\
    Indicative content\nResponses may include:\nAO1 Knowledge and understanding\n\
    •\nHRM function is to plan, recruit and develop the workforce in order to achieve\
    \ business objectives.\n•\nHRM includes a wide range of activities such as recruitment,\
    \ training, motivation, contracts of employment, morale and\nwelfare.\n•\nThe\
    \ emphasis in recent times is on morale and welfare, safety, working conditions\
    \ and job satisfaction of employees.\n•\nMorale includes the emotions, attitudes\
    \ and overall outlook of employees; welfare is anything that makes the workplace\n\
    more congenial and healthy.\nAO2 Application\n•\nMorale and welfare increasingly\
    \ seen as a vital part of HRM responsibility and particularly important to a service\
    \ business\nlike a fast food restaurant.\n•\nQuicker and more efficient customer\
    \ service from employees who consider their morale and welfare is being supported.\n\
    •\nTraditionally fast food industry has high level of turnover and often low job\
    \ satisfaction.\n12\n9609/01\nFor examination\nSPECIMEN\b\nfrom 2023\nAO3 Analysis\n\
    •\nIncreasing morale and welfare is an important HRM function as it can increase\
    \ job satisfaction, labour productivity and\nreduce labour turnover.\n•\nHRM contributes\
    \ to employee morale and welfare when it efficiently and effectively carries out\
    \ any responsibility in\nrespect of the workforce – by, for example, administering\
    \ an equitable remuneration system or providing appropriate\ntraining courses.\n\
    •\nHRM is responsible for workforce planning and if this is poorly done then business\
    \ efficiency will decline – e.g. too many\nor too few employees.\n•\nHRM is responsible\
    \ for recruitment and selection of employees and this is important as employees\
    \ need to be suited to\nthe work.\n•\nHRM might well provide support and advice\
    \ for staff with personal problems such as achieving a more sensible work-life\n\
    balance.\n•\nHRM might ensure that policies on equality and diversity are fit\
    \ for purpose.\n•\nHRM may see employee morale and welfare as a primary concern\
    \ for an outward facing business such as a fast food\nrestaurant.\nAO4 Evaluation\n\
    •\nThe importance of the involvement of HRM in issues relating to employee morale\
    \ and welfare may well depend on the\ntype of business and the maturity of that\
    \ business.\n•\nThere may be more pressing short-term problems facing HRM that\
    \ might be more important such as skills shortages or\nindustrial relations challenges.\n\
    •\nThe resolution of such problems will likely assist in improving general morale\
    \ and welfare issues.\n•\nSuggestions may be made that some of the more specific\
    \ responsibilities of HRM are more important than the pursuit of\nsuch nebulous\
    \ concepts as employee morale and welfare.\n•\nKeeping costs low might be more\
    \ important than employee morale and welfare.\n•\nIn fast food restaurants building\
    \ teamwork is important but there is also a need to follow rigid production processes.\n\
    •\nJudgement made on whether maintaining morale and welfare of employees is the\
    \ most important role of HRM.\nAccept all valid responses.\nAO1\n2\nAO2\n2\nAO3\n\
    2\nAO4\n6"
  mark_scheme: []
  graphics: []
