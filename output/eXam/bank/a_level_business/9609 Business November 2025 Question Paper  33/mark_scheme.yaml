  mark_scheme_answer: 'Evaluate LBM’s decision to go ahead with the hot water test
    mine.

    Leve

    l

    AO1 Knowledge

    and understanding

    2 marks

    AO2 Application

    2 marks

    AO3 Analysis

    2 marks

    AO4 Evaluation

    6 marks

    3

    5–6 marks

    Developed evaluation in context

    •

    A developed judgement/conclusion

    is made in the business context.

    •

    Developed evaluative comments

    which balance some key

    arguments in the business context.

    2

