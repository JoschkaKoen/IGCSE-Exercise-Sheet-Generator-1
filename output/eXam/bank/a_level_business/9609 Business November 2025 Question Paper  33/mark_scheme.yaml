    Responses may include:

    AO1 Knowledge and understanding

    •

    Understanding of ‘hard HRM:

    –

    viewing employees as a inputs for the business, close monitoring, and control,
    training to improve business

    performance, little delegation of decision making.

    –

    leadership style likely to be autocratic

    –

    power for leader comes from rewards, position or coercion.

    –

    little space for emotional intelligence.

    –

    One-way formal communication (top down)

    •

    Understanding of ‘soft’ HRM: employees are individuals, to be developed, e.g.
    by appraisal and training, consultation

    and delegated decision making.

    –

    leadership style likely to be democratic or laissez-faire.

    –

    leader likely to use contingency leadership

    –

    power for leader comes from expertise, information or charisma.

    –

    transformational leadership possible.

    –

    emotional intelligence employed.

    –

    Two-way communication, possibly informal.

    AO2 Application

    Limited application,

    applies knowledge to LBM once.

    Developed application,

    +

    applies knowledge to LBM twice.

    Application is making use of relevant case information not just repeating it.

    •

    Soft HRM is used for the 35 graduate employees.

    •

    These graduates have delegated powers and decide their own work patterns (autonomy).

    •

    Graduates are involved in R&D, mapping technology, and developing techniques.

    •

    Hard HRM is used for the 150 new machine operators at the hot water mine.

    •

    These new employees are closely supervised by ten technology specialists.

    9609/33

    October/November 2025

    5

    AO3 Analysis

    Limited analysis

    – candidate shows one link in the chain of analysis.

    Developed analysis

    – candidate shows two or more links in the chain of analysis.

    •

    changing HRM approaches takes time and cost to plan details.

    •

    Using Soft HRM for graduates increases their motivation and creativity, which
    is crucial for maximizing the efficiency of

    mapping technology and generating innovative mining techniques

    , thereby increasing LBM''s competitiveness

    .

    •

    Small number of graduate employees should be easy to manage and soft approach
    will reuce need for middle

    management

    therefore reducing costs

    .

    •

    Hard HRM focuses on tight control and efficiency for the 150 machine operators.
    This approach ensures

    standardisation and low labour costs,

    which is important for LBM, as it is currently an unprofitable company

    .

    •

    The stark difference in treatment (delegation vs. close supervision) risks creating
    resentment and conflict between the

    two groups, potentially leading to poor morale

    and resistance among the machine operators, threatening

    operational stability

    .

    •

    Production requires clearly defined tasks so more control/autocracy can be more
    efficient

    .

    •

    Very tight time scale for hard rock project means HRM changes must be well planned

    AO4 Evaluation

    Limited evaluation

    – limited supported judgement and/or a weak attempt at evaluative comment.

    Developed evaluation

    – supported judgement and/or reasonable evaluative comment.

    Developed evaluation in context

    – supported judgement in context and/or reasonable evaluative comment in

    context.

    •

    Supported judgement as to the likely effectiveness of the approach.

    •

    The decision to use dual approaches is largely appropriate because the nature
    of the jobs is vastly different (creative

    R&D vs. standardised machine operation). The soft approach is essential for knowledge
    workers (graduates) to foster

    innovation, while the hard approach is effective for large groups performing repetitive
    tasks in a controlled industrial

    environment like a mine.

    9609/33

    October/November 2025

    5

    •

    Factors that the impact might depend on:

    –

    The degree of separation between the two employee groups;

    –

    LBM’s ability to minimise perceived unfairness;

    –

    the specific skills required by the machine operators (if tasks are complex, hard
    HRM may lead to high error rates

    and reduced quality).

    –

    Can LBM afford to change? In time for recruiting and starting production?

    •

    The decision is strategically sound but requires careful management. LBM must
    ensure communication and

    compensation systems do not exacerbate the cultural divide, or the benefits of
    high R&D output might be negated by

    industrial relations problems at the mine site.

    Accept all valid responses

    Exemplar L3 Evaluation

    The decision to use two different approaches is strategically sound and appropriate
    because it matches the HRM approach

    to the specific needs of each job role (innovation for R&D vs. control for operations).

    LBM’s dual HRM strategy is necessary for functional efficiency but dangerous for
    internal culture. The success of this

    decision is conditional upon management (led by Astor) successfully mitigating
    the risk of conflict. LBM must invest in

    transparent communication explaining why the roles are managed differently and
    ensure that the machine operators feel

    valued through factors other than autonomy, such as fair compensation or training
    opportunities, to prevent internal

    dissatisfaction from undermining the profitability of the new mine'
