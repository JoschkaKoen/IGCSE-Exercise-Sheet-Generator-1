    that identifies

    connections

    between causes,

    impacts and/or

    consequences.

    3–4 marks

    Developed evaluation

    •

    A developed judgement/conclusion

    is made.

    •

    Developed evaluative comments

    which balance some key

    arguments.

    Responses may include:

    AO1 Knowledge and understanding

    •

    Understanding of the use of investment appraisal – payback period, NPV including
    advantages (quantitative, based on

    data, NPV factors in time value,) and disadvantages (predictions may be inaccurate
    as circumstances change, false

    sense of accuracy, providers of data may be biased and provide misleading data).

    •

    Qualitative factors in investment decisions include:

    •

    Attitude to risk.

    •

    Impact on stakeholders e.g. environmental/social considerations, future economic
    changes.

    •

    How well the project fits the business objectives.

    AO2 Application

    Limited application,

    applies knowledge to LBM once.

    Developed application,

    +

    applies knowledge to LBM twice.

    Application is making use of relevant case information not just repeating it.

    •

    Quantitative results (Payback 5 years 1 month; NPV –$3.48m over 6 years).

    •

    Project life span is 15 years, but cash flows are only appraised for 6 years.

    •

    LBM has strict finance limitations (no adverse variances allowed).

    •

    The project has local opposition.

    •

    The hot water extraction process allows water to be used for heating local housing.

    •

    LBM is currently losing $2–3 million per year.

    •

    Estimated 15 year life span.

    •

    Uncertain forecasting beyond six years.

    •

    Non-inclusion of data relating to possible extraction of other metals.

    •

    Objective of LBM is to produce lithium.

    •

    Decreasing supply/demand gap (after 2030 demand>supply).

    •

    LBM only producer in country G.

    •

    Test mine is the first project, next is hard rock mining.

    •

    Government concerned to get lithium production in country G,

    •

    LBM has the finance.

    9609/33

    October/November 2025

    AO3 Analysis

    Limited analysis

    – candidate shows one link in the chain of analysis.

    Developed analysis

    – candidate shows two or more links in the chain of analysis.

    •

    The negative NPV (-$3.48m) over six years suggests the project does not cover
    its costs of capital and should be

    rejected

    , thus ensuring LBM does not deepen its existing losses

    .

    •

    The project lifespan is 15 years, and the uncounted positive cash flows in Years
    7–15, coupled with rapidly rising global

    demand for lithium, could lead to a highly positive overall NP

    , significantly increasing future revenue

    .

    •

    If LBM experiences adverse variances, they may run out of finance, leading to
    project failure

    and a loss of the large

    initial investment ($200m + $120m)

    .

    •

    The dual benefit of extraction and heating local housing may satisfy social objectives
    and reduce local opposition

    ,

    thereby lowering the risk of delays

    .

    •

    Learning from this project will enhance performance in future projects, therefore
    increasing the likely success of the

    hard rock mining project

    •

    The price of lithium is likely to continue to rise resulting in higher revenues
    in years 7–15

    .

    •

    Other producers may appear causing lower lithium prices and therefore reduce forecast
    net cash flows

    .

    •

    If other metals can be recovered the revenue figures may be higher than forecast

    .

    AO4 Evaluation

    Limited evaluation

    – limited supported judgement and/or a weak attempt at evaluative comment.

    Developed evaluation

    – supported judgement and/or reasonable evaluative comment.

    Developed evaluation in context

    – supported judgement in context and/or reasonable evaluative comment in

    context.

    •

    Supported judgement as to whether LBM should proceed.

    •

    Quantitative investment appraisal indicates the decision is unwise as NPV is negative
    but likely positive ARR, and NPV

    very close to zero mean qualitative factors may be more important.

    •

    Factors that decision might depend on:

    –

    Reliability of the estimated cash flows for the remaining 9 years;

    –

    LBM’s willingness to accept high financial and operational risk (local opposition,
    tight budget);

    –

    the importance of social benefits (heating local housing) versus financial return.

    –

    Accuracy of the discount factor and forecast cash flow. In the changing lithium
    market the indicators are that they

    are possibly neither, but the most likely possibility is that revenues will be
    higher than forecast.

    9609/33

    October/November 2025

    •

    the risk appears to be low and the finance is available.

    •

    If LBM does not go ahead, it is likely to go out of business due to increasing
    losses.

    •

    The decision is highly subjective due to high uncertainty beyond Year 6. Given
    that LBM is currently unprofitable and

    operates with tight funding, the negative NPV indicates high risk. However, strategically,
    LBM must establish mining

    operations to leverage the rapid revenue forecast.

    •

    The project should probably be delayed or redesigned until LBM can secure sufficient
    finance to absorb potential

    adverse variances and until a more reliable long-term forecast can demonstrate
    a clearly positive NPV over the full 15

    years

    Accept all valid responses

    Exemplar L3 Evaluation

    The decision hinges on LBM’s risk tolerance and belief in the long-term forecast.
    While the negative NPV over the

    appraised period suggests that rejecting the project would be financially prudent
    for a company currently operating at a

    loss, strategically, LBM must establish mining operations to survive and capture
    future revenue.

    However, the decision is contingent on securing a buffer of finance to tolerate
    adverse variances. Given the extremely tight

    financial limitations, LBM should consider conducting a sensitivity analysis on
    the cash flows for years 7–15 to demonstrate

    that the strategic gain outweighs the immediate financial risk. If LBM cannot
    demonstrate a substantial expected NPV over

    the full 15 years, or if the tight budget cannot be loosened, the project should
    be delayed until funding is more secure to

    protect the business from insolvency.

    9609/33

    October/November 2025'
