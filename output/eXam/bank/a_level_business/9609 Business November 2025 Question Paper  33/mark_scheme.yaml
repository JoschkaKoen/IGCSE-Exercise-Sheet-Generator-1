    Responses may include:

    AO1 Knowledge and understanding

    Limited knowledge

    will be demonstrated through knowledge of CPA.

    Developed knowledge

    +

    will be demonstrated through knowledge of CPA and its usefulness.

    •

    Knowledge of CPA: network, EST, LFT, floats, nodes, minimum duration, critical
    path.

    •

    Benefits of CPA: calculation of project duration

    –

    knowing when activities should start

    –

    knowing latest finish times

    –

    knowing critical path

    –

    knowing floats.

    •

    Limitations of CPA:

    –

    analysis only as good as the data.

    –

    new projects may not have past experience as a guide

    –

    planning costs.

    –

    does not ensure effective management.

    •

    Knowledge of other factors: availability of finance, materials and equipment.

    •

    Investment appraisal methods also needed to assess financial criteria for success.

    •

    Business objectives matching project aims.

    AO2 Application

    Limited application,

    applies knowledge to LBM once.

    Developed application,

    +

    applies knowledge to LBM twice.

    Application is making use of relevant case information not just repeating it.

    •

    Hard rock mine follows the hot water mine, which will be nearing completion of
    building and about to start production.

    •

    need to buy equipment for drilling and factory.

    •

    data for CPA from partners, suppliers and R and D.

    •

    Minimum project duration is just over two years.

    •

    CPA relates to the complex sequence of activities (A to H) involved in establishing
    the hard rock mine.

    •

    The planned start of the mine is in two years’ time (104 weeks), but the calculated
    duration is 115 weeks.

    •

    CPA uses data obtained from mining industry sources and the LBM Research and Development
    (R&D) team.

    •

    Lithium is found 500 metres underground.

    •

    Activity C (Obtain drilling machinery) has 15 weeks of float.

    9609/33

    October/November 2025

    AO3 Analysis

    Limited analysis

    – candidate shows one link in the chain of analysis.

    Developed analysis

    – candidate shows two or more links in the chain of analysis.

    •

    CPA identifies the critical activities (A-H route through nodes 1–2-4–5–7–8, for
    example) which, if delayed, will delay

    the whole project duration. This allows LBM, a new mining operator, to focus its
    limited resources and management

    supervision on these tasks

    , thereby preventing cost overruns

    .

    •

    CPA reveals that the current duration (115 weeks) already exceeds the planned
    start time (2 years/104 weeks). This

    forces LBM to find ways to shorten the duration to meet the original target

    , maximising early revenue generation

    .

    •

    The calculation of float (e.g., 15 weeks for activity C) enables Astor to reallocate
    resources away from non-critical tasks

    to critical ones

    , helping to reduce the overall project duration and improving efficiency

    .

    •

    As this is the first mining activity for LBM there is no past experience to rely
    on therefore the data may be inaccurate

    AO4 Evaluation

    Limited evaluation

    – limited supported judgement and/or a weak attempt at evaluative comment.

    Developed evaluation

    – supported judgement and/or reasonable evaluative comment.

    Developed evaluation in context

    – supported judgement in context and/or reasonable evaluative comment in

    context.

    •

    Supported judgement as to the importance of CPA.

    •

    CPA is highly important for the success of the hard rock mine because the project
    is complex and already forecasted to

    be delayed (115 weeks vs 104 weeks goal). CPA provides the necessary planning
    and monitoring framework to

    potentially shorten this delay and secure timely revenue.

    •

    Factors that the impact might depend on:

    –

    CPA relies entirely on the accuracy of time estimates provided by the R&D team
    and suppliers. If these estimates

    are inaccurate (e.g., optimistic), the critical path may be wrong, leading LBM
    to misallocate resources and still fail

    to achieve the minimum duration.

    •

    CPA must be continuously monitored and updated as the project progresses to account
    for unexpected operational

    difficulties (e.g., drilling 500m underground).

    •

    Project success also depends on availability of finance, equipment and appropriate
    employees. Without them the

    project is less or not likely to succeed.

    9609/33

    October/November 2025

    Accept all valid responses

    Exemplar L3 Evaluation

    The benefit of CPA is limited by its reliance on assumptions. CPA’s success depends
    entirely on the accuracy of the time

    estimates for activities like D (Install drilling machinery) and E (Test drill
    exercise), which were obtained from mining

    industry sources and the LBM Research and Development (R&D) team. Since LBM is
    a new operator in Country G, and the

    scale of this project (drilling 500 m) is complex, these estimates may be overly
    optimistic or inaccurate. If the critical path

    calculation is flawed, LBM might misallocate resources, potentially causing unnecessary
    delays in the 115-week plan or

    wasting scarce finance.

    9609/33

