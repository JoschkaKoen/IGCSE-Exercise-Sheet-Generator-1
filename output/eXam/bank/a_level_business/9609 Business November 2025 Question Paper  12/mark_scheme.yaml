  mark_scheme_answer: 'Define the term break-even analysis

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding

    CLEAR UNDERSTANDING (2 marks)

    •

    The point where total revenue equals total costs/or where a business makes neither
    a profit nor a loss (2)

    •

    Using cost and revenue data to determine the level of output that needs to be
    reached to start making a profit (2)

    •

    Uses cost and revenue data to determine the break-even level of output (2)

    •

    Uses cost and revenue data to calculate the margin of safety (2)

    Clear understanding of the term (or similar) is worth 2 marks. This is indicated
    by 2 ticks

    PARTIAL UNDERSTANDING (1 mark)

    •

    A way to calculate profitability/or decide on output (1)

    •

    Used to determine break-even point (1)

    •

    Allows calculation of margin of safety (1)

    Partial understanding of the term (or similar) is worth 1 mark. This is indicated
    by 1 tick

    Accept all valid responses

    2

    9609/12

    October/November 2025'
