  mark_scheme_answer: 'Analyse two benefits to a business of product portfolio analysis.

    THERE ARE 8 MARKS IN TOTAL FOR Question 6(a) – 4 marks for each BENEFIT given
    – 1 mark for knowledge and

    understanding – 1 mark for application/context – 2 marks for analysis

    Question 6(a) should be annotated as follows:

    K

    put a tick in body of answer where a BENEFIT is given and annotate K in left hand
    margin

    APP put a tick in body of answer where the BENEFIT is applied/explained and annotate
    APP in left hand margin

    AN

    put up to 2 ticks in body of answer where a BENEFIT is analysed and annotate in
    left hand margin – L2 AN

    for DEVELOPED analysis or L1 AN for LIMITED analysis

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding – 1 mark for each identified benefit – put ticks
    in body of script and annotate

    by putting K in left hand margin

    •

    Allows the business to analyse and assess the range of different products currently
    produced by a business

    •

    Can see and review the allocation of resources between them.

    •

    Can provide important information about the strengths/weaknesses of particular
    products

    •

    Allows a business to measure how each product contributes to total business performance

    •

    Product portfolio information may well attract additional investment

    •

    Allows a business to adapt its products to different customer needs

    •

    Helps a business identify suitable target segments for its products

    •

    Reduces risk

    8

    9609/12

    October/November 2025

    AO2 Application – 1 mark for application/explanation of each identified benefit

    •

    Provides information on each product, such as market growth, market share, growth
    prospects, profit margin drivers,

    income contributions, market leadership and operational risks and opportunities

    •

    This analysis is an informative tool giving insight into product operations and
    provides information and analysis for

    strategic decisions on the retention or change in the product portfolio

    •

    Can provide information relating to specific products and so indicate what changes
    may be required in pricing,

    marketing, composition.

    AO3 Analysis – 2 marks for DEVELOPED analysis of each identified benefit

    – 1 mark for LIMITED analysis of each identified benefit

    •

    It assists a business in deciding when to launch a new product, update an existing
    one, or stop producing a particular

    product – data provided for product portfolio management, e.g. use of Boston Matrix.

    •

    In combination with product life cycle, framework offers information and analysis
    for resource allocation decisions.

    •

    The pursuit of a balanced product portfolio is assisted by this analysis and a
    business can determine if its investment in

    products aligns with its business strategy.

    •

    It gives a business a measure of control over its cashflow – see which products
    generate most revenue – allowing

    focus on products that most help with the cashflow – ensures the business has
    money needed to operate the business

    and create more products.

    •

    Product portfolio analysis can generate ideas about new opportunities – generate
    innovation leading to a more

    diversified portfolio – spreading business risk.

    •

    Identifies gaps in the existing portfolio and reveal new business opportunities.

    •

    It can stimulate management to, for example, offer a wider array of products to
    various target markets and so earn a

    higher market share, increase sales, and contribute to brand awareness.

    •

    It may suggest that particular products need taking out of the current portfolio

    Accept all valid responses.

    9609/12

    October/November 2025'
