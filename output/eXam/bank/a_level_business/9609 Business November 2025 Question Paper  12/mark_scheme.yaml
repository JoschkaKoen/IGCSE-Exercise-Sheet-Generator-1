  mark_scheme_answer: 'Analyse two benefits to a business of using an internal source
    of finance for business growth.

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding – 1 mark for each identified benefit

    •

    May be readily and speedily available

    •

    Will not increase business debt - gearing ratio unaffected

    •

    Will not need repayment planning

    •

    Will not require interest payments - low cost

    •

    Will not lose any control over the business

    •

    AO2 Application 1 mark for application/explanation of each identified benefit

    •

    A business will avoid lengthy and costly applications for external finance

    •

    Allows a business to focus on core competencies

    •

    Avoids possible external interference of the business.

    •

    Shareholders cannot influence business decisions

    AO3 Analysis – 2 marks for DEVELOPED analysis of each identified benefit

    – 1 mark for LIMITED analysis of each identified benefit

    The benefits of using internal sources of finance may include:

    •

    Internal sources may mean lower costs of finance – the avoidance of loan, overdraft,
    credit card interest/fees.

    •

    No interference by external investors, meaning owners can focus on original objectives

    •

    No delay in acquiring the finance – waiting for approval could mean loss of business
    opportunities – no wait for credit

    reports – supports quick decisions.

    •

    No requirement for collateral when using internal resources – simplified finance
    acquisition.

    •

    Business avoids taking on any further legal obligations associated with external
    sources of finance – another indicator

    of internal control and independence.

    Accept all valid responses.

    8

    9609/12

    October/November 2025'
