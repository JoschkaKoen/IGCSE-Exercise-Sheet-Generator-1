  mark_scheme_answer: 'Analyse one reason why a business might hold low levels of
    inventory.

    NOTE: No marks can be awarded if a valid reason is not given.

    Indicative content.

    Responses may include:

    AO1 Knowledge and understanding – 1 mark for identifying ONE reason why a business
    might hold low levels of

    inventory

    •

    A business needs to avoid too high costs

    •

    Low inventory levels avoid many costs

    •

    Business may not afford high levels of inventory

    •

    Business operating JIT – no need for inventory

    •

    Concern for cash flow management

    •

    Concern for high profit

    •

    Avoiding waste

    5

    9609/12

    October/November 2025

    4

    AO2 Application – 2 marks for DEVELOPED application/explanation of ONE reason-put
    ticks in body of script.

    – 1 mark for LIMITED application/explanation of ONE reason – put tick in body
    of script.

    •

    Too high costs include storage damage, theft, costs

    •

    Businesses may be able to avoid these costs

    •

    Opportunity cost possibilities

    •

    Low inventory costs provide business flexibility

    •

    Some businesses may have little choice of high or low inventories

    •

    Perishable goods become out of date

    AO3 Analysis – 2 marks for DEVELOPED analysis of ONE reason – put ticks in body
    of script

    – 1 mark for LIMITED analysis of ONE reason – put tick in body of script.

    •

    The avoidance of costs involved in holding high levels – storage costs – obsolescence
    costs – spoilage, theft, damage,

    shifts in demand etc.

    •

    Opportunity cost of high levels – limitation of business flexibility.

    •

    Less pressure on cash flow and profitability.

    •

    Business might be involved in specialised work requiring only low levels of inventory.

    •

    Business (new)might only be able to afford a low level of inventory.

    •

    JIT inventory opportunities may exist that allows low levels to be carried.

    •

    Wasted goods have to be thrown away costing money and reducing profit

    Accept all valid responses.

    9609/12

    October/November 2025'
