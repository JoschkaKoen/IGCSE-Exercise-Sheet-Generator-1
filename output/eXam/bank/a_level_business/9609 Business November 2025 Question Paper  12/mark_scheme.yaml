  mark_scheme_answer: 'Define the term triple bottom line.

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding

    CLEAR UNDERSTANDING (2 marks)

    •

    Triple bottom line refers to three factors 1 – economic/profit 2 – social/people
    3 – environment/planet (2 marks)

    Clear understanding of the term (or similar) is to be awarded 2 marks. This is
    indicated by 2 ticks

    PARTIAL UNDERSTANDING (1 mark)

    •

    Refer to one or two of the 3 factors/social welfare as a business objective/there
    are 3 factors affecting business

    operations (without explanation)/a business not just concerned with profit (1
    mark)

    A partial understanding of the term (or similar) is to be awarded 1 mark. This
    is indicated by 1 tick

    Accept all valid responses.

    2

    9609/12

    October/November 2025'
