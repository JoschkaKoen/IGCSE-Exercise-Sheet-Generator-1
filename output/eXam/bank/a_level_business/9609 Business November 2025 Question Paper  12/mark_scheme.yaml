  mark_scheme_answer: 'Evaluate whether branding is the most important factor in the
    successful promotion of a new health drink.

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding – 2 marks for DEVELOPED knowledge L2 K and 1 mark
    for LIMITED knowledge

    L1 K – put ticks in body of answer and annotate in left hand margin,

    •

    Branding – a set of associations customers make with a business, product or organisation
    – the establishment of an

    image that stimulates sustained customer buying behaviour.

    •

    Product promotion – a form of marketing to create interest, to capture a target
    audience’s attention – a set of activities

    focused on spreading information about products among prospective buyers in a
    market.

    •

    Examples of promotional activities

    AO2 Application – 2 marks for DEVELOPED application/context L2 APP, 1 mark for
    LIMITED application/context L1

    APP, put ticks in body of answer and annotate in left hand margin.

    •

    Identify and market the nutritional value of the new health drink

    •

    Emphasis on absence of certain ingredients – reduced level of salt, sugar, caffeine

    •

    Emphasis on ingredients such as fruit, antioxidants, vitamins, mineral proteins

    •

    Green tea, smoothies, coconut water, pomegranate juice

    •

    A drink that claims to be beneficial to health – e.g. with specific ingredients
    such as certain vitamins, or a drink that has

    a reduced amount of potentially harmful substances, such as too much sugar, energy
    drink

    •

    Appropriate market segments for health drinks, e.g. gym users, fitness addicts,
    elderly people.

    12

    9609/12

    October/November 2025

    AO3 Analysis – 2 marks for DEVELOPED analysis L2 AN, 1 mark for LIMITED analysis
    L1 AN, put ticks in body of

    answer and annotate in left hand margin.

    Branding is said to be important for the promotion of all products for the following
    reasons:–

    •

    Branding provides visibility and leads to a strong connection between product
    and customer-buying behaviour.

    •

    A branded product promotes customer loyalty – when customers can put a name or
    logo with a product, they will often

    return to that product over and over again.

    •

    Once a product becomes recognisable through branding and a household name, trust
    is built and confidence in the

    product, which can make it easier to promote that product.

    •

    Branding motivates people to buy – when people see a brand they may well feel
    the product is well developed and put

    together, whereas they might shy away from a nameless generic-looking product.

    •

    To many, branding means reliability – such a recognised and expected brand culture
    supports effective promotion.

    •

    Branding can create an emotional connection with buyers – learnt over many years
    through socialisation.

    •

    Branding can give products a competitive edge – add value to an offer through
    an outstanding logo.

    •

    Analysis might well refer to brands such as Coca Cola – a global brand, youthful,
    refreshing, energetic – visual images

    such as red and white logo, corporate colours, unique shape of original bottle
    and its secret recipe.

    9609/12

    October/November 2025

    AO4 Evaluation – Up to 6 marks for evaluation EVAL – USE THE FOLLOWING TABLE

    Developed/Supported judgement in context

    6 marks

    Developed/Reasonable evaluative comments in context

    5 marks

    Developed/Supported judgement without context

    4 marks

    Developed/Reasonable evaluative comments without context

    3 marks

    Limited supported judgement

    2 marks

    An attempt to balance the arguments/Weak attempt at evaluative comments

    1 mark

    •

    Judgements/conclusions/critical comments can be made at any point in an essay
    – not just in a concluding section.

    •

    Branding can be very significant and important in promoting a product, but brands
    can have negative images, e.g.

    Coca Cola seen by many as an unhealthy drink and a global symbol of imperialism.

    •

    A new health drink may well benefit significantly if developed or adopted by an
    established brand (in which there is

    confidence and trust).

    •

    Developing and establishing a brand can be very expensive and a lengthy process
    – may well not be afforded by a

    new/developing product or company.

    •

    Is price-led marketing breaking down the power and influence of a brand? – e.g.,
    discount retailers such as Aldi and

    Lidl.

    •

    Will the significance and importance of branding for the promotion of a new health
    drink vary in terms of whether it

    seeks to be a local or national or global product.

    •

    Might the extent and strength of scientific or medical approval for a new health
    drink be more important than branding?

    Accept all valid responses.

    9609/12

    October/November 2025

