  mark_scheme_answer: 'Explain one limitation for a business of break-even analysis.

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding – 1 mark for identifying ONE limitation for a
    business of break-even analysis –

    put tick in body of script.

    •

    Assumptions may well be unrealistic

    •

    May not be accurate

    •

    Can be time consuming – deflects a business away from core activities

    •

    External factors may undermine the calculations

    •

    Assumes all relationships are linear

    •

    Sales are unlikely to be the same as output

    •

    Variable costs do not always stay the same

    •

    Not all costs can be defined as fixed and variable

    •

    Most businesses sell more than one product

    AO2 Application – 2 marks for DEVELOPED explanation of ONE limitation – put ticks
    in body of script.

    – 1 mark for LIMITED explanation of a limitation – put tick in body of script.

    •

    Unrealistic assumptions – products are not sold at the same price at different
    levels of output, fixed costs do vary when

    output changes

    •

    The assumption that costs and revenue are always represented by straight lines
    is not realistic

    •

    Sales may not be the same as output – there may be some build-up of inventory
    or wasted output – the use of

    inventory is ignored

    •

    Variable costs may well change with output – as output rises the buying power
    of a business may allow buying of inputs

    at lower prices which reduces variable cost per unit

    3

    9609/12

    October/November 2025

    •

    Semi- variable costs will make the technique much more complicated

    •

    With more than one product the break-even for the business becomes harder to calculate

    •

    Break-even charts are only accurate with narrow levels of output – a significant
    change in output level may result in

    fixed costs changing – scope of analysis is limited

    •

    It is more of a planning aid than a decision-making tool.

    Accept all valid responses.'
