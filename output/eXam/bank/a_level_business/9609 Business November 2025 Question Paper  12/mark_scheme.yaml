  mark_scheme_answer: '‘The main reason why many small businesses fail is that they
    do not understand the difference between cash and

    profit’. Evaluate this view.

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding – 2 marks for DEVELOPED understanding L2 K and
    1 mark for LIMITED

    understanding – L1 K- put ticks in body of script and annotate in left hand margin.

    •

    Cash flows in and out of an operating business in a certain period of time - the
    life blood of an organisation

    •

    Profit is revenue less all the expenses of a business in a certain period of time

    •

    Business failure – reasons for this

    AO2 Application – 2 marks for DEVELOPED application L2 APP – 1 mark for LIMITED
    application L1 APP – put

    ticks in body of script and annotate in left hand margin.

    •

    Produce goods and services on a relatively small scale – often sole proprietorships,
    partnerships or family businesses.

    •

    High rate of small business failure in the early years of operation.

    •

    likely to have very limited resources (capital, cash, and personnel)

    •

    Inexperienced management/poor decision-making over a variety of areas – marketing,
    operations, finance – lack of

    competency

    •

    May lack resources to match efficiency of larger competitors …. no cash for operations
    or growth – no economies of

    scale

    •

    May have very small customer base – insufficient revenue

    •

    Often have inadequate business plans

    •

    Often do not see short term cash management and long-term profit maximisation
    as priorities

    •

    Microfinance may be available

    12

    9609/12

    October/November 2025

    AO3 Analysis – 2 marks for DEVELOPED analysis L2 AN and 1 mark for LIMITED analysis
    L1 AN – put ticks in

    body of script and annotate in left hand margin.

    •

    Failure to see that cash is not profit, and profit not cash means that businesses
    may be profitable but lack adequate

    cash flow.

    •

    A business may make a profit over the period of a year but report a shortage of
    cash in the accounts, resulting in an

    inability to pay taxes on the profit made – leading to failure (forced into administration
    by a government).

    •

    A business that generates profit while being cash negative may well not survive
    – a business that generates a lot of

    cash flow while remaining unprofitable may well survive – businesses need cash
    all the time and they can survive,

    even if they lack profit in the short term.

    •

    Profit is a necessity for business growth over the long term, but cash is necessary
    for company survival in the short

    term.

    •

    May well pursue profits in the short term in an effort to generate cash and neglect
    a focus on working capital

    •

    The cash flow of a business provides a good indicator of its financial health
    – the cash flow of a business is tied to its

    core operations and activities and requires an effective cash management policy
    to ensure that there is always

    sufficient cash available to pay core and regular expenses, such as employee remuneration
    and materials/supplies.

    9609/12

    October/November 2025

    AO4 Evaluation- up to 6 marks for evaluation – EVAL

    USE THE FOLLOWING TABLE:

    Developed/Supported judgement in context

    6 marks

    Developed/Reasonable evaluative comments in context

    5 marks

    Developed/Supported judgement without context

    4 marks

    Developed/Reasonable evaluative comments without context

    3 marks

    Limited supported judgement

    2 marks

    An attempt to balance the arguments/Weak attempt at evaluative comments

    1 mark

    •

    Any judgements/conclusions/critical comment may be made at any point in the essay
    and not just in a concluding

    section.

    •

    A judgement is made that a primary reason for small business failure is a lack
    of cash or working capital – caused by

    an inability to distinguish between cash and profit – a judgement supported by
    reasoned argument.

    •

    A judgement is made that while a lack of cash is a fundamental reason for small
    business failure, it is not the only

    reason – there are many possible reasons.

    •

    Some of the reasons adjudged to be significant, such as poor management and lack
    of an effective business plan, may

    actually lead to poor cash flow management.

    •

    Other reasons for small business failure suggested in an evaluative section could
    include such factors as a flawed

    business model, inadequate start-up capital, unsuccessful marketing, poor market
    research and a poor business

    strategy.

    Accept all valid responses.

    9609/12

    October/November 2025'
