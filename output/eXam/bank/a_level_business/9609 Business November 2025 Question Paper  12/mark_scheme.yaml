  mark_scheme_answer: 'Explain one advantage to a business of induction training.

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding – 1 mark for identifying ONE advantage to a business
    of induction training –

    put tick in body of script.

    •

    Gives confidence to new starter employees

    •

    Become familiar with role/purpose

    •

    Gives initial focus on business objectives/goals

    •

    Provides essential information about the business

    •

    Clarifies rights and responsibilities of employees

    •

    Prevents employees leaving

    •

    Learning essential new skills for the job

    AO2 Application – 2 marks for DEVELOPED explanation of ONE advantage – put ticks
    in body of script.

    – 1 mark for LIMITED explanation of an advantage – put tick in body of script.

    Impacts may include:

    •

    Ensures new hires feel welcome – removes anxiety and stress.

    •

    Provides knowledge and structure for new employees to settle in.

    •

    Indicates concern and support for employees – reciprocated by employees – job
    satisfaction and job performance.

    •

    Important elements of systems, procedures, values, culture, expectations clearly
    defined giving clarity and confidence

    to employees.

    •

    Leads to greater employee retention – greater integration into the business.

    •

    Ensures employees become more productive faster – provides appropriate skills

    •

    Reduces mistakes – reduces costs

    •

    Supports productivity and efficiency

    All such impacts can contribute to a healthy and productive business environment.

    Accept all valid responses

    3

    9609/12

