    – limited supported judgement and/or a weak attempt at evaluative comment

    Developed evaluation

    – supported judgement and/or reasonable evaluative comment

    Developed evaluation in context

    – supported judgement in context and/or reasonable evaluative comment in

    context.

    •

    A judgement about whether to invest in automation/process innovation.

    •

    Elements that the evaluation/judgement might depend on:

    If automation is used, then success greatly depends on increased demand.

    How flexible might the machine be in changing from one type of pie to another?

    How well does automation fit with the ‘social objectives’ of PPP’s employment
    practices?

    How important might the ‘handmade’ aspect of PPP’s pies be in marketing?

    •

    Other factors to consider e.g.

    NPV as this considers time value of money.

    Depends on availability of finance linked to relatively high gearing and interest
    rate.

    How long will it take to install the automated system?

    Will specialist IT employees be required and how expensive is that?

    Opportunity cost of this project.

    •

    Weighing up of the factors and their relative influence on PPP’s decision whether
    to invest in the new machine

    Accept all valid responses

