    impacts of process innovation.

    Knowledge of process innovation and its impacts

    Definition of process innovation: the move to new methods of production, in this
    case computer-controlled automation.

    Less labour required.

    Knowledge of factors in decision

    •

    Investment cost.

    •

    Availability of finance.

    •

    Impact on employees.

    •

    ARR and Payback results.

    •

    Technical economies of scale possible.

    •

    Reduction in average cost of production.

    •

    Impact on quality.

    AO2 Application

    Limited application,

    applies knowledge to PPP once.

    Developed application,

    +

    applies knowledge to PPP twice.

    •

    Payback of 3 years – within 4 years of estimated life.

    •

    Return of $800 000 over 4 year period.

    •

    ARR of 21.05%

    •

    Cost of machine $1 900 000

    •

    NCL are $6 million and gearing is 45%, total CE is therefore $13.3 million

    •

    Extra borrowing of $1.9 m would make gearing 7.9 / 15.2 = 51.97%

    •

    Pies have a shelf-life, therefore over-stocking inadvisable

    9609/31

    October/November 2025

    AO3 Analysis

    Limited analysis

    – candidate shows one link in the chain of analysis.

    Developed analysis

    – candidate shows two or more links in the chain of analysis.

    •

    Machine is costly, but the relatively high gearing of PPP increases risk of further
    borrowing

    causing cash flow

    problems for PPP

    especially if sales fail to increase at the same rate as capacity increase.

    •

    Employee training to deal with computer automated system will result in increased
    cost

    , but PPP has a reputation

    for good employee training, which could be boosted by this.

    •

    Automation leads to increased efficiency

    and therefore eventually increased profits

    .

    •

    Introducing automation may cause disruption to operations in the short-term reducing
    output whilst it is installed

    possible damage to reputation if orders are not fulfilled resulting in lower sales.

    •

    Automation will help PPP fulfil customer orders more quickly resulting in customer
    satisfaction

    and therefore an

    increase in sales

    •

    Automation may result in a reduction in the number of employees engaged in production
    which will reduce operating

    costs

    but this will also result in redundancy payments being made

    •

    If automation leads to excess stocks, waste may increase

    , which could lead to increased production costs.

    •

    Work may become more boring for employees resulting in a reduction in motivation
    and therefore an increase in labour

    turnover

    increasing costs

    9609/31

    October/November 2025

