    AO1 Knowledge and understanding

    Limited knowledge

    will be demonstrated through knowledge of the concept of elasticity of demand
    or knowledge or

    marketing strategy.

    Developed knowledge

    +

    will be demonstrated through knowledge of the concept of elasticity of demand
    and

    knowledge of marketing strategy.

    Knowledge of elasticity of demand

    Understanding of different elasticity concepts:

    •

    promotional elasticity measures responsiveness of demand to changes in promotional
    spending

    •

    price elasticity measures responsiveness of demand to a change in price

    •

    cross price elasticity measures the responsiveness of demand to a change in price
    of another product

    •

    income elasticity measures the responsiveness of demand to a change in income.

    •

    Understanding of inelastic - not responsive and elastic - responsive to change
    in price / promotion / income.

    Knowledge of marketing strategy

    •

    Marketing strategy includes market research and marketing mix to achieve marketing
    objectives within a budget.

    •

    Marketing mix consists of price, place, promotion and product

    9609/31

    October/November 2025

    AO2 Application

    Do not reward APP for quoting elasticities, need to show understanding of the
    figures.

    Limited application,

    applies knowledge to PPP once.

    Developed application,

    +

    applies knowledge to PPP twice.

    •

    Estimated PED for classic pies is –1.5, which is price elastic, as confirmed by
    the calculation in 3a, the 20% increase in

    price would lead to a 30% decrease in demand.

    •

    Estimated PED for premium pies is –0.4, which is price inelastic. The 25% increase
    in price only led to a 10% decrease

    in demand

    •

    OFR for PED calculations

    •

    YED for classic pies is –1.2 (inferior good) and for premium pies +1.5 (normal/luxury
    good)

    •

    Monthly sales revenue following price increases would decrease (by $2400) for
    classic pies but increase (by $3000) for

    premium pies.

    •

    Market research data may suggest whether the demand for the proposed new cheese
    pie will be price elastic or price

    inelastic in other countries in the region.

    •

    As real incomes are falling in other countries in the region, cheese pies may
    be more successful if seen as a ‘budget’

    product.

    9609/31

    October/November 2025

    AO2 Analysis

    Limited analysis

    – candidate shows one link in the chain of analysis.

    Developed analysis

    – candidate shows two or more links in the chain of analysis.

    •

    Knowledge of PED is useful to PPP in making decisions about pricing. For example,
    elastic PED would indicate that an

    increase in price would decrease revenue

    and therefore probably decrease profit

    .

    •

    Decreasing price, such as using a launch penetration price will increase quantity
    of cheese pies demanded and

    therefore increase revenue/encourage more customers to try the new product

    overall leading to a successful

    launch and loyal customers increasing profit

    .

    •

    As real incomes are falling, launching cheese pies as a ‘budget’ item should lead
    to higher sales due to negative YED.

    AO3 Evaluation

    Limited evaluation

    – limited supported judgement and/or a weak attempt at evaluative comment.

    Developed evaluation

    – supported judgement and/or reasonable evaluative comment.

    Developed evaluation in context

    – supported judgement in context and/or reasonable evaluative comment in

    context.

    •

    In a marketing strategy, PPP will also consider other factors e.g. promotional
    elasticity of demand and local tastes in

    different countries in the region.

    •

    As this is a new pie product being launched, existing elasticity data for other
    products may not be as useful

    •

    To what extent may a pan global strategy be suitable in this case?

    •

    A judgement about the usefulness of elasticity to marketing mix decisions.

    •

    A judgement about the most important factors influencing marketing strategy decisions.

    •

    A judgement about the limitations of elasticity calculations.

    •

    Measurement of elasticity is difficult and likely to be inaccurate due to large
    range of factors that will affect outcomes,

    particularly competitor decisions. Other things don’t remain equal in markets.

    •

    Factors that the judgement could depend on including the degree of competitive
    rivalry in the market

    •

    Other elements of marketing strategy are important e.g. integrated marketing mix
    to ensure consistency in message

    communicated to potential customers and therefore attract sales.

    Accept all valid responses.

