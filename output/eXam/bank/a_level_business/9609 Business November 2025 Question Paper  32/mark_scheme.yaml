  mark_scheme_answer: 'Using the data in Table 1.4, calculate the four period centred
    moving average for Quarter 1 2025.

    Responses may include:

    4 period moving average = 8 period moving total / 8 (1 mark if no relevant calculation)

    Calculation of one or two relevant 4 period totals (1)

    7 + 5.5 + 4.2 + 6.4 = 23.1

    AND/OR

    5.5 + 4.2 + 6.4 + 7.6 = 23.7

    Calculation of relevant 4 period totals and relevant 8 period total OR calculation
    of relevant 8 period total (2 marks)

    8 period total = 23.1 + 23.7 = 46.8 (2)

    Centred quarterly moving average = 46.8 / 8 (3)

    = 5.85 or $5.85m (4)

    Other common answers:

    23.1 / 4 = 5.775 OR 23.7 / 4 = 5.925 (2)

    Not using the correct sales volume figures.

    4 consecutive quarterly sales volumes added together and divided by 4 = 1 mark

    e.g. (6 + 7 + 5.5 + 4.2) / 4 = 22.7 / 4 = 5.675 (1)

    4

    9609/32

    October/November 2025'
