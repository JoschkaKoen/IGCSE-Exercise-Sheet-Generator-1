  text: '2

    Popular Drinks (PD)

    PD is a mass market fizzy drinks manufacturer in country Z. The fizzy drinks market
    in

    country Z is dominated by a few well-known brands. The total market value is $5.3bn
    and

    the PD brand has a 17% share of this market.

    Pablo was recruited to be the Marketing Director of PD in 2022. He launched a
    new

    promotional campaign based on trending music on social media. He decided to use
    social

    media influencers to focus on this market.

    Online feedback of the campaign was poor. Many of PD’s customers did not want
    to be

    associated with trending music. National news highlighted the negative feedback
    and PD’s

    sales volume decreased by 20% within a week and continued falling. This led to
    excess

    inventory in PD’s warehouses. The bad publicity also caused a drop in PD’s share
    price and

    a negative impact on cash flow.

    Fig. 2.1 shows feedback from a recent questionnaire where previous PD customers
    were

    asked what they thought about the promotional campaign.

    quite positive

    40

    quite negative

    160

    very negative

    400

    very positive

    80

    no opinion

    120

    Fig. 2.1 Market analysis data of a sample of PD’s customers

    Pablo has called an emergency meeting of PD’s marketing managers to repair the
    damage

    done to the PD brand from this recent promotional campaign.


    (a) (i) Identify one recruitment method.

    [1]


    (ii) Explain the term cash flow.

    [3]


    (b) (i) Refer to Fig. 2.1. Calculate the percentage of PD’s customers with positive
    feedback.


    [3]


    (ii) Refer to Fig. 2.1 and other information. Explain one reason why this data
    collected for

    PD may not be reliable.

    [3]


    (c) Analyse two possible costs to PD of holding inventory.

    [8]


    (d) Evaluate the importance of branding to the future success of PD.

    [12]

    5

    10

    15'
