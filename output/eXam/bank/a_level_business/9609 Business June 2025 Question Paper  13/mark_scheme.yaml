    quickly. Such judgements/conclusions may be made at any point in the essay, not
    just in a concluding section.

    •

    A judgement is made that there are a number of factors that impact on the importance
    of employees as stakeholders

    such as how strong trade unions are, how skilled they are and how easy it is to
    find new employees.

    •

    If employees are easy to recruit i.e. unemployment is high, then employee’s importance
    might not be too significant.

    •

    Business might place more importance on keeping shareholders happy with dividends.

    •

    A judgement is made that most businesses need to balance the needs of all stakeholders
    for a successful business

    especially a business as large and complex as those in the oil and gas primary
    sector.

    •

    A judgement is made that in the modern era local communities are more willing
    to protest if their local community will

    potentially be polluted and the resulting negative impact in the news.  This however
    may depend on which country the

    business is operating in.

    •

    A judgement is made that pressure groups are becoming more visible and any business
    would be foolish not to take

    them seriously as the impact on brand image and the ability to operate can be
