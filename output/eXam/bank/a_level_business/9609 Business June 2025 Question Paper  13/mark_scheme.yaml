  mark_scheme_answer: '‘Employees are the most important stakeholder group in a primary
    sector oil and gas business.’

    Evaluate this view.

    There are 12 marks for Q6(b)

    2 marks for

    2 marks for

    2 marks for

    6 marks for

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding

    2 marks for developed knowledge and understanding

    1 mark for limited knowledge and understanding

    •

    Stakeholders are persons who have an interest in/are affected by a business, such
    as owners, shareholders,

    customers, suppliers, employees, local communities, government, special interest
    groups

    •

    Primary sector oil and gas businesses exist in the energy sector and often span
    many countries with huge revenues

    and profits.

    •

    They engage in the exploration and extraction of oil and gas.

    12

    9609/13

    May/June 2025

    AO2 Application

    2 marks for developed application/context

    1 mark for limited application/context

    •

    Employees are important as they provide skilled labour and without them the business
    would not be able to operate

    and make profits.

    •

    Employees ensure new sites are found, oil and gas is extracted efficiently and
    safely.

    •

    Primary sector oil and gas industries can be dangerous and risky- health and safety
    policies needed to protect

    employees

    •

    Oil and gas sector produce energy services to power vehicles, heat homes and manufacture
    steel

    •

    Sold to petrol/gas stations

    AO3 Analysis

    2 marks for developed analysis

    1 mark for limited analysis

    •

    If the workforce is unhappy about a change in work practices though it might reduce
    costs in the short run, it may be

    detrimental if a demotivated workforce affects the quality of production.

    •

    If there is strong trade union membership then strike action may occur if demands
    are not met – this would affect

    image, stop production, delay deliveries.

    •

    Good relationships with employees would improve morale and motivate – lead to
    improved productivity and lower staff

    turnover

    •

    Skilled employees ensure that the business is able to locate and extract the raw
    materials (oil) thus ensuring sales

    revenue and profits.

    9609/13

