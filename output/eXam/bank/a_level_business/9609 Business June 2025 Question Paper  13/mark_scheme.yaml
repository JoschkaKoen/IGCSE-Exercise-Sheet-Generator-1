  mark_scheme_answer: 'Explain one disadvantage to a business of using Just in Time
    (JIT).

    There are 3 marks for this question:

    1 mark for

    2 marks for

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding

    1 mark

    for identifying one disadvantage of using JIT

    •

    Production process can be delayed when supplies do not arrive or are late

    •

    Frequent small deliveries needed

    •

    More planning ahead with suppliers required

    •

    Small orders need to be processed

    •

    Suppliers need to be reliable

    •

    Could be expensive

    •

    No discounts for bulk orders- no economies of scale

    •

    Unable to respond to unexpected customer demand

    •

    Can lead to stockouts

    3

    9609/13

    May/June 2025

    AO2 Application

    2 marks for developed

    of the disadvantage given

    1 mark for limited

    of the disadvantage given

    •

    Any failure to receive supplies or components on time – could lead to production
    delays.

    •

    Frequent small deliveries – could lead to an increase in delivery costs.

    •

    Small orders need to be processed – administration costs may rise.

    •

    Each order is likely to be small – lose out on bulk discounts.

    •

    Suppliers need to be reliable – if not could affect reputation

    •

    Could be expensive to implement for small firms – increase costs

    •

    May require investment in new technology

    •

    Could lose sales/ revenue/profit

    Accept all valid responses.

    9609/13

    May/June 2025'
