  mark_scheme_answer: 'Analyse two benefits to a business of using break-even analysis.

    There are 8 marks in total for Q5(a)

    4 marks for each of the two benefits given.

    These 4 marks consist of

    1 mark for

    1 mark for

    2 marks for

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding

    1 mark for

    identifying one benefit of using break-even analysis.

    •

    Provides crucial insights for business decisions

    •

    Provides information for a range of important business decisions

    •

    Shows whether a product is worth selling or too risky- such as new products, pricing,
    costs and production levels

    •

    Shows the amount of revenue a business will make at different levels of output

    •

    Assists in evaluating investment plans/decisions

    •

    Helps to analyse costs

    •

    Calculations are quick/easy

    •

    Helps set pricing strategy

    •

    Supports setting targets

    8

    9609/13

    May/June 2025

    AO2 Application

    1 mark for

    of a one benefit.

    •

    The use of break-even analysis in a business -indicates production volume required
    to cover costs/make profits

    •

    Allows informed decisions to be made on: Pricing

    •

    Cost management

    •

    Production levels

    •

    Overall business strategy

    •

    Relatively easy to calculate and understand – great for quick estimates.

    •

    Used to assist managers in decision making – location, equipment, projects.

    •

    The break-even analysis can be used in business plans to support loan applications

    •

    Really useful when launching new products or entering new markets

    AO3 Analysis

    2 marks for developed

    of one benefit

    1 mark for limited

    of one benefit

    •

    Break-even analysis can give a business an idea of whether the product is likely
    to be successful by analysing the

    costs involved and likely revenues.

    •

    The level of output for a desired level of profit can be determined

    •

    A break-even chart indicates the margin of safety.  If the margin of safety is
    too low the business might reconsider its

    product(s)

    •

    Break even analysis can be used to assist managers when making important decisions
    such as location decisions,

    whether to buy new equipment, or invest in a project – so reduces the risk to
    the business.

    •

    A business might see that if a certain level of profit is to be achieved, costs
    might have to be reduced to make it

    possible

    •

    A change in price might also be indicated.  If the desired profit is not achieved,
    then the price of the product might have

    to be increased.

    Accept all valid responses.

    The AN marks are recorded in the 5(a) AO3 box

    9609/13

    May/June 2025'
