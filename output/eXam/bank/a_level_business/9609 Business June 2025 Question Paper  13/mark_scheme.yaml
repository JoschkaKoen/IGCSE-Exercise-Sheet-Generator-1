  mark_scheme_answer: 'Evaluate whether cash flow forecasting is the most important
    activity for the success of a fashion clothing

    manufacturer

    There are 12 marks for Q5(b)

    2 marks for

    2 marks for

    2 marks for

    6 marks for

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding

    2 marks for developed knowledge and understanding

    1 mark for limited knowledge and understanding

    •

    Cash flow forecasting-the process of obtaining an estimate/forecast of a business’s
    future cash position – anticipated

    payments and receivables in a given period of time

    •

    Clothing manufacturers convert raw materials into finished garments

    •

    Success may be measured in terms of quality of clothing, customer satisfaction,
    level of clothes purchased, reputation

    established, health of financial position, level of profit, amount of time in
    business.

    12

    9609/13

    May/June 2025

    AO2 Application/Context

    2 marks for developed application/context

    1 mark for limited application/context

    •

    Success of a fashion clothing manufacturer very much concerned with following/creating
    the latest trends,

    fashions/fads in clothing, keeping pace with the latest fashion house changes
    in a range of different clothing items.

    •

    Fashion clothing manufacturers produce a variety of clothes such as trousers,
    skirts, dresses, jumpers, T-shirts. casual

    wear, evening wear, summer ware etc

    •

    Use different materials-cotton, wool, leather

    •

    Creativity/innovation in clothing design work

    AO3 Analysis

    2 marks for developed analysis

    1 mark for limited analysis

    •

    A CFF can provide an early warning system for a business – future shortfalls in
    cash balances – allows a business to

    take informed business decisions, such as overdraft provision or short-term loan

    •

    If a business runs out of cash, it may face insolvency.  A CFF can indicate the
    correct time to take action.

    •

    CFF enables a business to track expected cash movements over a period of time
    in the future – provides a degree of

    certainty in possible turbulent times – allows well planned decisions to be made

    •

    CFF is a strategic tool for a new business – gives information for development
    of plans for survival and growth

    •

    A cash flow forecast may be useful for external stakeholders – such as banks,
    may want to look at CFF at regular

    intervals in order to support a business plan.

    9609/13

    May/June 2025

    AO4 Evaluation

    AO4 Evaluation: Up to 6 marks for evaluation:

    Developed/Supported judgement in context

    6 marks

    Developed/Reasonable evaluative comments in context

    5 marks

    Developed/Supported judgement without context

    4 marks

    Developed/Reasonable evaluative comments without context

    3 marks

    Limited supported judgement

    2 marks

    An attempt to balance the arguments/Weak attempt at evaluative comments

    1 mark

    A judgement/conclusion is made as to the importance of cash flow forecasting for
    the success of a new restaurant. Such

    judgements/conclusions may be made at any point in the essay, not only in a concluding
    section.

    •

    A judgement is made as to whether activities other than CFF could/should be considered
    as important or more

    important in affecting a new clothing manufacturer’s ability to succeed.

    •

    A judgement is made as to what is meant by success and when to take the measure

    •

    Alternative measures of success are judged to be – perception of the quality of
    the clothes – brand image – desirability

    of clothes – strength/weakness of the economy – ability to react to changes in
    trends – retailer/supplier relationships

    •

    A judgement is made regarding the significance of cash control and CFF for a new
    clothing manufacturer in relation to

    other factors.

    •

    Is CFF as important as market research or monitoring trends and fashions in clothing?

    Accept all valid responses.

    NOTE: The marks for 5(b) are recorded in the mark input column on the right-hand
    side of the screen.

    K marks are entered in the 5b AO1 box

    APP marks are entered in the 5b AO2 box

    AN marks are entered in the 5b AO3 box

    EVAL marks are entered in the 5b AO4 box

    9609/13

    May/June 2025'
