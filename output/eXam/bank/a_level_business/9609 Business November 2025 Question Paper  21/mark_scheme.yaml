    Arguments for greater use of market segmentation:

    •

    Better targeting of customer needs – tailor products and marketing more effectively.

    •

    Improved marketing efficiency – marketing campaigns can be more cost-effective
    and impactful when aimed at specific

    segments.

    •

    Become more competitive – attracting a wider customer base

    9609/21

