    Limited evaluation

    – unsupported judgement and/or a weak attempt at evaluative comment

    Developed evaluation

    – supported judgement and/or reasonable evaluative comment

    Developed evaluation in context

    – supported judgement in context and/or reasonable evaluative comment in context.

    While market segmentation offers opportunities for CB to better meet customer
    needs and stand out in a competitive

    market, it also introduces risks and costs. A balanced approach may be most suitable
    – CB could begin with light

    segmentation (e.g. offering healthier food options) while maintaining its mass
    market appeal. This would allow CB to test

    the effectiveness of segmentation without overcommitting resources.

    Other evaluative arguments may include:

