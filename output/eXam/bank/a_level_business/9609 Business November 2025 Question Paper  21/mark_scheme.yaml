    for its products

    •

    a recommendation which could be that related to one method or could be that a
    combination is better. this helps CB to

    appeal to customers with different needs.

    •

    yes, it should/should not with justification

    Evaluation must be clearly related to market segmentation

    Accept all valid responses.

    9609/21

