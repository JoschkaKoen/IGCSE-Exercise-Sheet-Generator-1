  mark_scheme_answer: 'Refer to Table 1.1. Calculate the change in profit from 2023
    to 2024.

    Indicative content.

    Profit = Revenue – Total costs (1)

    Profit in 2023 = $44m – ($6m + $16m) = $22m (1)

    OR

    Profit in 2024 = $50m – ($10m + $20m) = $20m (1)

    Change in profit = Profit in 2024 – Profit in 2023 = $20m – $22m = –$2m (OFR applies)

    Answer = –$2 (3), $ not required. Accept text explanation, such as decreases,
    instead of minus sign. In brackets indicates a

    minus figure

    No minus sign or other indication of decrease 2 marks

    OFR applies

    3

    9609/21

    October/November 2025'
