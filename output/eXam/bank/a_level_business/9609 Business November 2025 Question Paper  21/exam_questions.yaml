  text: "1\nClever Bean (CB)\n\nCB is a public limited company that operates a chain\
    \ of coffee shops in several countries.\nThe company was founded in 2010 by two\
    \ friends, Shopra and Ben. They share a passion\nfor coffee and want to offer\
    \ high-quality products to customers.\n\nCB started with one coffee shop in country\
    \ Q and gradually expanded, always locating in\nhigh-income areas of major cities.\
    \ CB operates in a dynamic business environment. There\nis a high level of competition\
    \ from other well-known coffee shop chains.\n\nThe company sources its coffee\
    \ beans from fair trade suppliers who grow their coffee in\nan environmentally\
    \ friendly way. CB offers a wide range of coffee products to the mass\nmarket.\
    \ CB also offers other drinks and a variety of food items, such as sandwiches\
    \ and\ncakes. Recent research shows that customers are now looking for healthy\
    \ food options.\n\nCB’s customers are mainly young professionals, students and\
    \ tourists. Customers enjoy\nCB’s inviting atmosphere, comfortable seating areas,\
    \ free Wi-Fi access and music. Its staff\nare trained to be friendly, helpful\
    \ and knowledgeable.\n\nTable 1.1 shows some financial data for CB for 2023 and\
    \ 2024.\nTable 1.1 CB’s costs and revenue for 2023 and 2024\n2024 ($m)\n2023 ($m)\n\
    Revenue\n50\n44\nDirect costs\n10\n 6\nIndirect costs\n20\n16\n\nShopra believes\
    \ that CB should continue to focus on the mass market. However, Ben\nthinks that\
    \ greater use of market segmentation will be more successful.\n\n(a) (i) Identify\
    \ one feature of a public limited company.\n[1]\n\n(ii) Explain the term dynamic\
    \ business environment.\n[3]\n\n(b) (i) Refer to Table 1.1. Calculate the change\
    \ in profit from 2023 to 2024.\n[3]\n\n(ii) Explain one use to CB of cost information.\n\
    [3]\n\n(c) Analyse two benefits to CB of training its employees.\n[8]\n\n(d) Evaluate\
    \ whether CB should make greater use of market segmentation to be more successful.\n\
    \n[12]\n5\n10\n15\n20"
