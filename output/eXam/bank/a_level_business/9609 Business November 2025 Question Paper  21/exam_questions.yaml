  text: '2

    Natalia’s Naturals (NN)


    NN is a small business owned by Natalia. NN produces and sells a range of natural
    skincare

    products.


    In 2020, Natalia started making her own skincare products at home using natural

    ingredients. She realised that there was a demand for her products among her friends
    and

    family. Natalia then decided to turn her hobby into a business and launched NN
    in 2021.


    Natalia operates her business from a rented workshop with limited space, where
    she

    makes her products by hand. She buys her ingredients from local suppliers who
    share her

    values of environmentally friendly production.


    NN has been growing steadily and has gained a loyal customer base. NN has received

    positive reviews from beauty magazines. Natalia’s skincare products are sold through
    her

    own website, social media platforms and local retailers who specialise in selling
    natural

    products.


    Natalia is developing a new face cream. Table 2.1 shows price and cost estimates
    for the

    new face cream.

    Table 2.1 Price and cost estimates

    Product

    Price

    Allocated fixed costs

    Variable costs per unit

    Face cream

    $5

    $12 000

    $2


    The skincare market is very competitive. There are many established brands that
    offer

    similar products to NN, but with wider distribution channels.


    Natalia needs to balance her time between production, managing orders, delivery,
    marketing

    and other administrative tasks. She works long hours and is stressed and exhausted.


    Natalia is considering outsourcing to increase NN’s production capacity.


    (a) (i) Identify one internal stakeholder of a business.

    [1]


    (ii) Explain the term distribution channels.

    [3]


    (b) (i) Refer to Table 2.1. Calculate the break-even level of output of the new
    face cream.

    [3]


    (ii) Explain one limitation to NN of break-even analysis.

    [3]


    (c) Analyse one advantage and one disadvantage to NN of being a small business.

    [8]


    (d) Evaluate whether outsourcing is the most suitable way to increase NN’s production
    capacity.


    [12]

    5

    10

    15

    20'
