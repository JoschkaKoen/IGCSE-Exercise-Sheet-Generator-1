    •

    Due to lower productivity the unit cost may be higher than capital intensive operations

    •

    Unable to reach the consistency levels of machine production-employees fall ill
    and take holidays.

    •

    Employees may seek better conditions leading to disputes, strikes, unionisation.

    •

    Labour turnover may be high, competitive markets for labour may mean labour shortages-growth
    targets threatened.

    Accept all valid responses

    9609/11

    May/June 2025'
