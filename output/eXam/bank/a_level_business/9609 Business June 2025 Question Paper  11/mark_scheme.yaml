  mark_scheme_answer: '‘Intrapreneurship is the most important factor that will ensure
    the success of a computer entertainment business.’

    Evaluate this view.

    There are 12 marks for Q5(b)

    2 marks for

    2 marks for

    2 marks for

    6 marks for

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding

    2 marks for developed knowledge and understanding

    1 mark for limited knowledge and understanding

    •

    Intrapreneurs are part of a business system and environment that allows employees
    to act like entrepreneurs within a

    business, who promote new ideas, inspire creativity, and take proactive steps
    to improve business operations – a

    source of innovation within an organisation.

    •

    The risks taken by intrapreneurs are absorbed by the business as the formal and
    informal structures and processes are

    exploited by intrapreneurs to introduce new ideas, carve out new paths, initiate
    new ventures and drive organisational

    change.

    •

    The success of a business refers to an ability to survive the uncertainty and
    volatility of business environments and

    continue to exist as a viable, productive and sustainable business organisation.

    •

    There are many factors that might lead to success e.g. marketing, finance, operations,
    HRM

    12

    9609/11

    May/June 2025

    AO2 Application

    2 marks for developed application/context

    1 mark for limited application/context

    •

    As the lifespan of the average business organisation continues to shrink, even
    the most resilient and successful

    businesses who apply sound business management principles to operations, are not
    immune to gradual erosion of

    their positions of growth and dominance.

    •

    Intrapreneurs are seen to have the skillset to challenge the ‘business as usual’
    mindset and so allow a business to

    respond to the disruptive changes in the external market environment by inducing
    change in the organisational internal

    environment.

    •

    It is increasingly recognised that ‘business as usual’ operating decisions and
    procedures are no guarantee of ‘ongoing

    success for a business’. In order to succeed in local, national or global markets,
    it is asserted that it is necessary to

    develop new products and do business better and faster than competitors.  These
    developments, it is argued, require

    distinctive organisational cultures within which intrapreneurs have a vital role
    to play.

    •

    Computer entertainment businesses use computers to allow us to watch movies online,
    play games online, act as

    virtual entertainers in playing games, listening to music, videos can be fed from
    computers to full screen TVs.

    •

    Computers have a major effect on the entertainment industry- using technology/software
    to create striking special

    effects in movies, creation of animated features and creation of multi-media presentations.

    9609/11

    May/June 2025

    AO3 Analysis

    2 marks for developed analysis

    1 mark for limited analysis

    •

    Ongoing success may well depend on ‘going back to the garage’ – Steve Jobs, –
    to recapture the innovative and

    creative spirit of the past – there is severe competition and new starters abound
    in the computer entertainment market.

    •

    The impact of an intrapreneur can lead to the re-invention of a business – any
    delay in such re-invention can increase

    the risk of a business failing – intrapreneurs can drive this reinvention, e.g.
    change a letter-delivery business to a

    parcel-delivery business – the British Post Office is cited as an example where
    the ongoing success has been put at

    risk with too little intrapreneurial impact on strategic decisions.

    •

    Intrapreneurs can generate new ideas and identify new business opportunities and
    detect success-threatening

    problems. They can critically evaluate existing organisational and market structures,
    make use of existing sound

    commercial infrastructures, sales networks, and financial stability to develop
    new products and make existing ones

    more competitive.

    •

    Intrapreneurs can provide a longevity to business operations and stimulate new
    growth opportunities if they can

    inculcate intrapreneurial thinking and behaviour among managers and employees.

    •

    Sony Playstation happened as a junior employee tinkered with his daughter’s Nintendo
    to improve the sound quality –

    this tinkering convinced Sony of the value of computer gaming systems – Sony now
    has 2/3rds of market share of the

    console operating system market.

    •

    Agile companies create and support intrapreneurial cultures to ensure that the
    business does not become too

    comfortable with past success – the focus is not so much on next quarter’s profit
    as the next decade’s worth of revenue

    growth.

    •

    Intrapreneurship is encouraged and supported to ensure that there is a focus on
    the future (technological

    developments and consumer trends) – a focus on ‘emerging business/product opportunities’.

    •

    Intrapreneurship is mainstream as intrapreneurs are supported with capital and
    allowed to take advantage of the

    existing customer base, cross-functional expertise, the brand name, the business
    infrastructure, the stability of a

    corporate job, and mentorship and guidance.

    •

    Intrapreneurs provide the skills for recognising and solving important problems
    within a business and have the

    independence and authority to suggest changes for planning the future of a business
    – they determine methods for

    staying ahead of the competition and in so doing, contribute to the ongoing survival
    and success of a business.

    9609/11

    May/June 2025

    AO4 Evaluation: Up to 6 marks for evaluation:

    Developed/Supported judgement in context

    6 marks

    Developed/Reasonable evaluative comments in context

    5 marks

    Developed/Supported judgement without context

    4 marks

    Developed/Reasonable evaluative comments without context

    3 marks

    Limited supported judgement

    2 marks

    An attempt to balance the arguments/Weak attempt at evaluative comments

    1 mark

    •

    Any judgements, conclusions, or evaluative comments can be made at any point in
    an essay, not just in a concluding

    session.

    •

    A supported judgement may be made that while the role of an intrapreneur is critical
    to the ongoing success of a

    business, it is not the only, or the most important, influence on the continuing
    success/viability of a business.

    •

    It might be concluded that intrapreneurship is very important for the ongoing
    success of a computer entertainment

    business, whether the business is large – to recapture the spirit that initially
    put it on the road to success, or small – to

    maintain the entrepreneurial spirit that gave it birth.

    •

    The judgement may be made that intrapreneurship will ensure that working environments
    remain innovative and

    creative, rather than become rigid and stifling.

    •

    The judgement may be made that the role of intrapreneurship is critical if computer
    entertainment businesses are to

    remain agile and customer-driven, and take full advantage of new opportunities
    in consoles, software and accessories

    that will ensure their ongoing success.

    •

    It might be argued that more important is the quality of management and leadership
    in a business, especially if the role

    and importance of intrapreneurship is recognised and given the investment and
    support by those managers and

    leaders – effective strategic thinking and management.

    •

    It might also be judged that the effective delivery of key business functions
    is as, or more, important than

    intrapreneurship, e.g. effective financial management – finance for growth, new
    equipment, effective HRM, productive

    and high morale working environments – effective marketing – developing the brand
    – effective operations – cutting

    edge technology.

    Accept all valid responses.

    9609/11

    May/June 2025'
