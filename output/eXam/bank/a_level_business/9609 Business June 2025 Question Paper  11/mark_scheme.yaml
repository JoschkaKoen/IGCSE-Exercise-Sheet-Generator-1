  mark_scheme_answer: 'Explain one disadvantage to a business of using empowerment
    to motivate employees.

    There are 3 marks for this question:

    1 mark for

    2 marks for

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding

    1 mark

    for identifying one disadvantage of using empowerment to motivate employees

    •

    Employees lack ability/experience to respond

    •

    Decisions are poorer

    •

    Business is less efficient

    •

    Employees become de-motivated

    •

    Employees more stressed

    •

    Some employees may leave.

    •

    Empowerment may not work/may not last

    3

    9609/11

    May/June 2025

    AO2 Application

    2 marks for developed

    of the disadvantage given

    1 mark for limited

    of the disadvantage given

    •

    Employees may not be capable of taking more control of their work – might lead
    to de-motivated employees.

    •

    Empowerment may mean decisions are made by less experienced and less expert personnel
    – increasing the number

    of mistakes made and increasing risk.

    •

    May lead to decreased efficiency – autonomous employees may work independently
    and decide to work more slowly

    and/or work at the pace of the slowest – less collaboration and teamwork.

    •

    Relationships between managers and employees become blurred – boundaries of authority
    broken in a flatter, more

    streamlined structure – managers may lose control.

    •

    Employees stress increases, morale decreases in a preference for alternative forms
    of motivation.

    •

    Empowered employees become more attractive to competitors (risk of staff poaching).

    •

    May not work as some employees are only motivated by financial benefits e.g. bonus

    Accept all valid responses.

    9609/11

    May/June 2025'
