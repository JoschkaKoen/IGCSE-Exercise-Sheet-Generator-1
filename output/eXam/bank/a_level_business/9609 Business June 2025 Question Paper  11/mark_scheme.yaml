  mark_scheme_answer: 'Analyse two ways international markets may present different
    challenges to a business than national markets.

    There are 8 marks in total for Q6(a)

    4 marks for each of the ways international markets may present different challenges
    to a business than national markets.

    These 4 marks consist of

    1 mark for

    1 mark for

    2 marks for

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding

    1

    mark for identifying one way international markets may present different challenges
    to a business than national

    markets  Repeat this for a second identified way.

    NOTE: International markets are global markets outside the international borders
    of a business’s country of citizenship –

    people and businesses from different nations and sharing different cultures may
    compete in an international market.

    National market is a domestic market for goods and services operating within the
    borders of, and governed by, the

    regulations of a particular country.  A business is likely to be more familiar
    with trading relationships and regulations and

    there is likely less risk, uncertainty and complexity when operating in a national
    market.

    8

    9609/11

    May/June 2025

    Ways may include:

    •

    International markets may present language challenges to business entrants

    •

    International markets may have business cultures that do not match national market
    expectations

    •

    Operating in an international market may require more expertise, competence and
    special management skills

    •

    Competition is likely to be tough and intense in international markets

    •

    International markets may present more high-risk challenges to businesses, such
    as political volatility, changing

    fashion, etc

    •

    International markets may require acceptance of different tariff and non-tariff
    constraints and local laws and policies

    AO2 Application

    1 mark for

    of the chosen way. Repeat this for a second identified way.

    •

    International markets may present language challenges to business entrants – many
    languages may be used.

    •

    International markets may have business cultures that do not match national market
    expectations, e.g. in respect of

    religion, dress codes, working hours, personal space and facility, and gift giving.  An
    ability to recognise, respect and

    adapt to these differences may reduce your ability to succeed in an international
    market.

    •

    Operating in an international market may require more expertise, competence and
    special management skills to deal

    with the more complex circumstances and situations like changes in the strategies
    of governments and the mindsets of

    customers.

    •

    Competition is likely to be tough and intense in international markets – global
    competition involves competition not only

    with competitors from home countries, but also with competitors from foreign lands.

    •

    International markets may present more high-risk challenges to businesses, such
    as political volatility, changing fashion

    trends, sudden war situations, changing government regulations, and communication
    barriers.

    •

    International markets may require acceptance of different tariff and non-tariff
    constraints and local laws and policies

    enforced in different nations – business relationships may involve complexity
    and lengthy time dimensions.

    9609/11

    May/June 2025

    AO3 Analysis

    2 marks for developed analysis of the chosen way

    Repeat for second identified way.

    1 mark for limited analysis of the chosen way

    Repeat for second identified way.

    •

    International markets may present distinctive challenges to national businesses
    – they may exhibit very unique and

    volatile market situations regulations, and conventions requiring creative, responsive
    and flexible reactions,

    accommodations and compromises.

    •

    The business cultures of international markets may be distinctive and unusual
    and outside the experience of national

    competitors, requiring adaptability and acceptance of unusual and often morally
    questionable business practices.

    •

    International markets may be politically volatile requiring fast responses by
    national business`s such as making special

    payments in order to engage in business activity.

    •

    Local laws and policies in international markets may be unconventional and communication
    channels may be far from

    transparent-national businesses again may need to balance national standards of
    business behaviour with international

    market expectations/requirements.

    Accept all valid responses.

    9609/11

    May/June 2025'
