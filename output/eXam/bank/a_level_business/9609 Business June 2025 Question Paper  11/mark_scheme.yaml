  mark_scheme_answer: 'Explain one limitation to a business of labour intensive operations.

    There are 3 marks for this question:

    1 mark for

    2 marks for

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding

    1 mark for identifying one limitation of using labour intensive operations

    •

    Expertise, experience of employees can vary

    •

    Skilled workers may take time to train.

    •

    It can be more expensive

    •

    Relatively inefficient and inconsistent/unreliable levels of effort/not as fast
    as machines

    •

    Labour relations problems.

    •

    Difficulty of replacing/recruiting staff.

    3

    9609/11

    May/June 2025

    AO2 Application

    2 marks for developed

    of the limitation given

    1 mark for limited

    of the limitation given

    Production processes that have a high level of labour input and a low level of
    capital input may have the following

    limitations:

    •

    Variable levels of labour expertise and experience may lead to variable levels
    of product quality.

    •

    The training and re-training of employees may be very expensive and may disrupt
