  mark_scheme_answer: 'Explain one disadvantage to a business of using competitive
    pricing.

    There are 3 marks for this question:

    1 mark for

    2 marks for

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding

    1 mark for identifying one disadvantage of using competitive pricing

    •

    Competitive pricing may mean a business makes a loss

    •

    Competitive pricing may force prices down/lower in the long turn

    •

    Could lead to business failure

    •

    Could lead to a price war

    •

    Could deflect a business from other objectives

    •

    May mean too much concern for competitor actions.

    •

    May lead to lower/less sales

    3

    9609/11

    May/June 2025

    AO2 Application

    2 marks for developed

    of the disadvantage given

    1 mark for limited

    of the disadvantage given

    •

    A business that sets prices solely on competitor prices might risk selling at
    a loss as it may not be able to cover its

    manufacturing costs or business overhead expenses.

    •

    Competing using competitor prices (lower) might give a competitive edge in the
    short term, only as competitors fight

    back with lower prices.

    •

    Could lead to lower profit margins and increase the risk of failure, especially
    true of businesses with few financial

    resources.

    •

    May be difficult and costly to discover competitor prices – need to hire pricing
    teams or purchasing automated

    competitor pricing monitoring tool.

    •

    Could lead to a price war and even if a business can sustain low prices, customers
    may see the low-price product as

    an inferior product.

    •

    A sole focus on competitive pricing might deflect a business from concerns for
    quality and added value.

    •

    Too much focus on competitor’s prices may also mean too much time spent on competitors,
    to the detriment of

    insufficient time spent on internal issues such as strengthening its USP and competitive
    edge (other than price points).

    Accept all valid responses.

    9609/11

    May/June 2025'
