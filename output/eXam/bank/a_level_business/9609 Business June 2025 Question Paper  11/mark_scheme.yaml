  mark_scheme_answer: 'Evaluate whether customer relationship marketing (CRM) is suitable
    for all small businesses.

    There are 12 marks for Q6(b)

    2 marks for

    2 marks for

    2 marks for

    6 marks for

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding

    2 marks for developed knowledge and understanding

    1 mark for limited knowledge and understanding

    •

    CRM is concerned with forming long-term relationships/bonds with customers, rather
    than just with immediate sales –

    less transactional or hard selling – more about building emotional connections
    with customers

    •

    Customers are put at the centre of marketing strategies in an effort to create
    customer loyalty and retention through

    developing a unique bond with customers – especially through customers’ data and
    feedback

    •

    The era of digital marketing has created opportunities for businesses of all sorts
    to succeed in the journey of

    relationship marketing

    12

    9609/11

    May/June 2025

    AO2 Application

    2 marks for developed application/context

    1 mark for limited application/context

    •

    Marketing no longer restricted to developing, selling, and delivering products
    and services. CRM sees this definition of

    marketing as too restrictive – effective marketing needs to be relationship orientated.

    •

    Investment into CRM systems is considered to be essential and more effective than
    transactional marketing for the

    long-term health of all businesses.

    •

    The marketing concept of using a relational software database to gather data on
    customer transactions for use in

    marketing and sales programmes has been developed and expanded into company-wide
    CRM systems – initially

    sophisticated technology orientated systems developed in/for large businesses
    to create, manage, and organise data

    in a way that drives sales and revenue through creating connections and long-term
    relationships.

    •

    More recently, small business CRM systems have been devised to enhance the small
    business customer experience

    with a focus on social relationships and personal care programmes that foster
    customer commitment and builds trust

    between a business and its customers.

    •

    Small businesses are often partnerships, sole proprietorships, or private limited
    companies

    •

    Have relatively small numbers of employees, relatively low annual revenue/turnover,
    few human resources, and low

    up-front capital (vary between ‘micro’ businesses with less than 10 employees/turnover
    less than £2m – ‘small’

    businesses with 10–50 employees and £2–10m turnover, to MSE’s with 50–250 employees
    and £50–250m turnover)

    9609/11

    May/June 2025

    AO3 Analysis

    2 marks for developed analysis

    1 mark for limited analysis

    The benefits of CRM programmes are said to include the following: -

    •

    The possibility of selling more – returning customers tend to purchase more than
    first-time customers as a

    consequence of a stronger relationship.

    •

    CRM acts as an advertising method for a product – customers satisfied with a product
    leave good reviews and

    communicate to others positive experiences.

    •

    Loyal customers created by CRM tend to purchase new and upcoming products due
    to positive experiences in the past

    – saving advertising costs.

    •

    CRM forces a business and brand to focus on long-term goals rather than short-term
    success.

    •

    CRM, in developing a personal relationship with the customer, helps create a viral
    positive one-to-one marketing.

    •

    CRM provides opportunities to solve problems immediately -opportunity to repair
    product failures – problem-solving via

    the customer service communications to Twitter accounts or person visits

    The limitations of CRM are said to include the following:

    •

    The primary limitation is said to be cost – it leads to higher costs per individual
    customer, with no guarantee of a quick

    return.

    •

    CRM software is often designed to meet the needs of large businesses – can be
    daunting for smaller businesses

    lacking the staff time and financial resources.

    •

    Even simple CRM systems are expensive – investment costs are high – may be inaccessible
    to a small business.

    •

    CRM raises the expectations of customers – time and resource consuming – it takes
    many transactions to establish a

    trusting relationship that garners results.

    •

    CRM likely to require a significant change in business culture and employee roles
    – the change from a product centric

    business to a customer/client end user centric business is a demanding one – there
    may be resistance to change, e.g.

    IT moves from a customer supportive role to a customer enabling role.

    •

    CRM may treat new customers as a secondary commodity – CRM focus is on retaining
    and supporting the current

    customer base – new customers could be overlooked or ignored.

