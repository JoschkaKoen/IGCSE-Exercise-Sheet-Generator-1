    •

    A judgement might be made that many small businesses are less likely to adopt
    a CRM approach due to the potential

    high investment costs, the time risks involved, the complexity of CRM programmes
    and the limited resource availability.

    •

    A judgement may be made that potential benefits of a CRM programme/initiative
    outweigh the costs/risks/potential

    disadvantages.

    •

    A judgement may be made that it all depends on the ‘size’ and resources of a ‘small’
    business and the stage of

    development of the business so not all small businesses may rule out investment
    into CRM.

    •

    Indeed a judgement may be made that a small business is ideally placed to really
    benefit from a CRM approach – a

    small business may be more accessible to the customer than a large one – the values,
    mission, vision clearer in a

    small business – close to the customer.

    •

    A judgement may be made that CRM is a natural development of effective marketing
    and is relevant and essential for

    all businesses, including small businesses, and that inexpensive small business
    CRM systems are increasingly

    available (affordable cloud-based packages).

    •

    A judgement might be made that the features and benefits of CRM are critical for
    all businesses – and that even non-

    commercial organisations, such as universities, are adopting CRM programmes in
    order to improve relationships with

    the students who increasingly assume the role of customers and expect to be heard,
    respected and satisfied.

    •

    A judgement might be made that CRM is just one of the latest management fads and
    that effective businesses have

    always pursued customer relationships and enjoyed the trust and loyalty of customers/clients/end
    users without the

    adoption of expensive and trendy CRM systems.

