  mark_scheme_answer: 'Analyse two ways business enterprise can help the development
    of a country.

    There are 8 marks in total for Q5(a)

    4 marks for each of the ways business enterprise can help the development of a
    country.

    These 4 marks consist of

    1 mark for

    1 mark for

    2 marks for

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding

    1 mark for

    identifying one way business enterprise can help the development of a country
    – repeat for a second way

    identified.

    NOTE: The impact of enterprise can be within a business enterprise or within the
    wider economy

    •

    Stimulates economic activity

    •

    Stimulates and improves social welfare

    •

    Leads to economic growth

    •

    Market demand for goods and services is increased

    •

    Innovation leads to new products

    •

    Jobs are created

    •

    Consumer spending is stimulated

    •

    Export opportunities exploited

    •

    Bring factors of production together with entrepreneurial spirit and purpose,
    creating dynamism in an economy

    8

    9609/11

    May/June 2025

    AO2 Application

    1 mark for

    of a one chosen way identified  - repeat this for the application of a second
    identified way.

    •

    In market economies, business enterprise acts as the wheels of economic growth
    and development.  Un-utilised

    resources, labour and capital are utilised efficiently.

    •

    Entrepreneurs stimulate a business enterprise culture and thrive within it, creating
    new products and services,

    stimulating new employment and accelerate economic growth and development.

    Stimulates and improves social welfare – such as electricity for all

    AO3 Analysis

    2 marks for developed

    of one chosen way – repeat for second identified way

    1 mark for limited

    of one chosen way – repeat for second identified way

    •

    Business enterprise stimulates new business formation, providing choice, dynamism,
    competition and employment,

    often locally owned and committed to local areas, and act as seedbeds for further
    development.

    •

    Business enterprise cultures lead to the creation of new jobs and opportunities
    – often entry level jobs to turn unskilled

    job holders into skilled ones and prepares and provides experienced works for
    larger industries.

    •

    Business enterprise initiatives bring innovation and creativity to countries –
    resources are used effectively as new and

    improved products, services, and technologies are developed, leading to the generation
    of new wealth, higher tax

    revenues, allowing governments to offer citizens more benefits.

    •

    Business enterprise encourages research and development to solve problems that
    existing products and technology

    have not yet solved – bring innovation to existing products – secure new finance
    and experiment with new approaches

    to business functions, such as HRM, Operations, Finance, and Marketing.

    •

    The economic benefit of business enterprise may create the income and wealth for
    social change and development by

    reducing a dependency on obsolete methods, systems and technologies – the opportunity
    for improved lifestyles and

    better economic choice.

    Accept all valid responses.

    9609/11

    May/June 2025'
