  mark_scheme_answer: 'Analyse one way a business might fail as a consequence of lack
    of finance.

    There are 5 marks for this question:

    1 mark for

    2 marks for

    2 marks for

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding

    1 mark for

    identifying one way a business might fail due to lack of finance

    Inability to:

    •

    sustain cashflows

    •

    provide working capital

    •

    build up reserves

    •

    pay suppliers/variable costs

    •

    invest

    •

    obtain sources of finance

    •

    maintain quality/innovation/research and development

    •

    to recruit managers

    •

    bankruptcy/insolvency/administration/liquidity issues

    5

    9609/11

    May/June 2025

    4

    AO2 Application

    2 marks for developed

    of the chosen way identified

    1 mark for limited

    of the chosen way given

    •

    A lack of finance may undermine a business’s capacity to survive at various times
    and in various situation

    •

    Such as the inability to purchase essential equipment

    •

    An inability to cover day-to-day expenses (paying wages and suppliers)

    •

    An inability to build up reserves in times of recession

    •

    An inability to support essential growth and expansion plans.

    AO3 Analysis

    2 marks for developed

    of the chosen way

    1 mark for limited

    of the chosen way

    •

    Insufficient start-up finance can lead to early business failure – significant
    capital investment is likely to be needed to

    provide an adequate infrastructure for survival, e.g. purchase of adequate equipment,
    hire of appropriate labour, initial

    launch expenditure and publicity material. Without sufficient finance, such an
    initial set of essential requirements will

    not be met, resulting in the likely collapse of a business.

    •

    A business is likely to fail if it doesn’t maintain adequate positive cash flows
    and sustain an adequate level of working

    capital. Poor financial management can lead to high inventory levels, an excessive
    number of debtors, and an inability

    to cover day-to-day activity expenses. If a business is unable to pay bills (especially
    suppliers) and pay employees, it

    will be unable to operate – businesses need to have several months of working
    capital in reserve as a buffer against

    delayed incoming payments.

    •

    A business to be successful may need to continuously expand and grow – develop
    new products and expand into new

    markets. This growth and expansion requires funding and without an effective financial
    structure in place, businesses

    that are unable to expand are at risk of being left behind by competitors and
    eventually failing.

    •

    Businesses need sufficient finance to respond to adverse economic conditions –
    unexpected recessions and

    depressions – the progress of any business is rarely linear – sufficient finance
    is needed for a business to survive

    challenging times – a lack of contingency finance can result in business failure.

    Accept all valid responses.

    9609/11

    May/June 2025'
