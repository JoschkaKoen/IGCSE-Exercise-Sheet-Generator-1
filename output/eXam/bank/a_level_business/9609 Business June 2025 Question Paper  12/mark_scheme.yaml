  mark_scheme_answer: '‘The use of budgets is the most effective way to monitor the
    performance of a hotel’.

    Evaluate this view.

    There are 12 marks for Q6(b)

    2 marks for

    2 marks for

    2 marks for

    6 marks for

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding

    2 marks for developed knowledge and understanding

    1 mark for limited knowledge and understanding

    •

    Budget is a quantitative expression of a plan of action over a specific period
    of time – it predicts revenues and

    expenditures – may include cash flows, revenues, liabilities, planned scale volume
    and other costs.

    •

    Budgets need to provide controls and restraints – an analytical tool to reveal
    actual financial performance – return on

    assets with planned performance.

    •

    Budgets are tools of financial management and control – set out specific expectations
    of results and so provide a

    standard to be used for performance evaluation.

    •

    Business performance generally refers to making best use of resources to achieve
    corporate objectives, which may be

    economic or social, measured by a number of metrics – Key Performance Indicators
    (KPIs) such as profitability,

    productivity, market share, customer satisfaction.

    12

    9609/12

    May/June 2025

    AO2 Application

    2 marks for developed application/context

    1 mark for limited application/context

    •

    Hospitality sector businesses, such as hotels, focus on providing accommodation,
    food, and conference planning –

    profit maximisation is the fundamental goal, which requires resource allocation
    and management to be properly

    planned and controlled.

    •

    Hotels, as with other commercial businesses, seek a return on assets and have
    specific performance targets, such as

    revenue per available room, average occupancy rate, profit/loss on food offers.
    Financial performance measures are

    used to reveal the extent to which ‘bottom line’ targets are met but they also
    act as essential support methods to

    ensure that qualitative objectives, such as sustained customer satisfaction, are
    achieved.

    AO3 Analysis

    2 marks for developed analysis

    1 mark for limited analysis

    Budgets provide ways to monitor and control business performance in the following
    way:

    •

    Budgets provide a set of financial targets related to specific objectives agreed
    in order to achieve corporate business

    goals – provide a framework and a discipline to those working in the business
    and a standard of assessment relating to

    those targets.

    •

    Budgets provide the discipline to ensure resources are allocated as agreed and
    provide indicates when analysed of

    variation/deviations – evidence of which provides effective evidence of the extent
    to which business performance is

    acceptable or needs amendment or adjustment.

    •

    Budgets provide a structured plan which can lead to better decision-making and
    goal achievement – provides financial

    stability and guidelines essential for assessing business performance – budgets
    provide a set of strategic plans of

    action which check and control decisions.

    •

    Budgets provide a basis for the evaluation of goals and policies – which can lead
    to further decisions on spending –

    budgetary tracking of progress is a measure of monitoring and controlling of performance.

    •

    Budgets are systematic and organised – providing appropriate management information
    the continuing performance of

    business sectors – a systematic and organised set of financial measures to assess
    the effectiveness of the plans and

    actions of the business.

    9609/12

    May/June 2025

    •

    Budgets provide a business the ability share its operational process and budgetary
    process with important

    shareholders such as a governing body – board of directors – provide status updates
    on performance to investors.

    AO4 Evaluation: Up to 6 marks for evaluation:

    Developed/Supported judgement in context

    6 marks

    Developed/Reasonable evaluative comments in

    context

    5 marks

    Developed/Supported judgement without context

    4 marks

    Developed/Reasonable evaluative comments

    without context

    3 marks

    Limited supported judgement

    2 marks

    An attempt to balance the arguments/Weak attempt

    at evaluative comments

    1 mark

    •

    Judgements/conclusions/critical comments may be made at any point in an essay,
    not just in a concluding section.

    •

    Judgement may be made that while budgets have the potential to provide an effective
    way to monitor and control the

    performance of a business it does depend on the rigour and robustness of the budgets
    used – data may be defective;

    assumptions and targets may be unrealistic.

    •

    It might be concluded that budgets are only one of a range of financial performance
    measures, such as value chain

    analysis, benchmarking and cost optimisation and should be seen as part of a package
    of accounting techniques and

    their importance assessed as such.

    •

    A judgement might be made that in order to capture the full picture of hotel performance
    the reliance on quantitative

    financial measures such as budgets could be misleading – traditional performance
    measures such as budgets taken in

    isolation may provide misleading signals.

    •

    It might be concluded that organisations today need more holistic performance
    measures to give a more representative

    impression of an hotel’s performance – e.g., is the hotel providing service excellence
    – does it embrace innovation –

    does it take health and safety seriously (Covid 19 challenges).

    9609/12

    May/June 2025

    •

    It might be concluded that the use of budgets and resulting financial metrics,
    while important, does not necessarily

    provide the most effective way to monitor and control hotel performance – a more
    balanced scorecard approach is

    more appropriate for organisation and hotels today.

    Accept all valid responses.

    9609/12

    May/June 2025

    Mark Grids for Section B

    Used for Q5(a) and Q6(a)

    Level

    AO1 Knowledge and understanding

    2 marks

    AO2 Application

    2 marks

    AO3 Analysis

    4 marks

    2

