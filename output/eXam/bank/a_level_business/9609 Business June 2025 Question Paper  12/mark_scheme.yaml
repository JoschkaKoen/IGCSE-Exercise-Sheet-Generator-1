  mark_scheme_answer: 'Explain one advantage to a business of holding buffer inventory.

    There are 3 marks for this question:

    1 mark for

    2 marks for

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding

    1 mark for identifying one advantage of holding buffer inventory

    A term used in logistics that describes a level of extra stock that is maintained
    to mitigate risk or stockouts caused by

    uncertainties in supply and demand.

    •

    Avoid stockouts

    •

    Allow continuous production

    •

    Meet customer demands, including unexpected demands

    •

    Meet bulk orders

    •

    Avoid lost sales

    •

    Protect against fluctuations in demand/market

    •

    Helps if there is damage to parts of inventory

    AO2 Application

    2 marks for developed

    of the advantage given

    1 mark for limited

    of the advantage given

    •

    Adequate buffer stocks allow businesses operations to proceed according to plan.

    3

    9609/12

    May/June 2025

    •

    Protects against unforeseen variation in supply – supply chains are longer, more
    globalised with forces causing more

    frequent disruptions.

    •

    Compensates for forecast inaccuracies – a consistent demand changes suddenly –
    customer service is maintained

    through use of the buffer stock.

    •

    Avoids stockouts and keeps customer service and satisfaction levels high – keeps
    warehouse and supply chain

    running smoothly.

    •

    Allows a business to take advantage of bulk buying discounts and so reduce the
    cost of inventory.

    Accept all valid responses.

    9609/12

    May/June 2025'
