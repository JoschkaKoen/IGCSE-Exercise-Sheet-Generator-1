  mark_scheme_answer: 'Explain one disadvantage to a business of having corporate
    social responsibility (CSR) as a business objective.

    There are 3 marks for this question – 1 mark for knowledge and understanding and
    2 marks for application/explanation

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding – 1 mark for identifying one disadvantage of CSR
    as a business objective

    •

    May add to business costs

    •

    May reduce profits

    •

    May result in stakeholder conflict

    •

    Business operations more transparent

    •

    Business may be deflected from bottom line objective

    •

    Competitors may take advantage

    AO2 Application

    2 marks for a developed

    of one disadvantage of CSR as a business objective

    1 mark for a limited

    of one disadvantage of CSR as a business objective

    •

    CSR objectives may well involve additional costs for a business – profit not the
    sole objective.

    •

    CSR objectives may well mean stakeholder conflicts – shareholders concern for
    maximum dividends versus

    management commitment to ethical suppliers.

    •

    CSR businesses are in the public eye and likely to be scrutinised for all that
    they do – subject to criticism over the

    smallest acts or operations.

    •

    CSR implies more accountability and responsibility and requires sustainable actions
    – rather than ‘window dressing’ PR

    campaigns.

    •

    Sustainable resources may be more expensive

    •

    CSR companies may lose sight of their fundamental commercial/economic role as
    business organisation

    Accept all valid responses.

    3

    9609/12

    May/June 2025'
