  mark_scheme_answer: 'Analyse two disadvantages to employees of an autocratic management
    style.

    There are 8 marks in total for Q5(a)

    4 marks for each of the two disadvantages of an autocratic management style to
    employees

    These 4 marks consist of

    1 mark for

    1 mark for

    2 marks for

    NOTE: This question asks for disadvantages to employees not the business. However,
    managers are employees and any

    disadvantages e.g. stress related to managers must be accepted as relevant answers.
    This is particularly significant when

    rewarding analysis.

    Indicative content

    Responses may include:

    9609/12

    May/June 2025

    AO1 Knowledge and understanding

    1 mark for

    identifying one disadvantage

    •

    Leads to low employee morale

    •

    Prevents creativity and innovation in employees

    •

    Can lead to resentment and resistance among employees

    •

    Over dependent on managers/leaders

    •

    Employees feel undervalued

    •

    Employees disengaged

    •

    Lack of opportunity for employees

    •

    Likely repetitive tasks, low skills, low wages for employees

    •

    Lack of trust of employees

    •

    Employees/managers under pressure to produce more – stress

    AO2 Application

    1 mark for

    of the chosen disadvantage

    •

    A choice of management style considered by many as outdated and inappropriate
    for modern organisations – with

    regard to the expectations and aspirations of employees.

    •

    Can lead to Theory X culture – lack of trust – micromanagement and the effect
    on employees

    •

    Can lead to low productivity and disenchantment of employees

    •

    Employee environment is one of conflict between management and employees, causing
    stress on employees

    9609/12

    May/June 2025

    AO3 Analysis

    2 marks for developed

    of the chosen disadvantage

    1 mark for limited

    of the chosen disadvantage

    •

    Strict supervision associated with autocratic management can be de-motivating
    – micromanagement stifles creativity

    and creates a lack of trust between employees and managers.

    •

    Can create a high-pressure working environment where productivity levels might
    well decline – employees treated

    simply as production units – leading to stressed, pressured and overwhelmed employees.

    •

    There is unlikely to be a culture of feedback – an autocratic manager seeks to
    speed up the decision-making process –

    results in less creativity and innovation among frustrated employees – this lack
    of creativity and innovation can result in

    slower business growth.

    •

    Employee morale can be low as a result of autocratic management – employees feel
    undervalued, participation is not

    required and recognition rarely given – autocratic managers may well take the
    credit for work performed collectively.

    •

    Managers are employees and may well suffer if required to act in an autocratic
    management style or working

    environment – they take the brunt of pressure causing them stress, pressure and
    burn out.

    Accept all valid responses.

    8

    9609/12

    May/June 2025'
