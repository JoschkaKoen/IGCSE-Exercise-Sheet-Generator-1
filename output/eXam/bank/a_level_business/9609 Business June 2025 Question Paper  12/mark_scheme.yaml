  mark_scheme_answer: 'Analyse two advantages to a business of using sale and leaseback
    of non-current assets as a source of finance.

    There are 8 marks in total for Q6(a)

    4 marks for each of the two advantages of using sale and leaseback of non-current
    assets as a source of finance.

    These 4 marks consist of

    1 mark for

    1 mark for

    2 marks for

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding

    1

    mark for identifying one advantage

    •

    May unlock more funds than conventional sources of finance

    •

    Provides a quick cash injection

    •

    Avoids borrowing costs

    •

    Helps to avoid/reduce debt

    •

    Get cash but still retain full use of asset

    •

    No maintenance costs

    •

    Good option for a business in difficulty

    •

    May support expansion/growth

    When lease ends payments end and there is an opportunity to immediately acquire
    latest advanced equipment – no assets

    to dispose of.

    8

    9609/12

    May/June 2025

    AO2 Application

    1 mark for

    of the chosen advantage

    •

    Sale and leaseback allows a business to free up capital that has been invested
    in an asset and to use the monies

    raised in more profitable and immediate uses – an alternative form of finance

    •

    Capital raised can be used in more profitable and immediate ways

    •

    Provides an alternative form of finance

    •

    Gives more flexibility for financial needs

    •

    For example if a bakery decides to sell and lease back its oven the leasing company
    will take over the repair and

    maintenance costs

    AO3 Analysis

    2 marks for developed analysis of the chosen advantage

    1 mark for limited analysis of the chosen advantage

    •

    It converts non-current assets into capital without the need to lose control of
    the asset – and so provide capital to

    purchase additional assets – in the case of a manufacturer the sale and leaseback
    of a building could supply finance to

    purchase the latest cutting-edge machines.

    •

    It avoids costs traditionally associated with conventional debt financing – for
    real estate transactions costs such as

    valuation and bank fees are avoided – sale-leaseback arrangements may well offer
    more flexible lease terms than a

    traditional lease, mortgage, or bank loan agreement.  The lessee and lessor can
    set their own lease lengths and lower

    interest payments.

    •

    A business may have the opportunity to list the leased asset as an operating expense
    rather than a liability on the

    balance sheet – having fewer liabilities gives a business more eligibility to
    increase borrowings.

    •

    It can reduce risk to a business – owning freehold property, for example, comes
    with its own risks, such as property

    price fluctuations – new/struggling businesses may want to avoid such price fluctuation.

    •

    It increases liquidity – the injection of cash can be used to find new ventures
    and/or pay off outstanding debts and so

    improve the debt-to-equity ratio of the business.

    Accept all valid responses.

    9609/12

    May/June 2025'
