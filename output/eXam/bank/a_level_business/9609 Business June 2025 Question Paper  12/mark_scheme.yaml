  mark_scheme_answer: 'Analyse one reason why a business may use cost-based pricing.

    There are 5 marks for this question:

    1 mark for

    2 marks for

    2 marks for

    Note: no marks can be awarded if a relevant reason is not given

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding

    1 mark for identifying one reason why a business may use cost-based pricing.

    A pricing method adopted by a business by which the selling price of a product
    is determined by adding a specific fixed

    percentage to the product’s unit cost.

    •

    Especially useful to a new business – costs need to be covered with a small profit
    if possible

    •

    It is a simple method – simple to calculate and simple to implement

    •

    It ensures that all production costs are covered

    •

    It may ensure profitability

    •

    It may prevent loss

    •

    Transparent – easy for customers to understand

    •

    Easy to justify – make price adjustments to match cost increases, keeping prices
    low

    5

    9609/12

    May/June 2025

    4

    AO2 Application

    2 marks for developed

    of the chosen reason

    1 mark for limited

    of the chosen reason

    •

    A business may have a choice of pricing methods at any particular time – given
    market conditions and the position of

    the business (in terms of scale of development, operational/survival objectives),
    a decision is made to choose cost-

    based pricing as the most appropriate pricing method

    Low-cost food retailers use this strategy to maintain their competitive position
    – they are obsessed with controlling their

    costs and add a small margin.

    AO3 Analysis

    2 marks for developed

    of the chosen reason

    1 mark for limited

    of the chosen reason

    The decision to adopt cost-based pricing may be taken for the following reasons:

    •

    A business can price products consistently without a lot of market research –
    a simple approach to pricing where the

    full costs of a product are calculated and a margin is added for a specific desired
    profit level – avoids need to spend

    time on nuanced pricing strategies – appealing for a small business.

    •

    It is a reliable pricing method – it ensures a business is covering all costs
    and generating the desired returns (assuming

    accurate cost calculations) – it assists estimates of revenue within a specific
    timeframe.

    •

    It is a pricing method that is easy to understand – it involves very few components
    – explanation of price increases to

    customers does not require a complicated explanation.

    •

    It requires little information relating to customer expectations, competitor pricing,
    or market demand – if a business has

    no competitors and no similar products in the market, cost-based pricing ensures
    a business prices according to

    company objectives and reflects the costs incurred to produce an item – the only
    data needed for cost-plus pricing are

    company costs and desired profit margins.

    Accept all valid responses

    9609/12

    May/June 2025'
