  mark_scheme_answer: 'Analyse two uses of cost information for a business.

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding

    1 mark for identifying ONE use (K)

    •

    provides vital information for effective decision-making- such as cash flow management

    •

    cost information can be used to monitor business performance - identifying which
    products are most profitable

    •

    can be used to reduce costs - take out high-cost centres

    •

    role in selecting price strategy - cost based pricing

    •

    calculating profits

    •

    constructing break-even

    •

    setting budgets

    •

    financial reporting

    •

    choosing suitable location

    •

    choosing appropriate method of production

    8

    9609/13

    October/November 2025

    AO2 Application

    1 mark for application of ONE use (APP)

    •

    decision-making – start-up; expand; cost reduction

    •

    measurement of performance – profit / loss; comparisons

    •

    setting prices - cost plus pricing, contribution pricing

    •

    whether to accept special orders – additional cost of order

    •

    supports review of how areas of business contribute to overall business performance

    •

    may be used as evidence to support business rationalisation

    AO3 Analysis - up to 2 marks for analysis of each use

    2 marks for DEVELOPED analysis of each use (L2 AN)

    1 mark for LIMITED analysis of each use (L1 AN)

    •

    decision-making – can produce break even, budgets, cashflow forecasts, variances
    accurately and make informed

    decisions

    •

    measurement of performance – knowing revenue minus total costs (fixed and variable)
    means profit or loss can be

    calculated

    •

    identify cost centres – allocate costs to different departments / products and
    monitor

    •

    comparing costs with previous years, predictions, competitors or different parts
    of the business is vital to assess and

    improve performance – more profitable / competitive

    •

    cutting costs increases profits as long as revenue stays the same

    •

    prices must cover all costs of the business to make a profit

    •

    special orders – contribution of one product

    Accept all valid responses.

    9609/13

    October/November 2025'
