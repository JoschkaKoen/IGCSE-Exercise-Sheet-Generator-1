  mark_scheme_answer: 'Explain one method of paying employees.

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding

    1 mark for identifying ONE method of paying employees.

    •

    time based

    •

    salary

    •

    piece rates

    •

    commission

    •

    bonuses

    •

    profit sharing

    •

    performance-related pay

    •

    fringe benefits

    AO2 Application

    2 marks for DEVELOPED application/explanation of ONE method of paying employees.

    1 mark for LIMITED application/explanation of ONE method of paying employees.

    •

    employees are paid an agreed amount for each hour they work; the longer they are
    at work, the more they get paid

    •

    an agreed annual amount divided into equal monthly payments; does not depend on
    hours worked or items produced

    •

    employees are paid a set amount for each product they produce; the more they produce,
    the more they earn

    •

    payment based on quantity (or value) of each item sold to encourage sales staff
    to persuade customers to buy

    •

    addition to basic pay, based on individual or team performance in contributing
    to agreed targets

    •

    employees receive some part of the profit made by the business, in addition to
    their regular pay

    •

    paid to employees who meet or exceed targets agreed during appraisal

    •

    perks or extras that are not cash payments but are of financial benefit to the
    employee e.g. use of company car, health

    insurance

    Accept all valid responses.

    3

    9609/13

    October/November 2025'
