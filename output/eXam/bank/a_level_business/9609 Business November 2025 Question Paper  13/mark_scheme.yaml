  mark_scheme_answer: 'Explain one pricing method.

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding - 1 mark for identifying ONE pricing method.

    •

    competitive

    •

    penetration

    •

    skimming

    •

    price discrimination

    •

    dynamic

    •

    cost-based

    •

    psychological

    AO2 Application

    2 marks for a DEVELOPED application / explanation of ONE pricing method.

    1 mark for a LIMITED application / explanation of ONE pricing method.

    •

    price is similar to competitors to avoid damaging / expensive levels of competition
    between businesses OR price set

    below competitors in markets where it is easy for customers to compare prices
    of different businesses

    •

    setting a relatively low price to enter a market, attract customers and gain market
    share quickly, price may rise later

    •

    setting a high price for a new product when it is unique or highly differentiated
    / has low price elasticity of demand /

    price is reduced over time

    •

    charging different prices for the same product at different times or to different
    customers to increase demand and/or

    revenue

    •

    selling at a price which changes according to the level of demand and the customer’s
    ability to pay

    •

    setting a price which covers all the costs of producing/supplying the product
    plus an additional amount to give profit

    •

    takes account of the psychological effect of a price on customers e.g. just below
    a price level ($9.99 not $10) or a high

    price for luxury goods

    Accept all valid responses.

    3

    9609/13

    October/November 2025'
