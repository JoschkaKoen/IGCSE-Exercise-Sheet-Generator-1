  mark_scheme_answer: 'Define the term market growth.

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding

    CLEAR UNDERSTANDING (2 marks)

    •

    The (percentage) increase in the size of a market over a period of time / using
    metrics such as number of customers,

    units sold, or revenue (2)

    •

    Increase in size of market over a period of time (2)

    Clear understanding of the term market growth is worth 2 marks.  This is indicated
    by 2 ticks

    .

    PARTIAL UNDERSTANDING (1 mark)

    •

    Change in the size of a market (1)

    Partial understanding of the term market growth is worth 1 mark.  This is indicated
    by 1 tick

    .

    Accept all valid responses.

    2

    9609/13

