  mark_scheme_answer: '‘A large bank loan is the most appropriate source of finance
    for the expansion of a furniture retailer.’

    Evaluate this view.

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding - 2 marks for DEVELOPED knowledge and understanding
    (L2 K)

    1 mark for LIMITED knowledge & understanding (L1 K)

    •

    sources of finance – internal and / or external – retained profit; share capital;
    debentures; venture capital; bank

    overdraft; leasing; hire purchase; bank loan; mortgage; debt factoring; trade
    credit; crowd funding; government grant

    •

    types of expansion - buying new premises / extending current premises; employing
    more staff; increasing product

    range; buying outlets in different areas

    •

    furniture manufacture – type of retailer – mass market or bespoke selling physically
    or online and / or online

    AO2 Application - 2 marks for DEVELOPED application (L2 APP) - 1 mark for LIMITED
    application (L1 APP)

    •

    furniture retailers – a range from high end to self-assembly

    •

    furniture retailer needs a show room to exhibit the furniture

    •

    sofas, beds, tables, and chairs, home décor items

    •

    Ikea, Lazy Boy, DFS, John Lewis, Furniture World, Furniture Village – accept local
    examples

    AO3 Analysis - 2 marks for DEVELOPED analysis (L2 AN) - 1 mark for LIMITED analysis
    (L1 AN)

    •

    strengths and weaknesses of relevant sources of finance – availability, interest
    payments, amount required, short or

    long term, investor confidence, loss of control, input of new ideas,

    •

    consideration of internal and / or external finance, long term and / or short
    term

    •

    some types of finance may not be available / suitable / enough for expansion –
    crowdfunding, venture capital, micro-

    finance, overdraft, debt-factoring, trade credit

    •

    consideration of different types of expansion and what finance method may be appropriate
    e.g. mortgage for buildings

    or land, leasing or hire purchase for buying new tills, shelving (is a retailer,
    not a manufacturer), becoming a plc for

    large scale expansion of an already recognised business

    12

    9609/13

    October/November 2025

    AO4 Evaluation – Up to 6 marks for EVALUATION - USE THE FOLLOWING TABLE:

    Developed / Supported judgement in context

    6 marks

    Developed / Reasonable evaluative comments in context

    5 marks

    Developed / Supported judgement without context

    4 marks

    Developed / Reasonable evaluative comments without context

    3 marks

    Limited supported judgement

    2 marks

    An attempt to balance the arguments / Weak attempt at evaluative

    comments

    1 mark

    A judgement / conclusion is made as to whether a large bank loan is the most appropriate
    source of finance for the

    expansion of a furniture retailer.

    These judgements / conclusions may be made at any point in the essay, not only
    in a concluding section.

    Appropriateness of finance may depend on:

    •

    the type / extent of expansion being undertaken

    •

    size and type of business ownership

    •

    the amount of retained earnings, non-current liabilities, need to retain control
    of the business and make decisions,

    interest rate levels and stability, opinions of current shareholders

    •

    government grant may only be possible if expansion benefits the area and / or
    meets governments objectives and

    criteria.

    •

    could be more appropriate to use a variety of sources to finance the full amount,
    rather than just a large bank loan

    Accept all valid responses.

    NOTE: The marks for 5(b) and 6(b) are recorded in the following way. The marks
    are entered in the mark input

    column on the right-hand side of the screen

    The K marks are entered in the 5b / 6b AO1 box

    The APP marks are entered in the 5b / 6b AO2 box

    The AN marks are entered in the 5b / 6b AO3 box

    The EVAL marks are entered in the 5b / 6b AO4 box

