  mark_scheme_answer: 'Analyse two limitations for a business of sampling during market
    research.

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding

    1 mark for identifying ONE limitation for a business of sampling during market
    research

    •

    sampling methods used may not be appropriate for a given situation

    •

    researchers may be inexperienced/incompetent

    •

    sample size too small

    •

    sample may not be representative of the population

    •

    may be very time-consuming

    •

    may be very expensive

    •

    questions asked may be ambiguous or biased

    Customer responses may not be honest

    AO2 Application

    1 mark for application / explanation of ONE limitation for a business of sampling
    during market research

    •

    sample may not have been chosen correctly for a particular situation

    •

    efficient sampling / choice of correct method

    •

    may not be suitable for niche markets (already small)

    •

    not everyone in the target population is questioned

    •

    random, stratified and quota sampling must be chosen appropriately

    •

    biased responses due to dishonesty / ignorance / biased questions / lack of understanding
    by respondents

    •

    not all sampling techniques are truly random

    •

    researchers will require payment

    8

    9609/13

    October/November 2025

    AO3 Analysis

    Up to 2 marks for analysis of ONE limitation

    2 marks for DEVELOPED analysis of ONE limitation for a business of sampling during
    market research (L2 AN)

    or

    1 mark for LIMITED analysis of ONE limitation for a business of sampling during
    market research (L1 AN)

    •

    the business cannot be totally confident in the results as they may not be 100%
    reliable

    •

    results and decisions based on a badly chosen sample may damage the business

    •

    if employees are not experienced in sampling, the results of the research will
    be biased and unreliable

    •

    a trained employee may require higher pay, or an external agency may need paying
    to carry out the sampling

    •

    opportunity cost of paying for specialised sampling as part of market research

    •

    good knowledge of the target population is needed to decide which method of sampling
    is appropriate based on ease

    of research, reliability, time available, representation etc

    Accept all valid responses.

    9609/13

    October/November 2025'
