    •

    Short term v long term

    •

    Changes in profit ratio in last two years suggest that management strategies are
    working and indicate that returns to

    shareholders will continue to increase

    •

    Changes being considered/implemented may increase sales and profits and sales.
    Directors would need to actively

    use these increases to pay more dividends

    •

    Effect of these changes is to make more money available for investors BUT will
    the cost of implementation actually

    lead to increased profit? Will WS increase dividends? Will the changes increase
    the share price?

    •

    What timescales are the changes going to occupy?

    •

    The changes that benefit investors will also be beneficial to WS, its managers
    and employees, so high probability of

    them succeeding.

    Accept all valid responses'
