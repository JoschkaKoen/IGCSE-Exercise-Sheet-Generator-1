  mark_scheme_answer: 'Evaluate the best approach for WS to improve the performance
    of its production employees.

    Level

    AO1 Knowledge

    and understanding

    2 marks

    AO2 Application

    2 marks

    AO3 Analysis

    2 marks

    AO4 Evaluation

    6 marks

    3

    5–6 marks

