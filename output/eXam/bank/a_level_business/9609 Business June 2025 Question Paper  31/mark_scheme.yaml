    Indicative content

    AO1 Knowledge and understanding

    Limited knowledge

    will be demonstrated through knowledge of time series analysis OR knowledge of
    other factors

    Developed knowledge

    +

    will be demonstrated through knowledge of time series analysis and knowledge of
    how it

    contributes to decision making or knowledge of other factors influencing decision
    making

    L1 all skills if no clear K of what TSA is.

    Understanding of Time Series Analysis including its advantages (quantitative,
    based on actual data, factors in seasonality)

    and disadvantages (circumstances may change making prediction inaccurate, false
    sense of accuracy, relies on accurate

    data)

    •

    Knowledge of qualitative sales forecasting.

    •

    Knowledge of marketing planning and its elements: objectives, resources, research,
    marketing mix.

    •

    Role of market research and market analysis in setting marketing objectives and
    making decisions

    AO2 Application

    Limited application,

    applies knowledge to WS once.

    Developed application,

    +

    applies knowledge to WS twice.

    •

    WS three markets: fashion, leisure, work.

    •

    Use of information in Table 1.3.

    •

    WS products high price, value for money.

    •

    Jon’s objective is to increase annual sales by 5% p.a.

    •

    WS sells to major retailers and independents.

    •

    Increasing demand for non-leather/sustainable shoes.

    •

    Jon recommended preparing an environmental audit.

    9609/31

    May/June 2025

    AO3 Analysis

    Limited analysis

    – candidate shows one link in the chain of analysis.

    Developed analysis

    – candidate shows two or more links in the chain of analysis

    •

    Sales forecasting enables minimum cost distribution.

    •

    Sales forecasting enables objective to be set and planned for.

    •

    Sales forecasting may ignore changes e.g. new product lines, new marketing mix
    and therefore be inaccurate.

    •

    Objective of increasing sales requires account to be taken of costs, not just
    sales.

    •

    Changing nature of markets requires accurate forecasting (qualitative and quantitative)
    for sales targets to be met.

    •

    TSA data in Table 1.2 is for all products. Table 1.3 indicates there are differences
    in each product/market making the

    data inaccurate for each.

    •

    Table 1.3 gives important information which marketing planning can use

    AO4 Evaluation

    •

    Considered judgement based on argument.

    •

    Sales forecasting important but other elements need to be considered for objectives
    to be met e.g. production capacity,

    appropriate quality of product, appropriate marketing mix.

    •

    Objective of increasing sales is imprecise.

    •

    Accuracy of forecasting relies on accurate methods and data generated.

    •

    Objective is confused – ‘increase sale without entering new markets’ but Jon wants
    research into non-leather products.

    Are these a ‘new market’? or not? This needs clarifying before setting a marketing
    plan.

    •

    Any new products will significantly alter sales forecasts, and in a constantly
    changing market forecasts on their own

    may not be accurate.

    •

    Information on % sales revenue from different products, forecast market growth
    and strength of competition must be

    taken into account when forecasting sales, not just rely on TSA.

    •

    Forecasting sales must apply to the three different markets, not just overall
    sales.

    Accept all valid responses

