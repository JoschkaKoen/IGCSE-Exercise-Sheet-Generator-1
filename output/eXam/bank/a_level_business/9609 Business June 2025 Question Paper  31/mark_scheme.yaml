    AO1 Knowledge and understanding

    Limited knowledge

    will be demonstrated through knowledge of investor return.

    Developed knowledge

    +

    will be demonstrated through knowledge of investor return and knowledge of how
    to

    improve investor return.

    •

    Identification of investors with shareholders

    •

    Understanding of investor return measures: dividend cover (Profit for year/annual
    dividend), earnings (net profit),

    dividend per share, dividend yield (dividend per share/market share price), P/E
    ratio

    •

    Knowledge that shares may be held for long term or short-term reasons.

    •

    Directors decide on dividends.

    •

    Methods to increase investor return:

    -

    Increase revenue relative to costs

    -

    Decrease costs

    AO2 Application

    Limited application,

    applies knowledge to WS once.

    Developed application,

    +

    applies knowledge to WS twice.

    •

    Nature of CP’s products: medium to high price, value for money leather footwear.

    •

    Shareholders take an active interest.

    •

    Recognition of changes in investment indicators in last three years (Table 1.4).

    •

    Operating profit has risen

    •

    EPS has risen

    •

    Share price has increased

    •

    P/E ratio has increased

    •

    Shareholders intend to use the AGM to seek methods to increase their returns.

    •

    Possible changes cited in case: environmental audit, ERP research, marketing plan,
    increased employee performance.

    9609/31

    May/June 2025

