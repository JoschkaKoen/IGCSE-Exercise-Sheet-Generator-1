    AO3 Analysis

    Limited analysis

    – candidate shows one link in the chain of analysis.

    Developed analysis

    – candidate shows two or more links in the chain of analysis

    •

    WS has plans for investing in ERP which would increase efficiency resulting in
    a reduction in unit costs and therefore

    an increase in profit margins. With increased operating profit there would be
    more profits available for distribution to

    shareholders as dividends.

    Effect of possible changes cited in the case:

    •

    Strategies to increase profit including investing in ERP, marketing and  improving
    the performance of employees will

    make WS more attractive to investors resulting in an increase in the share price
    and therefore a potential capital gain

    for shareholders.

    •

    P/E ratio has risen indicating that shareholders are receiving less value for
    their shares, but it could mean there is an

    expectation for future growth.

    •

    Possibility of producing products increasingly demanded by the market so revenue
    and profit increase.

    •

    Marketing plan likely to increases sales and profits.

    •

    Employee performance increases, lowering costs and raising profit.

    •

    Shareholders take an active interest so likely to engage with managers on implementation.

    Other measures WS might introduce to raise investor return could include:

    •

    More machinery/automation to reduce labour costs.

    •

    Price increases to raise markup.

    •

    Cutting spending where this can be done so lowering costs.

    •

    Focusing a marketing plan on highest profitable products.

    9609/31

    May/June 2025

