    arguments.

    Indicative content

    AO1 Knowledge and understanding

    Limited knowledge

    will be demonstrated through knowledge of measures of performance.

    Developed knowledge

    +

    will be demonstrated through knowledge of measures of performance and knowledge
    of

    how to improve performance of production employees.

    •

    Employee performance measured by productivity, absenteeism, labour turnover, accident
    rates, wastage/product

    rejection rates.

    •

    HRM components: motivation, management styles.

    •

    Reference to theories on motivation including: Taylor, Mayo, Herzberg and Maslow

    •

    Possible techniques to improve performance include:

    • Providing better equipment and training.

    • Appropriate motivation techniques for employees.

    • Realistic informed target setting.

    • Bonus payments for production/waste targets.

    • Facilitating employee participation in decision making and/or working arrangements.

    AO2 Application

    Limited application,

    applies knowledge to WS once.

    Developed application,

    +

    applies knowledge to WS twice.

    •

    Batch production on assembly lines.

    •

    Information from Table 1.1 showing employee performance measures.

    •

    Increase in number of units failing to meet quality standards.

    •

    Increase in labour turnover.

    •

    Increase in number of accidents.

    •

    Use of bullet points on employee performance.

    •

    Wages 10% more than industry average.

    •

    Complaints about production targets.

    •

    On-the-job training.

    •

    Limited opportunities for career progression.

    •

    Strict management style.

    9609/31

    May/June 2025

    AO3 Analysis

    Limited analysis

    – candidate shows one link in the chain of analysis.

    Developed analysis

    – candidate shows two or more links in the chain of analysis

    Chains of reasoning developing how techniques will impact performance:

    •

    Bonuses for achievement of production targets will provide a financial incentive
    for production employees encouraging

    them to be more focused on increasing output and therefore increasing productivity.

    •

    Off the job training could make employees feel more valued and increase skills
    therefore improving motivation and

    quality of work which will reduce the number of defects and lead to higher output.

    •

    Empowering workers to make more decisions about their working day will reduce
    the conflict caused by the current

    strict management style and have a positive impact on motivation therefore resulting
    in a reduction in labour turnover.

    •

    Possible reasons for decreased performance include:

    •

    Little training ‘expected to learn on job’, non-participation in decision making
    ‘follow instructions’, complaints about

    targets.

    •

    Limited opportunities for progression.

    •

    All measures in Table 1.1 show decreasing performance.

    •

    Pay does not seem to be a factor ‘paid 10% more than industry average’.

    AO4 Evaluation

    Limited evaluation

    – limited supported judgement and/or a weak attempt at evaluative comment.

    Developed evaluation

    – supported judgement and/or reasonable evaluative comment.

    Developed evaluation in context

    – supported judgement in context and/or reasonable evaluative comment in

    context.

    Justified recommendations based on analysis include:

    •

    More and better training for employees and supervisors.

    •

    More participation in decision making.

    •

    More freedom to carry out tasks as employees decide.

    •

    More motivation techniques to be applied e.g. regular appraisals, non-financial
    motivators.

    •

    Clear realistic targets set, possibly with bonuses for meeting them.

    •

    Regular meetings with employees and/or their representatives.

    •

    Balanced argument on the advantages and disadvantages of a given approach.

    •

    Weighting of advantages and disadvantages of a given approach.

    Accept all valid responses

    9609/31

    May/June 2025'
