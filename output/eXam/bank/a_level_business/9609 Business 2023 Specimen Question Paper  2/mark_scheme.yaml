  mark_scheme_answer: 'Explain one payment method, other than time based, that DC
    could use to pay its employees.

    Follow the point-based marking guidance at the top of this mark scheme and use
    Table A to give marks for each candidate

    response.

    AO1 out of 1 mark.

    AO2 out of 2 marks.

    Indicative content

    Responses may include:

    AO1 Knowledge

    •

    Knowledge of payment methods, for example piece rate, salary, commission, bonuses,
    performance-related pay, profit

    sharing, fringe benefits.

    AO2 Application

    •

    Employees could be paid per pair of trousers – with the new batch production method.

    •

    Dress designers are given an annual salary – which is paid monthly.

    •

    Commission for designers per dress – % of the value, for example of the $750.

    •

    Bonuses linked to DC sales – more sales of designer clothing will lead to bonuses
    being paid.

    •

    Similar approach for performance-related pay, profit sharing and fringe benefits.

    Do not reward any time-based methods.

    Accept all valid responses.

    3

    AO1

    1

    AO2

    2'
