  mark_scheme_answer: "Analyse two human resource problems that DC might experience\
    \ from the introduction of a new batch production\nmethod.\nUse Table B to mark\
    \ candidate responses to this question.\nAO1 out of 2 marks.\nAO2 out of 2 marks.\n\
    AO3 out of 4 marks.\n8\n9609/02\nFor examination\nSPECIMEN\b\nfrom 2023\nFor maximum\
    \ marks, candidates need to look at two human resource problems in relation to\
    \ the new batch production\nmethod.\nIndicative content\nResponses may include:\n\
    AO1 Knowledge and understanding\n•\nLower morale/job satisfaction.\n•\nDeskilling.\n\
    •\nTraining needs.\n•\nFear of change.\nAO2 Application\n•\nIt currently uses\
    \ job production.\n•\nEmployees meet with customers.\n•\nEmployees are highly\
    \ skilled.\n•\nEmployees are paid hourly rates.\nAO3 Analysis\n•\nLower morale/job\
    \ satisfaction – workers are used to working on unique clothing and will have\
    \ immense pride in their\nwork. This may fall if working on a batch production\
    \ line.\n•\nDeskilling – if machinery is being used, this may replace the skills\
    \ of the employees used to make unique clothing.\n•\nTraining needs – the new\
    \ machinery will involve training. This needs to be financed. Can the business\
    \ afford it?\n•\nFear of change – the communication of this business decision\
    \ will be important – employees are likely to be fearful of the\nnew machinery/batch\
    \ production. Khaleal needs to have a clear communication and employee participation\
    \ strategy.\nAccept all valid responses.\nAO1\n2\nAO2\n2\nAO3\n4\n9609/02\nFor\
    \ examination\nSPECIMEN\b\nfrom 2023"
  mark_scheme: []
  graphics: []
- number: 2d
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: "Evaluate suitable pricing methods that DC could use for the\
    \ new range of trousers.\nUse Table C to mark candidate responses to this question.\n\
    AO1 out of 2 marks.\nAO2 out of 2 marks.\nAO3 out of 2 marks.\nAO4 out of 6 marks.\n\
    Indicative content\nResponses may include:\nAO1 Knowledge and understanding\n\
    •\nCompetitive, a similar price based on that of competitors, could be higher\
    \ or lower.\n•\nPenetration, a low price to gain market share quickly.\n•\nSkimming,\
    \ a high price to gain high profits.\n•\nPrice discrimination, different prices\
    \ for different groups of customers.\nAO2 Application\n•\nQuality trousers, aimed\
    \ at the high end of the market.\n•\nAimed at women aged 25–50, price needs to\
    \ be suitable for this target market.\n•\nSold to large shops, price needs to\
    \ include their profit as well.\n•\nBranded with DC logo, price needs to reflect\
    \ image.\n•\nFeedback from focus group, price needs to reflect research.\n•\n\
    Batch produced, cost might be lower which could be reflected in the price.\nAO3\
    \ Analysis\n•\nCompetitive – the trousers are being sold to large shops. They\
    \ are likely to have other competitors and so they will need\nto be competitive\
    \ to persuade the large shop to stock the trousers.\n•\nPenetration – DC are moving\
    \ into a new market. They may look to offer high discounts on initial orders,\
    \ build their\nrelationship with the large shops, and then increase prices.\n\
    •\nSkimming – unlikely to be effective as these are batch-produced products –\
    \ they may have a reputation for quality but\nbatch production will mean the uniqueness\
    \ of each piece of clothing will be lost so unlikely to be able to charge higher\n\
    prices especially to a large shop.\n12\n9609/02\nFor examination\nSPECIMEN\b\n\
    from 2023\n•\nPrice discrimination – unlikely to be effective as difficult for\
    \ DC to separate the market for trousers particularly by\ngeography. They are\
    \ selling direct to the large shops who will then decide which shops to sell them\
    \ in. DC does not have\ncontrol of this. They are also trying to break into a\
    \ new market so unlikely this will work.\nAO4 Evaluation\n•\nThe feasibility of\
    \ methods for DC for example may depend on its cash flow or business objectives.\n\
    •\nThe affordability of the methods for DC, for example price discrimination,\
    \ might involve additional costs.\n•\nThe reactions of competitors for example\
    \ to a penetration price.\n•\nThe results of the market research, for example\
    \ if the trousers are perceived as being high quality skimming prices will be\n\
    appropriate.\n•\nA judgement/recommendation over the most/least suitable method(s).\n\
    •\nA conclusion to use more than one method (short term/long term for example).\n\
    •\nA ranking of suitable methods.\nAccept all valid responses.\nAO1\n2\nAO2\n\
    2\nAO3\n2\nAO4\n6\n9609/02\nFor examination\nSPECIMEN\b\nfrom 2023\nBLANK PAGE"
  mark_scheme: []
  graphics: []
