  mark_scheme_answer: "Explain the term ‘sole trader’ (line 4).\nFollow the point-based\
    \ marking guidance at the top of this mark scheme and use Table A to give marks\
    \ for each candidate\nresponse.\nAO1 out of 1 mark.\nAO2 out of 2 marks.\nIndicative\
    \ content\nResponses may include:\nAO1 Knowledge and understanding\n•\nA business\
    \ owned and controlled by one person.\nAO2 Application\n•\nA sole trader has unlimited\
    \ liability – which means their personal possessions are at risk.\n•\nThe owner\
    \ has full control of the business – because there are no other owners.\n•\nAble\
    \ to keep all the profits – because there are no other owners.\n•\nDoes not have\
    \ to publish accounts – because this is not a legal requirement.\n•\nNo continuity\
    \ – as the business ceases with the owner’s death.\nAccept all valid responses.\n\
    3\nAO1\n1\nAO2\n2\n9609/02\nFor examination\nSPECIMEN\b\nfrom 2023"
  mark_scheme: []
  graphics: []
