- number: 1bii
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: "Explain one reason why Amir carried out market research.\n\
    Follow the point-based marking guidance at the top of this mark scheme and use\
    \ Table A to give marks for each candidate\nresponse.\nAO1 out of 1 mark.\nAO2\
    \ out of 2 marks.\nIndicative content\nResponses may include:\nAO1 Knowledge and\
    \ understanding\n•\nMarket research is where a business finds out about its customers\
    \ or market.\n•\nAny reason for market research, for example to understand customers,\
    \ reduce risk, understand competitors and\nestablish trends.\nAO2 Application\n\
    •\nAllows Amir to understand what his customers want (or potential customers)\
    \ – and then adapt his business to these\nrequirements.\n•\nAmir could analyse\
    \ the market – before starting to offer different foods if customers want these.\n\
    •\nAmir can minimise the risk of launching Asian food – by assessing future demand.\n\
    •\nAllows Amir to know his main competitors – for example use this to develop\
    \ a USP, lower prices, better delivery.\n•\nHelps Amir to identify trends in the\
    \ market and then develop his marketing – for example to anticipate a trend for\
    \ Asian\nfood.\nAccept all valid responses.\n3\nAO1\n1\nAO2\n2\n9609/02\nFor examination\n\
    SPECIMEN\b\nfrom 2023"
  mark_scheme: []
  graphics: []
- number: 1c
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: "Analyse one advantage and one disadvantage, to Amir, of BH\
    \ becoming a private limited company.\nUse Table B to mark candidate responses\
    \ to this question.\nAO1 out of 2 marks.\nAO2 out of 2 marks.\nAO3 out of 4 marks.\n\
    Indicative content\nResponses may include:\nAO1 Knowledge and understanding\n\
    Advantages\n•\nLimited liability.\n•\nLegal personality.\n•\nContinuity.\n•\n\
    Selling shares.\nDisadvantages\n•\nLegal formalities.\n•\nAccounts must be made\
    \ available for public inspection.\n•\nLoss of personal relationship with employees.\n\
    •\nPossible loss of control.\nAO2 Application\n•\nAmir mortgaged his home to finance\
    \ the start-up.\n•\nAmir’s son works within the business as a chef.\n•\nEight\
    \ competitors.\n•\nSole trader.\n•\nConsidering to start selling Asian food.\n\
    AO3 Analysis\nAdvantages\n•\nAmir would gain limited liability, which would mean\
    \ that his potential loss from the business would be limited to the\namount that\
    \ he has invested, not his personal possessions and wealth (e.g. his house).\n\
    •\nBH would gain its own legal personality, which would mean that if BH was taken\
    \ to court (e.g. for selling poor/\ncontaminated products) then the business would\
    \ be sued not Amir.\n8\n9609/02\nFor examination\nSPECIMEN\b\nfrom 2023\n•\nBH\
    \ would gain continuity, which would mean that Amir’s son could inherit the business\
    \ on Amir’s death.\n•\nBH could potentially take on more investors by selling\
    \ shares which would increase the sources of finance open to BH\nand could fund\
    \ the potential expansion into Asian food. Amir might increase the profit he makes\
    \ from the business.\nDisadvantages\n•\nThere will be some legal formalities and\
    \ paperwork involved in becoming a private limited company which will be an\n\
    additional cost to the business that Amir must fund.\n•\nEnd of year accounts\
    \ must be made available for public inspection, which could lead to competitors\
    \ gaining information\nabout BH which Amir would not want to be known. This is\
    \ especially important in such a competitive market.\n•\nEmployees may feel that\
    \ the business is becoming larger and may worry that they could lose their personal\
    \ relationship\nwith Amir.\n•\nIf Amir takes on further investors as shareholders\
    \ of the business, then this may lead to a loss of control and less profit\nfor\
    \ himself.\nAccept all valid responses.\nAO1\n2\nAO2\n2\nAO3\n4\n9609/02\nFor\
    \ examination\nSPECIMEN\b\nfrom 2023"
  mark_scheme: []
  graphics: []
- number: 1d
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: "Evaluate whether BH should sell Asian food.\nUse Table C to\
    \ mark candidate responses to this question.\nAO1 out of 2 marks.\nAO2 out of\
    \ 2 marks.\nAO3 out of 2 marks.\nAO4 out of 6 marks.\nIndicative content\nResponses\
    \ may include:\nAO1 Knowledge and understanding\nThe decision to sell a new product\
    \ is affected by:\n•\nMarket research, interpretation of results.\n•\nMarketing\
    \ mix – 4Ps (product, price, place, promotion).\n•\nMarket penetration, gaining\
    \ an increased market share.\n•\nProfitability, level of sales needed to make\
    \ a profit.\n•\nBusiness objectives, profit maximisation, sales growth.\nAO2 Application\n\
    •\nBH has a delivery service – Wok’s and Chao’s do not.\n•\nAmir’s objective –\
    \ to increase market share.\n•\nThe employee experience – none of BH’s employees\
    \ have experience in cooking or selling Asian food.\n•\nAmir believes that it\
    \ would be profitable – to sell Asian food in this market.\n•\n40% of the market\
    \ is with market leaders – $240 000 offering Asian food.\n•\nBH has 15% share\
    \ of the market – $90 000 (OFR from Q1(b)(i)).\n•\nRelationship with current products\
    \ – burgers, kebabs, pizza and side orders.\n•\nAmir is sole trader – but thinking\
    \ of converting business to a private limited company.\n•\nCompetitive market\
    \ – eight in total, six offer Asian food so many similar businesses.\n•\nBusy\
    \ high street location – large number of potential customers.\nAO3 Analysis\n\
    •\nWould allow BH to take customers away from Wok’s and Chao’s and increase market\
    \ share.\n•\nCould give BH a USP over these businesses and increase their market\
    \ share.\n12\n9609/02\nFor examination\nSPECIMEN\b\nfrom 2023\n•\nBH could gain\
    \ a competitive advantage over its current rivals. They could cater for families\
    \ who want more than one type\nof food in an order, again giving them a competitive\
    \ advantage.\n•\nMay not be able to offer a quality service which could damage\
    \ their reputation.\n•\nBH may need to provide training and/or hire new workers\
    \ to offer Asian food which would increase the costs of the\nbusiness.\n•\nWok’s\
    \ and Chao’s may decide to do the same and start selling burgers, kebabs, pizzas\
    \ and side orders and therefore\nmake the market even more competitive and possibly\
    \ reduce BH’s market share.\n•\nThere are likely to be increased marketing costs\
    \ involved in launching this new service; new menus, advertising, etc.\nwhich\
    \ could reduce profit.\nAO4 Evaluation\n•\nThe feasibility and affordability of\
    \ offering a new product.\n•\nThe likely reactions of competitors.\n•\nThe results\
    \ of any market research undertaken by Amir.\n•\nWeighing up of objectives and\
    \ risks.\n•\nThe potential consequences of not selling a new product.\n•\nThe\
    \ relative costs and benefits of offering Asian food.\n•\nA judgement whether\
    \ or not BH should sell Asian food.\n•\nA conclusion to make an attempt to offer\
    \ some Asian food (or not).\n•\nA judgement to do something other than offering\
    \ Asian food.\n•\nAn attempt to advise BH/Amir on future decisions about offering\
    \ Asian food.\nAccept all valid responses.\nAO1\n2\nAO2\n2\nAO3\n2\nAO4\n6\n9609/02\n\
    For examination\nSPECIMEN\b\nfrom 2023"
  mark_scheme: []
  graphics: []
