- number: '2'
  question_type: short_answer
  marks: 0
  text: "2\nDesigner Clothing (DC)\nDC is a medium sized private limited company.\
    \ It has been trading for 10 years. DC makes\nluxury dresses for women using job\
    \ production methods. DC has an excellent reputation for\nquality. A DC designer\
    \ has a meeting with every customer to design a dress that satisfies\nthe customer’s\
    \ individual needs, including choice of fabric and colour. Cost-based pricing\
    \ is\nused with 50% added to the average cost of each dress.\nDC’s employees are\
    \ highly skilled and paid hourly rates (a time based method). Ikram, one\nof the\
    \ designers, has just had a meeting with a new customer, Lydia. Lydia wants Ikram\
    \ to\ndesign and make a new dress for her. Ikram has worked out the production\
    \ data shown in\nTable 2.1 for the dress.\nTable 2.1: Production data for the\
    \ dress for Lydia\nProduction time\n20 hours\nHourly rate\n  $10\nMaterial costs\n\
    $250\nIndirect cost allocation\n  $25\nOther costs such as packaging\n  $25\n\
    Jenny, the Managing Director, wants to use DC’s excellent reputation and move\
    \ into a new\nmarket. Jenny wants to create a new range of DC branded trousers\
    \ for women. Jenny has\ndeveloped some elements of a marketing mix for the new\
    \ trousers:\n\t•\nProduct: quality trousers aimed at women aged 25–50\n\t•\nDistribution\
    \ channel: sold in large shops\n\t•\nPromotion: branded with the DC logo\nJenny\
    \ will develop a business plan when she receives the market research report, which\n\
    includes feedback from a focus group. Jenny thinks that the pricing strategy DC\
    \ currently\nuses will not be appropriate for the new trousers.\nThe new product\
    \ range would use a batch production method. The Production Director,\nKhaleal,\
    \ has identified the machinery needed for the new production method. Khaleal is\n\
    worried about the problems that introducing the new production method might cause\
    \ DC’s\nemployees.\n5\n10\n15\n20\n25\n\n(a)\t (i)\t Identify one indirect cost.\n\
    \ [1]\n\n(ii)\t Explain the term ‘business plan’ (line 22).\n[3]\n\n(b)\t (i)\t\
    \ Refer to Table 2.1 and other information. Calculate the price of the dress for\
    \ Lydia.\n[3]\n\n(ii)\t Explain one payment method, other than time based, that\
    \ DC could use to pay its\nemployees.\n[3]\n\n(c)\t Analyse two human resource\
    \ problems that DC might experience from the introduction of a\nnew batch production\
    \ method.\n[8]\n\n(d)\t Evaluate suitable pricing methods that DC could use for\
    \ the new range of trousers.\n[12]"
