  text: "1\nBarbecue House (BH)\nBH is a fast food restaurant and takeaway business,\
    \ which sells a range of burgers, kebabs,\npizzas and side orders. BH also has\
    \ a delivery service to the local area.\nBH is owned by Amir who mortgaged his\
    \ home to finance the start-up of the business. Amir\noperates BH as a sole trader.\
    \ His son also works within the business as a chef. Amir has\nbeen advised to\
    \ change the legal structure of BH and to become a private limited company\nto\
    \ protect the business and himself.\nBH is located on a busy high street. There\
    \ are many other similar businesses on the high\nstreet and in the surrounding\
    \ area. Amir knows that the continued success of the business\nrequires him to\
    \ identify a gap in the market and develop a unique selling point (USP). Amir\n\
    has carried out some market research (see Table 1.1 and Fig. 1.1).\nTable 1.1:\
    \ Market research data about competitors within 2 km of BH\nTotal number of competitors\n\
    8\nNumber of competitors who offer delivery services\n4\nNumber of competitors\
    \ who do not sell Asian food\n6\nGrosetto\n5%\nBH\nPapa Joe’s\n10%\nMama Mia’s\n\
    10%\nChao’s\n20%\nTJ’s\n5%\nPizza House\n5%\nPepe’s\n10%\nWok’s\n20%\nTotal market\
    \ value = $600 000\nFig. 1.1: Market share data for competitors within 2 km of\
    \ BH\nThe two market leaders are Wok’s and Chao’s. Both businesses specialise\
    \ in Asian food\nbut neither has a delivery service. Amir would like to increase\
    \ BH’s market share. He is\nconsidering starting to sell Asian food. None of his\
    \ employees have any experience cooking\nor selling Asian food but Amir believes\
    \ that the possible increase in income would be worth\nany extra costs.\n5\n10\n\
    15\n20\n\n(a)\t (i)\t Identify one benefit for a business of a unique selling\
    \ point (USP).\n [1]\n\n(ii)\t Explain the term ‘sole trader’ (line 4).\n[3]\n\
    \n(b)\t (i)\t Refer to Fig. 1.1. Calculate the value in dollars ($) of BH’s share\
    \ of the market.\n[3]\n\n(ii)\t Explain one reason why Amir carried out market\
    \ research.\n[3]\n\n(c)\t Analyse one advantage and one disadvantage, to Amir,\
    \ of BH becoming a private limited\ncompany.\n[8]\n\n(d)\t Evaluate whether BH\
    \ should sell Asian food.\n[12]"
