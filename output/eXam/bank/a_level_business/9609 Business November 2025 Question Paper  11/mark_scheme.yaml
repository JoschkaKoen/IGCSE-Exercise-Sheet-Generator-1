  mark_scheme_answer: 'Analyse two benefits to a business of using a Boston Matrix.

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding

    1 mark for identifying ONE benefit (K)

    •

    allows the business to analyse and assess the range of different products currently
    produced by a business

    •

    can see and review the allocation of resources between different products

    •

    can provide important information about the strengths/weaknesses of particular
    products

    •

    allows a business to measure how each product contributes to total business performance

    •

    could attract additional investment

    •

    compare their products to those of competitors

    •

    make decisions about the products in the portfolio

    •

    business planning for new product development

    •

    AO2 Application

    1 mark for application of ONE benefit (APP)

    •

    identifies question marks, stars, cash cows and dogs

    •

    analyses the market share and market growth of a business’ products

    •

    identifies products which are at different stages of their product lifecycle

    •

    identify changes needed to operations and marketing (e.g. pricing) of current
    products, resources, expenditure, product

    development, strategies

    •

    lack of question marks/stars in the Boston Matrix suggests new product needed

    8

    9609/11

    October/November 2025

    AO3 Analysis

    up to 2 marks for analysis of each benefit – 2 marks for DEVELOPED analysis of
    each benefit (L2 AN) – 1 mark for

    LIMITED analysis of each benefit (L1 AN)

    Aspects of the marketing mix may be applied to product types in the Boston Matrix
    e.g.

    •

    effective promotion of question marks to increase market share within the market
    – may need market research and a

    new promotional mix

    •

    decide pricing strategies to increase revenue, e.g. skimming/penetration/competitive,
    depending on the market

    •

    apply extension strategies for cash cows to maintain revenue and provide reliable
    funding to support other products

    •

    whether to remove a product (dog) from the portfolio or adjust the marketing mix
    – may depend on demand in the

    market

    •

    may need to carry out R&D which will need to be financed

    Accept all valid responses.

    9609/11

    October/November 2025'
