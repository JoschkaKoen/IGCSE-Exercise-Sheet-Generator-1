    the ratio of outputs to labour input during production (2)

    •

    output per worker (2)

    •

    =Total output

    Number of employees (2)

    Clear understanding of the term labour productivity is worth 2 marks. This is
    indicated by 2 ticks

    .

    PARTIAL UNDERSTANDING (1 mark)

    Partial understanding of the term labour productivity is worth 1 mark. This is
    indicated by 1 tick

    .

    •

    output of labour/workforce (1)

    •

    how much employees are able to do/how productive workers are (1)

    Accept all valid responses.

    2

    9609/11

