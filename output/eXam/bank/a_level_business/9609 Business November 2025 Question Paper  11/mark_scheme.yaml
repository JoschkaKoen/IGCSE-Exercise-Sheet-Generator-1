  mark_scheme_answer: 'Analyse one benefit to a business of low labour turnover.

    Note: no marks can be awarded if a relevant benefit is not given

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding

    1 mark for identifying ONE BENEFIT to a business of low labour turnover

    •

    retain experienced, trained and skilled employees

    •

    motivated/loyal employees

    •

    lower costs

    •

    HR team focussed on current employees not recruitment

    •

    achievement of objectives

    •

    uninterrupted production process/good productivity

    •

    increased stability/reputation of business

    5

    9609/11

    October/November 2025

    4

    AO2 Application

    2 marks for a DEVELOPED application/explanation of ONE benefit to a business of
    low labour turnover

    1 mark for LIMITED application/explanation of ONE benefit to a business of low
    labour turnover

    •

    retain employees so skills are kept within the business

    •

    assurance of job security to current and prospective employees

    •

    current employees know the business well as have been there a long time

    •

    less money and time is spent on the recruitment, selection and training process
    for new employees

    •

    understanding of objectives may have increased over time

    •

    current employees are satisfied/better motivated and developed

    •

    no delays created by missing employees

    •

    employees are happy and praise the business to outsiders

    AO3 Analysis

    2 marks for DEVELOPED analysis of ONE benefit to a business of low labour turnover

    1 mark for LIMITED analysis of ONE benefit to a business of low labour turnover

    •

    employees are specialised and can work with few errors so less waste and good
    quality

    •

    encourages loyalty and hard work and assists with recruitment so saving money

    •

    employees know what they are doing and have high output/can train others with
    on-the-job training

    •

    reduced opportunity cost so more finance is available to use elsewhere in the
    business

    •

    long-serving employees are more likely to have commitment to working towards and
    achieving the objectives

    •

    can attract skilful labour to the business so improving productivity

    •

    better customer satisfaction and loyalty increases sales and revenue

    Accept all valid responses.

    9609/11

    October/November 2025'
