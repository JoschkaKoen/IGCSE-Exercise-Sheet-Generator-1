  mark_scheme_answer: '‘Risk taking is the most important quality needed by an entrepreneur
    to be successful in the clothing design

    industry.’

    Evaluate this view.

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding

    2 marks for DEVELOPED knowledge and understanding (L2 K)

    1 mark for LIMITED knowledge and understanding (L1 K)

    Qualities of an entrepreneur

    •

    multi-skilled

    •

    self-confidence

    •

    ability to bounce back

    •

    innovative/creative/make good designs

    •

    results orientated

    •

    committed

    •

    self-motivated

    •

    leadership skills

    •

    definition of an entrepreneur

    AO2 Application

    2 marks for DEVELOPED application (L2 APP)

    1 mark for LIMITED application (L1 APP)

    •

    relevance to clothing design industry – design of garments, not manufacture, although
    in a small start-up the

    entrepreneur may do both

    •

    changing fashions/clothing trends/seasons

    fashion designers, tailors, types of clothes, fabric, fashion shows

    12

    9609/11

    October/November 2025

    AO3 Analysis

    2 marks for DEVELOPED analysis (L2 AN)

    1 mark for LIMITED analysis (L1 AN)

    •

    consideration of the importance of risk-taking as a quality of an entrepreneur.
    This may look at ways in which risk-

    taking is important and ways in which it isn’t important

    •

    risk of entering an established and competitive environment and investing own
    savings. May be relatively cheap to

    enter this industry as it is design, not necessarily manufacturing

    •

    belief that the business can enter the market alongside established brands although
    designs can be cheaper and

    aimed at different markets in which the entrepreneur may have more experience

    •

    risk of failing and having to start again – might be needed if customers do not
    like the designs and demand is low

    •

    take the risk to produce new and innovative designs/styles of clothing to attract
    customer from competitors

    •

    consideration of the importance of other qualities of an entrepreneur

    •

    being multiskilled and having ability to perform many different business activities
    e.g. market research, promotion,

    presentation of product, handling of finance, dealing with customers, cutting
    out, sewing, etc. Designs could be done

    using CAD and a website, making some other skills redundant or easier to deal
    with

    •

    focussed on achieving objectives which the entrepreneur will have set for themselves
    and therefore is more likely to

    know how to work towards to make the business successful

    •

    ambition to make this business succeed as the alternative is to develop a new
    business idea or move into the role of an

    employee for another business (which an entrepreneur may find boring)

    •

    driven and hard-working as this is their own business and they are more likely
    to work long hours in order to make it

    succeed – the initial risk is the most exciting stage

    •

    able to inspire/motivate employees with the entrepreneur’s own vision, self -belief
    and work ethic as cannot run the

    business on their own

    9609/11

    October/November 2025

    AO4 Evaluation

    Up to 6 marks for EVALUATION – USE THE FOLLOWING TABLE:

    Developed/Supported judgement in context

    6 marks

    Developed/Reasonable evaluative comments in context

    5 marks

    Developed/Supported judgement without context

    4 marks

    Developed/Reasonable evaluative comments without context

    3 marks

    Limited supported judgement

    2 marks

    An attempt to balance the arguments/Weak attempt at evaluative comments

    1 mark

    A judgement/conclusion is made as to whether risk taking is the most important
    quality for an entrepreneur to be successful

    in the clothing design industry. Such judgements/conclusions may be made at any
    point in the essay, not only in a

    concluding section.

    •

    how important are other qualities of entrepreneurs instead of/alongside risk taking?

    •

    what is considered successful in this industry – survival, being profitable, gaining
    market share with cheap clothing,

    entering a niche market with high end fashion?

    •

    what level of risk is involved within the entrepreneur’s plans – are they providing
    custom T-shirts with a design specified

    by a customer using a web page – do they want to design elaborate wedding dresses
    or festival outfits for a specific

    target market – is this a new business or a diversification for an already successful
    entrepreneur breaking into a new

    market?

    •

    a judgement should be made about the importance of different qualities in this
    particular context

    •

    other factors might be equally or more important than any quality shown by an
    entrepreneur – the strength of the

    competition, the demand of the consumer, how dynamic the market is, where the
    entrepreneur is selling the product,

    external conditions affecting the market, etc.

    Accept all valid responses.

    9609/11

    October/November 2025'
