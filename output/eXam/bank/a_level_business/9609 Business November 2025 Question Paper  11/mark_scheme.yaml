  mark_scheme_answer: 'Explain one benefit to a business of having a business plan.

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding

    1 mark for identifying ONE BENEFIT of having a business plan

    •

    provides a clear plan/goal/guidance for the future

    •

    forces critical consideration of business

    •

    encourages market research

    •

    helps obtain finance

    •

    increases motivation

    •

    minimises risk of uncertainty

    •

    helps to measure success of the business against targets

    AO2 Application

    2 marks for DEVELOPED application/explanation of the benefit given

    1 mark for LIMITED application/explanation of the benefit given

    •

    increases chances of success/reduces risk of failure by anticipating problems
    e.g. financial/supply/staffing

    •

    includes a detailed view of the potential customers, competitors and external
    environment

    •

    sets objectives and co-ordinates all parts/departments of the business to meet
    them

    •

    gives investors/banks the confidence that the business can repay the money/make
    profit

    •

    helps the employees stay focussed on the objectives and see progress

    Accept all valid responses

    3

    9609/11

    October/November 2025'
