  mark_scheme_answer: 'Define the term liquidation.

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding

    CLEAR UNDERSTANDING (2 marks)

    •

    process of selling off assets to repay debts/creditors (2)

    •

    selling assets to settle liabilities (2)

    •

    when a business ceases trading and its assets are sold for cash to pay suppliers
    and other creditors (2)

    Clear understanding of the term liquidation is worth 2 marks. This is indicated
    by 2 ticks

    .

    PARTIAL UNDERSTANDING (1 mark)

    •

    selling assets (1)

    •

    dissolution of a business (1) NOTE: do not accept bankruptcy.

    Partial understanding of the term liquidation is worth 1 mark. This is indicated
    by 1 tick

    .

    Accept all valid responses.

    2

