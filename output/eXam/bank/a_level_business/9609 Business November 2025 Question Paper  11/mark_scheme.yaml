  mark_scheme_answer: 'Define the term public sector.

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding

    CLEAR UNDERSTANDING (2 marks)

    •

    organisations accountable to and run/owned/controlled by central or local government
    (the state) (2)

    •

    the part of the economy composed of both public services and public enterprises;
    may be supported by examples e.g.

    police or medical services (2)

    •

    the sector in which goods and services are provided by the state/government (2)

    Clear understanding of the term public sector is worth 2 marks. This is indicated
    by 2 ticks

    .

    PARTIAL UNDERSTANDING (1 mark)

    •

    businesses which are not controlled by private individuals/not in the private
    sector (1)

    Partial understanding of the term public sector is worth 1 mark. This is indicated
    by 1 tick

    .

    Accept all valid responses.

    2

    9609/11

    October/November 2025'
