  mark_scheme_answer: 'Explain one external source of finance for a business.

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding

    1 mark for identifying ONE external source of finance for a business.

    •

    bank loans

    •

    share capital

    •

    debentures

    •

    new partners

    •

    venture capital/private investment

    •

    bank overdrafts

    •

    leasing

    •

    hire purchase

    •

    mortgages

    •

    debt factoring

    •

    trade credit

    •

    micro-finance

    •

    crowd funding

    •

    government grant

    3

    9609/11

    October/November 2025

    AO2 Application

    2 marks for DEVELOPED application/explanation of ONE source of finance.

    1 mark for LIMITED application/explanation of ONE source of finance.

    •

    borrowing money from a bank and paying it back in instalments, including interest,
    over an agreed period of time

    •

    raising money by selling a share of the business to investors who then have voting
    rights and receive a dividend

    •

    a long-term loan with a fixed interest rate where investors do not have voting
    rights but do receive the interest payment

    •

    allowing new partners to buy into the business, providing more money and expertise;
    will require a share of the profit

    •

    investors provide a mix of loan and share capital to a business which has a high
    risk of failure; want a return of partial

    ownership and control plus dividend on profits

    •

    short term finance allowing a business to borrow up to an agreed limit for as
    long as it wishes but interest must be paid

    •

    renting non-current assets for an agreed period of time, without owning them

    •

    buying non-current assets in instalments over an agreed period of time, owning
    the asset once the final payment is

    made

    •

    long term loans for the purchase of land and buildings, with the land or building
    used as collateral (security)

    •

    selling unpaid invoices to financial institutions to gain immediate cash; there
    is a fee to be paid for this service

    •

    short term finance – interest free loan from suppliers, with agreement to pay
    for goods/services within agreed time

    period after receiving invoice

    •

    transfer of money from high income earners (individuals/countries) to low-income
    earners to develop business activities

    •

    collecting a small amount of money from a large number of supporters, which may
    be a donation or a loan

    •

    money from government to support business activity which benefits the country
    – jobs, production, R and D,

    competitiveness

    Accept all valid responses.

    9609/11

    October/November 2025'
