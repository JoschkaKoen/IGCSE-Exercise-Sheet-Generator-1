  mark_scheme_answer: 'Analyse two benefits to a business of using a vertical merger
    for growth.

    Indicative content

    NOTE: Some understanding of the term vertical merger must be shown. Responses
    which give general benefits of a

    horizontal merger/growth e.g. larger workforce/economies of scale are not answering
    the question and should not be

    rewarded.

    Responses may include:

    AO1 Knowledge and understanding

    1 mark for identifying ONE benefit to a business of using a vertical merger for
    growth

    •

    rapid external growth within the same supply chain

    •

    control over the market/secures outlets/customers/suppliers

    •

    improved quality control of materials

    •

    exclude competitors from using same supplier

    •

    reduces costs

    •

    R and D potential

    AO2 Application

    1 mark for application/explanation of ONE benefit to a business of using a vertical
    merger for growth

    •

    expansion is either with a customer or supplier business

    •

    gain economies of scale

    •

    can encourage sales of own products if merging with a customer or select best
    quality materials if merging with supplier

    •

    restrict sales of competitors or limit availability of different supply factors
    to competitors

    •

    may be duplication of job roles or resources

    expertise of both businesses combines to improve supply chain

    8

    9609/11

    October/November 2025

    AO3 Analysis

    up to 2 marks for analysis of ONE benefit

    2 marks for DEVELOPED analysis of ONE benefit to a business of using a vertical
    merger for growth (L2 AN) or 1

    mark for LIMITED analysis of ONE benefit to a business of using a vertical merger
    for growth (L1 AN)

    •

    both businesses already familiar with what is more likely to be successful due
    to existing experience and knowledge of

    suppliers and customers

    •

    forward vertical merger with a customer gives control over promotion and pricing
    of own products and may result in

    greater sales and profits

    •

    secures outlets for products and gives direct access to markets to allow faster
    response to customer requirements

    •

    may exclude competitors’ products and reduce competition, possibly increasing
    market share

    •

    backward vertical with a supplier gives control over quality, price and delivery
    times for supplies, assisting JIT

    •

    reduces costs of production and increases profit margins

    •

    supplies to competitors may be controlled and possibly reduced or the price increased

    •

    after redundancies (which may be expensive), wage costs may be reduced and profits
    increased

    •

    encouragement of R and D by suppliers to improve quality of materials used in
    manufacturing

    Accept all valid responses.

    9609/11

    October/November 2025'
