- number: 3b
  question_type: calculation
  correct_answer: null
  explanation: null
  mark_scheme_answer: 'Explain one way that a business can improve labour productivity.

    Indicative content

    Responses may include:

    AO1 Knowledge and understanding

    1 mark for identifying ONE WAY that a business can improve labour productivity.

    •

    motivate employees

    •

    train employees

    •

    employ experienced workers

    •

    increase hours worked

    •

    change way work is done

    •

    invest in equipment and technology

    AO2 Application

    2 marks for DEVELOPED application/explanation of ONE way

    1 mark for LIMITED application/explanation of ONE way

    •

    effort and productivity may increase if employees are offered financial or non-financial
    rewards – they may feel more

    valued and work harder e.g. piece rate pay

    •

    training/experience increases employee output by helping them to gain more skills
    and learn new and better ways of

    doing things

    •

    working more hours may mean an individual employee could produce more products
    i.e. increase their own total output

    •

    team working, altering the layout of the workplace, implementing employee recommendations
    on how they could work

    more effectively could improve the speed of production and productivity

    •

    if employees have modern and more efficient machinery, they should be able to
    have higher output than employees

    who are using outdated equipment. (NOTE: suggesting replacing employees with machines
    to improve business

    productivity is not answering the question)

    Accept all valid responses.

    3

    9609/11

    October/November 2025'
