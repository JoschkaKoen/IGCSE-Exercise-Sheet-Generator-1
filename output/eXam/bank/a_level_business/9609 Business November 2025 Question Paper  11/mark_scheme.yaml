  mark_scheme_answer: '‘Packaging is the most effective promotion method for a fast-food
    business.’

    Evaluate this view.

    Indicative content

    NOTE: the question is about promotion, not the other aspects of the marketing
    mix. Responses which discuss price, place

    and product without linking this to promotion are not answering the question and
    should not be rewarded.

    Responses may include:

    AO1 Knowledge and understanding

    2 marks for DEVELOPED knowledge and understanding (L2 K)

    1 mark for LIMITED knowledge and understanding (L1 K)

    •

    role of packaging in promotion – information, colour, logo, competitions

    •

    advertising promotion

    •

    sales promotion

    •

    direct promotion

    •

    digital promotion

    •

    branding

    AO2 Application

    2 marks for DEVELOPED application (L2 APP)

    1 mark for LIMITED application (L1 APP)

    •

    use of promotion by a fast-food business e.g. McDonalds (golden arches on red
    background), Pizza Hut, Domino’s,

    Burger King, Yo Sushi.

    •

    Taste, restaurants, menu, ingredients, types of fast food e.g. burgers/pizzas

    12

    9609/11

    October/November 2025

    AO3 Analysis

    2 marks for DEVELOPED analysis (L2 AN)

    1 mark for LIMITED analysis (L1 AN)

    Benefits of the use of packaging as a means of promotion –

    •

    easily seen by many people, whether eating the food or not

    •

    a well-known business can reach a large number of potential consumers when packaging
    is carried around a busy

    area

    •

    a logo is easy to include on most types of food packaging e.g. trays, bags, cups

    •

    colours can be used to make the promotion eye-catching

    •

    there is no need for explanation of the business on the packaging as customers
    recognise the logo and/or colours

    •

    packaging is used anyway to carry and protect the food, so it is relatively cheap
    to use it for promotion

    Drawbacks of the use of packaging as a means of promotion –

    •

    packaging promotion may be ignored as it is the contents that are important to
    the customer

    •

    some fast-food businesses have their reputation damaged by customers who dispose
    of the packaging irresponsibly

    •

    plain packaging is cheaper to produce/buy than promotional packaging so increases
    costs

    •

    some customers eat the food and dispose of the packaging without anyone else seeing
    it

    •

    target market may include children who are not influenced by the packaging

    9609/11

    October/November 2025

    AO4 Evaluation

    Up to 6 marks for EVALUATION – USE THE FOLLOWING TABLE:

    Developed/Supported judgement in context

    6 marks

    Developed/Reasonable evaluative comments in context

    5 marks

    Developed/Supported judgement without context

    4 marks

    Developed/Reasonable evaluative comments without context

    3 marks

    Limited supported judgement

    2 marks

    An attempt to balance the arguments/Weak attempt at evaluative comments

    1 mark

    A judgement/conclusion is made as to whether packaging is the most effective promotion
    method for a fast-food business.

    Such judgements/conclusions may be made at any point in the essay, not only in
    a concluding section.

    •

    how effective is packaging for promoting this particular type of business?

    •

    is promotion on packaging more effective for large businesses which already have
    an established brand?

    •

    how effective are other types of promotion for a fast-food business?

    •

    advertising using television, print media, social media and the business’ own
    website are all effective at constantly

    reminding customers of existing and new types of food

    •

    sales promotions/discounts/meal deals/toys/collectibles are effective as customers
    are often young and on limited

    incomes

    •

    direct promotion to individuals is unlikely in this industry as the product is
    aimed at the mass-market, although leaflet

    drops are used

    •

    digital promotion via websites and social media allows customers to interact with
    the business, place orders, give

    feedback, which can then promote the business to other customers, therefore is
    very effective given the target market

    •

    older customers may still want to buy the food, for themselves or younger relatives,
    but are less likely to use digital

    media

    •

    branding is very important as the fast-food market is competitive, but to maintain
    that brand image and a high market

    share a lot of different promotion methods are used together

    9609/11

    October/November 2025

    •

    all other types of promotion can be more expensive than promotion on the packaging,
    but large fast-food business can

    afford this

    •

    judgement made as to which promotion method is likely to be the most effective
    in this context

    •

    it is likely that all types of promotion will be carried out at some time and
    in some circumstances due to the nature of

    the market and the large budget available to many businesses in it.

    Accept all valid responses.

    9609/11

    October/November 2025

