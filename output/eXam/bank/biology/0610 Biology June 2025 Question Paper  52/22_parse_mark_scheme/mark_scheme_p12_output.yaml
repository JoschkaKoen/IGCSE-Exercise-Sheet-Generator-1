questions:
- number: '3'
  type: long_answer
  marks: 6
  mark_scheme_answer: |
    \textit{independent variable}
    \textbf{1} at least three different light intensities ;

    \textit{dependent variable}
    \textbf{2} the colour of the indicator ;

    \textbf{3 and 4} \textit{details of the method} ;;
    \begin{itemize}
    \item method of changing light intensity e.g. different lamp distances / dimmer switch altered / different bulbs / different lamps / different power lamps / detail of how to make one in the dark \textbf{and} one in the light
    \item method to avoid heating effect of light e.g. heat shield / beaker of water between lamp and plant / use LED bulbs to prevent heating
    \item keeping the plant under the water / weighting the plant down
    \item sample the water around the plant and test with indicator
    \end{itemize}

    \textbf{5 and 6 and 7} \textit{variables kept constant} ;;;
    \begin{itemize}
    \item colour / wavelength, of light
    \item temperature
    \item type / species / age, of plant
    \item size / mass / length / height / surface area / number of leaves, of plant
    \item volume of water (covering plant)
    \item volume / number of drops, of (hydrogencarbonate) indicator
    \item concentration of (hydrogencarbonate) indicator
    \item set (stated) time for equilibration (to the new light intensity)
    \item set (stated) time before noting colour
    \end{itemize}

    \textbf{8} two or more repeats ;

    \textbf{9} relevant safety ;