    \begin{itemize}

    \item put $100\text{ g}$ of crushed apple into a beaker

    \item added $10\text{ cm}^3$ of the pectinase solution to the crushed apple

    \item left the crushed apple and enzyme mixture for $30$ minutes at $40^\circ\text{C}$

    \item filtered the apple juice from the mixture

    \item measured the volume of apple juice produced.

    \end{itemize}'
