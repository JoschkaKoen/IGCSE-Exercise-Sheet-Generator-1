questions:
  - number: "23"
    type: multiple_choice
    text: |
      A siren is emitting a sound. As time passes, the sound becomes louder and higher pitched.

      What is happening to the amplitude and to the frequency of the emitted sound wave?

      \begin{tabular}{|c|c|c|}
      \hline
       & amplitude & frequency \\
      \hline
      \textbf{A} & decreasing & decreasing \\
      \textbf{B} & decreasing & increasing \\
      \textbf{C} & increasing & decreasing \\
      \textbf{D} & increasing & increasing \\
      \hline
      \end{tabular}
    options:
      - letter: A
        text: |
          decreasing decreasing
      - letter: B
        text: |
          decreasing increasing
      - letter: C
        text: |
          increasing decreasing
      - letter: D
        text: |
          increasing increasing
  - number: "24"
    type: multiple_choice
    text: |
      A plotting compass is placed at position X near to a bar magnet. The diagram shows the direction in which the compass points.

      X

      Y

      Which diagram shows the direction in which the plotting compass placed at position Y points?
    options:
      - letter: A
        text: |
          (upward arrow)
      - letter: B
        text: |
          (downward arrow)
      - letter: C
        text: |
          (rightward arrow)
      - letter: D
        text: |
          (leftward arrow)
  - number: "25"
    type: multiple_choice
    text: |
      A student rubs a plastic rod with a cloth.

      Electrons move from the cloth to the rod.

      Which statement about the rod is correct?
    options:
      - letter: A
        text: |
          It is negatively charged and is attracted by a negatively charged object.
      - letter: B
        text: |
          It is negatively charged and is attracted by a positively charged object.
      - letter: C
        text: |
          It is positively charged and is attracted by a negatively charged object.
      - letter: D
        text: |
          It is positively charged and is attracted by a positively charged object.