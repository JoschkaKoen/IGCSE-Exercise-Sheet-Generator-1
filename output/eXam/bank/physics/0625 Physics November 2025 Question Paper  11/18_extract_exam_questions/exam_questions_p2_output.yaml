  - number: "3"
    type: multiple_choice
    text: |
      A space station orbits above the Earth. There is an astronaut in the space station.

      In the space station, the acceleration of free fall is $7.5 \text{ m/s}^2$.

      On Earth, the acceleration of free fall is $9.8 \text{ m/s}^2$.

      Which row about the astronaut’s mass and weight in the space station is correct?

      \begin{tabular}{|c|c|c|}
      \hline
       & mass of astronaut & weight of astronaut \\
      \hline
      \textbf{A} & same as on the Earth & less than on the Earth \\
      \textbf{B} & same as on the Earth & greater than on the Earth \\
      \textbf{C} & lower than on the Earth & less than on the Earth \\
      \textbf{D} & lower than on the Earth & greater than on the Earth \\
      \hline
      \end{tabular}
    options:
      - letter: A
        text: |
          A
      - letter: B
        text: |
          B
      - letter: C
        text: |
          C
      - letter: D
        text: |
          D