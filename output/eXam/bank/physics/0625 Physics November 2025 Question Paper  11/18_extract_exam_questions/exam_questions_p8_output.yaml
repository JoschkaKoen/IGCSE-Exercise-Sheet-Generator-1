questions:
  - number: "20"
    type: multiple_choice
    text: |
      A ray of light passes from air into a rectangular transparent block.

      What is the angle of refraction?
    options:
      - letter: A
        text: |
          $25^\circ$
      - letter: B
        text: |
          $40^\circ$
      - letter: C
        text: |
          $50^\circ$
      - letter: D
        text: |
          $65^\circ$
  - number: "21"
    type: multiple_choice
    text: |
      The diagram shows the formation of an image by a thin converging lens.

      Which terms describe the image?
    options:
      - letter: A
        text: |
          diminished and upright
      - letter: B
        text: |
          real and inverted
      - letter: C
        text: |
          virtual and diminished
      - letter: D
        text: |
          virtual and inverted
  - number: "22"
    type: multiple_choice
    text: |
      Valuable objects are often marked with a special ink. In visible light, the ink \textbf{cannot} be seen.

      The ink can be seen when exposed to the right type of electromagnetic waves.

      Which type of electromagnetic waves are used for this type of security marking?
    options:
      - letter: A
        text: |
          infrared
      - letter: B
        text: |
          microwaves
      - letter: C
        text: |
          ultraviolet
      - letter: D
        text: |
          X-rays