questions:
  - number: "26"
    type: multiple_choice
    text: |
      Which expression is used to calculate electrical resistance?
    options:
      - letter: A
        text: |
          charge $\div$ potential difference
      - letter: B
        text: |
          current $\div$ potential difference
      - letter: C
        text: |
          potential difference $\div$ charge
      - letter: D
        text: |
          potential difference $\div$ current
  - number: "27"
    type: multiple_choice
    text: |
      The diagram shows part of an electric circuit. The reading on the voltmeter is $16\text{ V}$. The current in the resistor is $8.0\text{ A}$.

      One coulomb of charge flows from P to Q through the resistor.

      How much energy is transferred in the resistor?
    options:
      - letter: A
        text: |
          $2.0\text{ J}$
      - letter: B
        text: |
          $8.0\text{ J}$
      - letter: C
        text: |
          $16\text{ J}$
      - letter: D
        text: |
          $128\text{ J}$
  - number: "28"
    type: multiple_choice
    text: |
      What is the combined resistance of a $3.0\Omega$ resistor and a $6.0\Omega$ resistor connected in parallel?
    options:
      - letter: A
        text: |
          $2.0\Omega$
      - letter: B
        text: |
          $4.5\Omega$
      - letter: C
        text: |
          $9.0\Omega$
      - letter: D
        text: |
          $18\Omega$
  - number: "29"
    type: multiple_choice
    text: |
      A $5.0\Omega$ resistor is connected in series with a $10\Omega$ resistor.

      There is a constant current in the $5.0\Omega$ resistor.

      Which statement about the two resistors is correct?
    options:
      - letter: A
        text: |
          The current is greater in the $5.0\Omega$ resistor.
      - letter: B
        text: |
          The current is greater in the $10\Omega$ resistor.
      - letter: C
        text: |
          The potential difference (p.d.) is greater across the $5.0\Omega$ resistor.
      - letter: D
        text: |
          The potential difference (p.d.) is greater across the $10\Omega$ resistor.
  - number: "30"
    type: multiple_choice
    text: |
      Which statement explains where the switch for an electric lamp is connected?
    options:
      - letter: A
        text: |
          The switch is in \textbf{either} the live wire \textbf{or} in the neutral wire as both wires carry the current.
      - letter: B
        text: |
          The switch is in the earth wire to prevent the fuse from blowing when the lamp is in use.
      - letter: C
        text: |
          The switch is in the live wire so that the lamp is disconnected from the mains supply when the switch is off.
      - letter: D
        text: |
          The switch is in the neutral wire to prevent current leakage when the lamp is switched off.