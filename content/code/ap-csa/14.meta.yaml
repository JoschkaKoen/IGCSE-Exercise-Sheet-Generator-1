title:
  en: "Sorting: selection and insertion sort"
  zh: "排序:选择排序与插入排序"
order: 14
tasks:
  - id: selection-sort
    prompt:
      en: "Complete `selectionSort(int[] a)` so it sorts the array **in place** from small to large, using selection sort. The checker tests several arrays."
      zh: "完成 `selectionSort(int[] a)`,用选择排序把数组**原地**从小到大排好。检查器会测试多个数组。"
    starter: |
      public class Sorter {
          // Sort a from small to large, in place, using selection sort.
          public static void selectionSort(int[] a) {
              // TODO: for each i, find the smallest value from i to the end,
              //       then swap it into position i.
          }
      }
    solution: |
      public class Sorter {
          public static void selectionSort(int[] a) {
              for (int i = 0; i < a.length - 1; i++) {
                  int min = i;
                  for (int j = i + 1; j < a.length; j++) {
                      if (a[j] < a[min]) {
                          min = j;
                      }
                  }
                  int temp = a[min];
                  a[min] = a[i];
                  a[i] = temp;
              }
          }
      }
    check:
      kind: harness
      main_class: Harness
      code: |
        public class Harness {
            static void check(int[] in, int[] want) {
                int[] a = new int[in.length];
                for (int i = 0; i < in.length; i++) a[i] = in[i];
                Sorter.selectionSort(a);
                for (int i = 0; i < want.length; i++) {
                    if (a[i] != want[i]) {
                        String got = "";
                        for (int k = 0; k < a.length; k++) got += a[k] + (k < a.length - 1 ? "," : "");
                        throw new AssertionError("selectionSort wrong, got [" + got + "]");
                    }
                }
            }
            public static void main(String[] args) {
                check(new int[]{5, 2, 4, 1, 3}, new int[]{1, 2, 3, 4, 5});
                check(new int[]{}, new int[]{});
                check(new int[]{7}, new int[]{7});
                check(new int[]{3, 3, 1, 2, 3}, new int[]{1, 2, 3, 3, 3});
                check(new int[]{9, 8, 7, 6, 5}, new int[]{5, 6, 7, 8, 9});
                check(new int[]{-2, 5, 0, -9, 4}, new int[]{-9, -2, 0, 4, 5});
            }
        }
  - id: insertion-sort
    prompt:
      en: "Complete `insertionSort(int[] a)` so it sorts the array **in place** from small to large, using insertion sort. The checker tests several arrays."
      zh: "完成 `insertionSort(int[] a)`,用插入排序把数组**原地**从小到大排好。检查器会测试多个数组。"
    starter: |
      public class Sorter {
          // Sort a from small to large, in place, using insertion sort.
          public static void insertionSort(int[] a) {
              // TODO: for each i, take a[i] as the key. Shift bigger values on
              //       the left one step right, then drop the key into the gap.
          }
      }
    solution: |
      public class Sorter {
          public static void insertionSort(int[] a) {
              for (int i = 1; i < a.length; i++) {
                  int key = a[i];
                  int j = i - 1;
                  while (j >= 0 && a[j] > key) {
                      a[j + 1] = a[j];
                      j = j - 1;
                  }
                  a[j + 1] = key;
              }
          }
      }
    check:
      kind: harness
      main_class: Harness
      code: |
        public class Harness {
            static void check(int[] in, int[] want) {
                int[] a = new int[in.length];
                for (int i = 0; i < in.length; i++) a[i] = in[i];
                Sorter.insertionSort(a);
                for (int i = 0; i < want.length; i++) {
                    if (a[i] != want[i]) {
                        String got = "";
                        for (int k = 0; k < a.length; k++) got += a[k] + (k < a.length - 1 ? "," : "");
                        throw new AssertionError("insertionSort wrong, got [" + got + "]");
                    }
                }
            }
            public static void main(String[] args) {
                check(new int[]{5, 2, 4, 1, 3}, new int[]{1, 2, 3, 4, 5});
                check(new int[]{}, new int[]{});
                check(new int[]{7}, new int[]{7});
                check(new int[]{3, 3, 1, 2, 3}, new int[]{1, 2, 3, 3, 3});
                check(new int[]{9, 8, 7, 6, 5}, new int[]{5, 6, 7, 8, 9});
                check(new int[]{-2, 5, 0, -9, 4}, new int[]{-9, -2, 0, 4, 5});
            }
        }
  - id: is-sorted
    prompt:
      en: "Complete `isSorted(int[] a)` returning `true` if the array is in order from small to large (each item is `<=` the next), else `false`. An empty or one-item array counts as sorted."
      zh: "完成 `isSorted(int[] a)`,如果数组从小到大有序(每个元素都 `<=` 后一个)就返回 `true`,否则返回 `false`。空数组或只有一个元素的数组算作有序。"
    starter: |
      public class Sorter {
          // Return true if a is sorted small to large.
          public static boolean isSorted(int[] a) {
              return false;   // change this
          }
      }
    solution: |
      public class Sorter {
          public static boolean isSorted(int[] a) {
              for (int i = 0; i < a.length - 1; i++) {
                  if (a[i] > a[i + 1]) {
                      return false;
                  }
              }
              return true;
          }
      }
    check:
      kind: harness
      main_class: Harness
      code: |
        public class Harness {
            public static void main(String[] args) {
                if (!Sorter.isSorted(new int[]{1, 2, 3, 4, 5}))
                    throw new AssertionError("a sorted array should be true");
                if (Sorter.isSorted(new int[]{1, 3, 2}))
                    throw new AssertionError("1,3,2 is not sorted");
                if (!Sorter.isSorted(new int[]{}))
                    throw new AssertionError("empty array counts as sorted");
                if (!Sorter.isSorted(new int[]{7}))
                    throw new AssertionError("one item counts as sorted");
                if (!Sorter.isSorted(new int[]{2, 2, 3}))
                    throw new AssertionError("equal neighbors are still sorted");
                if (Sorter.isSorted(new int[]{5, 4, 3}))
                    throw new AssertionError("descending is not sorted");
            }
        }
