title:
  en: "Polymorphism: dynamic dispatch and toString()"
  zh: "еӨҡжҖҒ:еҠЁжҖҒеҲҶжҙҫдёҺ toString()"
order: 18
tasks:
  - id: chorus
    prompt:
      en: "`Animal`, `Dog`, and `Cat` are written for you. Complete the static method `Zoo.chorus(Animal[] animals)` so it returns every animal's sound joined by single spaces. Example: a `Dog`, `Cat`, `Dog` array gives `\"Woof Meow Woof\"`. An empty array gives `\"\"`. Loop and call `speak()` вҖ” let polymorphism pick the right sound."
      zh: "`Animal`гҖҒ`Dog`гҖҒ`Cat` е·Із»ҸдёәдҪ еҶҷеҘҪгҖӮе®ҢжҲҗйқҷжҖҒж–№жі• `Zoo.chorus(Animal[] animals)`,и®©е®ғиҝ”еӣһжҜҸдёӘеҠЁзү©зҡ„еҸ«еЈ°гҖҒз”ЁеҚ•дёӘз©әж јиҝһжҺҘиө·жқҘгҖӮдҫӢеҰӮ:з”ұ `Dog`гҖҒ`Cat`гҖҒ`Dog` з»„жҲҗзҡ„ж•°з»„еҫ—еҲ° `\"Woof Meow Woof\"`гҖӮз©әж•°з»„еҫ—еҲ° `\"\"`гҖӮеҫӘзҺҜе№¶и°ғз”Ё `speak()` вҖ”вҖ” и®©еӨҡжҖҒеҺ»жҢ‘йҖүжӯЈзЎ®зҡ„еҸ«еЈ°гҖӮ"
    starter: |
      // Animal, Dog, Cat are written for you. Do not change them.
      class Animal {
          public String speak() { return "some sound"; }
      }
      class Dog extends Animal {
          public String speak() { return "Woof"; }
      }
      class Cat extends Animal {
          public String speak() { return "Meow"; }
      }

      class Zoo {
          // TODO: join each animal's speak() with single spaces
          public static String chorus(Animal[] animals) {
              return "";   // change this
          }
      }
    solution: |
      class Animal {
          public String speak() { return "some sound"; }
      }
      class Dog extends Animal {
          public String speak() { return "Woof"; }
      }
      class Cat extends Animal {
          public String speak() { return "Meow"; }
      }

      class Zoo {
          public static String chorus(Animal[] animals) {
              String result = "";
              for (Animal a : animals) {
                  if (result.length() > 0) {
                      result += " ";
                  }
                  result += a.speak();
              }
              return result;
          }
      }
    check:
      kind: harness
      main_class: Harness
      code: |
        public class Harness {
            public static void main(String[] args) {
                Animal[] zoo = { new Dog(), new Cat(), new Dog() };
                String s = Zoo.chorus(zoo);
                if (!s.equals("Woof Meow Woof")) throw new AssertionError("chorus should join each animal's own sound with single spaces; expected \"Woof Meow Woof\", got \"" + s + "\"");
                Animal[] one = { new Cat() };
                if (!Zoo.chorus(one).equals("Meow")) throw new AssertionError("one Cat -> \"Meow\", got \"" + Zoo.chorus(one) + "\"");
                Animal[] none = {};
                if (!Zoo.chorus(none).equals("")) throw new AssertionError("empty array -> empty string, got \"" + Zoo.chorus(none) + "\"");
            }
        }
  - id: add-cow
    prompt:
      en: "`Animal`, `Dog`, `Cat`, and a working `Zoo.chorus` are written for you. Add a class `Cow` that extends `Animal` and overrides `speak()` to return `\"Moo\"`. Notice the existing `chorus` loop handles your new Cow with **no changes**."
      zh: "`Animal`гҖҒ`Dog`гҖҒ`Cat` д»ҘеҸҠдёҖдёӘиғҪз”Ёзҡ„ `Zoo.chorus` е·Із»ҸдёәдҪ еҶҷеҘҪгҖӮж·»еҠ дёҖдёӘз»§жүҝиҮӘ `Animal` зҡ„зұ» `Cow`,йҮҚеҶҷ `speak()` иҝ”еӣһ `\"Moo\"`гҖӮжіЁж„Ҹ:зҺ°жңүзҡ„ `chorus` еҫӘзҺҜ**ж— йңҖд»»дҪ•ж”№еҠЁ**е°ұиғҪеӨ„зҗҶдҪ ж–°еҠ зҡ„ CowгҖӮ"
    starter: |
      // All of these are written for you. Do not change them.
      class Animal {
          public String speak() { return "some sound"; }
      }
      class Dog extends Animal {
          public String speak() { return "Woof"; }
      }
      class Cat extends Animal {
