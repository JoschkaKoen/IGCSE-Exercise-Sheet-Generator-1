          }
      }

      // TODO: add a class Cow that extends Animal and overrides speak() to return "Moo"
    solution: |
      class Animal {
          public String speak() { return "some sound"; }
      }
      class Dog extends Animal {
          public String speak() { return "Woof"; }
      }
      class Cat extends Animal {
          public String speak() { return "Meow"; }
      }
      class Zoo {
          public static String chorus(Animal[] animals) {
              String result = "";
              for (Animal a : animals) {
                  if (result.length() > 0) {
                      result += " ";
                  }
                  result += a.speak();
              }
              return result;
          }
      }

      class Cow extends Animal {
          public String speak() {
              return "Moo";
          }
      }
    check:
      kind: harness
      main_class: Harness
      code: |
        public class Harness {
            public static void main(String[] args) {
                Cow c = new Cow();
                if (!c.speak().equals("Moo")) throw new AssertionError("Cow.speak() should return \"Moo\", got \"" + c.speak() + "\"");
                // The existing chorus loop must handle the new Cow with no changes:
                Animal[] farm = { new Dog(), new Cow(), new Cat() };
                String s = Zoo.chorus(farm);
                if (!s.equals("Woof Moo Meow")) throw new AssertionError("the chorus loop should handle the new Cow polymorphically; expected \"Woof Moo Meow\", got \"" + s + "\"");
            }
        }
  - id: fraction-tostring
    prompt:
      en: "Complete `Fraction` by overriding `toString()` so it returns the fraction as `\"numerator/denominator\"` вҖ” for `3` and `4` it returns `\"3/4\"`. Java calls `toString()` automatically when you print a `Fraction` or join it with `+`."
      zh: "е®ҢжҲҗ `Fraction`,йҮҚеҶҷ `toString()`,и®©е®ғжҠҠеҲҶж•°иҝ”еӣһжҲҗ `\"еҲҶеӯҗ/еҲҶжҜҚ\"` зҡ„еҪўејҸ вҖ”вҖ” еҪ“еҲҶеӯҗжҳҜ `3`гҖҒеҲҶжҜҚжҳҜ `4` ж—¶иҝ”еӣһ `\"3/4\"`гҖӮеҪ“дҪ жү“еҚ°дёҖдёӘ `Fraction` жҲ–з”Ё `+` жӢјжҺҘе®ғж—¶,Java дјҡиҮӘеҠЁи°ғз”Ё `toString()`гҖӮ"
    starter: |
      class Fraction {
          private int numerator;
          private int denominator;
          public Fraction(int numerator, int denominator) {
              this.numerator = numerator;
              this.denominator = denominator;
          }

          // TODO: return "numerator/denominator", e.g. "3/4"
          public String toString() {
              return "";   // change this
          }
      }
    solution: |
      class Fraction {
          private int numerator;
          private int denominator;
          public Fraction(int numerator, int denominator) {
              this.numerator = numerator;
              this.denominator = denominator;
          }

          public String toString() {
              return numerator + "/" + denominator;
          }
      }
    check:
      kind: harness
      main_class: Harness
      code: |
        public class Harness {
            public static void main(String[] args) {
                Fraction f = new Fraction(3, 4);
                if (!f.toString().equals("3/4")) throw new AssertionError("expected \"3/4\", got \"" + f.toString() + "\"");
                // toString() works through an Object (supertype) reference, called explicitly
                Object o = new Fraction(1, 2);
                if (!o.toString().equals("1/2")) throw new AssertionError("through an Object reference, expected \"1/2\", got \"" + o.toString() + "\"");
                // with + Java calls toString() implicitly
                String joined = "ratio = " + new Fraction(5, 8);
                if (!joined.equals("ratio = 5/8")) throw new AssertionError("with + Java should call toString(); expected \"ratio = 5/8\", got \"" + joined + "\"");
            }
        }
