title:
  en: LIKE, IN and BETWEEN
  zh: LIKE、IN 与 BETWEEN
dataset: students
tasks:
  - id: like
    prompt:
      en: "Show the `name` of every student whose name **contains the letter `a`**. Use `LIKE` with `%`."
      zh: "显示名字中**包含字母 `a`** 的每名学生的 `name`。用 `LIKE` 配合 `%`。"
    starter: |
      SELECT name FROM student WHERE name LIKE ...;
    solution: |
      SELECT name FROM student WHERE name LIKE '%a%';
    check:
      kind: rows
      expected: |
        name
        Jamal
        Sara
  - id: between
    prompt:
      en: "Show the `name` and `score` of students whose score is **between 70 and 90** (inclusive). Use `BETWEEN`."
      zh: "显示分数在 **70 到 90 之间**(含两端)的学生的 `name` 和 `score`。用 `BETWEEN`。"
    starter: |
      SELECT name, score FROM student WHERE score BETWEEN ... AND ...;
    solution: |
      SELECT name, score FROM student WHERE score BETWEEN 70 AND 90;
    check:
      kind: rows
      expected: |
        name | score
        Mei | 88
        Jamal | 72
        Lin | 88
