title:
  en: Your first program
  zh: 你的第一个程序
order: 1
tasks:
  - id: hello
    prompt:
      en: "Use `print(...)` to make Python show the words **Hello, world!** exactly (same spelling, same punctuation)."
      zh: "使用 `print(...)` 让 Python 精确地显示 **Hello, world!**(拼写和标点都要一样)。"
    starter: |
      # Type your code below, then click Run.
    solution: |
      print("Hello, world!")
    check:
      kind: stdout
      expected: "Hello, world!"
      normalize: strip
  - id: two-lines
    prompt:
      en: "Print **two** lines. The first line must be `My name is Pat`. The second line must be `I am learning Python`. (Use two `print(...)` calls.)"
      zh: "打印**两**行。第一行必须是 `My name is Pat`,第二行必须是 `I am learning Python`。(使用两次 `print(...)`。)"
    starter: |
      # Print two lines below
    solution: |
      print("My name is Pat")
      print("I am learning Python")
    check:
      kind: stdout
      expected: "My name is Pat\nI am learning Python"
      normalize: strip
  - id: comment-then-print
    prompt:
      en: "Keep the comment line, then `print` the number **42**. Notice the comment never appears in the output."
      zh: "保留那行注释,然后用 `print` 打印数字 **42**。注意注释永远不会出现在输出里。"
    starter: |
      # This is a comment — Python ignores it
      # Print 42 on the next line
    solution: |
      # This is a comment — Python ignores it
      print(42)
    check:
      kind: stdout
      expected: "42"
      normalize: strip
