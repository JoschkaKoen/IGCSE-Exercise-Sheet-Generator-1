title:
  en: "Strings: char arrays and the null terminator"
  zh: "字符串:字符数组与结束符"
order: 9
tasks:
  - id: count-char
    prompt:
      en: "Complete `int count_char(const char *s, char c)` so it returns how many times `c` appears in the string `s`. Loop until you reach the end of the string. Do **not** write a `main`."
      zh: "完成 `int count_char(const char *s, char c)`,让它返回字符 `c` 在字符串 `s` 中出现的次数。循环到字符串结束为止。**不要**写 `main`。"
    starter: |
      /* Count how many times c appears in s. Do not write main(). */
      int count_char(const char *s, char c) {
          return 0;   /* walk s until the terminator */
      }
    solution: |
      int count_char(const char *s, char c) {
          int count = 0;
          for (int i = 0; s[i] != '\0'; i++) {
              if (s[i] == c) {
                  count++;
              }
          }
          return count;
      }
    check:
      kind: harness
      code: |
        #include <assert.h>
        #include "student.c"

        int main(void) {
            assert(count_char("banana", 'a') == 3);
            assert(count_char("hello", 'l') == 2);
            assert(count_char("xyz", 'a') == 0);
            assert(count_char("", 'a') == 0);
            return 0;
        }
  - id: my-strlen
    prompt:
      en: "Complete `int my_strlen(const char *s)` so it returns the length of `s` **without** calling `strlen`. Walk the array until you reach the end. Do **not** write a `main`."
      zh: "完成 `int my_strlen(const char *s)`,让它返回 `s` 的长度,但**不**调用 `strlen`。遍历数组直到末尾。**不要**写 `main`。"
    starter: |
      /* Return the length of s without using strlen. Do not write main(). */
      int my_strlen(const char *s) {
          return 0;   /* count characters up to the terminator */
      }
    solution: |
      int my_strlen(const char *s) {
          int n = 0;
          while (s[n] != '\0') {
              n++;
          }
          return n;
      }
    check:
      kind: harness
      code: |
        #include <assert.h>
        #include "student.c"

        int main(void) {
            assert(my_strlen("hello") == 5);
            assert(my_strlen("") == 0);
            assert(my_strlen("a") == 1);
            return 0;
        }
  - id: reverse-str
    prompt:
      en: "Complete `void reverse_str(char *s)` so it reverses the characters of `s` in place. Find the length, then swap from both ends toward the middle. Do **not** write a `main`."
      zh: "完成 `void reverse_str(char *s)`,让它就地反转 `s` 里的字符。先求出长度,再从两端向中间交换。**不要**写 `main`。"
    starter: |
      /* Reverse the characters of s in place. Do not write main(). */
      void reverse_str(char *s) {
          /* find the length, then swap ends toward the middle */
      }
    solution: |
      void reverse_str(char *s) {
          int n = 0;
          while (s[n] != '\0') {
              n++;
          }
          for (int i = 0, j = n - 1; i < j; i++, j--) {
              char t = s[i];
              s[i] = s[j];
              s[j] = t;
          }
      }
    check:
      kind: harness
      code: |
        #include <assert.h>
        #include <string.h>
        #include "student.c"

        int main(void) {
            char a[] = "abc";
            reverse_str(a);
            assert(strcmp(a, "cba") == 0);
            char b[] = "hello";
            reverse_str(b);
            assert(strcmp(b, "olleh") == 0);
            char c[] = "x";
            reverse_str(c);
            assert(strcmp(c, "x") == 0);
            return 0;
        }
