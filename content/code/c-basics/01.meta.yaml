title:
  en: "C basics: main, printf, and functions"
  zh: "C 基础:main、printf 与函数"
order: 1
tasks:
  - id: hello
    prompt:
      en: "Inside `main`, use `printf(...)` to print exactly **Hello, C!** on its own line."
      zh: "在 `main` 里面,用 `printf(...)` 精确地打印 **Hello, C!**,并单独占一行。"
    starter: |
      #include <stdio.h>

      int main(void) {
          /* Print exactly: Hello, C!  */
          return 0;
      }
    solution: |
      #include <stdio.h>

      int main(void) {
          printf("Hello, C!\n");
          return 0;
      }
    check:
      kind: stdout
      expected: "Hello, C!"
      normalize: strip
  - id: square
    prompt:
      en: "Complete the function `int square(int n)` so it returns `n * n`. The checker calls it with several values. Do **not** write a `main` — the checker provides one."
      zh: "完成函数 `int square(int n)`,让它返回 `n * n`。检查器会用多个数值来调用它。**不要**写 `main`,检查器会提供。"
    starter: |
      /* Return n * n. Do not write main(); the checker provides it. */
      int square(int n) {
          return 0;   /* change this */
      }
    solution: |
      int square(int n) {
          return n * n;
      }
    check:
      kind: harness
      code: |
        #include <assert.h>
        #include "student.c"

        int main(void) {
            assert(square(5) == 25);
            assert(square(0) == 0);
            assert(square(3) == 9);
            return 0;
        }
  - id: greet
    prompt:
      en: "Inside `main`, declare `int grade = 11;`. Then use `printf` to print two lines: first `Hello!`, then `Grade 11` — print the number with a `%d` placeholder, not by typing `11`."
      zh: "在 `main` 里面,声明 `int grade = 11;`。然后用 `printf` 打印两行:第一行 `Hello!`,第二行 `Grade 11` —— 用 `%d` 占位符打印这个数字,而不是直接打 `11`。"
    starter: |
      #include <stdio.h>

      int main(void) {
          int grade = 11;
          /* Print two lines: Hello!  then  Grade 11  (use %d for grade) */
          return 0;
      }
    solution: |
      #include <stdio.h>

      int main(void) {
          int grade = 11;
          printf("Hello!\n");
          printf("Grade %d\n", grade);
          return 0;
      }
    check:
      kind: stdout
      expected: "Hello!\nGrade 11"
      normalize: strip
