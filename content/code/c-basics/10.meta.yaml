title:
  en: "Array algorithms: max, count, search, average"
  zh: "数组算法:最大值、计数、查找、平均"
order: 10
tasks:
  - id: max
    prompt:
      en: "Complete `int max(const int a[], int n)` so it returns the largest item (assume `n >= 1`). Start from `a[0]` so negatives work. Do **not** write a `main`."
      zh: "完成 `int max(const int a[], int n)`,让它返回最大的元素(假设 `n >= 1`)。从 `a[0]` 开始,这样负数也能正确处理。**不要**写 `main`。"
    starter: |
      /* Return the largest of a[0..n-1] (n >= 1). Do not write main(). */
      int max(const int a[], int n) {
          return 0;   /* start from a[0], not 0 */
      }
    solution: |
      int max(const int a[], int n) {
          int best = a[0];
          for (int i = 1; i < n; i++) {
              if (a[i] > best) {
                  best = a[i];
              }
          }
          return best;
      }
    check:
      kind: harness
      code: |
        #include <assert.h>
        #include "student.c"

        int main(void) {
            int a[] = {3, 9, 2, 7};
            assert(max(a, 4) == 9);
            int b[] = {-5, -1, -9};
            assert(max(b, 3) == -1);
            int c[] = {42};
            assert(max(c, 1) == 42);
            return 0;
        }
  - id: count-even
    prompt:
      en: "Complete `int count_even(const int a[], int n)` so it returns how many items are even. Use `% 2`. Do **not** write a `main`."
      zh: "完成 `int count_even(const int a[], int n)`,让它返回有多少个元素是偶数。用 `% 2`。**不要**写 `main`。"
    starter: |
      /* Count the even items of a[0..n-1]. Do not write main(). */
      int count_even(const int a[], int n) {
          return 0;   /* test a[i] % 2 == 0 */
      }
    solution: |
      int count_even(const int a[], int n) {
          int count = 0;
          for (int i = 0; i < n; i++) {
              if (a[i] % 2 == 0) {
                  count++;
              }
          }
          return count;
      }
    check:
      kind: harness
      code: |
        #include <assert.h>
        #include "student.c"

        int main(void) {
            int a[] = {1, 2, 3, 4, 5, 6};
            assert(count_even(a, 6) == 3);
            int b[] = {1, 3, 5};
            assert(count_even(b, 3) == 0);
            assert(count_even(a, 0) == 0);
            return 0;
        }
  - id: index-of
    prompt:
      en: "Complete `int index_of(const int a[], int n, int target)` so it returns the index of the first `target`, or `-1` if it is not there. Do **not** write a `main`."
      zh: "完成 `int index_of(const int a[], int n, int target)`,让它返回第一个 `target` 的下标;如果不存在则返回 `-1`。**不要**写 `main`。"
    starter: |
      /* Return the index of the first target, or -1. Do not write main(). */
      int index_of(const int a[], int n, int target) {
          return -1;   /* return i as soon as a[i] == target */
      }
    solution: |
      int index_of(const int a[], int n, int target) {
          for (int i = 0; i < n; i++) {
              if (a[i] == target) {
                  return i;
              }
          }
          return -1;
      }
    check:
      kind: harness
      code: |
        #include <assert.h>
        #include "student.c"

        int main(void) {
            int a[] = {10, 20, 30};
            assert(index_of(a, 3, 20) == 1);
            assert(index_of(a, 3, 10) == 0);
            assert(index_of(a, 3, 99) == -1);
            return 0;
        }
  - id: average
    prompt:
      en: "Complete `double average(const int a[], int n)` so it returns the average of the items (assume `n >= 1`). Cast to avoid integer division. Do **not** write a `main`."
      zh: "完成 `double average(const int a[], int n)`,让它返回元素的平均值(假设 `n >= 1`)。用强制转换避免整数除法。**不要**写 `main`。"
    starter: |
      /* Return the average of a[0..n-1] as a double. Do not write main(). */
      double average(const int a[], int n) {
          return 0.0;   /* sum, then (double)total / n */
      }
    solution: |
      double average(const int a[], int n) {
          int total = 0;
          for (int i = 0; i < n; i++) {
              total += a[i];
          }
          return (double)total / n;
      }
    check:
      kind: harness
      code: |
        #include <assert.h>
        #include <math.h>
        #include "student.c"

        int main(void) {
            int a[] = {2, 4, 6};
            assert(fabs(average(a, 3) - 4.0) < 1e-9);
            int b[] = {1, 2};
            assert(fabs(average(b, 2) - 1.5) < 1e-9);
            return 0;
        }
