title:
  en: "Error handling with return codes"
  zh: "用返回码处理错误"
order: 20
tasks:
  - id: safe-div
    prompt:
      en: "Complete `int safe_div(int a, int b, int *result)`: if `b` is `0`, return `-1` and leave `*result` alone. Otherwise store `a / b` in `*result` and return `0`. Do **not** write a `main`."
      zh: "完成 `int safe_div(int a, int b, int *result)`:如果 `b` 是 `0`,返回 `-1` 且不碰 `*result`。否则把 `a / b` 存进 `*result` 并返回 `0`。**不要**写 `main`。"
    starter: |
      /* Return -1 if b == 0; else set *result = a / b and return 0. Do not write main(). */
      int safe_div(int a, int b, int *result) {
          *result = 0;
          return 0;   /* check b == 0 first */
      }
    solution: |
      int safe_div(int a, int b, int *result) {
          if (b == 0) {
              return -1;
          }
          *result = a / b;
          return 0;
      }
    check:
      kind: harness
      code: |
        #include <assert.h>
        #include "student.c"

        int main(void) {
            int r = 0;
            assert(safe_div(10, 2, &r) == 0 && r == 5);
            assert(safe_div(-9, 3, &r) == 0 && r == -3);
            assert(safe_div(7, 0, &r) == -1);
            return 0;
        }
  - id: parse-int
    prompt:
      en: "Complete `int parse_int(const char *s, int *out)`: if `s` is a valid integer (digits, with an optional leading `-`), store its value in `*out` and return `0`; otherwise return `-1`. Do **not** write a `main`."
      zh: "完成 `int parse_int(const char *s, int *out)`:如果 `s` 是一个合法整数(数字,可带一个前导 `-`),把它的值存进 `*out` 并返回 `0`;否则返回 `-1`。**不要**写 `main`。"
    starter: |
      /* Parse s into *out; return 0 on success, -1 if it is not an integer.
         Do not write main(). */
      int parse_int(const char *s, int *out) {
          *out = 0;
          return 0;   /* check each character is a digit */
      }
    solution: |
      int parse_int(const char *s, int *out) {
          int i = 0;
          int sign = 1;
          if (s[i] == '-') {
              sign = -1;
              i++;
          }
          if (s[i] == '\0') {
              return -1;
          }
          int value = 0;
          while (s[i] != '\0') {
              if (s[i] < '0' || s[i] > '9') {
                  return -1;
              }
              value = value * 10 + (s[i] - '0');
              i++;
          }
          *out = sign * value;
          return 0;
      }
    check:
      kind: harness
      code: |
        #include <assert.h>
        #include "student.c"

        int main(void) {
            int v = 0;
            assert(parse_int("42", &v) == 0 && v == 42);
            assert(parse_int("-7", &v) == 0 && v == -7);
            assert(parse_int("12x", &v) == -1);
            assert(parse_int("", &v) == -1);
            assert(parse_int("abc", &v) == -1);
            return 0;
        }
  - id: withdraw
    prompt:
      en: "Complete `int withdraw(int balance, int amount, int *new_balance)`: if `amount` is more than `balance`, return `-1`. Otherwise set `*new_balance` to `balance - amount` and return `0`. Do **not** write a `main`."
      zh: "完成 `int withdraw(int balance, int amount, int *new_balance)`:如果 `amount` 大于 `balance`,返回 `-1`。否则把 `*new_balance` 设为 `balance - amount` 并返回 `0`。**不要**写 `main`。"
    starter: |
      /* Return -1 if amount > balance; else set *new_balance and return 0.
         Do not write main(). */
      int withdraw(int balance, int amount, int *new_balance) {
          *new_balance = 0;
          return 0;   /* check amount > balance first */
      }
    solution: |
      int withdraw(int balance, int amount, int *new_balance) {
          if (amount > balance) {
              return -1;
          }
          *new_balance = balance - amount;
          return 0;
      }
    check:
      kind: harness
      code: |
        #include <assert.h>
        #include "student.c"

        int main(void) {
            int nb = 0;
            assert(withdraw(100, 30, &nb) == 0 && nb == 70);
            assert(withdraw(50, 50, &nb) == 0 && nb == 0);
            assert(withdraw(20, 100, &nb) == -1);
            return 0;
        }
