title:
  en: "Sorting: bubble, selection, and insertion"
  zh: "排序:冒泡、选择与插入"
order: 13
tasks:
  - id: swap
    prompt:
      en: "Complete `void swap(int a[], int i, int j)` so it exchanges the items at index `i` and `j`, in place (no return). Do **not** write a `main`."
      zh: "完成 `void swap(int a[], int i, int j)`,让它就地交换下标 `i` 和 `j` 上的元素(没有返回值)。**不要**写 `main`。"
    starter: |
      /* Exchange a[i] and a[j] in place. Do not write main(). */
      void swap(int a[], int i, int j) {
          /* use a temporary variable */
      }
    solution: |
      void swap(int a[], int i, int j) {
          int t = a[i];
          a[i] = a[j];
          a[j] = t;
      }
    check:
      kind: harness
      code: |
        #include <assert.h>
        #include "student.c"

        int main(void) {
            int a[] = {1, 2, 3};
            swap(a, 0, 2);
            assert(a[0] == 3 && a[1] == 2 && a[2] == 1);
            swap(a, 0, 1);
            assert(a[0] == 2 && a[1] == 3 && a[2] == 1);
            return 0;
        }
  - id: bubble-sort
    prompt:
      en: "Complete `void bubble_sort(int a[], int n)` so it sorts the array ascending, in place, using bubble sort. Do **not** write a `main`."
      zh: "完成 `void bubble_sort(int a[], int n)`,用冒泡排序把数组就地升序排好。**不要**写 `main`。"
    starter: |
      /* Sort a[0..n-1] ascending, in place, with bubble sort. Do not write main(). */
      void bubble_sort(int a[], int n) {
          /* compare neighbours and swap when out of order */
      }
    solution: |
      void bubble_sort(int a[], int n) {
          for (int i = 0; i < n - 1; i++) {
              for (int j = 0; j < n - 1 - i; j++) {
                  if (a[j] > a[j + 1]) {
                      int t = a[j];
                      a[j] = a[j + 1];
                      a[j + 1] = t;
                  }
              }
          }
      }
    check:
      kind: harness
      code: |
        #include <assert.h>
        #include "student.c"

        int main(void) {
            int a[] = {5, 2, 4, 1, 3};
            bubble_sort(a, 5);
            assert(a[0]==1 && a[1]==2 && a[2]==3 && a[3]==4 && a[4]==5);
            int b[] = {9, 8, 7, 6, 5};
            bubble_sort(b, 5);
            assert(b[0]==5 && b[1]==6 && b[2]==7 && b[3]==8 && b[4]==9);
            int c[] = {-2, 5, 0, -9, 4};
            bubble_sort(c, 5);
            assert(c[0]==-9 && c[1]==-2 && c[2]==0 && c[3]==4 && c[4]==5);
            int d[] = {1, 2, 3};
            bubble_sort(d, 0);
            assert(d[0]==1 && d[1]==2 && d[2]==3);
            return 0;
        }
  - id: insertion-sort
    prompt:
      en: "Complete `void insertion_sort(int a[], int n)` so it sorts the array ascending, in place, using insertion sort (take each item as a key and shift bigger items right). Do **not** write a `main`."
      zh: "完成 `void insertion_sort(int a[], int n)`,用插入排序把数组就地升序排好(把每个元素当作关键值,把更大的元素向右移)。**不要**写 `main`。"
    starter: |
      /* Sort a[0..n-1] ascending, in place, with insertion sort. Do not write main(). */
      void insertion_sort(int a[], int n) {
          /* grow a sorted left part one key at a time */
      }
    solution: |
      void insertion_sort(int a[], int n) {
          for (int i = 1; i < n; i++) {
              int key = a[i];
              int j = i - 1;
              while (j >= 0 && a[j] > key) {
                  a[j + 1] = a[j];
                  j--;
              }
              a[j + 1] = key;
          }
      }
    check:
      kind: harness
      code: |
        #include <assert.h>
        #include "student.c"

        int main(void) {
            int a[] = {5, 2, 4, 1, 3};
            insertion_sort(a, 5);
            assert(a[0]==1 && a[1]==2 && a[2]==3 && a[3]==4 && a[4]==5);
            int b[] = {3, 3, 1, 2, 3};
            insertion_sort(b, 5);
            assert(b[0]==1 && b[1]==2 && b[2]==3 && b[3]==3 && b[4]==3);
            int c[] = {-2, 5, 0, -9, 4};
            insertion_sort(c, 5);
            assert(c[0]==-9 && c[1]==-2 && c[2]==0 && c[3]==4 && c[4]==5);
            return 0;
        }
