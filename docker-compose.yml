# Requires Docker Compose v2.24+ for the `path` / `required` env_file syntax.
services:
  web:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    # default.env = committed defaults; .env = secrets (optional file; create when needed)
    env_file:
      - path: default.env
        required: true
      - path: .env
        required: false
    volumes:
      # Persist generated output and logs across container restarts / rebuilds.
      - output_data:/app/output
      # Warmed eXam bank is tracked in git (see commit 1cdb67f). Bind-mount it
      # on top of the output_data volume so the container always sees the
      # current checkout — the named volume was seeded before these files were
      # tracked and would otherwise hide them.
      - ./output/eXam/bank:/app/output/eXam/bank:ro
      - log_data:/app/logs
      # Exam PDFs live on the host — bind-mount so they never enter the image.
      - ./exams:/app/exams:ro

volumes:
  output_data:
  log_data:
