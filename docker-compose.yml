# Requires Docker Compose v2.24+ for the `path` / `required` env_file syntax.
services:
  web:
    build: .
    image: exercise-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    # default.env = committed defaults; .env = secrets (optional file; create when needed)
    env_file:
      - path: default.env
        required: true
      - path: .env
        required: false
    environment:
      # Delegate Java + C execution to the isolated sidecar below (server-side run
      # path) — same container, different paths.
      - JAVA_SANDBOX_URL=http://java-sandbox:8090/run
      - C_SANDBOX_URL=http://java-sandbox:8090/run-c
      # Open the C runner to any logged-in user. Safe HERE because execution is
      # delegated to the isolated sidecar above (no internet / secrets / writable FS).
      # Scoped to the compose deployment on purpose: a bare `uvicorn` run (no sidecar)
      # stays fail-closed (404) unless C_RUNNER_OPEN is set explicitly. (Java is gated
      # separately via JAVA_RUNNER_OPEN and is left unchanged.)
      - C_RUNNER_OPEN=1
    networks:
      - default            # internet egress (AI APIs) + the host port mapping
      - sandbox_internal   # private link to java-sandbox
    volumes:
      # Persist generated output and logs across container restarts / rebuilds.
      - output_data:/app/output
      # Warmed eXam bank is tracked in git (see commit 1cdb67f). Bind-mount it
      # on top of the output_data volume so the container always sees the
      # current checkout — the named volume was seeded before these files were
      # tracked and would otherwise hide them.
      - ./output/eXam/bank:/app/output/eXam/bank:ro
      - log_data:/app/logs
      # Exam PDFs live on the host — bind-mount so they never enter the image.
      - ./exams:/app/exams:ro

  # Isolated runner for untrusted student Java + C (serves /run and /run-c). No
  # internet (internal network), no secrets (no env_file), no bind-mounts, read-only
  # root FS (+ tmpfs workdir), all Linux caps dropped, no-new-privileges, pid/mem
  # limits. Reachable ONLY from `web` over the private network — NEVER expose a host
  # port for it.
  java-sandbox:
    # Image is built once by `web` above — a second `build: .` made Compose export
    # the same ~5 GB layer twice and lengthened deploys.
    image: exercise-app
    restart: unless-stopped
    command: ["uvicorn", "web.java_sandbox_server:app", "--host", "0.0.0.0", "--port", "8090"]
    networks:
      - sandbox_internal
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 1g
    # Intentionally NO env_file, NO volumes, NO ports.

networks:
  default:
  sandbox_internal:
    internal: true   # no gateway → no internet egress for the sandbox or its children

volumes:
  output_data:
  log_data:
