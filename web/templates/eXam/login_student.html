{% extends "eXam/base.html" %}
{% block title %}Log in · eXam{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white shadow-sm rounded-lg p-8">
  <h1 class="text-2xl font-semibold mb-6">Student login</h1>
  <form id="login-form" class="space-y-4">
    <div>
      <label for="name" class="block text-sm font-medium mb-1">Your name</label>
      <select id="name" name="name" required
              class="w-full border border-slate-300 rounded px-3 py-2 bg-white">
        <option value="">— select —</option>
        {% for n in names %}<option value="{{ n }}">{{ n }}</option>{% endfor %}
      </select>
    </div>
    <div>
      <label for="pin" class="block text-sm font-medium mb-1">PIN (4 digits)</label>
      <input id="pin" name="pin" type="text" required inputmode="numeric"
             pattern="[0-9]{4}" maxlength="4" autocomplete="off"
             class="w-full border border-slate-300 rounded px-3 py-2 font-mono">
    </div>
    <button type="submit"
            class="w-full bg-slate-900 text-white font-medium py-2 rounded hover:bg-slate-800">
      Log in
    </button>
    <p id="error" class="text-sm text-red-600 hidden"></p>
  </form>
</div>
<script>
  document.getElementById("login-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const name = document.getElementById("name").value;
    const pin = document.getElementById("pin").value;
    const err = document.getElementById("error");
    err.classList.add("hidden");
    const res = await fetch("/eXam/api/login", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({name, pin}),
    });
    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      err.textContent = data.detail || "Login failed";
      err.classList.remove("hidden");
      return;
    }
    const data = await res.json();
    window.location.href = data.redirect || "/eXam/";
  });
</script>
{% endblock %}
