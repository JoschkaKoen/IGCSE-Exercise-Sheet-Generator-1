<!DOCTYPE html>
<html lang="en" class="h-full space-root">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#01040e" />
  <title>{% block title %}Exercise Sheet Generator{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Sora:wght@500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Sora', 'system-ui', 'sans-serif'],
            sans:    ['Outfit', 'system-ui', 'sans-serif'],
          },
          colors: {
            space: {
              void:  '#01040e',
              deep:  '#080e1e',
              lift:  '#112040',
              mist:  '#334155',
            },
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body class="min-h-full font-sans text-slate-200 antialiased space-bg">
  <script>
    (function () {
      function syncDocBackgroundPaused() {
        document.documentElement.classList.toggle(
          'doc-background-paused',
          document.visibilityState === 'hidden'
        );
      }
      document.addEventListener('visibilitychange', syncDocBackgroundPaused);
      syncDocBackgroundPaused();
    })();
  </script>
  <div class="space-aurora"  aria-hidden="true"></div>
  <div class="space-stars"   aria-hidden="true"></div>
  <div class="z-content flex min-h-full flex-col">

    <header class="site-header sticky top-0 z-20">
      <div class="site-header-inner mx-auto flex w-full max-w-5xl items-center px-4 py-3.5 sm:px-6">
        <a href="/" class="site-header-brand shrink-0 font-display text-base font-semibold tracking-tight text-white sm:text-lg
                           focus:outline-none focus-visible:ring-2 focus-visible:ring-cyan-400/80
                           focus-visible:ring-offset-2 focus-visible:ring-offset-space-void rounded-md">
          <span class="site-header-brand-stack">
            <span class="site-header-brand-eyebrow">Cambridge IGCSE</span>
            <span class="site-header-brand-titles">
              <span class="site-header-brand-title site-header-brand-title--default bg-gradient-to-r from-cyan-300 via-blue-300 to-blue-400 bg-clip-text text-transparent">
                IGCSE exercise sheets
              </span>
              <span class="site-header-brand-title site-header-brand-title--preview bg-gradient-to-r from-cyan-200 via-sky-300 to-indigo-300 bg-clip-text text-transparent">
                Sheet preview
              </span>
            </span>
          </span>
        </a>
        <div class="site-header-preview-col">
          <div class="site-header-middle">
            {% block pdf_preview_tabs %}{% endblock %}
          </div>
          <nav class="site-header-nav flex shrink-0 items-center gap-0.5 rounded-full border border-white/[0.09] bg-white/[0.06] p-1 backdrop-blur-md"
               aria-label="Main">
            {% set path = request.url.path %}
            <a href="/"
               class="rounded-full px-4 py-1.5 text-sm font-medium transition
                      focus:outline-none focus-visible:ring-2 focus-visible:ring-cyan-400/60
                      {{ 'nav-link-active' if path == '/' else 'text-slate-400 hover:bg-white/10 hover:text-white' }}">
              Generate
            </a>
            <a href="/library"
               class="rounded-full px-4 py-1.5 text-sm font-medium transition
                      focus:outline-none focus-visible:ring-2 focus-visible:ring-cyan-400/60
                      {{ 'nav-link-active' if path == '/library' else 'text-slate-400 hover:bg-white/10 hover:text-white' }}">
              Library
            </a>
          </nav>
        </div>
      </div>
    </header>

    <main id="site-main" class="mx-auto w-full max-w-5xl flex-1 px-4 py-12 sm:px-6">
      {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-white/[0.04] mx-auto w-full max-w-5xl px-4 py-8 text-center text-xs text-slate-600 sm:px-6">
      Runs locally · Natural-language mode needs
      <code class="rounded border border-white/10 bg-white/5 px-1.5 py-0.5 font-mono text-[0.7rem] text-cyan-300/70">XAI_API_KEY</code>
      in
      <code class="rounded border border-white/10 bg-white/5 px-1.5 py-0.5 font-mono text-[0.7rem] text-cyan-300/70">.env</code>
    </footer>

  </div>
</body>
</html>
