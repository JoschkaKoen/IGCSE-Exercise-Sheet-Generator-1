<!--
  Adding a new PDF tab requires:
    1. state.js                    — add entry to TABS array and TAB_ORDER
    2. pdf_tab_bar.html            — add <button id="tab-btn-{id}">
    3. workspace_pdf_panels.html   — clone panel from #pdf-panel-template (see below)
    4. workspace_left.html         — add download card if the tab has a download
    5. 08-workspace-pdf-preview.css — add :has() tint rule if the tab needs a border colour
    6. applyDoneData() in downloads.js — wire the download link
-->
  <div class="pdf-preview-stack">
  <div id="pdf-preview-pane" class="pdf-preview-root" aria-hidden="true">
    <!--
      Template for adding future PDF panels.
      JS usage: const clone = document.getElementById('pdf-panel-template').content.cloneNode(true);
      Then fill in: panel.id, aria-labelledby, loading.id, scroll.id/data-pdf-scroll/aria-label,
      pages.id, and optionally swap the spinner colour classes.
    -->
    <template id="pdf-panel-template">
      <div class="pdf-tab-panel" role="tabpanel" hidden>
        <div class="pdf-loading-overlay hidden" aria-hidden="true">
          <span class="h-8 w-8 shrink-0 animate-spin rounded-full border-2 border-cyan-400/25 border-t-cyan-400" aria-hidden="true"></span>
        </div>
        <div class="pdf-empty-state hidden" role="status">
          <p>Not generated for this run.</p>
        </div>
        <div class="pdf-viewport-scroll hidden" tabindex="0">
          <div class="pdf-pages-stack"></div>
        </div>
      </div>
    </template>
    <div class="pdf-tab-panels">
      <div id="tab-panel-exercise" class="pdf-tab-panel is-active" role="tabpanel" aria-labelledby="tab-btn-exercise">
        <div id="pdf-loading-exercise" class="pdf-loading-overlay hidden" aria-hidden="true">
          <span class="h-8 w-8 shrink-0 animate-spin rounded-full border-2 border-cyan-400/25 border-t-cyan-400" aria-hidden="true"></span>
        </div>
        <div id="pdf-empty-exercise" class="pdf-empty-state hidden" role="status">
          <p>Not generated for this run.</p>
        </div>
        <div id="pdf-scroll-exercise" class="pdf-viewport-scroll hidden" tabindex="0" data-pdf-scroll="exercise" aria-label="Exercise sheet preview">
          <div id="pdf-pages-exercise" class="pdf-pages-stack"></div>
        </div>
      </div>
      <div id="tab-panel-answers" class="pdf-tab-panel" role="tabpanel" aria-labelledby="tab-btn-answers" hidden>
        <div id="pdf-loading-answers" class="pdf-loading-overlay hidden" aria-hidden="true">
          <span class="h-8 w-8 shrink-0 animate-spin rounded-full border-2 border-emerald-400/25 border-t-emerald-400" aria-hidden="true"></span>
        </div>
        <div id="pdf-empty-answers" class="pdf-empty-state hidden" role="status">
          <p>Not generated for this run.</p>
        </div>
        <div id="pdf-scroll-answers" class="pdf-viewport-scroll hidden" tabindex="0" data-pdf-scroll="answers" aria-label="Mark scheme preview">
          <div id="pdf-pages-answers" class="pdf-pages-stack"></div>
        </div>
      </div>
      <div id="tab-panel-two-up" class="pdf-tab-panel" role="tabpanel" aria-labelledby="tab-btn-two-up" hidden>
        <div id="pdf-loading-two-up" class="pdf-loading-overlay hidden" aria-hidden="true">
          <span class="h-8 w-8 shrink-0 animate-spin rounded-full border-2 border-amber-400/25 border-t-amber-400" aria-hidden="true"></span>
        </div>
        <div id="pdf-empty-two-up" class="pdf-empty-state hidden" role="status">
          <p>Not generated for this run.</p>
        </div>
        <div id="pdf-scroll-two-up" class="pdf-viewport-scroll hidden" tabindex="0" data-pdf-scroll="two-up" aria-label="2-up sheet preview">
          <div id="pdf-pages-two-up" class="pdf-pages-stack"></div>
        </div>
      </div>
      <div id="tab-panel-four-up" class="pdf-tab-panel" role="tabpanel" aria-labelledby="tab-btn-four-up" hidden>
        <div id="pdf-loading-four-up" class="pdf-loading-overlay hidden" aria-hidden="true">
          <span class="h-8 w-8 shrink-0 animate-spin rounded-full border-2 border-violet-400/25 border-t-violet-400" aria-hidden="true"></span>
        </div>
        <div id="pdf-empty-four-up" class="pdf-empty-state hidden" role="status">
          <p>Not generated for this run.</p>
        </div>
        <div id="pdf-scroll-four-up" class="pdf-viewport-scroll hidden" tabindex="0" data-pdf-scroll="four-up" aria-label="4-up sheet preview">
          <div id="pdf-pages-four-up" class="pdf-pages-stack"></div>
        </div>
      </div>
      <div id="tab-panel-answers-two-up" class="pdf-tab-panel" role="tabpanel" aria-labelledby="tab-btn-two-up" hidden>
        <div id="pdf-loading-answers-two-up" class="pdf-loading-overlay hidden" aria-hidden="true">
          <span class="h-8 w-8 shrink-0 animate-spin rounded-full border-2 border-amber-400/25 border-t-amber-400" aria-hidden="true"></span>
        </div>
        <div id="pdf-empty-answers-two-up" class="pdf-empty-state hidden" role="status">
          <p>Not generated for this run.</p>
        </div>
        <div id="pdf-scroll-answers-two-up" class="pdf-viewport-scroll hidden" tabindex="0" data-pdf-scroll="answers-two-up" aria-label="Mark scheme 2-up preview">
          <div id="pdf-pages-answers-two-up" class="pdf-pages-stack"></div>
        </div>
      </div>
      <div id="tab-panel-answers-four-up" class="pdf-tab-panel" role="tabpanel" aria-labelledby="tab-btn-four-up" hidden>
        <div id="pdf-loading-answers-four-up" class="pdf-loading-overlay hidden" aria-hidden="true">
          <span class="h-8 w-8 shrink-0 animate-spin rounded-full border-2 border-violet-400/25 border-t-violet-400" aria-hidden="true"></span>
        </div>
        <div id="pdf-empty-answers-four-up" class="pdf-empty-state hidden" role="status">
          <p>Not generated for this run.</p>
        </div>
        <div id="pdf-scroll-answers-four-up" class="pdf-viewport-scroll hidden" tabindex="0" data-pdf-scroll="answers-four-up" aria-label="Mark scheme 4-up preview">
          <div id="pdf-pages-answers-four-up" class="pdf-pages-stack"></div>
        </div>
      </div>
      <div id="tab-panel-ranking" class="pdf-tab-panel" role="tabpanel" aria-labelledby="tab-btn-ranking" hidden>
        <div id="pdf-loading-ranking" class="pdf-loading-overlay hidden" aria-hidden="true">
          <span class="h-8 w-8 shrink-0 animate-spin rounded-full border-2 border-orange-400/25 border-t-orange-400" aria-hidden="true"></span>
        </div>
        <div id="pdf-empty-ranking" class="pdf-empty-state hidden" role="status">
          <p>Ranking not generated for this run.</p>
        </div>
        <div id="pdf-scroll-ranking" class="pdf-viewport-scroll hidden" tabindex="0" data-pdf-scroll="ranking" aria-label="Difficulty ranking preview">
          <div id="pdf-pages-ranking" class="pdf-pages-stack"></div>
        </div>
      </div>
    </div>
  </div>
  </div><!-- /pdf-preview-stack -->
