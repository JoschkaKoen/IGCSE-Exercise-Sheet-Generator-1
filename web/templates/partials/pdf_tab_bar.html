<!--
  Adding a new PDF tab: see the checklist comment at the top of workspace_pdf_panels.html.
-->
  <div id="pdf-tab-bar-wrap" class="pdf-tab-bar-wrap" hidden>
    <button type="button" id="pdf-tab-back-btn" class="pdf-tab-back-btn" aria-label="Back to generator" title="Back to generator">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M10 3L5 8L10 13"/>
      </svg>
    </button>
    <div class="ranking-tab-area">
      <button type="button" id="tab-btn-ranking" class="pdf-tab-ranking-btn"
              role="tab" aria-selected="false" aria-controls="tab-panel-ranking"
              aria-label="Difficulty ranking" title="Difficulty ranking" disabled>
        <svg id="ranking-tab-icon-chart" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" class="hidden">
          <rect x="1" y="9" width="3" height="6" rx="0.6"/>
          <rect x="6" y="5" width="3" height="10" rx="0.6"/>
          <rect x="11" y="1" width="3" height="14" rx="0.6"/>
        </svg>
        <span id="ranking-tab-gen-spinner" class="gen-spinner gen-spinner--sm hidden" aria-hidden="true">
          <span class="gen-spinner-ring gen-spinner-ring--1"></span>
          <span class="gen-spinner-ring gen-spinner-ring--2"></span>
          <span class="gen-spinner-dot"></span>
        </span>
        <span>Ranking</span>
      </button>
      <span id="ranking-log" class="hidden min-w-0 truncate font-mono text-xs text-slate-400" style="max-width: 21rem;"></span>
    </div>
    <div class="pdf-tab-primary-clip">
    <div id="pdf-tab-primary-track" class="pdf-tab-primary-track" role="tablist" aria-label="Preview document" data-side="sheet">
      <span id="pdf-tab-side-pill" class="pdf-tab-side-pill" aria-hidden="true"></span>
      <div class="pdf-tab-sheet-column" role="presentation">
        <span class="pdf-tab-sheet-label">Exercise sheet</span>
      </div>
      <div class="pdf-tab-layout-column" role="presentation">
        <div id="pdf-tab-layout-track" class="pdf-tab-layout-track pdf-tab-layout-track--embedded" role="presentation" data-layout="exercise">
          <span id="pdf-tab-layout-pill" class="pdf-tab-layout-pill" aria-hidden="true"></span>
          <button type="button" id="tab-btn-exercise" class="pdf-tab-layout-btn pdf-tab-layout-btn--sky" role="tab"
                  aria-selected="true" aria-controls="tab-panel-exercise" tabindex="0" title="Single page">
            <span class="pdf-tab-layout-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><rect x="6" y="4" width="12" height="16" rx="1.5"/></svg>
            </span>
            <span class="sr-only">Single page</span>
          </button>
          <button type="button" id="tab-btn-two-up" class="pdf-tab-layout-btn pdf-tab-layout-btn--amber" role="tab"
                  aria-selected="false" aria-controls="tab-panel-two-up" tabindex="-1" title="Two pages per sheet">
            <span class="pdf-tab-layout-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
                <rect x="3" y="4" width="8" height="16" rx="1.25"/><rect x="13" y="4" width="8" height="16" rx="1.25"/>
              </svg>
            </span>
            <span class="sr-only">Two pages per sheet</span>
          </button>
          <button type="button" id="tab-btn-four-up" class="pdf-tab-layout-btn pdf-tab-layout-btn--violet" role="tab"
                  aria-selected="false" aria-controls="tab-panel-four-up" tabindex="-1" title="Four pages per sheet">
            <span class="pdf-tab-layout-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
                <rect x="3" y="4" width="8" height="7" rx="1"/><rect x="13" y="4" width="8" height="7" rx="1"/>
                <rect x="3" y="13" width="8" height="7" rx="1"/><rect x="13" y="13" width="8" height="7" rx="1"/>
              </svg>
            </span>
            <span class="sr-only">Four pages per sheet</span>
          </button>
        </div>
      </div>
      <div class="pdf-tab-answers-column" role="presentation">
        <button type="button" id="tab-btn-answers" class="pdf-tab-primary-facet" role="tab"
                aria-selected="false" aria-controls="tab-panel-answers" aria-label="Mark scheme" tabindex="-1">Mark scheme</button>
      </div>
    </div>
    </div>
  </div>
