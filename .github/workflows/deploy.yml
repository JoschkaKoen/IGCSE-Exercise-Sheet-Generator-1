# Event-driven deploy: SSH into the server only when `main` changes on GitHub
# (push or manual workflow run). The server pulls and rebuilds Docker only if
# `pull-and-deploy.sh` fast-forwards to new commits — no polling.
#
# Required GitHub repository secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_HOST       — server hostname or IP (e.g. 43.160.216.10)
#   DEPLOY_USER       — SSH login (e.g. root)
#   DEPLOY_SSH_KEY    — private key PEM (full file, including -----BEGIN ... END-----)
#
# Optional secret DEPLOY_PORT (e.g. 2222) if SSH is not on 22; omitted secret → port 22.
#
# On the server, install the matching *public* key in ~/.ssh/authorized_keys
# for DEPLOY_USER. The server clone must live at DEPLOY_PATH below (or edit it).

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script: |
            set -euo pipefail
            DEPLOY_PATH="/root/esg"
            cd "$DEPLOY_PATH"
            ./scripts/pull-and-deploy.sh
