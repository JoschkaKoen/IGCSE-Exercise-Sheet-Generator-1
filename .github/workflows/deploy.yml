# Event-driven deploy: build the image in GitHub Actions, push it to GHCR, then SSH
# into the server which only *pulls* it — no apt/pip/gcc compile on the VPS.
#
# Required GitHub repository secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_HOST    — server hostname or IP (e.g. 43.160.216.10)
#   DEPLOY_USER    — SSH login (e.g. root)
#   DEPLOY_SSH_KEY — private key PEM (full file, incl. -----BEGIN ... END-----)
#   DEPLOY_SSH_PASSPHRASE — passphrase for the private key (if encrypted)
# Optional DEPLOY_PORT (default 22).
#
# ONE-TIME server setup for the pull path: `docker login ghcr.io` with a PAT scoped
# read:packages (the GHCR package is private), persisted in /root/.docker/config.json.
# Without it the pull 404s and the deploy fails — the old container keeps running.
#
# The build job authenticates to GHCR with the per-run GITHUB_TOKEN (packages: write).

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/joschkakoen/exercise-app

jobs:
  build:
    runs-on: ubuntu-latest          # amd64 — matches the VPS (uname -m = x86_64)
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1            # repo .git is ~3.6 GB; shallow clone keeps checkout fast
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          target: app
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=min   # min: final-stage layers only → stays under GitHub's 10 GB Actions-cache cap

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy (pull mode)
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          passphrase: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          command_timeout: 15m        # pull, not build
          script: |
            set -euo pipefail
            mkdir -p /root/esg
            cd /root/esg

            # Clone the repo if this is the first time
            if [ ! -d ".git" ]; then
              git clone https://github.com/JoschkaKoen/eXercise.git .
            fi

            # Pull latest changes
            git pull origin main

            IMAGE_TAG=${{ github.sha }} ./scripts/pull-and-deploy.sh
