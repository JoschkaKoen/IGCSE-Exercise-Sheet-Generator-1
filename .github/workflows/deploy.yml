# Event-driven deploy: build the image in GitHub Actions, push it to GHCR, then SSH
# into the server which only *pulls* it — no apt/pip/gcc compile on the VPS.
#
# Required GitHub repository secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_HOST    — server hostname or IP (e.g. 43.160.216.10)
#   DEPLOY_USER    — SSH login (e.g. root)
#   DEPLOY_SSH_KEY — private key PEM (full file, incl. -----BEGIN ... END-----)
#   DEPLOY_SSH_PASSPHRASE — passphrase for the private key (if encrypted)
#   GHCR_PULL_TOKEN  — PAT with read:packages; used to `docker login ghcr.io` on the VPS
#                      during deploy (so you don't need a one-time manual login)
# Optional DEPLOY_PORT (default 22), DEPLOY_PATH (default /root/esg).
#
# ONE-TIME server setup (only if GHCR_PULL_TOKEN is not set): `docker login ghcr.io`
# with a PAT scoped read:packages, persisted in /root/.docker/config.json.
# Without login the pull 404s and the deploy fails — the old container keeps running.

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/joschkakoen/exercise-app

jobs:
  build:
    runs-on: ubuntu-latest          # amd64 — matches the VPS (uname -m = x86_64)
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1            # repo .git is ~3.6 GB; shallow clone keeps checkout fast
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          target: app
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=min   # min: final-stage layers only → stays under GitHub's 10 GB Actions-cache cap

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy (pull mode)
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          passphrase: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          command_timeout: 15m        # pull, not build
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH || '/root/esg' }}"
            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"

            # First deploy: shallow clone (repo is large; full history not needed on the VPS).
            if [ ! -d ".git" ]; then
              git clone --depth 1 --branch main https://github.com/JoschkaKoen/eXercise.git .
            fi

            # Log in to GHCR so `docker compose pull` can fetch the private image.
            if [ -n "${{ secrets.GHCR_PULL_TOKEN }}" ]; then
              echo "${{ secrets.GHCR_PULL_TOKEN }}" | docker login ghcr.io -u joschkakoen --password-stdin
            fi

            # Pull pre-built image from GHCR and start/restart the stack.
            chmod +x scripts/pull-and-deploy.sh
            IMAGE_TAG=${{ github.sha }} ./scripts/pull-and-deploy.sh
